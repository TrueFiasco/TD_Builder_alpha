# CI — fast lanes on every PR/push (see docs/CI.md for the lane matrix,
# runner rationale, floors, and the build-gate disposition).
#
#   docs-lint  : stdlib-only docs-consistency lint (scripts/docs_lint.py)
#   hermetic   : the KB-free subset (555 as of 2026-07-18, CI-measured) on ubuntu+windows;
#                the runner has NO KB and NO ML deps, so a mismarked/newly-
#                KB-hungry test fails loudly here (physical enforcement of
#                the requires_kb marker)
#   engine-kb  : all engine+unit tests (724 as of 2026-07-18, CI-measured) with the
#                release KB restored from cache (sha256-pinned via
#                scripts/vector_db_release.json); still light deps —
#                builders must never need the ML stack.
#
# TouchDesigner-dependent work (toecollapse/toeexpand paths, build-gate Track
# A/B, live acceptance) is deliberately NOT here: hosted runners cannot run
# TD, self-hosted is banned pre-CLA. Those tests skip themselves cleanly.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  docs-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Docs-consistency lint (stdlib-only, no installs)
        run: python scripts/docs_lint.py

  hermetic:
    name: hermetic (KB-free, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install light deps (no ML stack — import-hygiene canary)
        run: pip install -r .github/requirements-light.txt
      - name: Guard — fetched KB must be absent (this lane proves KB-freeness)
        shell: bash
        run: |
          if [ -e KB/operators.json ]; then
            echo "KB/operators.json present on a hermetic runner — lane invalid"; exit 1
          fi
      # FLOORS ARE CI-MEASURED, not measured on a dev box. chromadb is excluded
      # by design from .github/requirements-light.txt, so tests/engine/test_chroma_guard.py
      # (module-level importorskip) collects 6 here and 6 MORE on a machine that
      # has chromadb installed -- a locally-measured floor reds this lane.
      # History: 55 by W1+W2a; 87 after W2d; 93 after W3b; 431 at the 2026-07-17
      # catch-up; 555 after W3 Census Lock (+31 was drift already on main from
      # PR #49/#50, +93 is W3's census/guard suite).
      - name: Collection floor (hermetic, silent-shrink guard)
        shell: bash
        run: |
          n=$(python -m pytest tests/engine tests/unit -m "not requires_kb" --co -q | grep -c "::" || true)
          echo "hermetic tests collected: $n (floor 555)"
          test "$n" -ge 555
      - name: Hermetic tests (no KB, no ML deps)
        run: python -m pytest tests/engine tests/unit -m "not requires_kb" -q

  engine-kb:
    name: engine-kb (windows, cached KB)
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install light deps (builders must not need the ML stack)
        run: pip install -r .github/requirements-light.txt
      # Cache exactly the FETCHED artifacts (the release-zip contents list),
      # never the whole KB/ dir: tracked KB files (palette_components.json,
      # docked_dats.json, manifest.json) must always come from the checkout,
      # or a stale cache could shadow a committed registry change.
      # Restored pickles are re-verified at LOAD time against the committed
      # artifact_sha256 pins in scripts/vector_db_release.json (W2d,
      # MCP/server_core/kb_integrity.py) — the receipt sidecar is deliberately
      # NOT cached; the pins are the CI anchor.
      - name: Restore KB (release asset, keyed by the pinned sha256)
        uses: actions/cache@v4
        with:
          key: kb-v1-${{ hashFiles('scripts/vector_db_release.json') }}
          path: |
            KB/operators.json
            KB/knowledge_graph_enhanced.gpickle
            KB/vector_db
            KB/lexical_index
            KB/models
            KB/sources.lock.json
            KB/docked_contents.json
      - name: Fetch KB on cache miss (sha256-verified before extract)
        run: python scripts/fetch_vector_db.py
      # CI-measured, same chromadb caveat as the hermetic lane above (-6 vs a
      # chromadb-equipped dev box). History: 145 by W1+W2a; 185 after W2b+W2d;
      # 195 after W3b; 581 at the 2026-07-17 catch-up; 724 after W3 Census Lock
      # (+36 pre-existing drift, +107 W3, incl. 14 requires_kb guard tests).
      - name: Collection floor (engine+unit, silent-shrink guard)
        shell: bash
        run: |
          n=$(python -m pytest tests/engine tests/unit --co -q | grep -c "::" || true)
          echo "engine+unit tests collected: $n (floor 724)"
          test "$n" -ge 724
      - name: Engine + unit tests (KB present; TD-binary tests self-skip)
        run: python -m pytest tests/engine tests/unit -q
