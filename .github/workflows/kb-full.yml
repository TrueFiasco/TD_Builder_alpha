# KB-full — nightly + on-demand deep lane (see docs/CI.md).
#
# Full dependency install, release KB restored from cache (fetched+verified on
# miss), then:
#   1. offline acceptance + measure (the canonical gate; live/live-auth tests
#      skip without TouchDesigner — zero failures enforced, plus a pass-count
#      floor so silent shrink can't hide behind skips)
#   2. retrieval eval (median of 3) with ALL writes redirected off-repo, then a
#      git-clean guard, then the tolerance gate scripts/ci_compare_eval.py vs the
#      committed baseline. (W2c fixed the overwrite wart: run_eval no longer
#      defaults --out onto eval/baseline.json — --write-baseline is the explicit
#      opt-in — so the redirect + guard are now belt-and-braces, not load-bearing.)
#
# windows-latest on purpose: local truth is Windows py3.11 and the committed
# baseline numbers were measured on Windows — minimizes float-drift vs the
# tolerances. Runs on the default branch's workflow file; dispatch may target
# any ref (that is the seeded-red vehicle for this lane, docs/CI.md §Bring-up).
name: KB-full

on:
  schedule:
    - cron: "17 3 * * *"   # 03:17 UTC nightly (off-peak, off-the-hour)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kb-full-${{ github.ref }}
  cancel-in-progress: false

jobs:
  kb-full:
    runs-on: windows-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install full deps (pyproject + dev extra)
        run: pip install ".[dev]"
      # Same fetched-artifacts-only cache as ci.yml (never the whole KB/ dir —
      # tracked KB files must come from the checkout). Restored pickles are
      # re-verified at LOAD time against the committed artifact_sha256 pins
      # (W2d, MCP/server_core/kb_integrity.py); the receipt sidecar is
      # deliberately NOT cached — the pins are the CI anchor.
      - name: Restore KB (release asset, keyed by the pinned sha256)
        uses: actions/cache@v4
        with:
          key: kb-v1-${{ hashFiles('scripts/vector_db_release.json') }}
          path: |
            KB/operators.json
            KB/knowledge_graph_enhanced.gpickle
            KB/vector_db
            KB/lexical_index
            KB/models
            KB/sources.lock.json
            KB/docked_contents.json
      - name: Fetch KB on cache miss (sha256-verified before extract)
        run: python scripts/fetch_vector_db.py
      # The query encoder (all-MiniLM-L6-v2) downloads from HuggingFace on the
      # first run only; the reranker ships inside the KB (KB/models/). A HF
      # outage therefore only hurts a cold cache — loud, and healed next run.
      - name: HuggingFace model cache
        uses: actions/cache@v4
        with:
          key: hf-minilm-v1
          path: ~/.cache/huggingface

      - name: Acceptance + measure (offline subset; live tests skip without TD)
        shell: bash
        run: |
          python -m pytest tests/acceptance tests/measure -q | tee acceptance.log
          passed=$(grep -Eo '[0-9]+ passed' acceptance.log | grep -Eo '[0-9]+' | head -1)
          echo "acceptance passed: ${passed:-0} (floor 22 = measured TD-down pass count; 26 with live TD + TD_ACCEPT_LIVE=1 locally)"
          test "${passed:-0}" -ge 22

      # W7 server round-trip coverage. This suite ran in NO lane until
      # 2026-07-17 (the 40-defect W7 cluster survived the gates precisely
      # because of that). Needs the full ML stack (.[dev]) + the cached KB,
      # so this job is its only possible home. Hard gate - no
      # continue-on-error. The pass floor guards against silent skip-storms
      # (e.g. an empty vector_db skips test_user_store's whole module).
      - name: Retrieval user-store suite (full deps + KB; t1b self-skips without TD)
        shell: bash
        run: |
          python -m pytest tests/retrieval_user -q | tee retrieval_user.log
          passed=$(grep -Eo '[0-9]+ passed' retrieval_user.log | grep -Eo '[0-9]+' | head -1)
          echo "retrieval_user passed: ${passed:-0} (floor 12 = 13 tests minus t1b's TD-binary skip on hosted runners)"
          test "${passed:-0}" -ge 12

      - name: Retrieval eval (median of 3; all writes redirected off-repo)
        shell: bash
        run: |
          python eval/run_eval.py --backend enhanced --repeats 3 \
            --out "$RUNNER_TEMP/candidate.json" \
            --stage-dir "$RUNNER_TEMP/eval_stage" \
            --gt-types eval/ground_truth/operator_types.json
      - name: Repo tree must stay clean (baseline-overwrite guard)
        shell: bash
        run: |
          git status --porcelain
          test -z "$(git status --porcelain)"
      - name: Non-regression gate vs committed eval/baseline.json
        shell: bash
        run: |
          python scripts/ci_compare_eval.py eval/baseline.json "$RUNNER_TEMP/candidate.json" \
            | tee -a "$GITHUB_STEP_SUMMARY"

      # Seeded scorer tests (design acceptance 4/5 + §12 R-1/R-2/R-3): pure
      # scoring logic over synthetic transcripts + ToxBuilder-built artifacts
      # (needs the KB for type grounding, so it lives on this lane, not the
      # hermetic one). No pinned floor — additive, not part of the 143.
      # The three artifact-collapse tests self-skip here (no TouchDesigner ->
      # no toecollapse on hosted runners); the rest are TD-free and this step
      # stays a HARD gate for them — no continue-on-error.
      - name: Agent-eval scorer tests (seeded acceptance demos)
        shell: bash
        run: python -m pytest eval/agent_eval/tests -q

      # Agent-eval Lane R (replay-gate): deterministic, key-free, in-process.
      # It re-executes the blessed tool-call traces against the same cached KB
      # and scores the built artifacts with the same 7-stage validator the
      # product uses. This is the REPLAY-gate only — NOT the agent-gate (Lane M,
      # model-in-the-loop) which stays on the maintainer machine (D-F) and never
      # runs in hosted CI. --compare diffs the sweep against the committed
      # baseline; an identity-drift refusal (exit 3) is advisory here like any
      # other failure. continue-on-error: this lane is ADVISORY at bring-up
      # (matching how every kb-full lane starts); promotion to blocking is a
      # documented one-line flip once it is green on hosted runners twice — see
      # eval/agent_eval/README.md "CI placement & promotion path".
      # !cancelled(): an earlier red step must never silently suppress this
      # gate again (the scorer step's toecollapse failure skipped Lane R on
      # every nightly 2026-07-05..16 — the replay gate never ran on schedule).
      # Deliberately not always(): a user cancel should still cancel.
      - name: Agent-eval Lane R (replay-gate; advisory at bring-up)
        if: ${{ !cancelled() }}
        continue-on-error: true
        shell: bash
        run: |
          python eval/agent_eval/run_agent_eval.py --lane replay --no-stage \
            --run-id "ci-${GITHUB_RUN_ID}" \
            --compare eval/agent_eval/baseline.json | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kb-full-run
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}/candidate.json
            acceptance.log
            retrieval_user.log
            eval/agent_eval/runs/ci-${{ github.run_id }}/report.json
            eval/agent_eval/runs/ci-${{ github.run_id }}/verdicts.json
