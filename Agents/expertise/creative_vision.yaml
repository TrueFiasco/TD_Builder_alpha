# Composition principles
composition:
  rule_of_thirds:
    description: "Divide frame into 3x3 grid, place interest at intersections"
    application: "Position key elements at grid intersections"

  golden_ratio:
    description: "1.618:1 proportion for visual harmony"
    application: "Size and placement relationships"

  symmetry:
    types: ["bilateral", "radial", "rotational"]
    application: "Create balance and focus"

  asymmetry:
    description: "Intentional imbalance for dynamic tension"
    application: "Create movement and interest"

  depth_layers:
    description: "Foreground, midground, background separation"
    application: "Create depth and visual hierarchy"

  negative_space:
    description: "Empty areas that define positive shapes"
    application: "Focus attention, create breathing room"

# =============================================================================
# PREBUILT SOLUTION REVIEW (Creative/CG Expert Role)
# =============================================================================

prebuilt_solution_review:
  description: |
    When TD Designer proposes prebuilt vs custom solutions, Creative/CG Expert
    evaluates from artistic and technical perspectives before passing to Critic.

  artistic_evaluation:
    questions:
      - "Does the prebuilt component's aesthetic match our creative vision?"
      - "Can it achieve the desired mood and visual quality?"
      - "Is there sufficient control over appearance parameters?"
      - "Will modifications compromise artistic integrity?"

    accept_prebuilt_when:
      - "Visual output matches or exceeds requirements"
      - "Parameters provide adequate artistic control"
      - "Component has proven track record for similar use cases"
      - "Time saved can be invested in other creative elements"

    prefer_custom_when:
      - "Prebuilt aesthetic is too generic or recognizable"
      - "Creative vision requires unique visual signature"
      - "Fine control over specific behaviors is essential"
      - "Project is showcase piece requiring originality"

  technical_evaluation:
    questions:
      - "Does the prebuilt integrate cleanly with our architecture?"
      - "Are performance characteristics acceptable?"
      - "Is the I/O compatible with our data flow?"
      - "Can we maintain/debug it if issues arise?"

    integration_concerns:
      - "Input/output type compatibility"
      - "Parameter binding and expressions"
      - "Cook dependency implications"
      - "Memory and GPU resource usage"

  recommendation_template: |
    ## Creative/CG Review: {task_name}

    ### Artistic Assessment
    - Vision Alignment: {high|medium|low}
    - Aesthetic Quality: {meets|exceeds|insufficient}
    - Control Adequacy: {sufficient|limited|insufficient}

    ### Technical Assessment
    - Integration Complexity: {simple|moderate|complex}
    - Performance Impact: {negligible|acceptable|concerning}
    - Maintainability: {high|medium|low}

    ### Recommendation
    {APPROVE_PREBUILT | APPROVE_CUSTOM | REQUEST_ALTERNATIVES}

    ### Rationale
    {detailed_reasoning}

    ### Conditions (if approving prebuilt)
    {any_required_modifications}

  palette_categories_by_domain:
    generative_art:
      recommended: ["noise", "julia", "mandelbrot", "superFormula", "mesh"]
      use_for: "Procedural textures, patterns, organic forms"

    audio_visual:
      recommended: ["audioAnalysis", "audioSet", "audioSpectrum"]
      use_for: "Beat detection, frequency analysis, audio reactivity"

    installation_art:
      recommended: ["kantanMapper", "projectorBlend", "stoner", "multiTouch"]
      use_for: "Projection mapping, multi-display, interactive"

    vj_performance:
      recommended: ["blendModes", "feedback", "bloom", "TDAbleton/*"]
      use_for: "Live mixing, effects, DAW integration"

    ui_systems:
      recommended: ["UI/Basic Widgets/*", "slider2D", "buttonRadio"]
      use_for: "Control interfaces, parameter adjustment"

# Confidence and validation
validation:
  require_mood_mapping: true
  require_color_palette: true
  min_technical_hints: 2
  confidence_threshold: 0.6
