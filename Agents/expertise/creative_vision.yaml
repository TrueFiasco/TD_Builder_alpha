# Creative Vision Expertise
# Domain: Artistic vision, mood, aesthetics for generative art
# Used by: creative_expert agent

schema_version: "1.0"
created: "2025-12-16"
last_updated: "2025-12-16"
update_count: 1
validated_against: "creative_expert domain knowledge"

# Mood vocabulary - emotional qualities that drive visual decisions
moods:
  ethereal:
    description: "Light, airy, transcendent quality with soft transitions"
    visual_markers:
      colors: ["soft pastels", "white", "pale blue", "silver"]
      motion: "slow, floating, drifting"
      contrast: "low"
      saturation: "low to medium"
    technical_hints:
      blur: "high"
      opacity: "variable, layered"
      particle_speed: "slow"
    example_works: ["ambient music visualization", "meditation apps", "dream sequences"]
    confidence: 0.85

  aggressive:
    description: "High energy, sharp, intense visual impact"
    visual_markers:
      colors: ["red", "black", "orange", "electric blue"]
      motion: "fast, sharp, staccato"
      contrast: "high"
      saturation: "high"
    technical_hints:
      blur: "minimal or motion blur"
      edges: "sharp"
      particle_speed: "fast"
      effects: ["strobe", "glitch", "distortion"]
    example_works: ["metal/EDM visuals", "action sequences", "impact moments"]
    confidence: 0.85

  contemplative:
    description: "Thoughtful, slow-moving, introspective"
    visual_markers:
      colors: ["deep blue", "purple", "earth tones", "muted"]
      motion: "very slow, deliberate"
      contrast: "medium"
      saturation: "medium-low"
    technical_hints:
      fade_times: "long"
      particle_density: "sparse"
      camera_movement: "subtle drift"
    example_works: ["documentary intros", "philosophical content", "mindfulness"]
    confidence: 0.8

  chaotic:
    description: "Unpredictable, overwhelming, maximalist"
    visual_markers:
      colors: ["full spectrum", "clashing", "neon"]
      motion: "erratic, multi-directional"
      contrast: "variable"
      saturation: "extreme"
    technical_hints:
      randomness: "high"
      layer_count: "many"
      effects: ["noise", "glitch", "feedback"]
    example_works: ["experimental art", "cyberpunk", "sensory overload"]
    confidence: 0.8

  organic:
    description: "Natural, flowing, growth-like movement"
    visual_markers:
      colors: ["greens", "browns", "water blues", "sunset oranges"]
      motion: "flowing, branching, growing"
      contrast: "natural range"
      saturation: "natural"
    technical_hints:
      algorithms: ["perlin noise", "reaction-diffusion", "L-systems"]
      curves: "bezier, smooth"
      symmetry: "bilateral or radial"
    example_works: ["nature documentaries", "bio-art", "growth simulations"]
    confidence: 0.85

  minimal:
    description: "Sparse, clean, focused on essential elements"
    visual_markers:
      colors: ["monochrome", "limited palette (2-3 colors)"]
      motion: "precise, intentional"
      contrast: "high"
      saturation: "varies"
    technical_hints:
      element_count: "few"
      negative_space: "prominent"
      animations: "subtle"
    example_works: ["corporate presentations", "luxury branding", "art installations"]
    confidence: 0.85

  psychedelic:
    description: "Mind-bending, warped, kaleidoscopic"
    visual_markers:
      colors: ["rainbow", "shifting hues", "complementary clashes"]
      motion: "swirling, morphing, breathing"
      contrast: "variable"
      saturation: "high"
    technical_hints:
      effects: ["kaleidoscope", "feedback", "color cycling"]
      distortion: "heavy"
      symmetry: "radial, mandala"
    example_works: ["music festivals", "VJ sets", "altered states"]
    confidence: 0.85

# Aesthetic styles - visual approaches and techniques
aesthetics:
  glitch:
    description: "Digital artifacts, data corruption aesthetic"
    techniques:
      - "data bending"
      - "scan line displacement"
      - "RGB channel separation"
      - "block artifacts"
      - "temporal glitching"
    color_tendencies: ["RGB primary splits", "digital noise", "high contrast"]
    motion_qualities: "jerky, discontinuous, stuttering"
    td_relevance:
      operators: ["displace", "composite", "feedback", "glsl"]
      patterns: ["feedback_loop", "glsl_integration"]
    confidence: 0.9

  organic:
    description: "Natural, biological, growth-inspired forms"
    techniques:
      - "reaction-diffusion"
      - "perlin noise"
      - "flocking/boids"
      - "L-systems"
      - "cellular automata"
    color_tendencies: ["earth tones", "natural gradients", "bioluminescence"]
    motion_qualities: "flowing, growing, breathing"
    td_relevance:
      operators: ["noise", "glsl", "particle systems"]
      patterns: ["particle_system", "glsl_particle_swarm"]
    confidence: 0.9

  geometric:
    description: "Sharp shapes, mathematical precision"
    techniques:
      - "sacred geometry"
      - "tessellation"
      - "vector graphics"
      - "wireframes"
      - "constructivist"
    color_tendencies: ["bold primaries", "monochrome", "neon on dark"]
    motion_qualities: "precise, rotational, transformational"
    td_relevance:
      operators: ["circle", "rectangle", "line", "instancing"]
      patterns: ["instancing_workflow", "render_pipeline"]
    confidence: 0.9

  cinematic:
    description: "Film-like quality, professional look"
    techniques:
      - "depth of field"
      - "lens flares"
      - "film grain"
      - "color grading"
      - "letterboxing"
    color_tendencies: ["color graded", "teal-orange", "desaturated"]
    motion_qualities: "smooth camera moves, rack focus, slow motion"
    td_relevance:
      operators: ["render", "blur", "level", "composite"]
      patterns: ["render_pipeline", "feedback_loop"]
    confidence: 0.85

  retro:
    description: "Nostalgic, vintage technology aesthetics"
    techniques:
      - "CRT effects"
      - "VHS degradation"
      - "low resolution"
      - "limited color palette"
      - "pixel art"
    color_tendencies: ["8-bit palettes", "neon", "amber CRT"]
    motion_qualities: "frame rate limitations, interlacing"
    td_relevance:
      operators: ["resolution", "quantize", "composite", "glsl"]
      patterns: ["feedback_loop", "glsl_integration"]
    confidence: 0.85

  abstract:
    description: "Non-representational, form and color focused"
    techniques:
      - "color fields"
      - "procedural generation"
      - "mathematical visualization"
      - "audio-reactive abstraction"
    color_tendencies: ["varied, often bold or experimental"]
    motion_qualities: "varied, often rhythm-driven"
    td_relevance:
      operators: ["noise", "math", "composite", "glsl"]
      patterns: ["audio_reactive", "glsl_particle_swarm"]
    confidence: 0.85

# Color palette strategies
color_palettes:
  monochromatic:
    description: "Single hue with value variations"
    construction: "One hue, vary saturation and brightness"
    mood_associations: ["elegant", "focused", "minimal"]
    example_values:
      base: [0.6, 0.8, 0.9]  # HSV
      variations: ["lighter", "darker", "desaturated"]

  complementary:
    description: "Two colors opposite on color wheel"
    construction: "180 degree separation on hue wheel"
    mood_associations: ["dynamic", "contrasting", "energetic"]
    warning: "Can be jarring if not balanced"

  analogous:
    description: "Adjacent colors on wheel"
    construction: "30-60 degree separation on hue wheel"
    mood_associations: ["harmonious", "natural", "calm"]

  triadic:
    description: "Three colors equally spaced on wheel"
    construction: "120 degree separation"
    mood_associations: ["vibrant", "balanced", "playful"]

  split_complementary:
    description: "Base color + two colors adjacent to complement"
    construction: "Base + colors 150/210 degrees away"
    mood_associations: ["dynamic but less tension than complementary"]

  warm:
    description: "Red, orange, yellow spectrum"
    colors: ["red", "orange", "yellow", "gold"]
    mood_associations: ["energy", "passion", "warmth", "urgency"]

  cool:
    description: "Blue, green, purple spectrum"
    colors: ["blue", "cyan", "green", "purple"]
    mood_associations: ["calm", "professional", "technology", "depth"]

  neon:
    description: "High saturation electric colors"
    colors: ["electric blue", "hot pink", "lime green", "cyan"]
    mood_associations: ["cyberpunk", "nightlife", "futuristic"]
    technical_notes: "Often requires HDR or bloom for full effect"

# Motion qualities vocabulary
motion_qualities:
  fluid:
    description: "Smooth, continuous movement like water"
    parameters:
      interpolation: "bezier/ease"
      speed_variation: "gradual"
      direction_changes: "curved"
    implementation_hints:
      filter_lag: "high"
      noise_frequency: "low"

  sharp:
    description: "Quick, precise movements with clear start/stop"
    parameters:
      interpolation: "linear or step"
      speed_variation: "sudden"
      direction_changes: "angular"
    implementation_hints:
      filter_lag: "none"
      trigger_response: "immediate"

  pulsing:
    description: "Rhythmic expansion/contraction"
    parameters:
      wave_type: "sine"
      period: "regular"
      amplitude: "varies by intensity"
    implementation_hints:
      audio_link: "beat detection"
      operators: ["wave", "beat", "trigger"]

  drifting:
    description: "Slow, aimless wandering"
    parameters:
      speed: "very slow"
      direction: "random with momentum"
      persistence: "high"
    implementation_hints:
      noise_type: "perlin"
      noise_evolution: "slow"

  explosive:
    description: "Rapid outward expansion from center"
    parameters:
      initial_velocity: "high"
      deceleration: "exponential"
      spread: "radial"
    implementation_hints:
      particle_system: true
      force_field: "radial outward"

  oscillating:
    description: "Regular back-and-forth movement"
    parameters:
      wave_type: "sine or triangle"
      frequency: "regular"
      phase_offsets: "for visual interest"
    implementation_hints:
      operators: ["wave", "math", "lag"]

