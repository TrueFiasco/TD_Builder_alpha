last_updated: '2026-05-16T12:27:11.967692'
update_count: 10
learning_status: initial
toe_structure:
  overview:
    description: .toe files are binary containers that expand to directory structure
    expansion_command: TOEEXPAND input.toe output.toe.dir
    collapse_command: TOECOLLAPSE input.toe.dir output.toe
  TOE_vs_TOX_DIFFERENCES: "TOE files (projects) require MORE system files than TOX\
    \ files (components):\n\nTOX structure (component only):\n  .build\n  container_name.n\n\
    \  container_name.parm\n  container_name/...children...\n\nTOE structure (full\
    \ project):\n  .build\n  .start          (timing/playback settings - cookrate,\
    \ realtime, etc.)\n  .grps           (group definitions - typically \"-2\\n0\\\
    n\")\n  .root           (root marker - just \"end\\n\")\n  .parm           (root\
    \ parameters - \"?\\n?\\n\")\n  project1.n      (COMP:container, not COMP:base!)\n\
    \  project1.parm   (w, h, borderover, parentshortcut)\n  project1.panel  (panel\
    \ state - screenw, screenh, etc.)\n  project1/...children...\n  perform.n    \
    \   (COMP:window for F1 perform mode)\n  perform.parm    (winop, justifyh, justifyv)\n\
    \  local.n         (COMP:base for local variables)\n  local.parm      (opviewer\
    \ reference)\n  local/maps.n, local/maps.parm\n  local/maps/master.n, select1.n,\
    \ select2.n, replicator1.n, etc.\n  local/midi.n, local/midi.parm, local/midi.lod\n\
    \  local/time.n, local/time.parm (COMP:time, clones /sys/local/time)\n  local/shortcuts.n,\
    \ local/shortcuts.parm (DAT:shortcuts)\n  local/variables.n (DAT:null)\n  local/master_beat.n,\
    \ local/master_beat.parm, local/master_beat.chop, local/master_beat.beat\n  local/set_variables.n,\
    \ local/set_variables.table\n  .application    (desk/window layout - MUST BE LAST\
    \ in TOC!)\n\nMissing any of these system files causes \"file may be truncated\"\
    \ error.\nThe root container must be COMP:container for TOE, COMP:base for TOX.\n"
  discovery_date: '2025-12-17'
  source: comparison_empty_toe_template_and_human_edited_project
  files:
    toc:
      description: Table of contents - list of files in the archive
      extension: .toc
      format: Plain text - one filename per line, NO header
      required: true
      location: Root of .toe.dir
      CRITICAL_FORMAT: 'TOC files must have NO HEADER LINE.

        Just a plain list of relative file paths, one per line.


        WRONG (causes "file may be truncated" error):

        # 4 0 0 0 1

        .build

        .start

        ...


        CORRECT (matches TD export format):

        .build

        .start

        .grps

        .root

        .parm

        project1.n

        ...


        File order matters - root-level system files first, then containers.

        '
      standard_order:
      - .build
      - .start
      - .grps
      - .root
      - .parm
      - '{container}.n'
      - '{container}.parm'
      - '{container}.panel (for TOE root)'
      - perform.n (TOE only)
      - perform.parm (TOE only)
      - local.n (TOE only)
      - local.parm (TOE only)
      - local/* (TOE only)
      - .application (TOE only, at end)
      PER_OPERATOR_ORDER_CRITICAL: "For each operator, files MUST be in this order:\n\
        \  1. operator.n     (creates the operator)\n  2. operator.cparm (adds custom\
        \ parameters - requires operator to exist!)\n  3. operator.parm  (sets parameter\
        \ values)\n  4. operator.panel (panel state)\n  5. other files    (.network,\
        \ .text, .table, .chop, .ts, etc.)\n\nALPHABETICAL SORT IS WRONG! It puts\
        \ .cparm before .n\nExample of wrong order:\n  container/slider.cparm  <--\
        \ TD tries to add params to non-existent op\n  container/slider.n      <--\
        \ operator created too late\n  container/slider.panel\n  container/slider.parm\n\
        \nCorrect order:\n  container/slider.n      <-- operator created first\n \
        \ container/slider.cparm  <-- now custom params can be added\n  container/slider.parm\
        \   <-- values set\n  container/slider.panel  <-- panel state\n\nERROR if\
        \ wrong: \"td.ParCollection has no attribute 'ParamName'\"\n\nSort key for\
        \ correct order:\n  def toc_sort_key(filepath):\n      ext_priority = {'.n':\
        \ 0, '.cparm': 1, '.parm': 2, '.panel': 3, '.network': 4}\n      # ...sort\
        \ by (depth, base_path, ext_priority, full_path)\n"
      discovery_date: '2025-12-17'
      source: comparison_with_working_td_exports, palette_embedding_debugging
    n_files:
      description: Network files - operator definitions, positions, connections, and
        visual state
      extension: .n
      format: Text-based with optional hex-encoded data sections
      required: true
      location: Same directory as operators they describe
      COMPLETE_SECTION_ORDER: ".n files contain operator definitions in a specific\
        \ section order.\nAll sections are optional except FAMILY:type, tile, and\
        \ end.\n\nStandard section order:\n  1. FAMILY:type      - Operator type declaration\
        \ (e.g., \"COMP:container\", \"TOP:noise\")\n  2. tile x y w h     - Position\
        \ and size in network editor\n  3. flags = ...      - Visual flags (viewer,\
        \ clone, etc.)\n  4. inputs { }       - Input connections (index → source_operator)\n\
        \  5. color r g b      - Node color override (0-1 float values)\n  6. exports\
        \ { }      - Exported parameters (for COMPs with promoted params)\n  7. dict\
        \ HEX         - Instance data as hex-encoded pickle (for stateful operators)\n\
        \  8. end              - End marker (required)\n\nExample complete .n file:\n\
        \  COMP:container\n  tile 100 200 150 100\n  flags = viewer\n  inputs\n  {\n\
        \  0 \tsource_chop\n  }\n  color 0.5 0.3 0.7\n  exports\n  {\n  Value0 Value0\n\
        \  }\n  dict 8004...\n  end\n"
      exports_block:
        description: Defines which parameters are exported/promoted from a COMP
        format: 'exports

          {

          InternalParamName ExportedParamName

          ...

          }

          '
        purpose: 'When a COMP has promoted parameters (parameters exposed on its interface),

          the exports block maps internal parameter names to their exported names.

          This is essential for palette UI widgets that expose Value0, Value1, etc.

          '
        when_present: "Present when a COMP has parameters promoted to its interface.\n\
          Common in:\n  - Palette UI widgets (slider2D, buttonRadio, etc.)\n  - Custom\
          \ components with exposed controls\n  - Any COMP where internal params are\
          \ made accessible externally\n"
        example: 'exports

          {

          Value0 Value0

          Value1 Value1

          Labelx Labelx

          Labely Labely

          }

          '
      dict_line:
        description: Hex-encoded pickle data containing operator instance state
        format: 'dict HEXSTRING

          Where HEXSTRING is hex-encoded Python pickle data (no spaces, no line breaks)

          '
        purpose: "Stores serialized Python object data for operators that maintain\
          \ instance state.\nContains things like:\n  - Custom parameter definitions\
          \ and their current values\n  - UI widget state (selection, position, etc.)\n\
          \  - Component-specific instance data\n"
        when_present: "Present for operators that have instance-specific Python state,\
          \ including:\n  - Palette UI widgets with custom parameters\n  - COMPs with\
          \ custom pages/parameters defined via Python\n  - Operators using storage[]\
          \ or local dictionaries\n  - Complex widgets with runtime state\n"
        technical_details: '- Encoding: pickle.dumps(data).hex()

          - Decoding: pickle.loads(bytes.fromhex(hex_string))

          - The dict contains operator-specific Python objects

          - CRITICAL: Must be preserved exactly during TOX manipulation

          - Missing dict causes "td.ParCollection has no attribute ''X''" errors

          '
        example: 'dict 80049512010000000000007d94288c07...

          '
      learned_structure:
        header: []
        operators: []
    parm_files:
      description: Parameter files - operator parameter values
      extension: .parm
      format: Text - name MODE value [expression]
      required: true
      location: Named after operator (e.g., noise1.parm)
      learned_structure:
        format_pattern: "paramname\tMODE\tvalue\t[expression]"
        modes:
          0:
            name: Constant
            description: Simple constant value
          17:
            name: Expression
            description: Python expression
        unknown_modes: []
    network_files:
      description: Component-level connection information
      extension: .network
      format: Text
      required: false
      location: Inside COMP directories
      critical_note: Losing these breaks component I/O connections
      learned_structure: []
    init_files:
      description: Initialization scripts
      extension: .init
      format: Python
      required: false
      location: COMP directories
    content_files:
      description: DAT content (text, tables, etc.)
      extension: .txt, .py, etc.
      format: Various
      required: false
      location: Named after DAT operator
chop_state_files:
  discovery_date: '2025-12-17'
  description: 'CHOPs that maintain state (LFO, Speed, Timer, etc.) require state
    files to work properly.

    Without these files, TD may not initialize the CHOP correctly.

    '
  files_required:
    .chop: 'Simple version/type info. Typical content:

      5

      1

      '
    .ts: 'Time-series sample data. Structure:

      - Header: version number (65538)

      - Metadata: track count, sample positions, rate

      - Channel names and values

      - Structured block with rate, start, tracklength, tracks, data_rle

      '
  example_ts_file: "65538\n1\n1\n0\n0\n0\n1\n1\n0\n1\n1\n0\n60\nspeed\n0\n0\n1\n{\n\
    \   rate = 60\n   start = 1\n   tracklength = 1\n   tracks = 1\n   {\n      name\
    \ = speed\n      data_rle = 0\n   }\n}\n"
  chops_requiring_state:
  - CHOP:speed
  - CHOP:lfo
  - CHOP:timer
  - CHOP:count
  - CHOP:trigger
  - CHOP:filter (when storing state)
  CRITICAL_timeslice: "Speed CHOP (and other accumulating CHOPs) MUST have timeslice\
    \ = on\nWithout this, the CHOP won't accumulate/integrate over time!\n\nIn .parm\
    \ file:\n  timeslice 0 on\n\nThis is in the Common page of CHOP parameters.\n\
    Default is OFF which breaks accumulation behavior.\n"
  confidence: 0.95
  source: human_edit_comparison_v3_v4_tox
operator_patterns:
  CHOP:
    file_types:
    - .parm
    notes: Parameters only, no additional content
  TOP:
    file_types:
    - .parm
    notes: Parameters only
  SOP:
    file_types:
    - .parm
    notes: Parameters only for procedural; may have geometry files for file-based
  DAT:
    file_types:
    - .parm
    - .txt
    - .py
    - .json
    notes: Content stored in separate file matching DAT type
  COMP:
    file_types:
    - .parm
    - .n
    - .network
    - .init
    notes: Has subdirectory with child operators
  MAT:
    file_types:
    - .parm
    notes: Parameters only
  POP:
    file_types:
    - .parm
    notes: 'GPU-accelerated point operators. Key learnings:

      - forcePOP and forceradialPOP are SEPARATE operators

      - forcePOP: general directional force (POP:force)

      - forceradialPOP: radial force toward/away from point (POP:forceradial)

      - Rendering: nullPOP → poptoSOP → geoCOMP → renderTOP

      '
    operators_that_work:
    - circlePOP, forceradialPOP, limitPOP, nullPOP
    operators_that_fail:
    - dragPOP: Bad node type POP:drag - no ground truth available
    - noisePOP: not tested, likely fails
    - Many POPs in "errors_creating" list in sampling_results.json
connections:
  learned_patterns:
  - pattern: CHOP/TOP/SOP to CHOP/TOP/SOP
    method: inputs block in .n file
    example: "inputs\n{\n0 \tsource_operator\n}\n"
  - pattern: Operator to COMP internal operator
    method: 'Use path: comp_name/internal_op'
    example: "inputs\n{\n0 \taudioAnalysis/out1\n}\n"
    note: COMPs don't output data directly - connect to their internal operators
  - pattern: External operator to COMP input
    method: Define in COMP's .network file
    example: "1\ncompinputs\n{\n0 \texternal_source_name\n\tinternal_target_op\n\t\
      TYPE\n}\nend\n"
    note: compinputs maps external connections to internal 'in' operators
  CRITICAL_COMP_WIRING: 'COMPs (containers, bases, etc.) do NOT output data directly!

    WRONG: inputs { 0 myContainer }

    RIGHT: inputs { 0 myContainer/out1 }


    To wire INTO a COMP, use its .network file to define compinputs:

    - The external source operator must exist at the same level

    - The .network file routes external connections to internal ''in'' operators

    '
  notes: Connections stored in .n file (inputs block) and .network file (compinputs)
custom_parameters:
  discovery_date: '2025-12-17'
  critical_insight: 'Custom parameters are stored in a SEPARATE .cparm file!

    The .cparm file defines the parameter schema, and .parm stores values.

    '
  structure:
    cparm_file:
      description: Custom parameter DEFINITIONS (schema)
      location: sample_component.cparm (same level as .n and .parm)
      format: '?

        pages N "PageName"

        TYPE_ID Name Label FLAGS... "PageName" order

        ?

        '
      type_ids:
        772805121: XY parameter (vec2)
        772804865: Float parameter
      example: '?

        pages 1 "Custom"

        772805121 Poixy POI 1 1 0 0 1 1 1 1 0 0 1 1 1 2 0 "" "" 2 0 "" "" "Custom"
        0

        772804865 Energy Energy 1 1 0 0 1 1 1 2 0 "" "" "Custom" 1

        772804865 Temperature Temperature 1 1 0 0 1 1 1 2 0 "" "" "Custom" 2

        ?

        '
    parm_file:
      description: Custom parameter VALUES (with expressions)
      location: sample_component.parm
      expression_modes:
        67108945: XY expression mode
        67108976: Float expression mode
        0: Constant value
      example: '?

        pageindex 0 3

        enableexternaltox 0 off

        Poixy1 67108945 0 op(''./mouse_select'')[''tx'']

        Poixy2 67108945 0 op(''./mouse_select'')[''ty'']

        Energy 0 0.5

        Temperature 0 0.5

        ?

        '
    init_script_location: sample_component/init_script.text (ALTERNATIVE method)
    init_script_format: Binary .text (same as GLSL shaders)
  python_api:
    create_page: me.appendCustomPage('Custom')
    access_page: me.customPages[0]
    float_param: 'p = page.appendFloat(''Temperature'', label=''Temperature'')

      p[0].default = 0.5

      p[0].min = 0

      p[0].max = 1

      p[0].val = 0.5

      '
    xy_param: 'p = page.appendXY(''Position'', label=''Position'')

      p[0].expr = "op(''mouse_select'')[''tx'']"

      p[0].mode = ParMode.EXPRESSION

      p[1].expr = "op(''mouse_select'')[''ty'']"

      p[1].mode = ParMode.EXPRESSION

      '
    int_param: page.appendInt('Count', label='Count')
    menu_param: page.appendMenu('Type', label='Type')
    string_param: page.appendStr('Name', label='Name')
  init_script_template: "def onStart():\n    me = op('..')\n    page = me.customPages[0]\
    \ if me.customPages else me.appendCustomPage('Custom')\n\n    if not hasattr(me.par,\
    \ 'ParamName'):\n        p = page.appendFloat('ParamName', label='Label')\n  \
    \      p[0].default = 0.5\n        p[0].min = 0\n        p[0].max = 1\n      \
    \  p[0].val = 0.5\n\nonStart()\n"
  referencing_custom_params: 'In GLSL uniform bindings (.parm mode 17):

    vec0valuex 17 0.5 parent().par.Temperature

    vec2valuex 17 0 parent().par.Poixy1

    vec2valuey 17 0 parent().par.Poixy2

    '
  CRITICAL_NAMING_CONVENTION: "Multi-value parameters use NUMERIC suffixes (1, 2,\
    \ 3, 4), NOT letter suffixes (x, y, z, w)!\n\nCORRECT:\n  - parent().par.Poixy1\
    \  (first component)\n  - parent().par.Poixy2  (second component)\n  - parent().par.Poixy3\
    \  (third component for XYZ/XYZW)\n  - parent().par.Poixy4  (fourth component\
    \ for XYZW)\n\nWRONG:\n  - parent().par.Poixyx  (this does NOT exist!)\n  - parent().par.Poixyy\
    \  (this does NOT exist!)\n\nThis applies to all multi-value parameter types:\n\
    \  - XY parameters → ParamName1, ParamName2\n  - XYZ parameters → ParamName1,\
    \ ParamName2, ParamName3\n  - XYZW parameters → ParamName1, ParamName2, ParamName3,\
    \ ParamName4\n  - RGB parameters → ParamName1, ParamName2, ParamName3\n  - RGBA\
    \ parameters → ParamName1, ParamName2, ParamName3, ParamName4\n\nSource: User\
    \ validation from human-edited TOX files (2025-12-17)\n"
  confidence: 0.99
