parameter_learnings:
  GLSL_TOP:
    uniform_vec_params:
    - vec0name, vec0valuex, vec0valuey, vec0valuez, vec0valuew
    - vec1name, vec1valuex, etc.
    notes: 'Uniform parameters use vec{N}name for name and vec{N}value{x,y,z,w} for
      values.

      NOT uniname{N} or value{N}x as might be assumed.

      '
    expression_reliability: 'WORKS: op(''opname'')[''channel''] - for CHOP channel
      references

      WORKS: absTime.seconds - for total time

      UNRELIABLE: absTime.step - may return unexpected values (1.0 instead of ~0.016)

      RECOMMENDATION: Use constants for deltaTime (0.016 for 60fps)

      '
    glsl_uniforms: '- uTDOutputInfo.res.zw = output resolution (.xy is the inverse 1/w,1/h)

      - uTD2DInfos[0].res.zw = input 0 resolution

      - sTD2DInputs[0] = sampler for input 0

      - vUV.st = texture coordinates

      '
  Math_CHOP:
    range_params:
    - fromrange1, fromrange2 (input range)
    - torange1, torange2 (output range)
    mult_add_params:
    - gain (multiply)
    - postoff (offset/add) - NOT 'offset'!
  Select_CHOP:
    channames: 'String parameter. Wildcards like "t*" are MORE RELIABLE than space-separated
      names.

      PREFER: "t*" to select tx, ty, tz

      AVOID: "tx ty" - may only select first channel in some contexts

      Wildcards: "*", "t*", "*_suffix", etc.

      '
  Noise_TOP:
    centering: 'Default output is 0-1 range. To center at 0 (output -1 to 1):

      - amp: 2.0 (scale to 0-2)

      - offset: -1.0 (shift to -1 to 1)

      Use for particle initialization when positions need centered coordinates.

      '
design_patterns:
  discovery_date: '2025-12-17'
  source: user_feedback_on_4_tox_files
  updated: '2025-12-17'
  CRITICAL_SPEED_CONTROL:
    description: 'To control animation speed WITHOUT visual jumps, use a Speed CHOP
      to integrate

      the speed value into an accumulated phase. NEVER multiply time by speed directly.

      '
    WRONG_pattern: '// In GLSL - causes JUMPS when energy changes

      float phase = uTime * uEnergy;  // BAD!

      o = 0.5 + 0.5 * sin(phase + 6.2831 * o);


      Problem: When energy changes 0.5 → 0.6, phase jumps instantly causing visual
      discontinuity.

      '
    CORRECT_pattern: '// Network architecture:

      Energy param (0-1) → Constant CHOP (remap to 0.5-2.5) → Speed CHOP → uAnimPhase
      uniform


      // In GLSL - smooth velocity control

      float phase = uAnimPhase;  // FROM SPEED CHOP - accumulated value

      o = 0.5 + 0.5 * sin(phase + 6.2831 * o);


      How Speed CHOP works:

      - Integrates input over time: output += input / fps each frame

      - Input of 1.0 = output increases by 1.0 per second

      - Input of 2.0 = output increases by 2.0 per second

      - Changing input changes VELOCITY, not position - NO JUMPS!

      '
    network_implementation: "1. energy_remap (Constant CHOP):\n   - name0: \"speed\"\
      \n   - value0: expression \"0.5 + parent().par.Energy * 2.0\"\n\n2. anim_speed\
      \ (Speed CHOP):\n   - input: energy_remap\n   - default settings (integrates\
      \ input)\n\n3. render (glslTOP):\n   - vec4name: \"uAnimPhase\"\n   - vec4valuex:\
      \ expression \"op('anim_speed')['speed']\"\n"
    confidence: 0.99
    source: user_clarification_2025-12-17
  poi_influence:
    good_pattern: 'Multiply POI (Point of Interest) influence by 2.0-5.0 for noticeable
      effect.

      Example: influence = exp(-distance * falloff) * strength_multiplier

      Where strength_multiplier = 2.0-5.0

      '
    bad_pattern: 'Raw distance calculations are often too subtle.

      Example: influence = exp(-dist * 1.0)

      User feedback: "maybe too subtle" or "not noticeable"

      '
    confidence: 0.9
  control_connectivity:
    good_pattern: 'Every control/LFO must visibly affect output.

      Verification: Change control to min/max, observe clear visual difference.

      Chain: UI control -> CHOP -> uniform -> shader usage -> visible output

      '
    bad_pattern: "Operator exists but not connected to visible output.\nUser feedback:\
      \ \"LFO wasn't doing anything\"\nCommon causes:\n  - Uniform bound but shader\
      \ doesn't actually use it\n  - Uniform not bound in glslTOP parameters\n  -\
      \ Uniform not referencing the LFO/CHOP operator\n  - CHOP state files missing\
      \ (.chop, .ts) preventing initialization\n"
    confidence: 0.95
  validated_example:
    project: fluid_typography
    feedback: temp and energy have clear effect, mouse poi is nice and interactive
    why_it_works:
    - Normalized controls (0-1)
    - Clear mapping to visual properties
    - Mouse POI has strong enough influence
    - All parameters connected and functional
discovery:
  format: BINARY not TEXT
  structure:
    header: 'b''2

      *'' (3 bytes)'
    metadata: 5 x 4-byte big-endian [1,1,1,1,2]
    length: 4-byte big-endian content length
    content: UTF-8 encoded text
  python_code: 'header = b''2

    *''; metadata = struct.pack(''>5I'', 1, 1, 1, 1, 2); length = struct.pack(''>I'',
    len(content)); data = header + metadata + length + content'
  _last_updated: '2025-12-17T11:00:00Z'
  _updated_by: claude-opus
  _confidence: 0.98
