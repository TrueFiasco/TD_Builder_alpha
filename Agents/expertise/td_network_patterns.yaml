    validated: true
    source: TEMPLATE_A_Workflow.md
    typical_chain:
    - step: 1
      operators:
      - audiofilein
      - audiodevicein
      role: Audio source
      notes: audiodevicein for live, audiofilein for files
    - step: 2
      operators:
      - analyze
      - audioSpectrum
      role: Feature extraction
      notes: analyze for time-domain, audioSpectrum for frequency
    - step: 3
      operators:
      - beat
      - trigger
      role: Event detection
      notes: beat for rhythm, trigger for threshold crossings
    - step: 4
      operators:
      - math
      - filter
      - lag
      role: Signal conditioning
      notes: Smooth, scale, remap values
    - step: 5
      operators:
      - export to TOP/SOP
      role: Visual application
      notes: Apply to visual parameters
    variations:
    - name: Frequency-based
      difference: Uses audioSpectrum instead of analyze
      example_count: 0
    - name: Live input
      difference: Uses audiodevicein instead of audiofilein
      example_count: 0
    key_parameters:
    - operator: analyze
      param: function
      typical_values:
      - Peak
      - RMS
      notes: Peak for transients, RMS for energy
    - operator: beat
      param: threshold
      typical_range:
      - 0.3
      - 0.7
      notes: Lower = more sensitive
