# Design Patterns for td_designer expert
# Each pattern includes: hierarchy, connections, parameters, common_errors
design_patterns:
  instancing:
    description: "Render multiple copies of geometry at different positions"
    complexity: "medium"
    families: ["SOP", "COMP"]
    confidence: 0.9
    hierarchy:
      - name: "geo1"
        type: "geoCOMP"
        children:
          - name: "sphere1"
            type: "sphereSOP"
            flags: {display: on, render: on}
    connections:
      - from: "instance_source (SOP or CHOP)"
        to: "geo1"
        type: "reference"
        param: "instanceop"
    parameters:
      - operator: "geoCOMP"
        param: "instancing"
        value: "on"
      - operator: "geoCOMP"
        param: "instanceop"
        value: "path/to/instance_source"
    common_errors:
      - error: "Geometry outside COMP"
        cause: "Geometry SOP is sibling not child of geoCOMP"
        fix: "Move geometry SOP inside geoCOMP"
      - error: "No render flag"
        cause: "Internal SOP missing render flag"
        fix: "Set render flag on internal geometry"
      - error: "Wrong connection type"
        cause: "Used wire instead of reference for instanceop"
        fix: "instanceop is a path reference, not a wire input"

  # BUG-006 FIX: Analyze CHOP function parameter integer mappings
  # BUG-013 FIX: Added format field to specify integer requirement
  analyze_chop:
    description: "Analyze CHOP performs various analysis functions on input channels"
    complexity: "easy"
    families: ["CHOP"]
    confidence: 0.95
    canonical_type: "CHOP:analyze"
    function_parameter:
      description: "Analysis function to perform"
      format: integer  # BUG-013: Specifies this menu requires INTEGER values
      CRITICAL_NOTE: "Use INTEGER values, not strings! function=2 not function='min'"
      values:
        0: {name: "average", description: "Average value of all samples"}
        1: {name: "maximum", description: "Maximum value"}
        2: {name: "minimum", description: "Minimum value"}
        3: {name: "maximumindex", description: "Index of maximum value"}
        4: {name: "minimumindex", description: "Index of minimum value"}
        5: {name: "sum", description: "Sum of all samples"}
        6: {name: "rms", description: "Root Mean Square (audio energy)"}
        7: {name: "absmax", description: "Maximum of absolute values"}
        8: {name: "absmin", description: "Minimum of absolute values"}
        9: {name: "length", description: "Number of samples"}
        10: {name: "median", description: "Median value"}
        11: {name: "standarddev", description: "Standard deviation"}
      common_uses:
        audio_level: 6  # rms
        peak_detection: 1  # maximum
        normalization: [1, 2]  # max/min for range
    common_errors:
      - error: "All analyze CHOPs output same value"
        cause: "Used string 'min'/'max' which defaults to 0 (average)"
        fix: "Use integers: function=1 for max, function=2 for min"

  # BUG-013: Noise CHOP type parameter
  noise_chop:
    description: "Noise CHOP generates procedural noise patterns as channel data"
    complexity: "easy"
    families: ["CHOP"]
    confidence: 0.9
    canonical_type: "CHOP:noise"
    type_parameter:
      description: "Type of noise algorithm"
      format: string  # BUG-013: Use STRING values for noise type
      values:
        sparse: {description: "Sparse convolution noise"}
        hermite: {description: "Hermite interpolated noise"}
        harmonic: {description: "Harmonic noise (smooth)"}
        brownian: {description: "Brownian motion noise"}
        random: {description: "Random values (no interpolation)"}
        alligator: {description: "Alligator noise"}
      common_uses:
        smooth_motion: "harmonic"
        random_values: "random"
        organic_motion: "brownian"

  # BUG-013: Noise TOP type parameter
  noise_top:
    description: "Noise TOP generates 2D noise textures"
    complexity: "easy"
    families: ["TOP"]
    confidence: 0.9
    canonical_type: "TOP:noise"
    type_parameter:
      description: "Type of noise algorithm"
      format: string  # BUG-013: Use STRING values for noise type
      values:
        sparse: {description: "Sparse convolution noise"}
        perlin: {description: "Perlin noise (classic)"}
        simplex: {description: "Simplex noise (faster, less artifacts)"}
        random: {description: "Random values per pixel"}
        alligator: {description: "Alligator noise"}
      common_uses:
        organic_textures: "perlin"
        fast_smooth: "simplex"
        static_noise: "random"

  # BUG-013: Math CHOP operations
  math_chop:
    description: "Math CHOP performs mathematical operations on channels"
    complexity: "easy"
    families: ["CHOP"]
    confidence: 0.9
    canonical_type: "CHOP:math"
    # Math CHOP has multiple operation parameters per page
    chanop_parameter:
      description: "Channel operation (Mult-Add page)"
      format: integer  # BUG-013: Integer values for channel operations
      values:
        0: {name: "off", description: "No operation"}
        1: {name: "add", description: "Add channels"}
        2: {name: "subtract", description: "Subtract channels"}
        3: {name: "multiply", description: "Multiply channels"}
        4: {name: "divide", description: "Divide channels"}
        5: {name: "average", description: "Average channels"}
        6: {name: "length", description: "Vector length"}
        7: {name: "normalize", description: "Normalize vector"}
    match_parameter:
      description: "How to match channels from multiple inputs"
      format: integer  # BUG-013: Integer values for match
      values:
        0: {name: "byname", description: "Match channels by name"}
        1: {name: "byindex", description: "Match channels by index"}
    common_uses:
      remap_range: "Use Range page: fromrange1/2, torange1/2"
      clamp_values: "Use Range page: clamp on"
      normalize_values: "chanop=7 (normalize)"

  # BUG-011 FIX: Complete Composite TOP operand values
  # BUG-013 FIX: Added format field to specify string requirement
  composite_top:
    description: "Blend two or more TOPs using various compositing operations"
    complexity: "easy"
    families: ["TOP"]
    confidence: 0.95
    canonical_type: "TOP:comp"
    aliases: ["compositeTOP", "composite_top", "compTOP"]
    operand_parameter:
      description: "Blending operation between input images"
      format: string  # BUG-013: Specifies this menu requires STRING values (integers are corrupted)
      parm_format: "operand 0 add"
      note: ".parm file uses: index followed by string name"
      CRITICAL_NOTE: "Use STRING values, not integers! operand='add' not operand=0"
      values:
        0: {name: "add", description: "input1.rgba + input2.rgba"}
        1: {name: "atop", description: "Alpha composite atop"}
        2: {name: "average", description: "(input1 + input2) / 2"}
        3: {name: "brightest", description: "Max per channel (brighten)"}
        4: {name: "burncolor", description: "Color burn blend mode"}
        5: {name: "burnlinear", description: "Linear burn blend mode"}
        6: {name: "chromadifference", description: "Difference based on chroma"}
        7: {name: "color", description: "Color blend mode"}
        8: {name: "darkercolor", description: "Darker color selection"}
        9: {name: "difference", description: "abs(input1 - input2)"}
        10: {name: "dimmest", description: "Min per channel (darken)"}
        11: {name: "divide", description: "input1 / input2"}
        12: {name: "dodge", description: "Color dodge blend mode"}
        13: {name: "exclude", description: "Exclusion blend mode"}
        14: {name: "freeze", description: "Freeze blend mode"}
        15: {name: "glow", description: "Glow blend mode"}
        16: {name: "hardlight", description: "Hard light blend mode"}
        17: {name: "hardmix", description: "Hard mix blend mode"}
        18: {name: "heat", description: "Heat blend mode"}
        19: {name: "hue", description: "Hue blend mode"}
        20: {name: "inside", description: "input1 * clamp(input2.a) - mask by alpha"}
        21: {name: "insideluminance", description: "Inside by luminance"}
        22: {name: "inverse", description: "Inverse blend"}
        23: {name: "lightercolor", description: "Lighter color selection"}
        24: {name: "luminancedifference", description: "Difference based on luminance"}
        25: {name: "maximum", description: "max per channel (synonym for brightest)"}
        26: {name: "minimum", description: "min per channel (synonym for dimmest)"}
        27: {name: "multiply", description: "input1 * input2 (darkening blend)"}
        28: {name: "negate", description: "Negate blend"}
        29: {name: "outside", description: "input1 * (1 - input2.a) - inverse mask"}
        30: {name: "outsideluminance", description: "Outside by luminance"}
        31: {name: "over", description: "Standard alpha over compositing"}
        32: {name: "overlay", description: "Overlay blend mode"}
        33: {name: "pinlight", description: "Pin light blend mode"}
        34: {name: "reflect", description: "Reflect blend mode"}
        35: {name: "screen", description: "1 - ((1-a) * (1-b)) - lightening blend"}
        36: {name: "softlight", description: "Soft light blend mode"}
        37: {name: "linearlight", description: "Linear light blend mode"}
        38: {name: "stencilluminance", description: "Stencil by luminance"}
        39: {name: "subtract", description: "input1 - input2"}
        40: {name: "subtractive", description: "Subtractive blend"}
        41: {name: "under", description: "Alpha under compositing"}
        42: {name: "vividlight", description: "Vivid light blend mode"}
        43: {name: "xor", description: "Alpha XOR compositing"}
        44: {name: "yfilm", description: "Y film blend"}
        45: {name: "zfilm", description: "Z film blend"}
      common_uses:
        additive_glow: "add"
        alpha_compositing: "over"
        masking: ["inside", "outside"]
        darkening: ["multiply", "minimum"]
        lightening: ["screen", "add", "maximum"]
        difference_effects: ["difference", "subtract"]
    common_errors:
      - error: "Type not recognized"
        cause: "Using composite_top or compTOP instead of TOP:comp"
        fix: "Use canonical type TOP:comp in builder, or ensure type_overrides is applied"

  # BUG-007 FIX: Enhanced feedback_loop with critical notes from testing
  feedback_loop:
    description: "Create visual feedback/trails effect"
    complexity: "medium"
    families: ["TOP"]
    confidence: 0.85
    # CRITICAL NOTES from BUG-007 testing session
    CRITICAL_NOTES:
      - "Feedback TOP needs WIRE input from end of chain, not just 'top' parameter"
      - "Use rgba16float or rgba32float pixel format for ALL TOPs in chain"
      - "Source must ANIMATE - use expressions like absTime.seconds, not static values"
      - "Test with 'over' operand before 'add' (add accumulates brightness faster)"
    required_pixel_format: "rgba16float"
    hierarchy:
      - name: "feedback1"
        type: "feedbackTOP"
      - name: "composite1"
        type: "compositeTOP"
      - name: "level1"
        type: "levelTOP"
    connections:
      - from: "source_top"
        to: "composite1"
        type: "wire"
        input_index: 0
      - from: "feedback1"
        to: "level1"
        type: "wire"
        input_index: 0
      - from: "level1"
        to: "composite1"
        type: "wire"
        input_index: 1
      - from: "composite1"
        to: "feedback1"
        type: "wire"
        input_index: 0
        notes: "CRITICAL: feedback1 must receive wire input, not just parameter reference"
    parameters:
      - operator: "feedbackTOP"
        param: "format"
        value: "rgba16float"
        notes: "REQUIRED for quality - prevents banding and precision loss"
      - operator: "compositeTOP"
        param: "format"
        value: "rgba16float"
      - operator: "levelTOP"
        param: "format"
        value: "rgba16float"
      - operator: "levelTOP"
        param: "opacity"
        value: "0.92-0.98"
        notes: "Lower = faster fade. Use 0.95 as starting point."
      - operator: "compositeTOP"
        param: "operand"
        value: "over"
        format: string
        notes: "Use 'over' for alpha compositing. 'add' accumulates faster."
    # Animation patterns for source TOPs
    source_animation_examples:
      noise_animation:
        tx: {"expr": "absTime.seconds * 0.1"}
        ty: {"expr": "absTime.seconds * 0.07"}
        notes: "Noise t parameter is OFFSET, not time - needs expression to animate"
      lfo_driven:
        notes: "Connect LFO CHOP to noise parameters via export or expression"
    common_errors:
      - error: "Static white image (no animation)"
        cause: "Source not animated - using static parameter values"
        fix: "Use expressions: tx={'expr': 'absTime.seconds * 0.1'}"
      - error: "Banding/stepping in trails"
        cause: "8-bit pixel format loses precision over multiple frames"
        fix: "Set format='rgba16float' on ALL TOPs in feedback chain"
      - error: "Infinite brightness / blows out to white"
        cause: "Using 'add' operand without sufficient decay"
        fix: "Use 'over' operand OR reduce opacity to 0.90-0.92"
      - error: "No output visible"
        cause: "Feedback needs initial frame OR no wire input"
        fix: "Ensure composite1→feedback1 wire exists, source provides content"
      - error: "Feedback TOP not updating"
        cause: "Only set 'top' parameter, no wire input"
        fix: "Feedback TOP needs BOTH: wire input AND 'top' parameter"
    # Pre-build checklist for agent
    agent_checklist:
      - "Is source animated? (expression or CHOP-driven, NOT static values)"
      - "Is feedback TOP wired to output of processing chain?"
      - "Is pixel format rgba16float on ALL TOPs in chain?"
      - "Is level opacity < 1.0? (0.92-0.98 range)"
      - "Is composite operand appropriate? ('over' safer than 'add')"

