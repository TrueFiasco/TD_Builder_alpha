          description: "Multiple specific channels"
          example: "chan1 chan2 chan3"
          result: "Selects exactly chan1, chan2, chan3"
        wildcards:
          description: "Pattern matching with * and ?"
          examples:
            - pattern: "t*"
              matches: "tx, ty, tz (all starting with t)"
            - pattern: "*x"
              matches: "tx, rx, sx (all ending with x)"
            - pattern: "*"
              matches: "all channels"
            - pattern: "chan?"
              matches: "chan1, chan2, etc. (? = single char)"
        ranges:
          description: "Numeric and character ranges"
          examples:
            - pattern: "chan[1-5]"
              result: "chan1, chan2, chan3, chan4, chan5"
            - pattern: "v[41-100]"
              result: "v41 through v100"
            - pattern: "color[rgba]"
              result: "colorr, colorg, colorb, colora (character expansion)"
            - pattern: "t[xyz]"
