  # BUG-005 FIX: Added explicit datto patterns
  dat_to_chop_conversion:
    description: "Convert DAT table data to CHOP channels"
    complexity: "easy"
    families: ["DAT", "CHOP"]
    confidence: 0.95
    critical_note: "dattoCHOP does NOT use wire connections from DATs - it uses the 'dat' parameter"
    hierarchy:
      - name: "sourceTable"
        type: "tableDAT"
      - name: "datto1"
        type: "dattoCHOP"
      - name: "null1"
        type: "nullCHOP"
    connections:
      # NO connection from DAT to dattoCHOP - uses parameter reference
      - from: "datto1"
        to: "null1"
        type: "wire"
    parameters:
      - operator: "dattoCHOP"
        param: "dat"
        value: "sourceTable"
        required: true
        note: "MUST set this parameter to reference the source DAT"
      # BUG REPORT FIX (basic_1-10): TD expects INTEGER values, not strings!
      # Menu integer mapping: 0=ignore, 1=names, 2=values
      - operator: "dattoCHOP"
        param: "firstrow"
        value: 1
        note: "INTEGER REQUIRED: 0=ignore, 1=names, 2=values"
      - operator: "dattoCHOP"
        param: "firstcolumn"
        value: 2
        note: "INTEGER REQUIRED: 0=ignore, 1=names, 2=values"
      # BUG-002 FIX: Add output parameter integer mapping
      - operator: "dattoCHOP"
        param: "output"
        value: 2
        note: "INTEGER REQUIRED: 0=single, 1=chanperrow, 2=chanpercol, 3=chanperval"
    # Complete integer mappings for all datto CHOP menu parameters
    parameter_integer_mappings:
      output:
        description: "How to create channels from table data"
        values:
          0: {name: "single", meaning: "All values in one channel"}
          1: {name: "chanperrow", meaning: "Channel Per Row (cpr)"}
          2: {name: "chanpercol", meaning: "Channel Per Column (cpc) - common for named columns"}
          3: {name: "chanperval", meaning: "Channel Per Single Value"}
        common_choice: 2
        common_reason: "Most tables have column headers as channel names"
      firstrow:
        description: "How to interpret first row"
        values:
          0: {name: "ignore", meaning: "Skip first row"}
          1: {name: "names", meaning: "Use as channel names"}
          2: {name: "values", meaning: "Treat as data values"}
      firstcolumn:
        description: "How to interpret first column"
        values:
          0: {name: "ignore", meaning: "Skip first column"}
          1: {name: "names", meaning: "Use as sample indices"}
          2: {name: "values", meaning: "Treat as data values"}
    # Common pattern from BUG-002
    common_pattern:
      description: "Table with header row (channel names in first row)"
      table_example: |
        | x | y | z |    ← row 0: channel names
        | 1 | 2 | 3 |    ← row 1+: data values
        | 4 | 5 | 6 |
        | 7 | 8 | 9 |
      settings:
        output: 2
        firstrow: 1
        firstcolumn: 2
      result: "3 channels (x, y, z) with 3 samples each"
    examples:
      - name: "Table with headers"
        setup: "First row = channel names, first column = row labels"
        params: "firstrow: 1, firstcolumn: 0"
        note: "1=names for first row, 0=ignore for first column"
      - name: "Simple values grid"
        setup: "All cells are numeric values"
        params: "firstrow: 2, firstcolumn: 2"
        note: "2=values for both"
      - name: "Text DAT with single value"
        setup: "Text DAT contains just a number"
        params: "firstrow: 2, firstcolumn: 2"
        note: "2=values for both"
    # BUG-005 + BUG-002 FIX: Complete output parameter guidance with INTEGER values
    output_parameter:
      description: "Controls how channels are organized relative to table"
      CRITICAL_NOTE: "Use INTEGER values, not strings! output=1 not output='cpr'"
      values:
        1:
          name: "chanperrow"
          alias: "cpr"
          meaning: "channels per row"
          table_layout: "Channel names in FIRST COLUMN, values across rows"
          example_table: |
            | chan1 | 0.5 | 0.7 |
            | chan2 | 0.8 | 0.3 |
          use_when: "Each row represents one channel with samples across columns"
        2:
          name: "chanpercol"
          alias: "cpc"
          meaning: "channels per column"
          table_layout: "Channel names in FIRST ROW, values down columns"
          example_table: |
            | chan1 | chan2 |
            | 0.5   | 0.8   |
            | 0.7   | 0.3   |
          use_when: "Each column represents one channel with samples down rows"
      decision_tree: |
        DAT to CHOP Layout Rules (USE INTEGER VALUES!):
        ├── output: 1 (chanperrow/cpr)
        │   └── Table must have channel NAMES in first COLUMN
        │       Example: ["chan1", "0.5", "0.7"], ["chan2", "0.8", "0.3"]
        │
        └── output: 2 (chanpercol/cpc) - MOST COMMON
            └── Table must have channel NAMES in first ROW
                Example: ["chan1", "chan2"], ["0.5", "0.8"], ["0.7", "0.3"]
      common_mistake: "Using string values ('cpr', 'cpc') instead of integers (1, 2) - TD expects integers!"

    # BUG-A FIX: Complete 9-combination truth table for firstrow/firstcolumn
    firstrow_firstcolumn_truth_table:
      description: "All 9 combinations of firstrow (0,1,2) × firstcolumn (0,1,2)"
      CRITICAL_NOTE: "Use INTEGER values: 0=ignore, 1=names, 2=values"
      combinations:
        # firstrow=0 (ignore first row)
        - firstrow: 0
          firstcolumn: 0
          meaning: "Skip first row, skip first column"
          use_case: "Data starts at [1,1], top-left is throwaway"
        - firstrow: 0
          firstcolumn: 1
          meaning: "Skip first row, column 0 = sample names/indices"
          use_case: "Named samples in column 0, no header row"
        - firstrow: 0
          firstcolumn: 2
          meaning: "Skip first row, column 0 = data"
          use_case: "Full data starting at [1,0]"
        # firstrow=1 (first row = channel names)
        - firstrow: 1
          firstcolumn: 0
          meaning: "Row 0 = channel names, skip first column"
          use_case: "Channel names across top, first column is throwaway"
        - firstrow: 1
          firstcolumn: 1
          meaning: "Row 0 = channel names, column 0 = sample names"
          use_case: "Full headers: top row names channels, left column names samples"
        - firstrow: 1
          firstcolumn: 2
          meaning: "Row 0 = channel names, column 0 = data"
          use_case: "MOST COMMON: Header row with channel names, all columns are data"
          example: "| x | y | z | <- names; values start at [1,0]"
        # firstrow=2 (first row = data values)
        - firstrow: 2
          firstcolumn: 0
          meaning: "Row 0 = data, skip first column"
          use_case: "No header, first column is throwaway"
        - firstrow: 2
          firstcolumn: 1
          meaning: "Row 0 = data, column 0 = sample names"
          use_case: "Transposed: channel names in column 0, data in row 0+"
          example: "| x | 1.5 | 2.0 | <- channel x with values"
        - firstrow: 2
          firstcolumn: 2
          meaning: "Both first row and column are data"
          use_case: "Pure numeric grid, no headers at all"
      quick_reference:
        most_common: {firstrow: 1, firstcolumn: 2, desc: "Header row (channel names), data columns"}
        transposed: {firstrow: 2, firstcolumn: 1, desc: "Channel names in column 0, data across"}
        no_headers: {firstrow: 2, firstcolumn: 2, desc: "Pure data grid"}
        full_headers: {firstrow: 1, firstcolumn: 1, desc: "Both row and column headers"}

    # BUG-005 FIX: Explicit CPR vs CPC visual examples from QA testing
    cpr_vs_cpc_visual_guide:
      description: "Visual guide for choosing firstcolumn based on table layout"
      CRITICAL_BUG_NOTE: |
        Agent mistakenly used firstcolumn: "values" when table had labels in first column.
        ALWAYS check where the labels/names are before setting firstcolumn!

      cpc_format:
        description: "Channel Per Column - names in FIRST ROW (most common)"
        firstcolumn_setting: 2  # values - first column IS data
        firstrow_setting: 1     # names - first row has channel names
        table_visual: |
          +------+-------+-------+
          | name | value | extra |   ← ROW 0: Channel names
          +------+-------+-------+
          | x    | 0.5   | 1.0   |   ← Data rows
          | y    | 1.0   | 2.0   |
          +------+-------+-------+
        note: "First COLUMN contains data ('x', 'y' are values), first ROW has names"

      cpr_format:
        description: "Channel Per Row - names in FIRST COLUMN"
        firstcolumn_setting: 1  # names - first column has channel names
        firstrow_setting: 2     # values - first row IS data
        table_visual: |
          +------+------+------+
          | x    | 0.5  | 1.0  |   ← Channel 'x' with samples
          +------+------+------+
          | y    | 0.8  | 0.3  |   ← Channel 'y' with samples
          +------+------+------+
        note: "First COLUMN contains channel names ('x', 'y'), data goes across"

      decision_flowchart: |
        Where are your CHANNEL NAMES?
        │
        ├─► In FIRST ROW (across the top)?
        │   └─► Use firstrow: 1 (names), firstcolumn: 2 (values)
        │       output: 2 (chanpercol/cpc)
        │
        └─► In FIRST COLUMN (down the side)?
            └─► Use firstrow: 2 (values), firstcolumn: 1 (names)
                output: 1 (chanperrow/cpr)

      common_mistake_example:
        table: |
          | name  | value |
          | x     | 0.5   |
          | y     | 1.0   |
        wrong: "firstcolumn: 2 (values) - treats 'x', 'y' as data!"
        correct: "firstcolumn: 1 (names) - recognizes 'x', 'y' as channel identifiers"
        result_wrong: "Generic channel names, wrong data interpretation"
        result_correct: "Channels named 'x' and 'y' with correct values"

