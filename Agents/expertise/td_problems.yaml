      useful_chunk_percentage: 70.0

  search_quality:
    description: "Search results not helpful"
    metrics:
      - "search_usefulness_score"
    target_values:
      search_usefulness_score: 70.0  # 70% useful results

  build_failure:
    description: "Network build failures"
    metrics:
      - "build_success_rate"
    target_values:
      build_success_rate: 95.0

  hallucination:
    description: "False information in outputs"
    metrics:
      - "validation_failure_rate"
    target_values:
      validation_failure_rate: 0.0  # No hallucinations

  expertise_gap:
    description: "Missing knowledge in expertise files"
    metrics:
      - "unknown_operator_count"
      - "unvalidated_pattern_count"
    target_values:
      unknown_operator_count: 0
      unvalidated_pattern_count: 0

# Root cause patterns (help identify causes faster)
root_cause_patterns:
  - pattern_match: "unknown operator"
    likely_cause: "Operator not in registry or misspelled"
    fix_template: "Verify operator exists; check spelling; add to expertise if new"

  - pattern_match: "invalid parameter"
    likely_cause: "Parameter name incorrect or not supported"
    fix_template: "Check parameter exists for operator; verify spelling"

  - pattern_match: "connection.*type"
    likely_cause: "Attempting to connect incompatible operator families"
    fix_template: "Insert conversion operator (toptoChop, choptosop, etc.)"

  - pattern_match: "audio.*no output"
    likely_cause: "Time Slice not enabled for audio-rate analysis"
    fix_template: "Enable timeslice=on on analyze CHOP"

  - pattern_match: "low.*search.*useful"
    likely_cause: "Parameter-heavy chunks dominating useful content"
    fix_template: "Re-weight source scoring; reduce tier 3 chunks"

