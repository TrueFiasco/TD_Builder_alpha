  PROB-008:
    timestamp: "2025-12-20T19:30:00Z"
    category: "expertise_gap"
    description: "Math CHOP range parameters used array format [min, max] instead of individual params"
    root_cause: "TD Designer used fromrange/torange as arrays like 'torange: [2, 7]' but TD requires separate params"
    fix: "Use individual params: fromrange1, fromrange2, torange1, torange2"
    prevention:
      - expertise_file: "td_operators_v2.yaml"
        update: "Update Math CHOP key_params to show fromrange1/fromrange2/torange1/torange2 format"
      - expertise_file: "td_designer/build.md"
        update: "Add note about Math CHOP range parameters requiring individual values"
    status: "new"
    validated: true
    learning: "Many TD params that look like ranges are actually separate numbered params (param1, param2)"
    kb_evidence: "soptoCHOP/example3 shows: fromrange1: -1, fromrange2: 1, torange1: -0.12, torange2: 0.14"

  PROB-009:
    timestamp: "2025-12-20T19:30:00Z"
    category: "expertise_gap"
    description: "Transform SOP scale/translate/rotate used array format instead of individual params"
    root_cause: "TD Designer used 's: [expr, expr, expr]' but TD requires sx, sy, sz as separate params"
    fix: "Use individual params: sx, sy, sz (scale), tx, ty, tz (translate), rx, ry, rz (rotate)"
    prevention:
      - expertise_file: "td_operators_v2.yaml"
        update: "Update Transform SOP key_params to show sx/sy/sz, tx/ty/tz, rx/ry/rz format"
      - expertise_file: "td_designer/build.md"
        update: "Add note about Transform SOP requiring individual axis params"
    status: "new"
    validated: true
    learning: "Transform operations in TD use per-axis params (sx, sy, sz) not arrays"
    kb_evidence: "KB query confirmed Transform SOP uses individual axis parameters"

  PROB-010:
    timestamp: "2025-12-20T19:30:00Z"
    updated: "2025-12-20T20:00:00Z"
    category: "kb_query_failure"
    description: "Claude Code incorrectly claimed Noise CHOP lacks offset param when it EXISTS"
    root_cause: "KB query returned Transform params (t, r, s, p) not Noise parameter group - led to false negative"
    fix: "Noise CHOP DOES have 'offset' parameter in the Noise parameter group alongside 'amp'"
    prevention:
      - expertise_file: "td_operators_v2.yaml"
        update: "Added offset to Noise CHOP key_params with note about parameter groups"
      - expertise_file: "claude_desktop_suggestions.md"
        update: "Document query strategy: search for parameter GROUPS not individual params"
    status: "fixed"
    validated: true
    learning: |
      Query strategy matters! Use: "Noise CHOP Noise parameter group amp seed offset"
      NOT: "Noise CHOP offset" which may return unrelated results
      Related params are often in the same group (amp+offset, fromrange+torange)

  PROB-011:
    timestamp: "2025-12-20T19:30:00Z"
    category: "expertise_gap"
    description: "Conversion operators (soptoCHOP, choptoTOP) lack data extraction settings"
    root_cause: "Conversion ops need explicit attribscope, renamescope, chanscope params to extract correct data"
    fix: "Add proper extraction params: soptoCHOP needs attribscope (e.g., 'P' for position), choptoTOP needs dataformat, etc."
    prevention:
      - expertise_file: "td_network_building.yaml"
        update: "Expand conversion_operator_params to include extraction settings (attribscope, renamescope)"
      - expertise_file: "td_operators_v2.yaml"
        update: "Add extraction params to Sweet 16 conversion operators"
    status: "new"
    validated: true
    learning: "Conversion operators need both source reference AND extraction/format params"
    kb_evidence: |
      soptoCHOP examples show: sop="box1", custom="on", attribscope="P", renamescope="tx ty tz"
      choptoSOP examples show: chop="null1", chanscope="chan1", attscope="P(1)"
      choptoDAT examples show: chop="constant1", names="on", output="rowperchan"

  PROB-012:
    timestamp: "2025-12-20T20:00:00Z"
    category: "build_failure"
    description: "Table DAT cell expression causes syntax error - parentheses not escaped properly"
    root_cause: "Python expressions with parentheses don't serialize correctly to .toe format"
    fix: "Use simple literals instead of complex expressions, or escape parentheses"
    prevention:
      - expertise_file: "td_network_building.yaml"
        update: "Add note about expression escaping for Table DAT cellexpr"
    status: "workaround"
    validated: true
    learning: "Expression parameters may need special escaping in .toe builder"
    error_message: "SyntaxError: '(' was never closed (, line 1) Context:(Parameter: Cell Expression)"

  PROB-013:
    timestamp: "2025-12-20T20:00:00Z"
    category: "architecture_limitation"
    description: "Table DAT fill mode creates header row but no data rows - cell data not param-settable"
    root_cause: "Table DAT is a 'content storage' operator - cell data lives in .toe binary, not parameters"
    fix: "Use alternative architecture: Constant CHOP -> CHOP to DAT for programmatic table creation"
    prevention:
      - expertise_file: "td_operators_v2.yaml"
        update: "Add note to Table DAT about content storage limitation"
      - expertise_file: "claude_desktop_suggestions.md"
        update: "Document content storage operators vs parameter-driven operators"
    status: "workaround"
    validated: true
    workaround: |
      Replace Table DAT with:
      constant1 (constantCHOP) -> choptodat1 (choptodatDAT)
      This generates table data from CHOP values
    learning: |
      Content storage operators (Table DAT, Text DAT) store data in file, not parameters.
      For programmatic table creation, generate data upstream and convert to DAT.

  PROB-014:
    timestamp: "2026-06-26T00:00:00Z"
    category: "build_failure"
    description: "GLSL POP imported with outputattrs='' leaves P undeclared -> shader compile fail"
    root_cause: "A live-created glslPOP defaults outputattrs to empty; offline designs that omit it ship a POP with no declared output attributes"
    fix: "Builder defaults outputattrs='P' on a GLSL POP (POP:glsl/POP:glsladv) when the design omits it (mirrors the sopToCHOP attribscope='P' default); an explicit value is preserved"
    prevention:
      - expertise_file: "toe_builder_bridge.py"
        update: "Auto-set outputattrs='P' for is_glsl_pop when omitted (Round-3 Stream 1)"
    status: "fixed"
    validated: true
    learning: "A GLSL POP must declare at least P in outputattrs to output the position attribute it writes"

  PROB-015:
    timestamp: "2026-06-26T00:00:00Z"
    category: "expertise_gap"
    description: "instanceactive set as a boolean toggle makes TD hunt for an attribute literally named 'True'"
    root_cause: "On a geometryCOMP, instanceactive is a per-instance attribute SELECTOR (StrMenu), not an on/off switch; the on/off switch is 'instancing'"
    fix: "Use instancing=1 to enable instancing; leave instanceactive unset, or set it to an attribute name that gates per-instance visibility"
    prevention:
      - expertise_file: "td_problems.yaml"
        update: "Documented instanceactive (StrMenu) vs instancing (toggle) distinction"
    status: "documented"
    validated: true
    learning: "instancing = on/off; instanceactive = which attribute decides per-instance active state"

  PROB-016:
    timestamp: "2026-06-26T00:00:00Z"
    category: "build_failure"
    description: "GLSL POP scalar uniform reads as 0 / array uniform errors when set on the wrong UI page"
    root_cause: "GLSL POP uniform pages are role-specific: scalars/vectors belong on the Vectors page (vec{N}name/type/value), arrays on the Arrays page; the Constants page does not bind for these"
    fix: "Map scalar/vector uniforms to vec{N}name/vec{N}type/vec{N}value{x..} (Vectors page); use the Arrays page for float[]; never the Constants page"
    prevention:
      - expertise_file: "td_problems.yaml"
        update: "Documented GLSL POP uniform page placement (Vectors / Arrays / never Constants)"
    status: "documented"
    validated: true
    learning: "POP auto-declares Arrays-page uniforms as float[]; Vectors-page scalars are declared in-shader; the Constants page is ignored on POPs"

  PROB-017:
    timestamp: "2026-06-26T00:00:00Z"
    category: "expertise_gap"
    description: "A live-created geometryCOMP ships a default torus1 child that gets instanced alongside your geometry"
    root_cause: "TouchDesigner's UI seeds a new geometryCOMP with a default torus1 (render flag on); this is a live-create convenience, not part of an offline-built .tox"
    fix: "When building live, destroy torus1 in each geo. The offline builder writes only the design's declared children, so offline-built geos have no stray torus1"
    prevention:
      - expertise_file: "td_problems.yaml"
        update: "Documented torus1 default as live-create-only (offline builder unaffected)"
    status: "documented"
    validated: true
    learning: "torus1 in a geometryCOMP is a live-UI default; offline .tox builds don't add it"

