expert_name: network_builder
domain: TouchDesigner network building
purpose: Plan and build TD networks from intent into validated specs and artifacts
  (toe/tox/Text DAT) with evidence-backed decisions.
version: '1.0'
created: '2025-12-15'
source_of_truth:
# Ground truth now comes from the MCP tools, not static JSON/TSV files.
- source: get_operator_info / get_parameter_detail
  type: ground_truth
- source: find_operator_examples / find_operator_combination / find_similar_networks
  type: examples
- source: hybrid_search / query_graph / get_network_patterns
  type: curator_index
# Expertise files this expert reads — `expertise_inputs` is the key
# _load_expert_expertise injects (size-capped) into get_expert_prompt.
expertise_inputs:
- path: Agents/expertise/td_network_building.yaml
  purpose: Working/failing patterns, build rules, default overrides, connection and naming conventions maintained by this expert
- path: Agents/expertise/td_operators.yaml
  purpose: Operator mental models and usage patterns
- path: Agents/expertise/td_parameters.yaml
  purpose: Parameter usage patterns by operator/family
- path: Agents/expertise/td_network_patterns.yaml
  purpose: Pattern templates for common TD workflows
- path: Agents/expertise/td_problems.yaml
  purpose: Known problems and pitfalls to avoid
# Expertise files this expert writes (self_improve lessons target these sections)
expertise_outputs:
- path: Agents/expertise/td_network_building.yaml
  purpose: Record working/failing patterns, build rules, and build history from build attempts
  sections:
  - working_patterns
  - failing_patterns
  - build_rules
  - build_history
  - default_overrides
  - connection_rules
  - naming_conventions
validation:
  strict: true
  require_source: true
  min_confidence: 0.6
  min_examples: 3
workflow:
  plan:
    max_tokens: 4000
    timeout_seconds: 120
  build:
    max_tokens: 8000
    timeout_seconds: 300
  self_improve:
    max_tokens: 2000
    timeout_seconds: 60
collaborators:
- expert_id: td_designer
  relationship: upstream
  receives_from: design_spec
  handoff_format: design_spec_v1
  description: Receives network design with operators, hierarchy, connections, parameters
- expert_id: td_glsl_expert
  relationship: peer
  receives_from: glsl_shaders
  handoff_format: glsl_shader_bundle
  description: Receives GLSL shader code to embed in glslTOP operators
design_spec_input:
  enabled: true
  format: design_spec_v1
  fields_to_extract:
  - operators
  - hierarchy
  - connections
  - parameters
  - expressions
  - flags
  - metadata.pattern_used
