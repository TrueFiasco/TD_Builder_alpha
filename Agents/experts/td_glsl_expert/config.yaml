# Expert Configuration: td_glsl_expert
# Domain: TouchDesigner GLSL (TOP/MAT/SOP/POP) and general GLSL

expert_name: "td_glsl_expert"
domain: "TouchDesigner GLSL"
purpose: "Design, validate, and improve GLSL shaders in TD (TOP/MAT/SOP/particle) with TD-specific conventions and grounded evidence."
version: "1.0"
created: "2025-12-15"

source_of_truth:
  # Ground truth now comes from the MCP tools, not static JSON/TSV files.
  - source: "get_operator_info / get_parameter_detail"
    type: "ground_truth"
  - source: "find_operator_examples / find_operator_combination / find_similar_networks"
    type: "examples"
  - source: "hybrid_search / query_graph / get_network_patterns"
    type: "curator_index"

# Expertise files this expert reads — `expertise_inputs` is the key
# _load_expert_expertise injects (size-capped) into get_expert_prompt.
expertise_inputs:
  - path: "Agents/expertise/td_glsl.yaml"
    purpose: "GLSL TOP/MAT/POP/SOP patterns, recipes, and known problems maintained by this expert"
  - path: "Agents/expertise/td_operators.yaml"
    purpose: "Operator mental models and usage patterns"
  - path: "Agents/expertise/td_parameters.yaml"
    purpose: "Parameter usage patterns by operator/family"
  - path: "Agents/expertise/td_network_patterns.yaml"
    purpose: "Pattern templates for common TD workflows"
  - path: "Agents/expertise/td_problems.yaml"
    purpose: "Known problems and pitfalls to avoid"

# Expertise files this expert writes (self_improve lessons target these sections)
expertise_outputs:
  - path: "Agents/expertise/td_glsl.yaml"
    purpose: "Record GLSL patterns, recipes, and problems from shader work"
    sections: ["glsl_top", "glsl_mat", "glsl_pop", "glsl_sop", "general_glsl", "recipes", "problems"]

validation:
  strict: true
  require_source: true
  min_confidence: 0.6
  min_examples: 3

workflow:
  plan:
    max_tokens: 4000
    timeout_seconds: 120
  build:
    max_tokens: 8000
    timeout_seconds: 300
  self_improve:
    max_tokens: 2000
    timeout_seconds: 60
