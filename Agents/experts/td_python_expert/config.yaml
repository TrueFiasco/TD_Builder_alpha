# Expert Configuration: td_python_expert
# Domain: TouchDesigner Python (expressions, callbacks, extensions, DAT scripts)

expert_name: "td_python_expert"
domain: "TouchDesigner Python"
purpose: "Design, validate, and improve Python scripts in TD (expressions, callbacks, extensions, DAT scripts) with TD-specific conventions and grounded evidence."
version: "1.0"
created: "2025-12-18"

source_of_truth:
  # Ground truth now comes from the MCP tools, not static JSON/TSV files.
  - source: "get_operator_info / get_parameter_detail"
    type: "ground_truth"
  - source: "find_operator_examples / find_operator_combination / find_similar_networks"
    type: "examples"
  - source: "hybrid_search / query_graph / get_network_patterns"
    type: "curator_index"

# Expertise files this expert reads — `expertise_inputs` is the key
# _load_expert_expertise injects (size-capped) into get_expert_prompt.
expertise_inputs:
  - path: "Agents/expertise/td_python.yaml"
    purpose: "TD Python referencing, expressions, callbacks, and extension patterns maintained by this expert"
  - path: "Agents/expertise/td_operators.yaml"
    purpose: "Operator mental models and usage patterns"
  - path: "Agents/expertise/td_parameters.yaml"
    purpose: "Parameter usage patterns by operator/family"
  - path: "Agents/expertise/td_network_patterns.yaml"
    purpose: "Pattern templates for common TD workflows"
  - path: "Agents/expertise/td_problems.yaml"
    purpose: "Known problems and pitfalls to avoid"

# Expertise files this expert writes (self_improve lessons target these sections)
expertise_outputs:
  - path: "Agents/expertise/td_python.yaml"
    purpose: "Record Python patterns, recipes, and problems from scripting work"
    sections: ["referencing", "parameters", "expressions", "callbacks", "extensions", "tdu_utilities", "problems"]

validation:
  strict: true
  require_source: true
  min_confidence: 0.6
  min_examples: 3

workflow:
  plan:
    max_tokens: 4000
    timeout_seconds: 120
  build:
    max_tokens: 8000
    timeout_seconds: 300
  self_improve:
    max_tokens: 2000
    timeout_seconds: 60

# Collaboration with other experts
collaborators:
  upstream:
    - expert: "td_designer"
      receives: "Network design with Python script requirements"
      sections_read: ["§5"]
  downstream:
    - expert: "network_builder"
      provides: "Python code for Text DAT nodes"
      sections_write: ["§5"]

# Python-specific configuration
python_config:
  version: "3.11"  # TD 2023+
  td_modules:
    - "td"      # TouchDesigner module
    - "tdu"     # TouchDesigner utilities
  allowed_imports:
    - "math"
    - "random"
    - "datetime"
    - "json"
    - "re"
  script_types:
    - "parameter_expression"
    - "chop_execute"
    - "dat_execute"
    - "panel_execute"
    - "parameter_execute"
    - "extension_class"
    - "text_dat_script"
