        channames: v3
    connections: []
    topology:
      operator_count: 2
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: These examples fetch 1 or moreCHOPs using the CHOP path parameter.
  - example_name: example5
    operators:
    - name: constant1
      type: CHOP:constant
      role: isolated
      parameters:
        const0name: chan2
        const0value: 1
        const1name: chan3
        const1value: 2
        const2name: v3
        const2value: 3
        const3name: v4
        const3value: 4
    - name: select_specific
      type: CHOP:select
      role: isolated
      parameters:
        chops: constant1
        channames: '"v4 chan3"'
    connections: []
    topology:
      operator_count: 2
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: You can pick out multiple specific channels by entering them one
      after another, separated by a space.Note the order is determined by the order
      you specify in Channel Names.
  - example_name: example6
    operators:
    - name: base1
      type: COMP:base
      role: isolated
    - name: base2
      type: COMP:base
      role: isolated
    - name: base3
      type: COMP:base
      role: isolated
    - name: select1
      type: CHOP:select
      role: isolated
      parameters:
        chops: base*/out1
        channames: chan1
    - name: select2
      type: CHOP:select
      role: isolated
      parameters:
        chops: base*/out1
        renameto: chan[1-100]
    connections: []
    topology:
      operator_count: 5
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: You can use pattern matching to merge channels from multiple CHOPs.select1
      gets the first channel of the first output of base*seelct2 gets the second channel
      using a more general expression. It renames the channels also.
  - example_name: example7
    operators:
    - name: select5
      type: CHOP:select
      role: input
      parameters:
        chops: constant*
        channames: chan[1-8]
    - name: select6
      type: CHOP:select
      role: output
      parameters:
        renamefrom: '*:*'
        renameto: '*(1):*(0)'
    - name: constant1
      type: CHOP:constant
      role: isolated
      parameters:
        const0name: chan2
        const0value: 1
        const1name: chan3
        const1value: 2
        const2name: v3
        const2value: 3
        const3name: v4
        const3value: 4
    - name: constant2
      type: CHOP:constant
      role: isolated
      parameters:
        const0value: 5
        const1name: chan2
        const1value: 6
        const2name: v3
        const2value: 7
        const3name: v4
        const3value: 8
    connections:
    - from: select5
      to: select6
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: This example fetches CHOPs constant1 and constant2 as they match
      the constant* path parameter.From these 2 CHOPs, the channels selected are in
      the range chan1 to chan8. The last Select CHOP swaps what is before the ':'
      for what is after it.
  - example_name: example8
