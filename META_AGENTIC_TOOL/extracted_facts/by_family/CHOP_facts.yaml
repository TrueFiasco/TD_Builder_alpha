      type: DAT:text
      role: isolated
      parameters:
        pageindex: 1
    - name: pattern1
      type: CHOP:pattern
      role: input
      parameters:
        wavetype: ramp
        length: 27
        torange1: 1
        channelname: phase
    - name: pattern2
      type: CHOP:pattern
      role: input
      parameters:
        length: 27
        amp: 0.5
        offset: 0.5
        channelname: phase
    - name: pattern3
      type: CHOP:pattern
      role: input
      parameters:
        wavetype: random
        length: 40
        amp: 0.5
        offset: 0.5
        channelname: phase
    - name: pattern4
      type: CHOP:pattern
      role: input
      parameters:
        wavetype: ramp
        length: 20
        phase: -0.517
        torange1: 1
        channelname: phase
    connections:
    - from: pattern1
      to: phaser1
      input_index: '1'
    - from: pattern2
      to: phaser2
      input_index: '1'
    - from: pattern3
      to: phaser3
      input_index: '1'
    - from: pattern4
      to: phaser4
      input_index: '1'
    topology:
      operator_count: 10
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The second input to Phaser CHOP is a CHOP of "phase" samples, kind
      of like a time-offset. Phase samples must be between 0 and 1.The second input
      determines "which sample goes from 0 to 1 first" (samples with higher values
      go first), and also overrides the Num Samples parameters on how many samples
      to output.As the time input goes from 0 to 1, samples with higher phase values
      will reach 1 sooner.
  - example_name: example3
    operators:
    - name: lfo1
      type: CHOP:lfo
      role: input
      parameters:
        wavetype: ramp
        frequency: 0.25
        channelname: index
        timeslice: 'on'
    - name: lfo2
