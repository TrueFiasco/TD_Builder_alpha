    curator_text: The same tables can be used to run the timers in parallel. On the
      Segments page, set the Segment Method to Parallel Timers, then press Initialize,
      then Start.Note there is one channel per segment for each channel type selected
      on the Output page.Try this Timer CHOP with tableBeginAnyorder.
  - example_name: example10
    operators:
    - name: info1
