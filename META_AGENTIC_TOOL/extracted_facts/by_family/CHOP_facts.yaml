- operator_type: transformCHOP
  examples:
  - example_name: example1
    operators:
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
        xformmatrixop: transform1
    - name: geo2
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
        xformmatrixop: transform2
    - name: geo3
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
        xformmatrixop: table2
    - name: table2
      type: DAT:table
      role: isolated
      parameters:
        rows: 4
    - name: transform1
      type: CHOP:transform
      role: isolated
      parameters:
        pageindex: 1
        inputoperation: input1input0
        tx: 3
        rx: 30
        sx: 0.7
        sy: 0.7
        sz: 0.7
        operation: xformpageinput
    - name: transform2
      type: CHOP:transform
      role: isolated
      parameters:
        pageindex: 2
        inputoperation: input1input0
        tx: 3
        rx: 30
        sx: 0.7
        sy: 0.7
        sz: 0.7
        operation: xformpageinput
        output: mat
    - name: transform3
      type: CHOP:transform
      role: isolated
      parameters:
        pageindex: 2
        inputoperation: input1input0
        tx: 3
        rx: 30
        sx: 0.7
        sy: 0.7
        sz: 0.7
        operation: xformpageinput
        output: transformquat
    connections: []
    topology:
      operator_count: 7
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: The Transform CHOP has translate/rotate/scale parameters like all
      3D objects, but it outputs a set of channels that can be passed to any of the
      3D objects. (this form to-be-implemented shortly)By default it outputs the transform
      as tx ty tx and scale, plus "euler angles" rx ry rz which is a way of representation
      rotations.transform2 has the output set to 16 channels that represent the 4x4
      matrix describing the same transform, which can be fed to geo2.On the Geometry
      COMP's Pre-Xform page you need to turn on Apply Pre-Transform, then put the
      path of the CHOP containing the transform into the parameter Xform /CHOP/DAT.geo3
      shows it getting from a DAT whose cells are the same as transform2's channels
      arranged in columns.transform3 outputs the transform as an XYZ position plus
      a 4-channel quaternion, along with scale and the xord transform order channel.
  - example_name: example2
    operators:
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
        xformmatrixop: transform3_4x4
    - name: geo2
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
        xformmatrixop: transform5_4x4
    - name: transform1
      type: CHOP:transform
      role: input
      parameters:
        pageindex: 1
        inputoperation: input1input0
        tx: 3
        rx: 30
        rz: 45
        sx: 0.7
        sy: 0.7
        sz: 0.7
        operation: xformpageinput
    - name: transform2
      type: CHOP:transform
      role: processor
      parameters:
        pageindex: 2
        operation: xformpageinput
        custoutputorders: 'on'
        outrord: yzx
    - name: transform4
      type: CHOP:transform
      role: processor
      parameters:
        pageindex: 2
        operation: xformpageinput
        custoutputorders: 'on'
        outxord: tsr
        outrord: zyx
    - name: transform3_4x4
      type: CHOP:transform
      role: output
      parameters:
        pageindex: 2
        inputoperation: input1input0
        operation: xformpageinput
        output: mat
    - name: transform5_4x4
      type: CHOP:transform
      role: output
      parameters:
        pageindex: 2
        inputoperation: input1input0
        operation: xformpageinput
        output: mat
    connections:
    - from: transform1
      to: transform2
      input_index: '0'
    - from: transform1
      to: transform4
      input_index: '0'
    - from: transform2
      to: transform3_4x4
      input_index: '0'
    - from: transform4
      to: transform5_4x4
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: 'In transform2, the translate and rotate channels that are output
      depend on what is called "transform order" and "rotate order". That is, the
      tx ty tz rz ry rz sx sy sz numbers depend on if you apply them in the order
      translates, then rotates, then scales, if you do the rotates in the order rotate
      around the X axis, then Y axis then the Z axis.The order that is assumed is
      determined by the xord and rord channels. 0 0 is the default, and the integers
      in these channels is the index of the selected menu item in the Transform Order
      parameter and the Rotate Order parameter.transform4 has different Transform
      Order and Rotate Order than transform2 on their Output pages. When you change
      those menus to anything else, they apply the same transform on the objects,
      as you see in geo1 and geo2.This is evident when you convert the output to a
      4x4 matrix: The 4x4 matrix (transform3_4x4 and transform5_4x4) remains the same
      when you change transform2 and transform4''s transform orders.'
  - example_name: example3
    operators:
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
        xformmatrixop: transform1
    - name: geo2
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
        xformmatrixop: transform_inverse
    - name: geo3
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
        xformmatrixop: transform_originalMultInverse
    - name: transform1
      type: CHOP:transform
      role: input
      parameters:
        pageindex: 2
        inputoperation: input1input0
        tx: 3
        rx: 30
        rz: 45
        sx: 0.7
        sy: 0.7
        sz: 0.7
        operation: xformpageinput
        output: mat
    - name: transform_inverse
      type: CHOP:transform
      role: processor
      parameters:
        input0preop: invert
        inputoperation: input1input0
        operation: xformpageinput
        output: mat
    - name: transform_originalMultInverse
      type: CHOP:transform
      role: output
      parameters:
        operation: xformpageinput
        output: mat
    connections:
    - from: transform1
      to: transform_inverse
      input_index: '0'
    - from: transform1
      to: transform_originalMultInverse
      input_index: '0'
    - from: transform_inverse
      to: transform_originalMultInverse
      input_index: '1'
    topology:
      operator_count: 6
      connection_count: 3
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: The "inverse" of a transform does the opposite of a transform. If
      a transform takes an object from the origin to a new postion/rotation/scale,
      then the inverse of that transform will take an object at that new position/rotation/scale
      back to the origin with no rotation/scale.So if you multiply a transform by
      its inverse, you will get back the default "identity" matrix.
  - example_name: example4
    operators:
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
        xformmatrixop: transform1
    - name: geo2
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
        xformmatrixop: transform3_to_4x4
    - name: geo3
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
        xformmatrixop: transform5_to4x4
    - name: transform1
      type: CHOP:transform
      role: input
      parameters:
        pageindex: 1
        inputoperation: input1input0
        tx: 3
        rz: 45
        sx: 0.7
        sy: 0.7
        sz: 0.7
        operation: xformpageinput
        output: mat
    - name: transform2
      type: CHOP:transform
      role: processor
      parameters:
        pageindex: 1
        inputoperation: input1input0
        ty: 3
    - name: transform4
      type: CHOP:transform
      role: processor
      parameters:
        pageindex: 1
        inputoperation: input1input0
        ty: 3
        operation: xformpageinput
    - name: transform5_to4x4
      type: CHOP:transform
      role: output
      parameters:
        pageindex: 1
        inputoperation: input1input0
        operation: xformpageinput
        output: mat
    - name: transform3_to_4x4
      type: CHOP:transform
      role: output
      parameters:
        pageindex: 1
        inputoperation: input1input0
        operation: xformpageinput
        output: mat
    connections:
    - from: transform1
      to: transform2
      input_index: '0'
    - from: transform1
      to: transform4
      input_index: '0'
    - from: transform4
      to: transform5_to4x4
      input_index: '0'
    - from: transform2
      to: transform3_to_4x4
      input_index: '0'
    topology:
      operator_count: 8
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: 'THis takes a transform and applies a further transform to it.transform1
      scales by .7, then rotates in Z by 45 degrees, then moves in X by 3.transform2
      and transform4 both move in Y by 3, but they differ in their Multiply Order
      parameter. transform2, whose Multiply Order is set to "Input, then Transform
      Page" does the input''s transform first, then applies the transform of the Transform
      Page.transform4, set to "Transform Page, then Input" does the transform of the
      Transform Page, then the input transform from tranform1.How you get the 3D background
      grids is by making Viewer Active, right-clicking on the viewer, selecting Display
      Options, and choosing the middle grid on the bottom, giving an XY grid.Side
      note for your education: https://www.enviral-design.com/matrices-are-hard/'
  - example_name: example6
    operators:
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
        xformmatrixop: transform1
    - name: geo2
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
        xformmatrixop: transform2
    - name: geo3
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
        xformmatrixop: select1
    - name: geo4
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
        xformmatrixop: select2
    - name: geo5
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
        instancing: 'on'
        instanceop: transform4
        instancetx: tx
        instancety: ty
        instancetz: tz
        instancerx: rx
        instancery: ry
        instancerz: rz
        instancesx: sx
        instancesy: sy
        instancesz: sz
    - name: join1
      type: CHOP:join
      role: processor
    - name: merge1
      type: CHOP:merge
      role: processor
    - name: rename1
      type: CHOP:rename
      role: processor
      parameters:
        renameto: left*
    - name: rename2
      type: CHOP:rename
      role: processor
      parameters:
        renameto: right*
    - name: rename3
      type: CHOP:rename
      role: processor
      parameters:
        renamefrom: left*
        renameto: '*'
    - name: select1
      type: CHOP:select
      role: processor
      parameters:
        channames: left*
    - name: select2
      type: CHOP:select
      role: processor
      parameters:
        channames: right*
    - name: transform1
      type: CHOP:transform
      role: input
      parameters:
        pageindex: 1
        inputoperation: input1input0
        tx: 4
        ty: -1.4
        rx: 30
        rz: 45
        operation: xformpageinput
        output: mat
    - name: transform2
      type: CHOP:transform
      role: input
      parameters:
        pageindex: 1
        inputoperation: input1input0
        ty: 2.2
        tz: -1.1
        ry: 90
        rz: 180
        operation: xformpageinput
        output: mat
    - name: transform3
      type: CHOP:transform
      role: processor
      parameters:
        pageindex: 1
        inputoperation: input1input0
        rz: 180
        output: mat
    - name: transform4
      type: CHOP:transform
      role: output
      parameters:
        inputoperation: input1input0
        operation: xformpageinput
    connections:
    - from: select1
      to: join1
      input_index: '0'
    - from: select2
      to: join1
      input_index: '1'
    - from: rename1
      to: merge1
      input_index: '0'
    - from: rename2
      to: merge1
      input_index: '1'
    - from: transform1
      to: rename1
      input_index: '0'
    - from: transform2
      to: rename2
      input_index: '0'
    - from: join1
      to: rename3
      input_index: '0'
    - from: transform3
      to: select1
      input_index: '0'
    - from: transform3
      to: select2
      input_index: '0'
    - from: merge1
      to: transform3
      input_index: '0'
    - from: rename3
      to: transform4
      input_index: '0'
    topology:
      operator_count: 16
      connection_count: 11
      has_parallel_paths: true
      max_chain_length: 8
    curator_text: 'Two 4x4 transforms in rename1 and rename2 are merged as 32 channels
      named left* and right*, and then transformed again as two 180 rotations, and
      displaying in geo3 and geo4.In transform3, each set of legal channel suffixes
      (m00, m01...) that have a unique prefix (left, right) are treated as separate
      transforms that get affected separately.select1 and select2 pull them apart
      for display. Then join3 combines them another way: as a 2-sample CHOP with 16
      channels. Again these can be transformed as 2 sets of transforms.In this case
      the resulting 2-sample CHOP is used to instance two toruses on geo5.'
  - example_name: example7
    operators:
    - name: g1
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
    - name: g2
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
    - name: g3
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 2
        pxform: 'on'
        instancing: 'on'
        instanceop: transform1
        instancetx: tx
        instancety: ty
        instancetz: tz
        instancerx: rx
        instancery: ry
        instancerz: rz
        instancesx: sx
        instancesy: sy
        instancesz: sz
    - name: set1
      type: CHOP:transform
      role: isolated
