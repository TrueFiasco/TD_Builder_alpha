        crop: col
        ustart: 0.6
    connections: []
    topology:
      operator_count: 2
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: Here we have the RGBA values of the middle column of the image.
  - example_name: example3
    operators:
    - name: moviein1
      type: TOP:moviefilein
      role: isolated
    - name: topto_rowOfPixels
      type: CHOP:topto
      role: isolated
      parameters:
        pageindex: 1
        top: moviein1
    - name: topto_rowOfPixels_to_255
      type: CHOP:topto
      role: isolated
      parameters:
        top: moviein1
        rgbaunit: u256
    connections: []
    topology:
      operator_count: 3
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: Here we have the RGBA values of a full row of the image.In the case
      where you want the values to be between 0 and 255, the second CHOP sets the
      RGBA Units parameter.
  - example_name: example4
    operators:
    - name: null1
      type: TOP:null
      role: output
    - name: panel1
      type: CHOP:panel
      role: input
      parameters:
        select: '"u v"'
    - name: chopto1
      type: TOP:chopto
      role: isolated
      parameters:
        chop: topto_inputPixelSelection
        dataformat: legacy
    - name: container1
      type: COMP:container
      role: input
      parameters:
        pageindex: 1
        h: 225
        top: ./out1
        topsmoothness: mipmap
    - name: topto_inputPixelSelection
      type: CHOP:topto
      role: output
      parameters:
        top: null1
        r: red
        g: green
        b: blue
        a: alpha
    connections:
    - from: container1/out1
      to: null1
      input_index: '0'
    - from: panel1
      to: topto_inputPixelSelection
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: This is a basic example of how you could make your own color picker,
      using the u and v of a Panel CHOP as co-ordinates to analyze.
  - example_name: example5
    operators:
    - name: null2
      type: TOP:null
      role: output
    - name: topto1
      type: CHOP:topto
      role: isolated
      parameters:
        top: pointfilein1
        singleset: 'on'
        crop: full
        exportmethod: datname
    - name: topto2
      type: CHOP:topto
      role: isolated
      parameters:
        top: pointfilein1
        singleset: 'on'
        excludenans: 'on'
        activechannel: alpha
        crop: full
        exportmethod: datname
    - name: pointfilein1
      type: TOP:pointfilein
      role: input
    connections:
    - from: pointfilein1
      to: null2
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: This takes all valid points of a point cloud in a TOP and converts
      to CHOP channels.On the TOP to CHOP, you have to turn on Output as Single Channel
      Set, then set Crop to be Full Image. In topto2 you see the lingering unused
      pixels at the end with alpha 0, representing the orange pixels at the top of
      pointfilein1, which are unused pixels of the point cloud. To eliminate them,
      topto2 has Active Channel set to Alpha, which strips those off. Also in the
      point cloud TOPs, the unused pixels may have NaN (not a number, a very high
      floating point number) in the RGB values. If you want to strip these out too,
      turn on the Exclude NaNs parameter.
  - example_name: example6
    operators:
    - name: res1
      type: TOP:res
      role: output
      parameters:
        pageindex: 1
        outputresolution: custom
        resolutionw: 40
        resolutionh: 10
        outputaspect: resolution
        inputfiltertype: nearest
        filtertype: nearest
    - name: res2
      type: TOP:res
      role: output
      parameters:
        pageindex: 1
        outputresolution: custom
        resolutionw: 40
        resolutionh: 10
        outputaspect: resolution
        inputfiltertype: mipmap
        filtertype: nearest
    - name: topto1
      type: CHOP:topto
      role: input
      parameters:
        top: res1
        a: '""'
        crop: full
        exportmethod: datname
    - name: topto2
      type: CHOP:topto
      role: isolated
      parameters:
        top: transform2
        g: '""'
        b: '""'
        a: '""'
        crop: full
        exportmethod: datname
    - name: topto3
      type: CHOP:topto
      role: isolated
      parameters:
        top: transform3
        g: '""'
        b: '""'
        a: '""'
        crop: full
        exportmethod: datname
    - name: topto4
      type: CHOP:topto
      role: isolated
      parameters:
        top: res2
        a: '""'
        crop: full
        exportmethod: datname
    - name: select1
      type: CHOP:select
      role: output
      parameters:
        channames: r*
    - name: select2
      type: CHOP:select
      role: output
      parameters:
        channames: g*
    - name: select3
      type: CHOP:select
      role: output
      parameters:
        channames: b*
    - name: transform1
      type: TOP:transform
      role: processor
      parameters:
        tx: 0.02
        ty: 0.46
        rotate: -12
        sx: 2.3
        sy: 2.3
        outputaspect: resolution
    - name: transform2
      type: TOP:transform
      role: output
      parameters:
        pageindex: 2
        outputresolution: custom
        resolutionw: 16
        resolutionh: 9
        inputfiltertype: nearest
        filtertype: nearest
    - name: transform3
      type: TOP:transform
      role: output
      parameters:
        pageindex: 2
        outputresolution: custom
        resolutionw: 16
        resolutionh: 9
        inputfiltertype: mipmap
        filtertype: nearest
    - name: moviefilein1
      type: TOP:moviefilein
      role: input
    - name: moviefilein2
      type: TOP:moviefilein
      role: input
    connections:
    - from: transform1
      to: res1
      input_index: '0'
    - from: transform1
      to: res2
      input_index: '0'
    - from: topto1
      to: select1
      input_index: '0'
    - from: topto1
      to: select2
      input_index: '0'
    - from: topto1
      to: select3
      input_index: '0'
    - from: moviefilein1
      to: transform1
      input_index: '0'
    - from: moviefilein2
      to: transform2
      input_index: '0'
    - from: moviefilein2
      to: transform3
      input_index: '0'
    topology:
      operator_count: 14
      connection_count: 8
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: If you want to sample the image with a specific number of rows and
      columns, you should use the Resolution TOP to scale down and get the exact number
      of rows and columns, and then TOP to CHOP the entire image.  For more flexibility
      if re-shaping the image, you can preceed it with a Transform TOP.You then need
      to choose whether you want to average pixels when scaling down, or just sample
      the nearest pixel, which will give you more contrast. To see exactly what your
      TOP to CHOP gives you, make the Viewer Smoothness be Nearest Pixel. That doesn't
      change the output, it only makes what you see in the viewer image more precise.
