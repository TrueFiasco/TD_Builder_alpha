family: CHOP
operator_count: 112
operators:
- operator_type: analyzeCHOP
  examples:
  - example_name: example1
    operators:
    - name: wave1
      type: CHOP:wave
      role: input
      parameters:
        decay: 0.235
    - name: analyze_max
      type: CHOP:analyze
      role: output
      parameters:
        function: maximum
    - name: analyze_min
      type: CHOP:analyze
      role: output
      parameters:
        function: minimum
    - name: analyze_average
      type: CHOP:analyze
      role: output
    - name: analyze_total_peeks
      type: CHOP:analyze
      role: output
      parameters:
        function: totalpeaks
    - name: analyze_first_peak_index
      type: CHOP:analyze
      role: output
      parameters:
        function: firstpeakindex
    - name: analyze_first_peak_value
      type: CHOP:analyze
      role: output
      parameters:
        function: firstpeakvalue
    connections:
    - from: wave1
      to: analyze_max
      input_index: '0'
    - from: wave1
      to: analyze_min
      input_index: '0'
    - from: wave1
      to: analyze_average
      input_index: '0'
    - from: wave1
      to: analyze_total_peeks
      input_index: '0'
    - from: wave1
      to: analyze_first_peak_index
      input_index: '0'
    - from: wave1
      to: analyze_first_peak_value
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 6
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: These examples show the different functions of the Analyze CHOP.
  - example_name: example2
    operators:
    - name: noise1
      type: CHOP:noise
      role: input
      parameters:
        constraint: offset
    - name: analyze_no_peak_value
      type: CHOP:analyze
      role: output
      parameters:
        function: lowestpeakvalue
    connections:
    - from: noise1
      to: analyze_no_peak_value
      input_index: '0'
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: This Analyze CHOP becomes -1 when there are no peaks in the input
      number.
  - example_name: example3
    operators:
    - name: noise1
      type: CHOP:noise
      role: input
      parameters:
        pageindex: 4
        timeslice: 'on'
    - name: trail1
      type: CHOP:trail
      role: processor
      parameters:
        timeslice: 'on'
    - name: trail2
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: trail3
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: analyze_rms
      type: CHOP:analyze
      role: processor
      parameters:
        function: rmspower
    - name: analyze_rms1
      type: CHOP:analyze
      role: processor
      parameters:
        function: rmspower
    - name: audiofilein1
      type: CHOP:audiofilein
      role: input
      parameters:
        timeslice: 'on'
    connections:
    - from: noise1
      to: trail1
      input_index: '0'
    - from: analyze_rms
      to: trail2
      input_index: '0'
    - from: analyze_rms1
      to: trail3
      input_index: '0'
    - from: trail1
      to: analyze_rms
      input_index: '0'
    - from: audiofilein1
      to: analyze_rms1
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 5
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: These two examples get the RMS (Root Mean Squared) values of both
      the incoming Noise CHOP, and even more useful, for the incoming audio file.
      RMS is a way of measuring "power" of a signal, and is similar to amplitude,
      but favors the peaks.The viewer of audiofilein1 is fixed at a range of -1 to
      1 because of Viewer Active -> rclick -> Vertical Range set to -1 to +1.
  - example_name: example4
    operators:
    - name: math1
      type: CHOP:math
      role: processor
      parameters:
        chopop: add
    - name: null1
      type: CHOP:null
      role: processor
    - name: text1
      type: DAT:text
      role: isolated
    - name: logic1
      type: CHOP:logic
      role: processor
      parameters:
        timeslice: 'on'
    - name: logic2
      type: CHOP:logic
      role: output
      parameters:
        chanop: or
        timeslice: 'on'
    - name: noise3
      type: CHOP:noise
      role: input
      parameters:
        period: 5
        timeslice: 'on'
    - name: noise4
      type: CHOP:noise
      role: input
      parameters:
        type: hermite
        period: 0.5
        timeslice: 'on'
    - name: slope1
      type: CHOP:slope
      role: processor
      parameters:
        timeslice: 'on'
    - name: trail1
      type: CHOP:trail
      role: processor
      parameters:
        wlength: 0.3
        timeslice: 'on'
    - name: trail4
      type: CHOP:trail
      role: processor
      parameters:
        wlength: 0.6
        timeslice: 'on'
    - name: trail5
      type: CHOP:trail
      role: processor
      parameters:
        wlength: 0.6
        timeslice: 'on'
    - name: button1
      type: COMP:button
      role: input
      parameters:
        label: Momentary
        scaletofit: onlyshrink
        w: 50
        h: 50
        top: ./bg
        topsmoothness: mipmap
    - name: filter1
      type: CHOP:filter
      role: processor
      parameters:
        pageindex: 1
        type: box
        speedcoeff: 0
        exportmethod: autoname
    - name: analyze1
      type: CHOP:analyze
      role: processor
      parameters:
        function: sum
    - name: sliderxy
      type: COMP:slider
      role: input
      parameters:
        label: XY
        slidertype: slideruv
        value0: 0.708861
        value1: 0.64557
        w: 80
        h: 80
        bgalpha: 1
        top: ./back
        topsmoothness: mipmap
        crop: 'on'
    - name: trigger1
      type: CHOP:trigger
      role: processor
      parameters:
        pageindex: 2
        retrigger: 1
        multitrigger: add
        remainder: crop
        peaklen: 2
        decay: 0.5
        sustain: 1
        release: 1
        rshape: easeout
        timeslice: 'on'
        exporttable: trigger1_export
    - name: trigger2
      type: CHOP:trigger
      role: processor
      parameters:
        pageindex: 2
        retrigger: 1
        multitrigger: add
        remainder: crop
        peaklen: 2
        decay: 0.5
        sustain: 1
        release: 1
        rshape: easeout
        timeslice: 'on'
        exporttable: trigger2_export
    - name: input_signal
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: math_positive
      type: CHOP:math
      role: processor
      parameters:
        preop: pos
    - name: trail_trigger
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: trail_trigger1
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: analyze_minimum
      type: CHOP:analyze
      role: processor
      parameters:
        function: minimum
        exportmethod: autoname
    - name: trigger1_export
      type: DAT:table
      role: isolated
    - name: trigger2_export
      type: DAT:table
      role: isolated
    - name: analyze_minimum1
      type: CHOP:analyze
      role: processor
      parameters:
        function: minimum
        exportmethod: autoname
    - name: binary_input_signal
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    connections:
    - from: noise3
      to: math1
      input_index: '0'
    - from: noise4
      to: math1
      input_index: '1'
    - from: sliderxy/out1
      to: null1
      input_index: '0'
    - from: math1
      to: logic1
      input_index: '0'
    - from: analyze1
      to: logic2
      input_index: '0'
    - from: null1
      to: slope1
      input_index: '0'
    - from: math_positive
      to: trail1
      input_index: '0'
    - from: logic1
      to: trail4
      input_index: '0'
    - from: button1/out1
      to: trail5
      input_index: '0'
    - from: trail4
      to: filter1
      input_index: '0'
    - from: trail1
      to: analyze1
      input_index: '0'
    - from: analyze_minimum
      to: trigger1
      input_index: '0'
    - from: analyze_minimum1
      to: trigger2
      input_index: '0'
    - from: math1
      to: input_signal
      input_index: '0'
    - from: slope1
      to: math_positive
      input_index: '0'
    - from: trigger1
      to: trail_trigger
      input_index: '0'
    - from: trigger2
      to: trail_trigger1
      input_index: '0'
    - from: filter1
      to: analyze_minimum
      input_index: '0'
    - from: trail5
      to: analyze_minimum1
      input_index: '0'
    - from: logic1
      to: binary_input_signal
      input_index: '0'
    topology:
      operator_count: 26
      connection_count: 20
      has_parallel_paths: true
      max_chain_length: 8
    curator_text: 'The top case triggers off based on time thresholds, but assumes
      there are no jittery values in the signal.The next two examples will analyze,
      in this case a series of pulses to detect when the input signal is on (value
      1) for a continuous .6 seconds.The second is do-it-yourself where you can nervously
      tap the button and nothing happens in trigger2. But if you hold, it triggers.It
      is useful for filtering out jittery inputs from inexact devices like Kinect
      or Leap. Analyze looks for the minimum value over .6 seconds, and if all samples
      over the last .6 seconds are above zero, the Trigger CHOP is triggered. The
      Trigger CHOP assures the output signal stays on for at least a definitive 2
      seconds, and when Analyze goes to 0, the output signal stays on for an additional
      1.5 seconds and then drops to 0 during 1 more second. Asjust all these parameters
      to taste.You can unbypass the Filter CHOP to be more lenient: the input signal
      can drop to 0 for up to .2 seconds.You can bypass the Logic CHOP to work with
      more raw analog data.Note the Filter CHOP is not Time Sliced - it''s filtering
      the entire .6 seconds each frame it cooks.'
  - example_name: example5
    operators:
    - name: lag1
      type: CHOP:lag
      role: processor
      parameters:
        lag1: 0.2
        lag2: 0.2
        clamp: 'on'
        slope1: 10
        slope2: 0.1
        timeslice: 'on'
        exporttable: lag1_export
    - name: lag2
      type: CHOP:lag
      role: output
      parameters:
        lag1: 0.2
        lag2: 0.2
        clamp: 'on'
        slope1: 0.1
        slope2: 10
        timeslice: 'on'
        exporttable: lag2_export
    - name: lag3
      type: CHOP:lag
      role: output
      parameters:
        lag1: 0.2
        lag2: 0.2
        clamp: 'on'
        slope1: 10
        slope2: 0.1
        timeslice: 'on'
        exporttable: lag3_export
    - name: lag4
      type: CHOP:lag
      role: output
      parameters:
        lag1: 0.2
        lag2: 0.2
        clamp: 'on'
        slope1: 0.1
        slope2: 10
        timeslice: 'on'
        exporttable: lag4_export
    - name: trail1
      type: CHOP:trail
      role: processor
      parameters:
        wlength: 10
        timeslice: 'on'
    - name: trail2
      type: CHOP:trail
      role: processor
      parameters:
        wlength: 10
        timeslice: 'on'
    - name: trail3
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: trail4
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: limit_x
      type: CHOP:limit
      role: processor
      parameters:
        type: clamp
    - name: limit_y
      type: CHOP:limit
      role: output
      parameters:
        type: clamp
    - name: select1
      type: CHOP:select
      role: processor
      parameters:
        channames: tx
    - name: select2
      type: CHOP:select
      role: processor
      parameters:
        channames: ty
    - name: mousein1
      type: CHOP:mousein
      role: input
      parameters:
        timeslice: 'on'
        exportmethod: datname
    - name: lag1_export
      type: DAT:table
      role: isolated
    - name: lag2_export
      type: DAT:table
      role: isolated
    - name: lag3_export
      type: DAT:table
      role: isolated
    - name: lag4_export
      type: DAT:table
      role: isolated
    - name: math_rangeX
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 2
    - name: math_rangeY
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 2
    - name: analyze_Ymin
      type: CHOP:analyze
      role: processor
      parameters:
        function: minimum
    - name: analyze_xMax
      type: CHOP:analyze
      role: processor
      parameters:
        function: maximum
    - name: analyze_xMin
      type: CHOP:analyze
      role: processor
      parameters:
        function: minimum
    - name: analyze_yMAX
      type: CHOP:analyze
      role: processor
      parameters:
        function: maximum
    - name: math_xBumpUp
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 1
        preoff: 0.01
    - name: math_yBumpUp
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 1
        preoff: 0.01
    - name: math_xBumpDown
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 1
        preoff: -0.01
    - name: math_yBumpDown
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 1
        preoff: -0.01
    connections:
    - from: math_xBumpUp
      to: lag1
      input_index: '0'
    - from: math_xBumpDown
      to: lag2
      input_index: '0'
    - from: math_yBumpUp
      to: lag3
      input_index: '0'
    - from: math_yBumpDown
      to: lag4
      input_index: '0'
    - from: select1
      to: trail1
      input_index: '0'
    - from: select2
      to: trail2
      input_index: '0'
    - from: lag1
      to: trail3
      input_index: '0'
    - from: limit_x
      to: trail4
      input_index: '0'
    - from: math_rangeY
      to: trail4
      input_index: '1'
    - from: math_rangeX
      to: limit_x
      input_index: '0'
    - from: math_rangeY
      to: limit_y
      input_index: '0'
    - from: mousein1
      to: select1
      input_index: '0'
    - from: mousein1
      to: select2
      input_index: '0'
    - from: select1
      to: math_rangeX
      input_index: '0'
    - from: select2
      to: math_rangeY
      input_index: '0'
    - from: trail2
      to: analyze_Ymin
      input_index: '0'
    - from: trail1
      to: analyze_xMax
      input_index: '0'
    - from: trail1
      to: analyze_xMin
      input_index: '0'
    - from: trail2
      to: analyze_yMAX
      input_index: '0'
    - from: analyze_xMax
      to: math_xBumpUp
      input_index: '0'
    - from: analyze_yMAX
      to: math_yBumpUp
      input_index: '0'
    - from: analyze_xMin
      to: math_xBumpDown
      input_index: '0'
    - from: analyze_Ymin
      to: math_yBumpDown
      input_index: '0'
    topology:
      operator_count: 27
      connection_count: 23
      has_parallel_paths: true
      max_chain_length: 7
    curator_text: This keeps the XY range between 0 and 1, whether you are moving
      the input slightly or in a wide range.The Analyze CHOPs get the maximum and
      minimum values for X and Y over the past 10 seconds (Trail CHOP is set to 10
      sec).Then the math_rangeX and math_rangeY CHOPs re-range the max/min so the
      values go from 0 to 1.If you want to fix the max/min range, just lock the Trail
      CHOPs or the Analyze CHOPs right after you move the inputs around to the XY
      full range that you want to operate in.If you want it adaptive over the last
      20 seconds, unlock the Trail CHOPs and then unbypass the Lag CHOPs. It gives
      it an 10 extra seconds to blend to new max/min values. See their Clamp Slope
      values.The math_*Bump* CHOPs make sure that when the inputs go silent, the output
      is .5.props to elburz for original concept.Trail CHOPs have fixed range of -1
      to +1 via the graph Viewer Active rclick menu.
- operator_type: angleCHOP
  examples:
  - example_name: example1
    operators:
    - name: constant1
      type: CHOP:constant
      role: input
      parameters:
        const0name: pi
        const0value: 3.14159
    - name: constant2
      type: CHOP:constant
      role: input
      parameters:
        const0name: pi
        const0value: -180
    - name: angle_degrees_to_rad
      type: CHOP:angle
      role: output
      parameters:
        outunit: radians
    - name: angle_rad_to_degrees
      type: CHOP:angle
      role: output
      parameters:
        inunit: radians
    connections:
    - from: constant2
      to: angle_degrees_to_rad
      input_index: '0'
    - from: constant1
      to: angle_rad_to_degrees
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The first example shows the conversion from radians to degrees360
      degrees is 2 * PI radiansThe second example shows the conversion from degrees
      to radians2 * PI radians = 360 degrees
  - example_name: example2
    operators:
    - name: constant1
      type: CHOP:constant
      role: input
      parameters:
        const0name: x
        const0value: 1
        const1name: y
        const2name: z
        const2value: 0.5
        const3name: w
    - name: constant2
      type: CHOP:constant
      role: input
      parameters:
        const0name: rx
        const0value: -180
        const1name: ry
        const1value: -90
        const2name: rz
    - name: angle_quat_to_deg
      type: CHOP:angle
      role: output
      parameters:
        inunit: quaternions
    - name: angle_degrees_to_quat
      type: CHOP:angle
      role: output
      parameters:
        outunit: quaternions
    connections:
    - from: constant1
      to: angle_quat_to_deg
      input_index: '0'
    - from: constant2
      to: angle_degrees_to_quat
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The first example shows the conversion from quaternions to euler
      degrees,the second the other way around.More info here:https://en.wikipedia.org/wiki/Conversion_between_quaternions_and_Euler_angles
  - example_name: example3
    operators:
    - name: constant1
      type: CHOP:constant
      role: input
      parameters:
        const0name: rightX
        const0value: 1
        const1name: rightY
        const2name: rightZ
        const3name: upX
        const4name: upY
        const4value: 0.7071
        const5name: upZ
        const5value: 0.7071
    - name: constant2
      type: CHOP:constant
      role: input
      parameters:
        const0name: rx
        const1name: ry
        const1value: 90
        const2name: rz
    - name: angle_2vec_to_angles
      type: CHOP:angle
      role: output
      parameters:
        inunit: twovectors
    - name: angle_angles_to_2vec
      type: CHOP:angle
      role: output
      parameters:
        pageindex: 1
        outunit: twovectors
    connections:
    - from: constant1
      to: angle_2vec_to_angles
      input_index: '0'
    - from: constant2
      to: angle_angles_to_2vec
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The two vector function allows you to convert 2 vectors to angles/quaternions.Both
      vectors need to be supplied in a 6 channel CHOP. The first vector represents
      the direction to the right (over x), the second upwards (over y).In the top
      example the up vector is rotated 45 degrees over X.The vectors dont have to
      be normalized.
- operator_type: audiobandeqCHOP
  examples:
  - example_name: example1
    operators:
    - name: math1
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 2
        torange1: -24
        torange2: 24
    - name: null1
      type: CHOP:null
      role: output
      parameters:
        pageindex: 1
        exportmethod: autoname
    - name: filter1
      type: CHOP:filter
      role: processor
      parameters:
        width: 0.3
        speedcoeff: 0
        timeslice: 'on'
    - name: select1
      type: CHOP:select
      role: processor
      parameters:
        renameto: audioband1:band[1-16]
    - name: audioband1
      type: CHOP:audioband
      role: processor
      parameters:
        timeslice: 'on'
    - name: multilevel
      type: COMP:container
      role: input
      parameters:
        pageindex: 1
        w: 640
        h: 360
        top: ./back
        topsmoothness: mipmap
    - name: audiodevout1
      type: CHOP:audiodevout
      role: output
      parameters:
        cookalways: 'off'
        timeslice: 'on'
    - name: audiofilein1
      type: CHOP:audiofilein
      role: input
      parameters:
        timeslice: 'on'
    connections:
    - from: filter1
      to: math1
      input_index: '0'
    - from: math1
      to: null1
      input_index: '0'
    - from: select1
      to: filter1
      input_index: '0'
    - from: multilevel/out1
      to: select1
      input_index: '0'
    - from: audiofilein1
      to: audioband1
      input_index: '0'
    - from: audioband1
      to: audiodevout1
      input_index: '0'
    topology:
      operator_count: 8
      connection_count: 6
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: Draw on the 'multilevel' graph. It sets the band EQ levels.The center
      level is the 0-gain (default pass-through).
- operator_type: audiodeviceinCHOP
  examples:
  - example_name: example1
    operators:
    - name: null5
      type: CHOP:null
      role: output
    - name: button1
      type: COMP:button
      role: input
      parameters:
        label: Active
        buttontype: toggledown
        scaletofit: onlyshrink
        w: 50
        h: 50
        top: ./bg
        topsmoothness: mipmap
    - name: chopexec1
      type: DAT:chopexec
      role: isolated
      parameters:
        chop: null5
        offtoon: 'on'
        whileoff: 'on'
    - name: audiodevout1
      type: CHOP:audiodevout
      role: output
      parameters:
        cookalways: 'off'
        timeslice: 'on'
    - name: audiodevicein1
      type: CHOP:audiodevin
      role: input
      parameters:
        timeslice: 'on'
    - name: note_audiodevout1
      type: DAT:text
      role: isolated
    connections:
    - from: button1/out1
      to: null5
      input_index: '0'
    - from: audiodevicein1
      to: audiodevout1
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: 'Choose your preferred input device inaudiodevicein1 and then click
      the Audio On/Off button.WARNING: If you''re using a built in laptop speakers
