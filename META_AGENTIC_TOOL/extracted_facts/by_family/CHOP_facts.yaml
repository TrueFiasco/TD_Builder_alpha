      to: splice1
      input_index: '0'
    - from: pattern2
      to: splice1
      input_index: '1'
    topology:
      operator_count: 3
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: This Splice CHOP does a simple replace of one CHOP into the other.
  - example_name: example3
    operators:
    - name: patternA
      type: CHOP:pattern
      role: input
    - name: patternB
      type: CHOP:pattern
      role: processor
      parameters:
        wavetype: square
        numcycles: 21
        amp: 0.2
        combine: add
    - name: spliceExtract
      type: CHOP:splice
      role: processor
      parameters:
        outputtrimmed: 'on'
        start: 292
        trimlength: 60
    - name: spliceReplace
      type: CHOP:splice
      role: output
    connections:
    - from: spliceExtract
      to: patternB
      input_index: '0'
    - from: patternA
      to: spliceExtract
      input_index: '0'
    - from: patternA
      to: spliceReplace
      input_index: '0'
    - from: patternB
      to: spliceReplace
      input_index: '1'
    topology:
      operator_count: 4
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 4
    curator_text: This extracts a part of a CHOP, alters it, then replaces the original
      samples.The two Splice CHOPs have their "start" and "trimlength" parameters
      tied together with expressions.
  - example_name: example4
    operators:
    - name: math1
      type: CHOP:math
      role: processor
      parameters:
        integer: round
        torange2: 600
        exporttable: math1_export
    - name: math2
      type: CHOP:math
      role: processor
      parameters:
        preop: pos
    - name: math3
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 1
        postoff: 1
    - name: noise1
      type: CHOP:noise
      role: input
      parameters:
        pageindex: 3
        period: 7.24
        channelname: '"tx ty tz"'
    - name: slope1
      type: CHOP:slope
      role: processor
      parameters:
        timeslice: 'on'
    - name: pattern3
      type: CHOP:pattern
      role: processor
      parameters:
        pageindex: 1
        wavetype: const
        channelname: size
        combine: append
    - name: trigger1
      type: CHOP:trigger
      role: processor
      parameters:
        attack: 0.1
        decay: 0.72
        timeslice: 'on'
    - name: constant1
      type: CHOP:constant
      role: input
      parameters:
        const0name: size
        const0value: 0.4
    - name: math1_export
      type: DAT:table
      role: isolated
    - name: spliceInstance
      type: CHOP:splice
      role: output
      parameters:
        trimmethod: insertlength
        match: name
        scope: size
    connections:
    - from: constant1
      to: math1
      input_index: '0'
    - from: slope1
      to: math2
      input_index: '0'
    - from: trigger1
      to: math3
      input_index: '0'
    - from: math1
      to: slope1
      input_index: '0'
    - from: noise1
      to: pattern3
      input_index: '0'
    - from: math2
      to: trigger1
      input_index: '0'
    - from: pattern3
      to: spliceInstance
      input_index: '0'
    - from: math3
      to: spliceInstance
      input_index: '1'
    topology:
      operator_count: 10
      connection_count: 8
      has_parallel_paths: false
      max_chain_length: 7
    curator_text: If your Splice CHOP is used to instance geometry, adn each sample
      represents an instance's x y z and size, you would use this trick to grow the
      size whenever a different instance was chosen. Change the value of the Constant
      CHOP and look at spliceInstance.Here we use a Constant CHOP to represent the
      "current" sample (0 to 1 is mapped to 0 to 599), but you could use a Render
      Pick DAT to take a picked instance number and feed that down the chain.THe Slope
      CHOP detects any change in its input, and the Math CHOP makes sure it's always
      positive. That's good to feed to teh Trigger CHOP. You can also use a CHOP Execute
      DAT to detect a change and trigger the Trigger CHOP's Reset Pulse parameter.
- operator_type: springCHOP
