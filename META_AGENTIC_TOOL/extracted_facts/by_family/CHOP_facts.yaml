      operator_count: 10
      connection_count: 9
      has_parallel_paths: true
      max_chain_length: 5
    curator_text: audiospect_nice is enhanced for viewing.THe CHOPs after it are 3
      ways to get accurate or approximate averages for the spectrum split into 10
      bands.audiospect3 goes to frequency and audiospect4 re-constructs the audio
      signal with virtually no error.
  - example_name: example2
    operators:
    - name: range
      type: CHOP:constant
      role: isolated
      parameters:
        const0name: lowhz
        const0value: 400
        const1name: highhz
        const1value: 500
    - name: trim1
      type: CHOP:trim
      role: output
      parameters:
        relative: abs
        timeslice: 'on'
    - name: audiofilein1
      type: CHOP:audiofilein
      role: input
      parameters:
        timeslice: 'on'
    - name: info_spectrum
      type: CHOP:info
      role: isolated
      parameters:
        op: audiospect_raw
        iscope: hz_per_sample
    - name: audiospect_raw
      type: CHOP:audiospect
      role: processor
      parameters:
        frequencylog: 0
        highfreqboost: 0
        timeslice: 'on'
    connections:
    - from: audiospect_raw
      to: trim1
      input_index: '0'
    - from: audiofilein1
      to: audiospect_raw
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: 'audiospect_raw in this example has a linear x-scale representing
      Hz. Its "Fraquency <> Logarithmic Scaling" parameter is set to 0 (Frequency).  In
      this mode, each sample represents some # of Hz (depending on the audio sample
      rate and the timeline frames per second). So sample 5000 is  5000 Hz times the
      number in the info_spectrum. The "range" CHOP specifies a low and high frequency
      range to extract. The Trim CHOP extracts that range of Hz.  But to get the Hz,
      its sample range on the x-axis needs to be multiplied by the Hz per sample.See
      also graphPlot in the Community Posts.'
