      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: '"Callbacks" are located in the docked node, timer8_callbacks.Callbacks
      are functions that are called when timer events occur. They can be used to set
      parameters and trigger events, run scripts and many other things.In this example
      it prints the current time, "running seconds" when it initializes, when it is
      ready, starts, on segment and, cycles and on done.Open up the textport (Dialogs
      -> Textport), press Start and watch the output of the callbacks.Look at the
      DAT that''s docked to the Timer CHOP.whileTimerActive() is especially noteworthy
      as it is called every frame that a segment''s timer is counting, and not at
      any other time.'
  - example_name: example12
    operators:
    - name: busy
      type: CHOP:null
      role: output
    - name: wait
