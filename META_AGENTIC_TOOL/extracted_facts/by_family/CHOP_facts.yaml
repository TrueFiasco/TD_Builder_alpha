    curator_text: And see the Rename CHOP. It is a subset of the Select CHOP.
- operator_type: shiftCHOP
  examples:
  - example_name: example1
    operators:
    - name: merge1
      type: CHOP:merge
      role: output
      parameters:
        align: none
    - name: shift1
      type: CHOP:shift
      role: processor
      parameters:
        start: 1000
    - name: comment1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: pattern1
      type: CHOP:pattern
      role: input
      parameters:
        pageindex: 1
        channelname: sinus
        left: default
        right: default
    - name: pattern2
      type: CHOP:pattern
      role: input
      parameters:
        pageindex: 1
        wavetype: ramp
        channelname: ramp
        left: default
        right: default
    connections:
    - from: pattern2
      to: merge1
      input_index: '0'
    - from: shift1
      to: merge1
      input_index: '1'
    - from: pattern1
      to: shift1
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: The Shift CHOP time-shifts a CHOP, changing the start and end of
      the CHOP's interval. However, the contents of the channels remain the same.
  - example_name: example2
    operators:
    - name: shift1
      type: CHOP:shift
      role: output
      parameters:
        relative: abs
        startunit: fraction
        scroll: 250
    - name: pattern1
      type: CHOP:pattern
      role: input
      parameters:
        pageindex: 1
    connections:
    - from: pattern1
      to: shift1
      input_index: '0'
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: In this example the channel is shifted by an offset of 250 samples.This
      means the start/end of the CHOP's interval are still the same (0 to 999) but
      we sample a different part of the channel. The pattern CHOP's Extend Left and
      Extend Right parameters are set to cycle, so now that we sample outside the
      interval, we see a cycle of the sinus wave.(also see snippets for Extend CHOP
      for an explanation how CHOP extend conditions work)
  - example_name: example3
    operators:
    - name: shift1
      type: CHOP:shift
      role: output
    - name: comment1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: pattern1
      type: CHOP:pattern
      role: input
      parameters:
        pageindex: 1
    - name: pattern2
      type: CHOP:pattern
      role: processor
      parameters:
        wavetype: tri
        phase: -0.25
        channelname: chan2
        combine: append
    connections:
    - from: pattern2
      to: shift1
      input_index: '0'
    - from: pattern1
      to: pattern2
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: In the Shift CHOP, the Python expression me.chanIndex is the index
      of the channel being generated. This expression can be used to give each channel
      a unique offset.
  - example_name: example4
    operators:
    - name: shift1
      type: CHOP:shift
      role: output
    - name: shift2
      type: CHOP:shift
      role: processor
      parameters:
        start: 5000
    - name: comment1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: comment2
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: comment3
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: pattern1
      type: CHOP:pattern
      role: input
      parameters:
        pageindex: 1
        channelname: sinus
    - name: pattern2
      type: CHOP:pattern
      role: input
      parameters:
        pageindex: 1
        wavetype: square
        numcycles: 5
        channelname: square
    connections:
    - from: pattern1
      to: shift1
      input_index: '0'
    - from: shift2
      to: shift1
      input_index: '1'
    - from: pattern2
      to: shift2
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: The optional second input of tHe Shift chop, the Start/End Reference,
      is used to align the first input CHOP relative to another reference CHOP. This
      outputs the channels of the first CHOP only, and the shifts are based on the
      interval of the second CHOP. It is useful for making several CHOPs match up
      to the same time.
- operator_type: shuffleCHOP
