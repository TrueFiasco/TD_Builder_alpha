    curator_text: Here are a few ways to manipulate channels and samples.See the Fan
      CHOP too.
  - example_name: example2
    operators:
    - name: NOTE
      type: DAT:text
      role: isolated
      parameters:
        pageindex: 1
    - name: math1
      type: CHOP:math
      role: processor
      parameters:
        integer: round
    - name: null1
      type: CHOP:null
      role: output
      parameters:
        exporttable: null1_export
    - name: null2
      type: CHOP:null
      role: output
    - name: trim1
      type: CHOP:trim
      role: processor
      parameters:
        relative: abs
        startunit: seconds
        endunit: seconds
        timeslice: 'on'
    - name: noise1
      type: CHOP:noise
      role: input
      parameters:
        pageindex: 3
        channelname: noise
    - name: speed1
      type: CHOP:speed
      role: processor
      parameters:
        timeslice: 'on'
    - name: filter1
      type: CHOP:filter
      role: processor
      parameters:
        speedcoeff: 0
        timeslice: 'on'
    - name: filter2
      type: CHOP:filter
      role: output
      parameters:
        width: 0.5
        speedcoeff: 0
        filterpersample: 'on'
    - name: shuffle1
