        chopop: sub
    - name: math_getLenthDistanceOfeachPointFromXYZ
      type: CHOP:math
      role: processor
      parameters:
        chanop: len
    connections:
    - from: grid1
      to: chopto1
      input_index: '0'
    - from: math_getLenthDistanceOfeachPointFromXYZ
      to: lookup1
      input_index: '0'
    - from: pattern1
      to: lookup1
      input_index: '1'
    - from: constant_xyz
      to: replace1
      input_index: '0'
    - from: noise_xz
      to: replace1
      input_index: '1'
    - from: sopto1
      to: merge_replaceTY
      input_index: '0'
    - from: lookup1
      to: merge_replaceTY
      input_index: '1'
    - from: sopto1
      to: math_subtractAllPointsFromPosition
      input_index: '0'
    - from: replace1
      to: math_subtractAllPointsFromPosition
      input_index: '1'
    - from: math_subtractAllPointsFromPosition
      to: math_getLenthDistanceOfeachPointFromXYZ
      input_index: '0'
    topology:
      operator_count: 12
      connection_count: 10
      has_parallel_paths: true
      max_chain_length: 6
    curator_text: This take 2500 points of a grid, converts it to 2500 samples of
      a CHOP, use the first Math CHOP to subtract an XYZ position, then the second
      Math CHOP to compute a distance from teh XYZ position, then usesa a Lookup CHOP
      to simylate a wave displacement.The CHOP channels are then convereted back to
      a SOP.
  - example_name: example8
    operators:
    - name: noise1
      type: CHOP:noise
      role: input
    - name: noise2
      type: CHOP:noise
      role: input
      parameters:
        type: random
        amp: 0.1
    - name: noise3
      type: CHOP:noise
      role: input
      parameters:
        period: 0.2
        amp: 0.2
        timeslice: 'on'
    - name: noise4
      type: CHOP:noise
      role: input
      parameters:
        period: 11
        amp: 2.5
    - name: trail1
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: math_timeslice1
      type: CHOP:math
      role: processor
      parameters:
        chopop: add
    - name: math_non_timeslice
      type: CHOP:math
      role: output
      parameters:
        pageindex: 2
        chopop: add
    connections:
    - from: math_timeslice1
      to: trail1
      input_index: '0'
    - from: noise3
      to: math_timeslice1
      input_index: '0'
    - from: noise4
      to: math_timeslice1
      input_index: '1'
    - from: noise1
      to: math_non_timeslice
      input_index: '0'
    - from: noise2
      to: math_non_timeslice
      input_index: '1'
    topology:
      operator_count: 7
      connection_count: 5
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: noise1 and noise2 are both non-timeslied and have the same number
      of samples. So they are added sample-by-sample in math_non_timeslice.math_timeslice
      takes a timesliced CHOP and a non-time-sliced CHOP by taking a slice of the
      non-timesliced CHOP (at the current frame, seen by turning on Timebar on noise4's
      viewer.) and combines the two together.
  - example_name: example9
    operators:
    - name: constant
      type: CHOP:constant
      role: input
      parameters:
        const0name: tx
        const0value: 0.2
        const1name: ty
        const1value: 0.3
        const2name: tz
        const2value: 0.4
    - name: math_scopeX
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 3
        torange2: 10
        scope: tx
    - name: math_scopeY
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 3
        torange1: 5
        torange2: 6
        scope: ty
    - name: math_scopeZ
      type: CHOP:math
      role: output
      parameters:
        pageindex: 3
        torange1: 99
        torange2: 100
        scope: tz
    - name: math_chanIndex
      type: CHOP:math
      role: output
      parameters:
        pageindex: 2
    connections:
    - from: constant
      to: math_scopeX
      input_index: '0'
    - from: math_scopeX
      to: math_scopeY
      input_index: '0'
    - from: math_scopeY
      to: math_scopeZ
      input_index: '0'
    - from: constant
      to: math_chanIndex
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 4
    curator_text: You can apply a different range to each of 3 channels using 3 Math
      CHOPs and the Scope parameter on the Common page, which applies the operation
      to only channels you select.Scope is common on many CHOP filter operators.Another
      way to apply a different range per-channel is to use me.chanIndex in a parameter
      expression, which makes the expression get evaluated once per channel, where
      me.chanIndex is 0 for the first channel, 1 for the second channel and so on.   me.chanIndex
      is an index into the list [0, 5, 99].  chanIndex is available in about 15 CHOPs.
      Look at a CHOP's Class page to see if it's available for a particular CHOP.
  - example_name: example10
    operators:
    - name: math1
      type: CHOP:math
      role: processor
    - name: noise1
      type: CHOP:noise
      role: output
      parameters:
        period: 0.05
        amp: 1.2
        exporttable: noise1_export
    - name: timer1
      type: CHOP:timer
      role: input
      parameters:
        deferpars: 'on'
        length: 0.7
        cycle: 'on'
        callbacks: timer1_callbacks
        outcycle: 'on'
        timeslice: 'on'
        exportmethod: datname
    - name: trail1
      type: CHOP:trail
      role: output
      parameters:
        wlength: 2
        timeslice: 'on'
    - name: readMe2
      type: DAT:text
      role: isolated
      parameters:
        pageindex: 1
    - name: constant1
      type: CHOP:constant
      role: isolated
      parameters:
        const0name: volume
        const0value: 0.85
    - name: audioosci1
      type: CHOP:audioosci
      role: input
      parameters:
        frequency: 222
        timeslice: 'on'
    - name: audiodevout1
      type: CHOP:audiodevout
      role: processor
      parameters:
        bufferlength: 0.25
        volume: 0.29
        cookalways: 'off'
        timeslice: 'on'
    - name: noise1_export
      type: DAT:table
      role: isolated
    - name: timer1_callbacks
      type: DAT:text
      role: isolated
    connections:
    - from: audioosci1
      to: math1
      input_index: '0'
    - from: timer1
      to: noise1
      input_index: '0'
    - from: audiodevout1
      to: trail1
      input_index: '0'
    - from: math1
      to: audiodevout1
      input_index: '0'
    topology:
      operator_count: 10
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: With abrupt volume changes, audio will pop.Listen to audiodevout1.
      Yank the slider of constant1 up and down rapidly. The audio tone will pop when
      the value changes because the sine wave changes value abruptly when the volume
      changes from one frame to the next.On the Math CHOP, turn on "Interp Pars per
      Sample". Yank the slider around again. The audio does not pop.The timeline steps
      forward about 1/60 second every time step. Parameters get sampled once oer time
      step.  In that time, about 735 audio samples play (44,100 samples per second
      times 1/60 second). With this Math CHOP option on, the Math CHOP's Multiply
      parameter is interpolated from the previous frame's value to the current value,
      in 735 steps in this case, and multipied by the 735 audio samples.
- operator_type: mergeCHOP
  examples:
  - example_name: example1
    operators:
    - name: constant1
      type: CHOP:constant
      role: input
      parameters:
        const0value: 1
    - name: constant2
      type: CHOP:constant
      role: input
      parameters:
        const0value: 2
    - name: constant3
      type: CHOP:constant
      role: input
      parameters:
        const0value: 3
    - name: constant4
      type: CHOP:constant
      role: input
      parameters:
        const0value: 4
    - name: merge_chops
      type: CHOP:merge
      role: output
    connections:
    - from: constant1
      to: merge_chops
      input_index: '0'
    - from: constant2
      to: merge_chops
      input_index: '1'
    - from: constant3
      to: merge_chops
      input_index: '2'
    - from: constant4
      to: merge_chops
      input_index: '3'
    topology:
      operator_count: 5
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: Merging multiple channels into 1 CHOP.
  - example_name: example2
    operators:
    - name: constant5
      type: CHOP:constant
      role: input
      parameters:
        const0value: 1
    - name: constant6
      type: CHOP:constant
      role: input
      parameters:
        const0value: 2
    - name: constant7
      type: CHOP:constant
      role: input
      parameters:
        const0value: 3
    - name: constant8
      type: CHOP:constant
      role: input
      parameters:
        const0value: 4
    - name: merge_rename_duplicate_named_inputs
      type: CHOP:merge
      role: output
    connections:
    - from: constant5
      to: merge_rename_duplicate_named_inputs
      input_index: '0'
    - from: constant6
      to: merge_rename_duplicate_named_inputs
      input_index: '1'
    - from: constant7
      to: merge_rename_duplicate_named_inputs
      input_index: '2'
    - from: constant8
      to: merge_rename_duplicate_named_inputs
      input_index: '3'
    topology:
      operator_count: 5
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: If multiple channels of the same name are  merged, you can automatically
      give them unique names using the Duplicate Names options.
  - example_name: example3
    operators:
    - name: constant10
      type: CHOP:constant
      role: input
      parameters:
        const0value: 1
    - name: constant11
      type: CHOP:constant
      role: input
      parameters:
        const0value: 2
    - name: constant12
      type: CHOP:constant
      role: input
      parameters:
        const0value: 3
    - name: constant13
      type: CHOP:constant
      role: input
      parameters:
        const0value: 4
    - name: merge_keep_first_duplicate_name
      type: CHOP:merge
      role: output
      parameters:
        duplicate: first
    connections:
    - from: constant10
      to: merge_keep_first_duplicate_name
      input_index: '0'
    - from: constant11
      to: merge_keep_first_duplicate_name
      input_index: '1'
    - from: constant12
      to: merge_keep_first_duplicate_name
      input_index: '2'
    - from: constant13
      to: merge_keep_first_duplicate_name
      input_index: '3'
    topology:
      operator_count: 5
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: This allows you to keep only the first of the duplicate named channels
      being merged.
  - example_name: example4
    operators:
    - name: lfo1
      type: CHOP:lfo
      role: input
      parameters:
        timeslice: 'on'
    - name: beat1
      type: CHOP:beat
      role: input
      parameters:
        playmode: locked
        timeslice: 'on'
    - name: constant9
      type: CHOP:constant
      role: input
    - name: merge_different_inputs
      type: CHOP:merge
      role: output
    connections:
    - from: constant9
      to: merge_different_inputs
      input_index: '0'
    - from: lfo1
      to: merge_different_inputs
      input_index: '1'
    - from: beat1
      to: merge_different_inputs
      input_index: '2'
    topology:
      operator_count: 4
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: You can merge inputs from a  variety of CHOPs.
  - example_name: example5
    operators:
    - name: wave1
      type: CHOP:wave
      role: input
      parameters:
        pageindex: 3
        period: 5
    - name: noise1
      type: CHOP:noise
      role: input
      parameters:
        pageindex: 3
        left: cycle
        right: cycle
    - name: noise2
      type: CHOP:noise
      role: input
      parameters:
        pageindex: 3
        type: brownian
        seed: 2
        left: cycle
        right: cycle
    - name: merge_timeslice_on
      type: CHOP:merge
      role: output
      parameters:
        pageindex: 1
        timeslice: 'on'
    - name: merge_non_timeslice
      type: CHOP:merge
      role: output
    connections:
    - from: noise1
      to: merge_timeslice_on
      input_index: '0'
    - from: noise2
      to: merge_timeslice_on
      input_index: '1'
    - from: wave1
      to: merge_timeslice_on
      input_index: '2'
    - from: noise1
      to: merge_non_timeslice
      input_index: '0'
    - from: noise2
      to: merge_non_timeslice
      input_index: '1'
    - from: wave1
      to: merge_non_timeslice
      input_index: '2'
    topology:
      operator_count: 5
      connection_count: 6
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: You can merge non timesliced channels that have multiple samples.
      You can also merge non timesliced channels, then apply timeslicing to them.
- operator_type: midiinCHOP
  examples:
  - example_name: example1
    operators:
    - name: map
      type: DAT:table
      role: isolated
      parameters:
        rows: 5
        cols: 7
    - name: base1
      type: COMP:base
      role: isolated
      parameters:
        pageindex: 3
    - name: midiin1
      type: CHOP:midiin
      role: isolated
      parameters:
        channel: 1-16
        legacypattern: 'on'
        timeslice: 'on'
    - name: pattern1
      type: CHOP:pattern
      role: isolated
      parameters:
        phase: 0.653543
        amp: 3.81102
    - name: chopexec1
      type: DAT:chopexec
      role: isolated
      parameters:
        chop: midiin1
    connections: []
    topology:
      operator_count: 5
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This uses a mapping table to change parameters based on MIDI controller
      messages.First, you need a MIDI device attached. Use Dialogs -> MIDI Device
      Mapper to Create New Mapping, and select your device from the menu under In
      Device.Make sure the Device ID parameter of the MIDI In CHOP matches the ID
      of the MIDI Device Mapper.  (See wiki and Dialogs -> MIDI Device Mapper)Then
      when you move your controllers on your MIDI device, new channels will appear
      in midiin1.There are several ways to map MIDI messages to parameters, but here,
      add a row in 'map' for each controller, where the first column contains a name
      combining the channel and controller numbers as shown. ... ch1ctrl3 for example.The
      "op" column is the path to the operator to modify, and the "par" column is the
      parameter name to change. The "channel" and "ctrl" columns are not used in this
      example.The 0-127 range of the MIDI controller value is re-ranged to 0-1, then
      to the "low" to "high" range, then written to the parameter.You can change built-in
      parameters (pattern1) or custom parameters (base1).This deals with MIDI controllers.
      MIDI Note events and other MIDI message types can be handled in a similar way.
  - example_name: example2
    operators:
    - name: prep
      type: CHOP:null
      role: output
      parameters:
        pageindex: 1
        exportmethod: datname
        exporttable: prep_export
    - name: base1
      type: COMP:base
      role: isolated
      parameters:
        pageindex: 3
    - name: bind1
      type: CHOP:bind
      role: output
      parameters:
        pageindex: 1
        callbacks: bind1_callbacks
        exportmethod: datname
    - name: math1
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 2
        fromrange2: 127
    - name: midiin1
      type: CHOP:midiin
      role: input
      parameters:
        channel: 1-16
        legacypattern: 'on'
        timeslice: 'on'
    - name: pattern1
      type: CHOP:pattern
      role: isolated
    - name: prep_export
      type: DAT:table
      role: isolated
    - name: bind1_callbacks
      type: DAT:text
      role: isolated
    connections:
    - from: math1
      to: prep
      input_index: '0'
    - from: math1
      to: bind1
      input_index: '0'
    - from: midiin1
      to: math1
      input_index: '0'
    topology:
      operator_count: 8
      connection_count: 3
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: The more direct (and less flexible) way to map MIDI channel values
      to parameters is via exporting or by channel references, or binding bia the
      Bind CHOP.Note that the Export Method should be by channel name (Common page
      of "prep").(See Bind CHOP for the binding procedure.)
- operator_type: midiinmapCHOP
  examples:
  - example_name: example1
    operators:
    - name: midiinmap1
      type: CHOP:midiinmap
      role: isolated
      parameters:
        timeslice: 'on'
    connections: []
    topology:
      operator_count: 1
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: The MIDI In Map CHOP is for pre-configured devices you see in Dialogs
      -> MIDI Device Mapper.  Otherwise you can simply use the MIDI In CHOP.You can
      process MIDI events with the  MIDI In DAT as well. Use the MIDI Device Mapper
      dialog (in Dialogs dropdown) to select your device. Be sure that the Device
      ID in the MIDI In Map CHOP matches the ID declared in the MIDI Device Mapper
      Dialog.Also, make sure that your devices are plugged in before you open TouchDesigner.
- operator_type: mouseinCHOP
  examples:
  - example_name: example1
    operators:
    - name: findMouse
      type: COMP:base
      role: isolated
    connections: []
    topology:
      operator_count: 1
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This gets the mouse position even when the cursor is outside the
      TouchDesigner window. Ironically it doesn't use the Mouse In CHOP.  It runs
      on WIndows-only it appears.The Nouse In CHOP works specigivally with TouchDesigner
      windows.
- operator_type: mouseoutCHOP
  examples:
  - example_name: example1
    operators:
    - name: hold1
      type: CHOP:hold
      role: processor
      parameters:
        timeslice: 'on'
    - name: math1
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 3
        chopop: add
        match: name
        interppars: 'on'
    - name: math2
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 2
        fromrange1: -1
        fromrange2: 1
    - name: null1
      type: CHOP:null
      role: processor
    - name: null2
      type: CHOP:null
      role: processor
    - name: timer1
      type: CHOP:timer
      role: input
      parameters:
        deferpars: 'on'
        length: 1
        ondone: reinit
        callbacks: timer1_callbacks
        timeslice: 'on'
        exportmethod: datname
    - name: trail1
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: button1
      type: COMP:button
      role: input
      parameters:
        label: '"Click me to draw an eight"'
        scaletofit: onlyshrink
        w: 150
        h: 40
    - name: lookup1
      type: CHOP:lookup
      role: processor
    - name: mousein1
      type: CHOP:mousein
      role: input
      parameters:
        output: normal
        timeslice: 'on'
        exportmethod: datname
    - name: pattern1
      type: CHOP:pattern
      role: input
      parameters:
        phase: -0.5
        amp: 0.08
        channelname: tx
    - name: pattern2
      type: CHOP:pattern
      role: processor
      parameters:
        wavetype: cos
        numcycles: 2
        phase: -0.75
        amp: 0.07
        channelname: ty
        combine: append
    - name: chopexec1
      type: DAT:chopexec
      role: isolated
      parameters:
        chop: null1
        offtoon: 'on'
    - name: mouseout1
      type: CHOP:mouseout
      role: output
      parameters:
        cookalways: 'off'
    - name: timer1_callbacks
      type: DAT:text
      role: isolated
    connections:
    - from: math2
      to: hold1
      input_index: '0'
    - from: null1
      to: hold1
      input_index: '1'
    - from: hold1
      to: math1
      input_index: '0'
    - from: lookup1
      to: math1
      input_index: '1'
    - from: mousein1
      to: math2
      input_index: '0'
    - from: button1/out1
      to: null1
      input_index: '0'
    - from: timer1
      to: null2
      input_index: '0'
    - from: lookup1
      to: trail1
      input_index: '0'
    - from: null2
      to: lookup1
      input_index: '0'
    - from: pattern2
      to: lookup1
      input_index: '1'
    - from: pattern1
      to: pattern2
      input_index: '0'
    - from: math1
      to: mouseout1
      input_index: '0'
    topology:
      operator_count: 15
      connection_count: 12
      has_parallel_paths: true
      max_chain_length: 5
    curator_text: The Mouse Out CHOP forces the mouse position and button status to
      be driven from TouchDesigner using the incoming CHOP channels.On clicking the
      button, the current mouse position will be stored using a Hold CHOP. Also a
      Timer CHOP starts, which acts as a lookup index for the Lookup CHOP. Its output
      is multiplied (using a Math CHOP) with the current mouse position, and the new
      mouse position is sent to the Mouse Out CHOP. The Timer CHOP is re-initialized
      when it done.This example doesn't work well with multi-monitors in general.
- operator_type: noiseCHOP
  examples:
  - example_name: example1
    operators:
    - name: noise_random
      type: CHOP:noise
      role: isolated
      parameters:
        type: random
    connections: []
    topology:
      operator_count: 1
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This is random generated noise.
  - example_name: example2
    operators:
    - name: null1
      type: CHOP:null
      role: output
      parameters:
        exporttable: null1_export
    - name: speed1
      type: CHOP:speed
      role: processor
      parameters:
        timeslice: 'on'
    - name: constant1
      type: CHOP:constant
      role: input
      parameters:
        const0value: 1
    - name: null1_export
      type: DAT:table
      role: isolated
    - name: noise_animated
      type: CHOP:noise
      role: isolated
    connections:
    - from: speed1
      to: null1
      input_index: '0'
    - from: constant1
      to: speed1
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: Animating the seed creates motion in the noise.
  - example_name: example3
    operators:
    - name: trail1
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: noise_timeslice
      type: CHOP:noise
      role: input
      parameters:
        timeslice: 'on'
    connections:
    - from: noise_timeslice
      to: trail1
      input_index: '0'
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: Timesliced noise is useful if you're working with realtime signals.The
      Trail CHOP shows its time history.See "TimeSlicing" in the wikil. If you are
      dropping frames, it will output multiple frames of samples per-cook, which is
      why the time history is smooth.Middle-mouse click on the node to see how many
      frames of samples it is outputting.The Trigger CHOP can also output a full waveform
      or a single sample.
