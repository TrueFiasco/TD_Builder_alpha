    curator_text: This converts from Polar (radius/lat/long) to Cartesian (rectangular
      orthogonal xyz) coordinates. This example represents the approx latitude-longitude
      of Toronto, Canada.You represent your polar coordinate in any way you want.
      Here, starting from the origin, you start with a point on the x axis at x=2
      assuming your radius is a sphere of size 2.Then you rotate in z (latitude) to
      bring it up to 45 degrees (using the right-hand rule with thumb pointing along
      +z axis). Then you rotate in y (longitude) -73 degrees.You pass that to the
      Transform TOPs and you have to set their implied transform order to Translate
      Rotate Scale (as you did above), and your rotate order to Rz Ry Rx.On the Output
      page you indicate you want to output the Position.The bottom gives the flight
      path from YYZ to Narita. I gets the xyz of each, interpolates 20 points which
      give a straight line through the earth, pushes those points to radius 1, then
      raises the points while in flight.
