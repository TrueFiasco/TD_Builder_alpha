    curator_text: 'poemPlayer takes a list of phrases (one phrases per sequential
      parameter block) that can overlap in time - at most two phrases at a time. You
      can interactively move/trim/extend any phrase.Click/scrub and release the timeline
      slider to see it operating. Or click above the slider to pause/play.Each segment
      has a rise time and fall time that fades-on and -off the lines of text. Inside
      poemPlayer, this is accomplished with the Trigger CHOP exported to the Text
      TOP.It splits the phrases into two groups, the even segments and the odd segments
      appearing as two rows of red text strings. Each group goes to one Timer CHOP.Clicking
      on the slider or above it will scrub or play the timers by setting .masterSEconds
