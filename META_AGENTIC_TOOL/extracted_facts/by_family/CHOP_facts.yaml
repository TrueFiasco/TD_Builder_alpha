        nval: 9
    connections:
    - from: wave2
      to: shuffle5
      input_index: '0'
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: This example forms a new channel based every 9 samples of the  input
      value. You can follow the sine waves values, starting on chan0, going left to
      right, then continuing to chan1, going left to right, all  the way to chan9.
- operator_type: slopeCHOP
  examples:
  - example_name: example1
    operators:
    - name: slope1
      type: CHOP:slope
      role: output
      parameters:
        timeslice: 'on'
    - name: slope4
      type: CHOP:slope
      role: processor
      parameters:
        timeslice: 'on'
    - name: speed1
      type: CHOP:speed
      role: processor
      parameters:
        limittype: loop
        max: 10000
        timeslice: 'on'
    - name: speed3
      type: CHOP:speed
      role: processor
      parameters:
        limittype: loop
        max: 100000
        timeslice: 'on'
    - name: constant1
      type: CHOP:constant
      role: input
      parameters:
        const0value: 1.5
    - name: constant2
      type: CHOP:constant
      role: input
    - name: current_fps
      type: CHOP:null
      role: output
    connections:
    - from: speed1
      to: slope1
      input_index: '0'
    - from: speed3
      to: slope4
      input_index: '0'
    - from: constant1
      to: speed1
      input_index: '0'
    - from: constant2
      to: speed3
      input_index: '0'
    - from: slope4
      to: current_fps
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 5
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: These examples calculate the slope of the Speed CHOPs, whose slope
      we have set using a Constant CHOP.They show that the rate you feed into the
      Speed CHOP can be extracted back using a Slope CHOP.In math-talk, the derivative
      of the integral of a function is the function.
  - example_name: example2
    operators:
    - name: null1
