      input_index: '1'
    topology:
      operator_count: 31
      connection_count: 17
      has_parallel_paths: true
      max_chain_length: 7
    curator_text: Here is an example of an LED tape PixelMapping setup that uses SOPs
      to define where from the "raster" RGB values should be sampled from. The key
      to performant PixelMapping is controlling what does and does not cook.  In this
      case, none of the SOPs cook and there is only one TOPto CHOP.There is also a
      rough preview system setup where a circle (representing a single LED) is being
      instanced using the positions of the LEDs obtained from the SOPTo CHOP and the
      color that is being send out to the LED controller.
  - example_name: example4
