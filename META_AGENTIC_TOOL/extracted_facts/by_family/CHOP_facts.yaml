    curator_text: This example shows how you can take a snapshot of an incoming value.THe
      Hold CHOP does something similar, without needing a script.
  - example_name: example7
    operators:
    - name: null2
      type: CHOP:null
      role: processor
    - name: trail1
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: ADVISOR
      type: DAT:text
      role: isolated
    - name: mousein
      type: CHOP:mousein
      role: input
      parameters:
        posyname: '""'
        timeslice: 'on'
    - name: keyboardin1
      type: CHOP:keyboardin
      role: input
    - name: constant_offset
      type: CHOP:constant
      role: processor
      parameters:
        const0name: tx
        const0value: -74.4792
    - name: math_boost_mouse
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 2
        torange2: 100
    connections:
    - from: constant_offset
      to: null2
      input_index: '0'
    - from: null2
      to: trail1
      input_index: '0'
    - from: math_boost_mouse
      to: constant_offset
      input_index: '0'
    - from: keyboardin1
      to: constant_offset
      input_index: '1'
    - from: mousein
      to: math_boost_mouse
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 5
      has_parallel_paths: false
      max_chain_length: 5
    curator_text: You can offset a Constant CHOP's output value by changes to the
      values coming in Input 1.Hold down the "1" key and then move the mouse in x.While
      "1" is down, any change to the first input  will be added to the output of the
      CHOP.When the "1" key is released, the Constant CHOP output value is stuffed
      into the parameter value.The result is smooth "relative value" changes.There
      are a few other ways to do this in CHOPs and DATs.
  - example_name: example8
    operators:
    - name: base1
      type: COMP:base
      role: input
      parameters:
        pageindex: 3
    - name: null1
      type: CHOP:null
      role: output
    connections:
    - from: base1/out1
      to: null1
      input_index: '0'
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: A lot of people use a Constant CHOP to hold their control data.
      But custom parameters are much better in several ways.- readable labels- default
      values (easy to reset to default via RMB)- slider goes in any range, not just
      0-1- min/max clamping- integer controls can be strictly integers- toggles and
      pulses too, menus/strings too- multi-pages better- easy to re-order- section
      dividers- more standard way to set values with pythonTo get it outputting channels,
      use a Parameter CHOP inside.We love the Constant CHOP but maybe it's time to
      switch!
- operator_type: copyCHOP
  examples:
  - example_name: example1
    operators:
    - name: copy1
      type: CHOP:copy
      role: processor
    - name: math1
      type: CHOP:math
      role: processor
      parameters:
        chopop: mul
    - name: pattern1
      type: CHOP:pattern
      role: input
      parameters:
        pageindex: 1
        wavetype: pulse
        length: 10000
        numcycles: 3.54
        phase: 0.66
    - name: pattern2
      type: CHOP:pattern
      role: input
      parameters:
        pageindex: 1
        numcycles: 10
        amp: 2
    - name: pattern3
      type: CHOP:pattern
      role: input
      parameters:
        numcycles: 0.5
    - name: pattern4
      type: CHOP:pattern
      role: input
      parameters:
        pageindex: 1
        numcycles: 10
        amp: 2
    - name: pattern5
      type: CHOP:pattern
      role: output
      parameters:
        pageindex: 1
        numcycles: 0.5
        combine: multiply
    - name: merge_viewMe
      type: CHOP:merge
      role: output
    connections:
    - from: pattern1
      to: copy1
      input_index: '0'
    - from: math1
      to: copy1
      input_index: '1'
    - from: pattern2
      to: math1
      input_index: '0'
    - from: pattern3
      to: math1
      input_index: '1'
    - from: pattern4
      to: pattern5
      input_index: '0'
    - from: pattern1
      to: merge_viewMe
      input_index: '0'
    - from: copy1
      to: merge_viewMe
      input_index: '1'
    topology:
      operator_count: 8
      connection_count: 7
      has_parallel_paths: true
      max_chain_length: 4
    curator_text: The Copy CHOP produces multiple copies of the second input along
      the timeline of the first input.The second input is copied at the first input's
      trigger points only. A trigger point occurs whenever the first input's channel
      crosses the Copy CHOP's Trigger Threshold value. In the node "merge_viewMe"
      you can see the pulse triggering the copies.
  - example_name: example2
    operators:
    - name: copy1
      type: CHOP:copy
      role: output
      parameters:
        output: accum
    - name: copy2
      type: CHOP:copy
      role: output
    - name: merge1
      type: CHOP:merge
      role: processor
    - name: merge2
      type: CHOP:merge
      role: processor
    - name: merge3
      type: CHOP:merge
      role: processor
    - name: comment1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: comment2
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: pattern1
      type: CHOP:pattern
      role: input
      parameters:
        wavetype: pulse
        length: 10000
        numcycles: 3.54
        phase: 0.66
        channelname: triggerChannel
    - name: pattern4
      type: CHOP:pattern
      role: input
      parameters:
        wavetype: square
        numcycles: 1.25
        phase: -1.14
    - name: pattern5
      type: CHOP:pattern
      role: input
      parameters:
        wavetype: pulse
        length: 10000
        numcycles: 2
        phase: 0.46
    - name: pattern6
      type: CHOP:pattern
      role: input
      parameters:
        pageindex: 1
        numcycles: 10
        amp: 2
    - name: pattern7
      type: CHOP:pattern
      role: processor
      parameters:
        pageindex: 1
        numcycles: 0.5
        combine: multiply
    - name: pattern8
      type: CHOP:pattern
      role: input
      parameters:
        pageindex: 1
        wavetype: tri
        phase: -0.75
        fromrange1: -1
        fromrange2: 1
        channelname: chan2
    - name: pattern9
      type: CHOP:pattern
      role: input
      parameters:
        wavetype: pulse
        length: 10000
        numcycles: 4
        phase: -0.61
        channelname: chan2
    - name: annotate1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        includeinorder: 'on'
    - name: annotate2
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        includeinorder: 'on'
    - name: pattern10
      type: CHOP:pattern
      role: input
      parameters:
        pageindex: 1
        wavetype: square
        numcycles: 3.12
        channelname: chan3
    - name: pattern11
      type: CHOP:pattern
      role: input
      parameters:
        pageindex: 1
        numcycles: 10
        amp: 2
    - name: pattern12
      type: CHOP:pattern
      role: processor
      parameters:
        pageindex: 1
        numcycles: 0.5
        combine: multiply
    connections:
    - from: pattern1
      to: copy1
      input_index: '0'
    - from: merge1
      to: copy1
      input_index: '1'
    - from: merge3
      to: copy2
      input_index: '0'
    - from: merge2
      to: copy2
      input_index: '1'
    - from: pattern12
      to: merge1
      input_index: '0'
    - from: pattern4
      to: merge1
      input_index: '1'
    - from: pattern7
      to: merge2
      input_index: '0'
    - from: pattern8
      to: merge2
      input_index: '1'
    - from: pattern10
      to: merge2
      input_index: '2'
    - from: pattern5
      to: merge3
      input_index: '0'
    - from: pattern9
      to: merge3
      input_index: '1'
    - from: pattern6
      to: pattern7
      input_index: '0'
    - from: pattern11
      to: pattern12
      input_index: '0'
    topology:
      operator_count: 19
      connection_count: 13
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: The Copy CHOP produces multiple copies of the second input along
      the timeline of the first input.The second input is copied at the first input's
      trigger points only. A trigger point occurs whenever the first input's channel
      crosses the Copy CHOP's Trigger Threshold value. The Copy CHOP can copy channels
      in two different modes:One Channel per Template Channel - Each output channel
      is a channel from the first input combined with the corresponding channel from
      the second input.One Channel per Copy Channel - Each output channel is a channel
      from the second input, with copies triggered by every channel of the first input.
  - example_name: example3
    operators:
    - name: copy1
      type: CHOP:copy
      role: processor
      parameters:
        output: accum
        threshold: 0.5
    - name: merge_viewMe
      type: CHOP:merge
      role: output
    - name: pattern_data
      type: CHOP:pattern
      role: input
      parameters:
        numcycles: 10
        amp: 2
        channelname: dataChannel
    - name: pattern_triggers
      type: CHOP:pattern
      role: input
      parameters:
        wavetype: tri
        numcycles: 3
        channelname: triggerChannel
    connections:
    - from: pattern_triggers
      to: copy1
      input_index: '0'
    - from: pattern_data
      to: copy1
      input_index: '1'
    - from: pattern_triggers
      to: merge_viewMe
      input_index: '0'
    - from: copy1
      to: merge_viewMe
      input_index: '1'
    topology:
      operator_count: 4
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: The Copy CHOP copies the values of "dataChannel" additively onto
      the timeline of "triggerChannel".In this snippet a copy occurs whenever the
      triggerChannel crosses the 0.5 value. You can see this in the node "merge_viewMe".
  - example_name: example4
    operators:
    - name: copy1
      type: CHOP:copy
      role: processor
      parameters:
        pageindex: 1
        output: accum
        stamp: 'on'
        copy0param: copySwitch
    - name: switch1
      type: CHOP:switch
      role: processor
    - name: comment1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: comment2
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: pattern1
      type: CHOP:pattern
      role: input
      parameters:
        wavetype: pulse
        numcycles: 6.35
        phase: 0.66
        channelname: triggerChannel
    - name: pattern2
      type: CHOP:pattern
      role: input
      parameters:
        pageindex: 1
        length: 100
        numcycles: 0.5
        channelname: dataChannel
    - name: pattern3
      type: CHOP:pattern
      role: input
      parameters:
        pageindex: 1
        wavetype: square
        length: 100
        numcycles: 3.17
        phase: 0.24
        fromrange1: -1
        fromrange2: 1
        channelname: dataChannel
    - name: merge_viewMe
      type: CHOP:merge
      role: output
    connections:
    - from: pattern1
      to: copy1
      input_index: '0'
    - from: switch1
      to: copy1
      input_index: '1'
    - from: pattern2
      to: switch1
      input_index: '0'
    - from: pattern3
      to: switch1
      input_index: '1'
    - from: pattern1
      to: merge_viewMe
      input_index: '0'
    - from: copy1
      to: merge_viewMe
      input_index: '1'
    topology:
      operator_count: 8
      connection_count: 6
      has_parallel_paths: true
      max_chain_length: 4
    curator_text: The Copy CHOP copies the values of "dataChannel" additively onto
      the timeline of "triggerChannel".Stamping is enabled on the Copy CHOP. This
      means its second input is recooked for every copy. The Stamp parameters are
      also re-calculated for each copy.In this example the parameter "copySwitch"
      has a Python expression which makes it zero if me.copyIndex is even, and 1 when
      it's odd. This parameter is used in the upstream Switch CHOP, which has its
      index parameter set to the Python expression:fetchStamp("copySwitch",0)The result
      is for every copy the Switch CHOP outputs a different input.In the node "merge_viewMe"
      you can see the pulse triggering the copies.
