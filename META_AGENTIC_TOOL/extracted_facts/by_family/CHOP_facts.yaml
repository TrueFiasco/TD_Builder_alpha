    curator_text: 'The Extend CHOP sets the "extend conditions" of a CHOP, which determines
      what values you get when sampling the CHOP before or after its interval. To
      illustrate this we''re sampling the same CHOP (pattern1) 5 times, each time
      giving pattern1 CHOP different extend conditions. We will sample pattern1 before,
      during, and after its interval, by driving a Lookup CHOP from -2 to 3 (while
      the Lookup CHOP''s normal range is 0-1). This way we can see the extend conditions
      visually in each Trail CHOP:(To zoom the graphs of the Extend CHOPs, with Viewer
      Active, click/drag left-right with middle mouse.)trail1: extend conditions are
      set to cycle, so the pattern loops.trail2: extend conditions are set to hold.
      So anything sampled before the interval is holding the first sample of the pattern1
      CHOP, (in this case 0), and anything sampled after the interval is holding the
      last sample of the pattern1 CHOP, (in this case 0).Tip: change the "phase" parameter
      of pattern1 to see the effect in trail2.trail3: extend left is set to hold.
      Extend right is set to mirror. trail4: extend left is set to a value of -1,
      and extend right is set to cycle.trail5: extend left is set to hold, extend
      right is set to Slope, so sampling after the interval of pattern1 will continue
      the slope of pattern1.'
