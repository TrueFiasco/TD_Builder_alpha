      of transforming the 3D Components, like the Bullet Solver COMP which transforms
      each moving object.The Compute menu set to Distance will give the straight-line
      distance from the origin of one object to the origin of the other (or the world
      origin).The Object CHOP ignores the SOPs (including Transform SOPs) inside the
      objects - they are irrelevant.'
