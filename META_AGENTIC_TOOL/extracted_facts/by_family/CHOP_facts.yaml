      input_index: '1'
    - from: constant2
      to: switch1
      input_index: '2'
    - from: constant3
      to: switch1
      input_index: '3'
    - from: rename1
      to: mathMult
      input_index: '0'
    - from: hold1
      to: mathMult
      input_index: '1'
