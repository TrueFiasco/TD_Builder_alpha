    curator_text: Look at the range of each Pattern CHOP feeding the Function CHOPs.These
      deal with the triginomic functions - the basic sine, cosine and tangent functions.You
      by default give it an angle in degrees, and if the radius is 1, it gives you
      the y value for sin, the x value for cos, and the y/x value for tangent. function_sin_radians
      shows that by changing hte Angle Units parameter, you can give it not degrees
      but radians (remember there are 3.14 radians in a half-circle, 6.28 for a whole
      circle).or when Angle Units is set to Cycles, that 1 means the same thing as
      360 degrees, a full rotation.The inverse cos, invere sin and inverse tan outputs
      an angle. Think of it this way... if the sine is .5, then what is the angle?Arc
      tangents (atan and atan2) are more useful when you want to get out an angle...
      if you have point x,y, and you feed it to atan2, what is the angle ... play
      with constant_x and constant_y.
