      input_index: '0'
    - from: constant_all_channels
      to: replace2
      input_index: '1'
    topology:
      operator_count: 3
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The Replace CHOP can be used to quickly delete channels (it can
      be faster than a Delete CHOP).To do this send all your channels to the second
      input, and send the channels you want to keep to the first input.
