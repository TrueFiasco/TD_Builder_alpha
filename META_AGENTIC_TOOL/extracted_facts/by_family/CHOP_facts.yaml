    curator_text: The Interpolate CHOP treats its multiple-inputs as keyframes and
      interpolates between them. The inputs are usually single-frame CHOP channels
      like those produced by a Constant CHOP. Here each Constant CHOP is not always
      located at frame 1 of the timeline. constant2 has a start/end time set to frame
      500, and constant3 is at frame 1000. Middle-click on the node to see these numbers
      in the pop-up info.The Interpolate CHOP first sorts the input CHOPs in time
      (without shifting them) and interpolates between them to fill the gaps.The Constant
      CHOPs have their 'start' parameter set to different values, so they can be sorted
      in time. (See the Channel page of their parameter window)The number of channels
      in the output of the Interpolate CHOP is the same as the number of channels
      in the first input. Notice each Interpolate CHOP is using a different interpolation
