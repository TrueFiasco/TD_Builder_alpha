    curator_text: This picks out 2 specific channels and changing "chan" to "d" in
      their names.
  - example_name: example4
    operators:
    - name: constant1
      type: CHOP:constant
      role: isolated
      parameters:
        const0name: chan2
        const0value: 1
        const1name: chan3
        const1value: 2
        const2name: v3
        const2value: 3
        const3name: v4
        const3value: 4
    - name: select_channel
      type: CHOP:select
