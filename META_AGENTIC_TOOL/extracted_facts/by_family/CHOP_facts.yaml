    curator_text: Try the various waveforms (Type) and various Base Frequencies. (First
      un-bypass the Audio Device Out CHOP.)Try -2, -1, 0, 1, 2 in the Constant CHOP.
      Each step is an octave relative to the Base Frequency.Then try 0, 1/12, 2/12
      etc in the Constant CHOP - each step of 1/12 is a "semitone" higher than its
      predecessor (one note up on a conventional keyboard). 12/12 = 1 is an octave,
      helping to de-mystify the 12-note scale.7/12 is 7 semitones, called a "fifth",
      and is almost 50% higher in frequency than the Base Frequency, giving it a pleasant
      relation to the base frequency, and pleasant to the ear.Connecting lag1 to the
      oscillator first input gives a 2-octave glissando.
