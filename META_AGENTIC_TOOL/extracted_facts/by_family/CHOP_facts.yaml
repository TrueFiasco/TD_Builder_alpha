      type: COMP:slider
      role: isolated
      parameters:
        label: '"SOUND SOURCE"'
        value0: 0.777778
        value1: 0.5
        w: 100
        h: 20
        top: ./back
        crop: 'on'
        relpath: externaltox
    - name: audiorender1_mappingtable
      type: DAT:table
      role: isolated
    connections:
    - from: audiorender1
      to: audiodyna1
      input_index: '0'
    - from: audiodyna1
      to: audiodevout1
      input_index: '0'
    - from: audiofilein2
      to: audiorender1
      input_index: '0'
    topology:
      operator_count: 16
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: The Audio Render CHOP uses Simulation mode, which unlike Simple
      Positional allows for multiple sources and scene meshes (POPs/SOPs with multi-polygons).Enable
      audiodevout1 and select your desired device to hear the rendered audio.On the
      Audio Render CHOP, the SceneMesh has a transmission of 0 (ie. 0%), allowing
      for no transmission of sound through the wall.The Geometry component Wall contains
      a single Rectangle POP that forms a wall and is tied into the simulation on
      the Meshes page block 0.The Geometry component Source1 is positioned on a circular
      path that can be controlled using the SOUND SOURCE slider.  It is tied into
      the simulation as a Source on the Audio Render page block 0.As it passes beyond
      the wall, you can notice the effect the wall has on the sound when placed in
      between the listener and source. You can also play around with the absorption,
      scattering, and transmission values (on the Meshes page) to see how that effects
      the sound.Boundary surrounds the entire scene and helps demonstrate how reflections
      behave within the simulation. It is tied into the simulation on the Meshes page
      block 1.Baking is enabled for optimization purposes. Baking significantly lowers
      computation time for reflections and therefore will provide significantly lower
      cook times. Reflection Bake Mode is set to Auto, which means whenever there
      is a change in the simulation that require a re-bake, it will perform that.
      If playing around with a lot of parameters, it may be preferable to set to Off,
      or Manual mode, then bake as desired.To see the position of the baked probes
      in the camera, enable the display flag of datto1.
