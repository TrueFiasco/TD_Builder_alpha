        chops: set*
    connections:
    - from: join1
      to: transform1
      input_index: '0'
    - from: select_sets
      to: transform2
      input_index: '0'
    topology:
      operator_count: 14
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: '3 transforms are in set1 to set3.The Join CHOP puts them together
      as 3 samples of 16 transform channels.transform1 does a 180 degree rotation
      on all 3 of them, and outputs them in translate/rotate/scale format.geo1 instances
      them.select_sets merges them using set* pattern matching of node names (could
      have used set[1-3]).transform2 also does the 180 rotation on all sets.select_set1
      to select_set3 pulls them apart using pattern matching: see the expression in
      the Channel Names parameter.g1 to g3 are copies of each other - see their expression
      in the parameter Xform Matrix/CHOP/DAT.'
  - example_name: example8
    operators:
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
        xformmatrixop: transform1
    - name: geo2
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        pxform: 'on'
        xformmatrixop: transform2
    - name: transform1
      type: CHOP:transform
      role: input
      parameters:
        pageindex: 1
        inputoperation: input1input0
        tx: 4
        ty: -1.4
        rx: 30
        rz: 45
        operation: xformpageinput
        output: mat
    - name: transform2
      type: CHOP:transform
      role: input
      parameters:
        pageindex: 1
        inputoperation: input1input0
        ty: 2.2
        tz: -1.1
        ry: 90
        rz: 180
        operation: xformpageinput
        output: mat
    - name: transform_interpolate_tbd
