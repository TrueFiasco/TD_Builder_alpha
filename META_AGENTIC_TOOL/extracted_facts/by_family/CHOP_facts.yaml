      max_chain_length: 3
    curator_text: With Serial Timers, you can generate a curve that interpolates from
      the current value to the new values over the segment time Length.The column
      "v1" is not mapped to a parameter. It is output from the Timer CHOP as a channel.
      To do this, on the Segments page, in the parameter Columns to Custom Channels,
      you put the names of the columns to output as channels, in this case "v1". By
      default v1 will step to its new value at the start of a segment.To make it interpolate,
      select from the  Custom Channel Interpolation menu, for example, Linear to Value.With
      a 0-length first segment, its v1 determines the "initial value" of v1.
  - example_name: example8
