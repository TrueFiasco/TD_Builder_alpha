    curator_text: The Spring CHOP creates vibrations influenced by the input channels,
      as if a mass was attached to a spring.Input channels can either represent position
      or force. In this example the input represents position (the Spring CHOP's "input
      effect" parameter is set to "position").Now the Sping CHOP acts as if, for every
      channel, there is a mass at the end of a spring, affected by a distance from
      the actual position (the output of the channel at the previous frame) to the
      desired position (the input channel at the current frame). When the distance
      (output - input) is zero, there is no force and therefore no movement.
