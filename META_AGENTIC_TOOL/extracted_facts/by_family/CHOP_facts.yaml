        outsegpulse: 'on'
        outcumulativecount: seconds
        outrunningcount: seconds
        timeslice: 'on'
        exportmethod: datname
    - name: trail8
      type: CHOP:trail
      role: output
      parameters:
        wlength: 30
        timeslice: 'on'
        exportmethod: autoname
    - name: timecode8
      type: TOP:text
