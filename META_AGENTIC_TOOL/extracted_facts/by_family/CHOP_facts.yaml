    curator_text: 'Segments can be like back-to-back timers in one Timer CHOP. We
      call back-to-back timers "Serial Timers".Make a table with columns named like
      the parameter internal names: length, delay, cycle, ..., and put in some values
      for length or delay, etc.The units of length, delay etc is determnied by the
      Segment Units menu, the default is seconds.A segment is one timer per row, the
      first segment is numbered 0, starting at row 1 of the table.They replace the
      parameters temporarily.Click Start and watch a few times.If you go to the Segments
      page, you can press Previous Segment or Next Segment etc to jump ahead or back
      in time.'
