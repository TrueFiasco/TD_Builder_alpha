    curator_text: This initializes itself up as a 1000-sample CHOP, the same length
      as pattern1. It then creates a numpy array that is 1000 samples long, with values
      going from 0 to 1. It then creates a new channel with the 1000-sample ramp as
      its samples.Next it creates a new numpy array from the first channel of pattern1.Then
      it creates a new channel and tries to name the channel c1. Because c1 already
      exists it finds the next available channel name, c2 and names the new channel
      c2.  It then copie sthe numpy array to that new channel.
