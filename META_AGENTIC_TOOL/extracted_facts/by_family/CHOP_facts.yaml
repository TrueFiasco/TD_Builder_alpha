    curator_text: Four examples here.Unbypass videodevin1 first, and get you on camera.  It
      fits it to be 16x9 as some of the sloppy math of this assumes 16x9.top-left
      - estimates head position in 3D space and moves the virtual camera as if you
      are looking at the cube from different angles. Put render1 in a floating viewer
      near your line of sight when looking at your webcam.mid-left - a Rectangle TOP
      transformed with x, y, and rotate (rz) - purely 2D.Bottom left -  This uses
      the NVIDIA-provided face model. This network then transforms it to be placed
      over the video of your face.right - all the  face tracking points instanced
      as stars.
