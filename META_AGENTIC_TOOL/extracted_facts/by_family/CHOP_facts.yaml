      Press Begin Match.Timer CHOPs can trigger each other and implement state machine
      behavior.Most Timer CHOPs here initiate some action in another Timer CHOP using:(1)
      its "ready_pulse" channel is exported to the Initialize parameter on another
      Timer CHOP.(2a) its "done" channel is exported to a Start parameter on another
