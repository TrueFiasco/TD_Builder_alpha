      type: CHOP:clip
      role: output
    - name: render1
      type: TOP:render
      role: isolated
      parameters:
        uvunwrapcoordattrib: uv
        resolutionw: 1280
        resolutionh: 720
    - name: clipShot
      type: CHOP:clip
      role: output
    - name: humanoid
      type: COMP:fbx
      role: isolated
      parameters:
        callbacks: humanoid_callbacks
        animation: run
        playmode: outputfullrange
        parentshortcut: FBX
    - name: sequence
      type: DAT:table
      role: isolated
    - name: animation
      type: CHOP:importselect
      role: input
      parameters:
        pageindex: 1
        parent: humanoid
        animation: run
        playmode: outputfullrange
        timeslice: 'on'
    - name: clipPunch
      type: CHOP:clip
      role: output
    - name: animation1
      type: CHOP:importselect
      role: input
      parameters:
        pageindex: 1
        parent: humanoid
        animation: punch
        playmode: outputfullrange
        timeslice: 'on'
    - name: animation2
      type: CHOP:importselect
      role: input
      parameters:
        pageindex: 1
        parent: humanoid
        animation: shot
        playmode: outputfullrange
        timeslice: 'on'
    - name: clipblender1
      type: CHOP:clipblender
      role: input
      parameters:
        default: clipRun
        datlist: sequence
        xtrans: Humanoid_MaxToFilmbox_Root/Humanoid_Hips:tx
        ytrans: Humanoid_MaxToFilmbox_Root/Humanoid_Hips:ty
        ztrans: Humanoid_MaxToFilmbox_Root/Humanoid_Hips:tz
        timeslice: 'on'
    - name: runAnimSequence
      type: DAT:text
      role: isolated
    - name: humanoid_callbacks
      type: DAT:text
      role: isolated
    connections:
    - from: clipblender1
      to: null1
      input_index: '0'
    - from: animation
      to: clipRun
      input_index: '0'
    - from: animation2
      to: clipShot
      input_index: '0'
    - from: animation1
      to: clipPunch
      input_index: '0'
    topology:
      operator_count: 15
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: This is an example of the clipblender working with the clip CHOP.  The
      clipblender is an animation clip player.  It loads animation from only clip
      CHOPs.You will see Quaternion attributes are applied if you look at the info
      for a clip CHOP vs it's input.The animation clips are retrieved from the humanoid
      FBX archive.The clipblender CHOP references an empty table DAT called sequence.  The
      clipblender works by reading the sequence DAT when its contents change - particularly
      when an row is added.  The row must contain a valid path to a clipCHOP.  When
      a valid clipCHOP is found with  animation The clipblender CHOP will load that
      new clip and blend it with the currently playing clip.  When the new clip has
      played through the clipBlender will look again in the sequence DAT for another
      clip to play.  If it doesnt find one then it will continuously loop the new
      clip until another clip request is made.To see this in action run the runAnimSequence
      dat. - Right click on the DAT and select Run Script from pop menu or just press
      CTRL R.The animation in this FBX example is not correctly setup for blending
      so the animation has discontinuties and is not blending.----Alternalte descriptopn:The
      "clipblender CHOP" has the ability to read animation data that is stored in
      "clip CHOP"s.  The clipblender CHOP requires a default animation to start.  This
      default animation will be loaded and played in a loop until the clipblender
      receives a request to play a new clip.New clip requests may be sent to the clipblender
      CHOP using a table DAT that contains a column of clip names, which server as
      a playlist for the clipblender to consume. When the table DAT - which in this
      example is called "sequence" - contains rows, and the clipblender is reaching
      the end of the clip it is currently playing, it will look to the DAT list for
      a next clip to play, which is to be found at the top of the list.When the clipblender
      CHOP loads the clip listed in DAT list, it will delete that row from the table.  This
      process will be repeated until the DAT List is empty.  When the DAT List is
      empty the clipblender will continue to loop the animation clip that it ended
      up on.The python method clipblenderCHOP.trigger() forces the clipblender to
      look into the DAT List immediately. Take notice of the "runAnimSequence" script
      DAT. The way this example works, is it will create an animation sequence in
      the DAT List table - ['clipPunch', 'clipShot', 'clipRun'].Once the sequence
      table is populated with valid clipCHOP names, the clipblender CHOP is triggered
      and the clipblender CHOP starts consuming clipCHOP names from the sequence table,
      playing each clip, then consuming the next one, until it empties the table.The
      clipblender will blend the animation based on the Blend Time and Next Blend
      Time.  The Blend Time is used when the specified clip chop is loaded when the
      clipblender is triggered.  The next Blend Time is used when the clip is currently
      being played and is ending and being blended with a new clip.  The current clip's
      "Next Blend Time" length is used to blend out of said clip into a new clip.The
      script can be run over and over to restart the process. -----Extra notes:The
      animation clips are selected out of the humanoid FBX component.  Notice on the
      Play page the animation parameter has a field drop menu parameter populated
      with "run", "punch" and "shot".  The FBX component Play Mode parameter is set
      to Output Full Range.  This permits the Import Select CHOP to extract an entire
      animation clip from the FBX archive.  Therefore animationRun, Punch and Shot
      are extracted into their own respective Import Select CHOPs.Its important to
      note that the clipblender CHOP requires all channels for each clip to match
      in order and channel name and number of channels. On closer inspection the animationRun
      CHOP has 263 channels while animationPunch and Shot have 353.  Therefore a trim
      and replace CHOP are used to match the length and channel order and naming for
      all chops.  Once cleaned and matching the channels are sent into the clip chops
      and are ready for playback in the clipblender.
