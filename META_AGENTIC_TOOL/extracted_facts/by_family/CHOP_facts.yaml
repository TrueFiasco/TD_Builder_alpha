    connections: []
    topology:
      operator_count: 12
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: A Timecode CHOP holds a timecode that other operators and python
      expressions have access to.Timecodes can be set in differnet ways. timecode_sequential
      is like the Timer CHOP. Press Start.timecode_locked_to_timeline co-relates to
      the timeline frame number.timecode_specify_index gets it from the Index par.timecode_by_parameters
      specifies with separate parameters.timecode_timecode_object1 shows that the
      python tdu.Timecode() creates a timecode object, and you can set its time via
      the arguments. See wiki for tdu.Timecode, or the "timecode python" snippet.timecode_timecode_object2
      shows that many operators have a built-in timecode object, so you can fetch
      by referring to the operator's timecode object.timecode_timecode_op_reference
      gets the timecode by just giving the operator's name, assuming that operator
      type has a built-in .timecode object. See the wiki page for Timecode for a list
      of the operators containing timecode objects.timecode_chop1 and timecode_chop2
      lets you use specially-named input channels to set the timecode.
