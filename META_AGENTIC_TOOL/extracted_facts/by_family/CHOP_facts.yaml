    - name: pattern4
      type: CHOP:pattern
      role: isolated
      parameters:
        wavetype: random
        length: 1
    - name: pattern5
      type: CHOP:pattern
      role: input
      parameters:
        wavetype: random
    - name: shuffle1
      type: CHOP:shuffle
      role: output
      parameters:
        method: splitall
    - name: mathRange
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 1
        preoff: 0.37
        gain: 0.756
    - name: null1_export
      type: DAT:table
      role: isolated
    - name: null2_export
      type: DAT:table
      role: isolated
    - name: toSeed_export
      type: DAT:table
      role: isolated
    connections:
    - from: slider1/out1
      to: null1
      input_index: '0'
    - from: select1
      to: null2
      input_index: '0'
    - from: step/out1
      to: count1
      input_index: '0'
    - from: mathRange
      to: toSeed
      input_index: '0'
    - from: clock1
      to: select1
      input_index: '0'
    - from: pattern5
      to: shuffle1
      input_index: '0'
    - from: count1
      to: mathRange
      input_index: '0'
    topology:
      operator_count: 19
      connection_count: 7
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: Pattern CHOP can generate multiple or single random numbers. The
      Seed parameter can be given any number to generate a random number between 0
      and 1.The seed can be driven by a slider, but a random number will recur when
      you go back to any value (which you may want sometimes).The Clock CHOP's "week"
      channel expresses the time-of-month as a 0-1 value, and changes by a small amount
      every frame. pattern3 will repeat every week.You can get a random number on-demand
      when a counter is incremented. mathRange offsets the seed numbers to asssure
      another counter doesn't generate the same sequence of random numbers. Connect
      lfo1 to count1 to get a random per-second.pattern5/shuffle1 gives 10 random
      numbers at a time.
  - example_name: example9
    operators:
    - name: sort1
      type: CHOP:sort
      role: processor
      parameters:
        method: random
        seed: 1474040.0
        legacypattern: 'on'
    - name: trim1
      type: CHOP:trim
      role: output
      parameters:
        relative: abs
        timeslice: 'on'
    - name: timer1
      type: CHOP:timer
      role: isolated
      parameters:
        deferpars: 'on'
        length: 77
        lengthunits: frames
        speed: 0.1
        cycle: 'on'
        callbacks: timer1_callbacks
        outtimercount: frames
        outcycle: 'on'
        timeslice: 'on'
        exportmethod: datname
        exporttable: timer1_export
    - name: timer2
      type: CHOP:timer
      role: isolated
      parameters:
        pageindex: 2
        deferpars: 'on'
        length: 2
        cycle: 'on'
        callbacks: timer2_callbacks
        outcyclepulse: 'on'
        timeslice: 'on'
        exportmethod: datname
        exporttable: timer2_export
    - name: pattern1
      type: CHOP:pattern
      role: input
      parameters:
        wavetype: rampsamples
        length: 77
        offset: 9
    - name: pattern2
      type: CHOP:pattern
      role: isolated
      parameters:
        wavetype: randomnonrepint
        length: 1
        torange2: 12
    - name: timer1_export
      type: DAT:table
      role: isolated
      parameters:
        rows: 2
        cols: 5
    - name: timer2_export
      type: DAT:table
      role: isolated
    - name: timer1_callbacks
      type: DAT:text
      role: isolated
    - name: timer2_callbacks
      type: DAT:text
      role: isolated
    connections:
    - from: pattern1
      to: sort1
      input_index: '0'
    - from: sort1
      to: trim1
      input_index: '0'
    topology:
      operator_count: 10
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: Say you have integers in a certain range, and you want to see all
      of them once, but in a random order.  This example gives the 77 numbers from
      9 to 85 in random order. Furthermore, after you see them once, you will see
      them all again but in a different order. First it generates the linear sequence
      of desired numbers, then randomizes the order with the Sort CHOP.  Change the
      seed of Sort to change the order.trim1 selects a differnt sample per frame.timer1
      causes Sort to re-randomize the order of the integers at the end of each 77
      frame cycle.  It does this through the timer's callbacks, to prevent sort1 from
      cooking every frame.(You can also select cycles in timer1, pass it to a Null
      CHOP and set it to minimum cooks, and export that to sort1's seed parameter.)You
      can slow it all down with the Timer CHOP's Speed parameter.pattern2 randomly
      gives a different integer, but it may repeat a number soon after.
  - example_name: example10
    operators:
    - name: pattern1
      type: CHOP:pattern
      role: isolated
      parameters:
        channelname: chan[1-3]
    connections: []
    topology:
      operator_count: 1
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: ' The python object for the Pattern CHOP has a .chanIndex member,
      so if Pattern generates three channels you can put something like      [.3,
      .5, .7][me.chanIndex] in any parameter to customize its value for each channel.
      For example, in the Type parameter, put the expression     [''sin'', ''cos'',
      ''ramp''][me.chanIndex] to get 3 different curve types.'
