    curator_text: The pow function is the most useful... There are two forms of it:base
      ^ input   and  input ^ exponent   (here ^ means "to the power of", same as **)In
      the first form, for  base ^ input, with a base of 2, it outputs the powers of
      2. When input is 5, output is 2**5 = 32.pow with a base of 10, the output is
      10**5 = 10 x 10 x 10 x 10 x 10 = 100,000.For the second form where input ^ exponent,
      you can get the squares, cubes and square roots, for example.  like input **
      2.These can be used to shape inputs slightly, like when you want a slider to
      have more fine control at the lower end or upper end. Though the S Curve CHOP
      does this well too.
