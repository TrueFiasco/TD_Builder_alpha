    - name: trim2
      type: CHOP:trim
      role: processor
      parameters:
        relative: abs
        startunit: seconds
        end: 10
        endunit: seconds
        timeslice: 'on'
    - name: wave1
      type: CHOP:wave
      role: input
      parameters:
        period: 10
    - name: wave2
      type: CHOP:wave
      role: input
      parameters:
        wavetype: square
        period: 2
    - name: merge1
      type: CHOP:merge
      role: processor
    - name: merge2
      type: CHOP:merge
      role: processor
    - name: noise1
      type: CHOP:noise
      role: input
    - name: slider1
      type: COMP:slider
      role: input
      parameters:
        label: '"weight 1"'
        value0: 0.538462
        w: 100
        h: 20
        bgalpha: 1
        topsmoothness: mipmap
        borderar: 0.43
        borderag: 0.43
        borderab: 0.43
        leftborder: bordera
        rightborder: bordera
        bottomborder: bordera
        topborder: bordera
    - name: slider2
      type: COMP:slider
      role: input
      parameters:
        label: '"weight 2"'
        value0: 0.105769
        w: 100
        h: 20
        bgalpha: 1
        topsmoothness: mipmap
        borderar: 0.43
        borderag: 0.43
        borderab: 0.43
        leftborder: bordera
        rightborder: bordera
        bottomborder: bordera
        topborder: bordera
    - name: slider3
      type: COMP:slider
      role: input
      parameters:
        label: weight3
        value0: 0.711538
        w: 100
        h: 20
        bgalpha: 1
        topsmoothness: mipmap
        borderar: 0.43
        borderag: 0.43
        borderab: 0.43
        leftborder: bordera
        rightborder: bordera
        bottomborder: bordera
        topborder: bordera
    - name: blend_proportioanl
      type: CHOP:blend
      role: output
      parameters:
        pageindex: 1
        method: prop
        firstweight: 'on'
    - name: blend_diffderencing
      type: CHOP:blend
      role: output
      parameters:
        pageindex: 1
        firstweight: 'on'
    connections:
    - from: merge1
      to: trim1
      input_index: '0'
    - from: merge2
      to: trim2
      input_index: '0'
    - from: slider1/out1
      to: merge1
      input_index: '0'
    - from: slider2/out1
      to: merge1
      input_index: '1'
    - from: slider3/out1
      to: merge1
      input_index: '2'
    - from: slider2/out1
      to: merge2
      input_index: '0'
    - from: slider3/out1
      to: merge2
      input_index: '1'
    - from: trim1
      to: blend_proportioanl
      input_index: '0'
    - from: wave1
      to: blend_proportioanl
      input_index: '1'
    - from: wave2
      to: blend_proportioanl
      input_index: '2'
    - from: noise1
      to: blend_proportioanl
      input_index: '3'
    - from: trim2
      to: blend_diffderencing
      input_index: '0'
    - from: wave1
      to: blend_diffderencing
      input_index: '1'
    - from: wave2
      to: blend_diffderencing
      input_index: '2'
    - from: noise1
      to: blend_diffderencing
      input_index: '3'
    topology:
      operator_count: 12
      connection_count: 15
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: In a Blend CHOP, the multiple  channels of input 1 are the blend
      weights for all the other inputs.In this example the sliders control how much
      each wave will be taken into account during the blend. In Proportianal, all
      three waves are blended proportionally, so you  always get a value between the
      three waves. When all three weights are 0,  it give a discontinuous result when
      one goes off-zero.With Differencing, it is preferable in  most cases. With weights
      at 0, it starts with the first wave and the other 2 channels are added to it
      depending on the the weighting channels.The Trim CHOPs make the weight channels
      600 samples long (10 seconds) like the 3 wave CHOPs, as waves and weights are
      blended sample-by-sample.Experiment with different values and watch the output
      wave.
