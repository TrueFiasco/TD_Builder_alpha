      role: isolated
      parameters:
        reverseanchors: 'on'
        divs: 20
    - name: pattern1
      type: CHOP:pattern
      role: output
      parameters:
        pageindex: 2
        wavetype: random
        channelname: '"r g b"'
        combine: append
    connections:
    - from: sopto1
      to: pattern1
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: Convert from SOP points to CHOP samples, then feed that to Pattern
      that will create 3 random numbers for each sample, maintaining the same length
      as the incoming CHOP.Convert that back to a SOP and check the data with a SOP
