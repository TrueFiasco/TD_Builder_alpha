- operator_type: dmxoutCHOP
  examples:
  - example_name: example1
    operators:
    - name: lfo_red1
      type: CHOP:lfo
      role: input
      parameters:
        wavetype: ramp
        frequency: 1.38
        channelname: red1
    - name: lfo_blue1
      type: CHOP:lfo
      role: input
      parameters:
        wavetype: ramp
        frequency: 0.89
        channelname: blue1
    - name: lfo_amber1
      type: CHOP:lfo
      role: input
      parameters:
        wavetype: ramp
        frequency: -0.46
        channelname: amber1
    - name: lfo_green1
      type: CHOP:lfo
      role: input
      parameters:
        wavetype: ramp
        frequency: -0.76
        channelname: green1
    - name: lfo_white1
      type: CHOP:lfo
      role: input
      parameters:
        wavetype: ramp
        frequency: 0.42
        channelname: white1
    - name: math_range
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 2
        torange2: 255
    - name: merge_final
      type: CHOP:merge
      role: processor
    - name: merge_fixture2
      type: CHOP:merge
      role: processor
    - name: dmxout_perSample
      type: CHOP:dmxout
      role: output
      parameters:
        universe: 3
        timeslice: 'on'
        exportmethod: datname
    - name: constant_fixture1
      type: CHOP:constant
      role: input
      parameters:
        const0name: blank[1-10]
        const1name: red1
        const1value: 1
        const2name: green1
        const2value: 0.5
        const3name: blue1
        const4name: amber1
        const4value: 1
        const5name: white1
        const5value: 0.25
    - name: constant_five_blanks
      type: CHOP:constant
      role: input
      parameters:
        const0name: blank[1-5]
    connections:
    - from: merge_final
      to: math_range
      input_index: '0'
    - from: constant_fixture1
      to: merge_final
      input_index: '0'
    - from: constant_five_blanks
      to: merge_final
      input_index: '1'
    - from: merge_fixture2
      to: merge_final
      input_index: '2'
    - from: lfo_red1
      to: merge_fixture2
      input_index: '0'
    - from: lfo_green1
      to: merge_fixture2
      input_index: '1'
    - from: lfo_blue1
      to: merge_fixture2
      input_index: '2'
    - from: lfo_amber1
      to: merge_fixture2
      input_index: '3'
    - from: lfo_white1
      to: merge_fixture2
      input_index: '4'
    - from: math_range
      to: dmxout_perSample
      input_index: '0'
    topology:
      operator_count: 11
      connection_count: 10
      has_parallel_paths: false
      max_chain_length: 5
    curator_text: This is the most basic usage of the DMX Out CHOP. In "Packet Per
      Sample" format, the DMX Out CHOP is expecting up to 512 single sample channels.If
      you need to send non-consecutive DMX addresses, use something like a Constant
      (or Replace) CHOP to add spacer channels.  The names of the channels (especially
      names with numbers in them) have no effect on which DMX channels the data is
      sent out to. Only the channel index matters.Make sure to scale all of the input
      channels to 0 through 255, though you don't need to round those numbers to integers
      before they're sent.In this example, two RGBAW lighting fixtures are patched
      to DMX Addresses 11 and 21, and it is being sent to the 4th Art-Net universe
      (AKA Universe 3 as Art-Net is base zero)
  - example_name: example2
    operators:
    - name: math_range1
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 2
        fromrange1: -1
        fromrange2: 1
        torange2: 255
    - name: math_range2
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 2
        fromrange1: -1
        fromrange2: 1
        torange2: 255
    - name: dmxout_routed
      type: CHOP:dmxout
      role: output
      parameters:
        interface: sacn
        format: packetperchan
        routingtable: dmxout_routingTable
        timeslice: 'on'
        exportmethod: datname
    - name: pattern_sines1
      type: CHOP:pattern
      role: input
      parameters:
        length: 512
        numcycles: 2
        channelname: sine[1-4]
    - name: pattern_sines2
      type: CHOP:pattern
      role: input
      parameters:
        pageindex: 1
        length: 512
        numcycles: 2
        channelname: sine[1-4]
    - name: dmxout_perChannel
      type: CHOP:dmxout
      role: output
      parameters:
        universe: 21
        timeslice: 'on'
        exportmethod: datname
    - name: dmxout_routingTable
      type: DAT:table
      role: isolated
      parameters:
        rows: 9
    connections:
    - from: pattern_sines1
      to: math_range1
      input_index: '0'
    - from: pattern_sines2
      to: math_range2
      input_index: '0'
    - from: math_range2
      to: dmxout_routed
      input_index: '0'
    - from: math_range1
      to: dmxout_perChannel
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: 'If you going to send multiple DMX universes from a single DMX Out
      CHOP,  you can only do so in "Packet Per Channel" format. Here, each channel
      is a universe and each sample is a DMX value.Remember you can only send up to
      512 dmx values ranging between 0 and 255 per universe. The "Net", "Subnet" parameters
      are for older Art-Net implementations that split every 16 universes into 16
      subnets and then 128 nets. These parameters do NOT refer to IP Addresses or
      Subnet Masks.NOTE: You don''t have to increment the Net and Subnet parameters
      to get to higher universes numbers, just set the Universe parameter to any number
      and TD will split it into nets and subnets internally.By default, the DMX Out
      CHOP comes with a routing table docked. In "Packet Per Channel" format, this
      allows you to specify which CHOP channel name gets sent to which DMX Universe
      number. You can send the same CHOP channel to multiple DMX universes in any
      order.If you clear the "Routing Table" parameter, TouchDesigner will use the
      net, subnet and Universe parameters in the DMX Out''s parameters to send the
      first universe of data and then every consecutive universe after that.'
  - example_name: example3
    operators:
    - name: cam1
