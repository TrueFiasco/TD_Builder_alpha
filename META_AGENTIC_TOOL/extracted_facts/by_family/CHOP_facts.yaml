      has_parallel_paths: true
      max_chain_length: 3
    curator_text: 'Advanvced technique:If each channel needs to interpolate differently,
      say one is linear, one is ease in/out, you  need to interpolate outside the
      Timer CHOP. A method is shown here.You put the names of the columns to output
      as channels, in this case "v1" and also "length".v1 and length are passed to
      a Filter CHOP to do the interpolation, length is used as the  Filter Width.Click
      Initialize and Start and watch the length and V1 channels step according to
      the rows in the table.The Filter Width parameter is the "length" that it retrieves
      from the table.When you change the Filter CHOP''s Type menu to Gaussian, the
      filters act as an ease-in ease-out.The filters are reset when you Initialize
      or Start: The "ready" channel is exported to their Reset Pulse parameters.'
  - example_name: example9
    operators:
    - name: goTo
