    curator_text: The Spring CHOP creates vibrations influenced by the input channels,
      as if a mass was attached to a spring.Input channels can either represent position
      or force. In this example the input represents force (the Spring CHOP's "input
      effect" parameter is set to "force").Now the input is used as a force on the
