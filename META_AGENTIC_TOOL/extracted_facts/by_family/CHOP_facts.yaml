      input_index: '1'
    - from: pattern4
      to: phaser5
      input_index: '2'
    topology:
      operator_count: 15
      connection_count: 8
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: The Edge parameter determines how quickly the values get from 0
      to 1 once it starts moving. A lower value gets there in less time.The third
      input to Phaser CHOP is equivalent to the Edge parameter. For simplicity, start
      out by using the parameter "Edge" on the CHOPinstead of wiring into this third
      input. Small values of edge will make local changes in phase "sharper". If you
      reduce the edge, the animation will still take the same amount of time because  the
      duration is solely determined by the phase input. However, with a small edge,
      you'll notice that samples animate more individually. With a large edge, samples
      animate as more of a cohesive group.
