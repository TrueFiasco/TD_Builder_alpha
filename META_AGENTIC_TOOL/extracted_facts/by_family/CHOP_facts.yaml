      operator_count: 17
      connection_count: 15
      has_parallel_paths: true
      max_chain_length: 5
    curator_text: This is the Family Feud technique, if you're familiar with American
      TV (for 3 families).c to clear. first one to hit the 1, 2 or 3 keys is the winner
      and nobody else can override.logicOr - if any of the 3 keys are pressed, this
      goes on and timer1 starts, the running channel goes on, renamed winner.fanIn
      -> mathMult gives 1, 2 or 3 based on which key is pressed.when the running channel
      goes on, hold1 samples the input value, which is 1, 2 or 3 (it favors lower
      number if two or more are pressed at same time)Press "c" and the timer resets,
      making running be 0, making mathMult be 0.timer1 is set to cycle (run) forever
      until it is initialized again.you could detect ties by adding the 3 channels
      in merge1 and affecting mathAddOne to be 4 if sum is 2 or more. you need a new
      Constant TOP for that.
  - example_name: example6
    operators:
    - name: hog1
      type: CHOP:hog
      role: isolated
      parameters:
        cookalways: 'off'
    - name: hold1
      type: CHOP:hold
      role: processor
      parameters:
        sample: whileon
        timeslice: 'on'
    - name: math1
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 1
        gain: 0.01
    - name: logic1
      type: CHOP:logic
      role: processor
      parameters:
        convert: bound
        boundmax: 10000
        timeslice: 'on'
    - name: noise4
      type: CHOP:noise
      role: processor
      parameters:
        period: 200
        amp: 0.8
        channelname: noise
        timeslice: 'on'
