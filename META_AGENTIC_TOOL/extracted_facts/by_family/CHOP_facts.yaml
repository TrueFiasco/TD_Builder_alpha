      type: CHOP:null
      role: processor
    - name: scurve
      type: CHOP:scurve
      role: isolated
    - name: trail1
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: lookup1
      type: CHOP:lookup
      role: processor
      parameters:
        exporttable: lookup1_export
    - name: scurve1
      type: CHOP:scurve
      role: input
    - name: scurve2
      type: CHOP:scurve
      role: input
      parameters:
        bias: 0.239
        torange1: 1
