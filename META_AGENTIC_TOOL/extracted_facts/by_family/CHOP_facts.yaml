      type: CHOP:slope
      role: processor
      parameters:
        timeslice: 'on'
    - name: slope2
      type: CHOP:slope
      role: processor
      parameters:
        method: pc
        timeslice: 'on'
    - name: timer1
      type: CHOP:timer
      role: input
      parameters:
        pageindex: 2
        deferpars: 'on'
        length: 8
        ondone: restart
        callbacks: timer1_callbacks
        outtimercount: frames
        timeslice: 'on'
        exportmethod: datname
    - name: trail1
      type: CHOP:trail
      role: output
      parameters:
        wlength: 2
        timeslice: 'on'
    - name: trail2
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: rename1
      type: CHOP:rename
      role: processor
      parameters:
        renameto: tx
    - name: timer1_callbacks
      type: DAT:text
      role: isolated
    connections:
    - from: slope2
      to: hold1
      input_index: '0'
    - from: logic1
      to: hold1
      input_index: '1'
    - from: timer1
      to: math1
      input_index: '0'
    - from: slope1
      to: logic1
      input_index: '0'
    - from: rename1
      to: noise4
      input_index: '0'
    - from: timer1
      to: slope1
      input_index: '0'
    - from: noise4
      to: slope2
      input_index: '0'
    - from: noise4
      to: trail1
      input_index: '0'
    - from: slope2
      to: trail1
      input_index: '1'
    - from: hold1
      to: trail1
      input_index: '2'
    - from: logic1
      to: trail2
      input_index: '0'
    - from: math1
      to: rename1
      input_index: '0'
    topology:
      operator_count: 12
      connection_count: 12
      has_parallel_paths: true
      max_chain_length: 7
    curator_text: This example helps to avoid discontinuity. When the timer loops,
      the Noise CHOP jumps in value (it uses its tx position in its input to sample
      noise space).The Slope CHOP jumps every loop (see noise1 channel in trail1).
      slope1 and logic1 detect when the timer loops. (You can use the Cycle Pulse
      parameter on a Timer CHOP instead.)When the second input of hold1 goes to 0,
      it holds the previous slope2 value, minimizing the effect of the pulse. This
      works even if you are dropping frames (try it by setting the Hog CHOP to .05
      seconds).
