      to control incrementing the value as well as resetting it.The value in this
      example is held within the Operator's storage. The Examine DAT can look into
      an operator's storage and get att it data.
  - example_name: example7
    operators:
    - name: script1
      type: CHOP:script
      role: isolated
      parameters:
        callbacks: script1_callbacks
        exportmethod: datname
    - name: pattern1
      type: CHOP:pattern
      role: isolated
      parameters:
        numcycles: 6
        taper1: 1
        taper2: 0.1
    - name: script1_callbacks
      type: DAT:text
      role: isolated
    connections: []
    topology:
