    - name: audiodevout1
      type: CHOP:audiodevout
      role: output
      parameters:
        cookalways: 'off'
        timeslice: 'on'
    - name: note_audiodevout
      type: DAT:text
      role: isolated
    connections:
    - from: audioosci1
      to: math1
      input_index: '0'
    - from: timeslice1
      to: math1
      input_index: '1'
    - from: adjustSlider
      to: timeslice1
      input_index: '0'
    - from: math1
      to: audiodevout1
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: Making audio not pop when you adjust volume is a necessity. If you
      just attach a slider to a Math CHOP (via export, expression, or as an input
      to the Math CHOP), will make it pop as the audio samples jump from say .7 to
      .4 in one step.To demonstrate popping, bypass timeslice1 and play with adjustSlider.
      Then un-bypass timeslice1 and ply with adjustSlider.This method interpolates
      the volume control of the audio rate (735 samples per frame (T 60 Hz)), meaning
      that at the start of a frame it is v0 and at the end of aframe, 735 samples
      later it is v1. WHen thisn is multiplied against the audio wave, then the audio
      wave rises or falls cloothly over  the course of 1/60 seconds.Timeslice is set
      to interploate the  slider linearly.Audio Device Out is set to NOT cook every
      frame so when you are not looking at this demo, it's not outputting audio.
  - example_name: example2
    operators:
    - name: info1
      type: CHOP:info
      role: isolated
      parameters:
        op: audiodevout3
        iscope: total_cooks
        passive: 'on'
        childcooktime: 'on'
    - name: null5
      type: CHOP:null
      role: output
    - name: volume
      type: COMP:slider
      role: input
      parameters:
