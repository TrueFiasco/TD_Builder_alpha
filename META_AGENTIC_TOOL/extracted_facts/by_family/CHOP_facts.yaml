        timeslice: 'on'
    - name: audiorender1
      type: CHOP:audiorender
      role: processor
      parameters:
        pageindex: 1
        mode: simulation
        attenuation: 'on'
        mappingtable: audiorender1_mappingtable
        listenerobject: Listener
        source0object: Source1
        update: 'on'
        mesh0object: Wall
        airabsorb: 'on'
        numsurfaces: 2
        reflection: 'on'
        duration: 2
        bakemode: auto
        timeslice: 'on'
        exportmethod: datname
        mesh1object: Boundary
