      has_parallel_paths: false
      max_chain_length: 2
    curator_text: 'Logs and their opposite, exponentials are very useful when dealing
      with numbers that have a high range and/or tiny range.function_log10 - think
      of it this way - the input is 10 to the power of what? The input goes up to
      1000. That''s 10 x 10 x 10, so log10 of 1000 is 3.  So 3 is the highest value
      of function_log10.( Expert note: The error page deals with numbers that are
      infinite or interminate. log10(0) is -infinity, so you can choose what to output
      for those cases on the Errors page.pattern2 shows what you get when the numbers
      are very small, under 1. Negative input number give undefined output values
      so they are clamped to -3.Instead of 10 as a base, the most common base is 2
      as you see in function_log2 which uses the LogN function. When base Value is
      2, these are the powers of 2.  So where pattern3 is 2 to the power of 5 (2**5)
      = 32, then function_log2 is 5.function_ln uses the "natural log", which is a
      special exponent 2.718. What''s so special about that is the ln(x) is always
      x, which mathematicians like.'
