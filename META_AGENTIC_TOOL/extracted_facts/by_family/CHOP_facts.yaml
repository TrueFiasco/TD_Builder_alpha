      role: isolated
    - name: info_depthfinder10
      type: CHOP:info
      role: isolated
      parameters:
        op: audioplay_depthfinder10
        iscope: sample_state0
        childcooktime: 'on'
        exportmethod: autoname
    - name: timer10_next_callbacks
      type: DAT:text
      role: isolated
    - name: audioplay_depthfinder10
      type: CHOP:audioplay
      role: isolated
      parameters:
        specifydevice: 'on'
        timeslice: 'on'
        exportmethod: autoname
    connections: []
    topology:
      operator_count: 6
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: Before a segment ends, you can have the Timer CHOP call onCycleEndAlert().In
      timer10, the Cycle End Alert time is set to 2 seconds, so onCycleEndAlert()
      gets called 2 seconds before timer10 finishes.onCycleEndAlert() plays an audio
      cue, and  initiates timer10_next to start.However the onInitialize() in timer10_next
      return 10 until timer10's "running" channel goes to 0 and the depthfinder audio
      sample finishes playing. So every 10 frames, onInitialize() is called and stays
      in its "initializing" state until the audio finishes and timer10 is done.
  - example_name: example14
    operators:
    - name: start14
      type: CHOP:constant
      role: input
