- operator_type: audiodeviceoutCHOP
  examples:
  - example_name: example1
    operators:
    - name: math1
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 3
        chopop: mul
    - name: audioosci1
      type: CHOP:audioosci
      role: input
      parameters:
        timeslice: 'on'
    - name: timeslice1
      type: CHOP:timeslice
      role: processor
      parameters:
        method: linear
        timeslice: 'on'
    - name: adjustSlider
