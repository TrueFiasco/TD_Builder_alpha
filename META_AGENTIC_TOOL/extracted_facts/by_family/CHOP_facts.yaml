- operator_type: warpCHOP
  examples:
  - example_name: example1
    operators:
    - name: warp1
      type: CHOP:warp
      role: processor
    - name: merge1
      type: CHOP:merge
      role: output
    - name: comment1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: pattern1
      type: CHOP:pattern
      role: input
      parameters:
        wavetype: tri
        numcycles: 5
        bias: 0.5
    - name: pattern2
      type: CHOP:pattern
      role: input
      parameters:
        numcycles: 2
        phase: -0.01
        fromrange1: -1
        fromrange2: 1
        torange1: 0.5
        torange2: 3
        channelname: warpCurve
    connections:
    - from: pattern1
      to: warp1
      input_index: '0'
    - from: pattern2
      to: warp1
      input_index: '1'
    - from: warp1
      to: merge1
      input_index: '0'
    - from: pattern2
      to: merge1
      input_index: '1'
    topology:
      operator_count: 5
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: The Warp CHOP time-warps the channels of the first input (the Pre-Warp
      Channels) using one warping channel in the second input (the Warp Curve).Feeding
      the Warp CHOP a Warp Curve with a constant value of 1 makes the output identical
      to the Pre-Warp Channels, assuming the two inputs have the same start-end interval.
      That is, where the rate is 1, the Pre-Warp Channels are not warped.Where the
      Warp Curve is above 1, it causes a speed-up in the animation. Where the Warp
      Curve is below 1, it causes a slow-down in the animation.  (the range of pattern2
      here is .5 to 3.)
  - example_name: example2
    operators:
    - name: warp1
      type: CHOP:warp
      role: processor
      parameters:
        method: index
    - name: merge1
      type: CHOP:merge
      role: output
    - name: comment1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: pattern1
      type: CHOP:pattern
      role: input
      parameters:
        numcycles: 20
        taper2: 1
    - name: pattern2
      type: CHOP:pattern
      role: input
      parameters:
        wavetype: ramp
        amp: 16.66
        fromrange1: -1
        fromrange2: 1
        torange1: -1
        torange2: 1
        channelname: warpCurve
    connections:
    - from: pattern1
      to: warp1
      input_index: '0'
    - from: pattern2
      to: warp1
      input_index: '1'
    - from: warp1
      to: merge1
      input_index: '0'
    - from: pattern2
      to: merge1
      input_index: '1'
    topology:
      operator_count: 5
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: The Warp CHOP time-warps the channels of the first input (the Pre-Warp
      Channels) using one warping channel in the second input (the Warp Curve).In
      this snippet the Warp CHOP's method is set to "Index Control".Now the Warp Curve
      acts as an index into the first input. If the Warp Curve is a straight ramp
      with a slope of 1 (in Units), it produces unwarped output channels.Note that
      it treats pattern2 as seconds (0 to 16.66 seconds) and mattern1, converted to
      seconds is 16.66 seconds.
