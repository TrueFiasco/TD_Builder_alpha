      monochrome image.  mono has a single-channel Pixel Formt to minimize memory.blur_softenCurves
      eliinates the tiny detail that you don't need for lasers.level_applyGammaOrWhatever
      you can adjust gamma or leve to get a nice contrast.lookup_offToOnTransitionsForTrace
      with the of-to-on steps in pattern_steps gives an image with a lot of zero to
      one transitions which is wht Trace will follow to generate its polygons.  It
      is like generatingOften you want to trace an image that has a lot of contrast
      variation.You will want to work in as low resolution that you can to minimize
      the number of pixels the Trace SOP needs to deal with.It's better to feed the
      Trace SOP a monochrome image.  mono has a single-channel Pixel Formt to minimize
      memory.blur_softenCurves eliminates the tiny detail that you don't need for
      lasers.level_applyGammaOrWhatever you can adjust gamma or level to get a nice
      contrast.lookup_offToOnTransitionsForTrace with the off-to-on steps in pattern_steps
      gives an image with a lot of zero to one transitions which is what Trace will
      follow to generate its polygons.  It is like generating topographic lines for
