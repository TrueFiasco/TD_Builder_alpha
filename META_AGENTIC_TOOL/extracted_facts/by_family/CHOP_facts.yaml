- operator_type: overrideCHOP
  examples:
  - example_name: example1
    operators:
    - name: lfo1
      type: CHOP:lfo
      role: isolated
      parameters:
        frequency: 0.5
        timeslice: 'on'
    - name: noise1
      type: CHOP:noise
      role: input
      parameters:
        type: random
        seed: 6580.82
        startunit: samples
        end: 2
        endunit: samples
    - name: noise2
      type: CHOP:noise
      role: input
      parameters:
        pageindex: 3
        type: random
        seed: 6581.82
        startunit: samples
        end: 2
        endunit: samples
    - name: shuffle1
      type: CHOP:shuffle
      role: processor
      parameters:
        method: swap
    - name: shuffle2
      type: CHOP:shuffle
      role: processor
      parameters:
        method: swap
    - name: chopexec1
      type: DAT:chopexec
      role: isolated
      parameters:
        chop: lfo1
        offtoon: 'on'
        ontooff: 'on'
    - name: override1
      type: CHOP:override
      role: output
      parameters:
        makeindex: 'on'
        timeslice: 'on'
    connections:
    - from: noise1
      to: shuffle1
      input_index: '0'
    - from: noise2
      to: shuffle2
      input_index: '0'
    - from: shuffle1
      to: override1
      input_index: '0'
    - from: shuffle2
      to: override1
      input_index: '1'
    topology:
      operator_count: 7
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: The Override CHOP lets you take inputs from several CHOP sources,
      and uses the most-recently changed input channels to determine the output. In
      this example, whenever the LFO is above zero, the CHOP Execute DAT will set
      a new seed in noise1, thereby generating new output values. Whenever the LFO
      is below zero, it will do the same for noise2.Notice the Override CHOP outputting
      the most-recently changed inputs. Also it can generate a channel showing which
      input has the most recently changed channel.This technique works, but you will
      have to use other techniques if you want to, for example, initialize it a certain
      way, or restore from values somewhere. For this you may need to store your values
      in tables and use the CHOP/DAT/Parameter/etc Execute DATs to manage the table
      and convert to CHOP channels.See also the Bind CHOP.
