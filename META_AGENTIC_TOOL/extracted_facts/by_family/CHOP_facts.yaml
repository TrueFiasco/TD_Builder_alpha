    curator_text: In this example we have a Timecode CHOP stepping forward sequentially
      with a custom length of 10 seconds. Current timecode value and countdown timecode
      value can be fetched through the Info DAT.If the Timecode CHOP's Length parameter
      is set, the countdown will count down from that value.
  - example_name: example3
    operators:
    - name: info1
      type: DAT:info
      role: isolated
      parameters:
        op: timecode3
    - name: timecode1
      type: CHOP:timecode
      role: isolated
      parameters:
        extendright: hold
        timeslice: 'on'
    - name: timecode2
      type: CHOP:timecode
      role: isolated
      parameters:
        extendright: hold
        timeslice: 'on'
    - name: timecode3
      type: CHOP:timecode
      role: isolated
      parameters:
        mode: timecodestr
        timecodestr: '10:00:00'
        extendright: hold
        timeslice: 'on'
    connections: []
    topology:
      operator_count: 4
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: The Rate parameter sets the frames per second since any time code
      assumes some number of frames per second.The default CHOP uses the timeline's
      fps, but timecode2 overrides it to 25 so it doesn't need to match any timeline.example3
      demonstrates how drop-frames are added to the timecode output. We have a drop-frame
      rate specified (ie. non-integer, 59.94, 29.97), which is a standard drop-frame
      rate requiring an additional 2 frames added every minute not divisible by 10.
      Drop Frame mode is set to Automatic so the 18 extra frames are added automatically
      for an output timecode of 10:00.18 from the input of 10:00:00.
  - example_name: example4
    operators:
    - name: info1
      type: DAT:info
