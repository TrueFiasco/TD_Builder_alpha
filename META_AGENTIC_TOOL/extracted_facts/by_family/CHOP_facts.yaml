        scaletofit: onlyshrink
        w: 50
        h: 50
        top: ./bg
        topsmoothness: mipmap
    - name: timer1_callbacks
      type: DAT:text
      role: isolated
    - name: timer9_callbacks
      type: DAT:text
      role: isolated
    connections:
    - from: busyButton/out1
      to: busy
      input_index: '0'
    topology:
      operator_count: 8
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: When you Initialize, you can initiate actions and check conditions
      to assure the initialization is ready, and if not ready, have onInitialize()
      called again some number of frames later.On timer1, open the textport first
      and then press Initialize. THe timer CHOP will call onInitialize() 5 times separate
      by 20 frames of time before reaching the ready state.To test timer2, first make
      sure the Busy button is on. When you press Initialize or Start, the onInitialiize()
      callback checks if the Busy button is on, and if on, onInititalize() returns
      50, which will cause onInitialize() to be called again in 50 frames, with the
      callCount set to 2. When onInitialize() returns 0, it proceeds to the ready
      state, and then starts the timer if the user had pressed Start.If Busy is on
      and then you press Start, it will wait until Busy is off and then start counting
      right away.This is useful for preparing movies, loading files, waiting for servers
      to respond or other things that will keep the timer from being ready.
  - example_name: example13
    operators:
    - name: timer10
      type: CHOP:timer
      role: isolated
