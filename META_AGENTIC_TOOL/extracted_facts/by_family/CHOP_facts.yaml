        w: 50
        h: 50
        top: ./bg
        topsmoothness: mipmap
    - name: volume_
      type: CHOP:null
      role: processor
      parameters:
        exporttable: volume__export
    - name: chopexec1
      type: DAT:chopexec
      role: isolated
      parameters:
        chop: null5
        offtoon: 'on'
        ontooff: 'on'
    - name: audioosci5
      type: CHOP:audioosci
      role: input
      parameters:
        wavetype: tri
        timeslice: 'on'
    - name: audioosci6
      type: CHOP:audioosci
      role: input
      parameters:
        wavetype: tri
        timeslice: 'on'
    - name: active_onoff
      type: CHOP:logic
      role: output
      parameters:
        timeslice: 'on'
        exporttable: active_onoff_export
    - name: audiodevout2
      type: CHOP:audiodevout
      role: output
      parameters:
        bufferlength: 0.25
        volume: 0.182
        cookalways: 'off'
        timeslice: 'on'
    - name: audiodevout3
      type: CHOP:audiodevout
      role: output
      parameters:
        bufferlength: 0.25
        cookalways: 'off'
        timeslice: 'on'
    - name: volume__export
      type: DAT:table
      role: isolated
      parameters:
        rows: 1
    - name: active_onoff_export
      type: DAT:table
      role: isolated
    connections:
    - from: button1/out1
      to: null5
      input_index: '0'
    - from: volume/out1
      to: volume_
      input_index: '0'
    - from: volume_
      to: active_onoff
      input_index: '0'
    - from: audioosci5
      to: audiodevout2
      input_index: '0'
    - from: audioosci6
      to: audiodevout3
      input_index: '0'
    topology:
      operator_count: 13
      connection_count: 5
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: This uses a script to turn off/on the Active parameter of the Audio
      Device Out CHOP, which stops all cooking upstream when this network is not being
      displayed (like when you are in Perform Mode).  It's most optimized that when
      Volume is 0, that you turn Active off too.You can also turn Active off/on too
      by exporting 0 or 1 to that parameter.
- operator_type: audiodynamicsCHOP
  examples:
  - example_name: example1
    operators:
    - name: info2
      type: CHOP:info
      role: isolated
      parameters:
        op: audiodyna1
        iscope: '"compressor* limiter*"'
        childcooktime: 'on'
    - name: math1
      type: CHOP:math
      role: processor
      parameters:
        chanop: add
        chopop: add
    - name: trail2
