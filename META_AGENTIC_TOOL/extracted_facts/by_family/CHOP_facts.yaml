- operator_type: parameterCHOP
  examples:
  - example_name: example1
    operators:
    - name: par1
      type: CHOP:par
      role: isolated
      parameters:
        ops: pattern1
        parameters: '"length numcycles phase"'
        builtin: 'on'
    - name: chopto1
      type: DAT:chopto
      role: isolated
      parameters:
        chop: par1
        names: 'on'
        output: rowperchan
    - name: pattern1
      type: CHOP:pattern
      role: isolated
    connections: []
    topology:
      operator_count: 3
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: get parameter values into a CHOP.This gets 3 specific channels among
      the Built-In parameters.
  - example_name: example2
    operators:
    - name: eval
      type: DAT:eval
      role: output
      parameters:
        expr: '"eval(\"op(''par1'').par.ops.eval().par.\"+me.inputTable[me.inputRow,
          me.inputCol-1])"'
        extractcols: byindex
        colindexstart: 1
    - name: par1
      type: CHOP:par
      role: isolated
      parameters:
        ops: insert1
        builtin: 'on'
    - name: table1
      type: DAT:table
      role: input
    - name: chopto1
      type: DAT:chopto
      role: input
      parameters:
        chop: par1
        names: 'on'
        output: rowperchan
    - name: insert1
      type: DAT:insert
      role: output
      parameters:
        contents: '"A B C D"'
    connections:
    - from: chopto1
      to: eval
      input_index: '0'
    - from: table1
      to: insert1
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: Get parameter values into a DAT where you can hold non-numeric data
      like from strings and paths parameters.We use the Parameter CHOP par1, which
      is only used to get the channel names. We then convert it to a DAT where you
      can re-evaluate parameters including ones that are strings, paths, menus, etc
      in an Evaluate DAT.This gets all channels that are the Built-In parameters.
- operator_type: patternCHOP
  examples:
  - example_name: example1
