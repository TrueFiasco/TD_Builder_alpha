      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This is a more robust way to make sure you get some channels.If
      your source does not exist, the op() expression return None, in which case it
      uses op('default").This is a nice behavior of the "or" operator in python.
  - example_name: example11
    operators: []
    connections: []
    topology:
      operator_count: 0
