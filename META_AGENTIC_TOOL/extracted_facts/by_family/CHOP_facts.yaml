- operator_type: feedbackCHOP
  examples:
  - example_name: example1
    operators:
    - name: lfo1
      type: CHOP:lfo
      role: input
      parameters:
        timeslice: 'on'
    - name: null1
      type: CHOP:null
      role: output
    - name: switch1
      type: CHOP:switch
      role: processor
    - name: feedback1
      type: CHOP:feedback
      role: processor
    connections:
    - from: switch1
      to: null1
      input_index: '0'
    - from: feedback1
      to: switch1
      input_index: '0'
    - from: lfo1
      to: switch1
      input_index: '1'
    - from: lfo1
      to: feedback1
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 4
    curator_text: The Feedback CHOP allows connecting CHOPs in circular loops without
      Infinite Recursion errors. It simply copies its input without cooking it first.
      In this example the output of lfo1 is used to set a parameter on that same lfo1.Set
      the switch1 index parameter to 1 to circumvent the Feedback CHOP, and notice
      the yellow "cook dependency" error popping up.
  - example_name: example2
    operators:
    - name: feedback2
      type: CHOP:feedback
      role: processor
    - name: math_subtract
      type: CHOP:math
      role: output
      parameters:
        chopop: sub
    - name: constantCurrentFrame
      type: CHOP:constant
      role: input
    connections:
    - from: constantCurrentFrame
      to: feedback2
      input_index: '0'
    - from: feedback2
      to: math_subtract
      input_index: '0'
    - from: constantCurrentFrame
      to: math_subtract
      input_index: '1'
    topology:
      operator_count: 3
      connection_count: 3
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: The Feedback CHOP stores channels from the current frame to be used
      in a later frame, without forcing recooking back one frame. It allows you to
      get the state of a CHOP as it was one frame or time slice ago. In this example
      currentFrame channel  CHOP has the value of the current frame number. When this
      number is subtracted from the same channel fed through a Feedback CHOP, the
      result is -1.
