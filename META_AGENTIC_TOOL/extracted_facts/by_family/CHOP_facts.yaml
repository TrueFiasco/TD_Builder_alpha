- operator_type: replaceCHOP
  examples:
  - example_name: example1
    operators:
    - name: replace1
      type: CHOP:replace
      role: output
    - name: constant_new
      type: CHOP:constant
      role: input
      parameters:
        const0name: green
        const0value: 0.3
        const1name: amber
        const1value: 0.6
    - name: constant_default
      type: CHOP:constant
      role: input
      parameters:
        const0name: red
        const1name: green
        const2name: blue
        const3name: amber
        const4name: white
    connections:
    - from: constant_default
      to: replace1
      input_index: '0'
    - from: constant_new
      to: replace1
      input_index: '1'
    topology:
      operator_count: 3
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The Replace CHOP can replace channels very quickly.Channels in Input1
      will be replaced by channels found in Input2 if a matching channel exists in
      Input2. Any channels that are in Input1 and not in Input2 will be output without
      being replaced.
  - example_name: example2
    operators:
    - name: replace2
      type: CHOP:replace
      role: output
    - name: constant_all_channels
      type: CHOP:constant
      role: input
      parameters:
        const0name: red
        const0value: 0.1
        const1name: green
        const1value: 0.2
        const2name: blue
        const2value: 0.3
        const3name: amber
        const3value: 0.4
        const4name: white
        const4value: 0.5
    - name: constant_keep_only_these_channels
      type: CHOP:constant
      role: input
