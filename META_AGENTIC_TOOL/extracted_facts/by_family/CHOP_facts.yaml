        const0value: 0.31
        const1name: chan2
        const1value: 0.47
    - name: constant2
      type: CHOP:constant
      role: isolated
      parameters:
        const0value: 0.93
        const1name: chan2
        const1value: 0.27
    - name: constant4
      type: CHOP:constant
      role: isolated
