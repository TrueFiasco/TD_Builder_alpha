        outcyclepulse: 'on'
        outcycleplusfraction: 'on'
        outseg: 'on'
        outsegpulse: 'on'
        outsegplusfraction: 'on'
        outcumulativecount: seconds
        outrunningcount: seconds
        timeslice: 'on'
        exportmethod: datname
    - name: trail14
      type: CHOP:trail
      role: output
      parameters:
        wlength: 40
        timeslice: 'on'
        exportmethod: autoname
    - name: initialize14
