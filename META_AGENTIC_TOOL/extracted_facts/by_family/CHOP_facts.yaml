      input, converts and records them internally, and outputs the stored channels
      as the CHOP output. The optional second (Active) input is used to enable and
      disable the recording. Toggle the buttonRocker to start/stop recording, and
      notice the different graphs in each Record CHOP, depending on their `record`
      parameter value:On - always records when playing forward. When the active input
      is in the off state the input is maintained at its current values.Add - adds
      (offsets) to an existing set of channels previously recorded in the Record CHOP.
      The channels are left unmodified while the Active input is in the off state.Auto
      range - if the Active input goes on, and TouchDesigner is playing, then any
      existing storage array is cleared, and the channels are recorded in a new storage
      array until Active goes off. This behaves like a sampler.
