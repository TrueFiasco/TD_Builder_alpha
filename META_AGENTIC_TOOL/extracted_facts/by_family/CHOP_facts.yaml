- operator_type: sortCHOP
  examples:
  - example_name: example1
    operators:
    - name: sort1
      type: CHOP:sort
      role: output
      parameters:
        legacypattern: 'on'
    - name: sort2
      type: CHOP:sort
      role: processor
      parameters:
        legacypattern: 'on'
    - name: sort3
      type: CHOP:sort
      role: output
      parameters:
        method: decreasing
        indices: 1
        legacypattern: 'on'
    - name: sort4
      type: CHOP:sort
      role: output
      parameters:
        select: byname
        indices: chan3
        legacypattern: 'on'
    - name: sort5
      type: CHOP:sort
      role: processor
      parameters:
        method: random
        legacypattern: 'on'
    - name: sort6
      type: CHOP:sort
      role: output
      parameters:
        legacypattern: 'on'
    - name: pattern1
      type: CHOP:pattern
      role: processor
      parameters:
        wavetype: ramp
        numcycles: 0.96
        phase: 0.623
        combine: append
    - name: pattern2
      type: CHOP:pattern
      role: processor
      parameters:
        wavetype: randomcycle
        numcycles: 6.67
        seed: 1.79
        combine: append
    - name: pattern4
      type: CHOP:pattern
      role: input
      parameters:
        wavetype: cos
        length: 40
        numcycles: 0.5
        phase: 0.09
    connections:
    - from: pattern2
      to: sort1
      input_index: '0'
    - from: pattern2
      to: sort2
      input_index: '0'
    - from: pattern2
      to: sort3
      input_index: '0'
    - from: pattern2
      to: sort4
      input_index: '0'
    - from: sort2
      to: sort5
      input_index: '0'
    - from: sort5
      to: sort6
      input_index: '0'
    - from: pattern4
      to: pattern1
      input_index: '0'
    - from: pattern1
      to: pattern2
      input_index: '0'
    topology:
      operator_count: 9
      connection_count: 8
      has_parallel_paths: true
      max_chain_length: 6
    curator_text: 'sort1 sorts the samples by lowest-to-highest value. Each channel
      is treated separately. So each channel has ascending values regardless of the
      other channels.sort2 uses the first channel (using Channel Indices parameter)
      to sort the samples of the three channels together: for example, chan1[31],
      chan2[31] and chan3[31] travel together.sort3 does the same with chan2, but
      sorting in decending order.sort4 does ascending, but chooses the channel by
      name "chan3".sort5 randomizes all the samples, but keeps the channels together.
      Then sort6 re-sorts by the first channel''s ascending value, making it the same
      as the output of sort2.'
