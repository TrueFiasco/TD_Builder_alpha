    - name: scurve8
      type: CHOP:scurve
      role: isolated
      parameters:
        steepness: 0.924
        linearize: 1
        bias: -0.533
    - name: scurve9
      type: CHOP:scurve
      role: isolated
      parameters:
        steepness: 1.943
        linearize: 0.248
        bias: -0.143
    - name: select1
      type: CHOP:select
