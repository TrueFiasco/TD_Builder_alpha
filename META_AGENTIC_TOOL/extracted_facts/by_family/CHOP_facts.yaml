    curator_text: The second input on the Audio Filter CHOP is used to drive some
      parameters at higher frequency than an exported CHOP can on the parameter, or
      a CHOP expression. These are limited by the frame rate of the timeline, default
      60. If you want to modulate the cutoff frequency at say 1000 cycles per second,
      you need to feed the Audio Filter CHOP's second input a channel that's called
      cutofffrequency, at a high sample rate. In the case of the LFO CHOP, it is set
      to 8000 samples per second, and as you can see from the graph, there are about
      120 samples per frame.This distorts the audio a lot, pleasing at some combinations
      of the 2 sliders and the Filter Cutoff parameter of teh Audio Filter CHOP.Then
      send audioosci_sine to the filter via null1.Try it wuth LFO set to a Square
      Wave.If you are up for it, try the white noise in the Audio Oscillator CHOP.
