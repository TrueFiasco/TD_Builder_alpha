        ty: 2.2
        tz: -1.1
        ry: 90
        rz: 180
        operation: xformpageinput
        output: mat
    - name: set3
      type: CHOP:transform
      role: isolated
      parameters:
        pageindex: 1
        inputoperation: input1input0
        ty: -3
        rx: 20
        ry: 30
        rz: 40
        operation: xformpageinput
        output: mat
    - name: join1
      type: CHOP:join
      role: input
      parameters:
        chops: set*
    - name: transform1
      type: CHOP:transform
      role: output
    - name: transform2
      type: CHOP:transform
      role: output
      parameters:
        pageindex: 2
        output: mat
    - name: select_set1
      type: CHOP:select
      role: isolated
      parameters:
        chops: transform2
    - name: select_set2
      type: CHOP:select
      role: isolated
      parameters:
        chops: transform2
    - name: select_set3
      type: CHOP:select
      role: isolated
      parameters:
        chops: transform2
    - name: select_sets
      type: CHOP:select
      role: input
