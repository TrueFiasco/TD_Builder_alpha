      input_index: '0'
    - from: trail1
      to: select1
      input_index: '0'
    topology:
      operator_count: 9
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: Show the Textport. Press Start on the timer. It prints the segments
      it is starting and the segment's length.This will run the sequence, and stop
      once it's done.Then turn on Sub Range.onSubrangeStart() is called every time
      it loops.scrubbable with slider1
  - example_name: example27
    operators:
    - name: par1
      type: CHOP:par
      role: isolated
      parameters:
        ops: pars
    - name: pars
      type: COMP:base
      role: isolated
      parameters:
        pageindex: 3
    - name: info1
      type: DAT:info
      role: isolated
      parameters:
        op: timer1
    - name: text1
      type: COMP:text
      role: isolated
      parameters:
        callbacks: text1_callbacks
        legacyfontselection: 'on'
        alignx: left
        w: 200
        h: 80
    - name: text2
      type: COMP:text
      role: isolated
      parameters:
        callbacks: text2_callbacks
        legacyfontselection: 'on'
        alignx: left
        w: 200
        h: 80
    - name: timer1
      type: CHOP:timer
      role: isolated
      parameters:
        timecontrol: chop
        deferpars: 'on'
        length: 1000
        callbacks: timer1_callbacks
        outmastercount: all
        extchop: par1
        extchannel: Seconds
        timeslice: 'on'
        exportmethod: datname
    - name: text1_callbacks
      type: DAT:text
      role: isolated
    - name: text2_callbacks
      type: DAT:text
      role: isolated
    - name: timer1_callbacks
      type: DAT:text
      role: isolated
    connections: []
    topology:
      operator_count: 9
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: 'Adjust the Seconds parameter on the pars COMP. info1 displays the
      seconds value as timecode, both count-up and count-down.With any CHOP containing
      a channel that is expressing time in seconds or frames or fraction of a Length,
      you can pass the channel to the Timer CHOP whose Time Control parameter is set
      to External CHOP Channel. Then you get the timecodes in an Info DAT table. To
      use the Frames parameter instead, change timer1''s External Units parameter
      to Frames, and the External Channel parameter to ''Frames''. This will pick
      up the ''Frames'' channel of par1. Now you can adjust the Frames parameter of
      the pars component. Same idea with Fraction. it’s a 2-node timecode generator.
      But text2 shows that you don''t need the Info DAT for count-up.Note: The Timer
      CHOP''s Length parameter is set to 1000 seconds. To change it you have to change
      Time Control to Sequential, change the Length, Initialize, the go back to External
      Time Control. Or if count-down is not needed, change Length Type to Infinite.'
- operator_type: timesliceCHOP
  examples:
  - example_name: example1
    operators:
    - name: trail1
      type: CHOP:trail
      role: output
      parameters:
        wlength: 2
        timeslice: 'on'
    - name: slider1
      type: COMP:slider
      role: input
      parameters:
        label: signal
        value0: 0.666667
        w: 100
        h: 20
        bgalpha: 1
        topsmoothness: mipmap
        borderar: 0.43
        borderag: 0.43
        borderab: 0.43
        leftborder: bordera
        rightborder: bordera
        bottomborder: bordera
        topborder: bordera
    - name: perform1
      type: CHOP:perform
      role: input
      parameters:
        cook: 'on'
        timeslice: 'on'
        exportmethod: datname
    - name: timeslice1
      type: CHOP:timeslice
      role: processor
      parameters:
        method: linear
        timeslice: 'on'
    - name: hog_unbypass_and_bypass_me
      type: CHOP:hog
      role: isolated
      parameters:
        delay: 0.06
    - name: execute_bypass_hog_on_start
      type: DAT:execute
      role: isolated
      parameters:
        start: 'on'
    connections:
    - from: slider1/out1
      to: trail1
      input_index: '0'
    - from: timeslice1
      to: trail1
      input_index: '1'
    - from: perform1
      to: trail1
      input_index: '2'
    - from: slider1/out1
      to: timeslice1
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: Move the slider and see the Trail CHOP.Now un-bypass the Hog CHOP
      above. Now TouchDesigener is skipping most frames.When you move the slider,
      the slider values are stepping too, as you see with channel v1 in the Trail
      CHOP.But the Time Slice CHOP figures out the in-between values and passes all
      those samples to its output.The third channel shows which frames were cooked
      (1) and which frames were mossed (0).See also:the wiki page "Time Slicing".the
      training video "Time Slicing Vid"
  - example_name: example2
    operators:
    - name: noise
      type: CHOP:noise
      role: input
      parameters:
        pageindex: 1
        rough: 0.25
        amp: 3
        constraint: offset
        constrmean: 0.5
        end: 2
        right: mirror
    - name: trail2
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: timeslice_hold
      type: CHOP:timeslice
      role: processor
      parameters:
        method: hold
        timeslice: 'on'
    - name: timeslice_trim
      type: CHOP:timeslice
      role: processor
      parameters:
        timeslice: 'on'
    - name: timeslice_linear
      type: CHOP:timeslice
      role: processor
      parameters:
        method: linear
        timeslice: 'on'
    - name: hog_unbypass_and_bypass_me
      type: CHOP:hog
      role: isolated
      parameters:
        delay: 0.06
    - name: execute_bypass_hog_on_start
      type: DAT:execute
      role: isolated
      parameters:
        start: 'on'
    connections:
    - from: timeslice_hold
      to: trail2
      input_index: '0'
    - from: timeslice_linear
      to: trail2
      input_index: '1'
    - from: timeslice_trim
      to: trail2
      input_index: '3'
    - from: noise
      to: timeslice_hold
      input_index: '0'
    - from: noise
      to: timeslice_trim
      input_index: '0'
    - from: noise
      to: timeslice_linear
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 6
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: With the Hog CHOP un-bypassed, TouchDesigener is skipping most frames.This
      shows the three ways the Time Slice  CHOP deals with its input, which is a 2-second
      smooth-noise and Extend Conditions set to mirror outside its 2-second range.
      Each time the Time Slice CHOP cooks, it samples one value of the input CHOP  and
      holds that value for the entire CHOP.In teh second case, it linearly interpolates
      from one frame to the next.In the third case, it extracts multi-samples from
      the input.
  - example_name: example3
    operators:
    - name: trim1
      type: CHOP:trim
      role: processor
      parameters:
        relative: cur
        startunit: seconds
        endunit: seconds
        timeslice: 'on'
    - name: noise1
      type: CHOP:noise
      role: input
      parameters:
        pageindex: 4
        timeslice: 'on'
    - name: trail3
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: trail4
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: filter1
      type: CHOP:filter
      role: processor
      parameters:
        width: 0.1
        speedcoeff: 0
        timeslice: 'on'
    - name: timeslice2
      type: CHOP:timeslice
      role: processor
      parameters:
        method: linear
        timeslice: 'on'
    - name: hog_unbypass_and_bypass_me
      type: CHOP:hog
      role: isolated
      parameters:
        delay: 0.06
    - name: execute_bypass_hog_on_start
      type: DAT:execute
      role: isolated
      parameters:
        start: 'on'
    connections:
    - from: noise1
      to: trim1
      input_index: '0'
    - from: trim1
      to: trail3
      input_index: '0'
    - from: timeslice2
      to: trail3
      input_index: '1'
    - from: filter1
      to: trail3
      input_index: '2'
    - from: trim1
      to: trail4
      input_index: '0'
    - from: timeslice2
      to: filter1
      input_index: '0'
    - from: trim1
      to: timeslice2
      input_index: '0'
    topology:
      operator_count: 8
      connection_count: 7
      has_parallel_paths: true
      max_chain_length: 5
    curator_text: The first 2 CHOPs simulates a case where you get only one new sample
      every time a CHOP cooks, or an input device is read. An example is getting data
      from a Kinect or a Leap Motion device, you are taking camera input into CHOPs
      via a TOP to CHOP.Without a Time Slice CHOP set to Linear the values step from
      one time slice to the next. The Time SLice CHOP can smooth that.The Filter CHOP
      smooths it a bit further,  though making it a bit mose sluggish.
- operator_type: toptoCHOP
  examples:
  - example_name: example1
    operators:
    - name: constant1
      type: TOP:constant
      role: isolated
      parameters:
        combineinput: res
        resolutionw: 1
        resolutionh: 1
    - name: moviefilein1
      type: TOP:moviefilein
      role: isolated
    - name: topto_single_pixel
      type: CHOP:topto
      role: isolated
      parameters:
        pageindex: 1
        top: moviefilein1
        crop: pixel
        ustart: 0.191
        vstart: 0.452
    connections: []
    topology:
      operator_count: 3
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: You can get the  RGBA values of a single pixel.Adjust U Start and
      V Start parameters.
  - example_name: example2
    operators:
    - name: moviefilein1
      type: TOP:moviefilein
      role: isolated
    - name: topto_column_of_pixels
      type: CHOP:topto
      role: isolated
      parameters:
        pageindex: 1
