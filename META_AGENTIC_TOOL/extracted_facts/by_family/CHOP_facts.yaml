      parameters:
        const0value: 5
        const1name: chan2
        const1value: 6
        const2name: v3
        const2value: 7
        const3name: v4
        const3value: 8
    connections:
    - from: select1
      to: select2
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: expands a number range inside the []
  - example_name: example9
    operators:
    - name: select5
      type: CHOP:select
      role: input
