    - from: constant1
      to: reorder_number_pattern
      input_index: '0'
    - from: constant1
      to: reorder_numeric_suffix
      input_index: '0'
    - from: constant1
      to: reorder_character_pattern
      input_index: '0'
    topology:
      operator_count: 9
      connection_count: 8
      has_parallel_paths: true
      max_chain_length: 3
