        wlength: 2
        timeslice: 'on'
    - name: audiodyna1
      type: CHOP:audiodyna
      role: processor
      parameters:
        pageindex: 1
        enablecompressor: 'on'
        kneecompressor: 3.2
        enablelimiter: 'on'
        timeslice: 'on'
    - name: audiodevout1
      type: CHOP:audiodevout
      role: output
      parameters:
        cookalways: 'off'
        timeslice: 'on'
    - name: audiofilein1
      type: CHOP:audiofilein
      role: input
      parameters:
        speed: 0.6
        timeslice: 'on'
    - name: audiofilein2
      type: CHOP:audiofilein
      role: input
      parameters:
        volume: 4
        timeslice: 'on'
    connections:
    - from: audiofilein1
      to: math1
      input_index: '0'
    - from: audiofilein2
      to: math1
      input_index: '1'
    - from: math1
      to: trail2
      input_index: '0'
    - from: audiodyna1
      to: trail2
      input_index: '1'
    - from: math1
      to: audiodyna1
      input_index: '0'
    - from: audiodyna1
      to: audiodevout1
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 6
      has_parallel_paths: true
      max_chain_length: 4
    curator_text: WHen you mix multiple sounds together, it is likely that you will
      exceed values -1 to + 1.Unbypass audiodyn1.In this case we are simply adding
      left-right channels of 2 sources into 1 channel, and applying a gain to the
      sonar sound.Bypass audiodyna1 to hear the overloaded mix. Audio Dynamics manages
      it down to -1 to +1.
  - example_name: example2
    operators:
    - name: lfo1
      type: CHOP:lfo
      role: isolated
      parameters:
        wavetype: tri
        frequency: 0.2
        offset: 0.6
        amp: 0.5
        timeslice: 'on'
        exporttable: lfo1_export
    - name: info1
      type: CHOP:info
      role: isolated
      parameters:
        op: audiodyn1
        iscope: '"compressor* limiter*"'
        childcooktime: 'on'
    - name: trail1
      type: CHOP:trail
      role: output
      parameters:
        wlength: 2
        timeslice: 'on'
    - name: audiodyn1
      type: CHOP:audiodyna
      role: processor
      parameters:
        pageindex: 1
        inputgain: 20
        enablecompressor: 'on'
        kneecompressor: 11.6
        enablelimiter: 'on'
        timeslice: 'on'
    - name: lfo1_export
      type: DAT:table
      role: isolated
    - name: audiodevout2
      type: CHOP:audiodevout
      role: output
      parameters:
        cookalways: 'off'
        timeslice: 'on'
    - name: audiofilein1
      type: CHOP:audiofilein
      role: input
      parameters:
        mono: 'on'
        timeslice: 'on'
    connections:
    - from: audiofilein1
      to: trail1
      input_index: '0'
    - from: audiodyn1
      to: trail1
      input_index: '1'
    - from: audiofilein1
      to: audiodyn1
      input_index: '0'
    - from: audiodyn1
      to: audiodevout2
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: Push audio at low levels to be always loud. First push the amplitude
      high, then the Audio Dynamics manage it down to -1 to +1.The volume is artificially
      being pushed up and down by the LFO CHOP.Listen to select1 (bypass audiodyn1)
      to see how much the levels are varying. Then listen again to audiodyn1.The info1
      CHOP shows how much the audio is being compressed and limited.
