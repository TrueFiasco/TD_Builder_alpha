        resolutionw: 256
        resolutionh: 64
    - name: timer14_callbacks
      type: DAT:text
      role: isolated
    connections:
    - from: gotoScrubber/out1
      to: math1
      input_index: '0'
    - from: timer1
      to: trail1
      input_index: '0'
    topology:
      operator_count: 10
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: 'The goto_scrubber slider will cause the Timer CHOP to jump to a
      specific time or frame in the sequence.  The slider 0-1 range is re-ranged in
      the Math CHOP to be 0 to 25.goTo(frame = 601): goes to frame 601, where frame
      1 is the first frame. goTo(segment = 3, cycle = 2, seconds = 1):  Jumps to segment
      3, cycle 2, and will set time to 1 second.goTo(seconds = 35):  If cycle is off,
      and segment 1 = 10, segment 2 = 15,  segment 3 = 20, this will jump to segment
      3, with time set  to 10 seconds.goTo(seconds = 35):  If cycle is on for segment
