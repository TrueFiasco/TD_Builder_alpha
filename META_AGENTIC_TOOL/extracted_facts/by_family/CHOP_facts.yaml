      input_index: '0'
    - from: filter1
      to: trim1
      input_index: '0'
    - from: constant1
      to: speed1
      input_index: '0'
    - from: shuffle1
      to: filter1
      input_index: '0'
    - from: noise1
      to: filter2
      input_index: '0'
    - from: noise1
      to: shuffle1
      input_index: '0'
    - from: trim1
      to: shuffle2
      input_index: '0'
    topology:
      operator_count: 13
      connection_count: 9
      has_parallel_paths: true
      max_chain_length: 6
    curator_text: This example takes each sample of a Noise CHOP and creates a channel
      with that value.
  - example_name: example3
    operators:
    - name: null3
      type: CHOP:null
      role: output
    - name: topto1
      type: CHOP:topto
      role: input
      parameters:
        pageindex: 1
        top: moviefilein1
        crop: full
    - name: shuffle3
      type: CHOP:shuffle
      role: processor
      parameters:
        method: seqname
    - name: moviefilein1
      type: TOP:moviefilein
      role: isolated
      parameters:
        pageindex: 4
        outputresolution: custom
        resolutionw: 80
        resolutionh: 45
    connections:
    - from: shuffle3
      to: null3
      input_index: '0'
    - from: topto1
      to: shuffle3
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: This example takes  all the scattered RGBA values from the TOP to
      CHOP and sequences them by name, so that you have a seperate R,G,B, and A, channel,
      for further processing.The Movie File In TOP is down-resolutioned first.
  - example_name: example4
    operators:
    - name: null4
      type: CHOP:null
      role: output
    - name: wave1
      type: CHOP:wave
      role: input
      parameters:
        pageindex: 1
        period: 90
        periodunit: samples
        channelname: chan
        startunit: samples
        end: 89
        endunit: samples
    - name: shuffle4
      type: CHOP:shuffle
      role: processor
      parameters:
        method: spliteveryn
        nval: 10
    connections:
    - from: shuffle4
      to: null4
      input_index: '0'
    - from: wave1
      to: shuffle4
      input_index: '0'
    topology:
      operator_count: 3
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: This example takes every 10th sample from the original to form a
      new  channel.
  - example_name: example5
    operators:
    - name: wave2
