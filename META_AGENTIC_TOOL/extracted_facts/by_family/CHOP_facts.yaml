      type: DAT:text
      role: isolated
    connections:
    - from: initialize14
      to: timer14
      input_index: '0'
    - from: start14
      to: timer14
      input_index: '1'
    - from: timer14
      to: trail14
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: This is set up to capture a clean start-to-end set of channels in
      the Trail CHOP.When the timer initializes, the onInitialize() callback resets
      and starts the Trail CHOP, then when onDone() is called, it turns the Active
      parameter Off on the Trail CHOP after another 10 frames.On some segments, the
      cycleendalert column of table14 causes the onCycleEndAlert() callback to be
      called some number of seconds before the  segment is over, supposedly to prepare
      for  the next segment.initialize14 and start14 show you can drive the initialization
      and starting with the two inputs.
  - example_name: example15
    operators:
    - name: math1
      type: CHOP:math
