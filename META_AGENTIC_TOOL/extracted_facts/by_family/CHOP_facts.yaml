    curator_text: You can feed text into an Info DAT for each segment of the timer.
      You can create a column of any name in the segments table, "message" in this
      case, and add text in each row. Then you put that column name in the parameter
      Columns to Info DAT on the Segments page.That will cause a row in the Info DAT,
      "message" to contain the text of the segment as it plays.Click Start and watch
      the Info DAT.
  - example_name: example11
    operators:
    - name: table8
      type: DAT:table
      role: isolated
      parameters:
        rows: 5
        cols: 3
    - name: timer8
      type: CHOP:timer
      role: input
