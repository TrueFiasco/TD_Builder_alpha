    connections: []
    topology:
      operator_count: 1
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: Make 9 steps of 10 samples. In the Amplitude parameter, you need
      to multiply by .999 so that the last sample does not reach 10.  You make the
      Interger parameter Floor.  See also the Limit CHOP to quantize.
