    - name: slider1
      type: COMP:slider
      role: input
      parameters:
        value1: 0.5
        w: 100
        h: 20
        bgalpha: 1
        top: ./back
        topsmoothness: mipmap
        crop: 'on'
    - name: slider2
      type: COMP:slider
      role: input
      parameters:
        value1: 0.5
        w: 100
        h: 20
        bgalpha: 1
        top: ./back
        topsmoothness: mipmap
        crop: 'on'
    - name: lfo1_export
      type: DAT:table
      role: isolated
    - name: scurve_range
      type: CHOP:scurve
      role: isolated
      parameters:
        prepend: 386
        append: 600
        linearize: 1
        torange1: 0.2
        torange2: -1
    - name: scurve_lookup
      type: CHOP:scurve
      role: output
      parameters:
        linearize: 1
        bias: 0.343
    - name: lookup1_export
      type: DAT:table
      role: isolated
    - name: scurve_logistic
      type: CHOP:scurve
      role: isolated
      parameters:
        type: log
    - name: scurve_linearizw
      type: CHOP:scurve
      role: isolated
      parameters:
        linearize: 1
    - name: scurve_steepness
      type: CHOP:scurve
      role: isolated
      parameters:
        steepness: 1.778
    - name: scurve_arctangent
      type: CHOP:scurve
      role: isolated
      parameters:
        type: atan
    - name: scurve_biasLinear
      type: CHOP:scurve
      role: isolated
      parameters:
        steepness: 0.924
        linearize: 1
        bias: 0.305
    - name: scurve_biasSteepness
      type: CHOP:scurve
      role: isolated
      parameters:
        steepness: 2
    - name: scurve_prependAppend
      type: CHOP:scurve
      role: isolated
      parameters:
        prepend: 219
        append: 600
        linearize: 1
    connections:
    - from: scurve1
      to: join1
      input_index: '0'
    - from: scurve2
      to: join1
      input_index: '1'
    - from: slider2/out1
      to: null1
      input_index: '0'
    - from: slider1/out1
      to: trail1
      input_index: '0'
    - from: lookup1
      to: trail1
      input_index: '1'
    - from: slider1/out1
      to: lookup1
      input_index: '0'
    - from: select1
      to: lookup1
      input_index: '1'
    - from: null1
      to: scurve_lookup
      input_index: '0'
    topology:
      operator_count: 24
      connection_count: 8
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: a variety of simple curves using S Curve CHOP.Drag-drop any S Curve
      CHOP to the select1 CHOP and operate the slider to see how the slider can be
      made non-linear.scurve_lookup shows how you can eliminate the lookup CHOP by
      doing the lookup itself.See also Animation COMP to generate more complex keyframed
      curves.See the Function CHOP for a variety of non-linear transformations.Or
      the Trigger CHOP to get attack-decay-sustain-release..
  - example_name: example2
    operators:
    - name: math1
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 1
        preoff: 3.3
    - name: limit1
      type: CHOP:limit
      role: output
      parameters:
        type: clamp
        min: 3
        max: 4
    - name: noise2
      type: CHOP:noise
      role: input
      parameters:
        period: 0.59
        amp: 1.5
    - name: lookup1
      type: CHOP:lookup
      role: output
      parameters:
        index1: 2
        index2: 5
    - name: scurve1
      type: CHOP:scurve
      role: input
      parameters:
        torange1: 3
        torange2: 4
    - name: select1
      type: CHOP:select
      role: isolated
      parameters:
        chops: '"incomingData lookup1"'
    - name: incomingData
      type: CHOP:null
      role: processor
    connections:
    - from: noise2
      to: math1
      input_index: '0'
    - from: incomingData
      to: limit1
      input_index: '0'
    - from: incomingData
      to: lookup1
      input_index: '0'
    - from: scurve1
      to: lookup1
      input_index: '1'
    - from: math1
      to: incomingData
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 5
      has_parallel_paths: true
      max_chain_length: 4
    curator_text: If you have values coming in for a channel that are say between
      2 and 5 (math1), and you want to limit them to be between 3 and 4, without hard-clamping
      them (as you would with a Limit CHOP). you would use an S Curve with a Lookup
      CHOP to soft-limit them to between 3 and 4.Lookup's Input Range is set to 5.
      S Curve range is set to 3 to 4.  With this, the values at 3.5 don't change.
  - example_name: example3
    operators:
    - name: timer1
      type: CHOP:timer
      role: input
      parameters:
        deferpars: 'on'
        length: 5
        callbacks: timer1_callbacks
        timeslice: 'on'
        exportmethod: datname
