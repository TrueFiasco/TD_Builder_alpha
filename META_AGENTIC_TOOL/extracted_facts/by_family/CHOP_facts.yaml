      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: Un-bypass the Hog CHOP (the arrow flag on the node). The performance
      will reduce. The Perform CHOP's "cook" channel indicates frames are dropped.  Remember
      to bypass the Hog CHOP again, as it will cook every frame until it's bypassed.
- operator_type: phaserCHOP
  examples:
  - example_name: example1
    operators:
    - name: lfo1
      type: CHOP:lfo
      role: input
      parameters:
        wavetype: ramp
        frequency: 0.25
        channelname: index
        timeslice: 'on'
    - name: phaser1
      type: CHOP:phaser
      role: isolated
    - name: phaser2
      type: CHOP:phaser
      role: output
    - name: phaser3
      type: CHOP:phaser
      role: output
    - name: readMe1
      type: DAT:text
      role: isolated
      parameters:
        pageindex: 1
    - name: constant1
      type: CHOP:constant
      role: input
      parameters:
        const0name: index
    connections:
    - from: lfo1
      to: phaser2
      input_index: '0'
    - from: constant1
      to: phaser3
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: 'Author of CHOP and examples: David BraunThe Phaser CHOP is set
      of values (Num Samples), that start at 0, and will all rise to 1, each sample
      starting to rise at a different time, and rising at different rates.The first
      input is an index, often a time index, which must be between 0 and 1. Typically
      it is an LFO CHOP set to Ramp.When the index is 0, the Phaser CHOP will output
      0 for all samples. When the index is 1, the Phaser CHOP will output 1 for all
      samples. Play with constant1.'
  - example_name: example2
    operators:
    - name: phaser1
      type: CHOP:phaser
      role: output
    - name: phaser2
      type: CHOP:phaser
      role: output
    - name: phaser3
      type: CHOP:phaser
      role: output
    - name: phaser4
      type: CHOP:phaser
      role: output
      parameters:
        edge: 0.2
    - name: readMe2
      type: DAT:text
      role: isolated
      parameters:
        pageindex: 1
