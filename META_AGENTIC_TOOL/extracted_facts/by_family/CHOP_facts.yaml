      -5 to +5.It simulates what a scanner would see from a distant point in -Y where
      one object is being occluded by another object.blobRender1 shows the process.
      The blob area in the Area of Interest, defined by the boulding box corner parameters.White
      is a dot for every X Y sample. fakeData1_ is 1000 samples long.The red dots
      are the centers of the detected blobs that are output from the CHOP. The red
      lines are actually boxes surrounding the points that are associated with the
      blob.The white lines at the top are excluded from the blob detection because
      they are outside the blob bounding box.Lost Blob Timeout was increased to alow
      for one blob going behind the other.
