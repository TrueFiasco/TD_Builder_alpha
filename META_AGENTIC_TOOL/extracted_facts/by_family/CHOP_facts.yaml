    curator_text: The Pan Tilt CHOP calculates the pan and tilt angle of a movinghead
      platform to point it into the direction of a target taking into consideration
      constarains of each axis.It requires as an input the transform between a target
      and the movinghead platform which can easily be obtained with the Object CHOP.If
