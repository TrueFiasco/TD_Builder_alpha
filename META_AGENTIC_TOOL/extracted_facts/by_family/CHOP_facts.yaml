    curator_text: Alternately you can specify the begin time of each timer, as you
      would with a bunch of video clips on a timeline.Replace the Timer CHOP's Segments
      DAT parameter with table_begin4.Note that you have to be careful if overlapping
      the segments. If they do overlap, the later segments take precedence.The segments
