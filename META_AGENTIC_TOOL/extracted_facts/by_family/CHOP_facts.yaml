    curator_text: 'Delay will cause some seconds of delay after the Start and before
      the timer starts counting up.Timer can also cycle: Click Start and watch a few
      times. It will cycle 4 times.You can interrupt and make it cycle fewer times:  Click
      parameter Exit at End of Cycle, or Go to Done to exit cycling immediately.Cycle
      controls: Cycle on/off, Cycle Limit (infinite when off), Maximum Cycles (when
      Cycle Limit is on).The cycles_pulse channel triggers the depth-finder sound.The
      done_pulse channel triggers the "done" text in Text TOP.( Expert NOTE: To make
      sure the cycle_pulse and done_pulse channels are always exported correctly,
      the  Export Method on the Common page is set to DAT Table by Name. This is true
      of the Timer CHOP and other CHOPs with selectable channels and specific names,
      like Beat and Perform. )The parameters Speed and Play vary the timer speed.'
  - example_name: example5
