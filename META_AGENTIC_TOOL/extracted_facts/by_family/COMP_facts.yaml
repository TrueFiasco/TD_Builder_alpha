        sizey: 50
        reverseanchors: 'on'
        rows: 5
        cols: 7
    - name: null1
      type: CHOP:null
      role: output
    - name: null2
      type: SOP:null
      role: output
    - name: light1
      type: COMP:light
      role: isolated
      parameters:
        tz: 10
    - name: merge1
