        textpaddingr: 0.04
        textpaddingb: 0.04
        textpaddingt: 0.04
        aligny: center
        material: ./constant1
    - name: testTorus
      type: COMP:geo
      role: output
      parameters:
        tz: -3
        sx: 0.2
        sy: 0.2
        sz: 0.2
    - name: objectmerge1
      type: SOP:objectmerge
      role: isolated
      parameters:
        xform: cameraViewport
        merge0sop: geo1/render
    - name: cameraOverView
      type: COMP:cam
      role: isolated
      parameters:
        pageindex: 7
        pxform: 'on'
        aperture: 44.1
        winrollpivot: legacy
        ext0promote: 'on'
        nodeview: opviewer
    - name: cameraViewport
      type: COMP:cam
      role: input
      parameters:
        pageindex: 7
        pxform: 'on'
        aperture: 44.1
        winrollpivot: legacy
        ext0promote: 'on'
        nodeview: opviewer
    connections:
    - from: render1
      to: out1
      input_index: '0'
    - from: cameraViewport
      to: geotext1
      input_index: '0'
    - from: cameraViewport
      to: testTorus
      input_index: '0'
    topology:
      operator_count: 12
      connection_count: 3
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: This gets a SOP’s points in the camera’s XYZ space using an Object
      Merge SOP. It then builds a Spec CHOP and a Spec DAT for the Geo Text COMP to
      override the text string, tx, ty, tz and Font Size. The Geo Text COMP’s anchor
      and align parameters are tricky to set up to get the text to start to the right
      of the 3D points.In the Spec DAT, fontsize is overridden per-string to make
      it constant-size text on-screen, until it's far away when it starts to shrink
      visually.Note that geotext1 is parented to cameraViewport so the text is drawn
      facing that camera always.  testTorus, if you turn on its Render flag, is along
      the z-axis of the cameraViewport too.
