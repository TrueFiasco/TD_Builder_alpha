    curator_text: Texture instancing takes a geometry (SOP) (template) and a set of
      TOPs, and places a rectangle (instance) of the rectangle at a position/rotation/scale
      defined by the CHOP channels. Plus it's textured using an integer index that
      selects which texture to use for the instance.
  - example_name: example4
