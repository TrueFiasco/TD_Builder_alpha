    curator_text: This example shows how force fields can be used in a simulation.Force
      fields have a transform as well as a radius. Positive force field strength pushes
      objects out from the force fields, whereas negative strength pulls objects toward
      the center. In this example we want negative strength to pull fluid particles
      in. We grab the Low frequency channel from the audioAnalysis palette COMP and
