      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: You can put your SOPs outside or inside the Geometry component.
      As long as there is at least one SOP inside whose Display flag (blue) is turned
      on, you will see something in the Geometry COMP's viewer and the Camera COMP's
      viewer.As long as there is at least one SOP inside whose Render flag (purple)
      is turned on, you will see something in the Render TOP image, but the Geometry
      COMP's Render flag (purple) must also be On, AND the Render parameter must also
      be On.Try turning all these flags on/off to confirm.Turn on the Viewer Active
      on the Geonetry COMP node, and press 'h' to home your visible SOPs.Moving around
      and tumbling in the viewer has no effect on the Geometry COMP state nor how
      it's rendered.Where it's rendered is controlled by the Geometry COMP's parameters.
  - example_name: example2
    operators:
    - name: box1
