- operator_type: containerCOMP
  examples:
  - example_name: example1
    operators:
    - name: grid
      type: COMP:container
      role: isolated
      parameters:
        pageindex: 1
        w: 500
        h: 500
        sizefromwindow: 'on'
        topsmoothness: mipmap
        align: verttb
    connections: []
    topology:
      operator_count: 1
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: 'In grid, we want to arrange 5 panels vertically, with each component
      occupying some fraction of the height.The children panels in "grid" fit the
      width of the parent because their Horizontal Mode is set to Fill, and on "grid"''s
      Children page, Align is set to Top to Bottom.Note that all 5 panels in "grid"
      are clones of container1. (They don''t have to be)Then vertically, we want each
      container1-container5 to occupy a different fraction of the vertical space.
      So you set their Vertical Mode to Fill, and each container has a different Vertical
      Fill weight, like .1, .2 etc. The Vertical Fill Weights of all 5 don''t have
      to add up to 1, they are just proportional.Their order is determined by the
      component''s Align Order parameter, where the lowest number is first.  If some
      nodes have the same Align Order parameter value as it does here (they are default
      0), it then uses the alphanumeric node name to determine the order, where container3
      follows container2.container1 is at the bottom because "grid"''s Align menu
      is Bottom to Top.Because each container1-container5 have their width and height
      set in this way, their X, Y, Width and Height parameters are disabled.You can
      still get their computed values by using these python members, say for container2:
      container2.x, container2.y, container2.width, container2.height. That''s how
      you see their resolutions in the text of the component.You can bring up grid
      in a floating window and pull the edges of its window to resize the container,
      and the enclosed container1-container5 will adjust accordingly.'
  - example_name: example2
    operators:
    - name: gridAnchors
      type: COMP:container
      role: isolated
      parameters:
        w: 500
        h: 500
        sizefromwindow: 'on'
        topsmoothness: mipmap
        align: verttb
    connections: []
    topology:
      operator_count: 1
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: We again want to fill the panel vertically with 5 containers inside,
      but on container1-container4, this uses Anchor parameters to specify the exact
      fraction of the height of the parent, and container5 is set to Fill the rest
      of the vertical space.It still uses the Top to Bottom setting of the parent
      to position each container.Change container3's Top Anchor parameter.You can
      also specify the sizes in pixels using Top Offset.
  - example_name: example3
    operators:
    - name: Vertical
      type: COMP:container
      role: isolated
      parameters:
        pageindex: 1
        w: 1280
        h: 720
        top: ./out1
        topsmoothness: mipmap
        parentshortcut: Project
    - name: Horizontal
      type: COMP:container
      role: isolated
      parameters:
        pageindex: 1
        w: 1280
        h: 720
        top: ./out1
        topsmoothness: mipmap
        parentshortcut: Project
    connections: []
    topology:
      operator_count: 2
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: Here are two touchscreen Slider panels. One for Horizontal and one
      for Vertical. All the touch screen (and/or mouse) swiping is done inside the
      swipe container which is an overlay over the actual content.   The swipe container
      has an extension which mainly records if a swipe or a click has occurred. If
      a click has occurred, it is being send from the MultiTouchIn DAT to the content
      container. Otherwise the interaction is solely handled by the swipe network.
  - example_name: example4
    operators:
    - name: container1
      type: COMP:container
      role: isolated
      parameters:
        pageindex: 4
        w: 480
        h: 270
        top: ./back
        topsmoothness: mipmap
        drop: usecallbacks
        dragdropcallbacks: ./dragdrop
    - name: moviefilein1
      type: TOP:moviefilein
      role: isolated
      parameters:
        pageindex: 4
        outputresolution: quarter
    - name: moviefilein2
      type: TOP:moviefilein
      role: isolated
      parameters:
        outputresolution: quarter
    - name: moviefilein3
      type: TOP:moviefilein
      role: isolated
      parameters:
        outputresolution: quarter
    connections: []
    topology:
      operator_count: 4
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: 'container was switched on Drag/Drop to Use Drag/Drop Callbacks.
      Clicked "Add" and DAT was created inside.code was added to container1/dragdrop:def
      onDropGetResults(comp, info):  ...  print(info[''dragItems''][0].name)  op(''select1'').par.top
      = info[''dragItems''][0]"info" contains a dictionary of the results.Drag-drop
      the Movie File In TOPs to the viewer of container1 to run the code.'
  - example_name: example5
    operators:
    - name: eval1
      type: DAT:eval
      role: isolated
    - name: container1
      type: COMP:container
      role: isolated
      parameters:
        w: 404
        h: 283
