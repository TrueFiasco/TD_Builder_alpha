      connection_count: 8
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: Here's an example of instanced geometry that's textured with a single
      Texture 3D TOP that's holding movie frames in a 2D array.It's set to be running,
      but you can play with stopping the movie player, stopping the active state on
      the 3d texture, or a combination of those to change the resource cost of this
      approach.
  - example_name: example5
    operators:
    - name: cam1
      type: COMP:cam
      role: isolated
      parameters:
        tz: 4
    - name: fit1
      type: TOP:fit
      role: processor
      parameters:
        sx: 3.3
        sy: 3.3
        legacyxform: 'on'
        outputresolution: custom
        outputaspect: resolution
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 7
        rx: -43
        instancing: 'on'
        instanceop: toGeoXYZ
        instancetx: r
        instancety: g
        instancetz: b
        instancer: r
        instanceg: g
        instanceb: b
        material: constant1
    - name: res1
      type: TOP:res
      role: processor
      parameters:
        highqualresize: 'on'
        outputresolution: quarter
    - name: res2
      type: TOP:res
      role: processor
      parameters:
        pageindex: 1
        outputresolution: quarter
    - name: blur1
      type: TOP:blur
      role: processor
      parameters:
        pageindex: 1
        chanmask: 4
    - name: mono1
      type: TOP:mono
      role: processor
