    curator_text: The container1 COMP contains 4 Button COMPS, their Button Type set
      to "radio down".Values from all buttons are read using a Parameter CHOP, and
      then converted to a single output value using a Fan CHOP.
  - example_name: example2
    operators:
    - name: null1
