    topology:
      operator_count: 8
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: In this example there is a control window and an output window that
      would typically be sent to the projector.The windowControl WindowCOMP has its
      V-Sync Mode disabled, while the main windowOutput window has V-Sync Mode enabled.
      Only one Window component should have V-Sync enabled (otherwise the windows
      will fight with each other for sync) and usually this is the window component
      that is spanning all display monitors to audience. Having V-Sync enabled will
      avoid tearing artifacts.Because the control window has V-Sync disabled you may
      see tearing artifacts on this display but generally this is not an issue. Notice
      the WindowControl Open as Separate Window parameter is bound to the windowOutput
      component's Open as Perform Window pulse parameters.  The windowControl window
      should be opened as a separate window while the main windowOutput is opened
      as the main perform window.
  - example_name: example3
    operators:
    - name: datto1
      type: CHOP:datto
      role: input
      parameters:
        dat: monitors1
        output: chanpercol
        firstrow: names
    - name: layout
      type: COMP:container
      role: isolated
      parameters:
        topsmoothness: mipmap
        align: horizlr
        justifyh: left
        justifyv: top
        parentshortcut: Monitors
        iop1shortcut: '""'
        iop1op: '""'
        ext1object: '""'
        ext1name: '""'
        ext2object: '""'
        ext2name: '""'
        ext3object: '""'
        ext3name: '""'
    - name: select1
      type: CHOP:select
      role: processor
      parameters:
        channames: height
    - name: window1
      type: COMP:window
      role: isolated
      parameters:
        winop: layout
        justifyv: top
        dpiscaling: native
        alwaysontop: 'on'
    - name: maxHeight
      type: CHOP:analyze
      role: output
      parameters:
        function: maximum
    - name: monitors1
      type: DAT:monitors
      role: isolated
      parameters:
        callbacks: monitors1_callbacks
    - name: arrangement
      type: TOP:res
      role: isolated
      parameters:
        pageindex: 1
        highqualresize: 'on'
        outputresolution: quarter
    - name: monitors1_callbacks
      type: DAT:text
      role: isolated
    connections:
    - from: datto1
      to: select1
      input_index: '0'
    - from: select1
      to: maxHeight
      input_index: '0'
    topology:
      operator_count: 8
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: This setup will layout 1 panel per monitor as long as the Windows
      Display Settings dialog has each monitor aligned to the top of each monitor
      and they are stacked horizontally.The layut container is the same size as the
      monitor size.  It gets its width from a CHOP export and directly from the Monitors
      DAT cell.Click the window1 parameter Open as Perform Window to activate the
      window.
