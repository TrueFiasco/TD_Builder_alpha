    curator_text: Normally for buttons to behave as radio buttons, they all need to
      be located in the same component. If you specify a Button Group DAT which has
      the paths to all buttons, you can spread the buttons throughout your network
      while still having them behave as linked radio buttons.In this example, container1
      COMP contains 8 buttons in different components. A "buttonList" DAT with paths
      to all buttons is generated usng an OP Find DAT. Notice all Button COMPs also
      have their Button Group DAT parameter set to that same buttonList DAT.  Values
      from all buttons are read using a Parameter CHOP, and then converted to a single
      output value using a Fan CHOP.
