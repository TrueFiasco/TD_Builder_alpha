      max_chain_length: 6
    curator_text: The environment light is central to working with PBR materials.
      This  render uses simple settings. The cloud environment map is the generic
      environment map that is included with TouchDesigner.Everything in this scene
      is extremely default so look through each node to discover how quick and easy
      it is to setup a good looking render.A secondary distant light source - which
      is called light1 gives a directionality to the light. Notice how you control
      the specular highlight location on the right side ball when you change the orientation
      of the distant light source.Use projection1 to rotate parameters to transform
      the enviornment light to you liking. Use HSVAdjust to modify the overall tempurature
      of the scene. Modify the saturation parameter and see how that affects the tone
      of the lighting.Notice how the PBR material parameters - specular, roughness
      and mentalness have a profound effect on the surface look once everthing is
      rigged properly.Rotate the environment light using the environment map rotate
      parameters for fast and dramatic effect.The SSAO post effect is very important
      to help the balls sit nicely on the ground. No shadows are required to nicely
      render a scene like this.
