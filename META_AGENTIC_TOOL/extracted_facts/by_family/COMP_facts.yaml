      parameters:
        op: engine1
        infotype: engineperform
    - name: null1
      type: TOP:null
      role: output
    - name: null2
      type: DAT:null
      role: isolated
    - name: null3
      type: TOP:null
      role: isolated
    - name: null4
      type: DAT:null
      role: output
    - name: effect1
