    curator_text: A Lister Widget shows a lister use case designed to allow, for example,
      programming a scene change sequence.  There is no actual functionality except
      for the editing the scenePlaylist DAT.Open the example by right clicking on
      the example parent component and click "View..." from the popup menu.You can
      edit cells and drag-drop rows to other rows to reorder the scenePlaylist DAT.
      The data that is managed by the lister in stored in the scenePlaylist DAT. This
      DAT is referenced by the sequencerLister Widget component. The sequenceLister
      widget is customized using the Edit Config COMP, Edit Column Definitions and
      Edit Callbacks buttons to access these two sub-assets.The configSequencer COMP
      provides Table TOPs to configure the cell looks of the table.You can edit cells
      and drag-drop rows to re-order.  The colDefine DAT is a table that provides
      configuration settings for the table behavior. The callbacks DAT in configSequencer
      provides Python callbacks that are called when various events happen, for example
      when the data is loaded, or a cell is clicked.- Ease of Use Features -The Input
      "Table Has Headers" parameter makes working with DATs much easier, as the sourceData
      row in the Column Define DAT can match the names of the data storage DAT that
      is assigned using the "Input Table DAT" parameter. Once this link has been made
      features like "Drag To Reorder Rows" and "Selectable Rows" will be much easier
      to manage.
