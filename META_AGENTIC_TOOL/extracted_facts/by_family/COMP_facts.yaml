      to: reorder1
      input_index: '1'
    - from: mono1
      to: reorder1
      input_index: '2'
    - from: blur1
      to: toGeoXYZ
      input_index: '0'
    - from: res2
      to: toGeoColor
      input_index: '0'
    - from: reorder1
      to: math_rerangeAnd32BitFloat
      input_index: '0'
    topology:
      operator_count: 18
      connection_count: 11
      has_parallel_paths: true
      max_chain_length: 8
    curator_text: Here's an example of instanced geometry that gets its XYZ position
      values from a TOP.Right-click on render1 and select View...We're making a grid
      of 64 x 64 instances in XY, where an image is offsetting the boxes in Z. Each
      pixel of toGeoXYZ is an instance.reorder1 assembles a horizontal ramp in red
      (which will be mapped to the x position of each instance), a vertical ramp in
      green for Y, and a Z-displacement in the blue channel. We don't need the alpha
      channel.toGeoXYZ is 64x64 pixels giving a set of 64x64 instances. It is made
      of floating point pixel values (set on the Common page of the Math CHOP), and
      is re-ranged to be -1 to +1.toGeoColor specifies the color on geo1's Instance
      2 page. It also has to be the same resplotion as geoXYZ.blur1 softens the Z-displacements
      only (see Channel Mask on the Common page only affecting Z).
