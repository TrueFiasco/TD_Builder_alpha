      type: CHOP:null
      role: output
    - name: null2
      type: TOP:null
      role: output
    - name: count2
      type: CHOP:count
      role: processor
      parameters:
        pageindex: 1
        output: loop
        limitmax: 2
        timeslice: 'on'
    - name: switch1
      type: TOP:switch
      role: processor
    connections:
    - from: count2
      to: null1
      input_index: '0'
    - from: switch1
      to: null2
      input_index: '0'
    - from: lfo2
      to: count2
      input_index: '0'
    - from: base1/out1
      to: switch1
      input_index: '0'
    - from: base2/out1
      to: switch1
      input_index: '1'
    - from: base3/out1
      to: switch1
      input_index: '2'
    topology:
      operator_count: 11
      connection_count: 6
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: TouchDesigner is a "pull system". A common misconception with cooking
      in TouchDesigner is that cooking starts upstream and moves downstream. This
      is incorrect. Almost all operators will only cook when something is interested
      in their data. This example shows this behavior, and how you can use it to heavily
      optimize your networks.- Notice the Info CHOPs showing when children nodes in
      a Base COMP are cooking. When output from a base is not requested, all cooking
      of all children in that Base COMP stops (except when data is forced out like
      with an Audio Device Out CHOP).- Looking at the wires from the Base COMPs to
      the Switch TOP, notice how only the wire from the Base COMP which output is
      requested is animated, which means that content is cooking. The other 2 wires
      are static which indicates nothing is cooking inside them. Now activate the
      viewer pane of Base3 (top left circle icon on Base3 node). Notice how Base3
      now keeps cooking - this is because you are requesting output by viewing its
      contents.
