    curator_text: This example demonstrates the Constraint COMP, specifically hinges.
      In this simulation there are 5 blocks that are instanced on the Blocks Actor
      COMP, and a Ball Actor COMP, all inside bsolver1. The Ball simply falls on the
      bridge in this simulation, and because of the constraints put in place, the
      bridge will hold the ball up. The bridge is created from the 5 blocks using
      the Constraint COMP to create hinges. Note that they must be hinges in this
      case because we only want the Blocks to rotate around the Z axis. If it were
      a point to point constraint then they could rotate along any axis and as a result
      the ball would fall off.constraints_between is used to create 4 hinges between
      the 5 blocks. It is a body to body relationship between bodies on bsolver1/Blocks.
      The bodies parameter is a list of body IDs and is a 1 to 1 mapping with the
      other bodies parameter. So, on constraints_between we are creating 4 versions
      of the same hinge between 0 and 1, 1 and 2, 2 and 3, and 3 and 4. The pivot
      points are how we connect the bodies. We are connecting the right side of the
      first body to the left side of the second body, using the size of box1 inside
      the Blocks COMP as the boundary.Finally, we add a hinge constraint to the left
      and right ends so that the bridge is held up. Because these constraints are
      not body to body, the far left and right bodies will be pinned to the world
      at that position, unable to move. As a result they will hold up all the other
      blocks.
