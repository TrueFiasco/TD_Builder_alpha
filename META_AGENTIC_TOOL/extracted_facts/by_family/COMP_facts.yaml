    connections:
    - from: effect1/out1
      to: null1
      input_index: '0'
    - from: effect1/out2
      to: null4
      input_index: '0'
    topology:
      operator_count: 12
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: If you want to analyze what operators inside the Engine process
      are taking CPU and GPU time and memory, use the OP Find DAT in your component,
      turn on its CPU/GPU time/memory columns, and send the DAT's data back to the
      main process.Turn cook flag  (x) of effect1 on, right-click on effect1 and Save
      Component .tox, turn cook flag off, then turn cook flag of engine1 on and let
      it start returning the image and DAT data.
  - example_name: example3
    operators:
    - name: engine1
      type: COMP:engine
      role: isolated
      parameters:
        pageindex: 6
        file: monitorOut.tox
        callbacks: engine1_callbacks
    - name: monitorOut
