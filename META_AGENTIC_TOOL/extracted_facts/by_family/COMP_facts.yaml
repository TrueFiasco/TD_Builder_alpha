    topology:
      operator_count: 2
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: 'rclick on container1 and select View...pull the edges and corner
      of its window to resize the container. This will change the width and height
      parameters. The enclosed boxes will adjust accordingly.The key is to set 2 parameters
      in the top container: - Layout page - Size from Window: on- Panel page - Flaoting
      Viewer Aspect: UnconstrainedThen re-open the floating window.'
- operator_type: engineCOMP
  examples:
  - example_name: example1
    operators:
    - name: hog2
      type: CHOP:hog
      role: isolated
      parameters:
        delay: 0.2
    - name: info1
      type: CHOP:info
      role: isolated
      parameters:
        op: engine1
    - name: info2
      type: CHOP:info
      role: isolated
      parameters:
        op: engine1
        infotype: enginestatus
    - name: info3
      type: CHOP:info
      role: isolated
      parameters:
        op: engine1
        infotype: engineperform
    - name: info4
      type: DAT:info
      role: isolated
      parameters:
        op: engine1
    - name: null1
      type: CHOP:null
      role: output
    - name: null7
      type: CHOP:null
      role: processor
    - name: audio1
      type: COMP:base
      role: input
      parameters:
        pageindex: 3
        iop1shortcut: '""'
        iop1op: '""'
    - name: trail3
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: trail4
      type: CHOP:trail
      role: output
      parameters:
        wlength: 1
        timeslice: 'on'
    - name: engine1
      type: COMP:engine
      role: isolated
      parameters:
        file: audio1.tox
        assetpaths: toe
        callbacks: engine1_callbacks
        clock: independent
        matchrate: 'off'
        fps: 240
    - name: annotate1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        includeinorder: 'on'
    - name: crossfade
      type: CHOP:constant
      role: isolated
      parameters:
        const0name: cross
        const0value: 0.35
    - name: null_rate
      type: CHOP:null
      role: isolated
    - name: audioosci1
      type: CHOP:audioosci
      role: isolated
      parameters:
        frequency: 110
        timeslice: 'on'
    - name: null_audio
      type: CHOP:null
      role: input
    - name: engine1_callbacks
      type: DAT:text
      role: isolated
    connections:
    - from: audio1/out2
      to: null1
      input_index: '0'
    - from: audio1/out1
      to: null7
      input_index: '0'
    - from: null7
      to: trail3
      input_index: '0'
    - from: null_audio
      to: trail4
      input_index: '0'
    topology:
      operator_count: 17
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: 'Why use Engine COMP for audio? With audio in a separate process
      you have less interfernce from the main grahics cooking, so you can shorten
      the latency in your Audio Device Out and In CHOPs, and run your Engine COMP''s
      timeline at 120 or 240 frames per second.Turn on the cook flag of audio1 to
      hear what it does.  An Audio Device Out is in audio1 going to your default audio
      device.Then detach its first input to hear what it does without an input (plays
      our default loop).Connect crossfade to the second input of audio1 to see and
      adjust crossfade between 0 and 1 to head what its effect is.The first output
      of audio1 is the audio that''s mixed. The second output is the sample rate of
      audio, 60 by default.Un-bypass the Hog CHOP to make the process run around 5
      frames per second (200 msec). Because the time slice is set to 150 msec by default,
      it has trouble playing audio. Bypass the Hog CHOP again. Not let''s make TouchEngine
      play audio1.Right-click on audio1 and select Save Component.. to audio1.tox.On
      engine1, Turn off the un-cook flag (x). It will start to run the Engine process,
      load audio1.tox and run the component. You can watch that in the Info CHOP.  The
      first output of engine1 should connect to null_audio, and the second to null_rate.The
      rate in null_rate should be 240 because that''s the FPS set on engine1''s Tune
      page.The Engine process is now outputting the audio to your audio device.Move
      the crossfade CHOP''s slider back and forth to hear its crossfade effect.Now
      un-bypass the Hog CHOP to make the main process drop to 5 fps. The Engine still
      plays the audio smoothly because its Clock parameter is set to Independent -
      it doesn''t wait for the main process and just uses the latest data it has from
      the main process.Note that the only thing the Engine process is dependent on
      is the crossfade slider. Now try reducing the Audio Buffer Length parameter
      on engine1. Because it''s running at 240 fps, that''s about 4 msec, so a buffer
      length double that (.008 msec) may be achievable, or it may have to be some
      power of 2 samples.==The Math CHOPs inside audio1 are set Interp Pars per Sample
      ON, which means that if the crossfade control changes from one frame to the
      next, the audio does not pop: when the 60 fps crossfade is converted to the
      samples-per-second of the audio (the Math CHOP up-samples), the crossfade values
      are interpolate from their value at the last time-slice to the new value at
      the end of current time slice.  So when that''s multiplied by the audio samples,
      the resulting waveform doesn''t have any jumps.'
  - example_name: example2
    operators:
    - name: info1
      type: CHOP:info
      role: isolated
      parameters:
        op: engine1
    - name: info2
      type: DAT:info
      role: isolated
      parameters:
        op: engine1
    - name: info3
