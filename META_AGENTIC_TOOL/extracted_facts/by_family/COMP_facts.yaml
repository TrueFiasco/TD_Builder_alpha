        op: base1
        iscope: children_cpu_cook_time
        passive: 'on'
        childcooktime: 'on'
    - name: info2
      type: CHOP:info
      role: isolated
      parameters:
        op: base2
        iscope: children_cpu_cook_time
        passive: 'on'
        childcooktime: 'on'
    - name: info3
      type: CHOP:info
      role: isolated
      parameters:
        op: base3
        iscope: children_cpu_cook_time
        passive: 'on'
        childcooktime: 'on'
