    - name: render1
      type: TOP:render
      role: isolated
      parameters:
        pageindex: 5
        uvunwrapcoordattrib: uv
        allowbufblending: 'on'
        resolutionw: 1280
        resolutionh: 720
    - name: reorder1
      type: TOP:reorder
