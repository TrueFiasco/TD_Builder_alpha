      operator_count: 5
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: The engine process can open its own desktop windows using a Windoww
      COMP.On monitorOut, rclick and select Save Component .tox to create the file
      needed by engine1.
