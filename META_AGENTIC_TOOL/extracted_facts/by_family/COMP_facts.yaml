      row in a table, and responds every time the table changes. You specify a master
      component plus the table you want to drive the replication.It will create one
      component for every row in the table specified in "replicator" by "Template
      Table".You have a master component, specified in Replicator by "Master Node".-------
      flavor 1 - replicator1 ------------Clones will be named/numbered sequentially
      with the prefix specified in Replicator by Node Prefix------- flavor 2 - replicator2
