    curator_text: adjust slider1 between 0 and 1.This shows you can use CHOPs to drive
      strings as well as a table. The number of CHOP samples has to equal the number
      of text rows -1. Channel names are the same as the DAT's possible column names.It
      also shows the extra set of transforms that you can apply to strings using names
      prefixed by "l" for local - ltx lrz lsy for example.The DAT table has "1" in
      the "append" column so without any extra transform, one string follows the string
      in the row above it.The Phaser CHOP gives irregular blending.  The Noise CHOPs
      give random local positioning/rotation of the text.Try wiring spring1 into to_geotext1
      instead of lag1, and adjust slider1.  Lag and Spring CHOPs are set to filter
      per-sample.
