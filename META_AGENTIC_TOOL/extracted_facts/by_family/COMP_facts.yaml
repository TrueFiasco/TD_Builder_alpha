      input_index: '0'
    - from: merge1
      to: null1
      input_index: '0'
    - from: transform1
      to: null2
      input_index: '0'
    - from: sopto1
      to: merge1
      input_index: '0'
    - from: pattern1
      to: merge1
      input_index: '1'
    - from: sphere1
