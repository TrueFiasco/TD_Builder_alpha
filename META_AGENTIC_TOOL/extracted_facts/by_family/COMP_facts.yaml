    curator_text: This examples demonstrates both a 2D simulation, and how the feedbacking
      system can be used to create an "attraction" system. All this is done in bsolver1.  In
      this example, the blocks are all attracted to their initial position. The slider
      is used to control the attraction. When the slider is at 0 the blocks will act
      as if there is no attraction, and just fall as normal. If the slider is at 1
      then the blocks will be at their original position (in the default case a Q).The
      blocks are created using instancing on the blocks COMP in bsolver1. They are
      instanced from the letter Q through a SOP to CHOP. These values are then used
      as the initial positions of the blocks.The feedbacking system works as follows:1.
      bulletsolver1 grabs the physics information from the blocks COMP.2. select1
      selects the transform (tx, ty, rz only because the simulation is 2D). A vector
      is created between the blocks current transform (from select1) and its original
      position recorded in null1 by subtracting null1 from select1 in math1. The range
      is then modified in math1 using the value from the slider.3. select3 selects
      the current velocity of the blocks from the Bullet Solver CHOP. This value is
      scaled down using the range parameter in math4 and the slider.4. The scaled
      current velocity in math4 and the velocity calculated in math1 are then added
      together in math2. This is the velocity we feedback to the blocks COMP. 5. First
      we have to merge bulletsolver1 (it has the body IDs and actor ID which are required
      for feedbacking) with the new velocity with replace first with last mode selected.
      to_feedback is then fed back into blocks. These will be the new velocities of
      the blocks at the next frame.
