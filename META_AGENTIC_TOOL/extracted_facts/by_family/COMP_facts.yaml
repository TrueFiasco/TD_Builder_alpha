      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This example shows how to emit first-person from a camera. The streamEmitter/cameraViewport
      COMP is used for its camera movement controls.actorStream1 and 2 are Fluid Emitters,
      and their transforms are parented to cameraViewport so the emission transform
      will change with the movement of the camera. actorStream's transforms are offset
