- operator_type: nvidiaflexsolverCOMP
  examples:
  - example_name: example1
    operators:
    - name: flex
      type: COMP:container
      role: isolated
      parameters:
        w: 1280
        h: 720
        top: ./out1
        topsmoothness: mipmap
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 2
        instancing: 'on'
        instanceop: nvflex1
        instancetx: r
        instancety: g
        instancetz: b
    - name: nvflex1
      type: TOP:nvflex
      role: isolated
      parameters:
        comp: flex/fsolver1/actor1
        filtertype: nearest
        format: useinput
    connections: []
    topology:
      operator_count: 3
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: A simple fluid example. Ckick Initialize, then Start and move your
      mouse around the flex viewer.fsolver1/actor1 is instanced using a teapot. The
      teapot is subdivided to give it more points.fsolver1/actor1 is a particle Actor
      COMP, which is enabled via the Particle parameter on the Flex page. actor1 is
      rendered as a low-poly sphere. In the case of a particle Actor COMP the display
      SOP is never used for the collision shape. The collision shape for particles
      is determined by the value of its solver's Particle Radius parameter.The Nvidia
      Flex Solver allows scene boundaries to be created, up to 6 total. Each plane
      defaults to an XY plane facing +Z. Rotation and Translation parameters can change
      the transform of the default plane.When the simulation is running, move the
      mouse to apply forces.Flex TOP is used to demonstrate how to grab position data
      from an Actor COMP. The Flex TOP is used as the instance OP for geo1 to demonstrate
      how to use the position data in the texture. It's an RGBA 32-bit texture where
      R=xpos, G=ypos, B=zpos, and A=0
  - example_name: example2
    operators:
    - name: info1
      type: CHOP:info
      role: isolated
      parameters:
        op: fsolver1
        childcooktime: 'on'
    - name: fsolver1
      type: COMP:nvflexsolver
      role: isolated
      parameters:
        actors: ./*
        bounds: 'on'
        boundmode: planes
        plane0ry: 90
        plane0tx: -3
        radius: 0.1
        cohesion: 0.39
        viscosity: 0.001
        colldist: 0.092
        scollmargin: 0.022
        plane1ry: -90
        plane1tx: 3
        plane2rx: 90
        plane2ty: 3
        plane3rx: -90
        plane3ty: -3
        plane4tz: -3
        plane5ry: 180
        plane5tz: 3
    connections: []
    topology:
      operator_count: 2
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This example is similar to simple, except the Actor COMPs are Fluid
      Emitters instead of just Fluid. We have four Actor COMPs, each one an emitter.
      Each emitter is allocated 25000 particles.Emission works by recycling old particles
      and bringing them up to the emission origin. The number of particles in the
      emission cycle is determined by the Max Emission Particles parameter of the
      Actor COMP.Emitter world position and direction is calculated from the Actor
      COMP's transform.
  - example_name: example3
    operators:
    - name: info1
      type: CHOP:info
      role: isolated
      parameters:
        op: fsolver1
        childcooktime: 'on'
    - name: info2
      type: CHOP:info
      role: input
      parameters:
        op: fsolver1
    - name: trail1
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: select1
      type: CHOP:select
      role: processor
      parameters:
        channames: '"initializing ready running timer_seconds running_seconds"'
    - name: fsolver1
      type: COMP:nvflexsolver
      role: isolated
      parameters:
        actors: ./*
        preroll: 'on'
        prerolltime: 5
        prerollstep: 5
        showpreroll: 'on'
        bounds: 'on'
        boundmode: planes
        plane0ry: 90
        plane0tx: -3
        radius: 0.1
        diss: 0.098
        cohesion: 1
        viscosity: 0.001
        colldist: 0.078
        scollmargin: 0.018
        plane1ry: -90
        plane1tx: 3
        plane2rx: 90
        plane2ty: 3
        plane3rx: -90
        plane3ty: -3
        plane4tz: -3
        plane5ry: 180
        plane5tz: 3
    connections:
    - from: select1
      to: trail1
      input_index: '0'
    - from: info2
      to: select1
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: This example adds on to the previous emission example, except with
      only one emitter with 100000 particles. A static triangle mesh shape is added
      for the particles to collide with. The Dissipation parameter is increased on
      fsolver1 to give the fluid a thicker texture.Pre-Roll is added so that the simulation
      begins in a somewhat stable state. Pre-Roll will step the simulation forward
      by the amount of desired seconds, performing a certain number of simulation
      steps per frame. This is designed to get into a stable start state without having
      to play araound with initital positions of particles. The state of the pre-roll
      can be retrieved from fsolver's info CHOP. If inititalizing=1 then pre-rolling
      is being done. If pre-roll is interrupted during this time it will be recalculated.
      When pre-roll is done initializing=0 and ready=1.
  - example_name: example4
    operators:
    - name: cam1
      type: COMP:cam
      role: isolated
      parameters:
        ty: -10
        tz: 21
        rx: -10
        px: -0.619792
        py: 16.4206
        pz: -49.8829
        orthowidth: 1
        aperture: 44.1
    - name: light1
      type: COMP:light
      role: isolated
      parameters:
        tz: 30
        aperture: 41.4214
    - name: render1
      type: TOP:render
      role: isolated
      parameters:
        pageindex: 5
        uvunwrapcoordattrib: uv
        resolutionw: 1280
        resolutionh: 720
    - name: fsolver1
      type: COMP:nvflexsolver
      role: isolated
      parameters:
        actors: ./*
        substeps: 5
        iterations: 5
        boundmode: planes
        radius: 0.2
        maxspeed: 15
        cohesion: 0.064
        viscosity: 0.001
        colldist: 0.208
    connections: []
    topology:
      operator_count: 4
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: In this simulation, instead of planar boundaries a triangle mesh
      hemisphere is added to catch the particles. The max speed parameter on fsolver1
      is set so that the particles won't clip through when falling.
