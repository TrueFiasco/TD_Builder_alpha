      role: processor
      parameters:
        postxord: ts
    - name: switchControl
      type: COMP:container
      role: isolated
      parameters:
        pageindex: 1
        h: 30
        topsmoothness: mipmap
        align: horizlr
        spacing: 2
        justifyv: bottom
    connections:
    - from: render1
      to: out1
      input_index: '0'
    - from: sopto1
      to: null1
      input_index: '0'
    - from: transform1
      to: null2
      input_index: '0'
    - from: grid1
      to: switch1
      input_index: '0'
    - from: box1
      to: switch1
      input_index: '1'
    - from: sphere1
      to: switch1
      input_index: '2'
    - from: switch1
      to: transform1
      input_index: '0'
    topology:
      operator_count: 15
      connection_count: 7
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: Instancing takes a geometry (SOP) and places a copy (instance) of
      it at a position/rotation/scale defined by the CHOP channels. For example in
      the Geometry COMP's Translate X parameter, you would set it to 'tx', or whatever
      the x position channel is named.
  - example_name: example3
    operators:
    - name: cam1
      type: COMP:cam
      role: isolated
      parameters:
        tz: 150
        sx: 5
        sy: 5
        sz: 5
        winrollpivot: legacy
    - name: geo2
      type: COMP:geo
