      operator_count: 12
      connection_count: 12
      has_parallel_paths: true
      max_chain_length: 7
    curator_text: 'This example imports a rocks USD (Universal Scene Description)
      geometry asset.  Inside the rocks_callbacks script there is a commented out
      line - #comp.op(''Rock_0'').par.instanceop = ''../instances''Remove the # python
      comment delimiter and click the Import pulse parameter on the rocks USD component.The
      rocks begin to fly around due to the instance position processor network that
      starts with a select operation that goes into the asset hiearchy and selects
      the instance attributes. The rocks_callbacks script redirects the Rocks_0''s
      Instance OP parameter to look at the ''instances'' CHOP instead of the internal
      rocks/Instances operation.'
