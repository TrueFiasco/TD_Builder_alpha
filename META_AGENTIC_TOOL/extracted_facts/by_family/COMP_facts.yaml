      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This example demonstrates how to create a vortex effect with a force
      field.To achieve this, Vorticity Confinement is lowered to 5. The lower the
      Vorticity Confinement, the more rotational force particles will experience around
      the force field center.(hard to control. this snippet needs some more work!)
  - example_name: example10
    operators:
    - name: fsolver1
      type: COMP:nvflexsolver
      role: isolated
      parameters:
        actors: ./*
        preroll: 'on'
        prerolltime: 0.4
        showpreroll: 'on'
        bounds: 'on'
        boundmode: planes
        plane0ry: 90
        plane0tx: -6
        radius: 0.07
        diss: 0.098
        cohesion: 0.225
        viscosity: 0.001
        colldist: 0.078
        scollmargin: 0.018
        plane1ry: -90
        plane1tx: 6
        plane2rx: 90
        plane2ty: 3
        plane3rx: -90
        plane3ty: -3
        plane4tz: -3
        plane5ry: 180
        plane5tz: 3
    connections: []
    topology:
      operator_count: 1
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: 'Play with the Splat parameter of fsolver1.  You may want to Initiaize/Start
      on the Solver page first.Position and velocity feedback that tries to push the
      points to the locations of points in sprinkle1 based in the Splat parmeter.
      It pushes the weights of a random set of 0-1 values to blend the simulation
      (pixel values 0) with the xyz from sprinkle1. The weights are calculated with
      noise1, math1 (Pre-Add is bound to the splat parameter) and limit1. Matte blends
      the two inputs using the weights in the third input. sub1, math2, add1 blend
      in a bit of velicity due to the artificial movement based on Multiply par of
      math2.fsolver/glsl1 is the frmework of another example doing velocity feedback
      that checks the y position of each particle and if it''s lower than the lower
      limit of -1 then the y velocity is set to 5 in the output texture, creating
      a bouncing effect. glsl1 samples the position and velocity of each particle
      then outputs the input velocity or overwrites the green channel (ie. y) with
      5 if the position green channel (y) is lower than -1.Note: the TOP used to feedback
      must be the same format and size as the texture coming from the Nvidia Flex
      TOP. In this case for feedbacking velocity it''s 71x71 and 32-bit RGB. Generally
      speaking you can use the Nvidia Flex TOP as a TOP input to match size/format.'
