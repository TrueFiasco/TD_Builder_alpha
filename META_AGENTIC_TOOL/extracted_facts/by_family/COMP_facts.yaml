    curator_text: This is like the basic slider from OP Create, with its Value and
      Label parameter.  This means you can get its changing values by reading the
      parameter, or using the channel it outputs. Operating the slider will change
      the Period parameter of wave1 using an expression in the Period parameter. The
      Parameter Execute DAT. parexec2, responds to the Value parameter changing and
      runs a 1-line script to affect wave2's Period parameter.Changing constant1 will
      change the slider's Value0 parameter using a CHOP Execute DAT.Changing constant2
      will virtually click the slider panel and causing Value0 also to update.
