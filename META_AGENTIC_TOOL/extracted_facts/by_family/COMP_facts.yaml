    curator_text: 'This example demonstrates the use of the Continuous Collision Detection
      toggle on the Actor COMP. In the simulation, Block_A in bsolver1 has Continuous
      Collision Detection enabled, while Block_B does not. In the simulation, Block_A
      is top block, and Block_B is the bottom one. The Pulse Force toggle will apply
      an impulse force to both blocks in the negative X direction. Block_B will clip
      through while Block_A will not.This is because continuous collision detection
      performs collision detection between an object''s position at the start and
      end of the frame. This is in contrast to discrete collision detection, which
      is only performed at the beginning and end.Note: Continuous collision detection
      is not as performative as discrete collision detection, so it isn''t always
      suitable.The Box is created with a Box SOP as the collision shape, but what
      is displayed/rendered is the same box with the front missing.'
  - example_name: example15
    operators:
    - name: recycler
      type: COMP:container
      role: isolated
      parameters:
        pageindex: 7
        w: 1280
        h: 720
        top: ./out1
        topsmoothness: mipmap
    connections: []
    topology:
      operator_count: 1
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: What goes out, comes back in. via the Limit CHOP in recycler/bsolver1
      that loops position of the instances.recycler/colliders are the black stationary
      collision objects.Also, a fraction of the wood blocks are not affected by the
      wind force. The samples in recycler/bsolver1 are split off in to 2 groups, some
      affected by wind, the rest not.Anthough this is a 2D sim, some boxes are forced
      to move in Z if the tz slider is moved.A collision box, recycler/cambox at the
      camera prevents blocks going through camera. cambox is included in the Bullet
      Solver COMP's collision objects parameter.The primitive collision sounds suck,
      so they are turned off. But you can see that there is a channel indicating that
      an instance is colliding with something else.WHen running the sim, pause it
      by making the sim speed = 0.default sim is 2D, change Dimension on solver to
      3D and press Go.recycler/bsolver1/math_dampen slows things down by .2% per cook
      (mult by .998), like the effect of wind friction. (It's technically more correct
      to make it 1 - .002 * number_of_frames_of_timeslice.)
  - example_name: example16
    operators:
    - name: bsolver1
      type: COMP:bsolver
      role: isolated
      parameters:
        actors: ./*
        callbacks: bsolver1_callbacks
    - name: bsolver1_callbacks
      type: DAT:text
      role: isolated
    connections: []
    topology:
      operator_count: 2
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This example shows how to make dynamic concave collision bodies.
      To do this a compound collision shape is used out of 4 boxes in bsolver1/actor1/geo1.These
      are merged together to be used as an input to the torus, which will be used
      for display/rendering only.The toruses are instanced using a Line SOP.
  - example_name: example17
    operators:
    - name: playWithForces
      type: COMP:null
      role: isolated
    connections: []
    topology:
      operator_count: 1
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: Bring up a floating viewer of playWithForces (rclick -> View...)Go
      into playWithForces.on bsolver1, click Init Sim, then Start Sim. Due to force1,
      the box will move vertically.Turn off Active parameter on force1.Click Start
      Sim again. Turn on the Active parameter of force2. Because the Relative Position
      parameter of force2 is set to +1 in X, and the force is in +y, it will push
      up on the right side of the box, and cause it to rotate around the Z-axis.Make
      force2 Active off. Start Sim again.Turn on Active of force3. This will make
      it rotate only, as Torque is set to +Z.
  - example_name: example18
    operators:
    - name: bsolver1
      type: COMP:bsolver
      role: isolated
      parameters:
        actors: ./*
        callbacks: bsolver1_callbacks
    - name: bsolver1_callbacks
      type: DAT:text
      role: isolated
    connections: []
    topology:
      operator_count: 2
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This shows how to use the collision callback to create a simple
      repeating body emission.The onCollision() callback on the Bullet Solver COMP
      creates the emission looping effect. Once a body collides with the floor, its
      position is set to a new random position.A copied Circle SOP is used to create
      the bodies on the Actor COMP. bsolver1's Info CHOP 'timer_seconds' channel regulates
      the number of points visible in the first few seconds.
