    curator_text: This example demonstrates a simple feedbacking network on the torus
      COMP in bsolver1. Everytime the 'Slow Down Torus' button is pressed, the Y velocity
      of the torus will be multiplied by 0.75, slowing it down. This is done by first
      grabbing the current velocity of the torus using the Bullet Solver CHOP. vel_ty
      (linear y velocity) is selected and a switch is exported with the button value.
      When it's pressed, math1 (which has 75% the velocity) will be used instead of
      select1, and this subsequently overrides the old velocity in merge1 and then
      null1 feedbacks the values into the Actor COMP. These feedback values will update
      the Actor COMP's physics data at the beginning of the next frame. So when the
      button is pressed, the next frame the Actor COMP will be updated with 75% of
      the velocity.
