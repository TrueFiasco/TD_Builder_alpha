      max_chain_length: 3
    curator_text: The SixShadedObjectsLowRes component is an FBX asset being read
      from disk. When an FBX archive is read into an FBX component data may be extracted
      and writen back to disk into the current project folder under a folder name
      TDImportCache. As the asset is read into TouchDesigner a Python callback script
      maybe be used to modifiy the incoming archive assets.  This can be very useful
      in order to reform the asset to work more cleanly with TouchDesigner paths for
      things like materials and texture references.In this example the SixShadedObjectsLowRes_callbacks
      script is setup to search for any geometry components that have a material reference
      and if it finds a matching name for a pbrMAT in the root of this component it
      will modify the material refernce inside the FBX asset to point at the material
      found in the root of the asset.  This makes working with the materials easier
      as they are all found in one location.
- operator_type: fieldCOMP
  examples:
  - example_name: example1
    operators:
    - name: string
      type: COMP:container
      role: input
      parameters:
        pageindex: 7
        w: 150
        h: 25
        top: ./icon
        topsmoothness: mipmap
        crop: 'on'
        parentshortcut: string
    - name: string_
      type: DAT:null
      role: output
      parameters:
        pageindex: 7
    connections:
    - from: string/out1
      to: string_
      input_index: '0'
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: The idea here is that you are making the gadget tied to a certain
      cell of a certain DAT. So you specify the DAT, row and column. You can change
      these on the fly and the gadget will hook to some other cell.The parameter "Value"
      is always kept consistent with the cell, and the same cell value is output from
      the gadget as its first output (a 1-cell DAT). By default the cell is inside
      the gadget, so you can just use gadget UI edit set a text string that is output
      from the gadget and sets the "Value" parameter.Modifying the Value parameter
      updates the UI and the DAT cell, wherever it is.
