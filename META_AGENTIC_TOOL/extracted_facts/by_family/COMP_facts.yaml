      role: output
    - name: moviefilein1
      type: TOP:moviefilein
      role: input
      parameters:
        pageindex: 1
        speed: 0.4
        interp: 'on'
    - name: math_rerangeAnd32BitFloat
      type: TOP:math
      role: processor
      parameters:
        pageindex: 2
        toranger1: -1
        toranger2: 1
        torangeg1: -1
        torangeg2: 1
        torangeb2: 0.5
        format: rgba32float
    connections:
    - from: moviefilein1
      to: fit1
      input_index: '0'
    - from: math_rerangeAnd32BitFloat
      to: res1
      input_index: '0'
    - from: mono1
      to: res2
      input_index: '0'
    - from: res1
      to: blur1
      input_index: '0'
