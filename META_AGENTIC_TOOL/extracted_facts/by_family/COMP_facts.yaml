      to: select3
      input_index: '0'
    - from: select1
      to: replace1
      input_index: '0'
    - from: math1
      to: replace1
      input_index: '1'
    - from: replace1
      to: replace2
      input_index: '0'
    - from: speed1
      to: replace2
      input_index: '1'
    - from: replace2
      to: instances
