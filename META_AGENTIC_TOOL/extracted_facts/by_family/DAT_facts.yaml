      max_chain_length: 1
    curator_text: This looks for Transform TOPs where the tx, ty, sx and sy parameters
      are non-default and makes a table containing their current value in one row
      per parameter.Note that the OP Find DAT is creating one row per OP which is
      normal, but the callbacks script is creating, for each OP, a variable number
