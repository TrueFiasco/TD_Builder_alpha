- operator_type: renderpickDAT
  examples:
  - example_name: example1
    operators:
    - name: renderPick
      type: COMP:slider
      role: isolated
      parameters:
        pageindex: 1
        w: 800
        h: 450
        top: ./null1
        topsmoothness: mipmap
    connections: []
    topology:
      operator_count: 1
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This example demonstrates how to use a Render Pick DAT in a simple
      way without coding anything in the callbacks DAT docked to the Render Pick DAT..Click
      on the rotating geometry to relocate the texture.Go inside the render_pick component,
      and you'll see the Panel CHOP feeding the Render Pick DAT the necessary UV coordinates
      needed to acquire mapu and mapv coordinates to translate the texture.See also
      the Multitouch example in the Palette.
  - example_name: example2
    operators:
    - name: cam1
      type: COMP:cam
      role: isolated
      parameters:
        tz: 5
    - name: ramp1
      type: TOP:ramp
      role: input
      parameters:
        dat: ramp1_keys
    - name: light1
      type: COMP:light
      role: isolated
      parameters:
        tz: 10
    - name: panel1
      type: COMP:container
      role: isolated
      parameters:
        pageindex: 2
        w: 1280
        h: 720
        top: to_panel
    - name: states
      type: COMP:base
      role: isolated
      parameters:
        pageindex: 3
    - name: table1
      type: DAT:table
      role: input
      parameters:
        pageindex: 1
        fill: fillbycol
        fills0names: '"r g b"'
        fills0expr: 1
    - name: geo_box
      type: COMP:geo
      role: isolated
      parameters:
        tx: -0.15
        ty: -0.535
        rx: 33
        ry: 33
        rz: 33
        sx: 0.56
        sy: 0.56
        sz: 0.56
    - name: hsvrgb1
      type: TOP:hsvrgb
      role: output
    - name: render1
      type: TOP:render
      role: input
      parameters:
        pageindex: 5
        uvunwrapcoordattrib: uv
        resolutionw: 1280
        resolutionh: 720
    - name: null_mod
      type: DAT:null
      role: output
    - name: pattern1
      type: CHOP:pattern
      role: isolated
      parameters:
        wavetype: random
        seed: 2.63
        torange1: -1
        torange2: 1
        channelname: '"tx ty tz"'
    - name: to_panel
      type: TOP:null
      role: output
    - name: trigger1
      type: CHOP:trigger
      role: isolated
      parameters:
        decay: 0.87
        timeslice: 'on'
    - name: geo_spots
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 2
        tx: 1.15
        ty: 0.32
        sx: 0.6
        sy: 0.6
        sz: 0.6
        instancing: 'on'
        instanceop: pattern1
        instancetx: tx
        instancety: ty
        instancetz: tz
        instancer: r
        instanceg: g
        instanceb: b
    - name: geo_torus
      type: COMP:geo
      role: isolated
      parameters:
        tx: -1.08289
        ty: 0.531275
        rx: 50.4
        sx: 0.35
        sy: 0.35
        sz: 0.35
    - name: mtouchin1
      type: DAT:mtouchin
      role: input
      parameters:
        mouse: 'on'
        callbacks: mtouchin1_callbacks
    - name: geo_copies
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 7
        tx: -1.2
        ty: -0.6
        rz: 275
        sx: 0.1
        sy: 0.1
        sz: 0.1
    - name: ramp1_keys
      type: DAT:table
      role: isolated
    - name: topto_ramp
      type: CHOP:topto
      role: isolated
      parameters:
        top: hsvrgb1
        exportmethod: datname
    - name: transpose1
      type: DAT:transpose
      role: output
    - name: renderpick1
      type: DAT:renderpick
      role: processor
      parameters:
        pageindex: 1
        rendertop: render1
        callbacks: renderpick1_callbacks
        nameformat: basic
        uv: 'on'
        depth: 'on'
        instanceid: 'on'
        customattrib1: aaa
        customattrib2: bbb
        customattrib2type: float3
        customattrib3: MyCopyNumber
    - name: mtouchin1_callbacks
      type: DAT:text
      role: isolated
    - name: renderpick1_callbacks
      type: DAT:text
      role: isolated
    connections:
    - from: ramp1
      to: hsvrgb1
      input_index: '0'
    - from: table1
      to: null_mod
      input_index: '0'
    - from: render1
      to: to_panel
      input_index: '0'
    - from: renderpick1
      to: transpose1
      input_index: '0'
    - from: mtouchin1
      to: renderpick1
      input_index: '0'
    topology:
      operator_count: 23
      connection_count: 5
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: This does simple interactions with geo_box, geo_torus and geo_spots.
      It is controlled by renderpick1_callbacks.In onEvents() every frame you get
      a list of events for that frame so you can deal with them all at the same time.For
      the box, when selected (mouse click on the object), it triggers an action that
      grows the box via trigger1.For the torus, when you click on it (selectStart),
      it stores the current screen U V, and the current geo_torus position (X and
      Y only) on the parameters of the OP "states". Then in subsequent frames while
      geo_torus is still selected, you take the change in the cursor U and V and move
      the torus to a new location by writing to its parameters. In this way you can
      move the torus by simply changing its tx and ty paramters when Render Pick is
      not dragging it around.geo_spots get their colors changed when you click-drag
      on them. It uses the instance id of each spot.  Unlock and lock null_mod to
      return to all-white.  On geo_spots, it get its positions from pattern1 and colors
      from null_mod.Rainbow colors generated with hsvrgb1 treating RGB as hue, saturation,
      value. See in the Palette under Techniques, the multiTouch example which deals
      with dynamics and multi-finger interactions.
