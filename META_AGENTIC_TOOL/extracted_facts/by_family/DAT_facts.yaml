    curator_text: This example demonstrates different filtering techniques using JSONPath
      Filter.json1 applies an expression "@.officialLanguages.`len`>1" to the divisions
      and filters all that don't return true. officialLanguages is the key for the
      value, then it's length is retrieved using `len` to compare. ".name" is added
      at the end of JSONPath Filter because we only want the names.json2 is similar
      to json1 except we want to grab all the divisions of type Territory.json3 adds
      an extra step of a multi-part expression. We want all the provinces with population
      less than a million. To do this we check the type is Province and the population
      is less than 1000000json4 will recursively search from the root for all capital
      keys. The recursive search is denoted by".."
