        top: text
        topsmoothness: mipmap
    - name: mtouchin1_callbacks
      type: DAT:text
      role: isolated
    connections: []
    topology:
      operator_count: 4
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: The DAT often gets fed right into a Render Pick DAT, but here the
      events are processed.Also to operate 2D gadgets like Slider and Button components,  you
      don't need to include a Multi Touch In DAT - they operate automatically.See
      also the Multitouch example in  the Palette.The "callbacks" DAT attached to  mtouchin
      sets the "text" parameter of the Text TOP.
  - example_name: example2
    operators:
    - name: renderpickInstance
      type: COMP:container
      role: isolated
      parameters:
        w: 640
        h: 360
        topsmoothness: mipmap
    connections: []
    topology:
      operator_count: 1
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: Here we have a highly simplified example of a  Render Pick DAT.
      Here the Render Pick DAT is returning the number of the instance of the rendered
      geometry. This value is then passed from the DAT to a Text TOP.This particular
      set-up is not ideal for a  project, but helps to illustrate the power of the
      Render Pick DAT. You might imagine a  situation where you used this method to
      change the color of the selected geometry in order to help a user see how they're
      interacting with a 3D scene.
