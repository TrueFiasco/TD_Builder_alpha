family: DAT
operator_count: 50
operators:
- operator_type: chopexecuteDAT
  examples:
  - example_name: example1
    operators:
    - name: null4
      type: CHOP:null
      role: output
    - name: table1
      type: DAT:table
      role: isolated
    - name: slider1
      type: COMP:slider
      role: input
      parameters:
        value0: 0.5
        w: 100
        h: 20
        bgalpha: 1
        topsmoothness: mipmap
        borderar: 0.43
        borderag: 0.43
        borderab: 0.43
        leftborder: bordera
        rightborder: bordera
        bottomborder: bordera
        topborder: bordera
    - name: chopexec5
      type: DAT:chopexec
      role: isolated
      parameters:
        chop: null4
    connections:
    - from: slider1/out1
      to: null4
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: The CHOP Execute DAT in this example is run every time the value
      changes in the CHOP that it is referencing.When it is run, it writes the value
      of that CHOP into a Text DAT.
  - example_name: example2
    operators:
    - name: math1
      type: CHOP:math
      role: processor
      parameters:
        integer: ceiling
    - name: null3
      type: CHOP:null
      role: output
      parameters:
        cooktype: selective
    - name: speed1
      type: CHOP:speed
      role: processor
      parameters:
        limittype: loop
        max: 5
        timeslice: 'on'
    - name: chopexec1
      type: DAT:chopexec
      role: isolated
      parameters:
        chop: null3
    - name: constant1
      type: CHOP:constant
      role: input
      parameters:
        const0value: 1
    - name: currentVal
      type: DAT:text
      role: isolated
    connections:
    - from: speed1
      to: math1
      input_index: '0'
    - from: math1
      to: null3
      input_index: '0'
    - from: constant1
      to: speed1
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: The CHOP Execute DAT in this example is run every time the value
      changes in the CHOP that it is referencing.When it is run, it writes the value
      of that CHOP into a Text DAT.
  - example_name: example3
    operators:
    - name: null1
      type: CHOP:null
      role: output
    - name: click_me
      type: COMP:button
      role: input
      parameters:
        label: '"Click me"'
        buttontype: toggledown
        scaletofit: onlyshrink
        w: 50
        h: 50
        top: ./bg
        topsmoothness: mipmap
    - name: chopexec2
      type: DAT:chopexec
      role: isolated
      parameters:
        chop: null1
        offtoon: 'on'
        ontooff: 'on'
    - name: buttonStatus
      type: DAT:text
      role: isolated
    connections:
    - from: click_me/out1
      to: null1
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This example runs a Python function  when the value goes  from Off
      to On, and a different function when the value goes from On to Off.When the
      value goes from On to Off, it writes 'Off' to the Text DAT. When the  value
      goes from Off to On, it writes 'On'.
  - example_name: example4
    operators:
    - name: lfo1
      type: CHOP:lfo
      role: input
      parameters:
        frequency: 0.71
        timeslice: 'on'
    - name: null2
      type: CHOP:null
      role: output
      parameters:
        cooktype: selective
    - name: chopexec3
      type: DAT:chopexec
      role: isolated
      parameters:
        chop: null2
        whileon: 'on'
        whileoff: 'on'
    - name: constantCount
      type: CHOP:constant
      role: isolated
      parameters:
        const0name: whileOn
        const0value: 6339
        const1name: whileOff
        const1value: 1311
    connections:
    - from: lfo1
      to: null2
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: This example is similar to the On to Off / Off to On example, except
      that the functions 'whileOff()' and 'whileOn()' run continuously while the value
      is On or Off.In CHOPs, values that are 0 or less are Off, and anything greater
      than 0 is On.In this example, every time either of the functions are run, it
      increments its corresponding value in the Constant CHOP.
  - example_name: example5
    operators:
    - name: chopexec4
      type: DAT:chopexec
      role: isolated
      parameters:
        chop: constant3
        freq: onceperframe
    - name: constant3
      type: CHOP:constant
      role: isolated
      parameters:
        const0name: a
        const0value: 0.25
        const1name: b
        const1value: 0.29
        const2name: c
        const2value: 0.65
    connections: []
    topology:
      operator_count: 2
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: Open your Textport and begin changing the values in the Constant
      CHOP. You can see all the information that is natively passed to the  Python
      functions when the valueChange() function is called.
  - example_name: example6
    operators:
    - name: datto1
      type: CHOP:datto
      role: isolated
      parameters:
        dat: tableDiff
        firstcolumn: values
    - name: chopexec6
      type: DAT:chopexec
      role: isolated
      parameters:
        chop: constant2
    - name: constant2
      type: CHOP:constant
      role: isolated
      parameters:
        const0name: x
        const0value: 0.3
        const1name: y
        const1value: 0.6
        const2name: z
        const2value: 0.26
    - name: tableDiff
      type: DAT:table
      role: isolated
      parameters:
        fill: setsize
        cols: 1
    connections: []
    topology:
      operator_count: 4
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: Capture the most recent change in value of  incoming CHOP channels.The
      CHOP Execute DAT conveniently provides the previous value when a CHOP value
      changes.Click sliders in the Constant CHOP.
- operator_type: choptoDAT
  examples:
  - example_name: example1
    operators:
    - name: constant1
      type: CHOP:constant
      role: isolated
      parameters:
        const0value: 8
        const1name: chan2
        const1value: 0.2
        const2name: chan3
        const2value: 80
    - name: chopto_names_col_per_channel
      type: DAT:chopto
      role: isolated
      parameters:
        chop: constant1
        names: 'on'
    - name: chopto_names_row_per_channel
      type: DAT:chopto
      role: isolated
      parameters:
        chop: constant1
        names: 'on'
        output: rowperchan
    connections: []
    topology:
      operator_count: 3
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: These examples get both names and values of the selected CHOP and
      create tables by row and by column.
  - example_name: example2
    operators:
    - name: noise1
      type: CHOP:noise
      role: isolated
      parameters:
        pageindex: 3
        channelname: chan[1-5]
        startunit: samples
        endunit: samples
    - name: chopto_multi_channel_and_multi_sample
      type: DAT:chopto
      role: isolated
      parameters:
        chop: noise1
        names: 'on'
    connections: []
    topology:
      operator_count: 2
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This example takes all the samples across all the channels and creates
      a table with the values.
- operator_type: convertDAT
  examples:
  - example_name: example1
    operators:
    - name: text1
      type: DAT:text
      role: input
    - name: text2
      type: DAT:text
      role: input
    - name: convert_to_table_at_tab
      type: DAT:convert
      role: output
    - name: convert_to_table_at_space
      type: DAT:convert
      role: output
      parameters:
        delimiters: '" "'
    connections:
    - from: text2
      to: convert_to_table_at_tab
      input_index: '0'
    - from: text1
      to: convert_to_table_at_space
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: These two examples convert Text DATs to Table DATs, the first creating
      a new cell at every space, and the second, creating a new cell at every tab.
  - example_name: example2
    operators:
    - name: table1
      type: DAT:table
      role: input
      parameters:
        cols: 3
    - name: table2
      type: DAT:table
      role: input
      parameters:
        cols: 3
    - name: convert_to_text
      type: DAT:convert
      role: output
      parameters:
        how: text
        spacers: '" "'
    - name: convert_to_text_with_ellipses
      type: DAT:convert
      role: output
      parameters:
        how: text
        removeblank: 'on'
        spacers: '...'
    connections:
    - from: table1
      to: convert_to_text
      input_index: '0'
    - from: table2
      to: convert_to_text_with_ellipses
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: These examples do the opposite of the above examples.The first converts
      a table to text, putting a space where every cell split was.The second uses
      an ellipsis for every cell split.
- operator_type: cplusplusDAT
  examples:
  - example_name: example1
    operators:
    - name: button1
      type: COMP:button
      role: isolated
      parameters:
        scaletofit: onlyshrink
        w: 50
        h: 40
        topsmoothness: mipmap
    connections: []
    topology:
      operator_count: 1
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: See samples in the GitHub repository:https://github.com/TouchDesigner/CustomOperatorSamples
- operator_type: datexecuteDAT
  examples:
  - example_name: example1
    operators:
    - name: text1
      type: DAT:text
      role: isolated
    - name: table1
      type: DAT:table
      role: isolated
      parameters:
        rows: 2
        cols: 2
    - name: datexec1
      type: DAT:datexec
      role: isolated
      parameters:
        dat: table1
    - name: clearTextDAT
      type: DAT:execute
      role: isolated
      parameters:
        start: 'on'
    connections: []
    topology:
      operator_count: 4
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This example runs when any part of the table is changed.It writes
      the name of the DAT that was changed to a Text DAT.
  - example_name: example2
    operators:
    - name: text1
      type: DAT:text
      role: isolated
    - name: table2
      type: DAT:table
      role: isolated
      parameters:
        rows: 4
        cols: 1
    - name: datexec2
      type: DAT:datexec
      role: isolated
      parameters:
        dat: table2
        rowchange: 'on'
    - name: clearTextDAT
      type: DAT:execute
      role: isolated
      parameters:
        start: 'on'
    connections: []
    topology:
      operator_count: 4
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This example runs when a row is changed.It uses the passed variable
      'rows' to print the index of the row that was changed.
  - example_name: example3
    operators:
    - name: text1
      type: DAT:text
      role: isolated
    - name: table3
      type: DAT:table
      role: isolated
      parameters:
        rows: 1
        cols: 5
    - name: datexec3
      type: DAT:datexec
      role: isolated
      parameters:
        dat: table3
        colchange: 'on'
    - name: clearTextDAT
      type: DAT:execute
      role: isolated
      parameters:
        start: 'on'
    connections: []
    topology:
      operator_count: 4
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This is very similar to the above example, except that it works
      with columns.
  - example_name: example4
    operators:
    - name: text1
      type: DAT:text
      role: isolated
    - name: table4
      type: DAT:table
      role: isolated
      parameters:
        rows: 4
        cols: 2
    - name: datexec4
      type: DAT:datexec
      role: isolated
      parameters:
        dat: table4
        cellchange: 'on'
    - name: clearTextDAT
      type: DAT:execute
      role: isolated
      parameters:
        start: 'on'
    connections: []
    topology:
      operator_count: 4
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This function runs whenever a cell is changed.There are many useful
      ways of querying the contents and information about the  changed cell. Two examples
      are written to a Text DAT when you change a cell.
  - example_name: example5
    operators:
    - name: text1
      type: DAT:text
      role: isolated
    - name: table5
      type: DAT:table
      role: isolated
      parameters:
        cols: 1
    - name: datexec5
      type: DAT:datexec
      role: isolated
      parameters:
        dat: table5
        sizechange: 'on'
    - name: clearTextDAT
      type: DAT:execute
      role: isolated
      parameters:
        start: 'on'
    connections: []
    topology:
      operator_count: 4
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This example is run whenever the size of the physical table is changed.
- operator_type: errorDAT
  examples:
  - example_name: example1
    operators:
    - name: error1
      type: DAT:error
      role: isolated
      parameters:
        callbacks: error2_callbacks
    - name: error2
      type: DAT:error
      role: isolated
      parameters:
        callbacks: error1_callbacks
    - name: error3
      type: DAT:error
      role: isolated
      parameters:
        callbacks: error3_callbacks
    - name: kinect1
      type: CHOP:kinect
      role: isolated
      parameters:
        sensor: default||0
        timeslice: 'on'
        exportmethod: datname
    - name: pattern1
      type: CHOP:pattern
      role: isolated
    - name: error1_callbacks
      type: DAT:text
      role: isolated
    - name: error2_callbacks
      type: DAT:text
      role: isolated
    - name: error3_callbacks
      type: DAT:text
      role: isolated
    connections: []
    topology:
      operator_count: 8
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: You can log errors in general (error1). Click Log Current Errors.Or
      you can watch particular nodes (error2).For example, it can be helpful in troubleshooting
      intermittent Kinect connection problems.  Just point the Source parameter to
      the kinect1 CHOP, clear output and wait for any connection errors.Thanks to
      Gord Harris.
- operator_type: evaluateDAT
  examples:
  - example_name: example1
    operators:
    - name: table1
      type: DAT:table
      role: input
      parameters:
        cols: 1
    - name: eval_expression
      type: DAT:eval
      role: output
      parameters:
        output: expr
    - name: eval_standalone
      type: DAT:eval
      role: isolated
      parameters:
        output: expr
        expr: op('table1')[1,0]
    - name: eval_expression1
      type: DAT:eval
      role: output
      parameters:
        output: expr
    - name: eval_standalone1
      type: DAT:eval
      role: isolated
      parameters:
        output: expr
        expr: '"7 * 11"'
    connections:
    - from: table1
      to: eval_expression
      input_index: '0'
    - from: table1
      to: eval_expression1
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 2
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: The first example multiples all input cells by 2 using an expression
      including me.inputCell.The second example does the same thing more safely -
      converts the value in the cell object to an ungeger number.The third example  doesn't
      use a wired-in DAT, and it does not refer to table1 in the Input Data DAT parameter.   Its
      Expression refers to data in the table of table1.The fourth example shows you
      can do any math or python code in the expression.
  - example_name: example2
    operators:
    - name: eval1
      type: DAT:eval
      role: output
    - name: eval4
      type: DAT:eval
      role: output
      parameters:
        expr: '"''CUE_'' + me.inputCell"'
    - name: opfind1
      type: DAT:opfind
      role: input
      parameters:
        component: ../..
        typecol: 'off'
        callbacks: opfind1_callbacks
    - name: table13
      type: DAT:table
      role: input
      parameters:
        fill: setsize
        cols: 1
    - name: opfind1_callbacks
      type: DAT:text
      role: isolated
    connections:
    - from: opfind1
      to: eval1
      input_index: '0'
    - from: table13
      to: eval4
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The first prepends a string at the beginning of all cells.The second
      adds a string before and after each cell value.
  - example_name: example3
    operators:
    - name: eval1
      type: DAT:eval
      role: output
    - name: opfind1
      type: DAT:opfind
      role: input
      parameters:
        pageindex: 5
        component: ../..
        typecol: 'off'
        callbacks: opfind1_callbacks
    - name: opfind1_callbacks
      type: DAT:text
      role: isolated
    connections:
    - from: opfind1
      to: eval1
      input_index: '0'
    topology:
      operator_count: 3
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: This adds a string before and after each cell value.
  - example_name: example4
    operators:
    - name: eval2
      type: DAT:eval
      role: output
    - name: folder1
      type: DAT:folder
      role: input
      parameters:
        namecol: 'off'
    connections:
    - from: folder1
      to: eval2
      input_index: '0'
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: You have the world of python string manipulation to affect cells.
      The Scope page lets you leave the first row intact.
  - example_name: example5
    operators:
    - name: null2
      type: DAT:null
      role: output
    - name: table5
      type: DAT:table
      role: input
      parameters:
        rows: 5
        cols: 1
    - name: table7
      type: DAT:table
      role: input
      parameters:
        cols: 1
    - name: eval_expression_from_table
      type: DAT:eval
      role: processor
      parameters:
        output: expr
    connections:
    - from: eval_expression_from_table
      to: null2
      input_index: '0'
    - from: table5
      to: eval_expression_from_table
      input_index: '0'
    - from: table7
      to: eval_expression_from_table
      input_index: '1'
    topology:
      operator_count: 4
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: The expressions in the table plugged into the second input are performed
      on the corresponding cells  of the table plugged into the first input.If there
      are more cells in the first input table, the last expression of the second inputs
      table is performed on the remaining cells.
  - example_name: example6
    operators:
    - name: null1
      type: DAT:null
      role: output
    - name: table1
      type: DAT:table
      role: input
      parameters:
        rows: 4
        cols: 1
    - name: table2
      type: DAT:table
      role: input
      parameters:
        rows: 4
        cols: 1
    - name: eval_expression_and_python_from_table
      type: DAT:eval
      role: processor
      parameters:
        output: expr
    connections:
    - from: eval_expression_and_python_from_table
      to: null1
      input_index: '0'
    - from: table1
      to: eval_expression_and_python_from_table
      input_index: '0'
    - from: table2
      to: eval_expression_and_python_from_table
      input_index: '1'
    topology:
      operator_count: 4
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: Aside from simple expressions you can also perform single line if
      statements with Python.me.inputCell.offset() allows you to grab nearby cells
      and use them in your expressions.
  - example_name: example7
    operators:
    - name: table3
      type: DAT:table
      role: input
      parameters:
        pageindex: 1
        rows: 6
        cols: 1
    - name: eval_expand_global_variables
      type: DAT:eval
      role: output
      parameters:
        output: expr
    connections:
    - from: table3
      to: eval_expand_global_variables
      input_index: '0'
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: This example expands useful members of some TouchDesigner built-in
      classes.Go to the python wiki page and see other variables in the App and Project
      classes.
  - example_name: example8
    operators:
    - name: table8
      type: DAT:table
      role: input
      parameters:
        pageindex: 1
        rows: 4
        cols: 1
    - name: table9
      type: DAT:table
      role: input
      parameters:
        rows: 2
        cols: 1
    - name: eval_cycle_expression
      type: DAT:eval
      role: output
      parameters:
        output: expr
    connections:
    - from: table8
      to: eval_cycle_expression
      input_index: '0'
    - from: table9
      to: eval_cycle_expression
      input_index: '1'
    topology:
      operator_count: 3
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: This example demonstrates how to use an expression on all the rows
      of the first input, without affecting the header.
  - example_name: example9
    operators:
    - name: lfo1
      type: CHOP:lfo
      role: isolated
      parameters:
        frequency: 0.1
        channelname: '"chan1 chan2"'
        timeslice: 'on'
    - name: eval1
      type: DAT:eval
      role: output
      parameters:
        extractrows: byindex
        rowindexstart: 1
        rowindexend: 2
        extractcols: byindex
        colindexstart: 1
        colindexend: 1
    - name: eval2
      type: DAT:eval
      role: output
      parameters:
        pageindex: 1
        expr: op('lfo1')[0]
        extractrows: byindex
        rowindexstart: 1
        rowindexend: 1
        extractcols: byindex
        colindexstart: 1
        colindexend: 1
    - name: eval3
      type: DAT:eval
      role: output
      parameters:
        pageindex: 1
        expr: op('lfo1')[me.inputRow-1]
        extractrows: byindex
        rowindexstart: 1
        rowindexend: 2
        extractcols: byindex
        colindexstart: 1
        colindexend: 1
    - name: eval4
      type: DAT:eval
      role: output
      parameters:
        pageindex: 1
        xfirstrow: 'on'
        xfirstcol: 'on'
        extractrows: byname
        rownamestart: label6
        rownameend: label9
        extractcols: byname
        colnamestart: calc2
        colnameend: calc3
    - name: table1
      type: DAT:table
      role: input
      parameters:
        pageindex: 1
        fill: fillbycol
        rows: 16
        fills0names: label
        fills1names: '"calc1 calc2 calc3"'
    - name: table6
      type: DAT:table
      role: input
      parameters:
        cols: 3
    - name: table7
      type: DAT:table
      role: input
      parameters:
        cols: 3
    - name: table12
      type: DAT:table
      role: input
      parameters:
        rows: 4
        cols: 1
