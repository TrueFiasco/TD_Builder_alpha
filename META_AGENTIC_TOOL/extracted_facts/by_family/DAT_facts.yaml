- operator_type: keyboardinDAT
  examples:
  - example_name: example1
    operators:
    - name: geotext1
      type: COMP:geotext
      role: isolated
      parameters:
        pageindex: 1
        text: 1
        formatcodes: 'on'
        bold: 'on'
        fontsize: 2
        layoutanchoru: 0.486
        layoutsizew: 4
        layoutsizeh: 20
        alignx: center
    - name: keyboardin1
      type: DAT:keyboardin
      role: isolated
      parameters:
        keys: '"left up down right 1 2 3 4 5"'
        shortcuts: lctrl.[0-9]
        callbacks: keyboardin1_callbacks
        maxlines: 7
    - name: keyboardin1_callbacks
      type: DAT:text
      role: isolated
    connections: []
    topology:
      operator_count: 3
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: 'The Keyboard In DAT lists the most recent key events in its FIFO
      (first in/first out) table. There is one row for every key press down and every
      key-up, including Shift, Ctrl and Alt, with distinction between left and right
      side. For convenience, with each key press, a column indicates if the Shift,
      Ctrl and Alt were being held down at the time. In this example all keypresses
      are handled via Python callbacks in the "keyboardin1_callbacks" DAT. In its
      OnKey callback function, the name of the key is in the argument "key", and is
      used to set the text parameter of the Geo Text COMP. Also fontcolor is set depending
      on which key is pressed.How to test: press the arrow keys or numeric keys 1-5
      on your keyboard. Also test shortcuts by holding Left Control with numeric keys
      1-5.Note the use of "parameter groups" in the script, which is an alternate
      way to set a related group of parameters in one line:op("geotext1").parGroup.fontcolor=[0,0.7333,1]'
- operator_type: lookupDAT
  examples:
  - example_name: example1
    operators:
    - name: table1
      type: DAT:table
      role: input
      parameters:
        rows: 1
    - name: table3
      type: DAT:table
      role: input
      parameters:
        rows: 1
        cols: 5
    - name: lookup1
      type: DAT:lookup
      role: output
      parameters:
        index: colindices
        valuename: 0
    - name: lookup2
      type: DAT:lookup
      role: output
      parameters:
        index: colindices
    - name: indexTable
      type: DAT:table
      role: input
      parameters:
        rows: 4
        cols: 1
    - name: indexTable2
      type: DAT:table
      role: input
      parameters:
        rows: 8
        cols: 1
    connections:
    - from: indexTable
      to: lookup1
      input_index: '0'
    - from: table1
      to: lookup1
      input_index: '1'
    - from: indexTable2
      to: lookup2
      input_index: '0'
    - from: table3
      to: lookup2
      input_index: '1'
    topology:
      operator_count: 6
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The Lookup DAT outputs values from a lookup Table.  The first input
      is an index into the second input.The Lookup DAT allows you to select rows from
      its second input by referencing data either via row/column indices or row/column
      names. Indexes can be repeated in the index table.Idzard Kwadijkkwadijk@idzard.com
  - example_name: example2
    operators:
    - name: lookup1
      type: DAT:lookup
      role: output
      parameters:
        index: rowvalues
    - name: lookup2
      type: DAT:lookup
      role: output
      parameters:
        index: rowvalues
        valuename: nodex
    - name: lookup3
      type: DAT:lookup
      role: output
      parameters:
        index: rowvalues
        includeheader: 'on'
    - name: table_data
      type: DAT:table
      role: input
    - name: table_data2
      type: DAT:table
      role: input
    - name: table_data3
      type: DAT:table
      role: input
    - name: table_index
      type: DAT:table
      role: input
    - name: table_index2
      type: DAT:table
      role: input
      parameters:
        rows: 5
        cols: 1
    - name: table_index3
      type: DAT:table
      role: input
      parameters:
        rows: 5
        cols: 1
    connections:
    - from: table_index
      to: lookup1
      input_index: '0'
    - from: table_data
      to: lookup1
      input_index: '1'
    - from: table_index2
      to: lookup2
      input_index: '0'
    - from: table_data2
      to: lookup2
      input_index: '1'
    - from: table_index3
      to: lookup3
      input_index: '0'
    - from: table_data3
      to: lookup3
      input_index: '1'
    topology:
      operator_count: 9
      connection_count: 6
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: For each cell in the first column of table_index, replace it with
      the row in table_data that has the same cell in its first column.This is one
      way of re-ordering rows or columns.In lookup2, you are not looking into the
      first column of table_data2, you are looking in the column with the header "nodex".In
      table_index3, you are not including the header name "color", but in lookup3,
      you are including the header of table_data3 using "Include Header".
- operator_type: mergeDAT
