- operator_type: midiinDAT
  examples:
  - example_name: example1
    operators:
    - name: map
      type: DAT:table
      role: isolated
      parameters:
        rows: 5
        cols: 7
    - name: base1
      type: COMP:base
      role: isolated
      parameters:
        pageindex: 3
    - name: midiin1
      type: DAT:midiin
      role: isolated
      parameters:
        callbacks: midiin1_script
        maxlines: 100
    - name: pattern1
      type: CHOP:pattern
      role: isolated
      parameters:
        phase: 0.354331
        amp: 1.22835
    - name: midiin1_script
      type: DAT:text
      role: isolated
    connections: []
    topology:
      operator_count: 5
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This uses a mapping table to change parameters based on MIDI controller
      messages.First, you need a MIDI device attached. Use Dialogs -> MIDI Device
      Mapper to Create New Mapping, and select your device from the menu under In
      Device.Make sure the Device ID parameter of the MIDI In DAT matches the ID of
      the MIDI Device Mapper.  (See wiki and Dialogs -> MIDI Device Mapper)There are
      several ways to map MIDI messages to parameters, but here, add a row in 'map'
      for each controller, where the first column contains a name combining the channel
      and controller numbers as shown. ... ch1ctrl3 for example.The "op" column is
      the path to the operator to modify, and the "par" column is the parameter name
      to change. The "channel" and "ctrl" columns are not used in this example.The
      0-127 range of the MIDI controller value is re-ranged to 0-1, then to the "low"
      to "high" range, then written to the parameter.You can change built-in parameters
      (pattern1) or custom parameters (base1).
  - example_name: example2
    operators:
    - name: slope1
      type: CHOP:slope
      role: processor
      parameters:
        timeslice: 'on'
    - name: trail1
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: filter1
      type: CHOP:filter
      role: processor
      parameters:
        width: 0.2
        speedcoeff: 0
        timeslice: 'on'
    - name: midiin1
      type: DAT:midiin
      role: isolated
      parameters:
        callbacks: midiin1_script
        maxlines: 100
    - name: constantCount
      type: CHOP:constant
      role: input
      parameters:
        const0value: 1507
        const1name: '""'
        const1value: 1198
    - name: midiin1_script
      type: DAT:text
      role: isolated
    connections:
    - from: filter1
      to: slope1
      input_index: '0'
    - from: slope1
      to: trail1
      input_index: '0'
    - from: constantCount
      to: filter1
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: See the first example for setup.In this example, for every MIDI
      message, the constantCount goes up by 1. slope1 gives the number of MIDI messages
      per second, averaged over the last .2 seconds (the Filter CHOP filter width).MIDI
      In DAT is similar to MIDI Event CHOP, which doesn't need a setup in the MIDI
      Device Mapper.
- operator_type: multitouchinDAT
  examples:
  - example_name: example1
    operators:
