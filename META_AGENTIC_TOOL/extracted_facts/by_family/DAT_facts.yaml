    curator_text: 'Concurent asynchronous requests are possible with the WebClient
      DAT - all requests are asynchronous.In this example, we are relying on Postman''s
      public testing API.Open a textport (alt+t) and click buttonMomentary.Notice
      the two first debug lines. We can see that two requests, with different IDs
      are being sent on the same frame.The IDs allow users to match easily asynchronous
      requests that were sent on the same frame with one or multiple response(s) being
      received when there is no guarantee we''d get an answerand / or they could arrive
      at different times.Notice the two next debug lines. We can see that two responses,
      with different IDs where received.You can match the IDs easily with what response
      is the response to which request.Note that in some cases, the Frame number at
      which a response is received could be different between both reponses.Note that
      the whole cycle of requests / responses didn''t cause any blocking frames.Lastly,
      note the new WebClient DAT Output page parameter named Clamp Output as Rows:  the
      Request Table mode allows you to see all requests and responses.'
