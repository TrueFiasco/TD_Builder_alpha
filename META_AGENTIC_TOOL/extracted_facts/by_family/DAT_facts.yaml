    curator_text: json1 takes its input and interprets it as JSON, outputs the JSON
      as its DAT text output, and creates .source as a JSON object that you can reference
      anywhere else. json2 outputs its input filtered using a filtering system called
      JSONpath. It outputs a list of results which by default is the entire input.eval1
      shows that json1 also creates a dictionary of the full JSON that can be used
      anywhere uaing the .source member of the JSON DAT. Here it gets the store's
      second book's author.json3 uses the Filter to get all books of the store.json4
      gets the list of books priced over 9. Note for floating point numbers you need
      to put a digit after the decimal point in the filter. See the JSON DAT wiki
      page for more examples of filter queries.json5 shows that the text output can
      be filtered more using an expression. me.results is a list of all the query
      results. same as json4.json6 picks out the second result.json7 shows that me.result
      is the first result in the list, so you see no [ ].Finally json87 uses the Expression
      to get the price of the first book it filters.eval3 shows that the member .results
      is accessible as a dictionary of the filtered data. eval4 does something similar
      on the first result .result.The JSON DAT selects from the store book array the
      books with price greater than 9. The JSON DAT will return an array of all results.
      In this case there are two books with price greater than 9.
