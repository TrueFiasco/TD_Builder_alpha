    curator_text: The expression parameter can be used to output specific expression
      to the JSON DAT. json1 doesn't use a filter and instead grabs the header element
      directly from the parse json (me.jsonObject)json2 and json3 have the same result
      except json2 is using a filter to extract the result and json3 is manually selecting
      it via the parse json object. The filter on json2 searches for the "items" array
      from the root ("$") using ".." -- So, $..items will return an array of all items.
      Then we filter out items in the array using the expression. An expression is
      denoted by a "?" followed by parentheses containing the expression. Our expression
      in this case is "@.id==Find" which fill select out any elements in the array
      with id equal to "Find". Expressions iterate over all the elements and apply
      the expression -- @ refers to the current element being looked at. The filter
      will return an array so we use the expression me.result to grab just the first
      result.json4 simply selects menu from the parse json object.
