family: MAT
operator_count: 7
operators:
- operator_type: depthMAT
  examples:
  - example_name: example1
    operators:
    - name: box1
      type: SOP:box
      role: isolated
      parameters:
        sizex: 1.4
        sizey: 3
        sizez: 0.3
    - name: cam1
      type: COMP:cam
      role: isolated
      parameters:
        pageindex: 3
        tx: 39.0574
        ty: -5.91711
        tz: 21.7166
        rx: -10.8904
        ry: -42.3666
        rz: -2.25332e-05
        px: -52.7909
        py: 7.6247
        pz: -64.6186
        orthowidth: 1
        aperture: 44.1
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 5
        instancing: 'on'
        instanceop: positions
        instancetx: P(0)
        instancety: P(1)
        instancetz: P(2)
        material: phong1
    - name: geo2
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 5
        material: 'null'
        drawpriority: 1
    - name: lfo1
      type: CHOP:lfo
      role: input
      parameters:
        frequency: 0.19
        timeslice: 'on'
    - name: 'null'
      type: MAT:null
      role: output
    - name: grid1
      type: SOP:grid
      role: isolated
      parameters:
        type: poly
        sizex: 5
        sizey: 5.3
        rows: 10
        cols: 10
    - name: line1
      type: SOP:line
      role: input
      parameters:
        pbz: 30
        points: 10
    - name: math1
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 2
        fromrange1: -1
        fromrange2: 1
        torange2: 32.5
    - name: null1
      type: TOP:null
      role: output
    - name: depth1
      type: MAT:depth
      role: input
    - name: light1
      type: COMP:light
      role: isolated
      parameters:
        tx: 44.5027
        ty: -15.8883
        tz: 34.3084
        rx: -22.7133
        ry: 318.346
        rz: 0.000267386
        px: -52.6424
        py: 17.2972
        pz: -92.1163
        orthowidth: 1
        aperture: 44.1
    - name: phong1
      type: MAT:phong
      role: isolated
      parameters:
        diffg: 1
        diffb: 0.72549
    - name: render1
      type: TOP:render
      role: input
      parameters:
        uvunwrapcoordattrib: uv
        resolutionw: 1280
        resolutionh: 720
    - name: comment1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: position
      type: CHOP:null
      role: output
    - name: annotate1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        includeinorder: 'on'
    - name: positions
      type: SOP:null
      role: output
    - name: wireframe1
      type: MAT:wireframe
      role: input
      parameters:
        wireframemode: topology
        linewidth: 4.22
    - name: switchMaterial
      type: MAT:switch
      role: processor
      parameters:
        index: 1
    connections:
    - from: switchMaterial
      to: 'null'
      input_index: '0'
    - from: lfo1
      to: math1
      input_index: '0'
    - from: render1
      to: null1
      input_index: '0'
    - from: math1
      to: position
      input_index: '0'
    - from: line1
      to: positions
      input_index: '0'
    - from: depth1
      to: switchMaterial
      input_index: '0'
    - from: wireframe1
      to: switchMaterial
      input_index: '1'
    topology:
      operator_count: 20
      connection_count: 7
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: The Depth Only MAT can be used to prevent objects from being drawn
      by making an invisible barrier in Z. To see the effect, change the index parameter
      of the "switchMaterial" node to 0. This will apply the Depth MAT instead of
      the blue Wireframe MAT to the animated Grid SOP.
- operator_type: glslMAT
  examples:
  - example_name: example1
    operators:
    - name: pbr1
      type: MAT:pbr
      role: isolated
      parameters:
        metallic: 0.163
        roughness: 0.56
        legacyalphabehavior: 'on'
    - name: phong1
      type: MAT:phong
      role: isolated
      parameters:
        diffr: 0.983268
        diffg: 0.498039
        diffb: 1
        specr: 1
        specg: 0.189
        specb: 0.189
        bumpscale: 0.63
        legacyalphabehavior: 'on'
    - name: pbr1GLSL
      type: MAT:glsl
      role: isolated
      parameters:
        glslversion: glsl460
        vdat: pbr1GLSLVertex
        pdat: pbr1GLSLPixel
        attr0name: Tex
        attr0type: float3
        sampler0name: sBaseColorMap
        sampler0top: moviefilein1
        vec0name: uAlphaFront
        vec0valuex: 1
        legacyalphabehavior: 'on'
        vec1name: uShadowStrength
        vec1valuex: 1
        vec2name: uMetallic
        vec2valuex: 0.163
        vec3name: uRoughness
        vec3valuex: 0.56
        vec4name: uSpecularLevel
        vec4valuex: 1
        vec5name: uAmbientOcclusion
        vec5valuex: 1
    - name: phong1GLSL
      type: MAT:glsl
      role: isolated
      parameters:
        glslversion: glsl460
        vdat: phong1GLSLVertex
        pdat: phong1GLSLPixel
        attr0name: Tex
        attr0type: float3
        sampler0name: sColorMap
        sampler0top: moviefilein1
        vec0name: uAlphaFront
        vec0valuex: 1
        legacyalphabehavior: 'on'
        vec1name: uShadowStrength
        vec1valuex: 1
        vec2name: uShininess
        vec2valuex: 100
    - name: moviefilein1
      type: TOP:moviefilein
      role: isolated
    - name: pbr1GLSLInfo
      type: DAT:info
      role: isolated
      parameters:
        op: pbr1GLSL
    - name: pbr1GLSLPixel
      type: DAT:text
      role: isolated
    - name: pbr1GLSLVertex
      type: DAT:text
      role: isolated
    - name: phong1GLSLInfo
      type: DAT:info
      role: isolated
      parameters:
        op: phong1GLSL
    - name: phong1GLSLPixel
      type: DAT:text
      role: isolated
    - name: phong1GLSLVertex
      type: DAT:text
      role: isolated
    connections: []
    topology:
      operator_count: 11
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: A basic GLSL shader can be created by setting up a Phong or PBR
      material, and outputting the equivalen shader by pulsing the Output Shader...
      parameter.
  - example_name: example2
    operators:
    - name: cam2
      type: COMP:cam
      role: isolated
      parameters:
        tx: -0.358398
        ty: 0.384441
        tz: 8.8855
        px: 0.716795
        py: -0.768882
        pz: -17.771
        orthowidth: 1
        aperture: 44.1
    - name: glsl1
      type: MAT:glsl
      role: isolated
      parameters:
        pageindex: 6
        vdat: glsl1_vertex
        pdat: glsl1_pixel
        vec0name: uRange
        blending: 'on'
        srcblend: sa
        destblend: one
        alphathreshold: 0.001
    - name: light2
      type: COMP:light
      role: isolated
      parameters:
        tz: 10
    - name: render2
      type: TOP:render
      role: isolated
      parameters:
        camera: cam2
        antialias: aa1
        uvunwrapcoordattrib: uv
        resolutionw: 1280
        resolutionh: 720
    - name: textures
      type: COMP:base
      role: isolated
    - name: positions
      type: TOP:noise
      role: input
      parameters:
        period: 3
        spread: 2.1
        gain: 0.69
        exp: 1.64
        amp: 4
        resolutionw: 128
        resolutionh: 128
        format: rgba32float
    - name: glsl1_info
      type: DAT:info
      role: isolated
      parameters:
        op: glsl1
    - name: instances1
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 5
        instancing: 'on'
        instanceop: positionsFinal
        instancetx: r
        instancety: g
        instancetz: b
        material: glsl1
    - name: rectangle1
      type: SOP:rectangle
      role: isolated
      parameters:
        sizex: 0.1
        sizey: 0.1
    - name: glsl1_pixel
      type: DAT:text
      role: isolated
    - name: glsl1_vertex
      type: DAT:text
      role: isolated
    - name: positionsFinal
      type: TOP:null
      role: output
    connections:
    - from: positions
      to: positionsFinal
      input_index: '0'
    topology:
      operator_count: 12
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: This randomly chooses from a set of textures rendered on an instanced
      rectangle.1. The textures stay in their original format (2D), less memory, less
      work than building a 3D texture first.2. The textures can be different resolutions.3.
      The textures can be changing (such as be movies) without a performance penalty
      that would be caused by rebuilding a 3D texture.Notice the usage of vVert. The
      instanceID is passed through to the pixel shader and that is used to decide
      which texture to access, via TDIntanceTexture().The "positions" Noise TOP is
      a cheap way to generate a semi-structured point cloud where RGB is treated as
      XYZ.See the Geo Text COMP for rendering 3D tet without textures.
  - example_name: example3
    operators:
    - name: phong1GLSL
      type: MAT:glsl
      role: isolated
      parameters:
        glslversion: glsl460
        vdat: phong1GLSLVertex
        pdat: phong1GLSLPixel
        gdat: phong1GLSLGeometry
        vec0name: uShadowColor
        legacyalphabehavior: 'on'
        vec1name: uShadowStrength
        vec1valuex: 1
        vec2name: uDiffuseColor
        vec2valuex: 0.7
        vec2valuey: 0.7
        vec2valuez: 0.7
        vec2valuew: 1
        vec3name: uAmbientColor
        vec3valuex: 0.7
        vec3valuey: 0.7
        vec3valuez: 0.7
        vec3valuew: 1
        vec4name: uSpecularColor
        vec4valuex: 0.3
        vec4valuey: 0.3
        vec4valuez: 0.3
        vec5name: uShininess
        vec5valuex: 100
        vec6name: uAmount
        vec6valuex: 1.337
        vec6valuey: 1
        vec6valuez: 1
        vec6valuew: 1
    - name: phong1GLSLInfo
      type: DAT:info
      role: isolated
      parameters:
        op: phong1GLSL
    - name: phong1GLSLPixel
      type: DAT:text
      role: isolated
    - name: phong1GLSLVertex
      type: DAT:text
      role: isolated
    - name: phong1GLSLGeometry
      type: DAT:text
      role: isolated
    connections: []
    topology:
      operator_count: 5
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: texturing:1. The textures stay in their original format (2D), less
      memory, less work to build the 3D texture2. The textures can be different resolutions3.
      The textures can be changing (such as be movies) without a performance penalty
      caused by rebuilding the 3D textureNotice the new usage of vVert. instanceTextureHandle
      in the shaders, as well as the Instance Textures parameter being filled in on
      the Geometry COMP ‘Instance 2’ page.
  - example_name: example4
    operators:
    - name: glsl1
      type: TOP:glsl
      role: isolated
      parameters:
        pixeldat: glsl1_pixel
        computedat: glsl1_compute
    - name: utils
      type: DAT:text
      role: isolated
    - name: shaders
      type: COMP:base
      role: isolated
    - name: glsl1_info
      type: DAT:info
      role: isolated
      parameters:
        op: glsl1
    - name: glsl1_pixel
      type: DAT:text
      role: isolated
    - name: glsl1_compute
      type: DAT:text
      role: isolated
    connections: []
    topology:
      operator_count: 6
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: include code from other DATs
- operator_type: lineMAT
  examples:
  - example_name: example1
    operators:
    - name: box1
      type: SOP:box
      role: input
      parameters:
        sizex: 2
        sizey: 2
        sizez: 2
        reverseanchors: 'on'
    - name: cam1
      type: COMP:cam
      role: isolated
      parameters:
        tz: 5
        fov: 58
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        ry: 17
        material: line2
    - name: copy1
      type: SOP:copy
      role: processor
      parameters:
        ncy: 2
        sx: 0.6
        sy: 0.6
        sz: 0.6
    - name: line2
      type: MAT:line
      role: isolated
      parameters:
        widthnear: 7
        widthfar: 0.7
        legacyalphabehavior: 'on'
    - name: toGeo
      type: SOP:null
      role: output
    - name: merge1
      type: SOP:merge
      role: processor
    - name: circle1
      type: SOP:circle
      role: input
      parameters:
        radx: 0.8
        rady: 0.8
        reverseanchors: 'on'
        divs: 7
        arc: openarc
        beginangle: 100
        endangle: 420
    - name: render1
      type: TOP:render
      role: isolated
      parameters:
        uvunwrapcoordattrib: uv
        resolutionw: 1280
        resolutionh: 720
    connections:
    - from: circle1
      to: copy1
      input_index: '0'
    - from: merge1
      to: toGeo
      input_index: '0'
    - from: box1
      to: merge1
      input_index: '0'
    - from: copy1
      to: merge1
      input_index: '1'
    topology:
      operator_count: 9
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: 'Line MAT gives solid line rendering. This is a basic render setup.Play
      with the Line MAT parameters on Setup and Line pages, like width near/far, colors,
      cap types,  Translate geo1 in Z for depth effect.Rendered line widths are not
      intended to be depth-correct: this gives more user control. (set Depth Interpolation
      Model to Inverse Distange to get depth-correct)Lights have no effect. Colors
      are based on near-far colors and points'' distance from camera.Most SOP viewers
      are set to Wireframe (w).Things to try:- near-far color/width tapering controls-
      end caps- joints- Points, Vectors'
  - example_name: example2
    operators:
    - name: copy1
      type: SOP:copy
      role: output
      parameters:
        ncy: 14
        sx: 0.9
        sy: 0.9
        sz: 0.9
    - name: grid3
      type: SOP:grid
      role: input
      parameters:
        sizex: 2
        sizey: 2
        reverseanchors: 'on'
    - name: line1
      type: MAT:line
      role: isolated
      parameters:
        inversedistanceexponent: 1.169
        distancenear: 2.773
        distancefar: 4.9
        widthnear: 5
        widthfar: 2.5
        linestartcaptype: arrow
        pointtype: sphere
        pointsizemultiplier: 1.5
        scale: 0.09
        vecendcaptype: arrow
        vectaperstrength: 0.715
        squareheight: 1.59
        triangleheight: 12
        arrowwidth: 3.2
        arrowheight: 6.87
        arrowtaillength: 1
        legacyalphabehavior: 'on'
    - name: line2
      type: MAT:line
      role: isolated
      parameters:
        widthnear: 2
        widthfar: 0.1
        legacyalphabehavior: 'on'
    - name: null6
      type: TOP:null
      role: processor
    - name: torus
      type: SOP:torus
      role: isolated
      parameters:
        type: poly
        radx: 0.9
        rady: 0.15
        reverseanchors: 'on'
    - name: level1
      type: TOP:level
      role: output
      parameters:
        pageindex: 2
        clampinput: clamp
        lowa: 1
    - name: noise1
      type: CHOP:noise
      role: input
      parameters:
        amp: 1.5
        channelname: '"tx ty tz"'
    - name: noise2
      type: CHOP:noise
      role: isolated
      parameters:
        period: 0.0001
        amp: 1.5
        channelname: '"tx ty tz"'
    - name: noise3
      type: SOP:noise
      role: processor
      parameters:
        attribute: n
        period: 0.3
    - name: sopto3
      type: DAT:sopto
      role: isolated
      parameters:
        sop: null_normals
    - name: twist1
      type: SOP:twist
      role: output
      parameters:
        strength: 27
    - name: chopto1
      type: SOP:chopto
      role: isolated
      parameters:
        chop: noise1
    - name: chopto2
      type: SOP:chopto
      role: isolated
      parameters:
        chop: pattern1
        chanscope: '"tx ty tz r g b"'
        attscope: '"P(0) P(1) P(2) Cd(0) Cd(1) Cd(2)"'
    - name: chopto4
      type: SOP:chopto
      role: isolated
      parameters:
        chop: noise2
    - name: circle1
      type: SOP:circle
      role: input
      parameters:
        orient: zx
        reverseanchors: 'on'
        divs: 70
        arc: openarc
        beginangle: 100
        endangle: 420
    - name: circle2
      type: SOP:circle
      role: isolated
      parameters:
        reverseanchors: 'on'
        divs: 3
    - name: circle3
      type: SOP:circle
      role: isolated
      parameters:
        reverseanchors: 'on'
        divs: 3
        arc: openarc
        endangle: 356
    - name: circle4
      type: SOP:circle
      role: isolated
      parameters:
        reverseanchors: 'on'
        divs: 3
        arc: slicedarc
        endangle: 356
    - name: circle5
      type: SOP:circle
      role: isolated
      parameters:
        reverseanchors: 'on'
        divs: 30
        arc: slicedarc
        endangle: 332
    - name: delete1
      type: SOP:delete
      role: output
      parameters:
        keeppoints: 'on'
    - name: sphere1
      type: SOP:sphere
      role: isolated
      parameters:
        reverseanchors: 'on'
    - name: comment1
      type: COMP:annotate
      role: isolated
      parameters:
        utility: 'on'
        includeinorder: 'on'
    - name: pattern1
      type: CHOP:pattern
      role: output
      parameters:
        pageindex: 2
        wavetype: random
        channelname: '"r g b"'
        combine: append
    - name: toRender
      type: SOP:select
      role: input
      parameters:
        sops: copy1
    - name: sopRender
      type: COMP:container
      role: input
      parameters:
        pageindex: 8
        w: 1280
        uvbuttonsleft: 1
        uvbuttonsmiddle: 1
        uvbuttonsright: 1
        topsmoothness: mipmap
        nodeview: opviewer
        chop: sopto2
        ext1object: '""'
        ext1name: '""'
        ext2object: '""'
        ext2name: '""'
    - name: grid_quads
      type: SOP:grid
      role: input
      parameters:
        type: poly
        orient: zx
        sizex: 2
        sizey: 2
        reverseanchors: 'on'
        rows: 15
        cols: 15
    - name: sopRender3
      type: COMP:container
      role: isolated
      parameters:
        pageindex: 7
        w: 1280
        uvbuttonsleft: 1
        uvbuttonsmiddle: 1
        uvbuttonsright: 1
        topsmoothness: mipmap
        nodeview: opviewer
        chop: sopto2
        ext1object: '""'
        ext1name: '""'
        ext2object: '""'
        ext2name: '""'
    - name: null_normals
      type: SOP:null
      role: output
    - name: facet_normals
      type: SOP:facet
      role: output
      parameters:
        prenml: 'on'
    - name: grid_rowsCols
      type: SOP:grid
      role: input
      parameters:
        type: poly
        surftype: rowcol
        orient: zx
        sizex: 2
        sizey: 2
        reverseanchors: 'on'
        rows: 15
        cols: 15
    connections:
    - from: circle1
      to: copy1
      input_index: '0'
    - from: sopRender/out1
      to: null6
      input_index: '0'
    - from: null6
      to: level1
      input_index: '0'
    - from: grid3
      to: noise3
      input_index: '0'
    - from: grid_quads
      to: twist1
      input_index: '0'
    - from: toRender
      to: delete1
      input_index: '0'
    - from: noise1
      to: pattern1
      input_index: '0'
    - from: noise3
      to: null_normals
      input_index: '0'
    - from: grid_rowsCols
      to: facet_normals
      input_index: '0'
    topology:
      operator_count: 31
      connection_count: 9
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: Orientation-independent line widths, with endcap and joint controls.Several
      SOP types rendered with the Line Material and displayed with sopRender from
      the Palette to tumble/zoom.Drag-drop SOPs to toRender (easier than wiring, it's
      a Select SOP).toRender's viewer is set to Wireframe (w).flick sopRender to autoRotate.Things
      to try:- near-far color/width tapering controls- end caps- joints- Points, Vectors
  - example_name: example3
    operators:
    - name: grid1
      type: SOP:grid
      role: input
      parameters:
        type: poly
        surftype: cols
        orient: zx
        sizex: 1
        sizey: 10
        tz: -5
        reverseanchors: 'on'
        rows: 150
        cols: 8
    - name: line1
      type: MAT:line
      role: isolated
      parameters:
        pageindex: 2
        inversedistanceexponent: 1.169
        distancenear: 0.7
        distancefar: 5
        widthnear: 6
        widthfar: 1
        widthbias: -0.146
        drawpoints: 'on'
        pointtype: sphere
        scale: 0.09
        vecendcaptype: round
        vectaperstrength: 0.325
        roundheight: 1.9
        arrowwidth: 2.1
        arrowheight: 4.07
        arrowtaillength: 1
        legacyalphabehavior: 'on'
    - name: null6
      type: TOP:null
      role: output
    - name: merge1
      type: CHOP:merge
      role: output
    - name: sopto1
      type: CHOP:sopto
      role: input
      parameters:
        sop: grid1
        exportmethod: datname
    - name: chopto3
      type: SOP:chopto
      role: output
      parameters:
        chop: merge1
        chanscope: '"tx ty tz width"'
        attscope: '"P(0) P(1) P(2) width"'
    - name: toRender
      type: SOP:select
      role: isolated
      parameters:
        sops: chopto3
    - name: sopRender
      type: COMP:container
      role: input
      parameters:
        pageindex: 7
        w: 1280
        uvbuttonsleft: 1
        uvbuttonsmiddle: 1
        uvbuttonsright: 1
        topsmoothness: mipmap
        nodeview: opviewer
        chop: sopto2
        ext1object: '""'
        ext1name: '""'
        ext2object: '""'
        ext2name: '""'
    - name: math_width
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 2
        fromrange1: -1
        fromrange2: 1
        torange1: -6
        torange2: 10
    - name: noise_width
      type: CHOP:noise
      role: processor
      parameters:
        pageindex: 1
        period: 1.26
        sx: 1.9
        sy: 1.9
        sz: 1.9
        channelname: width
    connections:
    - from: sopRender/out1
      to: null6
      input_index: '0'
    - from: sopto1
      to: merge1
      input_index: '0'
    - from: math_width
      to: merge1
      input_index: '1'
    - from: grid1
      to: chopto3
      input_index: '0'
    - from: noise_width
