    curator_text: Often times fixtures have a dimmer channel and with larger setups
      it might be useful to control all dimmer channels of all fixtures.The DMX Out
      POP allows for specifying, also using wildcards, DMX Channel names specified
      in the DMX Fixture POP and multiply them with the Multiplier Value parameter.
      Be advised that this can be a costly operation in setups with large setups like
      RGB volumes. It's best used as a Master Dimmer for the full installation.
