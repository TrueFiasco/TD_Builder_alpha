      the curve has dropped to 0. Plateau is a fraction of that distance up to which
      the value is constant, then dropping to 0 using an S Curve shaped by Steepness
      and Bias.For Falloff being Inverse Distance, Radius is the distance at which
      the value is 1 (before Strength is applied as a multiplier).Typically you will
      make Limit Near-Range be between 1 and 10, preventing an infinite force as you
      get closer to the center Position.Strength is applied as a straight multiplier
      at the end, after the above clamped rolloff curve is defined.Play with the pars
      after the Falloff menu.
