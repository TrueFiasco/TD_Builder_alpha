    curator_text: For a default LED Volume, use a Grid POP and convert to Line Strips
      according to your addressing needs. Making use of the Auto Layout feature for
      addressing would mean grouping the strips for a group of strips to fit into
      a universe. The less primitives the better for performance.The Primitive POP
      allows for this via the Method parameter's "By Set" option on the Primitive
      page.
