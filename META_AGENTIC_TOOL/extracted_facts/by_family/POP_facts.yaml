    curator_text: This examaple uses 2 separate scalar noise components - "NoiseA"
      and "NoiseB". It's easy to operate on each noise attribute seperately, and in
      this example a Limit POP is used to clamp each noise attribute to be above 0.
      The two noises are then multiplied together and added back to P.z in the Math
      Mix POP. This exmaple uses 2 seperate scalar noise components - "noiseA" and
      "noiseB". It's easy to operate on each noise attribute seperately, and in this
