    curator_text: 'When you install TouchDesigner, select the ZED option to install
      the correct set of libraries it needs.  First you need to cedeaet a ZED TOP
      and pick the appropriate camera.  The ZED POP can generate a point cloud or
      a triangleular "mesh".For Mesh to work, only one ZED POP can be active at a
      time.In Depth mode, each ZED POP can process data from either stereo camera
      left or right.Note: The Depth parameters are the same as those found in the
      Depth page of TOP to POP.The quality controls for the resulting point cloud
      shown in ZED POP are found in ZED TOP through the Camera Resolution and Depth
      Quality parameters.For more information about the Depth Quality models see https://www.stereolabs.com/docs/depth-sensing/depth-modes#neural-plus
      Sensing Mode menu for the ZED TOP gives these choices:Standard - Uses depth
      map that preserves edges and depth accuracy.Interpolate - Interpolate between
      depth edges.For generating meshes set the Output Mode to Mesh and the Connectivity
      to Triangles or Point Primitives.The Normal and Color toggles will generate
      meshes with point Normals and point Color attributes.The Mesh Output Mode follows
      the Initialize Start convention similar to Timer CHOP. Pressing start will accumulate
      geometries that can be seen in the preview and Go to Done will generate the
      final mesh.Play can be toggled while sampling to pause generation and enabled
      to resume.A smaller Resolution creates a detailed geometry and higher Resolution
      keeps only bigger vairiations in geometry.A smaller Range will use objects close
      to the camera and higher Range will use objects that are farther from the camera.The
      ZED TOP is able to playback from an SVO (StereoLabs Video Format) file recorded
      with the ZED SDK.'
