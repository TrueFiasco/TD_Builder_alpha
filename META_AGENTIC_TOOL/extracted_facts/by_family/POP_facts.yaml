      DMX channel will in sequence loop over all points and primitives to create all
      necessary DMX channels. For an LED strip we can think of each light to be part
      of an LED fixture with 3 channels: R, G, and B. So all that is to do is to specify
      a single DMX channel in the DMX Fixture CHOP and reference the input POP''s
      Color attribute. As DMX channels now can be set to being normalized, it is in
      many cases not necessary to provide 0-255 values but a 0-1 range is used.The
      DMX Map DAT can be used to inspect the channel layout the DMX Fixture POP is
      creating.'
