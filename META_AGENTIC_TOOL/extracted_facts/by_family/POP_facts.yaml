    curator_text: This shows Cache Select POP interpolating between snapshots that
      were not captured every frame. Unbypass the Hog CHOP (expect it to stutter)
      and let it run for a few seconds with the Cache POP's Active parameter on.  Then
      turn off the Active toggle on the Cache POP. The bypass the Hog CHOP so TouchDesiner
      is running more smoothly again.In the info1 DAT you can see in the abstime_frame
      column that there are several-frame gaps between the captures. With Interpolate
      Frames set On on the Cache Select POP however, if you use the value ladder to
      step its Cache Index backward or forward by steps of 1 or .1, you will see interpolated
      shapes coming out for every stap.   With Interpolate Frames off it will stutter.Even
      when the Cache POP is Active, the Cache Select POP will interpolate whatever
      is in the Cache.
