    curator_text: 'Many fixtures (like this Chauvet COLORado PXL Bar 8) have instances
      where a 16 bit Dimmer channel is followed by 16bit RGB channels for each light
      in the fixture requiring a sequence of DDRRGGBB.To make this work with the POP
      attribute approach, the "Merge with above Block" parameter must be turned on
      - following the example above - for the RGB channels. to allow interleaving
      on a per-point basis. Otherwise the Dimmer channels would be created per led
      followed by the RGB channels for each light. Also of note is the construction
      of the light here: The Pxl Bar 8 has 8 LEDs mounted on a tilting platform. The
      platform itself (Linestrip primitive) holds some attributes connected to the
      platform (tilt, speed, etc) while the LEDs (points) hold the attributes used
      for the LED DMX channelsYou can find the DMX Chart here: https://www.chauvetprofessional.com/wp-content/uploads/2021/11/COLORado_PXL-Bar_8_UM_Rev11.pdf'
