    curator_text: A histogram shows the distribution of numeric data and is most easily
      understood as a visualization of how frequently different values appear in a
      dataset.In this example here, a image is converted for its channels to only
      contain luminance values. These values are then counted into 256 individual
      value bins giving you as a result how many times a value is used in the image.
      The Histogram POP saves this information into an attribute which then, using
      the Analyze POP to give us the number of points in the POP, is normalized and
      the square root taken to compress the dynamic range and making the visualization
      more readable. The resulting attribute is then used to control the y-position
      of points of a Linestrip.
