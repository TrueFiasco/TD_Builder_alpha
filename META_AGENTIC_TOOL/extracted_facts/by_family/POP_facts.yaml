      has_parallel_paths: false
      max_chain_length: 3
    curator_text: Sometimes it can be easier to generate a scalar noise attribute
      and then use that scaler noise to multiply 3D vectors like normals or positions
      or other attriburtes like color.Scalar attributes are simply attributes that
      have a single component - like float1 or int1.
  - example_name: example3
