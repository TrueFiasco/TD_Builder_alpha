    curator_text: The DMX Out POP is used to collect all fixtures from the network
      and send the DMX channels out to the actual devices via ArtNet, sACN, Kinet,
      or DMX via supported serial devices.Each fixture must have a unique DMX address.
      The DMX Out POP will not rearrange channels but warn or error for overlapping
      addressing.DMX Fixture POPs can either be connected to the input of the DMX
      Out POP or referenced on the POP's Fixtures parameter page. Each seperatly referenced
      fixture can be activated or deactivated on the DMX Out POP.One can also make
      use of wildcards while specifying fixtures.
