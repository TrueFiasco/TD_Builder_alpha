    curator_text: Facet POP can make every vertex of every primitive be a unique point.
      When doing so, the normals of the points change since they are not longer shared
      with adjacent primitives.  Therefore the Compute Point Normals parameter is
      on by default, but if you som't care about normals, turn it of to gain some
      speed.null_normalVectors0 and null_normalVectors1 show this difference.The same
      is true when going fro unique points back to shared points when Operation is
      Consolidate Points. (facet2)facet3 makes the points unique if the angle between
      adjacent polygons exceeds a certain value, in this case 14 degrees.
