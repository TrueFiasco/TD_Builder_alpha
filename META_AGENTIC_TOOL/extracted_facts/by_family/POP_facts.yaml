      in 29 channel mode) has various dmx channels of which some are 16 bit while
      others are 8 bit. To simplify this process, you can specify a DMX channel''s
      value resolution on the DMX Fixture POP itself by setting the Value Resolution
      parameter appropriatly. FOr this particular fixture, there are some values that
      are great to be used normalized (like pan / tilt - Position) while for others,
      like Strobe or control for the wheels, it is more practical to use the DMX 0-255
      value range.The fixture itself can be described as a single point with all attributes
      specified there. With the single point you can now also multiply (copy it),
      do your attribute lookups after and send all the points that represent the same
      fixture into a single DMX Fixture POP.The DMX Map DAT shows how it''s using
      all points to create channel mappings for all the fixtures. For demonstration
      purposes we are adding a channel gap between all fixtures, which will insert
      n DMX channels inbetween each fixture. Also enabled is "Quantize Universe" making
      sure that if a fixture does not fit into a universe it will start in the next
      subsequent one.The fixture here has a single light source. You can find the
      DMX Chart here: https://www.chauvetprofessional.com/products/maverick-force-s-spot/'
