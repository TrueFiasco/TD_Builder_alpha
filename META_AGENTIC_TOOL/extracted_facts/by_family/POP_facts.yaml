    curator_text: 'In this example of the Chauvet Maverick Storm 3 BeamWash, the LEDs
      of the outer ring have Dimmer, Strobe and RGB control while the main LEDs have
      Dimmer, Strob, and RGBA control. So the 2 sets of geometry must be treated seperatly
      ontop of being seperate from the Pan-Tilt platform they are on. For this requirement
      we can use the Group parameter of each DMX Channel sequence block. This example
      has a total of 424 channels. The main rule is still that each fixture is represented
      by a single primitive. While here initially 2 Linestrips are created with their
      respective attributes, after merging, the primitives are deleted and recreated
      as a single primitve. The attribue combine is used to copy the body channels
      onto the single resulting primitive. As a result the whole fixture can again
      be copied with a Copy POP and via lookups induvidually controlled while still
      all accessible via the single DMX Fixture POP.You can find the DMX Chart here:
      https://www.chauvetprofessional.com/products/maverick-storm-3-beamwash/'
  - example_name: example6
    operators:
    - name: dmxmap1
      type: DAT:dmxmap
      role: isolated
      parameters:
        dmxpop: dmxfixture1
        excludeunused: 'on'
    - name: annotate8
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        includeinorder: 'on'
    - name: dmxfixture1
      type: POP:dmxfixture
      role: output
      parameters:
        pageindex: 1
        routingtable: dmxfixture4_routingtable
        changap: 5
        dmxchan0name: Position
        dmxchan0attr: Position
        dmxchan0valueres: b16
        dmxchan0interleavebytes: 'on'
        dmxchan1name: Pan_Tilt_Speed
        dmxchan1valuetype: point
        dmxchan1valuesource: attribute
        dmxchan1group: '""'
        dmxchan1numcomps: 1
        dmxchan1attr: Pantiltspeed
        dmxchan1valueres: b8
        dmxchan1normalized: 'on'
    - name: point_fixture
      type: POP:point
      role: input
      parameters:
        attr0customname: Position
        attr0numcomps: 2
        attr1name: custom
        attr1customname: Pantiltspeed
        attr1type: float
        attr1numcomps: 1
    - name: dmxfixture4_routingtable
      type: DAT:table
      role: isolated
    connections:
    - from: point_fixture
      to: dmxfixture1
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: We have seen fixtures where the 16 bit position channels are not
      ordered in [Pan Coarse, Pan Fine, Tilt Coarse, Tilt Fine] order but the coarse
      channels are used first before the fine channels are send over. In these cases,
      you can make use of the DMX Fixture POP Sequence Parameter's Interleave Byte
      parameter. Enabling it for a 16 bit or merged block, this will order it in a
      way to use the first bit of all channels first, before using the second bit
      allowing for such uncommon addressing.
