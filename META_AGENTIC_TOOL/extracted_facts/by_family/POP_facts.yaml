        method: set
        setprimtype: linestrip
        set: group
        n: 20
    - name: dmxfixture1
      type: POP:dmxfixture
      role: output
      parameters:
        pageindex: 1
        routingtable: dmxfixture7_routingtable
        dmxchan0name: RGB
        dmxchan0attr: '"Color(0) Color(1) Color(2)"'
    - name: dmxfixture7_routingtable
