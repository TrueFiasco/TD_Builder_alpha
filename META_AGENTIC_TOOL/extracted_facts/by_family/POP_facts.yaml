      inputs are positioned alphanumerically on the left side of the Component.In
      this example, base1 COMP has a blue POP input connector on its left side. Zoom
      inside base1 to see the In POP, and notice that the In POP has the circle1 TOP
      acting as fallback data connected to the In POP's second input. This will be
      output by the In POP if nothing is connected to the first input of base1.Zoom
      out of base1 and connect box1 to base1, and see the output change.Also, when
      you rollover the input connector, you see a custom label, "Nice Geonmetry",
