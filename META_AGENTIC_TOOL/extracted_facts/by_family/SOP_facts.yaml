      operator_count: 10
      connection_count: 8
      has_parallel_paths: true
      max_chain_length: 4
    curator_text: sprinkle1 distributes on any surface with a random uniform distribution.
      All surfaces are first converted to triangles.sprinkle2 disributes points inside
      a closed volume.sperinkle3 takes a bounding box of geometry and distributes
      randomly in that bounding volume.sprinkle4 again distributes on a surface with
      a random uniform distribution, no matter the size of the polygons it lies on.On
      sprinkle5, each triangle gets aproximately the same number of points, so points
