      parameters:
        pageindex: 1
        crname: sphere
        usenumber: 'on'
    - name: group2
      type: SOP:group
      role: processor
      parameters:
        pageindex: 1
        crname: box
        usenumber: 'on'
    - name: group3
      type: SOP:group
      role: processor
      parameters:
        crname: torus
        usenumber: 'on'
    - name: merge1
      type: SOP:merge
      role: processor
    - name: torus1
      type: SOP:torus
      role: input
      parameters:
        tx: 2
        reverseanchors: 'on'
    - name: sphere1
      type: SOP:sphere
      role: input
      parameters:
        tx: -2
        reverseanchors: 'on'
    - name: comment1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: comment2
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: transform1
      type: SOP:transform
      role: processor
      parameters:
        group: sphere
        ty: -2
        postxord: ts
    - name: transform2
      type: SOP:transform
      role: processor
      parameters:
        group: box
        ty: 2
        postxord: ts
    - name: transform3
      type: SOP:transform
      role: output
      parameters:
        group: torus
        ty: -2
        postxord: ts
    connections:
    - from: sphere1
      to: group1
      input_index: '0'
    - from: box1
      to: group2
      input_index: '0'
    - from: torus1
      to: group3
      input_index: '0'
    - from: group1
      to: merge1
      input_index: '0'
    - from: group2
      to: merge1
      input_index: '1'
    - from: group3
      to: merge1
      input_index: '2'
    - from: merge1
      to: transform1
      input_index: '0'
    - from: transform1
      to: transform2
      input_index: '0'
    - from: transform2
      to: transform3
      input_index: '0'
    topology:
      operator_count: 12
      connection_count: 9
      has_parallel_paths: false
      max_chain_length: 6
    curator_text: The Group SOP gives you the ability to limit the "scope" of downstream
      SOPs without forking them off individually. For example, here we create a group
      for the sphere, box and torus individually. Then we can affect each in isolation,
      despite being in the same SOP chain.Note the Group selection at the top of many
      SOPs.James Hunter
  - example_name: example2
    operators:
    - name: group1
      type: SOP:group
      role: processor
      parameters:
        crname: right
        entity: point
        usenumber: 'on'
        usebounds: 'on'
        sizex: 1
        sizey: 2
        sizez: 2.5
        tx: -1
    - name: group3
      type: SOP:group
      role: processor
      parameters:
        pageindex: 1
        crname: upright
        entity: point
        usenumber: 'on'
        usenormal: 'on'
        dirx: 1
        diry: 1
    - name: spread
      type: COMP:slider
      role: isolated
      parameters:
        value0: 0.545455
        value1: 0.5
        w: 100
        h: 20
        top: ./back
        crop: 'on'
    - name: torus1
      type: SOP:torus
      role: input
      parameters:
        tx: 2
        reverseanchors: 'on'
    - name: sphere1
      type: SOP:sphere
      role: input
      parameters:
        tx: -2
        reverseanchors: 'on'
    - name: comment1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: transform1
      type: SOP:transform
      role: output
      parameters:
        group: right
        tx: 2.6
        ry: -2
        postxord: ts
    - name: transform_teletransport
      type: SOP:transform
      role: output
      parameters:
        group: upright
        xord: str
        tx: 0.9
        ty: 1.8
        rz: -20
        postxord: ts
    connections:
    - from: sphere1
      to: group1
      input_index: '0'
    - from: torus1
      to: group3
      input_index: '0'
    - from: group1
      to: transform1
      input_index: '0'
    - from: group3
      to: transform_teletransport
      input_index: '0'
    topology:
      operator_count: 8
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: The Group SOP gives you the ability to limit the "scope" of downstream
      SOPs without forking them off individually. group3 groups by normals that point
      up and right, and group inclusion is animated using the Spread angle parameter.
  - example_name: example3
    operators:
    - name: facet1
      type: SOP:facet
      role: processor
      parameters:
        unique: 'on'
        postnml: 'on'
    - name: group1
      type: SOP:group
      role: processor
      parameters:
        pageindex: 1
        crname: top
        usenumber: 'on'
        pattern: '"14 9 10 5"'
    - name: sphere1
      type: SOP:sphere
      role: input
      parameters:
        type: poly
        reverseanchors: 'on'
    - name: transform1
      type: SOP:transform
      role: output
      parameters:
        group: top
        sx: 1.4
        sy: 1.4
        sz: 1.4
        postxord: ts
    connections:
    - from: sphere1
      to: facet1
      input_index: '0'
    - from: facet1
      to: group1
      input_index: '0'
    - from: group1
      to: transform1
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: Creating a group of primitives within one SOP, named "top".Transforming
      just that group.
  - example_name: example4
    operators:
    - name: sphere1
      type: SOP:sphere
      role: input
      parameters:
        pageindex: 1
        reverseanchors: 'on'
        rows: 50
        cols: 50
    - name: convert1
      type: SOP:convert
      role: processor
      parameters:
        surftype: triangles
    - name: convert2
      type: SOP:convert
      role: processor
    - name: sort_random
      type: SOP:sort
      role: processor
      parameters:
        ptsort: seed
    - name: groupB_bounding
      type: SOP:group
      role: processor
      parameters:
        pageindex: 1
        crname: groupB
        entity: point
        usebounds: 'on'
        boundtype: usebsphere
        sizex: 2
        sizey: 2
        sizez: 2
        tx: -0.59
        tz: 0.6
    - name: delete_groupA_points
      type: SOP:delete
      role: output
      parameters:
        group: groupA
        entity: point
    - name: group_first500Points
      type: SOP:group
      role: processor
      parameters:
        crname: groupA
        entity: point
        usenumber: 'on'
        pattern: '[0-500]'
    - name: group_combineIntoGroupA
      type: SOP:group
      role: processor
      parameters:
        pageindex: 2
        crname: group3
        entity: point
        grpequal: groupA
        grp1: groupB
        op1: or
        grp2: groupA
    - name: delete_combined_groupA_points
      type: SOP:delete
      role: output
      parameters:
        group: groupA
        entity: point
    connections:
    - from: group_first500Points
      to: convert1
      input_index: '0'
    - from: group_combineIntoGroupA
      to: convert2
      input_index: '0'
    - from: sphere1
      to: sort_random
      input_index: '0'
    - from: group_first500Points
      to: groupB_bounding
      input_index: '0'
    - from: convert1
      to: delete_groupA_points
      input_index: '0'
    - from: sort_random
      to: group_first500Points
      input_index: '0'
    - from: groupB_bounding
      to: group_combineIntoGroupA
      input_index: '0'
    - from: convert2
      to: delete_combined_groupA_points
      input_index: '0'
    topology:
      operator_count: 9
      connection_count: 8
      has_parallel_paths: true
      max_chain_length: 7
    curator_text: Points of the sphere are first sorted in random order. Then the
      first 500 points are grouped into groupA.In the top example, to be able to delete
      points from the sphere, and still see the remaining shape, the sphere mesh is
      first converted to polygons before points from groupA are deleted.In the next
      example, a new groupB is created using a bounding sphere (outlined in red).
      Then both groupA and groupB are combined and all their points are deleted.
- operator_type: holeSOP
