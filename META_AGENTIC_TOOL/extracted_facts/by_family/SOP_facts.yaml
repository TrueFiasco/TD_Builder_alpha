      0-1 range.The Z value of the points of input1 will lift the points off the surface
      for z>0 and under the surface for z<0.All the points of input1 are first transformed
      according to the Creep SOP's Translate, Rotate and Scale parameters.Since straight
      edges are going to be warped, it's best to subdivide the surfaces that you are
      creeping.The divide SOP is also good for chopping up surfaces for deforming.If
      you connect box1 to the first input, it creeps on the surface and is deformed
      as well.
