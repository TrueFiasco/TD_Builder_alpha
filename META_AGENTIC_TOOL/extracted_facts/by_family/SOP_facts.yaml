    curator_text: This example creates 3D extruded text using the Extrude SO, startin
      with the Text SOP.The Attribute Create SOP is used at the end to compute the
      normals.
  - example_name: example2
    operators:
    - name: text1
      type: SOP:text
      role: input
      parameters:
        font: Arial
        bold: 'on'
        output: closedpolys
        text: abcdefg
    - name: circle1
      type: SOP:circle
      role: input
      parameters:
        reverseanchors: 'on'
        divs: 8
        arc: openarc
        endangle: 90
    - name: circle2
      type: SOP:circle
      role: input
      parameters:
        reverseanchors: 'on'
        divs: 10
        arc: openarc
        endangle: 180
    - name: circle3
      type: SOP:circle
      role: input
      parameters:
        reverseanchors: 'on'
        divs: 12
        arc: openarc
        beginangle: 90
        endangle: -90
    - name: circle4
      type: SOP:circle
      role: input
      parameters:
        reverseanchors: 'on'
        divs: 8
        arc: openarc
        endangle: 90
    - name: extrude1
      type: SOP:extrude
      role: output
      parameters:
        pageindex: 1
        dofuse: all
        thickxlate: 9.41543e-10
        thickscale: 0.042
        depthscale: 0.101
    - name: extrude2
      type: SOP:extrude
      role: output
      parameters:
        pageindex: 1
        dofuse: all
        thickxlate: 9.41543e-10
        thickscale: 0.042
        depthscale: 0.085
    - name: extrude3
      type: SOP:extrude
      role: output
      parameters:
        pageindex: 1
        dofuse: all
        fronttype: 'off'
        backtype: 'off'
        thickxlate: 9.41543e-10
        thickscale: 0.021
        depthscale: 0.085
    - name: extrude4
      type: SOP:extrude
      role: output
      parameters:
        pageindex: 1
        dofuse: all
        thickxlate: 9.41543e-10
        thickscale: -0.062
        depthscale: -0.101
    connections:
    - from: text1
      to: extrude1
      input_index: '0'
    - from: circle1
      to: extrude1
      input_index: '1'
    - from: text1
      to: extrude2
      input_index: '0'
    - from: circle3
      to: extrude2
      input_index: '1'
    - from: text1
      to: extrude3
      input_index: '0'
    - from: circle2
      to: extrude3
      input_index: '1'
    - from: text1
      to: extrude4
      input_index: '0'
    - from: circle4
      to: extrude4
      input_index: '1'
    topology:
      operator_count: 9
      connection_count: 8
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: In extrude3 for example, you can visualize it as placing the cross-section
      on each vertex of the input so that the first point in the curve (1,0) is on
      the vertex, the top of the curve (0,1) extends outwards from the surface (opposite
      the normal, along +Z) and then curves back down to the surface outside the bounds
      of the original geometry. The letters are hollow because only the side mesh
      (the geometry along the cross-section curve), is generated. The front and back
      faces of the extrusion are disabled by setting their parameters to 'No Output'.The
      main things to adjust are the Thickness Scale and the Depth Scale as well as
      the circle arc angles, which you can leave at a radius of 1.
  - example_name: example3
    operators:
    - name: text1
      type: SOP:text
      role: input
      parameters:
        text: abcdefg
    - name: text2
      type: SOP:text
      role: input
      parameters:
        output: closedpolys
        text: abcdefg
    - name: extrude1
      type: SOP:extrude
      role: output
    - name: extrude2
      type: SOP:extrude
      role: output
    connections:
    - from: text1
      to: extrude1
      input_index: '0'
    - from: text2
      to: extrude2
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: Be careful you are not extruding faces that are already triangulated
      because each triangle will be extruded.It is better to extrude the/outlines
      of letters in the Text SOP. The Text SOP is by defult triangulating its faces,
      so you need to turn its Output menu to Closed Polygons.
