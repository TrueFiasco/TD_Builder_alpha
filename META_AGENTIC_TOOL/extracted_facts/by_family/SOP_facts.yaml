    curator_text: 'When doing transparency two main things need to be done: Turn on
      Blending in the Common page of the MAT, and ensure your primitive are sorted
      farthest to nearest. Notice how the random sorted geometry looks wrong, even
      though it''s the same geometry as the one that''s properly sorted.If you have
      the horsepower, another way do to transparency is to use Order Independent Transparency
      on the Advanced page of the Render TOP. Adjust the Transparency Passes parameter
      to see the randomly sorted geometry become more/less correctly. Depending on
      the scene only a few passes may be needed to create an  acceptable look.'
