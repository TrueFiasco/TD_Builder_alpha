      type: SOP:sprinkle
      role: output
      parameters:
        method: boundingbox
        numpoints: 4000
    - name: sprinkle4
      type: SOP:sprinkle
      role: output
      parameters:
        numpoints: 2000
    - name: sprinkle5
      type: SOP:sprinkle
      role: output
      parameters:
        method: perprim
        numpoints: 2000
    - name: sprinkle6
      type: SOP:sprinkle
      role: output
      parameters:
        method: perprim
        numpoints: 2000
        consolidate: 'on'
        neardist: 0.02
    connections:
