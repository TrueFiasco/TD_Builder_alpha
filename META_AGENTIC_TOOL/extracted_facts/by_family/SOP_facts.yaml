- operator_type: circleSOP
  examples:
  - example_name: example1
    operators:
    - name: circle_center_x
      type: SOP:circle
      role: isolated
      parameters:
        tx: 1
    - name: circle_radius_x
      type: SOP:circle
      role: isolated
      parameters:
        radx: 0.5
        rady: 1
    - name: circle_radius_y
      type: SOP:circle
      role: isolated
      parameters:
        radx: 1
        rady: 0.5
    - name: circle_wireframe
      type: SOP:circle
      role: isolated
      parameters:
        type: prim
    - name: circle_as_polygons
      type: SOP:circle
      role: isolated
    - name: circle_as_primitive
      type: SOP:circle
      role: isolated
      parameters:
        type: prim
    - name: circle_using_anchor
      type: SOP:circle
      role: isolated
    - name: circle_as_polygons_wireframe
      type: SOP:circle
      role: isolated
    connections: []
    topology:
      operator_count: 8
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: These examples explore the the circle's Radius, Center and Anchor
      parameters.Moddle mouse click on the nodes to see that the top set is a polygon
      woth 40 points, and the second one is a circle primitive, which only has a center
      point and a radius.We most often deal with circles as polygons.Anchors are very
      useful. Instead of the "Center" X Y Z being at the center of the circle, you
      can make the center X Y Z be where the left, right, top, bottom edges of circle
      are placed.Anchor .5, .5 is center of the circle.  circle_center_using_anchor
      has anchor x = 0, the left side.
  - example_name: example2
    operators:
    - name: circle_divisions
      type: SOP:circle
      role: isolated
      parameters:
        reverseanchors: 'on'
        divs: 6
    connections: []
    topology:
      operator_count: 1
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This example controls the divisions of a polygon circle. Just 6
      poinst around the perimeter, where the first (point 0) starts at the right-most
      side... where x = 1, y = 0.Note that this polygon is "closed", set by the Arc
      Type parameter, which means the last point (5) is connected back to the first
      point (0).Turn on Viewer Active, press w for wireframe, right-click on the viewer
      to get the Viewing menu, then select Display Options (shortcut is p), and turn
      on the top-left 2 flags - dots and point numbers.
  - example_name: example3
    operators:
    - name: wire1
      type: SOP:wire
      role: output
      parameters:
        radius: 0.03
    - name: circle_arc_angle
      type: SOP:circle
      role: input
      parameters:
        reverseanchors: 'on'
        divs: 10
        arc: closedarc
        beginangle: 180
        endangle: 360
    connections:
    - from: circle_arc_angle
      to: wire1
      input_index: '0'
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: This is an example of a closed arc type, that starts at angle 180
      and ends at 360.
  - example_name: example4
    operators:
    - name: facet1
      type: SOP:facet
      role: processor
      parameters:
        unique: 'on'
    - name: primitive1
      type: SOP:primitive
      role: output
      parameters:
        pageindex: 1
        doxform: 'on'
        sx: 0.61
        sy: 0.61
        sz: 0.61
    - name: circle_arc_angle1
      type: SOP:circle
      role: input
      parameters:
        reverseanchors: 'on'
        divs: 10
        arc: slicedarc
        beginangle: 120
        endangle: 350
    connections:
    - from: circle_arc_angle1
      to: facet1
      input_index: '0'
    - from: facet1
      to: primitive1
      input_index: '0'
    topology:
      operator_count: 3
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: This is similar to a closed arc except that every point is connected
      to the center of the circle forming 10 triangles.It is then faceted (Unique
      Points on), and then each polygon shrunk to show them as separate polygons.
  - example_name: example5
    operators:
    - name: circle_arc_type_clockwise
      type: SOP:circle
      role: isolated
      parameters:
        reverseanchors: 'on'
        divs: 15
        arc: openarc
        beginangle: 191
        endangle: 77
    - name: circle_arc_type_counerclockwise
      type: SOP:circle
      role: isolated
      parameters:
        reverseanchors: 'on'
        divs: 15
        arc: openarc
        beginangle: 191
        endangle: 405
    connections: []
    topology:
      operator_count: 2
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: Open Arc types don't close themselves.Start to end goes counter-clockwise
      if start angle is less than end angle.     (right hand rule for increasing angles
      - put your right hand thumb pointing along the +z axis (from the screen toward
      you), and positive is in the direction of your other fingers. You can go past
      360 degrees and below 0 degrees.If start < end, it's clockwise.
