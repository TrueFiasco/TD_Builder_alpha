- operator_type: boxSOP
  examples:
  - example_name: example1
    operators:
    - name: box_size
      type: SOP:box
      role: isolated
      parameters:
        sizex: 0.5
        sizey: 1
        sizez: 1
        reverseanchors: 'on'
    - name: box_size1
      type: SOP:box
      role: isolated
      parameters:
        sizex: 1
        sizey: 0.5
        sizez: 1
        reverseanchors: 'on'
    - name: box_size2
      type: SOP:box
      role: isolated
      parameters:
        sizex: 1
        sizey: 1
        sizez: 0.5
        reverseanchors: 'on'
    connections: []
    topology:
      operator_count: 3
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: These examples show different ways of using the Size parameter to
      change the shape of a Box.
  - example_name: example2
    operators:
    - name: merge1
      type: SOP:merge
      role: output
    - name: box_center
      type: SOP:box
      role: input
      parameters:
        tx: -1
        reverseanchors: 'on'
    - name: box_center1
      type: SOP:box
      role: input
      parameters:
        ty: -1
        reverseanchors: 'on'
    - name: box_center2
      type: SOP:box
      role: input
      parameters:
        tz: -1
        reverseanchors: 'on'
    connections:
    - from: box_center
      to: merge1
      input_index: '0'
    - from: box_center1
      to: merge1
      input_index: '1'
    - from: box_center2
      to: merge1
      input_index: '2'
    topology:
      operator_count: 4
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The Center parameters allow you to translate the Box in 3D space.
  - example_name: example3
    operators:
    - name: null2
      type: SOP:null
      role: output
    - name: noise1
      type: SOP:noise
      role: processor
    - name: sphere1
      type: SOP:sphere
      role: input
      parameters:
        reverseanchors: 'on'
        texture: byprimtype
    - name: box_input
      type: SOP:box
      role: processor
      parameters:
        reverseanchors: 'on'
    connections:
    - from: box_input
      to: null2
      input_index: '0'
    - from: sphere1
      to: noise1
      input_index: '0'
    - from: noise1
      to: box_input
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: The Box SOP will create a Box around the input  geometry.
  - example_name: example4
    operators:
    - name: null3
      type: SOP:null
      role: output
    - name: box_consolidate_corner_points
      type: SOP:box
      role: input
      parameters:
        reverseanchors: 'on'
        consolidatepts: 'on'
    connections:
    - from: box_consolidate_corner_points
      to: null3
      input_index: '0'
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: This example demonstrates that you can consolidate the corner points
      of the Box and the compute correct normals for each primitive.
  - example_name: example5
    operators:
    - name: box_divisions
      type: SOP:box
      role: isolated
      parameters:
        reverseanchors: 'on'
        dodivs: 'on'
    - name: box_divisions1
      type: SOP:box
      role: isolated
      parameters:
        reverseanchors: 'on'
        dodivs: 'on'
        divsx: 2
        divsy: 3
        divsz: 1
    - name: box_enforcement_bars
      type: SOP:box
      role: isolated
      parameters:
        reverseanchors: 'on'
        dodivs: 'on'
        divsx: 2
        divsy: 3
        divsz: 1
        rebar: 'on'
    connections: []
    topology:
      operator_count: 3
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: These examples divide the Box SOP by the assigned values in the
      Division parameter.You can also create enforcement bars for the geometry when
      you create divisions.
  - example_name: example6
    operators:
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        material: phong1
    - name: geo2
      type: COMP:geo
      role: isolated
      parameters:
        material: phong1
    - name: phong1
      type: MAT:phong
      role: isolated
      parameters:
        legacyalphabehavior: 'on'
    - name: moviein1
      type: TOP:moviefilein
      role: isolated
    - name: box_texture
      type: SOP:box
      role: isolated
      parameters:
        reverseanchors: 'on'
    - name: box_texture1
      type: SOP:box
      role: isolated
      parameters:
        reverseanchors: 'on'
        texture: faceinside
    connections: []
    topology:
      operator_count: 6
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: The Box SOP has a handy feature in that you can assign your texture
      UV upon creation.
- operator_type: cacheSOP
  examples:
  - example_name: example1
    operators:
    - name: math1
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 2
        fromrange2: 240
    - name: math2
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 2
        torange1: 239
    - name: null1
      type: CHOP:null
      role: output
    - name: null2
      type: CHOP:null
      role: output
    - name: null3
      type: CHOP:null
      role: output
    - name: cache1
      type: SOP:cache
      role: output
      parameters:
        prefill: 'on'
        cachesize: 240
    - name: filler
      type: SOP:null
      role: processor
    - name: limit1
      type: CHOP:limit
      role: processor
      parameters:
        type: clamp
    - name: button1
      type: COMP:button
      role: input
      parameters:
        label: '"Start Playback"'
        scaletofit: onlyshrink
        w: 50
        h: 40
        topsmoothness: mipmap
    - name: lookup1
      type: CHOP:lookup
      role: processor
    - name: sphere1
      type: SOP:sphere
      role: input
      parameters:
        radx: 1
        rady: 0.7
        radz: 1
    - name: comment1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: comment2
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: chopexec1
      type: DAT:chopexec
      role: isolated
      parameters:
        chop: null3
        offtoon: 'on'
        ontooff: 'on'
    - name: constant1
      type: CHOP:constant
      role: input
    - name: transform2
      type: SOP:transform
      role: processor
    - name: bounce_animation
      type: CHOP:null
      role: input
    - name: timer1_callbacks
      type: DAT:text
      role: isolated
    - name: timer_cachePlayback
      type: CHOP:timer
      role: input
      parameters:
        deferpars: 'on'
        length: 4
        callbacks: timer1_callbacks
        timeslice: 'on'
        exportmethod: datname
    connections:
    - from: constant1
      to: math1
      input_index: '0'
    - from: timer_cachePlayback
      to: math2
      input_index: '0'
    - from: lookup1
      to: null1
      input_index: '0'
    - from: math2
      to: null2
      input_index: '0'
    - from: button1/out1
      to: null3
      input_index: '0'
    - from: filler
      to: cache1
      input_index: '0'
    - from: transform2
      to: filler
      input_index: '0'
    - from: math1
      to: limit1
      input_index: '0'
    - from: limit1
      to: lookup1
      input_index: '0'
    - from: bounce_animation
      to: lookup1
      input_index: '1'
    - from: sphere1
      to: transform2
      input_index: '0'
    topology:
      operator_count: 19
      connection_count: 11
      has_parallel_paths: false
      max_chain_length: 5
    curator_text: 'The Cache SOP collects its input geometry in a cache (in RAM memory)
      for faster random-access playback. It can be used when cook times for a chain
      of SOPs is long and a quicker playback is needed.In this example the SOP animation
      of a bouncing sphere is cached. Hit the "Start Playback" button to start plackback
      of the cached animation.The Cache Size (240) matches the Timer CHOP length (4
      seconds at 60 fps).  For the Output Index parameter, the beginning index is
      0 and the ending is 239.chopexec1 is set up to initialize on the first frame
      of the cache when you press and hold down Start Playback, then to start the
      playback when you release teh button.Exercise: disable the viewer pane of the
      "transform1" SOP. (the icon on the top-left of that node). Notice how the Transform
      SOP stops cooking (the wire from transform1 to cache1 is no longer animating).
      This demontrates TouchDesigner is a pull based system: nodes only cook if nodes
      downstream ask for their data. In this case the cache SOP is already filled,
      so the nodes upstream don''t have to cook anymore.'
