      connection_count: 6
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: The Raster SOP converts TOP image data to geometry by scanning left
      to right, top to bottom, outputting a geometry point at each pixel. This output
      can be used to display image data on laser devices, oscilloscopes or similar
      devices using the Laser CHOP. This is different from the Trace SOP which only
      outputs contour shapes from an image.The Raster SOP will give each SOP point
      a color matching the input TOP colors.In this example the top Raster TOP uses
      horiontal rasterization, the bottom Raster Top uses vertical rasterization.  Depending
      on the input image, horizontal or vertical might work better. res1 lowers to
      number of lines and points generated.Note that it doesn't create points for
      pixels that are black in the TOP's RGB channels.  (to verify, add some color
      in constant1)To see what the resulting SOP data looks like for both methods,
      a Point SOP is used to remove all point colors, and then a Null SOP shows a
      zoomed in view of the top of the banana. Note that by default it is set to output
      on the frame after the TOP is generated - which is optimal and doesn't stall
      the GPU.
