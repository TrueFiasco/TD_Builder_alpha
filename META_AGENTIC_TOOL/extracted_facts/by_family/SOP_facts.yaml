    - from: text1
      to: null3
      input_index: '0'
    - from: box1
      to: merge1
      input_index: '0'
    - from: circle1
      to: merge1
      input_index: '1'
    - from: circle2
      to: merge1
      input_index: '2'
    - from: circle3
      to: merge1
      input_index: '3'
    - from: merge1
      to: transform1
      input_index: '0'
    topology:
      operator_count: 15
      connection_count: 10
      has_parallel_paths: true
      max_chain_length: 5
    curator_text: This example demonstrates how you can create and fill holes easily
      with the Hole SOP.
- operator_type: inSOP
  examples:
  - example_name: example1
    operators:
    - name: box1
      type: SOP:box
      role: isolated
      parameters:
        rx: -50
        ry: -42
    - name: base1
      type: COMP:base
      role: input
    - name: null1
      type: SOP:null
      role: output
    connections:
    - from: base1/out1
      to: null1
      input_index: '0'
    topology:
      operator_count: 3
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: The In SOP is used to create a SOP input in a Component. Component
      inputs are positioned alphanumerically on the left side of the Component.In
      this example base1 COMP has a blue SOP input on its left side. Zoom into base1
      to see the In SOP, and notice the In SOP has an Sphere SOP acting as fallback
      data connected to its second input. This will be outputted by the In SOP if
      nothing is connected to the SOP input of its parent, the base1 COMP.Zoom out
      of base1 and connect box1 to base1, and see the output change.Also, when you
      rollover the input, you see a custom label, set with the In TOP's Label parameter.
      Similar for the output.
