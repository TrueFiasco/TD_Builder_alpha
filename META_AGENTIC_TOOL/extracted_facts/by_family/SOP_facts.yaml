- operator_type: limitSOP
  examples:
  - example_name: example1
    operators:
    - name: datto1
      type: CHOP:datto
      role: isolated
      parameters:
        dat: table1
        firstrow: names
    - name: limit1
      type: SOP:limit
      role: isolated
      parameters:
        pageindex: 1
        chop: datto1
        chanx: tx
        chany: ty
        chanz: tz
    - name: table1
      type: DAT:table
      role: isolated
      parameters:
        rows: 4
        cols: 5
    connections: []
    topology:
      operator_count: 3
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: At its simplest, the Limit SOP creates geometry from CHOP channels.Here,
      we've made a table with some very simple point positions, which  are then converted
      to CHOP channels, and fed to the Limit SOP.
  - example_name: example2
    operators:
    - name: grid2
      type: SOP:grid
      role: input
      parameters:
        reverseanchors: 'on'
    - name: null4
      type: SOP:null
      role: output
    - name: limit2
      type: SOP:limit
      role: isolated
      parameters:
        pageindex: 2
        chop: sopto2
        chanx: tx
        chany: ty
        chanz: tz
    - name: sopto2
      type: CHOP:sopto
      role: isolated
      parameters:
        sop: null4
        custom: 'on'
        attribscope: P
        renamescope: '"tx ty tz"'
    - name: transform2
      type: SOP:transform
      role: processor
      parameters:
        postxord: ts
    connections:
    - from: transform2
      to: null4
      input_index: '0'
    - from: grid2
      to: transform2
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: In this example we created out CHOP channels using a SOP to CHOP,
      then converted our channels back to a SOP using the Limit SOP.The difference
      is that the Limit SOP uses a single Polygonal Line to connect all the points
      of the Grid.
  - example_name: example3
    operators:
    - name: lfo1
      type: CHOP:lfo
      role: input
      parameters:
        frequency: 0.4
        phase: 0.25
        timeslice: 'on'
    - name: lfo2
      type: CHOP:lfo
      role: input
      parameters:
        frequency: 0.4
        timeslice: 'on'
    - name: limit6
      type: SOP:limit
      role: isolated
      parameters:
        chop: trail1
        chanx: chan1
        chany: chan2
    - name: merge1
      type: CHOP:merge
      role: processor
    - name: trail1
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    connections:
    - from: lfo1
      to: merge1
      input_index: '0'
    - from: lfo2
      to: merge1
      input_index: '1'
    - from: merge1
      to: trail1
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: Directly to the right, we use two sine wave LFOs to create two channels
      needed to draw a circle using the Limit SOP.
  - example_name: example4
    operators:
    - name: lfo3
      type: CHOP:lfo
      role: input
      parameters:
        frequency: 4
        phase: 0.25
        timeslice: 'on'
    - name: lfo4
      type: CHOP:lfo
      role: input
      parameters:
        frequency: 4
        timeslice: 'on'
    - name: math1
      type: CHOP:math
      role: processor
      parameters:
        chopop: add
    - name: limit7
      type: SOP:limit
      role: isolated
      parameters:
        chop: trail2
        chanx: chan1
        chany: chan2
    - name: merge2
      type: CHOP:merge
      role: processor
    - name: trail2
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: lfoPhase
      type: CHOP:lfo
      role: input
      parameters:
        frequency: 0.4
        channelname: '"chan1 chan2"'
        timeslice: 'on'
    connections:
    - from: lfoPhase
      to: math1
      input_index: '0'
    - from: merge2
      to: math1
      input_index: '1'
    - from: lfo3
      to: merge2
      input_index: '0'
    - from: lfo4
      to: merge2
      input_index: '1'
    - from: math1
      to: trail2
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 5
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: Here we modulate our original sine waves with faster sine waves.When
      we use the Limit SOP with these channels, we see a more interesting pattern
      with swirls.
  - example_name: example5
    operators:
    - name: math1
      type: CHOP:math
      role: processor
      parameters:
        chopop: add
    - name: math2
      type: CHOP:math
      role: processor
      parameters:
        chopop: mul
    - name: limit8
      type: SOP:limit
      role: isolated
      parameters:
        chop: trail3
        chanx: chan1
        chany: chan2
    - name: limit9
      type: SOP:limit
      role: isolated
      parameters:
        chop: trail3
        chanx: chan1
        chany: chan2
    - name: trail3
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: lfoPhase
      type: CHOP:lfo
      role: input
      parameters:
        frequency: 0.4
        channelname: '"chan1 chan2"'
        timeslice: 'on'
    - name: lfoPhase1
      type: CHOP:lfo
      role: input
      parameters:
        frequency: 4
        channelname: '"chan1 chan2"'
        timeslice: 'on'
    - name: lfo_decay
      type: CHOP:lfo
      role: input
      parameters:
        wavetype: tri
        frequency: 0.1
        offset: 0.5
        amp: 0.5
        timeslice: 'on'
    connections:
    - from: lfoPhase
      to: math1
      input_index: '0'
    - from: lfoPhase1
      to: math1
      input_index: '1'
    - from: math1
      to: math2
      input_index: '0'
