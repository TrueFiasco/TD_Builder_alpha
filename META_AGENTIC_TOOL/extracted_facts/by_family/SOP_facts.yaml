        uvunwrapcoordattrib: uv
        allowbufblending: 'on'
        resolutionw: 1280
        resolutionh: 720
    - name: render2
      type: TOP:render
      role: isolated
      parameters:
        camera: cam2
        geometry: '"geo3 geo4"'
        lights: light2
        uvunwrapcoordattrib: uv
        transparency: orderind
        transpeellayers: 9
        allowbufblending: 'on'
        resolutionw: 1280
        resolutionh: 720
    - name: sphere1
      type: SOP:sphere
      role: input
      parameters:
        radx: 0.5
        rady: 0.5
        radz: 0.5
        reverseanchors: 'on'
        texture: byprimtype
    - name: particle1
      type: SOP:particle
      role: processor
      parameters:
        prtype: pointsprites
        turbx: 0.9
        turby: -3
        life: 2
        lifevar: 0.451
    - name: sort_byZ1
      type: SOP:sort
      role: output
      parameters:
        pageindex: 2
        partsort: byz
    - name: ramp1_keys
      type: DAT:table
      role: isolated
    - name: pointsprite1
      type: MAT:pointsprite
      role: isolated
      parameters:
        pointsize: 40
        blending: 'on'
        legacyalphabehavior: 'on'
    connections:
    - from: sphere1
      to: particle1
      input_index: '0'
    - from: particle1
      to: sort_byZ1
      input_index: '0'
    topology:
      operator_count: 12
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: The particle system on the left is not properly sorted farthest
      to closest, while the one on the right is. Notice the blending artifacts only
      appear if they particles are not proplery sorted.Order Independent Transparency
      can also be used to help fix particle system blending artifacts, however many
      passes are needed.
