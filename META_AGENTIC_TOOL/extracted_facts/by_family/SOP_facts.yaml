family: SOP
operator_count: 90
operators:
- operator_type: addSOP
  examples:
  - example_name: example1
    operators:
    - name: add1
      type: SOP:add
      role: isolated
      parameters:
        pageindex: 1
        addpts: 'on'
        point0posy: 1
        poly0pattern: '"0 1 2"'
        poly0closed: 'on'
        point1posx: -1
        point1posy: -1
        point1weight: 1
        point2posx: 1
        point2posy: -1
        point2weight: 1
    connections: []
    topology:
      operator_count: 1
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: Polygons in clockwise order.
  - example_name: example2
    operators:
    - name: box2
      type: SOP:box
      role: input
      parameters:
        ty: -1.5
        reverseanchors: 'on'
    - name: box5
      type: SOP:box
      role: isolated
      parameters:
        reverseanchors: 'on'
    - name: sopto2
      type: DAT:sopto
      role: isolated
      parameters:
        sop: box5
    - name: add_to_input_from_table
      type: SOP:add
      role: output
      parameters:
        pointdat: sopto2
        namedattribs: 'on'
        method: group
        add: group
        inc: 4
        closedall: 'on'
    connections:
    - from: box2
      to: add_to_input_from_table
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: In this example we add a second box to the scene that contains a
      sphere.
  - example_name: example3
    operators:
    - name: box3
      type: SOP:box
      role: input
      parameters:
        reverseanchors: 'on'
    - name: add_by_group
      type: SOP:add
      role: output
      parameters:
        keep: 'on'
        addpts: 'on'
        point0posx: 0.2
        point0posy: 0.2
        point0posz: 2
        method: group
        add: group
        inc: 4
        closedall: 'on'
        poly0closed: 'on'
        point1posx: -0.2
        point1posy: 0.2
        point1posz: 2
        point1weight: 1
        point2posx: -0.2
        point2posy: -0.2
        point2posz: 2
        point2weight: 1
        point3posx: 0.2
        point3posy: -0.2
        point3posz: 2
        point3weight: 1
    connections:
    - from: box3
      to: add_by_group
      input_index: '0'
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: In this example we manually added 4 points and created a square.
  - example_name: example4
    operators:
    - name: box4
      type: SOP:box
      role: input
      parameters:
        reverseanchors: 'on'
    - name: add_delete_geometry_but_keep_points
      type: SOP:add
      role: output
      parameters:
        keep: 'on'
    connections:
    - from: box4
      to: add_delete_geometry_but_keep_points
      input_index: '0'
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The Add SOP has a useful function in that it can delete the geometry
      of an input while keeping the points for later use.
- operator_type: alignSOP
  examples:
  - example_name: example1
    operators: []
    connections: []
    topology:
      operator_count: 0
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: TBD
- operator_type: armSOP
  examples:
  - example_name: example1
    operators:
    - name: arm1
      type: SOP:arm
      role: isolated
      parameters:
        pageindex: 3
    - name: noise1
      type: CHOP:noise
      role: isolated
      parameters:
        period: 4
        amp: 4.92
        channelname: '"tx ty tz"'
        timeslice: 'on'
        exporttable: noise1_export
    - name: noise1_export
      type: DAT:table
      role: isolated
    connections: []
    topology:
      operator_count: 3
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This is a simple example of an arm created with the Arm SOP.
- operator_type: attributecreateSOP
  examples:
  - example_name: example1
    operators:
    - name: cam1
      type: COMP:cam
      role: isolated
      parameters:
        tx: -1.15203
        ty: -2.13286
        tz: 3.99429
        rx: -28.1009
        ry: 14.2743
        px: 1.15204
        py: 2.13288
        pz: -8.66662
        orthowidth: 1
        fov: 120
        aperture: 44.1
        fog: linear
        fognear: 9
        fogfar: 15
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 5
        material: phong1
    - name: null1
      type: TOP:null
      role: processor
    - name: null2
      type: TOP:null
      role: output
    - name: null3
      type: TOP:null
      role: output
    - name: light1
      type: COMP:light
      role: isolated
      parameters:
        tx: -6.53454
        ty: -6.67063
        tz: 5.2508
        rx: -39.499
        ry: 33.0391
        rz: 0.799799
        px: 5.3346
        py: 5.47073
        pz: -16.4507
        lookat: geo1
        orthowidth: 1
        aperture: 44.1
    - name: noise1
      type: TOP:noise
      role: input
      parameters:
        exp: 1.49
        amp: 0.646
        resolutionw: 1024
        resolutionh: 1024
        format: rgba8fixed
    - name: phong1
      type: MAT:phong
      role: isolated
      parameters:
        diffr: 0.905882
        diffg: 1
        diffb: 1
        normalmap: null3
        heightmapenable: 'on'
        heightmap: null1
        displaceverts: 'on'
        displacemid: 1
        blending: 'on'
        legacyalphabehavior: 'on'
        wirewidth: 1.2
    - name: normal1
      type: TOP:normal
      role: processor
    - name: render1
      type: TOP:render
      role: input
      parameters:
        uvunwrapcoordattrib: uv
        resolutionw: 1280
        resolutionh: 720
    - name: sphere1
      type: SOP:sphere
      role: input
      parameters:
        pageindex: 1
        reverseanchors: 'on'
        freq: 14
    - name: transform1
      type: SOP:transform
      role: processor
      parameters:
        scale: 3
        postxord: ts
    - name: transform2
      type: TOP:transform
      role: processor
      parameters:
        compover: 'on'
    - name: attribcreate1
      type: SOP:attribcreate
      role: output
      parameters:
        comptang: 'on'
    connections:
    - from: noise1
      to: null1
      input_index: '0'
    - from: transform2
      to: null2
      input_index: '0'
    - from: normal1
      to: null3
      input_index: '0'
    - from: null1
      to: normal1
      input_index: '0'
    - from: sphere1
      to: transform1
      input_index: '0'
    - from: render1
      to: transform2
      input_index: '0'
    - from: transform1
      to: attribcreate1
      input_index: '0'
    topology:
      operator_count: 14
      connection_count: 7
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: 'This example illustrates how to use the Attribute Create SOP to
      create tangents per-vertex. middle-click on the Attribute Create SOP to see
      the T attribute created.If you bypass Attrbute Create, the Render TOP complains
      when you use a normal map but don''t set the tangent attributes, so you can
      just follow its warning and create the tangent attribute.Note: To create a user-named
      attribute, you can use the Point SOP or the Vertex SOP.Note: the Transform TOP
      adds alpha 1 to the background, which you can also do many ways, like with the
      Level TOP or Reorder TOP.Reference:Outrun / Landscapes – TouchDesigner Tutorial
      19 - YouTubehttps://www.youtube.com/watch?v=K8vIg2t3wDo&ab_channel=bileamtschepe'
  - example_name: example2
    operators: []
    connections: []
    topology:
      operator_count: 0
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: See the Point SOP to create custom attributes and set values in
      them.
- operator_type: basisSOP
  examples:
  - example_name: example1
    operators:
    - name: grid1
      type: SOP:grid
      role: input
      parameters:
        type: nurbs
        orient: zx
        sizex: 10
        sizey: 10
        reverseanchors: 'on'
        rows: 10
        cols: 10
    - name: basis1
      type: SOP:basis
      role: output
      parameters:
        uparmtype: manualone
        uknots: '"0 0 0 0 0.1 0.11 0.12 0.13 0.14 0.15 1 1 1 1 "'
    connections:
    - from: grid1
      to: basis1
      input_index: '0'
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: This example re-parameterizes the knot sequence manually by input
      values.
- operator_type: blendSOP
  examples:
  - example_name: example1
    operators:
    - name: box1
      type: SOP:box
      role: input
      parameters:
        reverseanchors: 'on'
    - name: box2
      type: SOP:box
      role: input
      parameters:
        sizex: 2
        sizey: 0.5
        sizez: 1
        reverseanchors: 'on'
    - name: lfo1
      type: CHOP:lfo
      role: input
      parameters:
        frequency: 0.25
        offset: 0.5
        amp: 0.5
        timeslice: 'on'
    - name: null1
      type: CHOP:null
      role: output
      parameters:
        exporttable: null1_export
    - name: blend1
      type: SOP:blend
      role: output
    - name: null1_export
      type: DAT:table
      role: isolated
    connections:
    - from: lfo1
      to: null1
      input_index: '0'
    - from: box1
      to: blend1
      input_index: '0'
    - from: box2
      to: blend1
      input_index: '1'
    topology:
      operator_count: 6
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The Blend SOP can blend between two inputs.Here we blend between
      two different sized boxes.
  - example_name: example2
    operators:
    - name: blend2
      type: SOP:blend
      role: output
      parameters:
        input1weight: 0.1
        input2weight: 0.75
    - name: noise1
      type: SOP:noise
      role: processor
    - name: sphere1
      type: SOP:sphere
      role: input
      parameters:
        reverseanchors: 'on'
        texture: byprimtype
    - name: sphere2
      type: SOP:sphere
      role: input
      parameters:
        reverseanchors: 'on'
        texture: byprimtype
    - name: sphere3
      type: SOP:sphere
      role: input
      parameters:
        reverseanchors: 'on'
        texture: byprimtype
    - name: transform1
      type: SOP:transform
      role: processor
      parameters:
        sx: 0.5
        sy: 2
        sz: 1
        postxord: ts
    connections:
    - from: sphere2
      to: blend2
      input_index: '0'
    - from: noise1
      to: blend2
      input_index: '1'
    - from: transform1
      to: blend2
      input_index: '2'
    - from: sphere1
      to: noise1
      input_index: '0'
    - from: sphere3
      to: transform1
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 5
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: The Blend SOP is unique in that you can individual weight how much
      each input effects the blend.Here we've individually weighted the various inputs
      to create our output geometry.When Diferncing is On, the Blend  Weight of Input
      0 has no effect.
