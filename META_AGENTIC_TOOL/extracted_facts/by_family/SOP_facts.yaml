    curator_text: The Project SOP creates curves on a surface (also known as trim
      or profile curves) by projecting a 3D face onto a spline surface, much like
      a light casts a shadow onto a surface. In this example the 3d face is a triangle,
      and it is projected onto a tube surface.If, like in this example, the 3d face
      is contained within the target object, it will will be projected on both sides
      of the target object. Try positioning the triangle outside the tube, and notice
      now only one side of the target object receiving a profile curve.If a Trim Sop
      is used after the Project SOP, you can cut out the curves from the target object.
