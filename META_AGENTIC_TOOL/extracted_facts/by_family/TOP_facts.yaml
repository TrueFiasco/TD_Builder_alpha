      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 5
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: 'This uses the Inverse DFT. Here we synthesize an image from placing
      non-white pixels in a black image, and letting the Spectrum CHOP generate an
      image from the spectrum image feeding spectrum1.rectangle1, rectangle2 and circle1
      are 32-bit images with only the red and green channels. middle-click on the
      TOPs to see their format. This is what the inverse spectrum needs: red controls
      amplitude of superimposed waves, and green controls their phase shift. Each
      pixel can generate a wave.Small changes produce big effects.  Non-black pixels
      near the center produce long waves. A red pixel at the center is the average
      of the whole image (the DC value), but a pixel to the right of it (seen in rectangle1)
      produces a horizontal sine wave that in one horizontal wave cycle, and if you
      move the dot to the right by one more pixel (The Center X parameter), it creates
      a 2-cycle sine wave. The same thing happens when moving pixels vertically by
      a few pixels: Un-bypass rectangle2 to see two waves superimposed.Unbypass circle1
      to see the effect of a bunch of pixels near the center. It''s green (phase)
      is animated. Adjust the radius slightly.'
