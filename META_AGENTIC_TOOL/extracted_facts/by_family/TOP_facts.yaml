    - from: math3
      to: shoulder_
      input_index: '0'
    - from: shift1
      to: lookup1table
      input_index: '0'
    topology:
      operator_count: 18
      connection_count: 14
      has_parallel_paths: true
      max_chain_length: 6
    curator_text: Generates a softened alpha channel from the alpha of the original
      image.blur1 determines how far to cut into the edge.Near the edge, blurred alpha
      is about .5, so lookup eliminates alpha outside the border where alpha < .5.lookup1
      TOP is set to display alpha channel. In the Inside TOP, this alpha/Input 2 is
      used to determine what parts of the  Input1 image are visible.
  - example_name: example10
    operators:
    - name: blur1
      type: TOP:blur
      role: processor
      parameters:
        preshrink: 5
        size: 23
        format: rgba16float
    - name: comp1
      type: TOP:comp
      role: processor
      parameters:
        operand: screen
    - name: null1
      type: TOP:null
      role: output
    - name: thresh1
      type: TOP:thresh
      role: processor
      parameters:
        threshold: 0.729
        soften: 0.093
    - name: moviein2
      type: TOP:moviefilein
      role: input
    - name: lumalevel1
      type: TOP:lumalevel
      role: processor
      parameters:
        brightness1: 1.47
        gamma1: 1.36
    - name: lumalevel2
      type: TOP:lumalevel
      role: output
      parameters:
        blacklevel: 0.6
    connections:
    - from: thresh1
      to: blur1
      input_index: '0'
    - from: lumalevel1
      to: comp1
      input_index: '0'
    - from: moviein2
      to: comp1
      input_index: '1'
    - from: comp1
      to: null1
      input_index: '0'
    - from: moviein2
      to: thresh1
      input_index: '0'
    - from: blur1
      to: lumalevel1
      input_index: '0'
    - from: moviein2
      to: lumalevel2
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 7
      has_parallel_paths: true
      max_chain_length: 6
    curator_text: Threhhold with a little softness.  Could use Luma Level instead
      with Black Level raised.Blur pre-shrink to spread out more with lower GPU cost.
      16 bit on Pixel Format to avoid low-level stepping.Luma Level vs Level to heep
      sue-saturation of glow closer to original.  Could use a little Gamma vs increasing
      Brightness to avoid clipping at 1.Screen in Composite to avoid the clamping
      that Level would give.
- operator_type: cacheselectTOP
  examples:
  - example_name: example1
    operators:
    - name: math1
      type: CHOP:math
      role: output
      parameters:
        pageindex: 2
        integer: ceiling
    - name: cache1
      type: TOP:cache
      role: output
      parameters:
        replaceindex: -97
    - name: slider1
      type: COMP:slider
      role: input
      parameters:
        label: '"past         present"'
        value0: 0.838384
        w: 100
        h: 20
        bgalpha: 1
        top: ./bg
        topsmoothness: mipmap
        borderar: 0.43
        borderag: 0.43
        borderab: 0.43
        leftborder: bordera
        rightborder: bordera
        bottomborder: bordera
        topborder: bordera
    - name: moviein1
      type: TOP:moviefilein
      role: input
    - name: cacheselect1
      type: TOP:cacheselect
      role: isolated
      parameters:
        cachetop: cache1
    - name: cacheselect2
      type: TOP:cacheselect
      role: isolated
      parameters:
        cachetop: cache1
    connections:
    - from: slider1/out1
      to: math1
      input_index: '0'
    - from: moviein1
      to: cache1
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The Cache Select TOP allows you to extract a frame from a Cache
      TOP. First you need, on the Cache TOP, to turn Active on for a few seconds to
      fill the cache. Then the Cache TOP has enough frames to fetch with the Cache
      Select TOP.In this case we can use the slider to scrub back through time and
      off-set the Cache TOP relative to the total number of frames in the original
      movie. Pausing the time line and using the slider to scrub backwards through
      time will help to illustrate how this works.Note that you can have several Cache
      Select TOPs retrieving from one Cache TOP.Matthew Ragan8/13/14
- operator_type: cacheTOP
  examples:
  - example_name: example1
    operators:
    - name: cache5
      type: TOP:cache
      role: output
      parameters:
        cachesize: 11
        outputindex: -10
    - name: moviein4
      type: TOP:moviefilein
      role: input
      parameters:
        indexunit: indices
    connections:
    - from: moviein4
      to: cache5
      input_index: '0'
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The Cache TOP can be used to simply delay images.Here the Cache
      Size is set to 11 to hold the current image and the image 10 cooks ago.The time-delay
      is not exact because it caches one image per timeline cook, so if you are running
      about 22 frames per second, it will be a delay of 10/22 seconds. The Output
      Index is usually 0 or a negative number, like -10, as you think of the output
      image being from 10 frames ago.
  - example_name: example2
    operators:
    - name: math1
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 2
        torange1: -1
    - name: null3
      type: CHOP:null
      role: output
      parameters:
        exporttable: null3_export1
    - name: cache1
      type: TOP:cache
      role: output
      parameters:
        prefill: 'on'
        cachesize: 100
        interp: 'on'
    - name: slider3
      type: COMP:slider
      role: input
      parameters:
        label: index
        value0: 0.5
        w: 100
        h: 20
        bgalpha: 1
        topsmoothness: mipmap
        borderar: 0.43
        borderag: 0.43
        borderab: 0.43
        leftborder: bordera
        rightborder: bordera
        bottomborder: bordera
        topborder: bordera
    - name: moviein3
      type: TOP:moviefilein
      role: input
      parameters:
        playmode: specify
        textendright: hold
    - name: null3_export1
      type: DAT:table
      role: isolated
    - name: transform_zoom
      type: TOP:transform
      role: processor
      parameters:
        limittiles: 'on'
    - name: shrink_to_save1
      type: TOP:res
      role: processor
      parameters:
        pageindex: 1
        highqualresize: 'on'
        outputresolution: quarter
    connections:
    - from: slider3/out1
      to: math1
      input_index: '0'
    - from: math1
      to: null3
      input_index: '0'
    - from: shrink_to_save1
      to: cache1
      input_index: '0'
    - from: moviein3
      to: transform_zoom
      input_index: '0'
    - from: transform_zoom
      to: shrink_to_save1
      input_index: '0'
    topology:
      operator_count: 8
      connection_count: 5
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: You can pre-fill all the frames of a Movie File In TOP into a Cache
      TOP and then scrub through them.The prefill needs to capture one image of the
      movie per timeline frame. Here this is done by making the movie play one index
      per frame, starting at the first frame of then movie (index 0).You need to use
      me.time.frame to control what goes into the cache for a certain index. me.time.fame
      is the local timeline frame number (not absTime.frame):The prefill is done by
      secretly moving the frame to 1 and stepping forward one frame per cache image.
      See the Index parameter of the Movie File In TOP.The Transform TOP also uses
      me.time.frame to zoom up from about 20%.
  - example_name: example3
    operators:
    - name: moviein
      type: TOP:moviefilein
      role: input
      parameters:
        playmode: specify
    - name: slider1
      type: COMP:slider
      role: input
      parameters:
        label: '"index 1"'
        value0: 0.5
        w: 100
        h: 20
        bgalpha: 1
        topsmoothness: mipmap
        borderar: 0.43
        borderag: 0.43
        borderab: 0.43
        leftborder: bordera
        rightborder: bordera
        bottomborder: bordera
        topborder: bordera
    - name: slider2
      type: COMP:slider
      role: input
      parameters:
        label: '"index 2"'
        value0: 0.767677
        w: 100
        h: 20
        bgalpha: 1
        topsmoothness: mipmap
        borderar: 0.43
        borderag: 0.43
        borderab: 0.43
        leftborder: bordera
        rightborder: bordera
        bottomborder: bordera
        topborder: bordera
    - name: to_select1
      type: CHOP:null
      role: output
      parameters:
        exporttable: null3_export
    - name: to_select2
      type: CHOP:null
      role: output
      parameters:
        exporttable: null4_export
    - name: cacheselec2
      type: TOP:cacheselect
      role: isolated
      parameters:
        cachetop: cache_pre_fill
    - name: math_range1
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 2
        torange1: -100
    - name: math_range2
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 2
        torange1: -100
    - name: cacheselect1
      type: TOP:cacheselect
      role: isolated
      parameters:
        cachetop: cache_pre_fill
    - name: null3_export
      type: DAT:table
      role: isolated
    - name: null4_export
      type: DAT:table
      role: isolated
    - name: cache_pre_fill
      type: TOP:cache
      role: output
      parameters:
        pageindex: 2
        prefill: 'on'
        cachesize: 100
        outputindexunit: frames
    - name: shrink_to_save
      type: TOP:res
      role: processor
      parameters:
        pageindex: 1
        highqualresize: 'on'
        outputresolution: quarter
    connections:
    - from: math_range1
      to: to_select1
      input_index: '0'
    - from: math_range2
      to: to_select2
      input_index: '0'
    - from: slider1/out1
      to: math_range1
      input_index: '0'
    - from: slider2/out1
      to: math_range2
      input_index: '0'
    - from: shrink_to_save
      to: cache_pre_fill
      input_index: '0'
    - from: moviein
      to: shrink_to_save
      input_index: '0'
    topology:
      operator_count: 13
      connection_count: 6
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: Two Cache Select TOPs selecting from one Cache TOP.You can pre-fill
      all the frames of a Movie File In TOP into a Cache TOP and then scrub through
      them using two Cache Selext TOPs.
  - example_name: example4
    operators:
    - name: comp1
      type: TOP:comp
      role: output
      parameters:
        operand: maximum
        legacyxform: 'on'
    - name: null2
