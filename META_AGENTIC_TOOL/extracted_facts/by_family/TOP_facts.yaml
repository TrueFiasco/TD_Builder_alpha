        radiusy: 0.6
        bgalpha: 1
        softness: 0.7
        combineinput: res
        resolutionw: 1024
        resolutionh: 1024
        format: rgba32float
    - name: topto_circle1
      type: CHOP:topto
      role: isolated
      parameters:
        top: circle1
        g: '""'
        b: '""'
        a: '""'
        exportmethod: datname
    - name: topto_circle2
      type: CHOP:topto
      role: isolated
