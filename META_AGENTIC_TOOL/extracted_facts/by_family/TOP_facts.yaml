      input_index: '0'
    - from: spectrum4
      to: transform2
      input_index: '0'
    - from: spectrum6
      to: transform3
      input_index: '0'
    topology:
      operator_count: 11
      connection_count: 12
      has_parallel_paths: true
      max_chain_length: 5
    curator_text: Making small changes in the Transform TOP, which is masked (Common
      page, Channel Mask parameter)  to only affect the red (amplitude) channel makes
      radical changes to the image.pick all 3 Transform TOPs and change their parameters
      together... scale, rotate, translate.spectrum8, etc shows the image converted
      to different arrangements of pixels in the DFT image.
  - example_name: example3
    operators:
    - name: lfo1
