      max_chain_length: 6
    curator_text: To render transparent objects correctly all polygons must be sorted
      from closest to furthest away from the camera before being passed along to the
      render pipeline. The polygons that are furthest way must be sent first, while
      the polygons that are closest to the camera you want to rendered after. With
      OpenGL there are no fast GPU based ways to do this explicitly. For transparency
      to work well for complex scenes you have to manually sort the polygons of each
      geometry set using two sortSOPs.  The first sort SOP sorts the primitives from
      closest to furthest from the camera. In this example that is "sort1". The second
      sortTOP is used to reverse that order so the closest polygons are rendered last.The
      switch1 sop in this example shows 4 different cases.  The first case on input
      0 is a sphereSOP that is set to Mesh mode. The mesh topology has only a single
      primitive. This type of geometry can not be sorted by primitive order.  Input
      2 shows the Mesh sphere converted to polygons.  This topology can be sorted
      as now each quad is treated as a seperate primitve.  The next 2 examples show
      a polygon sphere and polygon based torus which as well can be sorted correctly.For
      animating geometry - in this example a rotating sphere, the transform must come
      before the sort.  Therefore the transform1 SOP has an animating expression in
      the RY parameter. This kind of setup however only works for a single GEO object.  You
      must also correctly setup the render order for each geo object.  This is done
      using te Draw Priority parameter on the geoCOMP render page.  The closet geo,
      in this case is geoNear.  The object closest to the camera should have the highest
      draw priority.  The object furthest away should have the lowest draw priority.Also
      notice the Blending parameter is turned on in the phong1 material.  As well
      the material has its Alpha parameter set to 0.2. You must manually turn on transparency
      for the materials in TouchDesigner.The reason this might seem confusing is there
      are two main factors at play here. Do you want to the geometry to render as
      fast as possible, or do you require the scene to have transparency.  By default
      TouchDesigner is configured for fastest rendering speed.With this in mind, if
      the GPU determines the current pixel will occlude the new one, it won't bother
      rendering the new one. Therefore if you require transparency you must follow
      a process like this to ensure the contribution from each polygon is rendered.
      There is no fast and automatic way for this to occur.
  - example_name: example7
