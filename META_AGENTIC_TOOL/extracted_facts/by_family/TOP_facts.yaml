    - name: highQualityGainOn
      type: TOP:bloom
      role: output
      parameters:
        bloomintensity: 3.6
    - name: highQualityGainOff
      type: TOP:bloom
      role: output
      parameters:
        bloomintensity: 3.6
    - name: highQualityGainOffSmall
      type: TOP:bloom
      role: output
      parameters:
        bloomintensity: 19.8
    connections:
    - from: smallRectangle
      to: bloom1
      input_index: '0'
    - from: smallRectangle
      to: bloom2
      input_index: '0'
    - from: rectangle3
      to: bloom3
      input_index: '0'
    - from: rectangle3
