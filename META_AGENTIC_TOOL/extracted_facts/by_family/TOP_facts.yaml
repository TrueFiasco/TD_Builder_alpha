      role: output
      parameters:
        exporttable: null2_export
    - name: speed1
      type: CHOP:speed
      role: processor
      parameters:
        timeslice: 'on'
    - name: moviein1
      type: TOP:moviefilein
      role: input
    - name: constant1
      type: CHOP:constant
      role: input
      parameters:
        const0name: rz
        const0value: 60
    - name: transform1
      type: TOP:transform
      role: processor
      parameters:
        limittiles: 'on'
    - name: cache_active
      type: TOP:cache
      role: processor
      parameters:
        step: 3
        outputindex: -32
    - name: null2_export
      type: DAT:table
      role: isolated
    - name: cache_active1
      type: TOP:cache
      role: processor
      parameters:
        step: 3
