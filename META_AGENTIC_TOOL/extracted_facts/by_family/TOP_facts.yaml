        frequency: 0.24
        amp: 0.57
        channelname: tx
        timeslice: 'on'
        exporttable: lfo1_export
    - name: comp1
      type: TOP:comp
      role: isolated
      parameters:
        tops: cacheselect*
        operand: average
        legacyxform: 'on'
    - name: comp2
      type: TOP:comp
      role: isolated
      parameters:
        tops: fadeDelay*/out1
        operand: add
        legacyxform: 'on'
    - name: cache1
      type: TOP:cache
      role: output
      parameters:
        cachesize: 4
    - name: moviein2
      type: TOP:moviefilein
      role: input
    - name: fadeDelay0
      type: COMP:base
      role: isolated
      parameters:
        pageindex: 3
        clone: fadeDelay0
    - name: fadeDelay1
