      role: output
      parameters:
        type: imagesequence
        videocodec: mpeg4
        imagefiletype: jpeg
        audiochop: toMovieout
    - name: incrementFilename
      type: CHOP:count
      role: output
      parameters:
        pageindex: 1
        timeslice: 'on'
        exporttable: count1_export
    connections:
    - from: moviein1
      to: transform1
      input_index: '0'
    - from: transform1
      to: moviefileout1
      input_index: '0'
    - from: recordMovie/out1
      to: incrementFilename
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: 'This creates a sequence of files, one file per frame.The Record
      Movie button turns Record on and off, as well as triggers a counter to give
      each new recording sequence a unique name.In the File parameter, me.fileSuffix
      uses artifishull intelligence to build the end of the file path, something like  .2.14,jpgThe
      movie is created on the Desktop using the hard-to-find python: app.desktopFolder.  See
      the App class for more secrets. docs.derivative.ca/App_Class'
  - example_name: example3
    operators:
    - name: moviein2
      type: TOP:moviefilein
      role: input
    - name: transform2
      type: TOP:transform
      role: processor
      parameters:
        limittiles: 'on'
    - name: Record_still
      type: COMP:button
      role: input
