    - name: inputSelect
      type: COMP:container
      role: isolated
      parameters:
        w: 102
        h: 50
        topsmoothness: mipmap
        align: horizlr
        spacing: 2
    connections:
    - from: transform1
      to: tile1
      input_index: '0'
    - from: transform1
      to: tile2
      input_index: '0'
    - from: transform1
      to: tile3
      input_index: '0'
    - from: transform1
      to: tile4
      input_index: '0'
    - from: moviein1
      to: switch1
      input_index: '0'
    - from: ramp1
      to: switch1
      input_index: '1'
    - from: switch1
      to: transform1
      input_index: '0'
    topology:
      operator_count: 11
      connection_count: 7
      has_parallel_paths: true
      max_chain_length: 4
    curator_text: The Tile TOP, like its name suggests, will create a tiled image.
      This can make for some interesting kaleidoscopic effects. Here you can see four
      examples of how you might use the tile effect to create repeated patterns. Use
      the buttons to switch between using the photo and the ramp to see different
      effects. You might also use the bypass button to see what happens if you turn
      off the spin effect.Matthew Ragan 8/16/14
- operator_type: timemachineTOP
  examples:
  - example_name: example1
    operators:
    - name: lfo1
      type: CHOP:lfo
      role: isolated
      parameters:
        frequency: 0.1
        timeslice: 'on'
        exporttable: lfo1_export
    - name: null1
      type: CHOP:null
      role: output
      parameters:
        exporttable: null1_export
    - name: null2
      type: CHOP:null
      role: output
      parameters:
        exporttable: null2_export
    - name: ramp1
      type: TOP:ramp
      role: input
      parameters:
        dat: ramp1_keys
        type: circular
        extendleft: hold
        extendright: hold
        dither: 'on'
        resolutionw: 1280
        resolutionh: 720
    - name: ramp2
      type: TOP:ramp
      role: input
      parameters:
        dat: ramp2_keys
        type: radial
        resolutionw: 640
        resolutionh: 360
    - name: text1
      type: TOP:text
      role: processor
      parameters:
        pageindex: 1
        legacyfontselection: 'on'
        fontsizex: 269.3
    - name: tima1
      type: TOP:tima
      role: output
    - name: level1
      type: TOP:level
      role: processor
      parameters:
        pageindex: 2
        clampinput: clamp
    - name: level2
      type: TOP:level
      role: processor
      parameters:
        clampinput: clamp
    - name: lowest
      type: CHOP:topto
      role: isolated
      parameters:
        top: analyze1
        g: '""'
        b: '""'
        a: '""'
        exportmethod: datname
    - name: tex3d1
      type: TOP:tex3d
      role: processor
      parameters:
        prefill: 'on'
    - name: highest
      type: CHOP:topto
      role: isolated
      parameters:
        top: analyze2
        g: '""'
        b: '""'
        a: '""'
        exportmethod: datname
    - name: hsvadj1
      type: TOP:hsvadj
      role: processor
    - name: analyze1
      type: TOP:analyze
      role: output
      parameters:
        op: minimum
    - name: analyze2
      type: TOP:analyze
      role: output
      parameters:
        op: maximum
    - name: range_low
      type: COMP:slider
      role: input
      parameters:
        label: low
        w: 100
        h: 20
        bgalpha: 1
        topsmoothness: mipmap
        borderar: 0.43
        borderag: 0.43
        borderab: 0.43
        leftborder: bordera
        rightborder: bordera
        bottomborder: bordera
        topborder: bordera
    - name: ramp1_keys
      type: DAT:table
      role: isolated
    - name: ramp2_keys
      type: DAT:table
      role: isolated
    - name: range_high
      type: COMP:slider
      role: input
      parameters:
        label: high
        value0: 1
        w: 100
        h: 20
        bgalpha: 1
        topsmoothness: mipmap
        borderar: 0.43
        borderag: 0.43
        borderab: 0.43
        leftborder: bordera
        rightborder: bordera
        bottomborder: bordera
        topborder: bordera
    - name: lfo1_export
      type: DAT:table
      role: isolated
    - name: null1_export
      type: DAT:table
      role: isolated
    - name: null2_export
      type: DAT:table
      role: isolated
    connections:
    - from: range_low/out1
      to: null1
      input_index: '0'
    - from: range_high/out1
      to: null2
      input_index: '0'
    - from: ramp2
      to: text1
      input_index: '0'
    - from: tex3d1
      to: tima1
      input_index: '0'
    - from: level2
      to: tima1
      input_index: '1'
    - from: text1
      to: level1
      input_index: '0'
    - from: ramp1
      to: level2
      input_index: '0'
    - from: hsvadj1
      to: tex3d1
      input_index: '0'
    - from: level1
      to: hsvadj1
      input_index: '0'
    - from: level2
      to: analyze1
      input_index: '0'
    - from: level2
      to: analyze2
      input_index: '0'
    topology:
      operator_count: 22
      connection_count: 11
      has_parallel_paths: true
      max_chain_length: 6
    curator_text: The Time Machine TOP is always used with the Texture 3D TOP. (See
      the snippets for Texture 3D TOP.)The 3D texture is loaded (via Pre Fill, which
      runs the timeline from frame 1 to frame (cache size * step size = 32 frames
      here) and  puts it in a 3D texture.The Time Machine TOP fetches from the 3D
      texture. Where level2 is black, it gets from the lower slices of the 3D texture.
      Where it is white it get from the upper slices of the 3D texture.That is, each
      pixel of the output uses a slice of the 3D texture based on the grey-scale value
      of the 2nd input (the ramp).You can adjust the lower and upper range of the
      ramp, which restricts which slices in the 3D texture it retrieves from.
- operator_type: transformTOP
  examples:
  - example_name: example1
    operators:
    - name: null2
      type: CHOP:null
      role: output
