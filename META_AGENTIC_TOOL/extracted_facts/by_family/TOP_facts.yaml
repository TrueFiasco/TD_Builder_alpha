    curator_text: The HSV Adjust TOP adjusts color values using hue, saturation, and
      value controls. This snippet shows one can narrow the the range of pixels to
      modify, based on their hue, saturation and value. To adjust only the color of
      the two red oildrums in the input image:1. Add a Difference TOP to easily see
      what the result of each action is2. Pick the color in the input image we want
      to modify. For this we crop the image and use an Analyze TOP to extract the
      color of the right red oildrum. We use this RGB value for the Start Color parameter
      of the HSV Adjust TOP. This the hue that the HSV adjustment is centered around.
      When adjusting a small hue range, this is the color that will be altered.2.
      Limit the Hue Range. This is the range of color from the Start Color that will
      be adjusted. A range of 1 will only adjust colors that are the same as the start
      color.3. Adjust the Hue Offset, watch the Difference TOP, and first adjust the
      Hue Range, then the Saturation Range, then the Value Range until you only see
      a change in the desired color areas. 4. Then finetune with the Hue Falloff,
      Saturation Falloff, Value Falloff. Higher values give more falloff, blending
      the range softly from hues/saturations/values that are adjusted to ones are
      not.
