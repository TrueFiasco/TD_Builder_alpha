    curator_text: This example shows how to create a procedural noise texture on a
      sphere and addresses transparency as well.A RGB texture and Alpha texture is
      created and mapped to pbr1. Its important to note that although we are rendering
      a transparent sphere you must ensure Blending (Transparency) parameter is turned
      off on the common page. This is because the renderTOP is set to use Order Independent
      Transparency for the Transparency parameter.=====In porceduralSphereTextures,
      the render2 TOP directly renders a SOP. The material for this render is applied
      to the render2 renderTOP using the Override Material found on the Advanced page.
      The phong1 material is setup to render the sphere world space position using
      the Color Buffer 1 RGB parameter. You can render a variety of attributes to
      a color buffer using this method.The render select TOP is used to extract the
      color buffer 1 from the render TOP. This technique works well in many cases,
      but there are wrapping issues with that can be worked around in some cases.
      For a sphere the crop / flip / math trick is used to fill the missing positions
      to the left side of the texutre.This position map can be used to drive a noise
      texture's lookup - in this case noise1 second input is used to create coherent
      3D noise for the sphere.
