- operator_type: mathTOP
  examples:
  - example_name: example1
    operators:
    - name: inside2
      type: TOP:inside
      role: processor
      parameters:
        legacyxform: 'on'
    - name: moviein1
      type: TOP:moviefilein
      role: input
      parameters:
        pageindex: 4
    - name: reorder_r_to_alpha
