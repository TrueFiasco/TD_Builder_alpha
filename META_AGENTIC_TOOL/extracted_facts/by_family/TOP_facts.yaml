        outputresolution: custom
    - name: diff1
      type: TOP:diff
      role: processor
      parameters:
        legacyxform: 'on'
    - name: flip1
      type: TOP:flip
      role: processor
      parameters:
        flipx: 'on'
    - name: mono1
      type: TOP:mono
      role: processor
    - name: null1
      type: TOP:null
      role: output
    - name: cache1
      type: TOP:cache
      role: processor
      parameters:
        outputindex: -1
    - name: button1
      type: COMP:button
      role: isolated
      parameters:
        label: '"Movie File In"'
        buttontype: toggledown
        scaletofit: onlyshrink
        w: 60
        h: 30
        top: ./bg
        topsmoothness: mipmap
    - name: switch1
      type: TOP:switch
      role: processor
    - name: videodevin1
      type: TOP:videodevin
      role: input
      parameters:
        device: '"V1|||6|||6|||0|||OBS Virtual Camera"'
        precedence: even
        signalformat: f640x480p-30.00hz
    - name: moviefilein1
      type: TOP:moviefilein
      role: input
    connections:
    - from: diff1
      to: blur1
      input_index: '0'
    - from: switch1
      to: diff1
      input_index: '0'
    - from: cache1
      to: diff1
      input_index: '1'
    - from: videodevin1
      to: flip1
      input_index: '0'
    - from: flip1
      to: mono1
      input_index: '0'
    - from: blur1
      to: null1
      input_index: '0'
    - from: switch1
      to: cache1
      input_index: '0'
    - from: moviefilein1
      to: switch1
      input_index: '0'
    - from: mono1
      to: switch1
      input_index: '1'
    topology:
      operator_count: 10
      connection_count: 9
      has_parallel_paths: true
      max_chain_length: 8
    curator_text: The Difference TOP computes the difference between two inputs. In
      this case we're looking at the difference between a Movie File In TOP and a
      Cache TOP that is set one frame behind the Movie File In. This allows us to
      track the change from one frame to another. This can be useful very when analyzing
      motion. If you have a camera available, you can use the button provided to look
      at the difference in frame to frame coming from your camera.Matthew Ragan8/13/14Often
      it's better to "cache back" 2 frames to get a good solid difference. (gh)
