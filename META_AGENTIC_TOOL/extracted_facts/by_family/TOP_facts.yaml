        outputresolution: half
        outputaspect: useinput
    - name: moviefilein2
      type: TOP:moviefilein
      role: input
      parameters:
        pageindex: 4
        outputresolution: half
    - name: moviefilein3
      type: TOP:moviefilein
      role: input
      parameters:
        pageindex: 4
        outputresolution: half
    - name: moviefilein4
      type: TOP:moviefilein
      role: input
      parameters:
        outputresolution: half
    - name: null_illegalAlpha
      type: TOP:null
      role: output
    - name: reorder_illegalAlpha
      type: TOP:reorder
      role: processor
      parameters:
        outputalpha: input2
        outputalphachan: luminance
    - name: reorder_fixIllegalAlpha
      type: TOP:reorder
      role: processor
      parameters:
        outputalphachan: max
    connections:
    - from: reorder1
      to: null1
      input_index: '0'
    - from: reorder_fixIllegalAlpha
      to: null2
      input_index: '0'
    - from: level1
      to: over1
      input_index: '0'
    - from: moviefilein1
      to: over1
      input_index: '1'
    - from: reorder1
      to: level1
      input_index: '0'
    - from: moviefilein2
      to: reorder1
      input_index: '0'
    - from: reorder_illegalAlpha
      to: null_illegalAlpha
      input_index: '0'
    - from: moviefilein3
      to: reorder_illegalAlpha
      input_index: '0'
    - from: moviefilein4
      to: reorder_illegalAlpha
      input_index: '1'
    - from: reorder_illegalAlpha
      to: reorder_fixIllegalAlpha
      input_index: '0'
    topology:
      operator_count: 12
      connection_count: 10
      has_parallel_paths: true
      max_chain_length: 4
    curator_text: This puts into the alpha channel the maximum value for R G or B.
      Therefore all pixels have legal values for compositing with transparency because
      images must be pre-multiplied by alpha, and thus the value in any of the R G
      or B channels must not exceed what is in alpha.The is similar to what the Screen
      mode in the Composite TOP does... blend in the brighter pixels.Un-bypass the
      Level TOP and the alpha is increased, still legal, toward being fully opaque
      using the Low A parameter.Below, reorder_illegalAlpha has been created with
      some pixels containing illegal alpha values. Reorder_fixIllegalAlpha repairs
      that in one step by putting the max value of RGB and A into the new alpha channel.
  - example_name: example5
    operators:
    - name: math1
      type: TOP:math
      role: output
      parameters:
        pageindex: 3
        postoff: 1
        chanmask: 8
    - name: ramp1
      type: TOP:ramp
      role: output
      parameters:
        dat: ramp1_keys
        operand: under
    - name: text1
      type: TOP:text
      role: output
      parameters:
        pageindex: 3
        text: '""'
        bgalpha: 1
        operand: under
    - name: level1
      type: TOP:level
      role: output
      parameters:
        pageindex: 2
        lowa: 1
    - name: topto1
      type: CHOP:topto
      role: isolated
      parameters:
        top: moviefilein1
        exportmethod: datname
    - name: topto2
      type: CHOP:topto
      role: isolated
      parameters:
        top: reorder_fillBlack
        exportmethod: datname
    - name: chanmix1
      type: TOP:chanmix
      role: output
      parameters:
        constant4: 1
    - name: constant1
      type: TOP:constant
      role: output
      parameters:
        operand: under
    - name: function1
      type: TOP:function
      role: output
      parameters:
        rerange1: 1
        rerange2: 1
        chanmask: 8
    - name: ramp1_keys
      type: DAT:table
      role: isolated
    - name: transform1
      type: TOP:transform
      role: output
      parameters:
        compover: 'on'
    - name: moviefilein1
      type: TOP:moviefilein
      role: input
      parameters:
        indexunit: indices
        precedence: even
        outputaspect: useinput
    - name: reorder_fillBlack
      type: TOP:reorder
      role: output
      parameters:
        outputalphachan: one
    connections:
    - from: moviefilein1
      to: math1
      input_index: '0'
    - from: moviefilein1
      to: ramp1
      input_index: '0'
    - from: moviefilein1
      to: text1
      input_index: '0'
    - from: moviefilein1
      to: level1
      input_index: '0'
    - from: moviefilein1
      to: chanmix1
      input_index: '0'
    - from: moviefilein1
      to: constant1
      input_index: '0'
    - from: moviefilein1
      to: function1
      input_index: '0'
    - from: moviefilein1
      to: transform1
      input_index: '0'
    - from: moviefilein1
      to: reorder_fillBlack
      input_index: '0'
    topology:
      operator_count: 13
      connection_count: 9
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: Fill background with black by putting One in the Alpha channel of
      the Reorder TOP.  But there are at least eight other ways to do it!
