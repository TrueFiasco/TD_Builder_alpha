      parameters:
        limittiles: 'on'
    - name: Pause_movie
      type: COMP:button
      role: isolated
      parameters:
        label: Pause
        buttontype: toggledown
        scaletofit: onlyshrink
        w: 50
        h: 50
        top: ./bg
        topsmoothness: mipmap
    - name: recordMovie
      type: COMP:button
      role: input
      parameters:
        label: '"Record movie"'
        buttontype: toggledown
        scaletofit: onlyshrink
        w: 50
        h: 50
        top: ./bg
        topsmoothness: mipmap
    - name: audiofilein1
      type: CHOP:audiofilein
      role: input
      parameters:
        timeslice: 'on'
    - name: count1_export
      type: DAT:table
      role: isolated
    - name: moviefileout1
