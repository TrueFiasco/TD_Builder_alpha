family: TOP
operator_count: 93
operators:
- operator_type: addTOP
  examples:
  - example_name: example1
    operators:
    - name: add1
      type: TOP:add
      role: output
      parameters:
        legacyxform: 'on'
    - name: constant1
      type: TOP:constant
      role: input
    - name: constant6
      type: TOP:constant
      role: input
    connections:
    - from: constant1
      to: add1
      input_index: '0'
    - from: constant6
      to: add1
      input_index: '1'
    topology:
      operator_count: 3
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The Add TOP can take 2 inputs and add their color values together.
  - example_name: example2
    operators:
    - name: add2
      type: TOP:add
      role: output
      parameters:
        pageindex: 1
        r: -60
        sx: 0.8
        sy: 0.8
        legacyxform: 'on'
    - name: lfo1
      type: CHOP:lfo
      role: isolated
      parameters:
        wavetype: tri
        frequency: 0.25
        amp: 0.5
        timeslice: 'on'
    - name: moviefilein1
      type: TOP:moviefilein
      role: input
    - name: moviefilein2
      type: TOP:moviefilein
      role: input
    connections:
    - from: moviefilein1
      to: add2
      input_index: '0'
    - from: moviefilein2
      to: add2
      input_index: '1'
    topology:
      operator_count: 4
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: This example performs basic transform operations on the incoming
      signals.
  - example_name: example3
    operators:
    - name: add1
      type: TOP:add
      role: output
      parameters:
        pageindex: 1
        r: 7
        sx: 0.89
        sy: 0.89
        legacyxform: 'on'
        npasses: 30
    - name: rectangle1
      type: TOP:rectangle
      role: input
      parameters:
        pageindex: 2
        sizex: 0.9
        sizey: 0.9
        borderr: 1
        borderg: 1
        borderb: 1
        borderwidth: 0.01
        combineinput: res
        resolutionw: 800
        resolutionh: 800
    connections:
    - from: rectangle1
      to: add1
      input_index: '0'
    - from: rectangle1
      to: add1
      input_index: '1'
    topology:
      operator_count: 2
      connection_count: 2
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: A little-known occasionally-useful feature in TOPs is the Passes
      parameter that repeats an operation multiple times, in this case a repeated
      scale/rotate on a square.You can also uses Passes to act as a Bypass by setting
      it to 0 or 1 based on an expression or an export.
- operator_type: analyzeTOP
  examples:
  - example_name: example1
    operators:
    - name: null1
      type: TOP:null
      role: output
    - name: result
      type: TOP:null
      role: processor
    - name: source
      type: TOP:null
      role: processor
    - name: topto1
      type: CHOP:topto
      role: isolated
      parameters:
        top: analyze_dark
        downloadtype: immediate
        exporttable: topto1_export
    - name: topto2
      type: CHOP:topto
      role: isolated
      parameters:
        top: analyze_dark2
        downloadtype: immediate
    - name: topto3
      type: CHOP:topto
      role: isolated
      parameters:
        top: analyze_light
        downloadtype: immediate
        exporttable: topto3_export
    - name: topto4
      type: CHOP:topto
      role: isolated
      parameters:
        top: analyze_light2
        downloadtype: immediate
    - name: moviein1
      type: TOP:moviefilein
      role: input
    - name: moviein2
      type: TOP:moviefilein
      role: isolated
    - name: videoin1h
      type: TOP:videodevin
      role: isolated
      parameters:
        precedence: even
    - name: level_muddy
      type: TOP:level
      role: processor
      parameters:
        pageindex: 1
        clampinput: clamp
        outlow: 0.17
        outhigh: 0.51
        chanmask: 7
    - name: analyze_dark
      type: TOP:analyze
      role: output
      parameters:
        op: minrgb
    - name: analyze_dark2
      type: TOP:analyze
      role: output
      parameters:
        op: minrgb
    - name: analyze_light
      type: TOP:analyze
      role: output
      parameters:
        op: maxrgb
    - name: level_balance
      type: TOP:level
      role: processor
      parameters:
        pageindex: 1
        clampinput: clamp
    - name: topto1_export
      type: DAT:table
      role: isolated
    - name: topto3_export
      type: DAT:table
      role: isolated
    - name: analyze_light2
      type: TOP:analyze
      role: output
      parameters:
        op: maxrgb
    - name: lumalevel_lower_contrast
      type: TOP:lumalevel
      role: output
      parameters:
        pageindex: 1
        outlow: 0.2
        outhigh: 0.8
        chanmask: 7
    connections:
    - from: source
      to: null1
      input_index: '0'
    - from: level_balance
      to: result
      input_index: '0'
    - from: level_muddy
      to: source
      input_index: '0'
    - from: moviein1
      to: level_muddy
      input_index: '0'
    - from: source
      to: analyze_dark
      input_index: '0'
    - from: level_balance
      to: analyze_dark2
      input_index: '0'
    - from: source
      to: analyze_light
      input_index: '0'
    - from: source
      to: level_balance
      input_index: '0'
    - from: level_balance
      to: analyze_light2
      input_index: '0'
    - from: result
      to: lumalevel_lower_contrast
      input_index: '0'
    topology:
      operator_count: 19
      connection_count: 10
      has_parallel_paths: true
      max_chain_length: 6
    curator_text: 'Analyze TOPs get the darkest pixel and the  brightest pixel of
      the muddy "source" images. This network adjusts levels so the image range is
      0 to 1 with no channels over-driven.Note that Analyze by default creates an
      image with 1 pixel.It might be better to work the TOPs in 12 or 16-bits per
      pixel because precision is lost at 8 bits per pixel channel.This technique requires
      you to go back to the  CPU to drive the Level TOP''s parameters. You can switch
      the TOP to CHOP to Next Frame.Note: This technique may slightly change saturation
      of colors. Luma Level TOP may be used similarly to preserve saturation.'
  - example_name: example2
    operators:
    - name: res1
      type: TOP:res
      role: output
      parameters:
        pageindex: 1
        outputaspect: custom
    - name: res2
      type: TOP:res
      role: output
      parameters:
        pageindex: 1
        outputaspect: custom
    - name: res3
      type: TOP:res
      role: output
      parameters:
        pageindex: 1
        outputaspect: custom
    - name: res4
      type: TOP:res
      role: output
      parameters:
        pageindex: 1
        outputaspect: custom
    - name: analyze1
      type: TOP:analyze
      role: processor
      parameters:
        op: minimum
        scope: rows
    - name: analyze2
      type: TOP:analyze
      role: processor
      parameters:
        op: maximum
        scope: rows
    - name: analyze3
      type: TOP:analyze
      role: processor
      parameters:
        op: minimum
        scope: columns
    - name: analyze4
      type: TOP:analyze
      role: processor
      parameters:
        op: maximum
        scope: columns
    - name: moviein3
      type: TOP:moviefilein
      role: input
    connections:
    - from: analyze1
      to: res1
      input_index: '0'
    - from: analyze2
      to: res2
      input_index: '0'
    - from: analyze3
      to: res3
      input_index: '0'
    - from: analyze4
      to: res4
      input_index: '0'
    - from: moviein3
      to: analyze1
      input_index: '0'
    - from: moviein3
      to: analyze2
      input_index: '0'
    - from: moviein3
      to: analyze3
      input_index: '0'
    - from: moviein3
      to: analyze4
      input_index: '0'
    topology:
      operator_count: 9
      connection_count: 8
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: These Analyze TOPs analyze each row or column and puts the results
      in a 1-pixel wide strip.The Resoltion TOPs are not changing the pixel resolution.
      They are changing only the image aspect ratio, so the  pixels are stretched.
  - example_name: example3
    operators:
    - name: moviein1
      type: TOP:moviefilein
      role: input
    - name: transform1
      type: TOP:transform
      role: output
      parameters:
        xord: tsr
        rotate: 121
        sx: 4
        sy: 4
        extend: repeat
    - name: analyzeRange
      type: COMP:base
      role: isolated
      parameters:
        pageindex: 2
    connections:
    - from: moviein1
      to: transform1
      input_index: '0'
    topology:
      operator_count: 3
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: Analyze the maximum and minimum range of a TOP rgba channels.Note
      the Analyze TOPs' Analyze Channel parameter are set to RGBA Independent so the
      max / min are calculated separately for each channel.  The default Analyze Channel
      is set to Luminance, which finds the brightest pixel and uses the RGBA of that
      pixel.The nodes inside analyzeRange will not cook (consume cpu/gputime) if its
      viewer is turned off or you are in another network AND its output CHOP is not
      used.
- operator_type: antialiasTOP
  examples:
  - example_name: example1
    operators:
    - name: antialias1
      type: TOP:antialias
      role: output
    - name: antialias2
      type: TOP:antialias
      role: output
      parameters:
        outputedges: 'on'
    - name: rectangle1
      type: TOP:rectangle
      role: input
      parameters:
        pageindex: 1
        sizex: 0.7
        sizey: 0.7
        rotate: 45
        bgalpha: 1
        resolutionw: 32
        resolutionh: 32
        inputfiltertype: nearest
        filtertype: nearest
    connections:
    - from: rectangle1
      to: antialias1
      input_index: '0'
    - from: rectangle1
      to: antialias2
      input_index: '0'
    topology:
      operator_count: 3
      connection_count: 2
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: The Anti Alias TOP is used to smooth out rough edges on diagonal
      lines.It works by performing an edge detection (which can be manipulated by
      changing the Quality parameter to Custom) then it uses that information to blur
      the edges.
- operator_type: blobtrackTOP
  examples:
  - example_name: example1
    operators:
    - name: comp1
      type: TOP:comp
      role: processor
      parameters:
        operand: add
        legacyxform: 'on'
    - name: noise1
      type: CHOP:noise
      role: isolated
      parameters:
        period: 5
        amp: 0.5
        channelname: '"tx ty"'
        timeslice: 'on'
        exporttable: noise1_export
    - name: noise2
      type: CHOP:noise
      role: isolated
      parameters:
        seed: 2
        period: 5
        amp: 0.5
        channelname: '"tx ty"'
        timeslice: 'on'
        exporttable: noise1_export1
    - name: circle1
      type: TOP:circle
      role: input
      parameters:
        radiusx: 0.05
        radiusy: 0.05
        softnessoffset: 0.5
        softnesstype: hybridcubic
    - name: circle2
      type: TOP:circle
      role: input
      parameters:
        radiusx: 0.05
        radiusy: 0.05
        softnessoffset: 0.5
        softnesstype: hybridcubic
    - name: blobtrack2
      type: TOP:blobtrack
      role: output
      parameters:
        pageindex: 2
        callbacks: blobtrack2_callbacks
        minblobsize: 0.05
        maxblobsize: 0.15
    - name: noise1_export
      type: DAT:table
      role: isolated
    - name: noise1_export1
      type: DAT:table
      role: isolated
    - name: blobtrack2_blobs
      type: DAT:info
      role: isolated
      parameters:
        op: blobtrack2
    - name: blobtrack2_callbacks
      type: DAT:text
      role: isolated
    connections:
    - from: circle1
      to: comp1
      input_index: '0'
    - from: circle2
      to: comp1
      input_index: '1'
    - from: comp1
      to: blobtrack2
      input_index: '0'
    topology:
      operator_count: 10
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: The Blob Track TOP can be used to calculate positions of blobs in
      a texture.One practical use case would be to calculate touch point positions
      from an optically captured touch surface.The Info DAT is used to extract the
      values from the Blob Track TOP.For more information on the parameters please
      see the WIKI.
  - example_name: example2
    operators:
    - name: cam1
      type: COMP:cam
      role: isolated
      parameters:
        pageindex: 2
        tz: 5
        projection: ortho
        winrollpivot: legacy
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 2
        instancing: 'on'
        instanceop: math_v
        instancetx: u
        instancety: v
        instancerz: id
        material: ./constant1
    - name: res1
      type: TOP:res
      role: processor
      parameters:
        pageindex: 1
        outputresolution: quarter
        inputfiltertype: mipmap
    - name: info1
      type: CHOP:info
      role: input
      parameters:
        op: blobtrack1
        childcooktime: 'on'
    - name: info2
      type: DAT:info
      role: input
      parameters:
        op: blobtrack1
    - name: mono1
      type: TOP:mono
      role: processor
    - name: over1
      type: TOP:over
      role: output
      parameters:
        legacyxform: 'on'
    - name: datto1
      type: CHOP:datto
      role: input
      parameters:
        dat: transpose1
    - name: math_u
      type: CHOP:math
      role: processor
      parameters:
        pageindex: 2
        torange1: -1
        torange2: 1
        scope: u
    - name: math_v
      type: CHOP:math
      role: output
      parameters:
        pageindex: 2
        scope: v
    - name: noise1
      type: CHOP:noise
      role: isolated
      parameters:
        type: hermite
        rough: 0.25
        constraint: offset
        constrmean: 0.5
        end: 2
    - name: trail1
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: chopto1
      type: TOP:chopto
      role: input
      parameters:
        chop: noise1
        dataformat: legacy
    - name: delete1
      type: CHOP:delete
      role: processor
      parameters:
        delchannels: 'on'
        discard: nonscoped
        select: bynum
        selnumbers: 0-30
        legacypattern: 'on'
    - name: render1
      type: TOP:render
      role: input
      parameters:
        uvunwrapcoordattrib: uv
        resolutionw: 1280
        resolutionh: 720
    - name: select1
      type: DAT:select
      role: processor
      parameters:
        firstrow: 'on'
        extractrows: byindex
    - name: displace1
      type: TOP:displace
      role: processor
      parameters:
        vertsource: red
        displaceweighty: 0.1
        displaceweightz: 1
        extend: mirror
    - name: blobtrack1
      type: TOP:blobtrack
      role: processor
      parameters:
        callbacks: blobtrack1_callbacks
        minblobsize: 0.03
        maxblobsize: 0.218
        deletenearby: 'on'
    - name: lumalevel1
      type: TOP:lumalevel
      role: processor
      parameters:
        brightness1: 2
        gamma1: 7.94
    - name: transpose1
      type: DAT:transpose
      role: output
    - name: moviefilein1
      type: TOP:moviefilein
      role: input
      parameters:
        pageindex: 4
    - name: moviefilein2
      type: TOP:moviefilein
      role: isolated
      parameters:
        pageindex: 4
    - name: readMe_convert
      type: DAT:text
      role: isolated
      parameters:
        pageindex: 1
    - name: blobtrack1_blobs
      type: DAT:info
      role: isolated
      parameters:
        op: blobtrack1
    - name: blobtrack1_callbacks
      type: DAT:text
      role: isolated
    connections:
    - from: lumalevel1
      to: res1
      input_index: '0'
    - from: displace1
      to: mono1
      input_index: '0'
    - from: render1
      to: over1
      input_index: '0'
    - from: blobtrack1
      to: over1
      input_index: '1'
    - from: datto1
      to: math_u
      input_index: '0'
    - from: math_u
      to: math_v
      input_index: '0'
    - from: delete1
      to: trail1
      input_index: '0'
    - from: info1
      to: delete1
      input_index: '0'
    - from: info2
      to: select1
      input_index: '0'
    - from: moviefilein1
      to: displace1
      input_index: '0'
    - from: chopto1
      to: displace1
      input_index: '1'
    - from: res1
      to: blobtrack1
      input_index: '0'
    - from: mono1
      to: lumalevel1
      input_index: '0'
    - from: select1
      to: transpose1
      input_index: '0'
    topology:
      operator_count: 25
      connection_count: 14
      has_parallel_paths: false
      max_chain_length: 7
    curator_text: 'Here you can see the behavior and limits of the blob tracker. The
      Resolution TOP scales to quarter-resolution in X and Y so the Blob Track TOP
      has 1/16 the number of pixels to go through.The Monochrome TOP does nothing
      practical as Blob Track is converting it to monochrome anyway.Bob Track does
      best with maximum-contrast images: Bypass the Luma Level to see.If you drop
      Minimum Move Distance down too much, it will think all blobs are new each frame,
      so the "id" channel will rise quickly for what seems like the same blob.It''s
      using square areas, so it is not sensitive to odd shapes or optimized for circular
      shapes.triangles are rotated based on blob id.'
  - example_name: example3
    operators:
    - name: blur1
      type: TOP:blur
      role: processor
      parameters:
        size: 10
    - name: null1
      type: CHOP:null
      role: output
      parameters:
        exporttable: null1_export
    - name: null2
      type: TOP:null
      role: output
    - name: noise1
      type: CHOP:noise
      role: input
      parameters:
        period: 30
        channelname: '"chan1 chan2"'
        timeslice: 'on'
    - name: circle1
      type: TOP:circle
      role: processor
      parameters:
        radiusx: 0.2
        radiusy: 0.2
    - name: select1
      type: DAT:select
      role: output
      parameters:
        firstrow: 'on'
        extractrows: bynames
        rownames: 43
    - name: thresh1
      type: TOP:thresh
      role: output
      parameters:
        threshold: 0.259
        soften: 0.264
    - name: comment1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: lostBlobs
      type: COMP:base
      role: isolated
    - name: blobtrack1
      type: TOP:blobtrack
      role: processor
      parameters:
        pageindex: 2
        callbacks: blobtrack1_callbacks
        deletenearby: 'on'
        deleteoverlap: 'on'
        revivetime: 2
        includelost: 'on'
        includeexpired: 'on'
    - name: lumalevel1
      type: TOP:lumalevel
      role: processor
      parameters:
        gamma1: 1.34
    - name: transform1
      type: TOP:transform
      role: processor
    - name: transform2
      type: TOP:transform
      role: processor
      parameters:
        tx: 0.39
        ty: -0.023
        sx: 1.9
        sy: 1.9
    - name: moviefilein1
      type: TOP:moviefilein
      role: input
      parameters:
        pageindex: 4
    - name: null1_export
      type: DAT:table
      role: isolated
    - name: blobtrack1_blobs
      type: DAT:info
      role: input
      parameters:
        op: blobtrack1
    - name: blobtrack1_callbacks
      type: DAT:text
      role: isolated
    connections:
    - from: moviefilein1
      to: blur1
      input_index: '0'
    - from: noise1
      to: null1
      input_index: '0'
    - from: blobtrack1
      to: null2
      input_index: '0'
    - from: transform1
      to: circle1
      input_index: '0'
    - from: blobtrack1_blobs
      to: select1
      input_index: '0'
    - from: blobtrack1
      to: thresh1
      input_index: '0'
    - from: lumalevel1
      to: blobtrack1
      input_index: '0'
    - from: circle1
      to: lumalevel1
      input_index: '0'
    - from: transform2
      to: transform1
      input_index: '0'
    - from: blur1
      to: transform2
      input_index: '0'
    topology:
      operator_count: 17
      connection_count: 10
      has_parallel_paths: true
      max_chain_length: 8
    curator_text: This uses the new time counters in the blob table that it outputs,
      and in the new callbacks.This handles blobs that come and go from visibility.
      Look at blobtrack1_blobs.Blobs can be lost for some amount of time and then
      revived, but after the Revive Time, they are expired forever.You can keep the
      blobs in the table for some time after they are expired.The lost_time timer
      and expired_time lets you do things with the blob while it is lost or expired.Also
      the callbacks are for state changes in the blobs, or just a list of the current
      blobs.
- operator_type: bloomTOP
  examples:
  - example_name: example1
    operators:
    - name: bloom1
      type: TOP:bloom
      role: processor
      parameters:
        bloomthreshold: -0.03
    - name: comment1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: reorder1
      type: TOP:reorder
      role: output
      parameters:
        outputalphachan: one
    - name: reorder2
      type: TOP:reorder
      role: output
      parameters:
        outputalphachan: one
    - name: reorder3
      type: TOP:reorder
      role: output
      parameters:
        outputalphachan: one
    - name: bloomC_wide
      type: TOP:bloom
      role: processor
      parameters:
        preblacklevel: 0.808
        pregamma: 1.94
        prebrightness: 1.34
        minbloomradius: 0.477
        bloomthreshold: -0.0146
        bloomfill: 0.762
        bloomintensity: 1.25
    - name: bloomC_tight
      type: TOP:bloom
      role: processor
      parameters:
        preblacklevel: 0.808
        pregamma: 1.94
        prebrightness: 1.34
        minbloomradius: 0.244
        maxbloomradius: 0.565
        bloomthreshold: 0.0061
        bloomfill: 0.754
        bloomintensity: 1.37
    - name: moviefileinA
      type: TOP:moviefilein
      role: input
    - name: moviefileinB
      type: TOP:moviefilein
      role: input
    - name: moviefileinC
      type: TOP:moviefilein
      role: input
    - name: moviefileinD
      type: TOP:moviefilein
      role: input
    - name: blooD_variant1
      type: TOP:bloom
      role: output
      parameters:
        minbloomradius: 0.58
        bloomintensity: 1.18
    - name: bloomA_default
      type: TOP:bloom
      role: output
    - name: bloomB_default
      type: TOP:bloom
      role: output
      parameters:
        bloomintensity: 1.7
    - name: bloomIntensity
      type: TOP:bloom
      role: output
    - name: bloomA_overload
      type: TOP:bloom
      role: output
      parameters:
        minbloomradius: 0.368
        maxbloomradius: 0.642
        bloomscurve: 0.487
        bloomfill: 0.842
        bloomintensity: 0.81
    - name: bloomD_variant2
      type: TOP:bloom
      role: output
      parameters:
        maxbloomradius: 0.446
        bloomthreshold: 0.005
