        op: rgbdivalpha
        format: rgba32float
    - name: inside_looks_ok_after_premultiplying
      type: TOP:inside
      role: output
      parameters:
        legacyxform: 'on'
    - name: math_unpremultiply_without_treatment
      type: TOP:math
      role: output
      parameters:
        op: rgbdivalpha
        format: rgba32float
    connections:
    - from: moviein1
      to: inside2
      input_index: '0'
    - from: reorder_r_to_alpha
      to: inside2
      input_index: '1'
    - from: level_strip_out_low_alpha
      to: reorder_r_to_alpha
      input_index: '0'
    - from: moviein1
      to: reorder_alpha_to_rgb
      input_index: '0'
    - from: reorder_alpha_to_rgb
      to: level_strip_out_low_alpha
      input_index: '0'
    - from: inside2
      to: math_unpremultiply_with_treatment
      input_index: '0'
    - from: math_unpremultiply_with_treatment
      to: inside_looks_ok_after_premultiplying
      input_index: '0'
    - from: math_unpremultiply_with_treatment
      to: inside_looks_ok_after_premultiplying
      input_index: '1'
    - from: moviein1
      to: math_unpremultiply_without_treatment
      input_index: '0'
    topology:
      operator_count: 8
      connection_count: 9
      has_parallel_paths: true
      max_chain_length: 7
    curator_text: The Math TOP can help turn images that  have their RGB pre-multiplied
      by alpha into an image that does not have the RGB pre-multiplied by alpha. Essentially
      it divides the RGB by alpha, but it needs to take care of the case where RGB
      and alpha are very small as divide and round-off errors will give imprecise
      results.Level helps strip out pixels that have alpha < .04.
  - example_name: example2
    operators:
    - name: math1
      type: TOP:math
      role: output
      parameters:
        pageindex: 2
        fromrange1: 5
        fromrange2: 6
        torangeg1: 0.3
        torangeg2: 0.7
        filtertype: nearest
    - name: null1
      type: TOP:null
      role: output
    - name: noise1
      type: TOP:noise
      role: input
      parameters:
        pageindex: 3
        type: random
        offset: 5.5
        resolutionw: 40
        resolutionh: 40
        format: rgba32float
    - name: topto1
      type: CHOP:topto
      role: isolated
      parameters:
        top: analyze1
        exportmethod: datname
    - name: topto2
      type: CHOP:topto
      role: isolated
      parameters:
        top: analyze2
        exportmethod: datname
    - name: analyze1
      type: TOP:analyze
      role: output
      parameters:
        op: maximum
    - name: analyze2
      type: TOP:analyze
      role: output
      parameters:
        op: minimum
    connections:
    - from: noise1
      to: math1
      input_index: '0'
    - from: noise1
      to: null1
      input_index: '0'
    - from: noise1
      to: analyze1
      input_index: '0'
