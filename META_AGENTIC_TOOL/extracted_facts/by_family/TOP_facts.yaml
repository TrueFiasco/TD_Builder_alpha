      role: output
      parameters:
        op: minimum
    - name: ramp6_keys
      type: DAT:table
      role: isolated
    - name: transform_to_8bit
      type: TOP:transform
      role: processor
      parameters:
        pageindex: 2
        limittiles: 'on'
        format: rgba8fixed
    - name: ramp_floating_point
      type: TOP:ramp
      role: input
      parameters:
        pageindex: 1
        dat: ramp6_keys
        type: vertical
        format: rgba16float
    - name: chanmix_subtract_white1
      type: TOP:chanmix
      role: processor
      parameters:
        constant1: -1
        constant2: -1
        constant3: -1
    - name: chanmix_subtract_white2
      type: TOP:chanmix
      role: processor
      parameters:
        pageindex: 1
        constant1: -1
        constant2: -1
        constant3: -1
    - name: chanmix_subtract_all_colors2
      type: TOP:chanmix
      role: output
      parameters:
        constant1: 1
        constant2: 1
        constant3: 1
    - name: chanmix_subtract_all_colors4
      type: TOP:chanmix
      role: output
      parameters:
        constant1: 1
        constant2: 1
        constant3: 1
    connections:
    - from: chanmix_subtract_white1
      to: null1
      input_index: '0'
    - from: chanmix_subtract_white2
      to: null2
      input_index: '0'
    - from: chanmix_subtract_white2
      to: analyze1
      input_index: '0'
    - from: chanmix_subtract_white1
      to: analyze2
      input_index: '0'
    - from: ramp_floating_point
      to: transform_to_8bit
      input_index: '0'
    - from: ramp_floating_point
      to: chanmix_subtract_white1
      input_index: '0'
    - from: transform_to_8bit
      to: chanmix_subtract_white2
      input_index: '0'
    - from: chanmix_subtract_white1
      to: chanmix_subtract_all_colors2
      input_index: '0'
    - from: chanmix_subtract_white2
      to: chanmix_subtract_all_colors4
      input_index: '0'
    topology:
      operator_count: 13
      connection_count: 9
      has_parallel_paths: true
      max_chain_length: 4
    curator_text: This time the ramp is created as  floating point pixels, as you
      see on the Common page.That means pixels can go below zero, though they will
      look black when displayed on a monitor, as you see in chanmix_subtract_white1.But
      when you add white back in, you get the original colors back, since they are
      in the range 0 to 1 again.If it's done as 8-bit, then chanmix_subtract_white2
      clamps at 0 and adding white gives white.The Analyze TOP and TOP to CHOP show
      the minimum values in a pixel, which are below 0 in the 16-bit floating point
      image.
  - example_name: example7
    operators:
    - name: null1
      type: TOP:null
      role: output
    - name: moviein1
      type: TOP:moviefilein
      role: input
    - name: chanmix_over_constant
      type: TOP:chanmix
      role: processor
      parameters:
        constant4: 1
    connections:
    - from: chanmix_over_constant
      to: null1
      input_index: '0'
    - from: moviein1
      to: chanmix_over_constant
      input_index: '0'
    topology:
      operator_count: 3
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: Here we force alpha to be 1 by adding 1 to the alpha channel.
