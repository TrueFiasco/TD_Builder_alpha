      input_index: '0'
    - from: noise1
      to: transform2
      input_index: '0'
    - from: transform1
      to: fastrandom1
      input_index: '0'
    - from: transform2
      to: fastrandom2
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: Shifts a random pattern around to give an apparent randomness every
      frame. Not perfect but may be good enough for many purposes. Much faster than
      generating perfectly random pixels every frame.Second example randomly rotates
      also, making it more scrambled though some adjacent pixels may have similar
      values.
