      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: This simply averages the last 4 frames, like a multi-exposure.Try
      Composite TOP Operations Maximum.This can be made more controllable by adding
      Level TOPs after each Cache Select TOP and adjust their relative Brightness
      (like .5, .33, .25, .2), then Add-ing them in comp1. This would make the most
      recent frame more visible.
  - example_name: example6
    operators:
    - name: cam1
      type: COMP:cam
      role: isolated
      parameters:
        pageindex: 2
        tz: 5.00633
        pz: -10.0127
        orthowidth: 1.62816
        aperture: 44.1
        far: 3467570.0
    - name: geo1
      type: COMP:geo
      role: isolated
    - name: lfo2
      type: CHOP:lfo
      role: isolated
      parameters:
        frequency: 0.23
        timeslice: 'on'
    - name: sub1
      type: TOP:sub
      role: output
      parameters:
        legacyxform: 'on'
    - name: cache2
