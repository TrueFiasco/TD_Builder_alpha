    - name: render1
      type: TOP:render
      role: isolated
      parameters:
        uvunwrapcoordattrib: uv
        resolutionw: 1280
        resolutionh: 720
    connections:
    - from: depth1
      to: sub1
      input_index: '0'
    - from: cache2
      to: sub1
      input_index: '1'
    - from: depth1
      to: cache2
      input_index: '0'
    topology:
      operator_count: 8
      connection_count: 3
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: work-in-progress. pixel > 0 if surface is coming toward camera.
- operator_type: channelmixTOP
  examples:
  - example_name: example1
    operators:
    - name: ramp5
      type: TOP:ramp
      role: input
      parameters:
        dat: ramp5_keys
        type: vertical
    - name: ramp5_keys
      type: DAT:table
      role: isolated
    - name: chanmix_all_red1
      type: TOP:chanmix
      role: output
      parameters:
        red2: 1
        red3: 1
        green1: 1
        green3: 1
        blue1: 1
        blue2: 1
        constant1: 0.1
    connections:
    - from: ramp5
      to: chanmix_all_red1
      input_index: '0'
    topology:
      operator_count: 3
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: R = G + B G = R + B B = R + G
  - example_name: example2
    operators:
    - name: ramp1
      type: TOP:ramp
      role: input
      parameters:
        dat: ramp1_keys
        type: vertical
    - name: ramp1_keys
      type: DAT:table
      role: isolated
    - name: chanmix_allRed
      type: TOP:chanmix
      role: output
      parameters:
        red1: 1
        red2: 1
        red3: 1
    - name: chanmix_allRed1
      type: TOP:chanmix
      role: output
      parameters:
        red1: 0.333
        red2: 0.333
        red3: 0.333
    connections:
    - from: ramp1
      to: chanmix_allRed
      input_index: '0'
    - from: ramp1
      to: chanmix_allRed1
      input_index: '0'
    topology:
      operator_count: 4
      connection_count: 2
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: This example adds all the incoming RGB channels into the Red channel,
      (clanping at a sum of 1 if the pixels are 0-1 value, i.e. not floating point
      numbers that go beow 0 or above 1.)Since the green strip is low-brightness,
      there is a dark strip in the output.chanmix_allRed1 assures all color does not
      clamp at 1.
  - example_name: example3
    operators:
    - name: ramp2
      type: TOP:ramp
      role: input
      parameters:
        dat: ramp2_keys
        type: vertical
    - name: ramp2_keys
      type: DAT:table
      role: isolated
    - name: moviefilein1
      type: TOP:moviefilein
      role: isolated
