- operator_type: depthTOP
  examples:
  - example_name: example1
    operators:
    - name: box1
      type: SOP:box
      role: isolated
      parameters:
        reverseanchors: 'on'
    - name: cam1
      type: COMP:cam
      role: isolated
      parameters:
        pageindex: 2
        tz: 5
        near: 4
        far: 11
        winrollpivot: legacy
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        tx: 1
        tz: -2
        material: phong1
    - name: geo2
      type: COMP:geo
      role: isolated
      parameters:
        material: phong1
    - name: geo3
      type: COMP:geo
      role: isolated
      parameters:
        tx: -2
        tz: -5
        material: phong1
    - name: depth1
      type: TOP:depth
      role: input
      parameters:
        op: render1
    - name: light1
      type: COMP:light
      role: isolated
      parameters:
        tz: 10
    - name: phong1
      type: MAT:phong
      role: isolated
      parameters:
        legacyalphabehavior: 'on'
    - name: render1
      type: TOP:render
      role: input
      parameters:
        uvunwrapcoordattrib: uv
        resolutionw: 1280
        resolutionh: 720
    - name: lumablur1
      type: TOP:lumablur
      role: output
      parameters:
        blackvalue: 0.353
        whitewidth: 38
    - name: DepthOfField
      type: DAT:text
      role: isolated
      parameters:
        pageindex: 1
    - name: moviefilein1
      type: TOP:moviefilein
      role: isolated
    connections:
    - from: render1
      to: lumablur1
      input_index: '0'
    - from: depth1
      to: lumablur1
      input_index: '1'
    topology:
      operator_count: 12
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The Depth TOP reads an image containing depth information from a
      scene described in a specified Render TOP. The resulting image is black (0)
      at pixels where the surface is at the near depth value (Camera's parameter "Near").
      It is white (1) at pixels where the surface is at the far depth value (parameter
      "Far").The Depth TOP is used to do shadow mapping. It can have many other uses
      also, such as edge detection based on depth.The depth range is by definition
      the near plane -> far plane. Values in the Depth TOP will be 0 at the near plane,
      and 1 at the far plane. Generally the image in the Depth TOP will be white,
      unless you have your planes really tight around your object. But just because
      you can't visually see anything, it doesn't mean the information isn't there.Another
      option is Linear Camera-Space Depth. If the Render TOP's Depth Buffer Format
      is set to 32-Bit Floating-Point and its Linear Camera-Space Depth parameter
      is on, then the Depth TOP will output linear camera space depth.You can use
      the Level TOP to re-range the Depth TOP's values. However make sure you set
      the Pixel Format of the Level TOP to 16 or 32-bit, or you'll lose a lot of information
      from the Depth TOP's data (The Depth TOP has 24-bit data).The Depth TOP creates
      a 24-bit fixed-point or 32-bit floating-point single channel image. When the
      Depth TOP is used as an input to another TOP, its data will be treated like
      an RGBA value of (D, D, D, 1). The same is true when sampling a depth texture
      in a GLSL shader.
- operator_type: differenceTOP
  examples:
  - example_name: example1
    operators:
