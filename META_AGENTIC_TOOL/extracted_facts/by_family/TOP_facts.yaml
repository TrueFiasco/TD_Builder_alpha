    curator_text: Click/drag blendModeIndex. Ramp TOP and several other generators
      can composite itself with its input using the full set of Composite TOP's blend
      modes. This lets you flip through all the choices when using a simple black
      to yellow ramp.Look at the Operation parameter of the Ramp TOPs as you move
      the slider.
  - example_name: example8
