      input_index: '0'
    topology:
      operator_count: 21
      connection_count: 11
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: When high quality gain is ON, brightness gain happens in a separate
      pass, *before* mip levels are generated. If you have large, bright blobs in
      your image, you will get roughly the same bloom effect. If high quality gain
      is OFF, the brightness gain is applied *after* mip levels are generated, which
      can have the effect of suppressed bloom originating from small, bright blobs.In
      general, if you can afford the small performance cost of applying gain in a
      separate pass, you should use the high quality gain.
  - example_name: example3
    operators:
    - name: add1
      type: TOP:add
      role: output
    - name: comp1
      type: TOP:comp
      role: output
      parameters:
        operand: screen
    - name: ramp1
