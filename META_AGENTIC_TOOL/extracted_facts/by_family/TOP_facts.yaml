    - name: topto_ramp1
      type: CHOP:topto
      role: isolated
      parameters:
        top: ramp1
        g: '""'
        b: '""'
        a: '""'
        exportmethod: datname
    - name: topto_ramp3
      type: CHOP:topto
      role: isolated
      parameters:
        top: ramp3_32bit
        g: '""'
