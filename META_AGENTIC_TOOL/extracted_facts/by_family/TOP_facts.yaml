    curator_text: hsvrgb1 treats its input as the hue being in the red channel, saturation
      in the green channel, and value in the blue channel.In this case, hue is a ramp
      from 0 to 1 giving hte full rainbow spectrum. In TouchDesigner, a hue of value
      0 is red, .33 is green, .66 is blue and 1 is red again.HSV to RGB to interpret
      those three channels as HSV and convert the image to RGB.Saturation and value
      are full (1).null1 is just a different way to view the red, green and blue channels
      of ramp1 separately. rclick on the null1 viewer to see it set to Normalied Split.
