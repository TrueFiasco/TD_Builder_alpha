    curator_text: The Pre-Shrink and Filter size control the amount and quality of
      the blur.  Pre-shrink of 2 or 4 etc will first reduce the image resolution,
      then the blur is appled to the smaller image, and then it is scaled up. This
      is less accurate but much faster.
