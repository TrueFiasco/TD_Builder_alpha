        resolutionh: 100
    - name: popto_use_pop_dimension_3d_texture
      type: TOP:popto
      role: isolated
      parameters:
        pageindex: 1
        pop: copy1
        layout: popdim
        outputresolution: custom
        resolutionw: 100
        resolutionh: 100
        filtertype: nearest
    connections:
    - from: torus1
      to: copy1
      input_index: '0'
    - from: copy1
      to: analyze_dimensions
      input_index: '0'
    - from: popto_use_pop_dimension
      to: null_view_separate_channels
      input_index: '0'
    - from: popto_fit_to_square
      to: null_display_separate_ranges
      input_index: '0'
    topology:
      operator_count: 14
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: Fit to Square guarantees every point gets a pixel.You can convert
      any attribute combination into the 4 channels.You can put all points into one
      row of teh texture up to the hardware limit (32,768 commonly)You can specify
      a resolution and let it fill the pixels up, one point per pixel, wrpping around
      when it gets to the end of a row.Now middle click on torus and copy to see the
      dimensions. or look at popto_dimensions.The two POP to TOPs at teh bottom use
      the dimensions to build the texture, which is the most convenient.
  - example_name: example2
    operators:
    - name: ray1
      type: POP:ray
      role: output
      parameters:
        inside: 'on'
        scale: 0.4
    - name: grid1
      type: POP:grid
      role: input
      parameters:
        surftype: points
        sizex: 5
        sizey: 5
        sizez: 5
        cols: 60
        rows: 60
        slices: 60
        randomx: 0.99
        randomy: 0.99
        randomz: 0.99
    - name: field1
      type: POP:field
      role: output
      parameters:
        mode: capsule
        radx: 1.34
        rady: 0.74
        radz: 0.74
        pointax: -1
        pointay: -1
        pointaz: -1
        transitionrange: 0.922
        transitionalign: 0.182
    - name: popto1
      type: TOP:popto
      role: isolated
      parameters:
        pop: field1
        rgbamode: custom
        attribscope: Weight
        layout: popdim
    - name: popto2
      type: TOP:popto
      role: isolated
      parameters:
        pop: ray1
        rgbamode: custom
        attribscope: RayInside
        layout: popdim
    - name: popto3
      type: TOP:popto
      role: isolated
      parameters:
        pop: normalize1
        rgbamode: custom
        attribscope: Color
        layout: popdim
    - name: torus1
      type: POP:torus
      role: input
      parameters:
        radx: 1.6
        rady: 0.6
        rx: 30
        ry: -60
    - name: comment1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: annotate1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        includeinorder: 'on'
    - name: popViewer
      type: COMP:container
      role: isolated
      parameters:
        pageindex: 7
        w: 1280
        h: 720
        topsmoothness: usetop
        ext0object: op('./ViewerExt').module.ViewerExt(me)
        ext0name: ViewerExt
        ext0promote: 'on'
        ext1object: '""'
        ext1name: '""'
        iop1shortcut: '""'
        iop1op: '""'
    - name: normalize1
      type: POP:normalize
      role: output
      parameters:
        mode0: radiusxyz
        mode1: latitudey
        mode2: longitudey
        lookupcurve0: sin
        lookupcurve1: sin
        lookupcurve2: sin
        outputattrscope: Color.i012
    - name: popViewer1
      type: COMP:container
      role: isolated
      parameters:
        pageindex: 7
        w: 1280
        h: 720
        topsmoothness: usetop
        ext0object: op('./ViewerExt').module.ViewerExt(me)
        ext0name: ViewerExt
        ext0promote: 'on'
        ext1object: '""'
        ext1name: '""'
        iop1shortcut: '""'
