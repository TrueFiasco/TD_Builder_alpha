    topology:
      operator_count: 20
      connection_count: 12
      has_parallel_paths: true
      max_chain_length: 5
    curator_text: 'To create a 3D texture, you need to fill the Texture 3D TOP with
      a sequence of 2D images, in this case 6 of them.To create the 3D teture: You
      "pre-fill" tex3d1 by turning on Pre Fill or pulsing Pre Fill. The TOP automatically
      goes to frame 1 on the timeline, cooks the image that feeds into the tex3d1
      TOP, tex3d1 captures it as it first slice, then it goes to frame 2 and cooks
      the image again, until all 6 images are cooked. Cache size here is 6.So the
      way to make all the images different is to put "me.time.frame" in the the Switch
      TOP that feed into tex3d1.You can leave Pre-Fill on, it will cook once after
      you start your .toe file, or you can click the Pulse button to cook it when
      you change OPs in your network feeding into the CHOP.tex3d1 is used in the material
      for the Geometry COMP''s instancing. The Geometry COMP''s W parameter refers
      to the w channel of "instancer", which contains the slice number in the w channel,
      going from 0 to 5.'
  - example_name: example2
    operators:
    - name: level1
      type: TOP:level
      role: processor
      parameters:
        pageindex: 2
        clampinput: clamp
    - name: tex3d1
      type: TOP:tex3d
      role: output
      parameters:
        type: texture2darray
        prefill: 'on'
    - name: tex3d2
      type: TOP:tex3d
      role: output
      parameters:
        prefill: 'on'
    - name: hsvadj1
      type: TOP:hsvadj
      role: processor
    - name: moviefilein1
      type: TOP:moviefilein
      role: input
      parameters:
        playmode: specify
        outputresolution: quarter
    connections:
    - from: moviefilein1
      to: level1
      input_index: '0'
    - from: hsvadj1
      to: tex3d1
      input_index: '0'
    - from: hsvadj1
      to: tex3d2
      input_index: '0'
    - from: level1
      to: hsvadj1
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 4
    curator_text: To create a 3D texture, you need to fill it with a sequence of 2D
      images, in this case 32 of them.The way it's done now is to imagine it's building
      the 32 images by going to frame 1 on the timeline,cooking the image that feeds
      into the tex3d1 TOP, then going to frame 2 and cooking the image again,until
      all 32 images are cooked.So the way to make all the images different is to put
      "me.time.frame" in the OPs that feed into tex3d1.In this case, moviefilein1
      has me.time.frame in the Index parameter to get the first image of the movie
      ontimeline frame 1. That parameter's index units is set to "I" (index), in case
      the movie has a different frames per second (such as 25 images per second) than
      the timeline.  So frame 23 is always going to be image 22 of the file (where
      index starts at 0, frame starts at 1).  In this way, no images are missed or
      duplicated in the 3D teture.The HSV Adjust TOP also has an expression involving
      me.time.frame, where it goes through the full color wheel in 32 steps.You can
      leave Pre-Fill on, it will cook once after you start your .toe file, or you
      can click the Pulse button to cook it when you change OPs in your network feeding
      into the CHOP.
