    - name: comment1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: moviein2
      type: TOP:moviefilein
      role: input
    - name: transform2
      type: TOP:transform
      role: processor
      parameters:
        limittiles: 'on'
    - name: moviefileout1
