    - name: info1_export
      type: DAT:table
      role: isolated
    - name: moviefilein1
      type: TOP:moviefilein
      role: input
    connections:
    - from: ramp1
      to: add1
      input_index: '0'
    - from: ramp2
      to: add1
      input_index: '1'
    - from: moviefilein1
      to: res1
      input_index: '0'
    - from: res1
      to: null2
      input_index: '0'
    - from: transform1
      to: null3
      input_index: '0'
    - from: null2
      to: remap1
      input_index: '0'
    - from: transform1
      to: remap1
      input_index: '1'
    - from: transform1
      to: inspect
      input_index: '0'
    - from: ramp1
      to: reorder2
      input_index: '0'
    - from: ramp2
      to: reorder2
      input_index: '1'
    - from: reorder2
      to: transform1
      input_index: '0'
    topology:
      operator_count: 17
      connection_count: 11
      has_parallel_paths: true
      max_chain_length: 4
    curator_text: For each pixel in the second input, it uses the value in the red
      channel as the u (horizontal, 0 being left-most) coordinate, and the value in
      the green channel as the v (vertial) coordinate to fetch a pixel from the first
      input.Remap TOP ramps are 32-bit floats to get enough precision to index pixels
      of the 1280x720 input.prepared by David Braun & GH
  - example_name: example2
    operators:
    - name: add1
      type: TOP:add
      role: output
      parameters:
        legacyxform: 'on'
    - name: res1
      type: TOP:res
      role: processor
      parameters:
        pageindex: 1
        highqualresize: 'on'
        outputresolution: 2x
    - name: comp1
      type: TOP:comp
      role: processor
      parameters:
        pageindex: 2
        operand: divide
        filtertype: nearest
    - name: info1
      type: CHOP:info
      role: isolated
      parameters:
        op: null2
        iscope: res*
        childcooktime: 'on'
        exporttable: info1_export
    - name: null1
      type: TOP:null
      role: output
    - name: null2
      type: TOP:null
      role: processor
    - name: null3
      type: TOP:null
      role: output
    - name: ramp1
      type: TOP:ramp
      role: input
      parameters:
        pageindex: 2
        dat: ramp1_keys
        format: rgba32float
    - name: ramp2
      type: TOP:ramp
      role: input
      parameters:
        dat: ramp2_keys
        type: vertical
        extendright: repeat
        format: rgba32float
    - name: level1
      type: TOP:level
      role: output
      parameters:
        pageindex: 2
        lowa: 1
    - name: remap1
      type: TOP:remap
      role: processor
      parameters:
        resolutionsource: input2
        depthressource: input2
    - name: topto1
      type: CHOP:topto
      role: isolated
      parameters:
        pageindex: 1
        top: ramp2
        crop: col
        exportmethod: datname
    - name: inside1
      type: TOP:inside
      role: processor
    - name: inspect
      type: TOP:crop
      role: output
      parameters:
        pageindex: 1
        cropleft: 0.526
        cropright: 0.622
        cropbottom: 0.653
        croptop: 0.918
        filtertype: nearest
    - name: reorder1
      type: TOP:reorder
      role: processor
      parameters:
        outputredchan: alpha
        outputgreenchan: alpha
        outputbluechan: alpha
        outputalphachan: one
    - name: reorder2
      type: TOP:reorder
      role: processor
      parameters:
        outputgreen: input2
        outputalphachan: one
    - name: annotate1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        includeinorder: 'on'
    - name: ramp1_keys
      type: DAT:table
      role: isolated
    - name: ramp2_keys
      type: DAT:table
      role: isolated
    - name: transform1
      type: TOP:transform
      role: processor
      parameters:
        pageindex: 1
        sx: 0.5
        sy: 0.5
        limittiles: 'on'
        inputfiltertype: mipmap
    - name: info1_export
      type: DAT:table
      role: isolated
    - name: moviefilein1
      type: TOP:moviefilein
      role: input
    connections:
    - from: ramp1
      to: add1
      input_index: '0'
    - from: ramp2
      to: add1
      input_index: '1'
    - from: moviefilein1
      to: res1
      input_index: '0'
    - from: transform1
      to: comp1
      input_index: '0'
    - from: reorder1
      to: comp1
      input_index: '1'
    - from: inside1
      to: null1
      input_index: '0'
    - from: res1
      to: null2
      input_index: '0'
    - from: transform1
      to: null3
      input_index: '0'
    - from: inside1
      to: level1
      input_index: '0'
    - from: null2
      to: remap1
      input_index: '0'
    - from: comp1
      to: remap1
      input_index: '1'
    - from: remap1
      to: inside1
      input_index: '0'
    - from: transform1
      to: inside1
      input_index: '1'
    - from: transform1
      to: inspect
      input_index: '0'
    - from: transform1
      to: reorder1
      input_index: '0'
    - from: ramp1
      to: reorder2
      input_index: '0'
    - from: ramp2
      to: reorder2
      input_index: '1'
    - from: reorder2
      to: transform1
      input_index: '0'
    topology:
      operator_count: 22
      connection_count: 18
      has_parallel_paths: true
      max_chain_length: 8
    curator_text: With some source ramps you get or make, you may notice undesired
      sparkles around the edge of remap1. This is because the transform1 image is
      created anti-aliased with Input Smoothness set to Interpolate Pixels, so the
      values of red and green around the edge are reduced, which will make the sampling
      occur not around the edges of null1 but somewhere in the middle of null1.To
      improve this, change Input Smoothness to Nearest Pixel on transform1, or if
      you have no control of the input image, use reorder1 and comp1 to restore the
      RG around the edges by dividing by the alpha, preferably all at 16 bit fixed
      or 32 bit float resolutions.
  - example_name: example3
    operators:
    - name: math1
      type: TOP:math
      role: processor
      parameters:
        pageindex: 3
        preoff: 1.7
    - name: null1
      type: TOP:null
      role: output
    - name: ramp3
      type: TOP:ramp
      role: input
      parameters:
        pageindex: 2
        dat: ramp3_keys
        resolutionw: 100
        resolutionh: 256
        format: rgba32float
    - name: ramp4
      type: TOP:ramp
      role: processor
      parameters:
        dat: ramp4_keys
        type: vertical
        operand: add
    - name: remap2
      type: TOP:remap
      role: processor
      parameters:
        pageindex: 1
        resolutionsource: input2
        depthressource: input2
    - name: null_info
      type: TOP:null
      role: output
    - name: null_info1
      type: TOP:null
      role: output
    - name: ramp3_keys
      type: DAT:table
      role: isolated
    - name: ramp4_keys
      type: DAT:table
      role: isolated
    - name: moviefilein2
      type: TOP:moviefilein
      role: input
    connections:
    - from: ramp4
      to: math1
      input_index: '0'
    - from: remap2
      to: null1
      input_index: '0'
    - from: ramp3
      to: ramp4
      input_index: '0'
    - from: moviefilein2
      to: remap2
      input_index: '0'
    - from: math1
      to: remap2
      input_index: '1'
    - from: math1
      to: null_info
      input_index: '0'
    - from: ramp4
      to: null_info1
      input_index: '0'
    topology:
      operator_count: 10
      connection_count: 7
      has_parallel_paths: true
      max_chain_length: 5
    curator_text: resolution from second input.   Start with a red ramp in X, add
      a green ramp in Y.
- operator_type: renderpassTOP
  examples:
  - example_name: example1
    operators:
    - name: cam1
      type: COMP:cam
      role: isolated
      parameters:
        tz: 5
        winrollpivot: legacy
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        rx: 28
    - name: geo2
      type: COMP:geo
      role: isolated
      parameters:
        rx: 28
        sx: 0.6
        sy: 0.6
        sz: 0.6
    - name: light1
      type: COMP:light
      role: isolated
      parameters:
        tz: 10
    - name: render1
      type: TOP:render
      role: input
      parameters:
        geometry: geo1
        uvunwrapcoordattrib: uv
        allowbufblending: 'on'
        resolutionw: 1280
        resolutionh: 720
    - name: render2
      type: TOP:render
      role: input
      parameters:
        geometry: geo1
        uvunwrapcoordattrib: uv
        allowbufblending: 'on'
        resolutionw: 1280
        resolutionh: 720
    - name: render3
      type: TOP:render
      role: input
      parameters:
        geometry: geo1
        uvunwrapcoordattrib: uv
        allowbufblending: 'on'
        resolutionw: 1280
        resolutionh: 720
    - name: clearColorBuffer
      type: TOP:renderpass
      role: output
      parameters:
        geometry: geo2
        cleardepth: 'on'
    - name: clearDepthBuffer
      type: TOP:renderpass
      role: output
      parameters:
        geometry: geo2
        cleardepth: 'on'
    - name: preserveDepthBuffer
      type: TOP:renderpass
      role: output
      parameters:
        geometry: geo2
    connections:
    - from: render3
      to: clearColorBuffer
      input_index: '0'
    - from: render2
      to: clearDepthBuffer
      input_index: '0'
    - from: render1
      to: preserveDepthBuffer
      input_index: '0'
    topology:
      operator_count: 10
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The Render Pass TOP can be used to render additional geometry into
      the same buffer. You can optionally turn on clearing the depth or color buffers
      depending on if you want to add more geometry to the existing scene taking depth
      into account, render the geometry ontop of the existing scene as an overlay,
      or simply rendering a new scene and clearing the old scene.
- operator_type: renderselectTOP
  examples:
  - example_name: example1
    operators:
    - name: cam1
      type: COMP:cam
      role: isolated
      parameters:
        tz: 5
    - name: cam2
      type: COMP:cam
      role: isolated
      parameters:
        ty: 10
        rx: -90
    - name: cam3
      type: COMP:cam
      role: isolated
      parameters:
        ty: 8
        tz: 10
        rx: -40
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 4
        material: phong1
    - name: light1
      type: COMP:light
      role: isolated
      parameters:
        tz: 10
    - name: phong1
      type: MAT:phong
      role: isolated
      parameters:
        legacyalphabehavior: 'on'
    - name: render1
      type: TOP:render
      role: isolated
      parameters:
        camera: '"cam1 cam2 cam3"'
        uvunwrapcoordattrib: uv
        resolutionw: 1280
        resolutionh: 720
    - name: renderselect1
      type: TOP:renderselect
      role: isolated
      parameters:
        top: render1
        cameraindex: 1
    - name: renderselect2
      type: TOP:renderselect
      role: isolated
      parameters:
        top: render1
        cameraindex: 2
    connections: []
    topology:
      operator_count: 9
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: The Render TOP is able to render multiple cameras (more quickly
      than separately) in a single node.You specify multiple cameras in one Camera
      parameter of the Render TOP, and use the Render Select TOP to pull out those
      camera results.
  - example_name: example2
    operators:
    - name: glsl1
      type: TOP:glsl
      role: isolated
      parameters:
        pixeldat: glsl1_pixel
        computedat: glsl1_compute
    - name: glsl1_info
      type: DAT:info
      role: isolated
      parameters:
        op: glsl1
    - name: glsl1_pixel
      type: DAT:text
      role: isolated
    - name: glsl1_compute
      type: DAT:text
      role: isolated
    - name: renderselect1
      type: TOP:renderselect
      role: isolated
      parameters:
        top: glsl1
        bufferindex: 1
    - name: renderselect2
      type: TOP:renderselect
      role: isolated
      parameters:
        top: glsl1
        bufferindex: 2
    connections: []
    topology:
      operator_count: 6
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: The Render Select TOP can pull data from either a Render TOP, GLSL
      TOP or a CPlusPlus TOP.In this example the GLSL TOP outputs RGB to three different
      color buffers. The Render Select TOP is used to pull the second and third color
      buffer.
- operator_type: rendersimpleTOP
  examples:
  - example_name: example1
    operators:
    - name: phong1
      type: MAT:phong
      role: isolated
      parameters:
        emitr: 0.3
        shininess: 110
    - name: torus1
      type: POP:torus
      role: isolated
      parameters:
        radx: 1
        rady: 0.3
    - name: torus2
      type: POP:torus
      role: isolated
      parameters:
        radx: 1
        rady: 0.3
    - name: torus3
      type: POP:torus
      role: isolated
      parameters:
        radx: 1
        rady: 0.3
    - name: torus4
      type: POP:torus
      role: isolated
      parameters:
        radx: 1
        rady: 0.3
        tx: -7.5
        ty: -6.1
        tz: 3.6
        rx: 30
        ry: -30
        rz: -50
    - name: moviefilein1
      type: TOP:moviefilein
      role: isolated
    - name: moviefilein2
      type: TOP:moviefilein
      role: isolated
    - name: rendersimple1
      type: TOP:rendersimple
      role: isolated
      parameters:
        pop: torus1
        georx: 24
        resolutionw: 1280
        resolutionh: 720
    - name: rendersimple2
      type: TOP:rendersimple
      role: isolated
      parameters:
        pop: torus2
        georx: 24
        diffuser: 0.5
        diffuseg: 0.5
        resolutionw: 1280
        resolutionh: 720
    - name: rendersimple3
      type: TOP:rendersimple
      role: isolated
      parameters:
        pop: torus3
        georx: 24
        lighttx: -140
        lightty: 100
        lighttz: 100
        materialsource: matnode
        mat: phong1
        resolutionw: 1280
        resolutionh: 720
    - name: rendersimple_preNormalize
      type: TOP:rendersimple
      role: isolated
      parameters:
        pop: torus4
        constantr: 0.3
        constantg: 0.1
        constantb: 0.3
        resolutionw: 1280
        resolutionh: 720
    connections: []
    topology:
      operator_count: 11
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
- operator_type: renderTOP
  examples:
  - example_name: example1
    operators:
    - name: cam1
      type: COMP:cam
      role: isolated
      parameters:
        tz: 5
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        rx: 20
        material: phong1
    - name: light1
      type: COMP:light
      role: isolated
      parameters:
        tz: 10
    - name: phong1
      type: MAT:phong
      role: isolated
      parameters:
        legacyalphabehavior: 'on'
    - name: render1
      type: TOP:render
      role: isolated
      parameters:
        pageindex: 5
        uvunwrapcoordattrib: uv
        resolutionw: 1280
        resolutionh: 720
    connections: []
    topology:
      operator_count: 5
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: The Render TOP renders a 3D scene with a camera and lights into
      a 2D texture. A standard render setup includes a geometry object, a camera,
      light, and a material.You can wire a SOP to the input of geo1 to replace to
      torus.see sopRender in Palette's Tools for a more packaged setup.
  - example_name: example2
    operators:
    - name: cam1
      type: COMP:cam
      role: isolated
      parameters:
        pageindex: 2
        tz: 6
        pz: -18.0266
        orthowidth: 1
        aperture: 44.1
        far: -0.053
        winrollpivot: legacy
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        material: phong1
    - name: light1
      type: COMP:light
      role: isolated
      parameters:
        tz: 10
    - name: phong1
      type: MAT:phong
      role: isolated
      parameters:
        legacyalphabehavior: 'on'
    - name: render
      type: TOP:render
      role: isolated
      parameters:
        geometry: geo1
        lights: light1
        uvunwrapcoordattrib: uv
        allowbufblending: 'on'
        resolutionw: 1280
        resolutionh: 720
    - name: moviein1
      type: TOP:moviefilein
      role: isolated
    - name: render_cropping
      type: TOP:render
      role: isolated
      parameters:
        pageindex: 2
        geometry: geo1
        lights: light1
        uvunwrapcoordattrib: uv
        allowbufblending: 'on'
        cropleft: 0.25
        cropright: 0.75
        resolutionw: 1280
        resolutionh: 720
    - name: render_cull_back_faces
      type: TOP:render
      role: isolated
      parameters:
        pageindex: 1
        geometry: geo1
        lights: light1
        uvunwrapcoordattrib: uv
        allowbufblending: 'on'
        cullface: backfaces
        resolutionw: 1280
        resolutionh: 720
    - name: render_display_overdraw
      type: TOP:render
      role: isolated
      parameters:
        pageindex: 1
        geometry: geo1
        lights: light1
        uvunwrapcoordattrib: uv
        allowbufblending: 'on'
        overdraw: 'on'
        resolutionw: 1280
        resolutionh: 720
    - name: render_setting_resolution
      type: TOP:render
      role: isolated
      parameters:
        pageindex: 4
        geometry: geo1
        lights: light1
        uvunwrapcoordattrib: uv
        allowbufblending: 'on'
        resolutionw: 500
        resolutionh: 500
    connections: []
    topology:
      operator_count: 10
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This setup is being rendered in a number of different ways to demonstrate
      some  of the functionality of the Render TOP
  - example_name: example3
    operators:
    - name: cam2
      type: COMP:cam
      role: isolated
      parameters:
        pageindex: 2
        ty: 4
        tz: 8
        lookat: geo2
        aperture: 41.4214
        near: 1.47
        far: 97
        winrollpivot: legacy
    - name: geo2
      type: COMP:geo
      role: isolated
      parameters:
        ty: 1
    - name: floor
      type: COMP:geo
      role: isolated
    - name: shadows
      type: TOP:render
      role: isolated
      parameters:
        camera: cam2
        geometry: '"geo2 floor"'
        lights: '"hardShadowLight softShadowLight"'
        uvunwrapcoordattrib: uv
        allowbufblending: 'on'
        resolutionw: 1280
        resolutionh: 720
    - name: hardShadowLight
      type: COMP:light
      role: isolated
      parameters:
        pageindex: 4
        tx: -22
        ty: 44
        tz: 10
        lookat: geo2
        dimmer: 0.488
        shadowtype: hard2d
        shadowresolution1: 2048
        shadowresolution2: 2048
        fov: 20.6
        aperture: 41.4214
        near: 7.83
        far: 310
    - name: softShadowLight
      type: COMP:light
      role: isolated
      parameters:
        tx: 38
        ty: 44
        tz: -16
        lookat: geo2
        dimmer: 0.488
        shadowtype: soft2d
        lightsize1: 1.25
        lightsize2: 1.25
        shadowresolution1: 2048
        shadowresolution2: 2048
        fov: 21
        aperture: 41.4214
        near: 10
        far: 349
    connections: []
    topology:
      operator_count: 6
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: Notice that the lights are using a lookat to point at the geometry.
      This is nessesary to create a proper shadow map, which is rendered from the
      light's point of view. You then also want to adjust the FOV of the lights camera
      parameters on the View page to tighten the light's view, so the shadow map has
      better resolution on the area's you are interested in.
  - example_name: example4
    operators:
    - name: null2
      type: TOP:null
      role: output
    - name: depth2
      type: TOP:depth
      role: input
      parameters:
        op: render/shadows
    - name: depth3
      type: TOP:depth
      role: isolated
      parameters:
        op: render/hardShadowLight
    - name: depth4
      type: TOP:depth
      role: isolated
      parameters:
        op: render/softShadowLight
    - name: render
      type: COMP:base
      role: isolated
      parameters:
        pageindex: 2
    connections:
    - from: depth2
      to: null2
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: You can use the Depth TOP to get the depth buffer for both a Render
      TOP, as well as the shadow map from a light that is doing shadowing. Usually
      a Depth map will look mostly white, with much of the information between 0.9
      and 1.0. You can visually make it more informative by tightening the near/far
      planes for the camera/light.
  - example_name: example5
    operators:
    - name: cam1
      type: COMP:cam
      role: isolated
    - name: stuff
      type: COMP:geo
      role: isolated
      parameters:
        material: phong1
    - name: light1
      type: COMP:light
      role: isolated
    - name: render1
      type: TOP:render
      role: isolated
      parameters:
        pageindex: 5
        rendermode: cubemap
        uvunwrapcoordattrib: uv
        resolutionh: 1280
    connections: []
    topology:
      operator_count: 4
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: The Render TOP renders a 3D scene as a cube map, which is 6 renders-in-one,
      using the Render Mode parameter.In this case the camera and light are at 0,
      0, 0 and the geometry is around it in all directions.See also the Projection
      TOP to convert between different projection types.The image aspect ratio is
      3x4.See also the Cube Map TOP and the Projection TOP.
  - example_name: example6
    operators:
    - name: cam1
      type: COMP:cam
      role: isolated
      parameters:
        tz: 8
    - name: sort1
      type: SOP:sort
      role: processor
      parameters:
        pointobj: cam1
        primsort: object
        primobj: cam1
    - name: sort2
      type: SOP:sort
      role: output
      parameters:
        primsort: rev
    - name: geoFar
      type: COMP:geo
      role: isolated
      parameters:
        tx: -0.8
        tz: -2
        material: phong1
    - name: geoMid
      type: COMP:geo
      role: isolated
      parameters:
        material: phong1
        drawpriority: 1
    - name: level1
      type: TOP:level
      role: output
      parameters:
        clampinput: clamp
        brightness1: 1.27
        gamma1: 1.55
        contrast: 2.08
    - name: phong1
      type: MAT:phong
      role: isolated
      parameters:
        constantr: 1
        constantg: 1
        constantb: 1
        alphafront: 0.2
        blending: 'on'
        legacyalphabehavior: 'on'
    - name: torus1
      type: SOP:torus
      role: input
      parameters:
        type: poly
        reverseanchors: 'on'
        rows: 50
    - name: geoNear
      type: COMP:geo
      role: isolated
      parameters:
        tx: 0.8
        tz: 2
        material: phong1
        drawpriority: 2
    - name: render1
      type: TOP:render
      role: input
      parameters:
        uvunwrapcoordattrib: uv
        transpeellayers: 7
        resolutionw: 1280
        resolutionh: 720
    - name: sphere1
      type: SOP:sphere
      role: input
      parameters:
        type: poly
        reverseanchors: 'on'
        freq: 17
    - name: sphere2
      type: SOP:sphere
      role: input
      parameters:
        reverseanchors: 'on'
        freq: 17
        rows: 40
    - name: switch1
      type: SOP:switch
      role: processor
      parameters:
        input: 1
    - name: convert1
      type: SOP:convert
      role: processor
    - name: transform1
      type: SOP:transform
      role: processor
    - name: moviefilein2
      type: TOP:moviefilein
      role: isolated
    connections:
    - from: transform1
      to: sort1
      input_index: '0'
    - from: sort1
      to: sort2
      input_index: '0'
    - from: render1
      to: level1
      input_index: '0'
    - from: sphere2
      to: switch1
      input_index: '0'
    - from: convert1
      to: switch1
      input_index: '1'
    - from: sphere1
      to: switch1
      input_index: '2'
    - from: torus1
      to: switch1
