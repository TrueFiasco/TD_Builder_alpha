      DirectX texture. You can get the handle of any DirectX Out TOP texture by attaching
      an Info DAT to it. You can use a Touch Out DAT to send the handle to another
      TouchDesigner  instance.'
- operator_type: displaceTOP
  examples:
  - example_name: example1
    operators:
    - name: noise1
      type: TOP:noise
      role: input
      parameters:
        resolutionw: 1280
        resolutionh: 720
    - name: circle1
      type: TOP:circle
      role: input
      parameters:
        radiusx: 0.2
        radiusy: 0.2
        bgalpha: 1
        resolutionw: 1280
        resolutionh: 720
    - name: displace1
      type: TOP:displace
      role: output
      parameters:
        vertsource: blue
        extend: zero
    - name: displace2
      type: TOP:displace
      role: output
      parameters:
        vertsource: blue
    - name: circle_red
      type: COMP:slider
      role: isolated
      parameters:
        value0: 0.535354
        value1: 0.5
        w: 100
        h: 20
        top: ./back
        crop: 'on'
        relpath: externaltox
    - name: circle_blue
      type: COMP:slider
      role: isolated
      parameters:
        value0: 0.5
        value1: 0.5
        w: 100
        h: 20
        top: ./back
        crop: 'on'
        relpath: externaltox
    - name: moviefilein1
      type: TOP:moviefilein
      role: input
    - name: moviefilein2
      type: TOP:moviefilein
      role: input
    connections:
    - from: moviefilein1
      to: displace1
      input_index: '0'
    - from: circle1
      to: displace1
      input_index: '1'
    - from: moviefilein2
      to: displace2
      input_index: '0'
    - from: noise1
      to: displace2
      input_index: '1'
    topology:
      operator_count: 8
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: For every output pixel, the Displace TOP fetches from nearby the
      corresponding pixel in the first input image.The second image is used to warp
      the first image. If a pixel of the second input is grey (.5 in red and .5 in
      blue), the Displace TOP will get its output pixel from the pixel at the same
      location in the input image - no distortion.This looks boring to start, but
      move the sliders. The more you move slider_red from .5, the farther displace1
      will get its pixels from. Similar for circle_blue.In the second case, noise1's
      red and blue go to extreme low and high values relative to .5.  But if you reduce
      the parameter Displace Weight down to around .1 or less, it will reduce the
      warping effect. and you can adjust both those parameters separately to warp
      horizontally or vertically separately.Then bring down UV Weight to get from
      pixels near the center of moviefilein2.
  - example_name: example2
    operators:
    - name: noise
      type: CHOP:noise
      role: input
      parameters:
        pageindex: 1
        rough: 0.25
        amp: 3
        constraint: offset
        constrmean: 0.5
        end: 2
    - name: displace
      type: TOP:displace
      role: output
      parameters:
        displaceweighty: 0.05
        displaceweightz: 1
        extend: mirror
    - name: moviein1
      type: TOP:moviefilein
      role: input
    - name: trail_max
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: trail_min
      type: CHOP:trail
      role: output
      parameters:
        timeslice: 'on'
    - name: analyze_max
      type: CHOP:analyze
      role: processor
      parameters:
        function: maximum
    - name: analyze_min
      type: CHOP:analyze
      role: processor
      parameters:
        function: minimum
    - name: chop_to_top
      type: TOP:chopto
      role: input
      parameters:
        chop: noise
        dataformat: legacy
    connections:
    - from: moviein1
      to: displace
      input_index: '0'
    - from: chop_to_top
      to: displace
      input_index: '1'
    - from: analyze_max
      to: trail_max
      input_index: '0'
    - from: analyze_min
      to: trail_min
      input_index: '0'
    - from: noise
      to: analyze_max
      input_index: '0'
    - from: noise
      to: analyze_min
      input_index: '0'
    topology:
      operator_count: 8
      connection_count: 6
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: For every output pixel, it fetches from nearby the corresponding
      input pixel. Changing the Displace TOPs Displace Weight allows you to control
      how heavily the input is displaced in each direction.Note that some of the noise
      values go outside the 0-1 range that the colors are clamped to at 8-bits fixed
      point. But because CHOP to TOP is 32-bit float, the values are not clamped.chop_to_top
      is one pixel high, so one of its pixels will affect all pixels in a column of
      the eutput.The Green channel affects the vertical displacement via the Vertical
      Source parameter.
  - example_name: example3
    operators:
    - name: ramp1
      type: TOP:ramp
      role: input
      parameters:
        dat: ramp1_keys
        period: 0.5
    - name: moviein2
      type: TOP:moviefilein
      role: input
    - name: ramp1_keys
      type: DAT:table
      role: isolated
    - name: displace_weight
      type: TOP:displace
      role: output
      parameters:
        horzsource: blue
        vertsource: blue
        displaceweighty: 0.1
        displaceweightz: 1
    - name: displace_weight1
      type: TOP:displace
      role: output
      parameters:
        vertsource: blue
        displaceweightx: 0.2
        displaceweightz: 1
    connections:
    - from: moviein2
      to: displace_weight
      input_index: '0'
    - from: ramp1
      to: displace_weight
      input_index: '1'
    - from: moviein2
      to: displace_weight1
      input_index: '0'
    - from: ramp1
      to: displace_weight1
      input_index: '1'
    topology:
      operator_count: 5
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: For every output pixel, it fetches from nearby the corresponding
      input pixel. Changing the Displace TOPs Displace Weight allows you to control
      how heavily the input is displaced in each direction.
  - example_name: example4
    operators:
    - name: noise1
      type: TOP:noise
      role: input
      parameters:
        pageindex: 3
        type: simplex2d
        harmon: 6
        spread: 14.5
        gain: 1.07
        exp: 1.65
        amp: 0.16
        offset: 0.284
        resolutionw: 1280
        resolutionh: 720
        format: rgba8fixed
    - name: moviein3
      type: TOP:moviefilein
      role: input
    - name: displace1
      type: TOP:displace
      role: output
      parameters:
        horzsource: blue
        vertsource: red
        displaceweightx: 0.5
        displaceweightz: 1
    connections:
    - from: moviein3
      to: displace1
      input_index: '0'
    - from: noise1
      to: displace1
      input_index: '1'
    topology:
      operator_count: 3
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The pixels of smiley.tif are being displaced on the X axis by blue
      channel of the 2nd input noise.
  - example_name: example5
    operators:
    - name: sizzle
      type: TOP:null
      role: output
    - name: displace2
      type: TOP:displace
      role: processor
      parameters:
        vertsource: blue
    - name: displacer
      type: COMP:slider
      role: isolated
      parameters:
        label: sizzle
        value0: 0.030303
        w: 100
        h: 20
        bgalpha: 1
        topsmoothness: mipmap
        borderar: 0.43
        borderag: 0.43
        borderab: 0.43
        leftborder: bordera
        rightborder: bordera
        bottomborder: bordera
        topborder: bordera
    - name: transformer
      type: TOP:transform
      role: processor
      parameters:
        extend: repeat
        limittiles: 'on'
        inputfiltertype: nearest
        fillmode: best
        filtertype: nearest
    - name: noise_displacer
      type: TOP:noise
      role: input
      parameters:
        pageindex: 3
        type: random
        filtertype: nearest
        format: rgba8fixed
    - name: moviein_displacee
      type: TOP:moviefilein
      role: input
      parameters:
        pageindex: 4
        file: $TT/Map/OilDrums.jpg
        resolutionw: 1280
        resolutionh: 720
        fillmode: best
    connections:
    - from: displace2
      to: sizzle
      input_index: '0'
    - from: moviein_displacee
      to: displace2
      input_index: '0'
    - from: transformer
      to: displace2
      input_index: '1'
    - from: noise_displacer
      to: transformer
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: This example gets its pixels from random shifts in location in the
      input image.Red channels of the second input (the "Displace Input") determine
      the shift horizontally and blue channels determine the shift vertically.For
      each a pixel of the Displace Image, if its red is less than .5, it get a pixel
      from the left of the corresponding Source Image pixel. If its blue is more than
      .5, it get a pixel from above the corresponding Source Image pixel.Why .5? Because
      the Source Midpoint is set to .5 .5.Also, noise_displacer gets its resolution
      from moviein_displace.
  - example_name: example6
    operators:
    - name: level1
      type: TOP:level
      role: processor
      parameters:
        clampinput: clamp
    - name: sizzle1
      type: TOP:null
      role: output
    - name: displace3
      type: TOP:displace
      role: processor
      parameters:
        vertsource: blue
    - name: displacer1
      type: COMP:slider
      role: isolated
      parameters:
        label: sizzle
        value0: 0.040404
        w: 100
        h: 20
        bgalpha: 1
        topsmoothness: mipmap
        borderar: 0.43
        borderag: 0.43
        borderab: 0.43
        leftborder: bordera
        rightborder: bordera
        bottomborder: bordera
        topborder: bordera
    - name: transformer1
      type: TOP:transform
      role: processor
      parameters:
        extend: repeat
        limittiles: 'on'
        inputfiltertype: nearest
        fillmode: best
        filtertype: nearest
    - name: noise_displacer1
      type: TOP:noise
      role: input
      parameters:
        pageindex: 3
        type: random
        filtertype: nearest
        format: rgba8fixed
    - name: moviein_displacee1
      type: TOP:moviefilein
      role: input
      parameters:
        pageindex: 4
        file: $TT/Map/OilDrums.jpg
        resolutionw: 1280
        resolutionh: 720
        fillmode: best
    connections:
    - from: transformer1
      to: level1
      input_index: '0'
    - from: displace3
      to: sizzle1
      input_index: '0'
    - from: moviein_displacee1
      to: displace3
      input_index: '0'
    - from: level1
      to: displace3
      input_index: '1'
    - from: noise_displacer1
      to: transformer1
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 5
      has_parallel_paths: false
      max_chain_length: 5
    curator_text: This example does the same thing as the previous example but the
      slider adjusts the contrast of the Displace image to grey, versus the previous
      example where the slider adjusts the Displace Weight parameter.
- operator_type: edgeTOP
