        const0value: 60
    - name: null2_export
      type: DAT:table
      role: isolated
    - name: transform_pivot1
      type: TOP:transform
      role: output
      parameters:
        limittiles: 'on'
    - name: transform_pivot2
      type: TOP:transform
      role: output
      parameters:
        limittiles: 'on'
    connections:
    - from: speed1
      to: null2
      input_index: '0'
    - from: constant1
      to: speed1
      input_index: '0'
    - from: moviein1
      to: transform_pivot1
      input_index: '0'
    - from: moviein1
      to: transform_pivot2
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: The Transform's Pivot paramter controls where in the image the rotation
      is centered.
  - example_name: example2
    operators:
    - name: transform1
      type: TOP:transform
      role: output
      parameters:
        tx: 0.3
    - name: transform2
      type: TOP:transform
      role: output
      parameters:
        xord: tsr
        tx: 0.3
    - name: moviefilein1
      type: TOP:moviefilein
      role: input
    - name: transform_order1
      type: TOP:transform
      role: output
      parameters:
        tx: 0.25
        ty: 0.25
        rotate: 45
        sx: 1.2
        sy: 0.5
        limittiles: 'on'
    - name: transform_order2
      type: TOP:transform
      role: output
      parameters:
        xord: trs
        tx: 0.25
        ty: 0.25
        rotate: 45
        sx: 1.2
        sy: 0.5
        limittiles: 'on'
    connections:
    - from: moviefilein1
      to: transform1
      input_index: '0'
    - from: moviefilein1
      to: transform2
      input_index: '0'
    - from: moviefilein1
      to: transform_order1
      input_index: '0'
    - from: moviefilein1
      to: transform_order2
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: The transform order is crucial for assigning the order of the Transform
      TOP's operations.transform1 (deafault) rotates first then translates.  transform2
      (via Transform Order menu) translates first and then rotates.
  - example_name: example3
    operators:
    - name: moviein4
      type: TOP:moviefilein
      role: input
    - name: transform_compositing
      type: TOP:transform
      role: output
      parameters:
        sx: 0.7
        sy: 0.7
        limittiles: 'on'
    - name: transform_compositing1
      type: TOP:transform
      role: output
      parameters:
        sx: 0.7
        sy: 0.7
        compover: 'on'
        limittiles: 'on'
    connections:
    - from: moviein4
      to: transform_compositing
      input_index: '0'
    - from: moviein4
      to: transform_compositing1
      input_index: '0'
    topology:
      operator_count: 3
      connection_count: 2
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: You can fill backgrounds with the Background parameters.
  - example_name: example4
    operators:
    - name: null1
      type: CHOP:null
      role: output
      parameters:
        exporttable: null1_export
    - name: speed2
      type: CHOP:speed
      role: processor
      parameters:
