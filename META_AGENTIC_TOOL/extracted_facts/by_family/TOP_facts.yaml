    curator_text: This is a simple example of how to assign incoming RGBA channels
      to outgoing RGBA channels.In the example, the output Red channel is the 2nd
      input's Red channel, the output Green channel is the 3rd input's Green channel,
      the output Blue channel is the 1st input's Blue channel, and the alpha is the
      4th input's alpha.The Math TOP multiplies RGB by alpha to conform to the TouchDesigner
      image standard of "pre-multiplied by alpha", where red, green and blue are always
      less than alpha.
