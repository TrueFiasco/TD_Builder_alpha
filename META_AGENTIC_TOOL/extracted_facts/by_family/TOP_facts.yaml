- operator_type: slopeTOP
  examples:
  - example_name: example1
    operators:
    - name: ramp1
      type: TOP:ramp
      role: input
      parameters:
        pageindex: 2
        dat: ramp1_keys
        combineinput: res
        format: rgba32float
    - name: slope1
      type: TOP:slope
      role: output
      parameters:
        green: neutral
        blue: vluminance
        format: rgba32float
    - name: slope2
      type: TOP:slope
      role: output
      parameters:
        green: neutral
        blue: vluminance
        format: rgba32float
    - name: slope3
      type: TOP:slope
      role: output
      parameters:
        green: neutral
        blue: vluminance
        format: rgba32float
    - name: slope4
      type: TOP:slope
      role: output
      parameters:
        pageindex: 1
        red: hred
        green: neutral
        blue: vred
        format: rgba32float
    - name: slope5
      type: TOP:slope
      role: output
      parameters:
        green: neutral
        blue: vluminance
        format: rgba32float
    - name: topto1
      type: CHOP:topto
      role: isolated
      parameters:
        top: ramp1
        exportmethod: datname
    - name: topto2
      type: CHOP:topto
      role: isolated
      parameters:
        top: slope5
        exportmethod: datname
    - name: ramp1_keys
      type: DAT:table
      role: isolated
    - name: rectangle1
      type: TOP:rectangle
      role: input
      parameters:
        bgalpha: 1
        softness: 0.076
        combineinput: res
    - name: moviefilein1
      type: TOP:moviefilein
      role: input
      parameters:
        pageindex: 4
    - name: topto1_verticalCenterLine
      type: CHOP:topto
      role: isolated
      parameters:
        pageindex: 1
        top: slope1
        crop: col
        ustart: 0.5
        exportmethod: datname
    - name: topto2_verticalCenterLine
      type: CHOP:topto
      role: isolated
      parameters:
        pageindex: 1
        top: slope2
        crop: col
        ustart: 0.5
        exportmethod: datname
    - name: topto1_horizontalCenterLine
      type: CHOP:topto
      role: isolated
      parameters:
        top: slope1
        exportmethod: datname
    - name: topto2_horizontalCenterLine
      type: CHOP:topto
      role: isolated
      parameters:
        top: slope2
        exportmethod: datname
    connections:
    - from: rectangle1
      to: slope1
      input_index: '0'
    - from: rectangle1
      to: slope2
      input_index: '0'
    - from: moviefilein1
      to: slope3
      input_index: '0'
    - from: moviefilein1
      to: slope4
      input_index: '0'
    - from: ramp1
      to: slope5
      input_index: '0'
    topology:
      operator_count: 15
      connection_count: 5
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: 'THe Slope TOP shows where the luminance in an image rises or falls
      relative to its neighboring pixel(s) (immediately left-right and below-above
      pixels).The Slope TOPs are set by default to put the horizontal rate of change
      in the red channel, and the vertical rate of change in the blue channel.The
      viewers of the Slope TOPs are set to "Normalized Split" that puts each color
      channel in a separate box. The top-left represents the red channel.Where the
      rate of change is 0 (the source''s solid white areas for example) the color
      is 50% grey (the Zero Point parameter is .5).Whiter in the Slope TOP''s red
      channel means the luminance of the input is increasing left-to-right around
      that pixel.ramp1 is 4 sections - each is a rise or fall in RGB horizontally.
      Because the ramps are linear, slope3 is a solid color in each band.By default,
      where the slope is 0, a value of .5 is output in the pixel. (by default, pixels
      don''t have negative values.) slope1 shows this.But in slope2, the Zero Point
      parameter is set to 0 so where the slope is 0, the color channel is set to 0.
      In this case the slopes have some negative values where the source color decreaes
      left-to-right, so the Pixel Format parameter on the Common page has to be a
      16-bit or 32-bit float, which can represent negative values.slope4 is only looking
      at the red channel.topto1 shows that ramp1 is constantly rising or falling,
      which gove constant values in the topto2 red channel.PS: slope is "rate of change"
      or "derivative" in calculus.'
- operator_type: spectrumTOP
  examples:
  - example_name: example1
    operators:
    - name: circle2
      type: TOP:circle
      role: processor
      parameters:
        radiusx: 0.01
        radiusy: 0.01
        operand: multiply
    - name: reorder1
