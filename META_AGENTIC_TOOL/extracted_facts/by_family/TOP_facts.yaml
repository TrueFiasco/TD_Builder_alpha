    curator_text: As with conventional stereo rendering, you will need two cameras.  The
      main difference between conventional stereo and omnidirectional stereo (ODS)
      in terms of setup is that both cameras have the same transform (i.e., no offsetting
      in the x direction).The interpupillary distance (IPD) must be set in both cameras
      (View/IPDShift), negative in the left eye camera, and positive in the right.  A
      typical value is 63 mm.
