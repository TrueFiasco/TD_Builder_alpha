- operator_type: rgbkeyTOP
  examples:
  - example_name: example1
    operators:
    - name: ramp1
      type: TOP:ramp
      role: input
      parameters:
        dat: ramp4_keys
        type: radial
        interpnotches: step
    - name: rgbkey1
      type: TOP:rgbkey
      role: output
      parameters:
        pageindex: 1
        redmin: 0.5
        greenmax: 0.1
        bluemax: 0.1
    - name: rgbkey2
      type: TOP:rgbkey
      role: output
      parameters:
        redmax: 0.3
        bluemax: 0.1
    - name: rgbkey3
      type: TOP:rgbkey
      role: output
      parameters:
        pageindex: 2
        redmin: 0.5
        greenmin: 0.5
        bluemax: 0.1
    - name: ramp4_keys
      type: DAT:table
      role: isolated
      parameters:
        rows: 4
        cols: 5
    - name: rgbkey3_invert
      type: TOP:rgbkey
      role: output
      parameters:
        pageindex: 3
        redmin: 0.5
        greenmin: 0.5
        bluemax: 0.1
        invert: 1
    connections:
    - from: ramp1
      to: rgbkey1
      input_index: '0'
    - from: ramp1
      to: rgbkey2
      input_index: '0'
    - from: ramp1
      to: rgbkey3
      input_index: '0'
    - from: ramp1
      to: rgbkey3_invert
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: The RGB Key TOP "pulls a key" from the image using the Red, Green,
      and Blue channel settings. If a pixel value is between the Min and Max parameters
      for all three settings, then its alpha is set to 1.The first three examples
      are each set to a different color. for rgbkey1, red has to be above .5, green
      below .1, and blue below .1.You can also use this operator to hide certain colors.
      See rgbkey3_invert, it has exactly the same Red, Green, and Blue settings as
      rgbkey3, but it has its alpha inverted using Invert New Alpha.See also the Chroma
      Key TOP and in the Palette, the Chromakey component.Idzard Kwadijkkwadijk@idzard.com
- operator_type: rgbtohsvTOP
  examples:
  - example_name: example1
    operators:
    - name: hsvrgb1
      type: TOP:hsvrgb
      role: output
    - name: hsvrgb2
      type: TOP:hsvrgb
      role: output
    - name: hsvrgb3
      type: TOP:hsvrgb
      role: output
    - name: hsvrgb4
      type: TOP:hsvrgb
      role: output
    - name: hsvrgb5
      type: TOP:hsvrgb
      role: output
    - name: rgbhsv2
      type: TOP:rgbhsv
      role: processor
    - name: blur_hue
      type: TOP:blur
      role: processor
      parameters:
        size: 57
        npasses: 4
        chanmask: 1
    - name: moviein1
      type: TOP:moviefilein
      role: input
    - name: blur_brightness
      type: TOP:blur
      role: processor
      parameters:
        pageindex: 1
        size: 57
        npasses: 3
        chanmask: 4
    - name: level_narrow_color
      type: TOP:level
      role: processor
      parameters:
        pageindex: 2
        clampinput: clamp
        lowr: 0.081
        highr: 0.157
    - name: level_increase_saturation
      type: TOP:level
      role: processor
      parameters:
        clampinput: clamp
        gamma1: 3.4
        chanmask: 2
    - name: level_quantize_hue_and_value
      type: TOP:level
      role: processor
      parameters:
        pageindex: 5
        clampinput: clamp
        stepping: 'on'
        stepsize: 0.25
        threshold: 0.18
        chanmask: 5
    connections:
    - from: level_increase_saturation
      to: hsvrgb1
      input_index: '0'
    - from: level_narrow_color
      to: hsvrgb2
      input_index: '0'
    - from: level_quantize_hue_and_value
      to: hsvrgb3
      input_index: '0'
    - from: blur_brightness
      to: hsvrgb4
      input_index: '0'
    - from: blur_hue
      to: hsvrgb5
      input_index: '0'
    - from: moviein1
      to: rgbhsv2
      input_index: '0'
    - from: rgbhsv2
      to: blur_hue
      input_index: '0'
    - from: rgbhsv2
      to: blur_brightness
      input_index: '0'
    - from: rgbhsv2
      to: level_narrow_color
      input_index: '0'
    - from: rgbhsv2
      to: level_increase_saturation
      input_index: '0'
    - from: rgbhsv2
      to: level_quantize_hue_and_value
      input_index: '0'
    topology:
      operator_count: 12
      connection_count: 11
      has_parallel_paths: true
      max_chain_length: 4
    curator_text: 'rgbhsv TOP converts pixels so that the hue is in  the red channel,
      the saturation is in the green channel, and the value (brightness) is in  the
      blue channel.After converting to hsv,level_increase_saturation  alters the g
      (saturation) channel via the Gamma parameter, where 0 saturation and 1 saturation
      remain unchanged, but all other values are cranked  up toward 1. After converting
      to hsv, level_push_color alters r (hue) channel so the values are in a smaller
      range (.1 to .2). After converting to hsv level_quantize_hue_and_value quantizes
      hue and saturation by using the Step parameters. The Channel Mask parameter
      on  the Common page quantizes in .25 steps the  red (hue) and blue (brightness)
      channels.The last two examples show blurring of hue and saturation by masking
      blue or red channels.Note: All the above get converted from hsv to rgb.'
  - example_name: example2
    operators:
    - name: out1
      type: TOP:out
      role: output
    - name: blur1
      type: TOP:blur
      role: processor
      parameters:
        size: 17
        chanmask: 1
    - name: limit1
      type: TOP:limit
      role: processor
      parameters:
        mintype: zigzag
        maxtype: zigzag
        chanmask: 1
    - name: hsvrgb2
      type: TOP:hsvrgb
      role: processor
    - name: rgbhsv1
      type: TOP:rgbhsv
      role: processor
    - name: select1
      type: TOP:select
      role: input
      parameters:
        top: moviefilein2
    - name: original
      type: TOP:null
      role: output
    - name: hueControls
      type: COMP:base
      role: isolated
      parameters:
        pageindex: 1
        iop1shortcut: '""'
        iop1op: '""'
        ext1object: '""'
        ext1name: '""'
        ext2object: '""'
        ext2name: '""'
        ext3object: '""'
        ext3name: '""'
    - name: moviefilein1
      type: TOP:moviefilein
      role: isolated
      parameters:
        format: rgba32float
    - name: moviefilein2
      type: TOP:moviefilein
      role: isolated
      parameters:
        format: rgba32float
    - name: moviefilein3
      type: TOP:moviefilein
      role: isolated
      parameters:
        format: rgba32float
    - name: moviefilein4
      type: TOP:moviefilein
      role: isolated
      parameters:
        format: rgba32float
    connections:
    - from: hsvrgb2
      to: out1
      input_index: '0'
    - from: limit1
      to: blur1
      input_index: '0'
    - from: rgbhsv1
      to: limit1
      input_index: '0'
    - from: blur1
      to: hsvrgb2
      input_index: '0'
    - from: select1
      to: rgbhsv1
      input_index: '0'
    - from: select1
      to: original
      input_index: '0'
    topology:
      operator_count: 12
      connection_count: 6
      has_parallel_paths: true
      max_chain_length: 6
    curator_text: 'This is a useful trick to squeeze the range of colors in an image
      down to a smaller range (artificial of course). Like all colors fit into the
      yellow-to-green range.Drag-drop the Movie File In TOPs to select1 to see what
      it does.Then to adjust the range, right-click on hueControls and select View...
      to get the panel in a floating window. Then adjust Hue Midpoint. Hue Divider
      needs to be an integer for this to work well. Hue Divider of 5 causes the hue
      range to be 1/5 the full color range, 8 reduces the range to 1/8, etc.  The
      higher the number, the more single-color the result is.Another trick: hueControls
      is a set of parameters, and the UI of hueControls is defined with a Parameter
      COMP that is located inside hueControls, and exposed via the Operator Viewer
      parameter on hueControls (slight brain-twister).'
- operator_type: screengrabTOP
  examples:
  - example_name: example1
    operators:
    - name: null1
      type: CHOP:null
      role: output
    - name: null2
      type: TOP:null
      role: output
    - name: colorPicker
      type: COMP:container
      role: input
      parameters:
        topsmoothness: usetop
    connections:
    - from: colorPicker/out1
      to: null1
      input_index: '0'
    - from: colorPicker/out2
      to: null2
      input_index: '0'
    topology:
      operator_count: 3
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: A Color Picker can be made using a Screengrab TOP that grabs a single
      pixel from anywhere on the desktop, even outside the TouchDesigner windows.Hold
      Shift key down and move your mouse anywhere.Inside, it use nettoyeur's findMouse
      component, which is also in the snippets for the Mouse In CHOP.Its cost is an
      Execute DAT that runs a tiny of amount of code every frame.Thanks to Harvey
      Moon for this, and Idzard for his findMouse component (see Mouse In CHOP Snippets).
- operator_type: scriptTOP
  examples:
  - example_name: example1
    operators:
    - name: script1_callbacks
      type: DAT:text
      role: isolated
    - name: script_basicControls
      type: TOP:script
      role: isolated
      parameters:
        pageindex: 2
        callbacks: script1_callbacks
        aspect1: 16
        aspect2: 9
    connections: []
    topology:
      operator_count: 2
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: The script TOP's method .copyNumpyArray() takes as an argument a
      numpy array that holds all color information for the texture that is output
      for the TOP. The numpy array is defined by a size and type where size is specified
      in a list holding height, width and number of color channels. So for a 1280x720
      pixel sized image with rgba color channels, the size would be [720, 1280, 4]The
      numpy arrays type can be of type uint8, uint16 or float32.It is important to
      watch out for the valuerange for colorvalues depending of the array type. uint8
      has a value range of 0 to 255, uint16 has a value range of 0 to 65535 andfloat32
      has a value range of 0 to 1.Especially when converting between array types this
      is something to keep in mind.
  - example_name: example2
    operators:
    - name: moviefilein1
      type: TOP:moviefilein
      role: input
      parameters:
        pageindex: 4
    - name: script_copyInput
      type: TOP:script
      role: output
      parameters:
        pageindex: 2
        callbacks: script2_callbacks
    - name: script2_callbacks
      type: DAT:text
      role: isolated
    connections:
    - from: moviefilein1
      to: script_copyInput
      input_index: '0'
    topology:
      operator_count: 3
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: Every TOP's content can be converted to a numpy array by using the
      .numpyArray() Method. The returned numpy array can then be used as an argument
      to the Script TOP's .copyNumpyArray() to display it.It is important to understand
      that .numpyArray() returns in all cases a 32 bit float numpy array. If the Script
      TOP should hold a texture with a different pixel format, the numpy array will
      have to be converted first.
  - example_name: example3
    operators:
    - name: moviefilein3
      type: TOP:moviefilein
      role: input
    - name: script4_callbacks
      type: DAT:text
      role: isolated
    - name: script_copyInputDelayed
      type: TOP:script
      role: output
      parameters:
        pageindex: 2
        callbacks: script4_callbacks
    connections:
    - from: moviefilein3
      to: script_copyInputDelayed
      input_index: '0'
    topology:
      operator_count: 3
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: Every TOP's content can be converted to a numpy array by using the
      .numpyArray() Method. By default this Method will download the texture on the
      same frame and with the download from GPU to CPU being a slow process, a performance
      impact can't be prevented. By specifying the optional argument 'delayed', the
      texture will only be ready on the next frame being downloaded in the background
      and as a result the performance impact is minimized.A problamatic issue is that
      the texture will not be ready the first time the method is called. For that
      reason a default numpy array of the same size as the copied texture should be
      created and used as a standin.The returned numpy array can then be used as an
      argument to the Script TOP's .copyNumpyArray() to display it.It is important
      to understand that .numpyArray() returns in all cases a 32 bit float numpy array.
      If the Script TOP should hold a texture with a different pixel format, the numpy
      array will have to be converted first.
  - example_name: example4
    operators:
    - name: moviefilein2
      type: TOP:moviefilein
      role: input
    - name: script_openCV
      type: TOP:script
      role: output
      parameters:
        pageindex: 2
        callbacks: script3_callbacks
    - name: script3_callbacks
      type: DAT:text
      role: isolated
    connections:
    - from: moviefilein2
      to: script_openCV
      input_index: '0'
    topology:
      operator_count: 3
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
  - example_name: xxexample5
    operators:
    - name: base1
      type: COMP:base
      role: isolated
    - name: eval1
