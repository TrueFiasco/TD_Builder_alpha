      role: isolated
      parameters:
        op: base1
    - name: info2
      type: CHOP:info
      role: isolated
      parameters:
        op: base1
    - name: tcpip1
      type: DAT:tcpip
      role: isolated
      parameters:
        mode: server
        port: 7007
        callbacks: tcpip4_script
    - name: tcpip2
      type: DAT:tcpip
      role: isolated
      parameters:
        port: 7007
        format: all
        callbacks: tcpip2_script
        maxlines: 15
        bytes: 'on'
    - name: script1
      type: TOP:script
      role: output
      parameters:
        pageindex: 2
        callbacks: script3_callbacks
    - name: moviefilein1
      type: TOP:moviefilein
      role: input
      parameters:
        pageindex: 4
        outputresolution: eighth
    - name: moviefilein2
      type: TOP:moviefilein
      role: isolated
    - name: tcpip2_script
      type: DAT:text
      role: isolated
    - name: tcpip4_script
      type: DAT:text
      role: isolated
    - name: script3_callbacks
