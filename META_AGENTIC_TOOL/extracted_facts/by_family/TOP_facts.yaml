    curator_text: The SSAO TOP performs Screen Space Ambient Occlusion on the output
      of a Render TOP or Render Pass TOP. To properly see the effect in the example
      scene, right-click the "view_output" node and select 'View'.Now bypass/unbypass
      the SSAO TOP to see the difference.To better understand what the SSAO TOP generates,
      look at ssao2. When this is multiplied with the Render Top output you'll get
      the same result as in the "view_output" node.Because this technique requires
      access to the Depth Buffer, no other TOP can be in between the Render/RenderPass
      TOP and the SSAO TOP. Screen Space Ambient Occlusion is a real-time rendering
      trick that creates an approximation of ambient occlusion by using the Depth
      Buffer of the rendered scene. It is done as 2D post-processes, so the complexity
      of the scene has no bearing on how expensive it is. This is in comparison to
      true ambient occlusion which becomes more expensive with each new object that
      is rendered.Play with the parameter to suit your scene.
