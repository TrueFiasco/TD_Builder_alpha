    topology:
      operator_count: 22
      connection_count: 10
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: The movieLoader is an example implementation of using the Movie
      File In TOP's preload and unload feature with a Timer CHOP.The setup consists
      of two timers where one is responsible for preloading and the other for playback
      of the specified Movie File In TOP.The preloading is done in the timer_preload
      Timer CHOP preloading in the onInitialize() callback. When initializing, the
      extension of the component first attempts to open the movie and then proceeds
      to preload it. Once preloaded the timer_preload Timer CHOP starts the timer_play
      Timer CHOP to playback the movie. If the option is enabled, the timer_play Timer
      CHOP will unload the Movie File In TOP once playback has concluded.This component
      can preload its internal default Movie File In TOP or you can specify external
      Movie File In TOPs as well as use its functionality by calling the component's
      Preload() function.The first output of the component is the movie being played
      while the second output is channels to use as exports to the external Movie
      File In TOP being used for playback. Use the CHOP's "Channel Name is Path:Parameter"
      Export Method.
