      role: isolated
    connections:
    - from: moviein2
      to: transform2
      input_index: '0'
    - from: transform2
      to: moviefileout1
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: If you turn on Unique Suffix, each time you click Record on and
      off you get a uniquely-named file.
