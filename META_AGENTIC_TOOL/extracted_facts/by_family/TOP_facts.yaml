      to: nvbackground1
      input_index: '0'
    topology:
      operator_count: 9
      connection_count: 8
      has_parallel_paths: true
      max_chain_length: 6
    curator_text: The NVIDIA Background TOP generates a white key over a black background...
      usually a person, but may be anything... It uses the NVIDIA background removal
      ML algortithm on their ML-enabled GPUs like the 2000 series and up.Some optimizations
      (that may end up built-in to the TOP) are:The cache1 TOP delays the video signal
      by 2 frames because nvbackground1 takes around 2 frames to generate the mask,
      so when they are joined up again in matte1, they are back in sync.Note that
      the NVIDIA Background TOP by default generates a single channel, not RGBA. The
      Matte TOP accepts that as its matte input.If you half the res going into it,
      it takes less than half the GPU time. optional. The mattes mvbakground1 makes
      may have a bit of a halo around it when re-composited. To eat away at the edge
      of the mask, blur1 softens it, and lookup1 with scurve1 pulls the edge in ("erodes"
      the mask). To make it erode more, reduce the Length parameter of scurve1 to
      below 1000.  Adjust that along with the Filter Size of blur1 to you taste.
