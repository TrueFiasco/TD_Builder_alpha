      input_index: '0'
    - from: transform2
      to: movie_out_record_image
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: The Movie Out TOP can also output still images in a similar manner
      as video  files.
  - example_name: example4
    operators:
    - name: button1
      type: COMP:button
      role: isolated
      parameters:
        label: Record
        buttontype: toggledown
        w: 50
        h: 40
        relpath: externaltox
    - name: folder1
      type: DAT:folder
      role: isolated
