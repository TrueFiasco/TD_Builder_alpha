    curator_text: Because the ramps are by default 8-bit, you may get un-desired banding
      in your output that can be eliminted.In circle, ramp1, lookup1, they are all
      8-bit and if you zoom into topto_lookup1 you see how the pixels hold value for
      8 pixels and then step up - a bad case.In circle2_32bit, ramp2, lookup2, the
      circle2_32bit TOP is 32-bit floats. topto_circle2 shows it is nice and smoothly
      generated, but lookup2 still steps because its ramp is qunatized at 1/255 steps,
      as you see in topto_lookup2.circle3_32bit and ramp2_rebit are all 32-bit floats,
      and therefore lookup3 is 32-bit, and all the interpolations are smooth.Instead
