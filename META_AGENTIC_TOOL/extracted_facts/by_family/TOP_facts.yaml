    curator_text: spectrum1 to spectrum3, show the image converted to different arrangements
      of pixels in the DFT image.They differ in the Coordinate System menu and the
      Transorm Rows flag.Parameters in spectrum*_inverse are bound to their counterpart
      in spectrum*.
