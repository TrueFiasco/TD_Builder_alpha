        pageindex: 1
        top: ramp2
        crop: col
        exportmethod: datname
    - name: inspect
      type: TOP:crop
      role: output
      parameters:
        pageindex: 1
        cropleft: 0.526
        cropright: 0.622
        cropbottom: 0.673
        croptop: 0.918
        inputfiltertype: nearest
        filtertype: nearest
    - name: reorder2
      type: TOP:reorder
      role: processor
      parameters:
        outputgreen: input2
        outputalphachan: one
    - name: annotate1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        includeinorder: 'on'
    - name: ramp1_keys
      type: DAT:table
      role: isolated
    - name: ramp2_keys
      type: DAT:table
      role: isolated
