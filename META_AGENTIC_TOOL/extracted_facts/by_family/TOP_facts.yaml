    curator_text: Click/drag in bicolor. You can procedurally generate tables for
      ramps. In this case the panel "bicolor" u and v define an inner and outer hue,
      which is generated with an  expression for the red channel in an Evaluate DAT.The
      ramp is converted from hue-saturation-value to RGB in an HSV to RGB TOP.
  - example_name: example7
