    curator_text: unbypass everything.In this example for SRT the sending operator
      uses the ipaddress 0.0.0.0 and it uses a port that has been forwarded using
      the router's firewall settings. In particular the port number has to be identified
      in the NAT/Gaming settings of the Internet router and correctly assigned to
      the listener computer ip address / mac address thats running the listening videostreamoutTOP.To
      get your internet IP address type "Whats my ip address" into google.  This help
      assumes you have an ip address assigned of the type ip4.Set videostreamoutTOP
      URL parameter to:srt://0.0.0.0:2030?mode=listenerSet videostreaminTOP URL parameter
      to:srt://[whats my ip]:2020?mode=callersrt://XXX.XXX.XXX.XXX:2030?mode=caller
