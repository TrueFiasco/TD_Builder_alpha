    curator_text: It's easier to understand what each of the parameters do in isolation.Turn
      on the bullseye on the parameter dialog to see the pars that are not at their
      default values.The bloomA set illustrates a first stage where you would adjust
      the Pre-process parameters to catch a good "signal" in the incoming image, just
      the right amount of the incoming image toapply a bloomot. For darker images
      you nees to reduce Pre-Black Level.  Pre-Gamma and Pre-Brighness accentuates
      what yuu have caught.Bloom B abnd C extract less of the input ignal, but shiow
      how to get a wider diffuse bloom.Bloom D binds together the pre-process parameters.Bloom
      everywhere by making Bloom Threshold 0, or below 0 to crank it up more.
  - example_name: example2
    operators:
    - name: bloom1
      type: TOP:bloom
