    curator_text: The Noise TOP's Seed parameter is an easy way to create animated
      noise. The two images are multiplied together in the Composite TOP.The Noise
      TOP is scaled to fit the jellybeans, so you would have to set the resolution
      of the Noise TOP too to make it not stretched.The second example shows you can
      feed an image to the Noise TOP, and via the Output page, combine the noise and
      incoming image in different ways.The Noise TOP takes the resolution of the incoming
      TOP.
  - example_name: example2
    operators:
    - name: noise_perlin
      type: TOP:noise
      role: isolated
      parameters:
        type: perlin3d
        harmon: 10
        format: rgba8fixed
    - name: noise_random
      type: TOP:noise
      role: isolated
      parameters:
        type: randomgpu
        period: 0.65
        harmon: 8
        spread: 10.5
        gain: 1.09
        exp: 0.49
        amp: 2
        format: rgba8fixed
    connections: []
    topology:
      operator_count: 2
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: You can get very different types of noise, from Random to Perlin,
      by changing the  Type parameter.
  - example_name: example3
    operators:
    - name: noise1
      type: TOP:noise
      role: input
      parameters:
        type: random
        filtertype: nearest
        format: rgba8fixed
    - name: transform1
      type: TOP:transform
      role: processor
      parameters:
        extend: repeat
        limittiles: 'on'
        inputfiltertype: nearest
        filtertype: nearest
    - name: transform2
      type: TOP:transform
      role: processor
      parameters:
        extend: repeat
        limittiles: 'on'
        inputfiltertype: nearest
        filtertype: nearest
    - name: fastrandom1
      type: TOP:null
      role: output
    - name: fastrandom2
