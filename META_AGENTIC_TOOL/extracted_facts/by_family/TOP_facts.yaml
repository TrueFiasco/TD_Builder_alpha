        overlapv: 0.136
    - name: speed1
      type: CHOP:speed
      role: processor
      parameters:
        limittype: loop
        max: 4
        timeslice: 'on'
    - name: moviein3
      type: TOP:moviefilein
      role: input
    - name: constant1
      type: CHOP:constant
      role: input
      parameters:
        const0value: 0.2
    - name: null1_export
      type: DAT:table
      role: isolated
      parameters:
        rows: 4
    - name: transform_mirror
      type: TOP:transform
      role: output
      parameters:
        sx: 0.5
        sy: 1
        extend: mirror
        limittiles: 'on'
        tileu1: -10
        tileu2: 6
        tilev1: -10
        tilev2: 6
    - name: transform_repeat
      type: TOP:transform
      role: output
      parameters:
        sx: 0.5
        sy: 1
        limittiles: 'on'
        tileu1: -10
        tileu2: 6
        tilev1: -10
        tilev2: 6
    - name: transform_mirror1
      type: TOP:transform
      role: output
      parameters:
        extend: mirror
        limittiles: 'on'
        tileu1: -10
        tileu2: 6
        tilev1: -10
        tilev2: 6
    connections:
    - from: speed1
      to: null1
      input_index: '0'
    - from: moviein3
      to: tile1
      input_index: '0'
    - from: constant1
      to: speed1
      input_index: '0'
    - from: moviein3
      to: transform_mirror
      input_index: '0'
    - from: moviein3
      to: transform_repeat
      input_index: '0'
    - from: tile1
      to: transform_mirror1
      input_index: '0'
    topology:
      operator_count: 9
      connection_count: 6
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: The extend conditions are used whenever you create blank space using
      the Transform TOP.When you want seamless repeating textures, use the Tile TOP.
  - example_name: example6
    operators:
    - name: moviein3
      type: TOP:moviefilein
      role: input
      parameters:
        pageindex: 4
    - name: transform1
      type: TOP:transform
      role: output
      parameters:
        pageindex: 2
        outputresolution: custom
        resolutionw: 80
        resolutionh: 45
        outputaspect: resolution
        filtertype: nearest
    - name: transform2
      type: TOP:transform
      role: output
      parameters:
        pageindex: 2
        outputresolution: custom
        resolutionw: 80
        resolutionh: 45
        outputaspect: resolution
        filtertype: mipmap
    - name: transform3
      type: TOP:transform
      role: output
      parameters:
        pageindex: 2
        outputresolution: custom
        resolutionw: 80
        resolutionh: 45
        outputaspect: resolution
        filtertype: nearest
    - name: transform4
      type: TOP:transform
      role: output
      parameters:
        pageindex: 2
        outputresolution: custom
        resolutionw: 80
        resolutionh: 45
        outputaspect: resolution
        inputfiltertype: mipmap
        filtertype: nearest
    - name: transform_mipmap
      type: TOP:transform
      role: output
      parameters:
        pageindex: 2
        sx: 0.1
        sy: 0.1
        extend: repeat
        outputaspect: resolution
        inputfiltertype: mipmap
        filtertype: nearest
    - name: transform_noMipmap
      type: TOP:transform
      role: output
      parameters:
        pageindex: 2
        sx: 0.1
        sy: 0.1
        extend: repeat
        outputaspect: resolution
        inputfiltertype: nearest
        filtertype: nearest
    connections:
    - from: moviein3
      to: transform1
      input_index: '0'
    - from: moviein3
      to: transform2
      input_index: '0'
    - from: moviein3
      to: transform3
      input_index: '0'
    - from: moviein3
      to: transform4
      input_index: '0'
    - from: moviein3
      to: transform_mipmap
      input_index: '0'
    - from: moviein3
      to: transform_noMipmap
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 6
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: Each Transform TOP is setting the resolution down to 1/16 the original
      resolution (80 pixels in x).To see the indiviual pixels more clearly, on the
      Common page on transform1, Viewer Smoothness is set to Nearest Pixel.Another
      way to see individual pixels is to turn on Viewer Active (bottom right flag
      on the nodem transform2), then right-click on the image and set Display Pixel
      Values. That also shows the pixel values at the bottom left of the image.Middle-mouse-click
      on the transform2 image to zoom into pixels.  'h' to home.None of the above
      affects the data in the pixels, it only affects how you see them in the viewer.On
      the other hand, transform4 affects the pixel values because Input Smoothness
      is set to Mipmap pixels. (Check 'mipmap" in Wikipedia.) Because the input is
      scaled down so much, transform4 combines 16x16 = 256 pixels into one by averaging
      them, but the others take only one pixel from the input as its value for an
      output pixel.transform noMipmap and transform_mipmap show how, even when the
      resolution of the output is the same as the input, turning on Mipmap on Input
      Smoothness in transform_mipmap makes 10 pixels averages into 1 pixel of the
      output.
