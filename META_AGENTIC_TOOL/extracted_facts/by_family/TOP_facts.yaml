    curator_text: openColorIO can be used for numerous color correction operations
      for various output display devices. In this case the OpenColorIO TOP node (sRGBRamp)
      is used to simulate the conversion of a linear ramp into a gamma lookup image
      (brightened iamge to use the 256 steps of an 8-bit image bettter), as it would
      be stored in a JPEG file.  See the wiki page 'sRGB' for more information. https://docs.derivative.ca/SRGB
  - example_name: example3
    operators:
    - name: ocio1
      type: TOP:ocio
      role: output
      parameters:
        pageindex: 1
        useprexform: 'on'
        preincs: SLog
        preoutcs: linear
    - name: ocio2
      type: TOP:ocio
      role: output
      parameters:
        pageindex: 1
        useprexform: 'on'
        preincs: SLog
        preoutcs: linear
        cdlmode: values
        slopex: 1.66
        slopey: 1.27
        slopez: 1.1
        offsetx: -0.04
        offsety: 0.04
        offsetz: 0.1
        powerx: 0.95
        powery: 0.95
        powerz: 0.95
        saturation: 0.79
    - name: ocio3
      type: TOP:ocio
      role: output
      parameters:
        useprexform: 'on'
        preincs: SLog
        preoutcs: linear
        cdlmode: values
        slopex: 1.28
        slopey: 0.69
        slopez: 0.54
        offsetx: -0.295
        offsety: 0.03
        offsetz: -0.05
        powerx: 0.97
        powery: 0.97
        powerz: 0.97
        saturation: 0.67
        cdldirection: inverse
    - name: ocio4
      type: TOP:ocio
      role: output
      parameters:
        pageindex: 4
        useprexform: 'on'
        preincs: SLog
        preoutcs: linear
        cdlmode: values
        powerx: 1.2
        powery: 1.2
        powerz: 1.2
        saturation: 2.38
        useoutput: 'on'
        gain: 2.1
        gamma: 0.34
    - name: text1
      type: DAT:text
      role: isolated
    - name: lumalevel1
      type: TOP:lumalevel
      role: processor
      parameters:
        gamma1: 1.7
    - name: moviefilein_ocioTest
      type: TOP:moviefilein
      role: input
    connections:
    - from: lumalevel1
      to: ocio1
      input_index: '0'
    - from: lumalevel1
      to: ocio2
      input_index: '0'
    - from: lumalevel1
      to: ocio3
      input_index: '0'
    - from: lumalevel1
      to: ocio4
      input_index: '0'
    - from: moviefilein_ocioTest
      to: lumalevel1
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 5
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: 'OpenColorIO is a toolkit for working with different color spaces
      and gamma settings for image files. Different cameras and display devices have
      different methods to store and display color. OpenColorIO supports the loading
      of different lookup tables (LUTs) that can transform how the color data is stored
      and viewed.The TouchDesigner colorspace is linear. By using OpenColorIO an image
      that is stored in one color space can be transformed to another.  In the example
      here the image was taken with a Sony a6300 using Picture profile1, Gamma: S-log3,
      Color Mode: S-Gamut3.CineBy default the OpenColorIO TOP comes with only a small
      number of LUTs that are built in. The closest input LUT is SLog and the correct
      way to output the image for viewing in TouchDesigner is linear.  See the Color
      Space Transform page of each TOP and you will see these settings.The image when
      its loaded is quite dull. However this image is a 16bit TIFF and the color values
      are stored in such a way as to maintain the most color information. Through
      the muse of a LUT the Slog stored colors and viewed better in TouchDesigner
      with an output LUT for linear.github with many more LUTs...https://github.com/imageworks/OpenColorIO-ConfigsGood
      collection found in above github is aces_1.0.3 which is latest color grading
      kit from Academy of Motion Picture Arts and Sciences https://en.wikipedia.org/wiki/Academy_Color_Encoding_SystemLoad
      the aces_1.0.3 configuration file in the aces_1.0.3 folder in the git repository
      and select the config.ocio.The following LUTs will be available.Input LUT -
      Sony-S-Log3-S.Gamut3.CineOutput LUT - Utility-Linear-sRGB'
- operator_type: opticalflowTOP
  examples:
  - example_name: example1
    operators:
    - name: cam1
      type: COMP:cam
      role: isolated
      parameters:
        pageindex: 2
        tz: 5
        projection: ortho
        orthowidth: 1
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        material: line1
    - name: res1
      type: TOP:res
      role: output
      parameters:
        pageindex: 1
        highqualresize: 'on'
        outputresolution: custom
    - name: comp1
      type: TOP:comp
      role: isolated
      parameters:
        pageindex: 1
        tops: '"render1 source"'
        operand: over
        size: input1
    - name: grid1
      type: SOP:grid
      role: input
    - name: info1
      type: CHOP:info
      role: isolated
      parameters:
        op: videodevin1
        iscope: '"aspectx aspecty"'
    - name: line1
      type: MAT:line
      role: isolated
      parameters:
        pageindex: 1
        drawpoints: 'on'
        drawvectors: 'on'
        vecendcaptype: arrow
        arrowwidth: 2.05
        arrowheight: 3.18
        endcappullback: 1
    - name: sopto1
      type: DAT:sopto
      role: isolated
      parameters:
        sop: chopto1
    - name: source
      type: TOP:null
      role: processor
    - name: topto1
      type: CHOP:topto
      role: input
      parameters:
        top: res1
        b: '""'
        a: '""'
        singleset: 'on'
        crop: full
        exportmethod: datname
    - name: chopto1
      type: SOP:chopto
      role: output
      parameters:
        chop: filter1
        chanscope: '"r g"'
        attscope: '"N(0) N(1)"'
    - name: filter1
      type: CHOP:filter
      role: output
      parameters:
        width: 0.2
        filterpersample: 'on'
        timeslice: 'on'
    - name: render1
      type: TOP:render
      role: isolated
      parameters:
        pageindex: 5
        uvunwrapcoordattrib: uv
    - name: settings
      type: COMP:base
      role: isolated
      parameters:
        pageindex: 3
    - name: videodevin1
      type: TOP:videodevin
      role: input
      parameters:
        device: '"V1|||\\\\?\\usb#vid_1532&pid_0e05&mi_00#9&ccab91&1&0000#{65e8773d-8f56-11d0-a3b9-00a0c9223196}\\global|||0|||0|||USB
          Video Device"'
        precedence: even
        signalformat: f1920x1080p-30.00hz
    - name: opticalflow1
      type: TOP:opticalflow
      role: processor
    connections:
    - from: opticalflow1
      to: res1
      input_index: '0'
    - from: videodevin1
      to: source
      input_index: '0'
    - from: grid1
      to: chopto1
      input_index: '0'
    - from: topto1
      to: filter1
      input_index: '0'
    - from: source
      to: opticalflow1
      input_index: '0'
    topology:
      operator_count: 16
      connection_count: 5
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: This draws velocity flow vectors based on the Optical Flow TOP.Give
      it a live video feed. opticalflow1 outputs two 32-bit floating point channels
      (red and green).  The red channel is the horizontal motion it detects at each
      pixel, and green is vertical motion. If it's flickering, it means likely that
      your video source is not feeding in 60 frames per second, so some images are
      repeats of the prior frame, which will give 0 optical flow for the current frame.Settings
      defines how many columns  of vectors you want.res1 averages a bunch of the flow
      pixels down to one value per column. res1's resolution is the same as the number
      of grid1's columns and rows.topto1 gets the pixels into one long set of samples
      for red and green.Filter1 smooths out the jittery motion (filter per sample).chopto1
      splices the red and green channels into the grid's Normal attribute's X and
      Y values. (Z is left at 1 but it doesn't matter here).sopt1 shows it as a table
      for illustration.The grid is passed to geo1 which uses a Line MAT to render
      the points and vectors. It assumes the vectors are coming in the Normals attribute.The
      render1 TOP's resolution is set to the correct aspect ratio using the Aspect
      parameter in the "settings" node, which is derived from the incoming image's
      aspect ratio.comp1 gets its images via the TOPs parameter.  Fixed Layer parameter
      is set to Input 1 to make sure the  output res matches the render's.
