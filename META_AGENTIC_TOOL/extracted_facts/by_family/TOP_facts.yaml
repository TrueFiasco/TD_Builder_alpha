    - from: constant1
      to: speed1
      input_index: '0'
    - from: moviein1
      to: transform1
      input_index: '0'
    - from: transform1
      to: cache_active
      input_index: '0'
    - from: transform1
      to: cache_active1
      input_index: '0'
    topology:
      operator_count: 9
      connection_count: 8
      has_parallel_paths: true
      max_chain_length: 4
    curator_text: This example uses 2 Cache TOPs to create trails of the original
      image. By setting the Output Index, you can adjust how close to the current
      frame the Cache TOPs output is.
  - example_name: example5
    operators:
    - name: lfo1
      type: CHOP:lfo
      role: isolated
