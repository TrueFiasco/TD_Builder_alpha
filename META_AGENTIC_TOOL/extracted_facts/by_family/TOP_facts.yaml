      type: CHOP:topto
      role: isolated
      parameters:
        top: limit4
        exportmethod: datname
    - name: topto5
      type: CHOP:topto
      role: isolated
      parameters:
        top: limit5
        exportmethod: datname
    - name: ramp1_keys
      type: DAT:table
      role: isolated
    - name: ramp2_keys
      type: DAT:table
      role: isolated
    connections:
    - from: ramp1
      to: null1
      input_index: '0'
    - from: ramp1
      to: limit1
      input_index: '0'
    - from: ramp1
      to: limit2
      input_index: '0'
    - from: ramp1
      to: limit3
      input_index: '0'
    - from: ramp2
      to: limit4
      input_index: '0'
    - from: ramp2
      to: limit5
      input_index: '0'
    topology:
      operator_count: 15
      connection_count: 6
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: 'limit1 sets a minimum of .25 and a maximum of .7 on all channels.That
      includes the alpha channel, which may not be desired. limit2 affects only the
      red and green channel, using the Channel Mask on the Common page.limit3 clamps
      like limit1, but then Normalizes the result to 0 to 1, and affects RGB only.topto1
      to 5 have their graphs fixed to the 0 to 1 range: Make their View Active, right-click
      on the graph, select Vertical Range, 0 1.ramp2 is not linear between black and
      white: Its interpolation is set to Ease In Ease Out (an S-curve).This helps
      show the difference between limit4 which Quantizes by value, and limit5 which
      quantizes by position (equal steps in the horizontal axis).'
  - example_name: example2
    operators: []
    connections: []
    topology:
      operator_count: 0
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: See RGB to HSV TOP example 2.See also the Limit CHOP.
- operator_type: lookupTOP
  examples:
  - example_name: example1
    operators:
    - name: ramp1
      type: TOP:ramp
      role: input
      parameters:
        dat: ramp1_keys
    - name: lookup1
      type: TOP:lookup
      role: processor
