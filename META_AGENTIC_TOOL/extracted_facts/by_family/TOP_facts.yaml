      role: input
      parameters:
        pageindex: 1
        format: rgba32float
    - name: noise2
      type: TOP:noise
      role: output
      parameters:
        period: 2
        harmon: 1
        format: rgba8fixed
    - name: noise3
      type: TOP:noise
      role: output
      parameters:
        pageindex: 3
        type: perlin3d
        period: 8.3
        resolutionw: 40
        resolutionh: 1
        filtertype: nearest
        format: rgba32float
    - name: sopto1
      type: CHOP:sopto
      role: isolated
      parameters:
        sop: transform1
        custom: 'on'
        attribscope: P
        renamescope: '"tx ty tz"'
        exportmethod: datname
    - name: topto1
