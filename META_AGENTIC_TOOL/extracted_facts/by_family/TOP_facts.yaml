        method: chop
        chop: toLookup
    - name: quantize
      type: CHOP:limit
      role: processor
      parameters:
        pageindex: 1
        quantvalue: floor
        vstep: 0.25
    - name: reorder1
      type: TOP:reorder
      role: output
      parameters:
        outputgreenchan: zero
        outputbluechan: zero
        outputalphachan: one
    - name: reorder2
      type: TOP:reorder
      role: output
      parameters:
        outputredchan: zero
        outputbluechan: zero
        outputalphachan: one
    - name: reorder3
      type: TOP:reorder
      role: output
      parameters:
        outputredchan: zero
        outputgreenchan: zero
        outputalphachan: one
    - name: reorder4
      type: TOP:reorder
      role: output
      parameters:
        outputredchan: alpha
        outputgreenchan: alpha
        outputbluechan: alpha
        outputalphachan: one
    - name: toLookup
      type: CHOP:null
      role: output
    - name: patternRed
      type: CHOP:pattern
      role: input
      parameters:
        wavetype: ramp
        channelname: r
    - name: ramp1_keys
      type: DAT:table
      role: isolated
    - name: patternBlue
      type: CHOP:pattern
      role: processor
      parameters:
        wavetype: tri
        numcycles: 4
        fromrange1: -1
        fromrange2: 1
        channelname: b
        combine: append
    - name: patternAlpha
      type: CHOP:pattern
      role: processor
      parameters:
        wavetype: ramp
        channelname: a
        combine: append
    - name: patternGreen
      type: CHOP:pattern
      role: processor
      parameters:
        wavetype: ramp
        torange1: 1
        channelname: g
        combine: append
    connections:
    - from: ramp1
      to: lookup1
      input_index: '0'
    - from: patternAlpha
      to: quantize
      input_index: '0'
    - from: lookup1
      to: reorder1
      input_index: '0'
    - from: lookup1
      to: reorder2
      input_index: '0'
    - from: lookup1
      to: reorder3
      input_index: '0'
    - from: lookup1
      to: reorder4
      input_index: '0'
    - from: quantize
      to: toLookup
      input_index: '0'
    - from: patternGreen
      to: patternBlue
      input_index: '0'
    - from: patternBlue
      to: patternAlpha
      input_index: '0'
    - from: patternRed
      to: patternGreen
      input_index: '0'
    topology:
      operator_count: 13
      connection_count: 10
      has_parallel_paths: true
      max_chain_length: 6
    curator_text: Compose 4 CHOP channels and apply the first CHOP channel to the
      red TOP channel, and so on.Unbypass Quantize for a variation.
  - example_name: example2
    operators:
    - name: null1
      type: TOP:null
      role: output
    - name: ramp2
      type: TOP:ramp
      role: input
      parameters:
        dat: ramp2_keys
        combineinput: res
    - name: topto2
      type: CHOP:topto
      role: isolated
      parameters:
        top: circle3
        exportmethod: datname
    - name: circle1
      type: TOP:circle
      role: input
      parameters:
        radiusx: 0.24
        radiusy: 0.24
        centerx: -0.27
        softness: 0.094
        combineinput: res
        resolutionw: 1024
        resolutionh: 1024
        format: rgba8fixed
    - name: circle2
      type: TOP:circle
      role: processor
      parameters:
        radiusx: 0.24
        radiusy: 0.24
        softness: 0.094
        operand: add
        resolutionw: 1024
        resolutionh: 1024
        format: rgba8fixed
    - name: circle3
      type: TOP:circle
      role: processor
      parameters:
        radiusx: 0.23
        radiusy: 0.23
        centerx: 0.27
        softness: 0.094
        operand: add
        resolutionw: 1024
        resolutionh: 1024
        format: rgba8fixed
    - name: lookup1
      type: TOP:lookup
      role: output
      parameters:
        channel: green
    - name: ramp2_keys
      type: DAT:table
      role: isolated
    connections:
    - from: circle3
      to: null1
      input_index: '0'
    - from: circle1
      to: circle2
      input_index: '0'
    - from: circle2
      to: circle3
      input_index: '0'
    - from: circle3
      to: lookup1
      input_index: '0'
    - from: ramp2
      to: lookup1
      input_index: '1'
    topology:
      operator_count: 8
      connection_count: 5
      has_parallel_paths: true
      max_chain_length: 4
    curator_text: 'From the "source image" (the first input), you can use different
      color channels (or combinations of the color channels) as an index into the
      color ramp.Try changing the Index Channel parameter to all the variations in
      the menu and understand why you get what you see.A 0 value of the index gets
      the color on the left of the ramp, and an index value of 1 gets it from the
      right.Note about Independent Alpha: By default the chosen index looks up all
      four channels from the lookup table image. If the Independent Alpha parameter
      is On, it does the alpha lookup independently: using the first input''s alpha
      channel as the index, it gets the value from lookup image''s alpha channel to
      output as the alpha. (this was legacy behavior)'
  - example_name: example3
    operators:
    - name: xy
      type: COMP:widget
      role: input
      parameters:
        pageindex: 10
        w: 180
        h: 180
        helpdat: ./code/help
        bgalpha: 1
        top: noise1
        topsmoothness: mipmap
        align: horizlr
        spacing: 1
        marginl: 3
        marginr: 3
        marginb: 3
        margint: 3
        justifyh: left
        justifyv: top
        crop: 'on'
        ext0promote: 'on'
        parentshortcut: Widget
    - name: xy_
      type: CHOP:null
      role: output
    - name: mono1
      type: TOP:mono
      role: processor
    - name: ramp1
      type: TOP:ramp
      role: input
      parameters:
        dat: ramp2_keys
        combineinput: res
    - name: ramp2
      type: TOP:ramp
      role: processor
      parameters:
        dat: ramp3_keys
        type: vertical
        operand: difference
    - name: noise1
      type: TOP:noise
      role: input
      parameters:
        seed: 6406
        period: 2.4
    - name: lookup1
      type: TOP:lookup
      role: processor
      parameters:
        channel: red
    - name: lookup2
      type: TOP:lookup
      role: processor
      parameters:
        channel: luminance
    - name: select1
      type: TOP:select
      role: input
      parameters:
        top: mono1
    - name: multiply1
      type: TOP:multiply
      role: output
      parameters:
        legacyxform: 'on'
    - name: multiply2
      type: TOP:multiply
      role: output
      parameters:
        legacyxform: 'on'
    - name: ramp2_keys
      type: DAT:table
      role: isolated
    - name: ramp3_keys
      type: DAT:table
      role: isolated
    - name: rectangle1
      type: TOP:rectangle
      role: isolated
      parameters:
        sizex: 1
        sizey: 0.2
        borderwidth: 0.036
        combineinput: res
        resolutionw: 100
        resolutionh: 100
    - name: moviefilein2
      type: TOP:moviefilein
      role: input
      parameters:
        format: rgba32float
    connections:
    - from: xy/valueOut
      to: xy_
      input_index: '0'
    - from: moviefilein2
      to: mono1
      input_index: '0'
    - from: ramp1
      to: ramp2
      input_index: '0'
    - from: mono1
      to: lookup1
      input_index: '0'
    - from: ramp2
      to: lookup1
      input_index: '1'
    - from: select1
      to: lookup2
      input_index: '0'
    - from: noise1
      to: lookup2
      input_index: '1'
    - from: mono1
      to: multiply1
      input_index: '0'
    - from: lookup1
      to: multiply1
      input_index: '1'
    - from: select1
      to: multiply2
      input_index: '0'
    - from: lookup2
      to: multiply2
      input_index: '1'
    topology:
      operator_count: 15
      connection_count: 11
      has_parallel_paths: true
      max_chain_length: 4
    curator_text: 'The lookup1 image is tinted green to yellow because the Lookup
      CHOP needs a 1-dimensional line of pixels as a lookup, so it needs to choose
      what part of ramp2 to use. The Lookup TOP use its Dark UV and Light UV parameters
      to extract a line of pixels from ramp2, and here it is 0,0 to 1,0: the bottom
      row of pixels. Change it to 0,1 and 1,1 to get the rop row of pixels. Or any
      2 sets of UV points in ramp2.lookup2 extracts a small horizontal section of
      the noise image.'
  - example_name: example4
    operators:
    - name: triColorTinter
      type: COMP:base
      role: isolated
      parameters:
        pageindex: 3
    connections: []
    topology:
      operator_count: 1
      connection_count: 0
      has_parallel_paths: false
