    - from: ramp3
      to: chanmix_swap_green_and_blue
      input_index: '0'
    - from: ramp3
      to: chanmix_invert_green_and_blue
      input_index: '0'
    - from: ramp3
      to: chanmix_subtract_green_and_blue_alpha
      input_index: '0'
    topology:
      operator_count: 7
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: In this example we subtract the alpha from Green and Blue channels,
      leaving only Red.The Level TOP can produce similar effects, but cannot mix channels.
  - example_name: example5
    operators:
    - name: ramp4
      type: TOP:ramp
      role: input
      parameters:
        dat: ramp4_keys
        type: vertical
    - name: ramp4_keys
      type: DAT:table
      role: isolated
    - name: chanmix_subtract_white
      type: TOP:chanmix
      role: output
      parameters:
        constant1: -1
        constant2: -1
        constant3: -1
    - name: chanmix_subtract_white1
      type: TOP:chanmix
      role: output
      parameters:
        constant1: -1
        constant2: -1
        constant3: -1
    - name: chanmix_subtract_white2
