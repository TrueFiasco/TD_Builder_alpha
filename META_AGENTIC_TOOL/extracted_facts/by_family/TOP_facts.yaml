    connections:
    - from: ramp4
      to: chanmix_subtract_white
      input_index: '0'
    - from: ramp4
      to: chanmix_subtract_white1
      input_index: '0'
    - from: ramp4
      to: chanmix_subtract_white2
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 3
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: In this example we subtracted white from the signal, leaving black.R
      = R - 1 is always <1, which clamps at black for 8-bit color.But if the pixels
      are floating point, they have values outside to 0-1 range.
  - example_name: example6
    operators:
    - name: null1
      type: TOP:null
      role: output
      parameters:
        pageindex: 1
    - name: null2
      type: TOP:null
      role: output
    - name: topto1
