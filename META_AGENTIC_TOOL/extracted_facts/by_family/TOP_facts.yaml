    curator_text: The Noise TOP takes its input, interprets each pixel RGB value as
      an XYZ point, and for each point, outputs a pixel whose RGB values are the values
      of the noise space at that point in space.In the first example, chopto1 outputs
      32-bit floating point pixels which can represent numbers outside the usual 0-1
      color range of 8-bit fixed point pixels.The Noise TOP has been changed to a
      32-bit float format so that it can output noise values that are outside the
      0-1 range.In the first example, the Noise TOP's RGB values are used to color
      the points, but they can be used for anything.In the second example, the Ramp
      and Constant TOPs are set to 32-bit and combined and fed into the Noise TOP.
      The sliders offset the XYZ positions used to sample the noise space.
