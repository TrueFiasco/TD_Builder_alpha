        exporttable: info1_export
    - name: null2
      type: TOP:null
      role: processor
    - name: null3
      type: TOP:null
      role: output
    - name: ramp1
      type: TOP:ramp
      role: input
      parameters:
        pageindex: 2
        dat: ramp1_keys
        format: rgba32float
    - name: ramp2
      type: TOP:ramp
      role: input
      parameters:
