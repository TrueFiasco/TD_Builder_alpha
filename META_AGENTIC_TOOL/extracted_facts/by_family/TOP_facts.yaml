  - example_name: example2
    operators:
    - name: text_html
      type: DAT:text
      role: isolated
    - name: webrender1
      type: TOP:webrender
      role: isolated
      parameters:
        active: 'on'
        source: dat
        dat: text_html
        outputresolution: custom
        resolutionw: 1280
        resolutionh: 720
    - name: text_stylesAndContent
      type: DAT:text
      role: isolated
    connections: []
    topology:
      operator_count: 3
      connection_count: 0
      has_parallel_paths: false
      max_chain_length: 1
    curator_text: This is an example on how to use Javascript to dynamically change
      the content of what is being displayed via the webrenderTOP.All of this is done
      with the webrenderTOP's executeJavaScript() method.For it to work, first any
      css rule is removed from the web page.Next new css rules are being created.Finally
      the body of the document is updated which displays text formated with the specified
      style.All of this can be neatly organized in extensions and components to create
      a fully dynamic system for text layout and formating.For more information on
      javascript and css please refer to websites like https://www.w3schools.comTo
      try this, edit and run the text_stylesAndContent Text DAT.
