    curator_text: 'Note: The DirectX In/Out TOPs are only available on Windows in
      TouchDesigner Educational, TouchDesigner Commercial and TouchDesigner Pro. Therefore
      in this snippet these nodes are currently bypassed to prevent errors for TouchDesigner
      Non-Commercial licenses, toggle their bypass icon to enable them.  The DirectX
