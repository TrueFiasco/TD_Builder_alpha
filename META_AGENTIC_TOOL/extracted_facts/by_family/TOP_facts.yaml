      connection_count: 5
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: The Threshold TOP creates a matte with pixel values set to 0 for
      pixels below the threshold value, and 1 for pixels greater than or equal to
      the threshold value. Operator 'thresh2_greater' has its comperator set to greater
      instead of less, which results in an inverted matte.You can fill alpha with
      the red channel, or 1.
