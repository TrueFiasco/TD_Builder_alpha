    topology:
      operator_count: 14
      connection_count: 6
      has_parallel_paths: false
      max_chain_length: 4
    curator_text: This crossfades and switches a list of movies without a frame drop.
      It randomizes the order of movies every cycle through all movies.You give it
      a list of movie paths in a DAT, choose a crossfade time in "spec", and press
      Start on either of the movieEngines.It uses movieEngine, which is moviePlayer
      without a UI. They have been modded slightly as documented internally in purple.
      The callbacks it uses is engine_callbacks here.movieEngine uses mvspec components
      which define what to play and controls image appearance.comp1 adds the images,
      and forces the resolution to be constant.
- operator_type: moviefileoutTOP
  examples:
  - example_name: example1
