      role: isolated
      parameters:
        pageindex: 3
        clone: fadeDelay0
    - name: fadeDelay2
      type: COMP:base
      role: isolated
      parameters:
        pageindex: 3
        clone: fadeDelay0
    - name: fadeDelay3
      type: COMP:base
      role: isolated
      parameters:
        pageindex: 3
        clone: fadeDelay0
    - name: transform2
      type: TOP:transform
      role: processor
      parameters:
        rotate: -32
        compover: 'on'
        limittiles: 'on'
    - name: lfo1_export
      type: DAT:table
      role: isolated
    - name: cacheselect0
      type: TOP:cacheselect
      role: isolated
      parameters:
