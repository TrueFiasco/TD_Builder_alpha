- operator_type: packTOP
  examples:
  - example_name: example1
    operators:
    - name: pack_8BitMono
      type: TOP:pack
      role: processor
      parameters:
        pageindex: 1
    - name: pack_pack8BitRGBA
      type: TOP:pack
      role: processor
    - name: reorder_32BitBlueOnly
      type: TOP:reorder
      role: processor
      parameters:
        outputredchan: blue
        outputgreenchan: zero
        outputbluechan: zero
        outputalphachan: zero
        format: mono32float
    - name: jellybeans_32BitFloatRGBA
      type: TOP:moviefilein
      role: input
    - name: jellybeans_32BitFloatRGBA1
      type: TOP:moviefilein
      role: input
    - name: pack_unpackTo32BitFloatRGBA
      type: TOP:pack
      role: output
      parameters:
        packtype: unpackrgbA
    - name: pack_unpackto32BitFloatMono
      type: TOP:pack
      role: processor
      parameters:
        packtype: unpackr
    - name: reorder_MonoToFloatingPointRGBA
      type: TOP:reorder
      role: output
      parameters:
        outputredchan: zero
        outputgreenchan: zero
        outputbluechan: red
        outputalphachan: one
        format: rgba32float
    connections:
    - from: reorder_32BitBlueOnly
      to: pack_8BitMono
      input_index: '0'
    - from: jellybeans_32BitFloatRGBA
      to: pack_pack8BitRGBA
      input_index: '0'
    - from: jellybeans_32BitFloatRGBA1
      to: reorder_32BitBlueOnly
      input_index: '0'
    - from: pack_pack8BitRGBA
      to: pack_unpackTo32BitFloatRGBA
      input_index: '0'
    - from: pack_8BitMono
      to: pack_unpackto32BitFloatMono
      input_index: '0'
    - from: pack_unpackto32BitFloatMono
      to: reorder_MonoToFloatingPointRGBA
      input_index: '0'
    topology:
      operator_count: 8
      connection_count: 6
      has_parallel_paths: false
      max_chain_length: 5
    curator_text: Pack is used to put 32-bit RGBA floating point images into quadruple-wide
      8-bit fixed point image to make them more transportable through lossless file
      formats that are just 8-bit, or 8-bit protocols like Spout/Siphon. Then the
      Pack TOP can unpack on the other side.In the second example, we just do it to
      a single floating point channel, reorder_32BitRedOnly gets the blue channel
      only, and outputs a single-channel TOP (see its Pixel Format parameter). Then
      we pack that single channel into 8-bit form (pack_8BitMono). Then we unpack
      it as a mono floating point channel. The last reorder takes that one channel
      and puts it as the blue channel of an RGBA 32-bit image.In the packed format,
      every 32-bit pixel is converted to 4 8-bit pixels. It's lossless.
