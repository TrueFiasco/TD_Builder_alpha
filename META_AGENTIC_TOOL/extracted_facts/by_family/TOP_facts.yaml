      role: isolated
      parameters:
        top: noise3
        a: '""'
        exportmethod: datname
    - name: chopto1
      type: TOP:chopto
      role: input
      parameters:
        chop: sopto1
        dataformat: rgb
        filtertype: nearest
    - name: chopto2
      type: SOP:chopto
      role: output
      parameters:
        chop: topto1
        chanscope: '"r g b"'
        attscope: '"Cd(0) Cd(1) Cd(2)"'
    - name: circle1
      type: SOP:circle
      role: input
      parameters:
        reverseanchors: 'on'
    - name: sliderx
      type: COMP:slider
      role: isolated
      parameters:
        label: x
        value0: 0.616162
        w: 100
        h: 20
        bgalpha: 1
        topsmoothness: mipmap
        borderar: 0.43
        borderag: 0.43
        borderab: 0.43
        leftborder: bordera
        rightborder: bordera
        bottomborder: bordera
