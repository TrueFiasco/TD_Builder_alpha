      role: output
      parameters:
        videocodec: mpeg4
        audiochop: toMovieout
    - name: incrementFilename
      type: CHOP:count
      role: output
      parameters:
        pageindex: 1
        resetvalue: 1
        timeslice: 'on'
        exporttable: count1_export
    connections:
    - from: audiofilein1
      to: toMovieout
      input_index: '0'
    - from: moviein1
      to: transform1
      input_index: '0'
    - from: transform1
      to: moviefileout1
      input_index: '0'
    - from: recordMovie/out1
      to: incrementFilename
      input_index: '0'
    topology:
      operator_count: 9
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: This is a typical Movie Out setup with audio recording synced to
      an audio track.The Record Movie button turns Record on and off, as well as triggers
      a counter to give each new recording a unique name.The Pause button pauses the
      movie recording while it is on.Audio is being referenced from audiofilein1.The
      movie is created in your project folder where your .toe is located.Press Reset
      pulse on the incrementFilename Count CHOP to reset the sequence number to 1.
  - example_name: example2
    operators:
    - name: moviein1
      type: TOP:moviefilein
      role: input
    - name: transform1
      type: TOP:transform
      role: processor
      parameters:
        limittiles: 'on'
    - name: recordMovie
      type: COMP:button
      role: input
      parameters:
        label: '"Record movie"'
        buttontype: toggledown
        scaletofit: onlyshrink
        w: 50
        h: 50
        top: ./bg
        topsmoothness: mipmap
    - name: count1_export
      type: DAT:table
      role: isolated
    - name: moviefileout1
