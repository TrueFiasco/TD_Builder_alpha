      role: output
      parameters:
        red1: 1
        red2: 0.5
        blue2: 0.5
        blue3: 1
    connections:
    - from: ramp2
      to: chanmix_no_green
      input_index: '0'
    - from: ramp2
      to: chanmix_push_green_to_redblue
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 2
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: The adding of the Red and Blue channels into each others channels
      creates purple. Green is 0.Connect moviefilein1 to chanmix_push_green_to_redblue.
  - example_name: example4
    operators:
    - name: ramp3
      type: TOP:ramp
      role: input
      parameters:
        dat: ramp3_keys
        type: vertical
    - name: level1
      type: TOP:level
      role: output
      parameters:
        pageindex: 2
        clampinput: clamp
    - name: ramp3_keys
      type: DAT:table
      role: isolated
    - name: moviefilein1
      type: TOP:moviefilein
      role: isolated
    - name: chanmix_swap_green_and_blue
      type: TOP:chanmix
      role: output
      parameters:
        green3: 1
        blue2: 1
    - name: chanmix_invert_green_and_blue
      type: TOP:chanmix
      role: output
      parameters:
