        size: 32
        offsety: 2
        offsetz: 1
    connections:
    - from: moviein3
      to: blur_blur_rotate
      input_index: '0'
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: In this example the direction of the blur is rotated.
  - example_name: example6
    operators:
