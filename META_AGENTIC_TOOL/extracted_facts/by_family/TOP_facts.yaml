    curator_text: Matthew Ragan  8/11/14We can use the Normal Map TOP to help enhace
      the appearance of dimension in our textures by "faking" some of the lightingof
      bumps in a texture.Here we create a normal map from our input image, and then
      use this along with the original image in our  Phong MAT.An additional Level
      TOP has been used in this example to further draw attention to the effect of
      the Normal Map.Use the button to toggle the Normal Map on and off in the Phong
      Material to better understand the effect of this TOP.from WikipediaIn 3D computer
      graphics, normal mapping, or "Dot3 bump mapping", is a technique used for faking
      the lighting of bumps and dents – an implementation of bump mapping. It is used
      to add details without using more polygons. A common use of this technique is
      to greatly enhance the appearance and details of a low polygon model by generating
      a normal map from a high polygon model or height map.http://en.wikipedia.org/wiki/Normal_mapping
