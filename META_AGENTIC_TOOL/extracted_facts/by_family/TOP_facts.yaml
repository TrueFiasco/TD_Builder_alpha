      the result of each action is2. Pick the color in the input image we want to
      modify. For this we crop the image and use an Analyze TOP to extract the color
      of the red flower. We use this RGB value for the Start Color parameter of the
      HSV Adjust TOP. This the hue that the HSV adjustment is centered around. When
      adjusting a small hue range, this is the color that will be altered.2. Limit
      the Hue Range. This is the range of color from the Start Color that will be
      adjusted. A range of 1 will only adjust colors that are the same as the start
      color.3. Adjust the Hue Offset, watch the Difference TOP, and first adjust the
      Hue Range, then the Saturation Range, then the Value Range until you only see
      a change in the desired color areas. 4. Then finetune with the Hue Falloff,
      Saturation Falloff, Value Falloff. Higher values give more falloff, blending
      the range softly from hues/saturations/values that are adjusted to ones are
      not.
- operator_type: hsvtorgbTOP
  examples:
  - example_name: example1
    operators:
    - name: ramp1
      type: TOP:ramp
      role: input
      parameters:
        dat: ramp1_keys
        type: vertical
    - name: hsvrgb1
      type: TOP:hsvrgb
      role: output
    - name: reorder1
      type: TOP:reorder
      role: processor
      parameters:
        outputgreen: input2
        outputgreenchan: red
        outputblue: input3
        outputbluechan: red
    - name: constant1
      type: TOP:constant
      role: input
    - name: constant2
      type: TOP:constant
      role: input
    - name: ramp1_keys
      type: DAT:table
      role: isolated
    connections:
    - from: reorder1
      to: hsvrgb1
      input_index: '0'
    - from: ramp1
      to: reorder1
      input_index: '0'
    - from: constant1
      to: reorder1
      input_index: '1'
    - from: constant2
      to: reorder1
      input_index: '2'
    topology:
      operator_count: 6
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: Put hue in the first channel, saturation in the second channel,
      value in the third channel, and use HSV to RGB to interpret those three channels
      as HSV and convert the image to RGB.In this case, hue is a ramp from 0 to 1.
      In TouchDesigner, a hue of value 0 is red, .33 is green, .66 is blue and 1 is
      red again.
