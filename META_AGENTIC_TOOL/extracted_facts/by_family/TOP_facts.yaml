    curator_text: 'This example fetches a biplane USDZ asset from the Apple Augmented
      Reality 3D models website. (See https://developer.apple.com/augmented-reality/quick-look/
      for other examples.)A biplane 3D asset is used here to explain order independent
      transparency as there are many seperate objects that intersect at different
      angles to make polygon and object level ordering difficult.Adjust the Transparency/Peel
      Layers parameter between 1 and 6 to reveal more back-surfaces.The render TOP
      has an option for the Transparency parameter found on the main Render page called
      "Order Independent Transparency". Then using the Transparency / Peel Layers
      you can adjust the number of layers required to make the transparency look good.  This
      method isn''t perfect but it can do a very good job in many cases.NOTE: Remember
      that all materials need to have their Blending (Transparency) parameter disabled
      for this RenderTOP option to work. The material for this asset happens to be
      found at the path toy_biplane/propeller/pCube20.'
