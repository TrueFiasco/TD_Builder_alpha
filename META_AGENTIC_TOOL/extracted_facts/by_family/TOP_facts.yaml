    - name: ramp1_keys2
      type: DAT:table
      role: isolated
    connections:
    - from: ramp3
      to: pack1
      input_index: '0'
    - from: pack1
      to: pack2
      input_index: '0'
    topology:
      operator_count: 13
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: ramp1 is normal RGBA 8-bit.ramp2 is 1-channel 8-bit.ramp3 is 1-channel
      32-bit float. You can see its better precision in the ramp.ramp3 is in a similar
      format that you would have for a depth map or a point cloud.pack1 puts ramp3
      into an RGBA 8-bit image that can be commonly saved in a file.Right-click on
      the node and Save Image...or you can write it out with the Movie File Out TOP.
- operator_type: pointfileinTOP
  examples:
  - example_name: example1
    operators:
    - name: cam1
      type: COMP:cam
      role: isolated
      parameters:
        tx: 0.22
        ty: 0.4
        tz: 2.8
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 1
        ry: -40
        instancing: 'on'
        instancetop: null1
        instanceactive: a
        instancetx: r
        instancety: g
        instancetz: b
        instancer: r
        instanceg: g
        instanceb: b
        material: line1
    - name: info1
      type: DAT:info
      role: isolated
      parameters:
        op: pointfilein1
    - name: info2
      type: CHOP:info
      role: isolated
      parameters:
        op: pointfilein1
    - name: line1
      type: MAT:line
      role: isolated
      parameters:
        distancefar: 4
        widthnear: 6
        drawpoints: 'on'
        pointsizemultiplier: 0.25
        legacyalphabehavior: 'on'
    - name: math1
      type: TOP:math
      role: output
      parameters:
        pageindex: 2
        fromrange2: 255
    - name: null1
      type: TOP:null
      role: output
    - name: light1
      type: COMP:light
      role: isolated
      parameters:
        pageindex: 2
        tz: 10
    - name: render1
      type: TOP:render
      role: isolated
      parameters:
        geometry: geo1
        uvunwrapcoordattrib: uv
        resolutionw: 1280
        resolutionh: 720
    - name: pointfilein1
      type: TOP:pointfilein
      role: input
    - name: pointfileselect1
      type: TOP:pointfileselect
      role: input
      parameters:
        pageindex: 1
        pointfileintop: pointfilein1
        red: red
        green: green
        blue: blue
    connections:
    - from: pointfileselect1
      to: math1
      input_index: '0'
    - from: pointfilein1
      to: null1
      input_index: '0'
    topology:
      operator_count: 11
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: Point File In TOP reads a .ply point cloud file.info1 shows that
      it has 10 channels including point colors in 'red', 'green' and 'blue' channels.info2
      shows number of points.Most TOPs can only hold up to 4 channels, so null1 gets
      the first 4, which are X Y Z and 'active'. 'active' (in the alpha channel of
      the image) is a channel that indicates if the pixel is a valid point or not
      (orange = Nan = not a point).pointfileselect1 is used to get the other channels
      into a TOP... in this case, the channels it selects are the point colors - 'red',
      'green', 'blue' as they are named in the file.The colors in the .ply file are
      0-255 so math1 scales them down to 0-1.geo1 contains one point that is converted
      to a 1-point particle system, needed to render Line MAT from TOPs.
  - example_name: example2
    operators:
    - name: eval1
      type: DAT:eval
      role: isolated
      parameters:
        expr: op('pointfilein1').numPoints
    - name: eval2
      type: DAT:eval
      role: isolated
      parameters:
        expr: op('pointfilein1').numSrcPoints
    - name: eval3
      type: DAT:eval
      role: isolated
      parameters:
        expr: op('pointfilein1').numLoadedPoints
    - name: info1
      type: CHOP:info
      role: isolated
      parameters:
        op: pointfilein1
    - name: analyze1
      type: TOP:analyze
      role: output
      parameters:
        op: count
        excludenans: 'on'
        mask: alpha
    - name: pointfilein1
      type: TOP:pointfilein
      role: input
      parameters:
        pageindex: 4
        outputresolution: quarter
    connections:
    - from: pointfilein1
      to: analyze1
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The resolution is reduced via the Output Resolution menu on the
      Common page to 1/4 by 1/4 = 1/16 the number of points in the file. This is shown
      in info2 and the eval1, eval2 expressions.
- operator_type: pointtransformTOP
  examples:
  - example_name: example1
    operators:
    - name: info1
      type: DAT:info
      role: isolated
      parameters:
        op: pointfilein1
    - name: null1
      type: TOP:null
      role: processor
      parameters:
        pageindex: 1
    - name: null2
      type: TOP:null
      role: output
    - name: null3
      type: TOP:null
      role: output
    - name: pointfilein1
      type: TOP:pointfilein
      role: input
    - name: pointtransform1
      type: TOP:pointtransform
      role: processor
      parameters:
        tx: 1.4
        ty: 0.7
        rz: 40
        sx: 0.8
        sy: 0.8
        sz: 0.8
    - name: pointtransform2
      type: TOP:pointtransform
      role: processor
      parameters:
        pageindex: 1
        aligntx: origin
        alignty: origin
        fromy: min
        aligntz: origin
        fromz: max
        alignscale: unity
    - name: pointtransform3
      type: TOP:pointtransform
      role: processor
      parameters:
        pageindex: 1
        scale: 20
        alignxformorder: aligntransform
        aligntx: origin
        alignty: origin
        fromy: min
        aligntz: origin
        fromz: max
        alignscale: unity
    connections:
    - from: pointfilein1
      to: null1
      input_index: '0'
    - from: pointtransform2
      to: null2
      input_index: '0'
    - from: pointtransform3
      to: null3
      input_index: '0'
    - from: null1
      to: pointtransform1
      input_index: '0'
    - from: pointtransform1
      to: pointtransform2
      input_index: '0'
    - from: pointtransform1
      to: pointtransform3
      input_index: '0'
    topology:
      operator_count: 8
      connection_count: 6
      has_parallel_paths: true
      max_chain_length: 5
    curator_text: 'for points, x is in the red color channel, y is in green, z is
      in blue.pointtransform1 moves the banana to a randon location, angle and scale.pointtransform2
      lines it up on the Align page: in X, the banana is centered around x=0.in Y,
      the bottom of the banana is on the X axis at y=0.In Z is is pushed back where
      the closest point is at Z=0.Then the whole thing is normalized using Align Scale
      to make the largest dimension (X in this case) size 1. You can see that in null2:
      R goes -.5 to .5.pointtransform3 does the same as pointtransform2, but then
      it scales the result by 20 as a "post-transform". To post-transform, you have
      to set the Align Transform Order to "Align, then Transform" and set the Scale
      on the Transform page to 20.'
  - example_name: example2
    operators:
    - name: null1
      type: TOP:null
      role: processor
      parameters:
        pageindex: 1
    - name: null2
      type: TOP:null
      role: output
    - name: pointfilein1
      type: TOP:pointfilein
      role: input
      parameters:
        red: x
        green: y
        blue: z
    - name: comp_subtract
      type: TOP:comp
      role: processor
      parameters:
        operand: subtract
        legacyxform: 'on'
    - name: pointtransform1
      type: TOP:pointtransform
      role: processor
      parameters:
        tx: 2
        ty: 1
        rz: 40
        sx: 0.7
        sy: 0.6
        sz: 0.5
    - name: pointtransform_invert
      type: TOP:pointtransform
      role: processor
      parameters:
        tx: 2
        ty: 1
        rz: 40
        sx: 0.7
        sy: 0.6
        sz: 0.5
        invert: 'on'
    connections:
    - from: pointfilein1
      to: null1
      input_index: '0'
    - from: comp_subtract
      to: null2
      input_index: '0'
    - from: pointtransform_invert
      to: comp_subtract
      input_index: '0'
    - from: null1
      to: comp_subtract
      input_index: '1'
    - from: null1
      to: pointtransform1
      input_index: '0'
    - from: pointtransform1
      to: pointtransform_invert
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 6
      has_parallel_paths: true
      max_chain_length: 6
    curator_text: pointtransform1 moves the banana to a new position, angle and scale.pointtransform_invert
      moves it right back to its original position, rotation and scale, using the
      same parameter values as pointtransform1 and turning on the Invert toggle.Think
      of it as moving FROM the position/rotate/scale defined by the parameter TO a
      null translate/rotate of 0 and scale of 1.The Math CHOP doesn't have multi-inputs,
      so use the Composite TOP and in this case use Subtract to verify the resulting
      points are the same as the starting points.
  - example_name: example3
    operators:
    - name: null1
      type: TOP:null
      role: processor
      parameters:
        pageindex: 1
    - name: transform1
      type: CHOP:transform
      role: input
      parameters:
        pageindex: 1
        tx: 2
        ty: 1
        rz: 40
        sx: 0.7
        sy: 0.7
        sz: 0.7
    - name: transform2
      type: CHOP:transform
      role: output
      parameters:
        pageindex: 2
        output: mat
    - name: pointfilein1
      type: TOP:pointfilein
      role: input
    - name: pointtransform1
      type: TOP:pointtransform
      role: output
      parameters:
        chopinput: transform1
    - name: pointtransform2
      type: TOP:pointtransform
      role: output
      parameters:
        chopinput: transform2
    connections:
    - from: pointfilein1
      to: null1
      input_index: '0'
    - from: transform1
      to: transform2
      input_index: '0'
    - from: null1
      to: pointtransform1
      input_index: '0'
    - from: null1
      to: pointtransform2
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 3
    curator_text: You can get transform values from a CHOP, as long as you have the
      right channel names. The transform CHOP outputs channels as tx ty tz rx ry rz
      etc, and giving that to the Transform CHOP parameter works to tranform from
      CHOPs.transform2 take the transform channels from transform1 and converts them
      to a 4x4 matrix, which is also acceptable for pointtransform2.
  - example_name: example4
    operators:
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        tz: 2
    - name: lfo1
      type: CHOP:lfo
      role: isolated
      parameters:
        pageindex: 1
        frequency: 0.2
        amp: 2
        channelname: tx
        timeslice: 'on'
        exporttable: lfo1_export
    - name: null1
      type: TOP:null
      role: processor
      parameters:
        pageindex: 1
    - name: lfo1_export
      type: DAT:table
      role: isolated
    - name: pointfilein1
      type: TOP:pointfilein
      role: input
      parameters:
        red: x
        green: y
        blue: z
    - name: pointtransform3
      type: TOP:pointtransform
      role: output
      parameters:
        lookat: geo1
        forwarddir: posz
    connections:
    - from: pointfilein1
      to: null1
      input_index: '0'
    - from: null1
      to: pointtransform3
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: This rotates the point data to make its z-axis point at a 3D object.
      Here we assume the point data is at 0, 0, 0. geo1 is at 0, 0, 2, which is along
      the positive z-axis pointing toward you. and it's oscillating in X via the LFO
      from -2 to +2.You think of it as the Z-axis of the TOP's axes being rotated
      to point at the Look at object.Here the "Up vector" is the Y axis (0, 1, 0).
- operator_type: poptoTOP
  examples:
  - example_name: example1
    operators:
    - name: copy1
      type: POP:copy
      role: processor
      parameters:
        ncy: 5
        tx: 3.4
    - name: torus1
      type: POP:torus
      role: input
      parameters:
        pageindex: 1
    - name: comment1
      type: COMP:annotate
      role: isolated
      parameters:
        pageindex: 3
        utility: 'on'
        includeinorder: 'on'
    - name: popto_one_row
