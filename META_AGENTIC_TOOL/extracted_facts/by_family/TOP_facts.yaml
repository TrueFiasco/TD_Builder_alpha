      to: ray1
      input_index: '0'
    - from: torus1
      to: ray1
      input_index: '1'
    - from: grid1
      to: field1
      input_index: '0'
    - from: grid1
      to: normalize1
      input_index: '0'
    topology:
      operator_count: 12
      connection_count: 4
      has_parallel_paths: true
      max_chain_length: 2
- operator_type: projectionTOP
  examples:
  - example_name: example1
    operators:
    - name: cubeMap
      type: TOP:null
      role: processor
    - name: cubemap1
      type: TOP:cubemap
      role: processor
      parameters:
        mode: verticalcrosstocubemap
    - name: projection1
      type: TOP:projection
      role: processor
      parameters:
        outputresolution: custom
        resolutionw: 2000
        resolutionh: 1000
        outputaspect: resolution
    - name: projection2
      type: TOP:projection
      role: output
      parameters:
        input: equirectangular
        output: fisheye
        outputresolution: custom
        resolutionw: 1000
        resolutionh: 1000
        outputaspect: resolution
    - name: projection3
      type: TOP:projection
      role: output
      parameters:
        output: fisheye
        outputresolution: custom
        resolutionw: 1000
        resolutionh: 1000
        outputaspect: resolution
    - name: projection4
      type: TOP:projection
      role: output
      parameters:
        output: fisheye
        ry: 180
        outputresolution: custom
        resolutionw: 1000
        resolutionh: 1000
        outputaspect: resolution
    - name: projection7
      type: TOP:projection
      role: output
      parameters:
        output: fisheye
        fov: 360
    - name: renderCubeMap
      type: COMP:base
      role: input
    connections:
    - from: renderCubeMap/out1
      to: cubeMap
      input_index: '0'
    - from: cubemap
      to: cubemap1
      input_index: '0'
    - from: cubeMap
      to: projection1
      input_index: '0'
    - from: projection1
      to: projection2
      input_index: '0'
    - from: cubeMap
      to: projection3
      input_index: '0'
    - from: cubeMap
      to: projection4
      input_index: '0'
    - from: cubemap1
      to: projection7
      input_index: '0'
    topology:
      operator_count: 8
      connection_count: 7
      has_parallel_paths: true
      max_chain_length: 1
    curator_text: cubeMap is a 6-camera-in-one rendering created with the Render TOP.It
      renders the entire view around the camera.projection1 need the Projection Type
      parameter to be set to the input's type, and its output in this case is Equirectangular.You
      need to set its resolution and aspect ratio on the Common page.  The Rotate
      parameter lets you specify which direction is "staight ahead".projection2 converts
      the Equirectangular map to a Fish-Eye.  Again, the Rotate parameter lets you
      specify which direction is "staight ahead".Also Fish-Eye lets you select what
      the viewing angle is to the perimeter outer ring, default 180 degrees.projection3
      is the same thing but it gets its input from the cube map. projection4 is rotated
      to look behind.
  - example_name: example2
    operators:
    - name: projection1
      type: TOP:projection
      role: output
      parameters:
        pageindex: 1
        input: equirectangular
        output: fisheye
        outputresolution: custom
        resolutionw: 1024
        resolutionh: 1024
        outputaspect: resolution
    - name: projection2
      type: TOP:projection
      role: processor
      parameters:
        pageindex: 1
        input: equirectangular
        output: cubemap
        outputresolution: custom
        resolutionh: 1280
        outputaspect: resolution
    - name: projection3
      type: TOP:projection
      role: processor
      parameters:
        outputresolution: custom
        resolutionw: 2000
        resolutionh: 1000
        outputaspect: resolution
    - name: projection4
      type: TOP:projection
      role: output
      parameters:
        rx: 90
        outputresolution: custom
        resolutionw: 2000
        resolutionh: 1000
        outputaspect: resolution
    - name: projection5
      type: TOP:projection
      role: output
      parameters:
        input: equirectangular
        rx: 90
        outputresolution: custom
        resolutionw: 2000
        resolutionh: 1000
        outputaspect: resolution
    - name: moviefilein1
      type: TOP:moviefilein
      role: input
    connections:
    - from: moviefilein1
      to: projection1
      input_index: '0'
    - from: moviefilein1
      to: projection2
      input_index: '0'
    - from: projection2
      to: projection3
      input_index: '0'
    - from: projection2
      to: projection4
      input_index: '0'
    - from: projection3
      to: projection5
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 5
      has_parallel_paths: true
      max_chain_length: 4
    curator_text: This converts from an existing equirectangular image.projection3
      has its resolution and aspect ratio changed on the Common page.projection4 is
      rotated to be looking down-up along the horizontal center line. Same as projection5.  They
      are both equiractangulars too.See also the Cube Map TOP.
  - example_name: example3
    operators:
    - name: lfo1
      type: CHOP:lfo
      role: input
      parameters:
        wavetype: ramp
        offset: -0.41
        timeslice: 'on'
    - name: blur1
      type: TOP:blur
      role: processor
      parameters:
        size: 18
    - name: blur2
      type: TOP:blur
      role: processor
      parameters:
        size: 18
    - name: comp1
      type: TOP:comp
      role: processor
      parameters:
        legacyxform: 'on'
    - name: null2
