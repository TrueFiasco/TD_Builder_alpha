    topology:
      operator_count: 6
      connection_count: 3
      has_parallel_paths: false
      max_chain_length: 3
    curator_text: You can perform simple scaling  in a Transform TOP
  - example_name: example5
    operators:
    - name: null1
      type: CHOP:null
