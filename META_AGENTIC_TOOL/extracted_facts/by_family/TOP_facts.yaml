      role: isolated
      parameters:
        wavetype: ramp
    - name: ramp1_keys
      type: DAT:table
      role: isolated
    - name: moviefilein1
      type: TOP:moviefilein
      role: input
    - name: add2_processedBloom
      type: TOP:add
      role: output
    connections:
    - from: bloom1
      to: add1
      input_index: '0'
    - from: moviefilein1
      to: add1
      input_index: '1'
    - from: bloom1
      to: comp1
      input_index: '0'
    - from: moviefilein1
      to: comp1
      input_index: '1'
    - from: level1
      to: bloom1
      input_index: '0'
    - from: moviefilein1
      to: bloom2
      input_index: '0'
    - from: chroma1
      to: level1
      input_index: '0'
    - from: moviefilein1
      to: chroma1
      input_index: '0'
    - from: bloom2
      to: lookup1
      input_index: '0'
    - from: ramp1
      to: lookup1
      input_index: '1'
    - from: moviefilein1
      to: add2_processedBloom
      input_index: '0'
    - from: lookup1
      to: add2_processedBloom
      input_index: '1'
    topology:
      operator_count: 13
      connection_count: 12
      has_parallel_paths: true
      max_chain_length: 5
    curator_text: If you want to do your own Bloom pre-processing, isolate your signal
      yourself (for example, chroma1 and level1 isolate and boost the reds un-naturally).  Feed
      that isolated / enhanced color into Bloom, then reduce Pre-Black Level to 0
      to remove the effect of the built-in Pre-Processing. Adjust the Radius etc parameter
      to get a desired glow, and then set the Output to be simply Bloom with Alpha.Then
      you can composite bloom1 with the original image any way you want...   Aside
      from using an Add TOP, other modes in the Composite TOP are alternatives, like
      Screen.The bottom part of the network takes the bloom effect alone, and post-processes
      it before adding to the original.
- operator_type: blurTOP
  examples:
  - example_name: example1
    operators:
    - name: blur2
      type: TOP:blur
      role: output
      parameters:
        size: 32
    - name: text2
      type: TOP:text
      role: input
      parameters:
        legacyparsing: 'on'
        chopvaluereplace: 'on'
        legacyfontselection: 'on'
    connections:
    - from: text2
      to: blur2
      input_index: '0'
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: The simplest blur with the Filter Size parameter.
  - example_name: example2
    operators:
    - name: blur
      type: TOP:blur
      role: output
      parameters:
        preshrink: 2
        size: 32
    - name: text1
      type: TOP:text
      role: input
      parameters:
        legacyparsing: 'on'
        chopvaluereplace: 'on'
        legacyfontselection: 'on'
    connections:
    - from: text1
      to: blur
      input_index: '0'
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: A faster and more extreme blur by shrinking the image and blurring
      that.It internally scales it up again.
  - example_name: example3
    operators:
    - name: info1
      type: CHOP:info
      role: isolated
      parameters:
        op: butterfly128
        iscope: '"resx resy"'
        childcooktime: 'on'
    - name: info2
      type: CHOP:info
      role: isolated
      parameters:
        op: beans1280
        iscope: '"resx resy"'
        childcooktime: 'on'
    - name: beans1280
      type: TOP:moviefilein
      role: input
    - name: blurFraction
      type: TOP:blur
      role: output
    - name: butterfly128
      type: TOP:moviefilein
      role: isolated
      parameters:
        pageindex: 4
        outputresolution: quarter
    connections:
    - from: beans1280
      to: blurFraction
      input_index: '0'
    topology:
      operator_count: 5
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: Assume you don't know what the incoming resolution is, but you know
      you want to blur 10% of the width of whatever image comes in. The Filter Size
      parameter is expressed in pixels and will be the horizontal resolution * .1.Try
      connecting butterfly128 to blurFractiom.
  - example_name: example4
    operators:
    - name: moviein1
      type: TOP:moviefilein
      role: input
    - name: blur_sample_step_x
      type: TOP:blur
      role: output
      parameters:
        preshrink: 8
        size: 32
        offsety: 2
        offsetz: 1
    - name: blur_sample_step_y
      type: TOP:blur
      role: output
      parameters:
        preshrink: 8
        size: 32
        offsetx: 2
        offsetz: 1
    connections:
    - from: moviein1
      to: blur_sample_step_x
      input_index: '0'
    - from: moviein1
      to: blur_sample_step_y
      input_index: '0'
    topology:
      operator_count: 3
      connection_count: 2
      has_parallel_paths: true
      max_chain_length: 2
    curator_text: The sample step controls the direction that the blur is applied.
  - example_name: example5
    operators:
    - name: moviein3
      type: TOP:moviefilein
      role: input
    - name: blur_blur_rotate
      type: TOP:blur
      role: output
