        chan: g
    - name: spectrum3
      type: TOP:spectrum
      role: processor
      parameters:
        chan: b
    - name: moviefilein1
      type: TOP:moviefilein
      role: input
    - name: spectrum1_inverse
      type: TOP:spectrum
      role: processor
      parameters:
        mode: idft
    - name: spectrum2_inverse
      type: TOP:spectrum
      role: processor
      parameters:
        mode: idft
    - name: spectrum3_inverse
      type: TOP:spectrum
      role: processor
      parameters:
        mode: idft
    connections:
    - from: spectrum1
      to: circle2
      input_index: '0'
    - from: spectrum1_inverse
      to: reorder1
      input_index: '0'
    - from: spectrum2_inverse
      to: reorder1
      input_index: '1'
    - from: spectrum3_inverse
      to: reorder1
      input_index: '2'
    - from: moviefilein1
      to: spectrum1
      input_index: '0'
    - from: moviefilein1
      to: spectrum2
      input_index: '0'
    - from: moviefilein1
      to: spectrum3
      input_index: '0'
    - from: circle2
      to: spectrum1_inverse
      input_index: '0'
    - from: spectrum2
      to: spectrum2_inverse
      input_index: '0'
    - from: spectrum3
      to: spectrum3_inverse
      input_index: '0'
    topology:
      operator_count: 9
      connection_count: 10
      has_parallel_paths: true
      max_chain_length: 5
    curator_text: 'The Spectrum TOP does a "Discrete Fourier Transform" on an image.
      It''s based on the idea that any image can be represented as a bunch of horizontal
      sine waves superimposed, and a bunch of vertical waves superimposed.First you
      have to apply spectrum on the /separated color channels: spectrum1, 2, 3 choose
      the red, green and blue channels of moviefilein1.These Spectrum TOPs output
      the same resolution as their input, but only output 2 color channels (red and
      green, 32 bit floats) which represent waves'' amplitude (in red) and phase (in
      green). spectrum1_inverse, 2 and 3 do the inverse. They take the spectrum images
      and convert them back to the original image in reorder1.Unbypass circle2. Look
      closely at it - it preserves only the pixels near the center of the image. It
      makes spectrum3 a bit blurrier, but surprisingly most of the image is intact
      and circle2 just takes away the high-frequency parts of the red color channel.'
