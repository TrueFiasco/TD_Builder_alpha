  - example_name: example3
    operators:
    - name: geo1
      type: COMP:geo
      role: isolated
      parameters:
        pageindex: 2
        instancing: 'on'
        instancetop: null1
        instanceactive: a
        instancetx: r
        instancety: g
        instancetz: b
    - name: null1
      type: TOP:null
      role: output
    - name: datto1
      type: CHOP:datto
      role: isolated
      parameters:
        dat: chopto1
        output: chanpercol
        firstrow: names
        firstcolumn: values
    - name: noise1
      type: CHOP:noise
      role: isolated
      parameters:
        amp: 2
        channelname: '"tx ty tz"'
        startunit: samples
        end: 4999
        endunit: samples
    - name: chopto1
      type: DAT:chopto
      role: isolated
      parameters:
        chop: noise1
        names: 'on'
        output: 2
    - name: chopto2
      type: TOP:chopto
      role: input
      parameters:
        chop: datto1
        dataformat: rgb
        layout: square
        format: rgba32float
    connections:
    - from: chopto2
      to: null1
      input_index: '0'
    topology:
      operator_count: 6
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2
    curator_text: Just to show a variety of data formats and conversions, we go from
      CHOP to DAT to CHOP and then to TOPs. The CHOP to TOP has the ability to arrange
      the pixels in a square (not a long row), easier to manage and visualize as point
      cloud data.Because there will be some unused pixels, you can fill the unused
      pixels at the top with a special value (0, 0, 0, -1) in this case. You have
      to set the pixel format to 32-bit float so you can represent negative and positive
      numbers of any value. By default it puts (0, 0, 0, 0) in the unused pixel.geo1
      received the point cloud from null1 and because the Active parameter is 'a',
      the alpha channel of null1, the pixels with 0 or less in alpha will not be rendered.
