chopexecuteDAT:
  example1: "A slider CHOP value triggers the DAT to execute and write the current value to a Text DAT. The data flows from slider input through a null CHOP output."
  example2: "A constant CHOP flows through speed and math processors to a null CHOP output, with the DAT executing on CHOP value changes and writing to a Text DAT."
  example3: "A button click triggers separate Python functions for on/off transitions, routing the signal through a null CHOP while logging state changes to Text DAT."
  example4: "An LFO CHOP drives continuous whileOn/whileOff function execution, with the signal flowing through null CHOP and a constant counter tracking state."
  example5: "An isolated constant CHOP provides valueChange event data to the Python functions when CHOP values are modified in the Textport."
  example6: "A constant CHOP's value changes are captured by the DAT, which provides previous values to track the most recent differences in a table output."

choptoDAT:
  example1: "Constant CHOP names and values are extracted and organized into tables by row or column format, creating two output table representations."
  example2: "Noise CHOP samples across all channels are converted into a table format with all values organized for easy access."

convertDAT:
  example1: "Two Text DATs flow to convert operators that split content at spaces or tabs, creating separate Table DAT outputs."
  example2: "Two Table DATs are converted back to Text format with either spaces or ellipses as delimiters between cell values."

cplusplusDAT:
  example1: "A button component demonstrates C++ custom operator usage with no data flow connections."

datexecuteDAT:
