depthMAT:
  example1: "LFO modulates math output which controls position feedback, while render output feeds through null. Depth and wireframe materials are switched based on the data flow chain."

glslMAT:
  example1: "PBR and Phong materials generate GLSL equivalents with shader information and pixel/vertex code isolated from the main topology."
  example2: "Noise texture input streams to position output through a null operator, rendering instanced rectangles with GLSL material, light, and camera components."
  example3: "Isolated GLSL shader code components from a Phong material including geometry, vertex, and pixel shader definitions with no active connections."
  example4: "Text DAT utils and shader code are aggregated in a base component with GLSL TOP generating shader info and compute code without active data flow."

lineMAT:
  example1: "Box and circle inputs merge through a copy processor, then flow to geometry output, rendered with Line MAT for solid line rendering."
  example2: "Grid and noise inputs feed through processors generating normals, twist, delete, and copy operations, with multiple operators controlling line rendering attributes and orientation."
  example3: "Grid and CHOP sopto input feed into noise width calculation, merging with math width output to control chopto3 geometry processing for animated line width attributes."
  example4: "Five pattern generators in CHOPs create a chain processing sopto1 input, flowing through pattern radius, vertical, and density calculations to toGeo output for instanced point rendering."
  example5: "DAT table defines lines that flow through Add SOP to create points and polygons, rendered with Line MAT in one geometry and Phong MAT in another for comparison."
  example6: "Three TOP ramps and noise sources process through reorder and math operations, outputting to level and null operators while feeding vector and grid geometry components."
  example7: "Single Point Render container manages circle size adjustment based on zoom level to maintain consistent screen coverage appearance for point cloud visualization."

pbrMAT:
  example1: "Constant CHOP input flows to math output, with Substance TOP textures feeding PBR material maps for rendering."
  example2: "Substance subselect textures process through level adjustment and hsvadj, flowing to PBR material maps for color-modified rendering."
  example3: "Wave and constant CHOP inputs merge and flow through math and rename processors, with moviefilein feeding normal map generation while substance textures fill PBR material slots for dual geometry instances."
  example4: "Isolated PBR material components with and without height maps demonstrate visual differences through parallel material setup with substance-selected textures."

phongMAT:
  example1: "Constant CHOP input flows to math output, with Substance subselects providing base color and normal textures to Phong material while moviefilein supplies environment mapping."

pointspriteMAT:
  example1: "Sphere SOP converts to particles and flows to convert output, moviefilein texture flows to reorder output for color mapping on point sprites."
  example2: "LFO CHOP flows through math processing to null output, while grid SOP converts to particles for point sprite rendering with color circle texture."
  example3: "Pointfile input flows through math processor to color output, with pointfileselect feeding math and position output for instanced point cloud visualization."

switchMAT:
  example1: "LFO CHOP drives count which switches between multiple materials (constant, phong, line, pbr, wireframe) flowing to null2 output, with render feeding null1 in a material selection chain."
