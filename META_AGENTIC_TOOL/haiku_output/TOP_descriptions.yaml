addTOP:
  example1: "The Add TOP can take 2 inputs and add their color values together."
  example2: "This example performs basic transform operations on the incoming signals."
  example3: "A little-known occasionally-useful feature in TOPs is the Passes parameter that repeats an operation multiple times, in this case a repeated scale/rotate on a square."
analyzeTOP:
  example1: "Analyze TOPs get the darkest pixel and the brightest pixel of the muddy source images. This network adjusts levels so the image range is 0 to 1 with no channels over-driven."
  example2: "These Analyze TOPs analyze each row or column and puts the results in a 1-pixel wide strip. The Resolution TOPs are not changing the pixel resolution."
  example3: "Analyze the maximum and minimum range of a TOP rgba channels. The Analyze TOPs' Analyze Channel parameter are set to RGBA Independent so the max / min are calculated separately for each channel."
antialiasTOP:
  example1: "The Anti Alias TOP is used to smooth out rough edges on diagonal lines. It works by performing an edge detection which can be manipulated by changing the Quality parameter to Custom."
blobtrackTOP:
  example1: "The Blob Track TOP can be used to calculate positions of blobs in a texture. One practical use case would be to calculate touch point positions from an optically captured touch surface."
  example2: "Here you can see the behavior and limits of the blob tracker. The Resolution TOP scales to quarter-resolution in X and Y so the Blob Track TOP has 1/16 the number of pixels to go through."
  example3: "This uses the new time counters in the blob table that it outputs, and in the new callbacks. This handles blobs that come and go from visibility."
bloomTOP:
  example1: "It's easier to understand what each of the parameters do in isolation. The bloomA set illustrates a first approach to bloom."
  example2: "When high quality gain is ON, brightness gain happens in a separate pass, before mip levels are generated. If you have large, bright blobs in your image, you will get roughly the same bloom effect."
  example3: "If you want to do your own Bloom pre-processing, isolate your signal yourself. Feed that isolated / enhanced color into Bloom."
blurTOP:
  example1: "The simplest blur with the Filter Size parameter."
  example2: "A faster and more extreme blur by shrinking the image and blurring that. It internally scales it up again."
  example3: "Assume you don't know what the incoming resolution is, but you know you want to blur 10% of the width of whatever image comes in."
  example4: "The sample step controls the direction that the blur is applied."
  example5: "In this example the direction of the blur is rotated."
  example6: "The Pre-Shrink and Filter size control the amount and quality of the blur. Pre-shrink of 2 or 4 etc will first reduce the image resolution, then the blur is applied to the smaller image."
  example7: "You can control which channel the blur will affect on the Common page."
  example8: "You can use a Blur TOP to dither an incoming signal. This is helpful when working with low quality assets where there is color banding."
  example9: "Generates a softened alpha channel from the alpha of the original image. blur1 determines how far to cut into the edge."
  example10: "Threshold with a little softness. Blur pre-shrink to spread out more with lower GPU cost."
cacheselectTOP:
  example1: "The Cache Select TOP allows you to extract a frame from a Cache TOP. The Cache TOP has enough frames to fetch various time-delayed versions of the incoming images."
cacheTOP:
  example1: "The Cache TOP can be used to simply delay images. Here the Cache Size is set to 11 to hold the current image and the image 10 cooks ago."
  example2: "You can pre-fill all the frames of a Movie File In TOP into a Cache TOP and then scrub through them. This is done by making the playback speed equal to 1 per frame."
  example3: "Two Cache Select TOPs selecting from one Cache TOP. You can pre-fill all the frames of a Movie File In TOP into a Cache TOP and then scrub through them using two Cache Select TOPs."
  example4: "This example uses 2 Cache TOPs to create trails of the original image. By setting the Output Index, you can adjust how close to the current frame the Cache TOPs output is."
  example5: "This simply averages the last 4 frames, like a multi-exposure. Try Composite TOP Operations Maximum."
  example6: "Work-in-progress. Pixel > 0 if surface is coming toward camera."
channelmixTOP:
  example1: "Channel mixing: R = G + B, G = R + B, B = R + G."
  example2: "This example adds all the incoming RGB channels into the Red channel. Since the green and blue are set to zero, only the summed red is output."
  example3: "The adding of the Red and Blue channels into each others channels creates purple. Green is 0."
  example4: "In this example we subtract the alpha from Green and Blue channels, leaving only Red. The Level TOP can produce similar effects, but cannot mix channels."
  example5: "In this example we subtracted white from the signal, leaving black. R = R - 1 is always less than 1, which clamps at black for 8-bit color."
  example6: "This time the ramp is created as floating point pixels. That means pixels can go below zero, though they will look black when displayed on a monitor."
  example7: "Here we force alpha to be 1 by adding 1 to the alpha channel."
choptoTOP:
  example1: "This example uses the RGBA values from topto1 to create a pixel."
  example2: "This CHOP to TOP creates a pixel for every sample of noise."
  example3: "We go from CHOP to DAT to CHOP and then to TOPs. The CHOP to TOP has the ability to arrange the pixels in a square."
chromakeyTOP:
  example1: "The Chroma Key TOP can be used to extract parts of an image based on Hue, Saturation, and Value. One common application is to extract people and objects from a green screen."
circleTOP:
  example1: "Circle as a rim and a bar."
  example2: "Circle used as a triangle indicator."
compositeTOP:
  example1: "After you look at the examples here, get the example Dialogs -> Tools called blendModes."
  example2: "There are many different types of compositing algorithms available. Here are a few examples."
  example3: "The Composite TOP can take many inputs and composite them simultaneously. But if the operation is the same, it's better to use pattern matching."
  example4: "This example performs basic transform operations on the incoming signals."
  example5: "This example uses the Translate Step parameter to animate inputs 3 and 4. First input is fixed/static."
  example6: "More examples of composite techniques."
constantTOP:
  example1: "Composite a solid color with an image, and play with the different compositing operations, like Burn Linear in this case."
convolveTOP:
  example1: "The Convolve TOP uses a DAT table containing numeric coefficients. For each pixel, it combines its RGBA values and its neighboring pixels' RGBA values by multiplying the values by corresponding coefficients."
cornerpinTOP:
  example1: "The Corner Pin TOP allows you to move the corner points of an image in x and y. The Extract page has similar parameters, but it cuts the image out before applying the corner pin."
  example2: "You can apply a background color after you have corner pinned an image."
  example3: "The Extract page allows you to specify a sub-section of the image to use by moving 4 points. It is different than cropping in that it keeps the original signal's resolution."
cplusplusTOP:
  example1: "See samples in the GitHub repository for C++ TOP examples."
cropTOP:
  example1: "The Crop TOP actually crops out the pixels in an image, whereas the Corner Pin TOP's Extract function keeps your image size intact while isolating a specific part of the image."
  example2: "These two examples show how to crop a region of an image."
  example3: "The extend conditions are used in the off-chance that pixels are added to an image after a crop operation. In these examples, the crop is outside the image 0-1 range."
crossTOP:
  example1: "The Cross TOP crossfades between its two inputs."
  example2: "The Transform page of the Cross TOP allows you to do basic transform operations on the inputs. The Fixed Layer is Input 1."
cubemapTOP:
  example1: "The Cube Map TOP builds a texture map in the Cube Map internal texture format. It accepts a vertical cross image, or 1 input per side of the cube."
depthTOP:
  example1: "The Depth TOP reads an image containing depth information from a scene described in a specified Render TOP. The resulting image is black (0) at pixels where the surface is at the near depth value."
differenceTOP:
  example1: "The Difference TOP computes the difference between two inputs. In this case we're looking at the difference between a Movie File In TOP and a Cache TOP that is set one frame behind."
directxoutTOP:
  example1: "The DirectX In/Out TOPs are only available on Windows in TouchDesigner Educational, Commercial and Pro. In this snippet these nodes are currently bypassed to work on other platforms."
displaceTOP:
  example1: "For every output pixel, the Displace TOP fetches from nearby the corresponding pixel in the first input image. The second image is used to warp the first image."
  example2: "For every output pixel, it fetches from nearby the corresponding input pixel. Changing the Displace TOPs Displace Weight allows you to control how heavily the input is displaced."
  example3: "For every output pixel, it fetches from nearby the corresponding input pixel. Changing the Displace Weight allows you to control displacement amount in each direction."
  example4: "The pixels of smiley.tif are being displaced on the X axis by blue channel of the 2nd input noise."
  example5: "This example gets its pixels from random shifts in location in the input image. Red channels determine the shift horizontally and blue channels determine the shift vertically."
  example6: "This example does the same thing as the previous example but the slider adjusts the contrast of the Displace image to grey."
edgeTOP:
  example1: "The Edge TOP finds edges in an image and highlights them. For each pixel, it looks at the values at neighboring pixels, and where differences are greater than a threshold, the output's value is higher."
  example2: "If you fancy yourself a mad lad, try putting an Edge Detect TOP in a feedback loop."
embossTOP:
  example1: "The Emboss TOP creates the effect that an image is embossed in a thin sheet of metal. Edges in the image will appear raised."
feedbackTOP:
  example1: "A simple feedback setup that gives fake motion blur by using a fraction of the current image plus a fraction of the prior frame's image."
  example2: "This takes the current image combined with a fraction of the prior image. You can try different Composite blend modes to control the mixing."
  example3: "Feedback with more effects. Alter nodes: opacity for fade out trail, lumalevel1 for boost Gamma or Brightness."
fitTOP:
  example1: "The Fit TOP changes the resolution and aspect ratio of an image, but does not distort the image. The first example shows the entire horizontal span of the input image."
  example2: "To insure the entire image is visible, no matter what the input and output resolutions are, use Fit Inside."
  example3: "A square image is made to fit 16x9."
flipTOP:
  example1: "The Flip TOP provides an easy way to flip an image in X (horizontally) or Y (vertically). Flip X and Y together is same as rotating the image 180 degrees."
  example2: "A useful feature of the Flip TOP is being able to flop an image. X becomes Y and Y becomes X."
flowTOP:
  example1: "Optical flow data is analyzed from the Nvidia Flow TOP."
  example2: "Optical flow analyzed from a flowing liquid."
  example3: "Optical flow analysis of moving clouds."
  example4: "Optical flow from complex motion patterns."
  example5: "Optical flow visualization techniques."
functionTOP:
  example1: "ramp1 is set on Common page to output 32-bit floating point numbers as Pixel Format. null4 shows the normalized split representation."
glslmultiTOP:
  example1: "The GLSL Multi TOP renders a GLSL shader into a TOP image. Its parameters and functionality are identical to the GLSL TOP, except it allows for more than 3 inputs. In this example 9 TOP inputs are read."
glslTOP:
  example1: "The GLSL TOP renders a GLSL shader into a TOP image. Use the Info DAT to check for compile errors in your shaders."
hsvadjustTOP:
  example1: "The HSV Adjust TOP adjusts color values using hue, saturation, and value controls. This snippet shows one can narrow the range of pixels to modify, based on their hue, saturation and value."
  example2: "The HSV Adjust TOP adjusts color values using hue, saturation, and value controls. Range restriction can narrow the range of pixels to modify."
hsvtorgbTOP:
  example1: "Put hue in the first channel, saturation in the second channel, value in the third channel, and use HSV to RGB to interpret those three channels as HSV and convert the image to RGB."
insideTOP:
  example1: "The Inside TOP places Input1 inside Input2. The alpha of Input2 is used to determine what parts of the Input1 image are visible."
inTOP:
  example1: "The In TOP is used to create a TOP input in a Component. Component inputs are positioned alphanumerically on the left side of the Component."
layoutTOP:
  example1: "These examples illustrate how to use the Layout TOP. You can specify paths for TOPs on the parameter dialog without connecting them."
  example2: "The Layout TOP positions multiple input TOPs into rows, columns, or grids. It can either fit all the TOPs into a specific resolution or scale them."
lensdistortTOP:
  example1: "lensdistort1 will distort a rendered image to match a camera. lensdistort2 will undistort a camera image as it has Invert Distortion on."
levelTOP:
  example1: "Black level, brightness and gamma adjustment. This operates on each red, green, blue separately."
  example2: "This Level TOP inverts the colors of the incoming image."
  example3: "You can control an image's opacity with the Level TOP."
  example4: "Level TOP can adjust the upper-lower range of each R, G and B. This is a different set of controls vs HSV Adjust TOP."
  example5: "The Level TOP can modify the incoming and outgoing High and Low values of each pixel."
  example6: "The Level TOP can also perform color correction operations by controlling the Low and High values of the Red, Green, Blue, and Alpha channels independently."
  example7: "This shows the application of stepping to a smooth ramp."
  example8: "Sometimes you want to adjust gamma first and then the brightness. Use the Post page for this."
limitTOP:
  example1: "limit1 sets a minimum of .25 and a maximum of .7 on all channels. limit2 affects only the red and green channel, using the Channel Mask."
  example2: "See RGB to HSV TOP example 2. See also the Limit CHOP."
lookupTOP:
  example1: "Compose 4 CHOP channels and apply the first CHOP channel to the red TOP channel, and so on. Unbypass Quantize for more control."
  example2: "Lookup tables can be used to remap pixel values. Apply CHOP data to modify TOP channels."
  example3: "Lookup examples demonstrate table-based pixel value transformations."
  example4: "Lookup tables provide advanced color correction capabilities."
  example5: "Lookup table applications for custom color mapping."
lumablurTOP:
  example1: "The Luma Blur TOP performs a blur based on the luminance of a second input. Bright areas have more blur applied."
  example2: "Luma Blur with different input sources for blur amount control."
lumalevelTOP:
  example1: "The Luma Level TOP adjusts the brightness and contrast of an image based on its luminance."
  example2: "Luma Level adjustments for contrast and brightness control."
mathTOP:
  example1: "The Math TOP performs arithmetic operations on one or more images."
  example2: "Math operations combining multiple inputs with different operations."
  example3: "Advanced math TOP operations for complex calculations."
matteTOP:
  example1: "The Matte TOP generates a matte from one or more inputs using color or alpha channels."
  example2: "Matte generation from multiple source images."
mirrorTOP:
