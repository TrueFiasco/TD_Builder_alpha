# TouchDesigner Base Class API - Semantic Search Descriptions
# HIGH VALUE: These methods are inherited by ALL operators in each family

# === CHOP_Class (all CHOPs) ===
CHOP_Class.numChans: "Get the total number of channels in a CHOP."
CHOP_Class.numSamples: "Get or set the number of samples per channel."
CHOP_Class.start: "Get or set the start index of channels."
CHOP_Class.end: "Get or set the end index of channels."
CHOP_Class.rate: "Get or set the sample rate of the CHOP."
CHOP_Class.isTimeSlice: "Check if a CHOP is using time-slice mode."
CHOP_Class.export: "Get or set if export is enabled on a CHOP."
CHOP_Class.exportChanges: "Track the number of export mapping changes."
CHOP_Class.nameOrIndex: "Access a specific channel by name or index using brackets."
CHOP_Class.chans: "Get all channels matching a name pattern."
CHOP_Class.numpyArray: "Export all CHOP channel data as a numpy array for analysis."
CHOP_Class.convertToKeyframes: "Convert CHOP data to animation keyframes in an animationCOMP."
CHOP_Class.save: "Save CHOP data to a .chan or .clip file."

# === COMP_Class (all COMPs) ===
COMP_Class.extensions: "Access all extension objects attached to a component."
COMP_Class.extensionsReady: "Check if all extensions are initialized."
COMP_Class.clones: "Get a list of all clones of this component."
COMP_Class.componentCloneImmune: "Make a component immune to cloning."
COMP_Class.vfs: "Access the virtual file system from a component."
COMP_Class.dirty: "Check if a component has unsaved changes."
COMP_Class.currentChild: "Get the currently displayed child operator."
COMP_Class.selectedChildren: "Get all selected child operators in a component."
COMP_Class.pickable: "Control whether a component is selectable in the network."
COMP_Class.inputCOMPs: "Get all input component wires connected to this component."
COMP_Class.outputCOMPs: "Get all output component wires from this component."
COMP_Class.create: "Create a new child operator inside a component."
COMP_Class.copy: "Copy an operator as a child into this component."
COMP_Class.findChildren: "Search for child operators by type or depth."
COMP_Class.loadTox: "Load a .tox file as a child component."
COMP_Class.saveTox: "Save a component and all its contents as a .tox file."
COMP_Class.resetNetworkView: "Reset the network editor view and zoom."
COMP_Class.openViewer: "Open a floating viewer window for a component."
COMP_Class.closeViewer: "Close a floating viewer window."
COMP_Class.openParameters: "Open the parameters dialog for a component."
COMP_Class.openNetwork: "Open the network editor for a component."

