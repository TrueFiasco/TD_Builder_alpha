  cumulativeSamples: Get the total accumulated time expressed in sample units since
    timer start.
  cumulativeSeconds: Get the total accumulated time expressed in seconds, counting
    from 0 when timer starts.
  goTo: Precisely navigate to a specific time index using various time units like
    seconds, frames, or fractions.
  goToNextSegment: Jump to the next predefined segment in the timer sequence.
  goToPrevSegment: Jump to the previous predefined segment in the timer sequence.
  masterFrames: Get or set the master time index in frame units, useful for precise
    time control.
  masterSeconds: Get or set the master time index in seconds, allowing dynamic time
    manipulation.
  playingSeconds: Get the current playing time expressed in seconds, unaffected by
    speed parameter.
  runningSeconds: Get the continuous time index in seconds, which keeps counting regardless
    of play state.
  segment: Get or set the current segment index for timer-based sequencing.
UI:
  chooseFile: Open a file selection dialog for loading or saving files with optional
    type filtering.
  clipboard: Get or set the operating system clipboard text, enabling cross-application
    text transfer.
  messageBox: Display a configurable dialog box with custom title, message, and button
    options.
  openCOMPEditor: Open the component editor for a specific operator, enabling direct
    editing.
  refresh: Immediately update and redraw all TouchDesigner UI elements and viewports.
  viewFile: Open a file or URL in the default system application.
UdpinDAT_Class:
  send: Send string messages through a UDP connection. Ideal for simple, non-formatted
    network communications.
  sendBytes: Send raw byte sequences through a UDP connection. Useful for lightweight,
    connectionless network communication.
  sendOSC: Send Open Sound Control (OSC) formatted messages with flexible type and
    precision options. Great for multimedia and audio networking.
UdtinDAT_Class:
  send: Send string messages through a UDP connection. Ideal for simple, non-formatted
    network communications.
  sendBytes: Send raw byte sequences through a UDP connection. Useful for lightweight,
    connectionless network communication.
  sendOSC: Send Open Sound Control (OSC) formatted messages with flexible type and
    precision options. Great for multimedia and audio networking.
VFS:
  addFile: Add an embedded file to a component from disk, with optional custom naming.
  export: Export virtual files to a specified folder, supporting pattern matching.
  find: Search for files within the virtual file system using wildcard patterns.
VFSFile:
  byteArray: Access or modify the file's raw byte data directly.
  export: Save the virtual file to a specified folder on the physical disk.
  name: Get or set the name of a virtual file, supporting hierarchical file naming.
  size: Retrieve the total size of the file data in bytes.
Vertex:
  index: Get the position of the vertex within its primitive, useful for geometric
    manipulation.
  prim: Access the parent primitive of the vertex, enabling detailed geometry interactions.
VideodeviceinTOP_Class:
  inputSignalFormat: Retrieve the input video signal format for the connected device.
  isConnected: Check if a video input device is currently streaming to the operator.
  timecode: Access the timecode information for the latest received video frame.
VideostreaminTOP_Class:
  connectionsFailed: Track the number of failed connection attempts to the video stream.
  connectionsLost: Monitor the number of previously established connections that were
    lost.
  frameTime: Get the timestamp of the currently displayed video frame.
  isConnected: Check if the operator is currently connected to the video stream URL.
  isConnecting: Determine if the operator is attempting to establish a connection.
  isOddField: Check which field is currently being displayed during de-interlacing.
  unload: Unload the current video stream and free associated memory.
  videoHeight: Get the pixel height of the video stream.
  videoWidth: Get the pixel width of the video stream.
VideostreamoutTOP_Class:
  streamURL: Retrieve the URL used for streaming the video output.
WaveCHOP:
  chanIndex: Get the current sample index being evaluated during wave generation.
WebclientDAT_Class:
  closeConnection: Explicitly close an active web connection. Helps manage network
    resource cleanup.
  connections: Get a list of active HTTP connection identifiers. Useful for tracking
    and managing multiple concurrent web requests.
  request: Send complex HTTP requests with extensive configuration options. Supports
    authentication, headers, data, and file uploads.
WebrenderTOP_Class:
  executeJavaScript: Run JavaScript code directly on the current webpage.
  flushCookieStore: Clear the current browser cookies and local storage.
  interactMouse: Simulate mouse interactions like clicks, moves, and drags on the
    webpage.
  interactTouch: Simulate touch events on the webpage.
  loaded: Check if the current webpage has finished loading.
  sendKey: Send keyboard input events to the webpage.
  sendString: Send a string of characters to the webpage.
WebrtcDAT_Class:
  getStats: Retrieve detailed connection statistics as JSON. Helps monitor WebRTC
    connection performance and diagnostics.
  openConnection: Initiate a new WebRTC peer connection and receive a unique connection
    identifier. Essential for establishing real-time communication channels.
  sendBytes: Send binary data through a WebRTC data channel. Ideal for low-level,
    real-time peer-to-peer communication.
  sendText: Send text data through a WebRTC data channel. Used for messaging and signaling
    in peer-to-peer applications.
WebserverDAT_Class:
  authenticateBasic: Perform Basic Authentication by validating credentials against
    a provided dictionary. Enables secure web endpoint access.
  webSocketSendBinary: Send binary data to a connected WebSocket client. Supports
    complex data transmission over WebSockets.
  webSocketSendText: Send text data to a connected WebSocket client. Used for real-time,
    bidirectional web communication.
WebsocketDAT:
  sendBinary: Transmit binary data over a WebSocket connection. Ideal for sending
    non-text data like images, audio, or custom binary protocols in interactive applications.
  sendPing: Send a ping request over a WebSocket connection to check the connection
    status and latency. Useful for monitoring WebSocket connection stability.
  sendPong: Send a pong response in a WebSocket connection to maintain the connection
    and acknowledge a ping request. Helps manage WebSocket connection health and responsiveness.
  sendText: Send a text message over an active WebSocket connection. Useful for real-time
    communication and data transmission in web-based interactive projects.
WindowCOMP:
  contentWidth: Get the width of the window's contents, ignoring borders, in points
    or pixels.
  isOpen: Check whether the window is currently open, useful for tracking window state.
  scalingMonitorIndex: Retrieve the index of the monitor whose DPI scaling is being
    used for the window.
  setForeground: Activate the window, bring it to the foreground, and set focus, useful
    for managing window z-order and interaction.
ZedTOP_Class:
  calibrationParameters: Get the processed stereo camera calibration parameters for
    rectified images.
  calibrationParametersRaw: Get the raw stereo camera calibration parameters before
    image rectification.
