AbsTime_Class:
  frame: Get the total number of frames played since TouchDesigner started, unaffected
    by pausing.
  seconds: Retrieve the total seconds elapsed since TouchDesigner's launch, unaffected
    by pausing.
  step: Get the number of frames elapsed between previous and current frames, with
    values > 1 indicating frame dropping.
  stepSeconds: Get the time elapsed between previous and current frames in absolute
    seconds.
ActorCOMP_Class:
  bodies: Returns a list of all the physical bodies currently present in an ActorCOMP
    simulation.
AnimationCOMP_Class:
  deleteKeyframe: Remove a specific keyframe from an animation channel, enabling dynamic
    animation adjustment.
  setKeyframe: Add or modify a keyframe for an animation channel at a specific position,
    allowing precise control over animation parameters.
AnnotateCOMP_Class:
  height: Retrieve the vertical dimension of an annotation in network editor units.
  utility: Toggle or check the utility flag that determines special handling of the
    annotation.
  width: Get the horizontal dimension of an annotation in network editor units.
  x: Obtain the horizontal position of the annotation's left edge in network editor
    units.
  y: Get the vertical position of the annotation's bottom edge in network editor units.
App_Class:
  addNonCommercialLimit: Restrict the application to operate at a non-commercial license
    level.
  addResolutionLimit: Limit all textures to a specified maximum resolution.
  applicationsFolder: Get the primary system folder for installing applications, typically
    'C:/Program Files'.
  architecture: Retrieve the application's compile architecture, usually 32 or 64
    bit.
  binFolder: Get the installation folder containing TouchDesigner's binary executables.
  build: Get the specific build number of the TouchDesigner application.
  compileDate: Retrieve the date the application was compiled as a tuple of (year,
    month, day).
  configFolder: Get the installation folder containing configuration files.
  desktopFolder: Get the current user's desktop folder path.
  enableCachedParameters: Toggle caching of parameter values instead of constantly
    re-evaluating.
  enableOptimizedExprs: Enable or disable Python expression optimization, which defaults
    to True on startup.
  experimental: Check if the current TouchDesigner instance is an experimental build.
  installFolder: Get the main TouchDesigner installation directory.
  osName: Get the name of the operating system running TouchDesigner.
  osVersion: Get the version of the operating system.
  power: Control the overall processing state, enabling or halting all processing
    when set to True or False.
  product: Determine the type of executable running, such as 'TouchDesigner', 'TouchPlayer',
    or 'TouchEngine'.
  removeNonCommercialLimit: Remove previously added non-commercial license restrictions.
  removeResolutionLimit: Remove previously set texture resolution limits.
  systemFolder: Get the installation folder containing system files.
  tempFolder: Get the system's temporary folder path.
Attribute_Class:
  arraySize: Get the size of the attribute array, returning 0 for non-array attributes.
  destroy: Permanently remove the referenced attribute from the system.
  isArray: Check if the attribute is an array type.
  name: Get the name of the attribute.
  numMatCols: Get the number of columns for matrix attributes.
  numMatRows: Get the number of rows for matrix attributes.
  size: Get the number of values associated with this attribute.
  vals: Retrieve all attribute values as a list, with optional delayed evaluation.
AudiobandeqCHOP_Class:
  chanIndex: Get the current sample index being evaluated in the audio band equalization
    process.
AudiodynamicsCHOP_Class:
  chanIndex: Retrieve the current sample index being processed for audio dynamics
    manipulation.
AudiofileinCHOP_Class:
  metadata: Access a dictionary containing all available metadata for the loaded audio
    file.
  timecode: Get a Timecode object representing the current temporal position within
    the loaded audio file.
AudiofilterCHOP_Class:
  chanIndex: Obtain the current sample index being processed through audio filtering.
AudiomovieCHOP_Class:
  hasAudio: Determine whether the associated movie file contains an audio track.
  playbackRate: Get the current playback speed of the movie's audio stream.
AudioparaeqCHOP_Class:
  chanIndex: Retrieve the current sample index during parametric audio equalization
    processing.
AudioplayCHOP_Class:
  play: Trigger playback of audio samples with optional parameters like looping, delay,
    and volume control.
  stop: Halt the playback of specific audio samples in the CHOP.
AudiovstCHOP_Class:
  panic: Immediately stop all sound by sending volume off and note off events across
    all channels.
  send: Send a sequence of standard MIDI messages through the VST audio channel.
  sendAfterTouch: Transmit an MIDI After Touch event for expressive control of a specific
    note.
  sendAllNotesOff: Stop all currently playing notes on a specific MIDI channel.
  sendChannelPressure: Send a MIDI Channel Pressure event to modulate overall channel
    expression.
  sendControl: Transmit a MIDI Controller event to modify synthesizer or effect parameters.
  sendExclusive: Send a sequence of exclusive MIDI system messages.
  sendNoteOff: Stop a specific MIDI note with optional velocity.
  sendNoteOn: Start playing a MIDI note with optional note-off delay and velocity.
  sendPitchBend: Adjust the pitch of a MIDI channel with a specified bend value.
  sendProgram: Change the current program/preset of a MIDI channel.
Bezier_Class:
  anchors: Get the list of anchor points defining the Bezier curve.
  basis: Retrieve the Bezier curve's basis as a list of float values.
  closed: Determine or set whether the curve is closed or open.
  deleteAnchor: Remove a specific anchor point and its neighboring tangents from the
    curve.
  order: Get the mathematical order of the Bezier curve (one more than its degree).
  segments: Get a list of curve segments, where each segment is a list of control
    points.
  tangents: Retrieve the tangent vectors for the Bezier curve.
  updateAnchor: Modify a specific anchor point's position, with optional tangent adjustments.
  updateTangent: Modify a tangent vertex with optional rotation and scaling controls.
Body_Class:
  angularVelocity: Get or set the rotational velocity of the physics body.
  applyForce: Apply a directional force to a body for a single physics simulation
    frame.
  applyImpulseForce: Apply an instantaneous force to a body in a Bullet physics simulation.
  applyImpulseTorque: Apply an instantaneous rotational force to a physics body.
  applyTorque: Apply rotational force to a body for a single physics simulation frame.
  index: Get the index of this body within its physics simulation.
  linearVelocity: Get or set the translational velocity of the physics body.
  rotate: Get or set the body's rotation in world space coordinates.
  translate: Get or set the body's position in world space coordinates.
BulletsolverCOMP_Class:
  actors: Retrieve a list of all Actor COMPs participating in the Bullet physics simulation.
ButtonCOMP_Class:
  click: Programmatically simulate a mouse click on a button panel, with configurable
    click parameters.
CHOP_Class:
  chan: Retrieve a specific channel by name or index, with optional case-sensitive
    matching.
  chans: Fetch multiple channels simultaneously by name or index, supporting case-sensitive
    selection.
  convertToKeyframes: Transform channel data into an animation COMP with optional
    tolerance for keyframe simplification.
  end: Get or set the ending index of channel data, enabling precise control over
    the channel's data range.
  export: Toggle the export status of the CHOP, determining whether its data can be
    exported or shared.
  exportChanges: Read-only property tracking the number of times the export mapping
    information has been modified.
  isTimeSlice: Indicates whether the CHOP represents a snapshot or time slice of data
    at a specific moment.
  numChans: Returns the total number of channels in the CHOP, representing the count
    of data streams available.
  numSamples: Get or set the number of data points per channel, allowing dynamic adjustment
    of sample count within certain constraints.
  numpyArray: Convert CHOP data into a NumPy array for advanced numerical processing
    and analysis.
  rate: Access or modify the sample rate of the CHOP, determining the temporal resolution
    of the channel data.
  save: Export CHOP channel data to a file on the disk, supporting various file formats
    for data persistence.
  start: Retrieve or modify the starting index of channel data, useful for defining
    specific time or sample ranges.
COMP:
  accessPrivateContents: Temporarily gain access to a private component using a specified
    key.
  appendCustomPage: Add a new custom parameter page to extend the component's interface.
  childrenCPUCookTime: Total accumulated cook time of all child operators during the
    last frame.
  componentCloneImmune: Flag to control whether the component can be cloned, useful
    for protecting specific network structures.
  cpuCookTime: Measures the duration of the last CPU processing time for this component
    in milliseconds.
  dirty: Indicates whether the component's contents require saving, helpful for tracking
    unsaved changes.
  extensions: List of extensions available for this component, useful for checking
    supported functionality.
  extensionsReady: Boolean indicating whether component extensions have finished compiling
    and are safe to access.
  gpuMemory: Returns the amount of GPU memory used by this component, useful for performance
    monitoring.
  initializeExtensions: Manually trigger initialization of component extensions, useful
    for preparing custom functionality.
  internalOPs: Dictionary containing internal operators within this component, allowing
    programmatic access to child nodes.
  internalPars: Dictionary of internal parameters for the component, enabling runtime
    parameter inspection and modification.
  isPrivate: Determines if the component's contents are hidden from direct viewing.
  layout: Organize operators within a component, optionally specifying horizontal,
    vertical, or grid placement.
  pickable: Controls whether the component can be selected in the network editor.
  progressiveUnload: Gradually release CPU and GPU memory for large or complex components
    over multiple frames.
  reload: Reload a component from a file, replacing its children, parameters, and
    updating network state.
  save: Save the component to disk, with optional password protection and folder creation.
  saveByteArray: Convert the component's data into a bytearray for serialization or
    transfer.
  saveExternalTox: Export the component's contents to an external .tox file, with
    optional recursive saving.
  setVar: Set a component-level variable for storing runtime information.
  utility: Flag to mark the component as a utility operator, which can change its
    behavior in certain contexts.
CameraCOMP_Class:
  mpcdiRegion: Generate a dictionary containing camera transform and projection data
    for MPCDI file creation.
  projection: Generate the projection matrix for a camera using specified width and
    height aspects.
  projectionInverse: Calculate the inverse projection matrix for a camera based on
    specified width and height aspects.
ClipblenderCHOP_Class:
  currentFrame: Get the current frame index during clip blending or transition.
  currentTime: Retrieve the current time value of the active clip output.
  endBlendTime: Get the precise time when a clip transition will be complete.
  isBlending: Check whether the output is currently transitioning between clips.
  isQueued: Determine if transitions are queued to occur sequentially.
  isTriggerWaiting: Check for any pending clip transition triggers.
  lastClipA: Get the last value of the first clip in a blend sequence.
  lastClipB: Get the last value of the second clip in a blend sequence.
  startBlendTime: Get the scheduled start time for a clip transition.
  trigger: Initiate the next clip in a blending sequence, with optional waiting behavior.
ClockCHOP_Class:
  timecode: Get a precise Timecode object representing the current time with hour,
    minute, second, and millisecond components.
ContainerCOMP_Class:
  click: Simulate a mouse click at specific coordinates within a container panel.
  clickChild: Trigger a click on a sub-panel within a container, useful for interacting
    with radio buttons.
CopyCHOP_Class:
  chanIndex: Provides the current index of the sample being processed, useful for
    custom iteration or sample-specific logic in CHOPs.
  copyIndex: Returns the current copy index starting from zero, helpful for tracking
    multiple copies or duplications within a CopyCHOP.
CopySOP_Class:
  copyIndex: Get the current index of the copy being processed, starting at zero during
    geometry copying operations.
  copyTotal: Retrieve the total number of copies being created by the CopySOP during
    geometry replication.
  inputPoint: Access the current input point being processed during geometry copy
    transformations.
DAT_Class:
  appendCol: Add a new column to the end of the DAT table.
  appendCols: Add multiple columns to the end of the DAT table.
  appendRow: Add a new row to the end of the DAT table or after a specified row index.
  appendRows: Add multiple rows to the end of the DAT table.
  cells: Retrieve a list of cells matching specific row and column criteria.
  clear: Remove all rows and columns from the DAT table, with optional preservation
    options.
  col: Retrieve a list of cells from a specific column by name or index.
  cols: Get all columns or specific columns from the DAT table.
  csv: Get or set CSV-formatted contents of the DAT operator.
  deleteCol: Remove a single column from the DAT table by name or index.
  deleteCols: Remove multiple columns from the DAT table.
  deleteRow: Remove a single row from the DAT table by name or index.
  deleteRows: Remove multiple rows from the DAT table.
  detectLanguage: Automatically detect the programming language of the DAT's contents.
  editingFile: Retrieve the file path currently being edited by an external text editor.
  export: Control whether the DAT operator's contents are exported to an external
    file.
  findCell: Search for a cell matching a specific pattern within the DAT table.
  findCells: Find multiple cells matching given search patterns.
  flush: Dummy method used for redirecting standard output to DAT operators.
  insertCol: Insert a column at the beginning of the table or before a specified column
    index.
  insertRow: Insert a row at the beginning of the table or before a specified row
    index.
  isEditable: Check if the DAT can be directly modified.
  isTable: Check if the DAT contains tabular data with rows and columns.
  isText: Determine if the DAT contains plain text content.
  isatty: Required method for standard output redirection to DAT operators.
  jsonObject: Parse the DAT contents as a JSON object.
  locals: Access the local Python dictionary used during script execution within the
    DAT.
  module: Retrieve the Python module contents associated with the DAT operator.
  numCols: Get the total number of columns in the DAT table or text content.
  numRows: Get the total number of rows in the DAT table or text content.
  replaceCol: Replace the contents of an existing column in the DAT table.
  replaceRow: Replace the contents of an existing row in the DAT table.
  row: Retrieve a list of cells from a specific row by name or index.
  rows: Get all rows or specific rows from the DAT table.
  run: Execute Python code stored in the DAT with optional delay and execution parameters.
  scroll: Bring a specific cell or region into view within the DAT table.
  setSize: Explicitly set the exact number of rows and columns in the DAT table.
  text: Get or set the raw text contents of the DAT, supporting tab and newline delimited
    data.
  write: Append content to the existing DAT text or table.
DattoCHOP_Class:
  inputCell: Retrieves the current input cell being processed, allowing access to
    specific data cell properties during evaluation.
  inputCol: Returns the current input column index being evaluated, useful for column-specific
    processing in data transformations.
  inputRow: Provides the current input row index being processed, enabling row-specific
    data manipulation strategies.
DeleteSOP_Class:
  inputPoint: Get the current input point being processed during point deletion operations.
  inputPrim: Access the current input primitive being processed during deletion procedures.
DmxinCHOP_Class:
  timecode: Generates a Timecode object representing the last received ArtTimeCode
    packet, facilitating precise time tracking and synchronization with DMX input.
EngineCOMP_Class:
  goToDone: Pulse the 'Go to Done' parameter, advancing the engine's state progression.
EvaluateDAT_Class:
  exprCol: Get the current column index during expression evaluation in a DAT.
  exprRow: Get the current row index during expression evaluation in a DAT.
  inputCell: Access the current input cell being processed in a DAT expression.
  inputCol: Get the current input column index during DAT expression processing.
  inputRow: Get the current input row index during DAT expression processing.
EventCHOP_Class:
  createEvent: Programmatically creates a custom event with configurable parameters
    like attack, decay, sustain, and release, enabling complex event generation and
    manipulation.
  releaseEvent: Manually releases a previously created event that was held, allowing
    fine-grained control over event lifecycles and timing.
FieldCOMP_Class:
  setKeyboardFocus: Set keyboard focus to the Field COMP, optionally selecting all
    text.
FileinCHOP_Class:
  chanIndex: Provides the current value of the sample being overridden, useful for
    custom sample modification strategies.
  sampleIndex: Returns the index of the current sample being evaluated, enabling precise
    sample-level processing and tracking.
FileoutDAT_Class:
  send: Write string messages to a file with an optional terminator.
  sendBytes: Write raw byte sequences to a file without adding any terminators.
  writeCount: Track the number of times data has been written to a file, useful for
    generating unique filenames.
FileoutPOP_Class:
  fileSuffix: Returns the generated file suffix for output files, which helps uniquely
    identify exported media based on current rendering settings and parameters.
  save: Immediately save the current frame or image data from the File Out TOP to
    disk using the configured output settings and file path.
FlexsolverCOMP_Class:
  actors: Returns a list of all Actor COMPs currently participating in the Flex Solver
    simulation.
GeometryCOMP:
  bounds: Calculate the 3D bounding box of the geometry contained in a Geometry COMP.
    Useful for determining the spatial extent of 3D objects.
GeotextCOMP:
  evalTextSize: Compute the exact width and height of a given text string based on
    current font settings. Useful for precise text layout and sizing.
  textHeight: Get the rendered height of text without padding, specifically in Text
    mode. Helps determine text dimensions for layout purposes.
  textWidth: Get the rendered width of text without padding, specifically in Text
    mode. Helps determine text dimensions for layout purposes.
GlslMAT:
  compileResult: Retrieve the most recent shader compilation result as a string. Useful
    for debugging shader compilation errors or checking shader status.
GlslTOP_Class:
  compileResult: Get the latest compilation result for a GLSL shader, helping developers
    identify and troubleshoot shader compilation issues.
GlslmultiTOP_Class:
  compileResult: Retrieve the most recent compilation result for a multi-pass GLSL
    shader, useful for debugging shader compilation errors.
GroupSOP_Class:
  inputPrim: Get the current input primitive being processed during group manipulation
    operations.
Group_Class:
  default: Returns a tuple of default group points, providing access to the initial
    configuration of a group.
  destroy: Permanently removes the current point or primitive group from the operator.
  name: Get or set the unique identifier name for a point or primitive group.
InsertDAT_Class:
  fillName: Retrieve the current header name during DAT insert operations.
  subCol: Get the current column index during DAT insert operations.
  subRow: Get the current row index during DAT insert operations.
KinectazureTOP_Class:
  colorCameraIntrinsics: Retrieve the intrinsic camera parameters for the color camera,
    providing detailed information about camera lens and sensor characteristics.
  depthCameraIntrinsics: Access the intrinsic parameters of the depth camera, essential
    for precise depth mapping and spatial understanding.
  getRemapTransform: Generate a transformation matrix between different coordinate
    spaces of Kinect Azure devices, useful for advanced spatial mapping and alignment.
  transformWorldToColorImage: Convert a 3D world position to 2D coordinates in the
    color camera image, enabling precise pixel mapping from world space.
  transformWorldToDepthImage: Transform a 3D world position to 2D coordinates in the
    depth camera image, facilitating depth-based spatial analysis.
LagCHOP_Class:
  chanIndex: Indicates the index of the current sample being processed, helpful for
    implementing custom lag or smoothing operations.
LightCOMP:
  mpcdiRegion: Generate a dictionary describing the light's transform and projection
    for MPCDI (Multi-Projector Calibration) file generation.
  projection: Create the projection matrix for a light, used in complex rendering
    and lighting scenarios.
  projectionInverse: Generate the inverse projection matrix for a light's view, essential
    for advanced rendering and projection calculations.
ListAttribute_Class:
  editable: Determine whether the cell's contents can be directly edited by the user.
  fontFace: Specify the font typeface for rendering text in the cell.
  help: Set or retrieve a help tooltip that appears when hovering over the cell.
  text: Get or set the text contents of a list attribute cell.
  textColor: Configure the text color as an RGBA tuple for visual customization.
  textJustify: Control text alignment within the cell using predefined justification
    types.
ListCOMP:
  attribs: Access the table-level attributes of a List COMP, enabling programmatic
    manipulation of list data and appearance.
  focusRow: Retrieve the last row that had keyboard focus for editing, useful for
    tracking user interaction.
  scroll: Programmatically scroll the List COMP to a specific row and column.
  selectRow: Get the currently selected row in the List COMP, helpful for tracking
    user selections.
  setKeyboardFocus: Programmatically set keyboard focus to a specific cell in the
    list, with optional select-all behavior.
LtcinCHOP_Class:
  timecode: Creates a Timecode object representing LTC (Longitudinal Time Code) input
    data, facilitating precise time synchronization and tracking.
LtcoutCHOP_Class:
  timecode: Generates a Timecode object for LTC output data, enabling detailed time
    representation and synchronization management.
MathCHOP_Class:
  chanIndex: Provides the current sample index being evaluated, useful for implementing
    custom mathematical operations on individual channels.
Matrix_Class:
  copy: Create a new matrix with identical values to the current matrix.
  invert: Calculate and apply the matrix's multiplicative inverse to itself.
  rotate: Apply rotation transformations to the matrix around X, Y, or Z axes.
  rows: Retrieve a list representation of the matrix's rows.
  transpose: Swap the matrix's rows and columns in-place, modifying the original matrix.
  vals: Access or modify the underlying numerical values of the matrix.
MediafileinfoDAT_Class:
  acodec: Get the audio codec of a media file.
  fetchInfo: Extract comprehensive metadata information about a media file.
  filename: Retrieve the name of the loaded media file.
  fps: Get the frame rate of the media file.
  height: Get the pixel height of the media file.
  width: Get the pixel width of the media file.
Mesh_Class:
  center: Retrieve or set the barycentric center point of the mesh primitive.
  closedU: Indicates whether the mesh is closed along its U parameter, forming a continuous
    surface.
  destroy: Remove the current mesh primitive, optionally deleting associated points.
  normal: Calculate the normalized vector perpendicular to the mesh surface.
  numRows: Get the total number of rows in the mesh geometry.
MidiinCHOP_Class:
  timecode: Creates a Timecode object from quarter frame MIDI messages, allowing precise
    time tracking and synchronization in MIDI-based workflows.
MidioutCHOP_Class:
  panic: Immediately stop all MIDI notes and reset all channel volumes to prevent
    stuck notes.
  send: Send raw MIDI bytes through the output, useful for custom MIDI messages.
  sendControl: Send a MIDI Controller event to modify parameters like volume, pan,
    or effects.
  sendExclusive: Send system exclusive MIDI messages for device-specific commands.
  sendNoteOff: Stop a MIDI note playing on a specific channel and note index.
  sendNoteOn: Trigger a MIDI Note On event for a specific channel, note index, and
    velocity.
  sendPitchBend: Adjust the pitch of a MIDI channel using a bend value.
  sendProgram: Change the instrument/sound patch for a specific MIDI channel.
ModelSOP_Class:
  appendBezier: Add a new Bezier curve to the geometry with configurable vertex count,
    closure, and order.
  appendMesh: Generate a new mesh surface with specified rows and columns, with options
    for U and V closure.
  appendPoly: Create and add a new polygon with a specified number of vertices to
    the geometry, with options for closure and point generation.
  clear: Remove all existing geometry from the SOP, resetting it to an empty state.
  copy: Copy geometry from another SOP, completely replacing the current geometry.
Monitor_Class:
  dpiScale: Get the display scaling factor for high-resolution screens.
  index: Get the sequential position of this monitor in the system's display configuration.
  isPrimary: Determine if this monitor is set as the primary display device.
  refreshRate: Obtain the current vertical refresh rate of the monitor.
  width: Retrieve the horizontal pixel resolution of the monitor.
MoviefileinTOP_Class:
  fileHeight: Retrieve the pixel height of the loaded movie file, useful for image
    processing and sizing operations.
  fileStartTimecode: Get the starting timecode of a video file, helpful for precise
    video synchronization and metadata tracking.
  fileWidth: Get the pixel width of the loaded movie file, essential for understanding
    image dimensions and scaling.
  findHeader: Search and retrieve a specific header value from the movie file's metadata,
    useful for extracting custom file information.
  hasAudio: Check if the movie file contains audio tracks, useful for multimedia file
    validation.
  index: Get the current playback position in the movie file, enabling precise frame
    navigation.
  metadata: Access a comprehensive dictionary of video file metadata, providing detailed
    information about the media file.
  numImages: Determine the total number of frames in the movie file, helpful for playback
    and processing control.
  preload: Prepare the movie file by opening and pre-reading initial frames, optimizing
    playback performance.
  unload: Unload the movie file and free memory, helping manage system resources during
    complex media workflows.
MoviefileoutTOP_Class:
  fileSuffix: Generate a unique file suffix for output movies, allowing for automatic
    file naming and organization.
MpcdiTOP_Class:
  cameraTransform: Retrieve the camera transformation matrix for multi-projector configurations,
    essential for advanced projection mapping.
  projection: Get the projection matrix for precise alignment in complex display setups.
MqttclientDAT_Class:
  isConnected: Check if the MQTT client is currently connected to a broker.
  publish: Send a message to a specific MQTT topic.
  subscribe: Subscribe to receive messages from a specific MQTT topic.
  unsubscribe: Stop receiving messages from a previously subscribed MQTT topic.
NetworkEditor_Class:
  fitWidth: Automatically adjust the view to accommodate a specified network width.
  home: Reset the network view to show all operators or selected operators.
  showNetworkOverview: Toggle the visibility of the network topology overview panel.
  x: Set or get the horizontal scroll position of the network editor.
  zoom: Control the magnification level of the network editor view.
NoiseCHOP_Class:
  chanIndex: Get the current channel index during noise generation, useful for custom
    noise algorithms.
NotchTOP_Class:
  exposedProperties: Access a dictionary of properties imported from a Notch block,
    facilitating integration of Notch visual effects.
NvidiaflexsolverCOMP:
  actors: Retrieve a list of all Actor COMPs currently participating in the Nvidia
    Flex physics simulation.
OP_Class:
  addError: Add a custom error message to an operator during its cooking process,
    useful for runtime diagnostics.
  childrenCPUMemory: Calculate the total CPU memory usage of all child operators,
    helping with performance monitoring and optimization.
  cook: Force the operator to process its inputs and update its state, with optional
    recursive processing for child operators.
  destroy: Permanently remove the operator from the TouchDesigner project, releasing
    its resources.
  fetch: Retrieve a value from the operator's storage dictionary, with optional default
    value and search behavior.
  id: Get the unique identifier for the operator, which can be used to reference the
    operator through shortcuts like op().
  name: Get or set the name of the operator, allowing you to rename or identify specific
    nodes in your TouchDesigner project.
  openViewer: Launch a floating content viewer for the operator, allowing visual inspection
    of its current state.
  par: Access the collection of parameters associated with the operator, enabling
    parameter manipulation and retrieval.
  passive: Determine if the operator will only cook when its access methods are explicitly
    called, providing more control over processing.
  path: Retrieve the full file path to the operator, useful for identifying its location
    in the project hierarchy.
  setInputs: Conveniently set multiple inputs for an operator by passing a list of
    operators.
  storage: A dictionary for storing custom user-defined data directly on the operator,
    allowing for flexible metadata storage.
  store: Save a key-value pair to the operator's storage dictionary for custom data
    persistence.
  valid: Check if the operator currently exists in the TouchDesigner project. Returns
    True if the operator is valid and has not been deleted.
OakdeviceCHOP_Class:
  lockDevice: Acquire exclusive access to the connected Oak device for direct interaction.
  masterFrame: Get the current master time index in frame units for synchronized playback.
  masterSeconds: Get the current master time index in seconds for precise timing control.
  masterTimecode: Get the current master timecode as a formatted string for video/audio
    synchronization.
  sendMessage: Send a custom message to a specific stream on the Oak device.
OakselectCHOP_Class:
  clear: Remove all channels from the CHOP, resetting its data.
  copyNumpyArray: Copy data from a NumPy array directly into CHOP channels.
  timecode: Retrieve the master timecode from the referenced Oak device for synchronization.
OakselectTOP_Class:
  timecode: Retrieve the master timecode from an OAK device, enabling precise synchronization
    and timing control.
ObjectCOMP:
  appendCustomPage: Add a new custom parameter page to extend an operator's configuration
    options.
  cpuCookTime: Measures the duration of the last cook operation in milliseconds for
    performance profiling.
  dirty: Boolean flag indicating whether the component's contents require saving due
    to unsaved changes.
  extensions: List of all extensions attached to a component, providing access to
    dynamically loaded functionality.
  extensionsReady: Boolean indicating whether component extensions have finished compiling,
    useful for safely accessing promoted members.
  findChildren: Flexibly search for child operators using multiple filtering criteria
    like type, name, tags, and parameter values.
  importABC: Load Alembic (ABC) files into a component, with options to import lights,
    cameras, and geometry.
  importFBX: Import FBX files into a component, with configurable import settings
    for geometry, lights, and cameras.
  internalOPs: Dictionary containing references to internal operators within a component.
  localTransform: Read-only local transformation matrix for an operator, representing
    its position, rotation, and scale relative to its parent.
