.tog: A native TouchDesigner file format for exporting and storing geometry data.
  Used to preserve 3D geometry information between projects or share complex geometries.
10-Bit Color Displays: Advanced display technology supporting 30-bits per pixel (10-bits
  per color channel), providing smoother color gradients and reduced visual banding
  compared to standard 8-bit displays.
2D Texture Array: A specialized texture format in shaders allowing multiple 2D textures
  to be accessed in a single sampler. Useful for complex rendering techniques and
  optimizing texture access.
3D Parenting: A hierarchical transformation system in TouchDesigner where child 3D
  objects inherit transformations from their parent objects, enabling complex scene
  manipulation and organized object relationships.
Absolute Time: Global time tracking in TouchDesigner that starts at zero when the
  project begins and continues incrementing during playback.
Alpha-Test: A rendering technique that discards pixels based on their alpha value,
  allowing for advanced transparency and geometry cut-out effects in material rendering.
Animation Editor: A built-in TouchDesigner tool for creating and editing keyframe
  animations, allowing precise control over parameter changes over time using Animation
  COMPs.
Anisotropic Filtering: An advanced texture rendering technique that improves image
  quality on tilted polygons by dynamically sampling textures based on camera angle
  and geometry orientation.
Apple ProRes: A high-quality video codec supporting 10-12 bit color depths with excellent
  image quality, natively supported in TouchDesigner for video playback and encoding.
Arduino: A microcontroller platform for creating interactive electronic projects,
  easily integrated with TouchDesigner via Serial DAT for sensor data and communication.
Art-Net: A protocol for transmitting DMX lighting control signals over Ethernet networks.
  Used for controlling stage lighting, LED fixtures, and complex entertainment lighting
  setups.
Attribute: A property associated with geometry points like color, normals, or texture
  coordinates. Used to define additional information about vertices, surfaces, and
  spatial positioning.
Automatic Key Installation: A process for automatically installing TouchDesigner licenses
  using a pre-configured text file. Enables quick and scripted license activation
  without manual intervention.
Back-Face Culling: A rendering optimization technique that prevents drawing polygons
  facing away from the camera. Improves graphics performance by skipping unnecessary
  polygon rendering.
Backdrop: The background grid behind network nodes in TouchDesigner that displays
  node viewers and helps organize visual network layouts.
Beat Dialog: A utility for tapping in and setting beats-per-minute (BPM) manually.
  Used for synchronizing visual effects and animations with music or rhythmic content.
Binding: A method of connecting parameters between operators, allowing real-time value
  sharing and dynamic parameter relationships in TouchDesigner.
Bitwig: A digital audio workstation with TouchDesigner integration, enabling advanced
  audio-visual performances through parameter synchronization and control.
BitwigMain COMP: Central communication hub for the TDBitwig System, managing information
  exchange between Bitwig controller extension and TouchDesigner. Used for integrating
  Bitwig digital audio workstation control.
BitwigTrack COMP: Interfaces with specific Bitwig Track attributes, allowing control
  and interaction with individual tracks in a Bitwig project.
BlackTrax: A real-time motion tracking system used for performance and interactive
  installations, providing precise spatial tracking data for visual effects.
Blackmagic Design: Professional video hardware manufacturer with native TouchDesigner
  support for video capture, input, and output across various formats and resolutions.
Blending: An image compositing technique for combining pixel colors with adjustable
  transparency and mixing ratios.
Bloom COMP: Image effect component that selects and remaps brightest pixels, applying
  blur, glow, and color remap techniques for creative visual processing.
Bluefish444: A video hardware manufacturer providing professional video I/O cards
  with native TouchDesigner integration for broadcast and production workflows.
Bookmark: A saved reference to a specific network location in TouchDesigner, allowing
  quick navigation between different parts of a project.
Bookmark Menu: An interface for managing and accessing saved network location references
  in TouchDesigner.
Bookmarks Dialog: A user interface for adding, editing, and managing bookmarks within
  a TouchDesigner project.
Books: Reference materials and guidebooks for learning TouchDesigner, covering topics
  like shader programming, fundamentals, and audio-visual design techniques.
Bullet Dynamics: A physics simulation system in TouchDesigner that creates realistic
  rigid body interactions through collision detection, forces, and motion calculations.
Bypass Flag: A toggle that temporarily disables an operator, causing it to pass through
  its first input unchanged, useful for network testing and troubleshooting.
CHOP: A channel operator family for handling time-based numerical data like animation,
  audio, sensor inputs, and mathematical operations. Used for generating and manipulating
  sequences of numbers.
CHOP Channel Page: Defines channel properties like sample rate, naming conventions,
  and extend conditions. Used to configure how channel data is generated, interpolated,
  and sampled.
CHOP Common Page: Controls global CHOP settings like time slicing, channel scope,
  sample rate matching, and export methods. Provides fundamental configuration for
  channel data processing.
CHOP Export: Mechanism to transfer CHOP channel data to operator parameters automatically.
  Used for connecting channel data to animation, transformations, or other dynamic
  properties.
CHOP Exporting: Transfer CHOP channel data to operator parameters. Use for animation,
  audio reactivity, or data-driven effects.
CHOP Techniques: Methods for converting data between different operator types (TOP,
  SOP, CHOP) and manipulating channel information. Used for cross-operator data transfer
  and advanced channel processing.
CHOP Viewer: 2D graphical interface for previewing and editing CHOP channels. Used
  to inspect, analyze, and manually modify channel data in real-time.
COMP: A fundamental container component in TouchDesigner that can hold networks, create
  custom interfaces, and organize operational logic within a project.
CUDA: NVIDIA's parallel computing platform for GPU acceleration in TouchDesigner.
  Use to offload complex computational tasks and leverage GPU processing power for
  high-performance graphics and data manipulation.
Callback: Python functions attached to operators that automatically execute when specific
  events or changes occur within the component.
Category:Attributes: A documentation classification for TouchDesigner pages related
  to operator attributes and properties.
Category:C++: A documentation classification for TouchDesigner pages involving C++
  programming and extensions.
Category:CHOP Topics: A documentation classification for pages discussing Channel
  Operators (CHOPs) and related concepts.
Category:CHOPs: A comprehensive documentation category for all Channel Operators in
  TouchDesigner.
Category:GLSL: A documentation classification for pages involving OpenGL Shading Language
  and shader programming.
Category:GPU: A documentation classification for pages discussing GPU-accelerated
  processing and computations.
Category:Geometry: A documentation classification for pages related to geometric operations
  and 3D geometry processing.
Category:Licensing and Keying: A documentation classification for pages about TouchDesigner
  software licensing and activation.
Category:MATs: A documentation classification for Material operators and texture-related
  pages.
Category:Optimize: A documentation classification for performance optimization techniques
  and strategies in TouchDesigner.
Change OP Type Dialog: Utility for quickly converting an operator to another type
  within the same operator family. Useful for rapidly prototyping and restructuring
  project components.
Channel: A sequence of numbers (samples) used for animation, audio, math, simulation,
  and data processing in TouchDesigner. Used to represent time-based or numeric data
  across different operators.
Checker COMP: A simple image generator that creates a checkerboard pattern using two
  specified RGBA colors.
Clone: A replication mechanism for creating multiple instances of nodes with shared
  or independent properties. Used for generating repetitive networks with slight variations.
Color Space: A standardized method for defining and translating color values across
  different devices, ensuring consistent color reproduction in digital media.
Color Space Workflows: Techniques for managing color data transformation and preservation
  across different stages of visual processing. Used to maintain color accuracy and
  linear color mathematics.
Component: A specialized operator containing its own internal network with unique
  capabilities. Used for creating modular, self-contained, and reusable computational
  structures.
Component Editor Dialog: Interface for customizing components, creating parameters,
  and managing extensions. Used to extend TouchDesigner's native operator capabilities.
Component Time: A local time management system within a TouchDesigner component that
  allows independent control of timeline settings like rate, start, and end. Useful
  for creating custom timing behaviors for specific parts of a project.
Component Timeline: A visual timeline interface at the bottom of a network editor
  showing the current timecode and playhead position for a specific component's time
  settings. Helps track and control time-based animations and interactions.
Component Variables: Local variables specific to a single component that can be used
  across its internal network. Typically used with Tscript for storing and referencing
  values within a localized context, with hierarchical evaluation.
Compute Shader: A GPU programming technique that allows general-purpose parallel computation
  beyond traditional rendering, enabling complex data processing directly on graphics
  hardware with flexible input/output capabilities.
Connector: The input/output notches on TouchDesigner operators that enable connecting
  operators within the same family, allowing data flow and communication between different
  nodes in a network.
Cook: The process of an operator generating or updating its output data in response
  to changes in inputs, parameters, or external requests. TouchDesigner uses a 'pull'
  system where cooking occurs only when data is actively requested.
Cooking Flag: A component-level setting that disables cooking of an internal network,
  preventing internal nodes from updating while maintaining their previous state and
  minimizing computational overhead.
Corner Pin POP COMP: A perspective deformation component for point data using OpenCV's
  homography transformation.
Corner Pin SOP COMP: A 3D geometry perspective deformation tool for applying bilinear
  or perspective transformations to points and surfaces.
CppParsTemplateGen COMP: A utility for automatically generating C++ parameter files
  to streamline custom operator development in TouchDesigner.
Cube Map: A six-sided texture used for advanced rendering techniques like environment
  reflections, sampled using a 3D vector to simulate complex lighting and reflection
  scenarios in 3D graphics.
Current Flag: A node-specific flag indicating which node is currently active within
  a network component. Clicking a node makes it the current node, with only one node
  being current per network.
Custom Operators: Third-party operators created using TouchDesigner's C++ API that
  integrate seamlessly into the TouchDesigner environment. Used to extend TouchDesigner's
  native functionality with custom, compiled binary code.
Custom Parameters: User-defined parameters created on components with unique naming
  conventions, distinguished by capitalization. Use to add specialized configuration
  options to operators beyond built-in parameters.
DAT Export: A method for transferring data from a DAT table to operator parameters
  using a specific table format with path, parameter, value, and enable columns. Enables
  procedural data transfer and dynamic parameter configuration.
DAT Viewer: An interface for displaying and potentially editing text data within DAT
  operators, supporting both raw text and spreadsheet-style table views. Provides
  direct access to multi-line text and tabular data.
DMX: A lighting control protocol supporting various communication methods like sACN,
  Art-Net, and FTDI for controlling lighting fixtures and complex light setups.
Dante: A software and hardware audio networking solution that enables audio streaming
  between devices over network infrastructure. Provides virtual sound card functionality
  for routing audio in TouchDesigner across computers and audio systems.
Depth-Test: An OpenGL rendering mechanism for determining object visibility by comparing
  pixel depth values. Controls how objects are rendered in 3D scenes by managing which
  pixels are drawn based on their distance from the camera.
Designer Mode: The primary editing environment in TouchDesigner where networks, nodes,
  and parameters are configured. Contrasts with Perform Mode and provides full access
  to network editing tools and interfaces.
Diagnosing Memory Corruption Using Global Flags: A Windows debugging technique to
  identify memory-related crashes in TouchDesigner by forcing the OS to create read-only
  memory guard pages, which help pinpoint memory write errors.
Dialog: TouchDesigner interface windows for project monitoring, configuration, and
  settings, typically accessed through the Dialogs menu to configure various aspects
  of the application.
Dialogs:Preferences Dialog: A configuration window for setting personal default TouchDesigner
  options and behaviors, which are saved and applied across future application sessions.
Dimension: Metadata describing the structural arrangement of points in a POP, representing
  how points are organized across multiple dimensions like rows, columns, and depth,
  which is crucial for understanding point list structures.
Display Flag: A toggle that allows an operator's data to be viewed in a Viewer pane,
  controlling visibility of procedural data in network editors and viewers.
Display Options: Controls for visualizing geometric attributes, point overlays, grid
  rendering, and viewport settings for 3D and 2D visual exploration in TouchDesigner.
Docking: A network organization method allowing nodes to be connected and potentially
  collapsed, helping to manage and reduce visual complexity in TouchDesigner networks.
Drag-and-Drop: A customizable system for creating interactive user interfaces in TouchDesigner,
  using Python callbacks to define drag and drop behaviors for Panel Components.
Early Depth-Test: A GPU optimization technique that reduces pixel shader workload
  by discarding obscured pixels before rendering, improving overall graphics performance.
Edit Keyframes: A method for creating and manipulating animation channels using the
  Animation COMP and Animation Editor, allowing precise control of parameter animations.
Educational Setup: A special TouchDesigner license tier for students and schools,
  providing full commercial features with restrictions on non-commercial usage.
Errors Dialog: A troubleshooting window that lists and helps diagnose operator errors,
  allowing quick navigation to problematic nodes.
Event: Single-moment triggers in TouchDesigner that can be generated by user actions,
  external devices, or internal states, enabling reactive and interactive programming.
Experimental:Clone: A method for creating duplicates of operators or components, potentially
  with shared or independent properties, used for advanced project organization and
  manipulation.
Experimental:Run Command: A Python command execution method in TouchDesigner with
  advanced timing and execution options. Used for delayed script running, frame-specific
  execution, and complex scripting workflows.
Export: Transfer channel data from CHOPs or DATs to operator parameters. Used for
  animation, data-driven effects, and creating dynamic connections between operators.
Export Flag: A toggle switch on CHOPs and DATs that enables or disables data exporting
  from the node. Controls data flow and connection visibility in TouchDesigner networks.
Export Movie Dialog: A tool for rendering high-quality, non-realtime video exports
  from TouchDesigner viewers. Supports various codecs, resolutions, and audio integration
  for creating professional video outputs.
Expose Flag: A network display option to show or hide specific nodes in the TouchDesigner
  interface. Useful for simplifying complex network views and focusing on key operators.
Expression: A text-based formula that evaluates to a value using Python or Tscript
  syntax. Used for dynamic parameter calculations, data transformations, and conditional
  logic in TouchDesigner.
Extend Conditions: A CHOP parameter that defines behavior for channel values outside
  their original time range. Controls how channels interpolate, cycle, or hold values
  beyond their original duration.
Extensions: Custom Python classes added to TouchDesigner components to extend functionality.
  Used for creating reusable, modular code within individual components.
FBX: A 3D file format for exchanging geometry, animations, and scene data between
  3D software and TouchDesigner. Supports importing and exporting 3D models and animations.
FFmpeg: An open-source multimedia framework integrated into TouchDesigner for video
  and audio processing. Provides advanced codec and file format support for media
  handling.
File Metadata: A system for reading and writing text tags and information associated
  with files in TouchDesigner. Used for file organization, searching, and custom metadata
  management.
Filter: TouchDesigner operators that require input to generate meaningful output.
  Typically lighter-shaded operators that transform or process data from other nodes.
Filter per Sample: A CHOP processing mode where each channel sample is filtered independently.
  Enables granular, sample-level temporal filtering and complex channel manipulations.
Find Operator Dialog: A search utility in TouchDesigner for quickly locating operators
  within a network by typing their names. Helps navigate complex project structures
  efficiently.
First Things to Know about TouchDesigner: An introductory guide covering basic TouchDesigner
  navigation, including mouse interactions, network view controls, and fundamental
  interface operations for new users.
Flag: A binary setting on TouchDesigner operators that modifies their behavior or
  state, visible in the Network Editor and configurable through Python. Used for controlling
  operator properties like lock, bypass, or render status.
Flex: Nvidia's particle-based physics simulation system in TouchDesigner, enabling
  unified simulation of rigid, soft, fluid, rope, and cloth objects using a particle
  representation approach.
FlexsolverCOMP Class: A simulation component for advanced physics and particle dynamics
  in TouchDesigner. Used for creating complex fluid, soft body, and rigid body simulations
  with high-performance GPU acceleration.
Floating Cloud Licenses: A flexible licensing system allowing multiple team members
  to share TouchDesigner licenses globally via cloud-based credential management,
  ideal for distributed teams and cloud server deployments.
Folder: A reference to a Windows or macOS directory containing files, distinct from
  TouchDesigner's internal network path. Used in file-reading operators to specify
  file system locations.
Force Field: A physics simulation tool in TouchDesigner that uses Metaball primitives
  to create directional influences on Particle or Spring SOPs, enabling complex particle
  movement and interaction.
Frame: The current position in TouchDesigner's timeline, representing a discrete moment
  in an animation or simulation, typically running at 60 frames per second by default.
Frame Rate: The number of frames displayed per second in TouchDesigner's timeline,
  globally configurable and used to control the project's temporal resolution and
  performance.
GLSL: The OpenGL Shading Language used in TouchDesigner for creating custom 2D and
  3D shaders in Materials and GLSL TOPs.
GPU: The Graphics Processing Unit that handles computational graphics tasks, where
  TouchDesigner's TOP operations are primarily executed.
GPU Processing: High-speed, parallel processing of graphics and computational tasks
  using the graphics card's dedicated processor.
Generator: TouchDesigner operators that can produce output without requiring input
  connections, typically represented by darker-shaded nodes in the operator creation
  dialog.
Geometry Detail: A comprehensive data structure in TouchDesigner that stores all geometric
  information for 3D models within a SOP, including points, primitives, attributes,
  and groups.
Geometry Spreadsheet: A method to view detailed information about points and primitives
  in a SOP, typically used by converting SOP data to a DAT for analysis.
Geometry Viewer: A 3D viewport for navigating and inspecting geometry in TouchDesigner,
  with multiple camera modes for exploring 3D scenes and models.
Getting Started: Initial guidance for setting up TouchDesigner, including system requirements,
  mouse navigation, and basic interface interaction techniques.
Global OP Shortcut: A way to create a universal reference to a specific component
  that can be accessed from anywhere in a TouchDesigner project.
Group: A named subset of points or primitives in POPs and SOPs that allows selective
  operations on specific geometry elements.
Hap: A high-performance video codec with two-stage compression, designed for efficient
  playback of high-resolution video in real-time applications.
Hardware Frame Lock: A synchronization technique that ensures precise GPU and display
  timing across multiple outputs and graphics cards.
Immune: A node flag that prevents changes in a Clone from affecting specific nodes.
  Used to customize individual operators within a cloned network while maintaining
  overall template consistency.
Immune Flag: A configuration setting that allows specific nodes within a Clone to
  remain unaffected by master component changes. Useful for preserving unique parameters,
  data, or additional operators in cloned networks.
Import: TouchDesigner's built-in functionality to load various media and data file
  types into a project. Supports drag-and-drop or file menu import of assets like
  images, videos, 3D models, and other supported formats.
Import File Dialog: A file browser interface in TouchDesigner for importing assets,
  accessible via File -> Import File... or Ctrl+I. Allows selecting and loading files
  directly into the current network pane with confirmation in the status bar.
Initialize Start: A core concept in TouchDesigner defining the initial state and setup
  of an operator or component. Used to configure starting conditions, set initial
  values, and prepare operators for dynamic animation or data processing.
Install TouchDesigner: The process of downloading and setting up the TouchDesigner
  software on Windows or macOS. Involves choosing between full or web installer, and
  completing license activation for accessing the visual programming environment.
Instance: A method of creating multiple copies of an object or referencing another
  operator's data in TouchDesigner. Used for geometry replication, efficient rendering,
  and creating dynamic, data-driven visual systems.
Intel Processors and TouchDesigner: A guide to understanding CPU requirements for
  running TouchDesigner, focusing on single-thread performance, core speed, and processing
  capabilities for real-time visual computation.
Internal Operators: A shortcut mechanism in TouchDesigner for quickly referencing
  frequently used operators within a component. Provides efficient navigation and
  parameter linking across complex network structures.
Internal Parameters: A method of creating custom parameters within a component that
  can be accessed from anywhere in the network. Used for centralized configuration
  and dynamic parameter management.
Interoperability: TouchDesigner's ability to interface with various devices, protocols,
  and software tools through native operators and components. Enables integration
  with video, audio, tracking, and other external systems.
Intro to TouchDesigner: An overview of TouchDesigner's interface, operator families,
  and basic workspace organization. Introduces users to the visual programming environment
  and its core computational concepts.
Introduction To CHOPs Vid: A video tutorial introducing Channel Operators (CHOPs)
  in TouchDesigner. Explains the fundamental concepts of data manipulation and animation
  using channel-based operators.
Introduction To SOPs Vid: A video tutorial exploring Surface Operators (SOPs) in TouchDesigner.
  Covers the basics of 3D geometry creation, manipulation, and processing techniques.
Introduction to Python Tutorial: A guide to using Python scripting within TouchDesigner,
  focusing on parameter expressions, time-based interactions, and basic programming
  techniques for dynamic visual creation.
JSON: A lightweight data interchange format for storing and transmitting structured
  data. Used in TouchDesigner for configuration, data exchange, and scripting interactions.
Julia COMP: A mathematical visualization component that generates fractal images based
  on the Julia set. Used for creating complex, mathematically-derived visual patterns
  and exploring geometric complexity.
Keyboard Shortcuts: Customizable hotkeys in TouchDesigner for both application-wide
  actions and user-defined panel interactions, enhancing workflow efficiency.
Keyframe Animation: A technique for creating smooth, interpolated animations by defining
  specific values at key points in time. Used to animate parameters with precise control
  over timing and transitions.
Kinect: A motion sensing input device that provides depth, color, and skeleton tracking
  data. Used in TouchDesigner for interactive installations, motion capture, and gesture-based
  interfaces.
Layout: A configuration of panes and network views in the TouchDesigner interface.
  Used to organize and customize workspace views for different types of project development
  and performance.
Leap Motion: A hand tracking input device that provides detailed finger and hand movement
  data. Used in TouchDesigner for gesture-based interactions, 3D tracking, and interactive
  installations.
License Dongle: A mobile USB licensing option for TouchDesigner that allows you to
  run the software on any computer by plugging in a hardware key. Supports transferring
  Educational, Commercial, or Pro licenses.
Link: A grey dashed line between nodes representing data connections across different
  operator families. Used for referencing paths, CHOP exports, and parameter connections
  between unrelated operators.
Lister Custom COMP: A TouchDesigner UI component for creating interactive lists and
  tables with sorting, filtering, and selection capabilities. Useful for file browsers,
  selection interfaces, and dynamic data displays.
Lock Flag: A setting that saves an operator's current state directly into a .toe file,
  preserving image or geometry data. Ensures consistent project portability across
  different computers.
Logger: A built-in logging system in TouchDesigner for tracking and recording application
  events and debugging information. Provides customizable logging levels and output
  options for developers.
Logger COMP: An integrated logging system for tracking events, errors, and messages
  within TouchDesigner projects. Provides robust debugging and monitoring capabilities
  for complex interactive systems.
MIDI: A communication protocol for receiving and transmitting musical performance
  and control data in TouchDesigner. Used to integrate musical controllers, synchronize
  audio-visual interactions, and capture musical performance information.
MIDI Mapper Dialog: A TouchDesigner interface for configuring and managing MIDI input
  and output device connections. Essential for setting up MIDI device mappings and
  creating MIDI-driven interactive experiences.
MPCDI: A standardized format for multi-projector alignment and calibration, enabling
  precise geometric and color blending across multiple projection surfaces. Used in
  advanced projection mapping and immersive display installations.
MQTT: A lightweight IoT messaging protocol for connecting devices and transmitting
  data. Used for remote sensor communication, mobile applications, and low-bandwidth
  network scenarios.
Macro: A single word script representing a set of commands in TouchDesigner, often
  mapped to function keys. Used for quick access to complex operations or custom workflows.
Mapping POP Attributes: A feature that allows dynamically mapping point-level attributes
  to operator parameters, enabling per-point variations in transformation, color,
  or other geometric properties.
Material Design Icons: A comprehensive icon font included in TouchDesigner for creating
  visually consistent icons in text-based interfaces. Use when you need standardized,
  professional-looking icons across your project.
Matrix Parameters: A method for representing 4x4 transformation matrices in TouchDesigner
  using various data sources like tdu.Matrix, Table DAT, or CHOP. Essential for 3D
  transformations, camera movements, and spatial manipulations.
Mesh: A geometric primitive composed of interconnected vertices and edges with a defined
  UV topology that can be dynamically shaped and transformed. Used for creating complex
  3D geometry with consistent point relationships.
Metaball: A procedural geometric primitive that creates organic, blob-like shapes
  by blending force fields with adjustable density and weight. Ideal for creating
  smooth, fluid-like surfaces and organic form generation.
Mipmapping: A texture rendering technique that reduces visual artifacts when scaling
  textures by pre-calculating and storing multiple resolution versions of an image.
  Ensures smooth, high-quality texture rendering across different view distances.
Mouse Click: TouchDesigner's mouse interaction terminology defining left (LMB), middle
  (MMB), and right (RMB) mouse button actions. Used for interface interactions and
  defining custom interaction behaviors.
Movie Playback: The process of reading, decoding, and rendering video files in TouchDesigner,
  involving file reading, CPU decoding, and GPU rendering stages. Critical for video-based
  visual projects and media playback.
Multi-Camera Rendering: Rendering multiple cameras in a single graphics pass, improving
  performance for VR, cube maps, and complex scene rendering. Supported by modern
  GPUs to reduce draw calls and optimize rendering efficiency.
MultiTouch: Support for multi-finger input and touch interactions in TouchDesigner.
  Enables touch-based control interfaces, supporting Windows multi-touch and various
  input methods like TUIO and iOS touch data.
Multiple Graphic Cards: Configuration options for using multiple GPUs, with considerations
  for monitor output, performance implications, and specialized display setups.
Multiple Monitors: Sending video output to multiple displays or projectors in TouchDesigner.
  Enables spanning interfaces across screens, using window management techniques for
  optimal performance and display configurations.
NDI: A network video protocol for low-latency video streaming over IP networks. Enables
  automatic video source discovery, supports high-resolution video with optional alpha
  channels, and uses efficient SpeedHQ compression.
NDI Performance Testing: Evaluating network bandwidth and video streaming capabilities
  using different network hardware and switches to determine maximum NDI video transmission
  performance.
NDI and Dante Networks: Caution when running NDI alongside Dante audio networks, as
  concurrent use can introduce significant network latency and potential audio performance
  issues.
NatNet In CHOP: A specialized CHOP for receiving motion capture data from NatNet protocol.
  Used to import tracking data from systems like OptiTrack for real-time 3D tracking
  and animation.
Network: A collection of interconnected operators within a component, showing data
  flow through colored wires and representing how information is processed and transferred
  between different TouchDesigner nodes.
Network Editor: The primary workspace for creating, connecting, and managing TouchDesigner
  networks. Provides navigation, selection, and organization tools for building complex
  operator configurations.
Network Path: The hierarchical location of an operator within a TouchDesigner project,
  using a file-system-like notation to uniquely identify and reference specific nodes.
Network Protocols: Different methods of data transmission in TouchDesigner, varying
  in reliability, data delivery mode, and connection characteristics for various network
  communication scenarios.
Network Utilities: Tools like Comments, Network Boxes, and Annotates used for organizing,
  documenting, and managing TouchDesigner networks, providing visual structure and
  context.
New Project Dialog: A utility for creating new TouchDesigner project folder structures,
  allowing users to specify project location and initial configuration.
Node: The fundamental building block in TouchDesigner, representing an operator with
  flags, positioning, and the ability to process and transmit data between different
  components.
Node Viewer: A visual interface for displaying and interacting with individual node
  contents, allowing users to inspect and manipulate operator-specific information
  and outputs.
Normal Mapping: A texture technique for adding surface detail and depth to 3D geometry
  by encoding surface orientation information in pixel colors. Used to create realistic
  surface textures without increasing polygon complexity.
Normals: Vectors representing the perpendicular orientation of a surface, point, or
  primitive in 3D space. Critical for lighting calculations, surface shading, and
  determining how objects interact with light in 3D rendering.
Notch: A real-time 3D rendering and visual effects software that can be directly integrated
  into TouchDesigner via the Notch TOP. Used for creating complex, high-performance
  visual effects and interactive graphics.
NotchLC: A high-quality, GPU-accelerated video codec offering 10-bit color and superior
  compression compared to standard formats. Ideal for high-fidelity video playback
  and recording in visual performance environments.
NumPy: A Python library for numerical computing that allows easy data conversion between
  TouchDesigner operators and arrays. Used for advanced data manipulation, mathematical
  operations, and scientific computing within TouchDesigner.
Nvidia Flex Solver COMP: A specialized component for advanced physics simulations
  using NVIDIA Flex technology. Enables complex particle, cloth, and soft body dynamics
  with high-performance GPU computation.
Nvidia Flex TOP: A physics simulation TOP enabling complex particle and soft body
  dynamics using NVIDIA's GPU-accelerated Flex technology. Used for advanced procedural
  animations and physical simulations.
Nvidia Flow: A volumetric fluid simulation system for creating realistic fire and
  smoke effects in real-time. Requires Nvidia GPU and allows precise control over
  temperature, fuel, and smoke parameters.
Nvidia Flow Emitter COMP: A particle simulation component that generates fluid-like
  flow effects using NVIDIA's GPU-accelerated technology. Ideal for creating dynamic,
  realistic fluid and particle simulations in real-time visual environments.
Nvidia Flow TOP: A fluid dynamics simulation TOP that generates realistic fluid and
  smoke effects using GPU-accelerated algorithms. Ideal for creating dynamic particle
  and fluid visualizations.
Nvidia Geforce vs Quadro: Two GPU lines with different specializations - Geforce for
  gaming/personal use and Quadro for professional media production. TouchDesigner
  users choose based on performance needs and budget.
Nvidia Upscaler TOP: AI-powered video upscaling TOP that enhances image resolution
  and quality using NVIDIA's machine learning algorithms. Used for improving video
  textures and rendering quality in real-time graphics.
OAK-D: An integrated depth-sensing camera system supported in TouchDesigner, providing
  advanced machine vision and spatial awareness capabilities. Enables real-time depth
  mapping and AI-powered computer vision applications.
OP Create Menu: A method for adding multiple operators to a TouchDesigner network
  simultaneously using modifier keys. Useful for quickly building complex networks
  and connecting operators.
OP Snippets: A collection of 700+ live TouchDesigner operator examples that can be
  accessed through the Help menu or right-click context menus. Provides ready-to-use
  code and technique demonstrations.
OSC: Open Sound Control protocol for sending and receiving messages between applications.
  Used in TouchDesigner via OSC In/Out CHOPs and DATs for real-time communication
  with audio and control software.
Object: A component type in TouchDesigner used to define and render 3D scenes, including
  geometry, cameras, lights, and null objects. Essential for creating complex 3D visualizations
  and interactive environments.
Oculus Rift: A virtual reality headset with native support in TouchDesigner via Oculus
  Rift TOP and CHOP. Enables immersive VR experiences and interactive 3D visualization
  directly within the TouchDesigner environment.
OpenCV: A computer vision library that enables advanced image processing and analysis
  in TouchDesigner. Used for tasks like feature detection, image transformation, and
  advanced computer vision techniques.
OpenEXR: A high dynamic range image file format supporting 32-bit floating-point data
  and multiple channels. Ideal for storing complex rendering and VFX image sequences
  with high color depth.
OpenGL Stereo: A GPU rendering technique for generating stereoscopic 3D images by
  providing separate left and right eye views. Used for creating immersive virtual
  reality and 3D visualization experiences.
OpenVR: Valve's virtual reality software interface for integrating VR hardware like
  HTC Vive into TouchDesigner. Enables tracking of VR devices, controllers, and rendering
  stereoscopic content.
OpenVR Actions: A SteamVR abstraction layer that maps hardware-independent interaction
  events to specific controller inputs. Allows creating VR interactions that work
  across different VR controller types.
Operator Family: The fundamental classification of operators in TouchDesigner, each
  with a specific color and data type. Determines how operators can be connected and
  what type of data they process.
Operator Language: The scripting environment for TouchDesigner operators, supporting
  Python and the legacy Tscript language. Defines how parameter expressions and DAT
  scripts are interpreted.
Optimize: The process of improving TouchDesigner performance by identifying and resolving
  computational bottlenecks between CPU and GPU processing. Critical for creating
  smooth, real-time interactive experiences.
Optimized Python Expressions: A custom Python expression execution engine in TouchDesigner
  that parses and evaluates parameter expressions faster than standard Python. Used
  to optimize commonly used parameter calculations with improved performance.
Orbbec: A manufacturer of 3D depth-sensing cameras compatible with TouchDesigner.
  Used for capturing depth maps, point clouds, and body tracking through specialized
  Orbbec TOPs.
Ouster: A LIDAR sensor manufacturer supported in TouchDesigner for real-time 3D environment
  scanning. Used to capture and manipulate point cloud data from laser-based environmental
  mapping devices.
POPs: GPU-accelerated operators for creating and modifying 3D point data. Used for
  rendering 3D geometry, lighting control, and data visualization across devices.
Palette: TouchDesigner's library of pre-built operators and components for rapid development.
  Use to quickly add common visual, audio, and interactive elements to your project.
Palette Browser: A built-in TouchDesigner library containing pre-made components and
  media that can be easily dragged and dropped into networks. Provides quick access
  to reusable elements and templates.
Palette:TDVR: A toolkit of components for integrating Virtual Reality devices with
  TouchDesigner. Used for creating VR experiences with Oculus, VIVE, and OpenVR systems.
Palette:arcBallCamera Ext: An interactive camera control component that allows rotating,
  dollying, and translating a camera around a scene. Useful for creating dynamic,
  user-controlled camera movements in 3D environments.
Palette:arcBallGeometry Ext: An interactive geometry manipulation component that allows
  rotating, dollying, and translating 3D objects with a fixed camera. Helpful for
  interactively transforming scene geometry.
Palette:audioAnalysis Ext: A specialized audio analysis component that extracts various
  audio properties like frequency levels, rhythm, and spectral characteristics. Used
  for audio-reactive visualizations and creative sound processing.
Palette:audioSet Ext: A visualization and gain modification component for audio files.
  Provides interactive control over audio file parameters and visualization.
Palette:autoMediaPlayer Ext: A component for automatically playing and transitioning
  between media files in a specified folder. Supports linear and randomized playback
  of movies and images.
Palette:battery Ext: A system utility component that monitors and reports the battery
  or power status of the host machine. Useful for creating power-aware interfaces
  or automated workflows.
Palette:bitwigClip Ext: An interface component for controlling and monitoring specific
  clip launchers in Bitwig Studio. Enables integration and remote control of Bitwig's
  clip launching system.
Palette:bitwigClipSlot Ext: A component for managing clip slot playback and information
  in Bitwig Studio. Provides detailed control and monitoring of clip slot states across
  different tracks.
Palette:bitwigDeviceRemotes Ext: An interface for accessing and controlling device
  remote parameters in Bitwig Studio. Allows mapping and manipulation of device controls
  across different tracks.
Palette:logger Ext: A logging utility COMP for tracking and recording runtime events,
  errors, and debug information in TouchDesigner projects. Provides configurable logging
  levels, file output, and message tracking.
Palette:materialDesignIcons Ext: A component for browsing and searching over 6000
  Material Design icons, allowing users to copy icon character codes or drag icons
  directly into their TouchDesigner network.
Palette:mesh Ext: A COMP that generates 3D geometric meshes using parametric equations,
  useful for creating complex procedural shapes and surfaces in TouchDesigner.
Palette:monochrome Ext: A TOP that converts color images to grayscale, with adjustable
  color channel intensity for custom black and white image effects.
Palette:motionSense Ext: A motion detection component that analyzes video input to
  output binary movement detection signals, useful for interactive and responsive
  visual systems.
Palette:movieBlender: A movie playback component with advanced blending and transition
  capabilities, offering control over crossfading, playback speed, and video sequencing.
Palette:movieEngine Ext: A UI-less movie player component providing granular control
  over movie playback, initialization, and timing in TouchDesigner projects.
Palette:moviePlayer Ext: A comprehensive movie playback tool with advanced controls
  for movie selection, cue point management, and presentation-friendly features.
Palette:multiLevel Ext: A CHOP for generating or manipulating multi-channel or multi-sample
  data through interactive UI dragging and selection.
Palette:multiMix Ext: Python extension for extending components with custom classes
  and functions. Allows adding unique behavior to any TouchDesigner component.
Palette:multiTouch: A multi-touch interaction component for Windows touch devices
  that enables 3D scene manipulation through touch events, supporting object selection
  and movement via finger interactions.
Palette:noise Ext: Python extension for noise-related components, allowing custom
  noise generation and manipulation through additional Python functions and data.
Palette:onScreenKeyboard Ext: An extension for text and keyboard-related functionality
  in TouchDesigner, providing custom interaction and text manipulation capabilities.
Palette:opBrowser: A custom component for navigating, viewing, and editing TouchDesigner
  network operators with configurable browsing and filtering options.
Palette:operatorPath: A UI component for navigating and selecting operator paths within
  TouchDesigner networks, with advanced filtering and path selection features.
Palette:opticalFlow: A component for detecting motion between image frames, generating
  left-right and bottom-top motion channels for visual analysis and effects.
Palette:particlesGpu: A GPU-based particle system using compute shaders, supporting
  complex multi-force particle simulations with advanced force field configurations.
Palette:pixelRelocator: A component that repositions pixels from one image to another
  based on color channel-driven coordinate mapping.
Palette:pixelate: A component that reduces image resolution by adjusting pixel density,
  creating a blocky or low-resolution visual effect.
Palette:pointField: A component that generates point weights based on proximity to
  reference shapes like planes or paraboloids, useful for spatial data visualization.
Palette:pointGenerator: A component that creates point cloud data in image format
  with configurable point distribution and randomization parameters.
Palette:pointMerge COMP: Combines pixel data from multiple image inputs into a single
  output image. Useful for merging textures, point cloud data, or creating complex
  multi-source image compositions.
Palette:pointRender COMP: Renders point cloud data from input textures, converting
  XYZ position and color data into visual 3D point representations. Essential for
  visualizing spatial data or creating point-based graphics and effects.
Palette:pointRepack COMP: Rearranges pixel data into a new image size without duplicating
  or dropping pixels, preserving point data integrity. Used for precise image resizing
  and point cloud manipulation.
Palette:pointTransform COMP: Applies 3D transformations (translate, rotate, scale)
  to point data stored in image channels. Useful for manipulating point cloud geometry
  and spatial positioning.
Palette:pointWeight COMP: Creates a weight mask for point data based on spatial position,
  defining inclusion/exclusion volumes. Used for selective rendering or transforming
  specific point cloud regions.
Palette:pointillize: A visual effect component that transforms images into a pointillist
  art style by rendering each pixel as a colored point.
Palette:popDialog COMP: Creates customizable pop-up dialog windows for user interaction,
  notifications, and queries. Supports multiple buttons, text entry, and callback
  functions for interactive interfaces.
Palette:popMenu COMP: Generates dynamic, configurable pop-up menus with advanced features
  like item highlighting, shortcuts, and multi-column layouts. Ideal for creating
  interactive selection interfaces.
Palette:probe COMP: Visual performance monitoring tool that tracks CPU/GPU times,
  memory usage, and node processing metrics. Helps optimize TouchDesigner network
  performance and identify bottlenecks.
Palette:pushPins COMP: Converts image pixels into 3D geometries with height based
  on pixel brightness, creating a dynamic 'pushpin' visual effect from 2D image data.
Palette:puzzle COMP: Interactive image puzzle component that segments a TOP into movable
  squares, demonstrating Python extension capabilities in TouchDesigner.
Palette:quadReproject COMP: Facilitates multi-screen projection mapping by rendering
  pixel-perfect images across various display configurations. Used for LED screens
  and complex projection setups.
Palette:signalingServer Ext: Manages client connections and provides utility methods
  for tracking and retrieving client information during a signaling session.
Palette:splitter Ext: Provides methods for assigning and managing texture splits across
  multiple screens or monitors.
Palette:synchroCache: A synchronization component that caches and indexes video frames
  across multiple clients. Used for precise frame-based synchronization in multi-machine
  or networked TouchDesigner setups.
Palette:synchroClient: A network synchronization component that helps coordinate frame
  playback between multiple TouchDesigner instances. Used for distributed multimedia
  installations and multi-machine performances.
Palette:synchroFrameIn: A client-side synchronization component that receives frame
  index information from a server. Used for precise timing and frame alignment in
  multi-computer TouchDesigner networks.
Palette:synchroFrameOut: A server-side synchronization component that sends frame
  index data to clients. Used for coordinating frame playback and timing across multiple
  TouchDesigner instances.
Palette:synchroNDIIn: A specialized NDI input component with advanced synchronization
  features. Used for integrating network video streams with precise timecode and frame
  indexing.
Palette:synchroSDIIn: A specialized SDI input component with advanced synchronization
  features. Used for integrating professional video signals with precise timecode
  and frame indexing.
Palette:synchroVideoOut: A video output component that encodes video streams with
  frame index information. Used for synchronized video streaming across networks using
  SDI or NDI.
Palette:testGrid: A utility component for generating test grid patterns. Used for
  display calibration, resolution testing, and creating graphical test patterns in
  TouchDesigner.
Palette:threadManagerClient Ext: A threading utility in TouchDesigner for managing
  background tasks and payload queues. Use for complex operations that might block
  the main interface, like data processing or external API calls.
Palette:treeLister: A flexible tree-based data visualization and organization component
  in TouchDesigner. Use for displaying hierarchical data from JSON, file systems,
  or TouchDesigner networks with customizable column definitions.
Palette:twirl: An image warping effect COMP that creates a swirling visual distortion
  from a center point. Useful for creating dynamic, rotational image transformations
  in visual design and motion graphics.
Palette:vectorScope: A visual audio/video analysis component for examining signal
  characteristics. Used for monitoring color distribution, audio levels, or signal
  integrity in multimedia projects.
Palette:virtualFile: A component that embeds and manages files within a TouchDesigner
  project file. Allows storing external resources directly in .toe or .tox files for
  portable, self-contained projects.
Palette:vstHost: A component for loading and controlling virtual studio technology
  (VST) audio plugins in TouchDesigner. Use for integrating software synthesizers,
  effects, and MIDI instruments into interactive audio-visual compositions.
Palette:waveformMonitor: A visual analysis tool that displays color or signal values
  across an image or video. Helpful for precise color and signal intensity examination
  in multimedia and video production.
Palette:webBrowser: An interactive web browsing component embedded directly in TouchDesigner.
  Enables web content integration, live web page rendering, and interactive web-based
  functionality within projects.
Palette:webRTC: A real-time communication component for establishing direct connections
  between TouchDesigner instances or web devices. Use for creating interactive, networked
  multimedia experiences.
Pane: A configurable workspace area in TouchDesigner that can contain different views
  like Network Editor, Geometry Viewer, or Operator Viewers. Used to organize and
  navigate project interfaces.
Panel COMP: A custom interactive control panel in TouchDesigner for creating user
  interfaces. Allows building complex UI elements using various panel components like
  buttons, sliders, and containers.
Panel Shortcuts: Keyboard interaction configurations for custom panels in TouchDesigner.
  Enable keyboard-based control and interaction with panel components during performance
  or design.
Panel Value: Numeric or state values representing the current status of panel components.
  Used to track and manipulate interactive UI element states in TouchDesigner.
ParGroup: A collection of related parameters that can be manipulated together. Useful
  for managing multi-dimensional or grouped parameter settings in a more streamlined
  way.
Parameter: A configurable property of an operator that can be set to constant, expression,
  export, or bind modes. Enables dynamic control and connection between different
  operators.
Parameter Dialog: Central interface for configuring TouchDesigner operator settings.
  Displays operator parameters, allows editing values, and provides access to parameter
  modes and options.
Parameter Dialog Gadgets: UI components within the parameter dialog that organize
  and display operator settings, including tabs and nested parameter groups for complex
  configurations.
Parameter Expression: A Python or Tscript code snippet that dynamically calculates
  parameter values. Used for creating flexible, data-driven relationships between
  parameters and operators.
Parameter Mode: 'The state of a parameter that determines how its value is set: Constant,
  Expression, Export, or Bind. Allows dynamic parameter configuration and interconnection.'
Parameter Reference: A method of linking parameters between operators using expressions
  or right-click menu options. Enables data sharing and creating relationships across
  the TouchDesigner network.
Parent: The container or network in which an operator is located within the TouchDesigner
  hierarchy. Determines the network path and relationship between operators.
Parent Shortcut: A naming convention that simplifies referencing parent components
  in expressions, making network navigation and parameter access more flexible and
  portable.
Particle: A dynamic point-based system for simulating complex motion and behavior.
  Used for creating realistic simulations of natural phenomena like smoke, fire, and
  fluid dynamics.
Pattern Expansion: A technique for generating lists of strings or values using compact
  notation with brackets. Useful for quickly selecting or generating multiple elements.
Pattern Matching: A method for selecting or filtering elements using wildcard characters
  and range syntax. Applied in channel selection, operator filtering, and data manipulation.
Pattern Matching Support: Advanced pattern selection features that enable complex
  filtering and set operations across different TouchDesigner operator types.
Pattern Replacement: A technique for transforming matched strings using wildcard references.
  Used in renaming channels, selecting elements, and dynamic string manipulation.
Perfect Playback: A precise rendering technique ensuring frame-perfect video output
  by synchronizing TouchDesigner's frame generation with the display device's refresh
  rate. Critical for smooth, professional visual presentations.
Perform Mode: A specialized interface mode in TouchDesigner that simplifies interaction
  and focuses on presenting the final output, typically used during live performances
  or installations.
Performance Monitor: A diagnostic tool in TouchDesigner that analyzes and visualizes
  processing time for operators, helping users identify and optimize network performance
  bottlenecks.
Performance Monitor Dialog: A detailed performance analysis interface that shows processing
  times, waiting periods, and cooking sequence for TouchDesigner operators to help
  optimize network efficiency.
Phong Lighting Equation: A complex mathematical model for calculating surface lighting
  in 3D rendering, defining how colors and light properties interact when shading
  materials.
Phong MAT Shader Resource Usage: An explanation of GPU shader limitations, describing
  how graphics cards allocate resources for lighting, texturing, and vertex processing.
Pickable Flag: A selection state on Object COMPs that determines whether 3D geometry
  can be interactively selected in viewers and editors.
Pipe: A data transfer mechanism in TouchDesigner that allows moving information between
  operators, networks, and processes using specialized communication channels.
Pixel Formats: Different encoding methods for storing image data, defining how color
  and transparency information is represented in digital graphics and texture processing.
Playstation DualShock Controller: A method for integrating Playstation game controllers
  into TouchDesigner, enabling input mapping and interaction through the Joystick
  CHOP.
Point: A fundamental 3D geometric element representing a position in space, serving
  as a basic building block for creating geometry in TouchDesigner.
Point Clouds: A collection of points in 3D space representing geometric data, which
  can be imported, transformed, and rendered in TouchDesigner using specialized TOPs.
Point Group: A collection of associated points that can be manipulated together, allowing
  selective operations and filtering within geometric datasets.
Point List: A data structure containing geometric points that can be referenced and
  shared by multiple vertices and primitives in a 3D scene.
Polygon: A geometric primitive formed by connected vertices that creates a closed
  or open multi-edge shape in 3D space.
Polygon Depth Offset: A rendering technique used to prevent Z-fighting by adjusting
  the depth values of polygons relative to the camera's perspective.
PopDialog Custom COMP: A UI component for creating interactive popup windows with
  customizable buttons and text. Used for user notifications, confirmations, and dynamic
  interface interactions.
PopMenu Custom COMP: A dropdown menu UI component for creating interactive lists with
  options like item highlighting, disabling, and checking. Useful for creating context
  menus and selection interfaces.
Popup Help: Context-sensitive help messages that appear when hovering over UI elements,
  clicking help buttons, or evaluating expressions. Provides instant documentation
  and tooltips in TouchDesigner.
Pre-Filling: A caching technique for operators like Cache TOP that pre-generates and
  stores multiple frames or data points in advance. Used to optimize performance and
  prepare content before runtime.
Preferences Dialog: A system settings panel for configuring default TouchDesigner
  behaviors and personal preferences. Controls global application settings that persist
  between sessions.
Primitive: A fundamental geometric element representing polygons with vertices in
  3D space. Used for defining shapes, meshes, and geometric structures in TouchDesigner's
  3D workflows.
Primitive Group: A collection of associated primitives that can be manipulated or
  filtered as a single set. Enables selective geometry operations and efficient management
  of complex 3D models.
Privacy: A security feature for protecting TouchDesigner project files and component
  contents from unauthorized access. Allows password-protected network and media protection.
Pro Support: A professional support service for TouchDesigner Pro license holders,
  offering technical assistance, consulting, and custom build maintenance for complex
  projects.
Procedural: TouchDesigner's automatic data generation and dependency system where
  changes in one element trigger updates across connected operators. Enables real-time,
  responsive design workflows.
Projection Mapping: Advanced techniques and tools for warping and aligning digital
  content onto physical surfaces using techniques like corner pinning, blending, and
  geometric calibration.
Pulse: A signal mechanism for triggering immediate actions in parameters, often used
  for resetting, triggering events, or creating momentary state changes in TouchDesigner.
Python: A scripting language integrated into TouchDesigner for extending functionality,
  creating custom tools, and automating complex interactions between operators.
Python Classes and Modules: Built-in Python libraries and interfaces specific to TouchDesigner
  that provide access to operator functionality, utility functions, and extended programming
  capabilities.
Python Integration: Scripting environment in TouchDesigner that enables custom logic,
  data processing, and extended operator functionality.
Python Reference: Comprehensive documentation of TouchDesigner's Python API and module
  methods. Used for advanced scripting, custom operator development, and complex interaction
  design.
Python f-strings: A modern Python string formatting method that allows inline expression
  evaluation. Used in TouchDesigner for dynamic text generation and parameter formatting.
Python threading in TouchDesigner: A technique for running parallel processing tasks
  without blocking the main TouchDesigner interface. Managed through the Thread Manager
  to prevent performance issues and enable complex background operations.
Quad Reprojection: A mapping technique for rendering perspective-correct images across
  multiple displays or panels. Useful for creating seamless, aligned visual experiences
  in installations, projection mapping, and multi-screen setups.
RMB Menu: The right-mouse-button context menu in TouchDesigner that provides quick
  access to operator-specific actions and views. Used to quickly navigate, configure,
  and interact with different parts of the TD interface.
RTMP: A streaming protocol for sending video over the internet using H.264 codec,
  commonly used for platforms like Twitch and YouTube. Enables real-time video streaming
  with specific compression settings.
RTSP: A network streaming protocol for transmitting video and audio across networks
  using H.264 encoding. Supports multiple client connections and hardware-accelerated
  video streaming.
RealSense: An Intel depth-sensing camera technology that captures color, depth, and
  infrared data in TouchDesigner. Used for real-time computer vision, skeleton tracking,
  and interactive installations.
Recording Movies with Audio: A method of capturing video and audio output from TouchDesigner,
  either in realtime with potential frame replication or non-realtime with precise
  frame rendering.
Reference: A connection method in TouchDesigner networks where data flows between
  operators, represented by grey dashed lines. Used to share parameters, images, or
  data across different nodes.
Release Notes: Official documentation detailing updates, new features, bug fixes,
  and changes in each TouchDesigner version. Critical for understanding software improvements
  and compatibility.
Render Flag: A purple flag on SOP and COMP nodes that determines whether an object
  will be rendered in a Render TOP. Controls visibility and rendering of 3D geometry.
RenderStream: A Disguise protocol for distributing realtime rendering tasks across
  multiple computers. Enables complex, networked visual content generation and synchronization.
Rendering: The process of creating 3D images or compositing graphics in TouchDesigner
  using Render TOP and Render Pass TOP. Involves converting 3D geometry into 2D images
  using GPU processing.
Retina and High DPI Display Resolutions: TouchDesigner's support for high-resolution
  displays, providing crisp UI rendering and scaling options for Retina and other
  high-pixel-density screens.
Rim Light: A lighting technique in 3D rendering that illuminates objects from behind,
  creating depth and separation from the background. Used in Phong MAT materials to
  enhance visual definition of 3D geometry.
Rim Lights: A lighting technique in Phong materials that creates a glowing edge effect
  on 3D geometry by controlling light direction, strength, and width parameters.
Root: The top-most network in the TouchDesigner component hierarchy, represented by
  the '/' path. Contains global settings, local resources, and serves as the base
  container for all project components.
Root Time: The default time reference for all networks in TouchDesigner that do not
  have a custom Component Time. Serves as the base temporal synchronization point
  for projects.
SACN: A DMX protocol for controlling lighting over IP networks, supporting up to 64,000
  universes using UDP. Used for advanced lighting control and synchronization in stage
  and event environments.
SICK: Integration with industrial LIDAR sensors that provides point cloud data as
  pixel arrays in TouchDesigner, primarily used for industrial automation applications.
SOP: A 3D object operator family for creating, modifying, and manipulating 3D geometry.
  Used for generating and transforming points, polygons, surfaces, and other 3D shapes.
SOP Editor: An interactive geometry editing interface in TouchDesigner for selecting,
  creating, and modifying 3D geometry directly within Surface Operators.
SRT: A streaming protocol in TouchDesigner for network video transmission using listener
  and caller modes, supporting both local and internet-based video streaming.
SVG COMP: Loads and renders Scalar Vector Graphics (SVG) files in TouchDesigner. Useful
  for scaling, transforming, and displaying scalable vector graphics in real-time
  visual projects.
Safe Mode: A protective startup mode for TouchDesigner when opening crash-recovered
  files, preventing re-execution of problematic code. Allows investigation and repair
  of project files after unexpected shutdowns.
Sample: In TouchDesigner, a single numerical value in a CHOP channel, representing
  a point in time-based data like animation or audio. Fundamental unit for channel-based
  operations and data processing.
Scope: A parameter in CHOPs that selects which channels are processed, using pattern
  matching to include or exclude specific channels. Provides granular control over
  channel-based transformations.
Script: Programming interfaces in TouchDesigner, primarily using Python and the legacy
  Tscript. Allows custom logic, automation, and dynamic interaction with TD projects.
SearchReplace Dialog: A powerful tool for searching and replacing text across TouchDesigner
  networks, with advanced filtering and navigation options. Useful for large-scale
  project management and refactoring.
Selected Flag: A node state in TouchDesigner indicating which operators are currently
  selected, allowing multi-node operations and visual identification of active components.
Sequential Parameters: Dynamic parameter sets that can be created multiple times within
  an operator, allowing flexible configuration of multiple similar elements like channels
  or points.
Shader: GPU code written in GLSL that renders images by processing geometry, textures,
  and parameters, essential for creating custom visual effects and materials in TouchDesigner.
Shadows: Rendering technique that creates depth-based shadowing in 3D scenes using
  a Depth TOP and shadow render pass, enabling hard shadow generation for materials.
Shared Memory: A high-speed data transfer method between TouchDesigner and external
  applications, enabling efficient inter-process communication for real-time data
  exchange.
Shortcut: A keyboard or mouse input mapping that triggers a specific action or command
  in TouchDesigner. Used to create custom workflows and rapidly access frequently
  used functions.
ShowNET: Output protocol for laser devices in TouchDesigner, enabling communication
  and control of laser hardware via the Laser Device CHOP.
Slug Library: A rendering system for resolution-independent 2D and 3D text in TouchDesigner,
  used by Text COMP, Geo Text COMP, and Text TOP for scalable text rendering.
Socket.IO: Real-time, bidirectional communication framework enabling event-based networking
  between TouchDesigner and other platforms like Node.js.
Spline: Mathematical curve representation using control vertices and blending functions,
  enabling smooth and efficient curve generation in TouchDesigner.
Splitter COMP: Splits large textures into grid-based sections for multi-screen setups,
  allowing precise mapping and distribution of visual content across displays.
Startup Errors Dialog: A diagnostic window in TouchDesigner that displays initialization
  warnings, errors, and events encountered during application launch.
Status Bar: A display area in TouchDesigner's interface that shows system messages
  and status updates. Use for tracking operator events and receiving real-time feedback
  about your project's state.
Stoner COMP: A mapping component for warping and transforming image grids using Bezier
  or linear modes, ideal for complex projection mapping.
Storage: A persistent Python dictionary attached to each operator in TouchDesigner
  for storing custom data. Use for saving operator-specific variables, configurations,
  or state information that persists across project sessions.
Stuttered Playback: A rendering issue where video or animation appears to skip or
  pause intermittently. Typically caused by frame rate inconsistencies, hardware limitations,
  or buffer synchronization problems.
Stype: A tracking system for capturing real-time camera position and lens data, enabling
  precise virtual graphics overlay in live video environments. Used for augmented
  reality, virtual studio production, and advanced visual compositing.
Sweet 16 CHOPs Vid: A TouchDesigner component related to video and CHOP operations,
  likely used for specialized video signal processing or channel manipulation.
Sync: A method for coordinating timing, frame rates, and visual output across multiple
  computers or display systems. Essential for multi-screen installations, synchronized
  media playback, and complex visual environments.
Syncing Multiple Computers: A technique for maintaining consistent visual output across
  multiple computer systems by aligning rendering, frame generation, and display timing.
  Critical for large-scale and multi-screen projection projects.
Synth: A legacy term in TouchDesigner referring to a complete artwork project, including
  the .toe file and associated media files. Used to describe interactive and generative
  art installations.
System Requirements: The technical specifications needed to run TouchDesigner, including
  GPU capabilities, operating system compatibility, and hardware performance recommendations.
TDAbleton: A specialized TouchDesigner extension for integrating and controlling Ableton
  Live, enabling real-time music and visual synchronization.
TDAbletonCompBaseExt Extension: A TouchDesigner extension for controlling Ableton
  Live, providing methods and attributes for customizing Ableton integration and communication.
TDBitwig: A set of TouchDesigner components that enable bi-directional communication
  and control with Bitwig Studio through OSC messaging for interactive audio-visual
  performances.
TDBitwig User Guide: Provides a comprehensive integration between TouchDesigner and
  Bitwig Studio, allowing real-time audio-visual interactions through OSC communication
  protocols.
TDFunctions: A collection of utility functions in TouchDesigner for performing common
  operations like clamping values, finding parent relationships, and generating shortcut
  paths between operators.
TDI Library: A documentation and code-completion library for TouchDesigner that provides
  autocomplete and help information for Python coding in external editors like VS
  Code.
TDJSON: A TouchDesigner module providing utility functions for JSON processing, enabling
  easy conversion between JSON objects, text, and TouchDesigner data structures.
TDPages: Interactive web-based documentation and resources within TouchDesigner. Provides
  quick access to learning materials, examples, and community resources.
TDPyEnvManager: A component for managing Python environments in TouchDesigner. Used
  to create, activate, and integrate external Python libraries and virtual environments.
TDPyEnvManagerHelper: A utility class for managing Python and Conda environments in
  TouchDesigner, facilitating installation, setup, and configuration of development
  environments.
TDResources: A system of utility components in TouchDesigner for creating pop-up menus,
  dialogs, and accessing system-level resources like mouse information.
TDStoreTools: A module providing storage management utilities and dependable collections
  for managing data in TouchDesigner Python extensions.
TDSynchro: A synchronization system for distributing and displaying video content
  across multiple computers, enabling multi-projection and networked rendering workflows.
TDU Class: A collection of utility classes and methods in TouchDesigner for handling
  complex data types like matrices, vectors, colors, and providing random number generation.
TOE File: TouchDesigner project file format that saves the entire network, components,
  and project configuration.
TOP: GPU-accelerated image processing operators for creating, manipulating, and compositing
  textures and visual content in real-time.
TOPs: Texture Operators for image processing, video manipulation, and GPU-accelerated
  visual effects. Core for creating complex visual transformations and real-time graphics.
TOX File: TouchDesigner component file that allows sharing and reusing specific networked
  operators or custom components.
TUIK: A collection of user interface components in TouchDesigner for building custom
  control panels and interactive interfaces with high flexibility.
TUIO: An open protocol for multi-touch and tangible surface interactions, enabling
  communication between tracking systems and interactive applications.
Tag: A user-defined text label for categorizing and organizing operators in TouchDesigner.
  Used for sorting, searching, and managing complex project structures.
Template Flag: A geometry display mode in SOPs that shows the operator's geometry
  as a selectable pink wireframe in viewers.
Text Formatting Codes: Special codes for controlling text styling, including stretch,
  tracking, skew, scale, underline, and color modifications.
Textport: An interactive scripting console in TouchDesigner for executing Python and
  Tscript commands, viewing script history, and editing Text DATs.
Texture Coordinates and Texture Sampling: A method for mapping textures onto 3D geometry
  using UV coordinates and determining pixel sampling based on texture filtering modes.
Texture Extend Modes: Define how textures behave when sampling coordinates outside
  the [0,1] range. Used to control edge behavior when processing and mapping textures
  in TOPs.
Texture Filtering: GPU techniques for smoothing textures when rendered at different
  resolutions. Controls image quality by interpolating pixel colors during texture
  sampling.
Texture Sampling Parameters: Configure how textures are read and mapped, controlling
  extend modes, filtering quality, and coordinate interpolation for precise texture
  rendering.
Texturing Geometry: The process of applying 2D images or textures onto 3D surfaces
  using materials and shaders in TouchDesigner. Enables complex visual mappings and
  surface treatments.
ThreadManager Ext: A system for managing background task processing and threading
  in TouchDesigner, allowing safe execution of Python tasks outside the main thread.
ThreadManagerClient: A component for managing background threading tasks in TouchDesigner.
  Used to safely execute complex computational operations without blocking the main
  interface.
Time: TouchDesigner's temporal manipulation and synchronization features. Used for
  controlling animation timing, frame rates, and time-based interactions.
Time Slicing: A method for processing CHOPs that synchronizes channel data with timeline
  movement, allowing precise sample-based operations across time segments.
Timecode: A standardized time representation using hours, minutes, seconds, and frames.
  Used for precise time tracking and synchronization in media and performance contexts.
Timeline: TouchDesigner's primary time control interface for managing playback, frame
  navigation, and time-based operations across project networks.
Timepath: The hierarchical path defining the time context for a specific node or network
  in TouchDesigner, determining how time-based attributes are inherited and processed.
Toecollapse: A utility for converting expanded .toe project files back into a single
  compressed TouchDesigner file, enabling version control and file management.
Toeexpand: A utility for deconstructing .toe project files into readable ASCII files,
  facilitating file inspection and version tracking for TouchDesigner projects.
Touch Glossary: Comprehensive dictionary of TouchDesigner-specific terminology and
  technical definitions. Essential reference for understanding software-specific concepts.
TouchDesigner Commercial: Paid license for professional projects where you receive
  compensation, allowing full access to TouchDesigner's features.
TouchDesigner Non-Commercial: Free version of TouchDesigner with limited features,
  suitable for personal and non-commercial creative projects.
TouchDesigner Pro: Top-tier TouchDesigner license with comprehensive features and
  professional support for complex interactive media projects.
TouchDesigner Tips: Collection of best practices, shortcuts, and expert techniques
  for optimizing workflow and solving common challenges in TouchDesigner.
TouchEngine: An SDK that allows integrating TouchDesigner .tox files into other software
  like Unreal Engine, enabling cross-platform visual processing and data exchange.
TouchEngine For Unreal Engine Plugin: A plugin that enables loading and processing
  TouchDesigner .tox files directly within Unreal Engine, facilitating real-time visual
  effects and data transfer.
TouchMixer: A customizable video mixing and effects application built in TouchDesigner,
  offering advanced media manipulation and routing for live visual performance.
TouchOSC: A mobile app for creating custom OSC (Open Sound Control) interfaces to
  control TouchDesigner remotely, enabling wireless parameter manipulation and interaction.
TouchPlayer: A runtime application for playing back TouchDesigner (.toe) files without
  the full development environment, designed for performance and distribution.
Transparency: Rendering technique for displaying see-through objects in 3D scenes,
  using either manual sorting or order-independent transparency methods to achieve
  correct visual blending.
Troubleshooting: Process of diagnosing and resolving technical issues in TouchDesigner,
  involving log analysis, community forums, and systematic error investigation.
Tscript: TouchDesigner's original built-in scripting language with C-shell-like syntax,
  used for automation and custom workflows before Python integration.
Tuplet: A group of related parameters on a single line in an operator's parameter
  dialog, representing a set of connected configuration options.
Tutorials: Official TouchDesigner educational resources covering fundamental concepts
  through structured video lessons, example files, and progressive learning paths
  for new users.
UDT: A software licensing and redistribution framework with specific conditions for
  use and modification, primarily related to university-developed software.
USD: Pixar's Universal Scene Description file format for 3D scene descriptions, used
  in TouchDesigner to import complex 3D scene hierarchies and geometric data.
Undo: A system for reverting changes in TouchDesigner, with specific behaviors in
  different modes and the ability to create custom undo steps through scripting.
Unicode: Full support for multi-language text encoding in TouchDesigner, allowing
  Unicode characters in parameters, scripts, file paths, and text rendering with fallback
  font capabilities.
Units: Measurement systems for specifying parameter values in CHOPs, enabling precise
  control and conversion between different unit types for animation and data manipulation.
Updates: The process of extending a TouchDesigner license to access newer software
  builds, managed through the user's account and involving annual purchase of update
  periods.
Uses of CHOPs: Powerful TouchDesigner channels for capturing, manipulating, and transferring
  numerical data, enabling device input, motion capture, and real-time animation control.
VST: A audio plugin standard supported in TouchDesigner via the Audio VST CHOP, allowing
  integration of third-party virtual instruments and audio effects.
Value Ladder: An interactive interface for quickly adjusting numerical parameter values
  by holding the mouse button and dragging to select incremental changes.
Variables: System and environment settings that control TouchDesigner's behavior,
  configurable through Windows or macOS system preferences.
Variables Dialog: Legacy dialog for viewing environment and built-in variables in
  TouchDesigner. Primarily used for supporting older projects and understanding system-level
  variable configurations.
Vertex: A fundamental geometric point in a polygon that defines its shape and position.
  Used in SOPs to construct 3D geometry with specific spatial characteristics and
  attributes.
Vertical Sync and Horizontal Tearing: A display synchronization technique that prevents
  visual artifacts during rendering by aligning frame updates with monitor refresh
  rates. Helps maintain smooth, artifact-free graphics rendering.
Video Streaming User Guide: Overview of video streaming platforms and techniques for
  broadcasting content from TouchDesigner to services like Twitch, YouTube, and other
  streaming networks.
Videos: Instructional and showcase video content demonstrating TouchDesigner capabilities,
  techniques, and creative applications.
Viewer: A visual interface element in TouchDesigner that displays the output or contents
  of an operator, allowing interactive preview and manipulation of operator data.
Viewer Active: A node state that enables interactive manipulation of a node's viewer
  contents, allowing direct interaction with the operator's visual representation.
Viewer Active Flag: A toggle switch on nodes that enables or disables interactive
  viewer mode, allowing direct manipulation of node contents.
Viewer Flag: A node flag that turns the node's viewer on or off, controlling visibility
  of operator contents.
Vioso: A projection mapping technology integrated into TouchDesigner that automates
  multi-projector alignment and calibration for complex visual installations.
Virtual File System: A TouchDesigner feature that embeds media files directly into
  .tox or .toe files, enhancing file portability and self-containment.
Volume Discount: A sliding-scale pricing strategy for multiple TouchPlayer license
  purchases, offering decreasing per-license costs as quantity increases.
Vulkan: A modern graphics API used by TouchDesigner to improve rendering performance,
  reduce driver overhead, and provide cross-platform graphics compatibility.
Wacom Intuos Tablet: A drawing tablet input method in TouchDesigner that captures
  pen and mouse inputs through the Tablet CHOP, enabling precise creative interactions.
WebRTC: Peer-to-peer communication protocol for streaming video, audio, and data between
  TouchDesigner and web browsers. Used for real-time interactive web experiences and
  remote media transmission.
WebRTC Remote Panel Receiver COMP: A component for receiving TouchDesigner panel data
  over WebRTC connection. Used for remote panel streaming and web-based interactive
  experiences.
Why is My Render Black: Troubleshooting guide for when a Render TOP displays no visible
  content. Helps diagnose rendering issues related to graphics, textures, or operator
  configuration.
Widget:Vimeo: MediaWiki widget for embedding Vimeo video content. Used to easily include
  Vimeo videos in wiki pages.
Widget:YouTube: MediaWiki widget for embedding YouTube video content. Allows simple
  integration of YouTube videos into wiki pages.
Widgets: A collection of user interface components in TouchDesigner, designed for
  building interactive interfaces. Supports both basic and advanced widget implementations.
WinDbg: A diagnostic tool for analyzing TouchDesigner crashes and performance issues
  by providing detailed debugging information and crash reports.
Window: A display area in TouchDesigner that can be the main editing interface or
  a custom user-created panel. Supports multiple monitor configurations and different
  window styles.
Window Placement Dialog: System for managing window placement and mode settings in
  TouchDesigner. Controls startup behavior, window locations, and Perform/Designer
  mode transitions.
Wire: A direct connection between nodes in the same operator family that transfers
  data in a TouchDesigner network. Used to link operators that process similar types
  of information.
Working with CHOPs in Python: Python scripting techniques for manipulating and interacting
  with Channel (CHOP) operators in TouchDesigner. Enables programmatic control of
  animation, audio, and data channels.
Working with DATs in Python: Python scripting methods for handling Text (DAT) operators
  in TouchDesigner. Allows programmatic text and table data manipulation.
Working with OPs in Python: Techniques for accessing, referencing, and manipulating
  operators using Python in TouchDesigner. Provides programmatic control over all
  TouchDesigner components.
Write a CPlusPlus Plugin: Process for creating custom C++ extensions for TouchDesigner.
  Allows developers to create high-performance, specialized operators using TouchDesigner's
  plugin API.
Write a CUDA DLL: Method for creating custom CUDA-based computational plugins in TouchDesigner.
  Enables GPU-accelerated data processing and visualization.
Write a GLSL Material: Guide to creating custom GLSL shaders in TouchDesigner. Allows
  advanced graphics rendering and material creation using OpenGL shading language.
Z-Fighting: A rendering artifact where co-planar polygons cause visual glitching due
  to graphics card depth rendering uncertainty. Use polygon depth offset or slightly
  adjust geometry positions to resolve.
ZED: Stereolabs stereo depth cameras supported in TouchDesigner for advanced depth
  and spatial tracking. Provides specialized TOP, CHOP, and POP nodes for capturing
  and processing camera data.
Zoomable User Interface: The core navigation and organization system in TouchDesigner
  where operators are interconnected within component networks. Enables dynamic exploration
  and manipulation of visual processing networks through hierarchical zoom and navigation.
bitwigNote COMP: Allows real-time monitoring of note events from a specific Bitwig
  track. Useful for capturing and processing MIDI input for music visualization or
  interactive audio projects.
bitwigProjectRemotes COMP: Interface for accessing and controlling global Project
  Remote Controls in Bitwig. Enables dynamic control of 8 remote parameters across
  different pages.
bitwigRemotesDevice COMP: Provides access to Device Remote Controls in Bitwig, allowing
  control of device parameters across tracks and pages. Useful for automated parameter
  manipulation.
bitwigRemotesTrack COMP: Allows control of Track Remote Controls in Bitwig, enabling
  dynamic parameter adjustment for specific tracks and pages.
bitwigSelect COMP: Retrieves channel information from Bitwig Components, with filtering
  capabilities for specific object types and channels. Useful for extracting precise
  data from Bitwig networks.
bitwigSong COMP: Bi-directional interface for Bitwig's global transport, managing
  timing, playback, and recording functionality. Provides access to scene and cue
  information.
blendModes COMP: Interactive video mixer with 45+ blend modes for exploring and applying
  complex image compositing techniques. Provides visual preview and crossfade capabilities.
callbacksExt Extension: A TouchDesigner Python extension that enables custom callback
  functionality for components, allowing dynamic event-driven programming.
callbacksHelper COMP: Utility for easily setting up callback systems in custom TouchDesigner
  components, providing a standardized method for event handling and extension.
camSchnappr COMP: An advanced projection mapping tool for precisely aligning virtual
  3D models with physical structures using OpenCV camera calibration techniques.
camera COMP: Interactive 3D camera component for controlling camera position and navigation
  in 3D scenes. Supports mouse, keyboard, and 3D mouse interactions.
cameraBrowser COMP: Utility for browsing and selecting image types from RealSense
  devices, facilitating easy integration of depth and image streams into TouchDesigner
  projects.
cameraViewport COMP: An interactive camera control component for 3D scenes that allows
  real-time camera positioning and navigation through mouse and keyboard interactions.
changeColor COMP: A color manipulation component that modifies RGB colors using HSV
  transformations, outputting color-corrected images or alpha masks.
changeToColor COMP: A color transformation tool that converts one color to another
  by adjusting hue, saturation, and value with customizable tolerance.
chromaKey Palette: An interactive tool for removing green or blue screen backgrounds
  from video, allowing precise color selection and edge refinement.
colorThreshold COMP: An image processing component that modifies color channels by
  multiplying the input with inverse color channel values.
compareComp COMP: A powerful comparison tool that identifies differences between two
  components, including nodes, parameters, wiring, and more.
convolve COMP: A simple interface for applying convolution matrix effects like sharpening,
  blurring, and edge detection to images.
customAttributes COMP: A Python-based tool for adding and manipulating custom attributes
  to surface geometry in TouchDesigner.
debug module: A TouchDesigner utility for enhanced Python script debugging, providing
  detailed output with context like DAT and line number. Offers more informative logging
  compared to standard print statements.
debugCOMP: A specialized component for controlling and testing the built-in debug
  statement. Use to customize debug output and troubleshoot TouchDesigner scripts.
depthExtractCOMP: Uses a RealSense depth camera to extract specific depth ranges from
  an image. Useful for depth-based filtering and segmentation of 3D scene data.
depthProjectionCOMP: Converts a 2D depth map into a 3D point cloud using camera intrinsic
  properties. Ideal for creating point cloud visualizations from depth sensor data.
dilateCOMP: An image processing component that performs morphological operations like
  dilate and erode. Used for edge detection, noise reduction, and image enhancement.
domeViewerCOMP: A component for previewing and generating content specific to dome
  or planetarium projection environments. Helps design immersive dome-based visual
  experiences.
feedbackCOMP: Creates motion blur and trailing visual effects by preserving previous
  frame data. Useful for creating smooth, blended image transitions and visual effects.
feedbackEdgeCOMP: A complex image effect combining feedback, blur, edge detection,
  and color adjustments. Generates dynamic, evolving visual textures.
firmataCOMP: Enables communication and control of Arduino boards using the Firmata
  protocol. Used for integrating physical computing and sensor data into TouchDesigner.
galPalette: A collection of 11 self-contained UI gadgets like sliders, buttons, and
  menus. Provides quick, customizable user interface elements for interactive TouchDesigner
  projects.
geoPanelPalette: A library of geometric panel and gadget templates for creating custom
  user interfaces. Offers flexible UI components with rendering and interaction capabilities.
gestureCaptureCOMP: Records and visualizes mouse or input device movements as curves,
  lines, or shapes. Useful for motion tracking, gesture analysis, and interactive
  drawing.
graphPlot COMP: A specialized component for creating 2D graphs that visualize data
  points or curves. Useful for rendering charts, plotting time series, or displaying
  numerical data with customizable axes and formatting.
hsvBlur COMP: An image processing component that blurs images in the HSV color space,
  allowing independent blurring of hue, saturation, and value channels. Ideal for
  color-aware image softening and creative visual effects.
imageSearch COMP: A web-based image retrieval tool that uses Google's Custom Search
  API to fetch images based on search terms. Useful for dynamic content generation
  and media acquisition within TouchDesigner projects.
initializeStart COMP: A timing and initialization template for creating time-dependent
  components with standard timing behaviors and configurable timer controls. Essential
  for managing component lifecycle and time-based interactions.
kantanMapper COMP: A projection mapping interface for creating and aligning shapes
  onto physical surfaces. Enables precise texture mapping and warping for multi-surface
  video installations and projection art.
kantanUVHelper COMP: A utility for managing UV map textures generated by kantanMapper,
  allowing flexible texture assignment and mapping across complex surfaces.
kinectCalibrate COMP: A calibration tool for aligning projectors with Kinect depth
  camera data. Used in interactive installations and projection mapping scenarios
  requiring precise spatial alignment.
kinectPointCloud COMP: A component that generates 3D point cloud data from Kinect
  depth and color textures. Useful for creating volumetric representations of physical
  spaces and depth-aware visual effects.
leapPaint COMP: A Leap Motion-driven drawing tool that allows hand gestures to create
  digital artwork directly in a TOP. Enables gestural interaction and motion-based
  creative expression.
lightTunnel COMP: An image distortion component that stretches and remaps pixels from
  a circular region, creating unique visual warping and radial transformation effects.
lister COMP: A flexible data display and management component for presenting tabular
  information with configurable columns, sorting, and interactive features.
moviePlaylist COMP: A playlist component that can loop through images or movies from
  a folder or table, offering flexible playback and blending options.
openFrameworks: A C++ creative coding framework that can be integrated with TouchDesigner
  for custom graphics and interactive applications. Allows extending TouchDesigner's
  capabilities through native code development.
quadReproject Ext: A method to dynamically create and manage multiple screen parameters
  in TouchDesigner. Used for complex multi-screen projection mapping and display setups.
recorder COMP: A specialized component for video recording that simplifies movie file
  output with advanced features like automatic filename generation, timeline synchronization,
  and configurable encoding settings.
remotePanel: A networking component that allows remote viewing and interaction with
  a TouchDesigner panel across different computers. Enables distributed display and
  control of visual applications.
rgbContrast: A TOP that independently adjusts contrast for Red, Green, and Blue color
  channels. Allows precise color tone and intensity control.
rgbaBlur COMP: A TOP that individually blurs the Red, Green, Blue, and Alpha channels
  of an image. Useful for creating unique color-separated blur effects.
rgbaDelay: A component that separately delays movement of RGBA channels in a video
  file. Enables complex temporal manipulation of image channels.
sceneChanger: A framework for creating multi-scene shows with automatic scene transitions
  and cross-fading. Optimizes performance by only cooking active scenes.
search Ext: A mechanism for locating and referencing operators within the TouchDesigner
  network using hierarchical path notation. Essential for navigating and connecting
  complex projects.
searchReplace: A utility component for searching and replacing text across operators,
  parameter values, and custom parameters. Supports complex text manipulation with
  regex and filtering options.
sharpen COMP: A TOP that uses kernel processing to enhance image sharpness. Increases
  image detail and clarity using convolution techniques.
sickEngine: A component for launching SICK sensor TOPs in separate processes, enabling
  multiple sensor integrations in a single TouchDesigner project.
signalingClient: A WebSocket-based networking component for establishing real-time
  communication between TouchDesigner clients, supporting custom messaging and signaling
  protocols.
signalingServer COMP: A WebSocket-based signaling server for routing messages between
  clients, typically used in WebRTC connections to help clients discover and communicate
  with each other.
softenAlpha COMP: Trims and adjusts image edges based on the alpha channel, useful
  for smoothing image borders or creating soft transitions.
solarize COMP: An image filter that inverts and adjusts the brightest and darkest
  parts of an image, creating a unique visual effect reminiscent of the Sabattier
  effect.
sopRender COMP: Renders 3D geometry with basic lighting and optional textures, providing
  interactive camera controls and geometry visualization options.
stitcher COMP: Loads and processes PTGui panoramic image project files to create seamless
  panoramic textures from multiple camera inputs.
superFormula COMP: Generates complex 2D and 3D geometric shapes using mathematical
  equations, enabling creation of intricate procedural forms.
sweetSpotPreviz COMP: Creates perspective-correct visualizations for projection mapping
  by rendering a scene from a specific observer's viewpoint.
td Module: A Python module in TouchDesigner containing core application utilities,
  classes, and reference objects. Used for scripting, extending functionality, and
  accessing TouchDesigner's internal systems.
tdbitwigPackage: A component responsible for updating TDBitwig system components.
  Used to maintain the latest version of Bitwig integration in TouchDesigner projects.
xyScope COMP: An audio visualization component that creates a 2D plot using two CHOP
  channels as x and y coordinates. Ideal for creating abstract audio-reactive visual
  representations.
