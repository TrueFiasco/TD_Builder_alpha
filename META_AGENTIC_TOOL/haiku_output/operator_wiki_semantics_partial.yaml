# TouchDesigner Operator Wiki Semantics (Partial - from initial batches)
# Run batch_operator_semantics.py for full processing

# === CHOP ===
Ableton_Link_CHOP:
  summary: "Retrieves timing information from Ableton Link network for synchronized music/visual performances. Use to sync tempo, beat, and bar with Ableton Live and other Link-enabled apps."
  parameters:
    active: "Turns the CHOP output on or off."
    enable: "Initializes connection to the Ableton Link session."
    startstopsync: "Enables start/stop synchronization across Link session."
    signature: "Specifies the time signature (beats per measure)."
    tempo: "Outputs current tempo in BPM."
    beat: "Outputs current beat count."
    bar: "Outputs current bar count."

Analyze_CHOP:
  summary: "Computes analysis functions on input channels, outputting one sample per channel with the result. Use for finding max, min, average, RMS of channel data."
  parameters:
    function: "Analysis function: Maximum, Minimum, Average, RMS, Sum, etc."
    integrate: "Accumulate values across frames when enabled."
    reset: "Resets integrated values."

Angle_CHOP:
  summary: "Calculates the angle of a vector or rotation between vectors in 2D or 3D. Use for direction detection, rotation calculation, or vector math."
  parameters:
    input: "Determines input format and angle calculation method."
    format: "Output format: Angle, Direction, Quaternion."

Audio_Band_EQ_CHOP:
  summary: "Applies multi-band equalizer to audio with adjustable frequency bands. Use to boost or cut specific frequency ranges in audio."
  parameters:
    numbands: "Number of EQ frequency bands."
    centerfreq: "Center frequency of each band."
    gain: "Gain adjustment per band in dB."
    bandwidth: "Width of each filter band."

# === TOP ===
Analyze_TOP:
  summary: "Calculates image statistics like average color, brightness, min/max values. Use for color analysis, histogram generation, or image metrics."
  parameters:
    analyze: "Type of analysis: Brightness, Color, Histogram."
    cook: "When to perform analysis: Always, Timeline, Manual."

Blur_TOP:
  summary: "Applies Gaussian or box blur to soften images. Use for glow effects, depth of field, smoothing, or reducing noise."
  parameters:
    size: "Blur radius in pixels."
    filtertype: "Blur algorithm: Gaussian, Box."
    extend: "Edge handling: Zero, Hold, Mirror, Repeat."

Blob_Track_TOP:
  summary: "Detects and tracks distinct regions (blobs) in images with position, size, and ID. Use for object tracking, motion detection, or interactive installations."
  parameters:
    minarea: "Minimum blob area to detect."
    maxarea: "Maximum blob area to detect."
    minbright: "Minimum brightness threshold."
    maxblobs: "Maximum blobs to track simultaneously."

Cache_TOP:
  summary: "Stores frames in memory/GPU for time-delay effects or buffering. Use for feedback, time displacement, or frame history access."
  parameters:
    length: "Number of frames to cache."
    step: "Frame step interval for caching."
    index: "Current frame index to output."

# === SOP ===
Add_SOP:
  summary: "Creates geometry by adding points and polygons from coordinates. Use for procedural point/polygon creation or building custom shapes."
  parameters:
    points: "Coordinates of points to add."
    addparticlesystem: "Create as particle system."
    closed: "Close the polygon."

Alembic_SOP:
  summary: "Imports geometry from Alembic (.abc) files for animated geometry from external 3D software. Use for complex animation interchange."
  parameters:
    file: "Path to Alembic file."
    objectpath: "Object path within file."
    frame: "Frame number to load."

Attribute_Create_SOP:
  summary: "Adds new attributes to geometry with specified values or expressions. Use for storing custom data on points, prims, or vertices."
  parameters:
    group: "Group to apply attribute to."
    name: "Attribute name."
    class: "Attribute class: Point, Prim, Vertex, Detail."
    type: "Data type: Float, Int, String, Vector."
    value: "Default value or expression."

Blend_SOP:
  summary: "Blends between multiple input geometries by weight. Use for morphing, shape interpolation, or smooth transitions between shapes."
  parameters:
    blend: "Blend factor between inputs (0-1)."
    difference: "Output shape difference."

# === DAT ===
Analyze_DAT:
  summary: "Computes statistics on table data like sum, average, min, max. Use for data analysis and aggregation."
  parameters:
    function: "Analysis function: Sum, Average, Min, Max, Count."
    scope: "Analysis scope: Rows, Columns, All."

Art_Net_DAT:
  summary: "Receives Art-Net DMX protocol data over network. Use for lighting control, DMX fixture monitoring, or stage automation."
  parameters:
    active: "Enable Art-Net reception."
    netaddress: "Network address to listen on."
    universe: "DMX universe number."

CHOP_Execute_DAT:
  summary: "Runs Python callbacks when CHOP values change or cross thresholds. Use for reactive scripting triggered by channel data."
  parameters:
    chop: "CHOP operator to monitor."
    valuechange: "Execute on any value change."
    offtoontoon: "Execute on 0-to-1 transition."
    ontooff: "Execute on 1-to-0 transition."

# === COMP ===
Animation_COMP:
  summary: "Plays back keyframe animation from Animation Editor to control parameters over time. Use for timeline-based animation."
  parameters:
    play: "Play/pause animation playback."
    speed: "Playback speed multiplier."
    range: "Animation frame range."

Base_COMP:
  summary: "Container for building custom components with extensions, parameters, and internal networks. Use as foundation for reusable tools."
  parameters:
    externaltox: "Path to external .tox file."
    reinitextensions: "Reinitialize Python extensions."

Button_COMP:
  summary: "Creates interactive button widgets for Panel interfaces. Use for UI controls like toggles, momentary buttons, or radio groups."
  parameters:
    buttontype: "Button style: Momentary, Toggle, Radio."
    value: "Current button state/value."

Container_COMP:
  summary: "Holds and organizes Panel children with layout control. Use to structure UI element arrangement."
  parameters:
    bgcolor: "Background color."
    align: "Child alignment."

Engine_COMP:
  summary: "Runs separate TouchDesigner process for distributed rendering. Use for multi-machine setups or background processing."
  parameters:
    file: "Project file to load."
    start: "Start the engine process."

Geometry_COMP:
  summary: "Displays 3D geometry in render pipeline with materials and instancing. Use to render SOPs in 3D scenes."
  parameters:
    material: "Material to apply."
    render: "Enable rendering."
    instanceop: "Instance source operator."

Light_COMP:
  summary: "Creates light sources for 3D rendering. Use to illuminate geometry with point, directional, or spot lights."
  parameters:
    lighttype: "Light type: Point, Directional, Spot, Cone."
    color: "Light color."
    dimmer: "Light intensity."
    shadow: "Enable shadows."

Camera_COMP:
  summary: "Defines viewpoint for 3D rendering. Use to set up perspective or orthographic views of 3D scenes."
  parameters:
    projection: "Projection type: Perspective, Orthographic."
    fov: "Field of view angle."
    near: "Near clipping plane."
    far: "Far clipping plane."

# === MAT ===
Constant_MAT:
  summary: "Creates solid color material without lighting. Use for flat shading, UI elements, or unlit surfaces."
  parameters:
    color: "Solid color RGB values."
    alpha: "Transparency value."

Depth_MAT:
  summary: "Outputs depth buffer values as color. Use for depth-based effects, fog, or DOF calculations."
  parameters:
    near: "Near depth range."
    far: "Far depth range."

GLSL_MAT:
  summary: "Runs custom GLSL shaders for advanced materials. Use for programmable vertex and pixel shader effects."
  parameters:
    glslversion: "GLSL version to use."
    vertexshader: "Vertex shader DAT."
    pixelshader: "Pixel shader DAT."

PBR_MAT:
  summary: "Physically-based rendering material with metallic/roughness workflow. Use for realistic surfaces like metal, plastic, skin."
  parameters:
    basecolor: "Base color/albedo."
    metallic: "Metalness value (0-1)."
    roughness: "Surface roughness (0-1)."
    emissive: "Self-illumination color."
    normal: "Normal map texture."

Phong_MAT:
  summary: "Classic Phong shading with diffuse, specular, ambient. Use for traditional 3D material lighting."
  parameters:
    diffuse: "Diffuse color."
    specular: "Specular highlight color."
    shininess: "Specular sharpness."
    ambient: "Ambient light contribution."

Point_Sprite_MAT:
  summary: "Renders points as camera-facing textured sprites. Use for particle systems and point cloud visualization."
  parameters:
    pointsize: "Size of point sprites."
    spritemap: "Texture map for sprites."

Wireframe_MAT:
  summary: "Renders geometry edges as lines only. Use for technical visualization or stylized wireframe looks."
  parameters:
    linewidth: "Width of wireframe lines."
    color: "Wireframe color."

# === POP ===
Add_POP:
  summary: "Creates new particles with position, velocity, and attributes each frame. Use to emit particles into a system."
  parameters:
    birthrate: "Particles per second to create."
    pos: "Initial position."
    vel: "Initial velocity."
    life: "Particle lifespan."

Attract_POP:
  summary: "Pulls particles toward a point, line, or geometry. Use for gravity wells, magnetic effects, or flocking."
  parameters:
    attractmode: "Attraction type: Point, Axis, Surface."
    force: "Attraction strength."
    falloff: "Force falloff over distance."

Collision_POP:
  summary: "Detects and responds to particle collisions with geometry. Use for bouncing, sticking, or death on impact."
  parameters:
    sop: "Collision geometry."
    behavior: "Response: Bounce, Stick, Die."
    bounce: "Bounce factor."

Force_POP:
  summary: "Applies forces like gravity, wind, or turbulence to particles. Use for realistic motion dynamics."
  parameters:
    forcetype: "Force type: Gravity, Wind, Turbulence."
    force: "Force direction/strength."
    noise: "Turbulence parameters."

Kill_POP:
  summary: "Removes particles based on age, region, or conditions. Use to limit particle lifespan or cull particles."
  parameters:
    rule: "Kill condition: Age, Region, Expression."
    life: "Maximum age."

Limit_POP:
  summary: "Constrains particle position or velocity within bounds. Use to keep particles in a defined region."
  parameters:
    limittype: "Bound type: Box, Sphere, Geometry."
    behavior: "Response: Bounce, Wrap, Kill."

Replicator_POP:
  summary: "Creates copies of particle systems with transforms. Use for duplicating effects or creating arrays."
  parameters:
    copies: "Number of copies."
    transform: "Transform for each copy."

Source_POP:
  summary: "Emits particles from geometry surfaces, points, or volumes. Use as main particle emitter from SOP shapes."
  parameters:
    geometry: "Source SOP."
    emittype: "Emit from: Points, Surface, Volume."
    birthrate: "Emission rate."

# === More CHOPs ===
Audio_Device_In_CHOP:
  summary: "Captures live audio from sound cards or microphones. Use for real-time audio input and analysis."
  parameters:
    device: "Audio input device."
    channels: "Number of audio channels."
    samplerate: "Audio sample rate."

Audio_Device_Out_CHOP:
  summary: "Sends audio to speakers or headphones. Use for audio playback and output."
  parameters:
    device: "Audio output device."
    volume: "Output volume."

Audio_File_In_CHOP:
  summary: "Plays audio files (WAV, MP3, AIFF) from disk. Use for music, sound effects, or audio analysis."
  parameters:
    file: "Path to audio file."
    play: "Play/pause control."
    cue: "Cue point in seconds."
    loop: "Loop playback."

Beat_CHOP:
  summary: "Detects beats and tempo from audio. Use for music visualization and audio-reactive effects."
  parameters:
    threshold: "Beat detection sensitivity."
    tempo: "Detected tempo output."
    beat: "Beat pulse output."

Constant_CHOP:
  summary: "Outputs channels with constant values. Use for static parameters, flags, or reference values."
  parameters:
    name0: "First channel name."
    value0: "First channel value."

Count_CHOP:
  summary: "Counts events like triggers or pulses. Use for tallying, sequencing, or event counting."
  parameters:
    threshold: "Trigger threshold."
    reset: "Reset the count."
    limitmax: "Maximum count limit."

Delay_CHOP:
  summary: "Time-shifts channels by frames or seconds. Use for echo effects, sync offsets, or timing delays."
  parameters:
    delay: "Delay amount."
    delayunit: "Units: Frames, Seconds, Samples."

Expression_CHOP:
  summary: "Computes channel values from Python expressions. Use for custom math, logic, or dynamic calculations."
  parameters:
    expr0: "Expression for channel."
    numchannels: "Number of output channels."

Fan_CHOP:
  summary: "Distributes values across channels or combines channels into one. Use for spreading or merging data."
  parameters:
    fanop: "Fan operation: Out, In."
    destnames: "Output channel names."

Filter_CHOP:
  summary: "Smooths channel data with lowpass, highpass, or lag filters. Use for noise reduction or easing."
  parameters:
    filtertype: "Filter: Lowpass, Highpass, Bandpass."
    cutoff: "Cutoff frequency."
    lag: "Lag time for smoothing."

# === More TOPs ===
Composite_TOP:
  summary: "Layers images using blend modes like Add, Multiply, Over. Use for compositing and layering effects."
  parameters:
    operand: "Blend operation: Add, Multiply, Over, Screen."
    prefit: "How inputs are scaled to fit."

Constant_TOP:
  summary: "Outputs a solid color image. Use for backgrounds, masks, or color fills."
  parameters:
    colorr: "Red channel value."
    colorg: "Green channel value."
    colorb: "Blue channel value."
    resolutionw: "Output width."
    resolutionh: "Output height."

Crop_TOP:
  summary: "Cuts rectangular regions from images. Use for extracting or trimming image areas."
  parameters:
    cropleft: "Left crop boundary."
    cropright: "Right crop boundary."
    croptop: "Top crop boundary."
    cropbottom: "Bottom crop boundary."

Displace_TOP:
  summary: "Warps images using displacement maps. Use for distortion, ripple, or warp effects."
  parameters:
    displaceweight: "Displacement strength."
    method: "Displacement method."

Edge_TOP:
  summary: "Detects edges using Sobel, Canny, or other algorithms. Use for line art or contour extraction."
  parameters:
    edgetype: "Algorithm: Sobel, Canny, Prewitt."
    threshold: "Edge sensitivity."

Feedback_TOP:
  summary: "Creates feedback loops from previous output. Use for trails, echoes, and recursive effects."
  parameters:
    top: "Target TOP input."
    reset: "Reset feedback buffer."

Fit_TOP:
  summary: "Resizes images to target resolution with fit modes. Use for resolution matching and scaling."
  parameters:
    resolutionw: "Target width."
    resolutionh: "Target height."
    fit: "Fit mode: Fill, Width, Height, Native."

Flip_TOP:
  summary: "Mirrors or rotates images. Use for horizontal/vertical flip or 90-degree rotations."
  parameters:
    flipx: "Flip horizontal."
    flipy: "Flip vertical."
    rotate: "Rotation: None, 90, 180, 270."

GLSL_TOP:
  summary: "Runs custom GLSL shaders for GPU image processing. Use for custom effects, filters, or generative visuals."
  parameters:
    glslversion: "GLSL version."
    pixeldat: "Pixel shader DAT."
    compute: "Use compute shader."

HSV_Adjust_TOP:
  summary: "Adjusts hue, saturation, value for color correction. Use for color grading and adjustment."
  parameters:
    hueoffset: "Hue rotation."
    saturationmult: "Saturation multiplier."
    valuemult: "Value/brightness multiplier."

# === More SOPs ===
Box_SOP:
  summary: "Creates 3D box/cube primitives. Use for basic 3D shapes and building blocks."
  parameters:
    sizex: "Box width."
    sizey: "Box height."
    sizez: "Box depth."
    divsx: "X subdivisions."

Circle_SOP:
  summary: "Creates circles or arcs as polygons or NURBS. Use for 2D shapes and rings."
  parameters:
    type: "Type: Polygon, NURBS, Bezier."
    radius: "Circle radius."
    arc: "Arc type: Open, Closed, Slice."

Copy_SOP:
  summary: "Duplicates geometry with transforms or onto template points. Use for arrays and instancing."
  parameters:
    ncy: "Number of copies."
    cumulate: "Accumulate transforms."
    template: "Template points SOP."

Extrude_SOP:
  summary: "Pushes faces along normals for depth. Use for 3D text, logos, or adding thickness."
  parameters:
    dist: "Extrusion distance."
    outputfront: "Include front face."
    outputback: "Include back face."

Grid_SOP:
  summary: "Creates flat rectangular meshes. Use for planes, terrains, or UV grids."
  parameters:
    sizex: "Grid width."
    sizey: "Grid height."
    rows: "Row divisions."
    cols: "Column divisions."

Line_SOP:
  summary: "Creates straight lines between points. Use for simple geometry or paths."
  parameters:
    origin: "Start point."
    direction: "End point/direction."
    points: "Number of points."

Merge_SOP:
  summary: "Combines multiple geometries into one. Use for joining separate shapes."

Noise_SOP:
  summary: "Displaces points with noise patterns. Use for organic deformation and terrain."
  parameters:
    type: "Noise type: Perlin, Simplex, Sparse."
    amplitude: "Displacement strength."
    period: "Noise frequency."

Sphere_SOP:
  summary: "Creates 3D sphere primitives. Use for balls, planets, or rounded shapes."
  parameters:
    type: "Type: Polygon, Mesh, NURBS."
    radius: "Sphere radius."
    freq: "Tessellation frequency."

Transform_SOP:
  summary: "Moves, rotates, scales geometry. Use for positioning and transforming shapes."
  parameters:
    tx: "Translation X."
    ty: "Translation Y."
    tz: "Translation Z."
    rx: "Rotation X."
    ry: "Rotation Y."
    rz: "Rotation Z."
    sx: "Scale X."
    sy: "Scale Y."
    sz: "Scale Z."

# === More DATs ===
Convert_DAT:
  summary: "Transforms data between formats (tables, JSON, XML). Use for data format conversion."
  parameters:
    tofrom: "Conversion direction."
    format: "Target format."

Error_DAT:
  summary: "Collects error messages from operators. Use for debugging and error monitoring."
  parameters:
    clear: "Clear error list."
    maxlines: "Maximum errors to show."

Evaluate_DAT:
  summary: "Evaluates Python expressions in table cells. Use for dynamic calculations in tables."
  parameters:
    scope: "Evaluation scope."

Execute_DAT:
  summary: "Runs Python on events like start, frame change, parameter change. Use for event-driven scripting."
  parameters:
    active: "Enable execution."
    start: "Run on start."
    framestart: "Run each frame."

File_In_DAT:
  summary: "Reads text files from disk. Use for loading configs, scripts, or data."
  parameters:
    file: "Path to file."
    refreshpulse: "Reload file."

File_Out_DAT:
  summary: "Writes DAT contents to files. Use for saving, logging, or export."
  parameters:
    file: "Output file path."
    writepulse: "Trigger write."

Merge_DAT:
  summary: "Combines multiple tables by rows or columns. Use for concatenating data."
  parameters:
    mergemethod: "Merge: Rows, Columns."

MIDI_In_DAT:
  summary: "Receives MIDI messages as table data. Use for MIDI controller input."
  parameters:
    device: "MIDI input device."
    channel: "MIDI channel filter."

OSC_In_DAT:
  summary: "Receives OSC messages over network. Use for external control via OSC protocol."
  parameters:
    port: "UDP port to listen on."
    protocol: "Protocol: UDP, TCP."

Script_DAT:
  summary: "Runs Python scripts with cook callbacks. Use for procedural data generation."
  parameters:
    callbacks: "Callback DAT."

Select_DAT:
  summary: "Extracts rows, columns, or cells from another DAT. Use for filtering table data."
  parameters:
    dat: "Source DAT."
    selectrows: "Row selection pattern."
    selectcols: "Column selection pattern."

Table_DAT:
  summary: "Stores and edits tabular data. Fundamental for spreadsheet-like data management."

Text_DAT:
  summary: "Stores and edits text content. Use for scripts, shaders, or text storage."

# === More CHOPs (batch 2) ===
LFO_CHOP:
  summary: "Generates low-frequency oscillator waveforms for animation and modulation. Use for sine, square, triangle waves."
  parameters:
    type: "Waveform: Sine, Square, Triangle, Ramp."
    frequency: "Oscillation frequency."
    amplitude: "Wave amplitude."
    offset: "DC offset."
    phase: "Phase offset."

Logic_CHOP:
  summary: "Performs boolean logic (AND, OR, NOT, XOR) on channels. Use for combining conditions."
  parameters:
    preop: "Pre-operation per channel."
    convert: "Convert input to boolean."
    chopop: "Logic operation between inputs."

Math_CHOP:
  summary: "Performs math operations on channels: add, multiply, power, trig. Use for calculations."
  parameters:
    preoff: "Pre-add offset."
    gain: "Multiply factor."
    postoff: "Post-add offset."
    chanop: "Operation between channels."

Merge_CHOP:
  summary: "Combines channels from multiple CHOPs into single output. Use for joining channel data."

MIDI_In_CHOP:
  summary: "Receives MIDI as channels: note, velocity, CC. Use for MIDI controller input."
  parameters:
    device: "MIDI input device."
    channel: "MIDI channel filter."
    notestype: "Note output format."

Mouse_In_CHOP:
  summary: "Outputs mouse position, buttons, scroll wheel. Use for mouse-driven interaction."
  parameters:
    panel: "Panel to track mouse in."
    buttons: "Output button channels."
    wheel: "Output scroll wheel."

Noise_CHOP:
  summary: "Generates procedural noise patterns for animation. Use for organic random motion."
  parameters:
    type: "Noise type: Sparse, Hermite, Harmonic."
    seed: "Random seed."
    period: "Noise period."
    amplitude: "Noise amplitude."

Null_CHOP:
  summary: "Passes through channels unchanged. Use for organization and clean references."

OSC_In_CHOP:
  summary: "Receives OSC messages as channel values. Use for network control input."
  parameters:
    port: "UDP port."
    address: "OSC address pattern."

Pattern_CHOP:
  summary: "Generates mathematical patterns across samples. Use for ramps, waves, sequences."
  parameters:
    type: "Pattern: Ramp, Sine, Square."
    size: "Number of samples."
    cycles: "Number of cycles."

# === More TOPs (batch 2) ===
Level_TOP:
  summary: "Adjusts brightness, contrast, gamma, color levels. Use for image correction and grading."
  parameters:
    opacity: "Overall opacity."
    brightness: "Brightness adjustment."
    contrast: "Contrast adjustment."
    gamma: "Gamma correction."

Lookup_TOP:
  summary: "Remaps pixel values using lookup table. Use for color grading and LUT effects."
  parameters:
    lookuptable: "Lookup table TOP."
    format: "Lookup format."

Movie_File_In_TOP:
  summary: "Plays video files (MP4, MOV, HAP). Use for video playback and media."
  parameters:
    file: "Video file path."
    play: "Play/pause."
    index: "Current frame."
    speed: "Playback speed."
    loop: "Loop mode."

Noise_TOP:
  summary: "Generates procedural noise textures. Use for texturing, displacement, masks."
  parameters:
    type: "Noise: Perlin, Simplex, Worley."
    seed: "Random seed."
    period: "Noise scale."
    amplitude: "Noise strength."

Null_TOP:
  summary: "Passes through images unchanged. Use for organization and clean references."

Over_TOP:
  summary: "Composites foreground over background using alpha. Use for layering with transparency."

Ramp_TOP:
  summary: "Generates gradient images. Use for masks, backgrounds, color ramps."
  parameters:
    type: "Ramp: Horizontal, Vertical, Radial."
    phase: "Gradient offset."

Rectangle_TOP:
  summary: "Draws rectangles with color and softness. Use for shapes, masks, UI elements."
  parameters:
    sizex: "Rectangle width."
    sizey: "Rectangle height."
    centerx: "X position."
    centery: "Y position."
    softness: "Edge softness."

Render_TOP:
  summary: "Renders 3D scenes to texture. Use for 3D graphics output with cameras and lights."
  parameters:
    camera: "Camera COMP."
    lights: "Light COMPs."
    geometry: "Geometry COMPs."
    antialiasing: "AA samples."

Resolution_TOP:
  summary: "Changes image resolution with scaling. Use for resizing and resolution matching."
  parameters:
    resolutionw: "Target width."
    resolutionh: "Target height."
    outputaspect: "Aspect handling."

# === More SOPs (batch 2) ===
Carve_SOP:
  summary: "Cuts curves and surfaces at positions. Use for partial geometry and trimming."
  parameters:
    firstu: "Start cut position."
    secondu: "End cut position."

Convert_SOP:
  summary: "Converts between geometry types. Use for polygon/NURBS/mesh conversion."
  parameters:
    fromtype: "Source type."
    totype: "Target type."

Delete_SOP:
  summary: "Removes points, prims, or edges by group. Use for filtering geometry."
  parameters:
    entity: "What to delete: Points, Primitives, Edges."
    group: "Group pattern."
    negate: "Invert selection."

Divide_SOP:
  summary: "Subdivides polygons with triangulation. Use for tessellation and smoothing."
  parameters:
    divtype: "Division method."
    computenormals: "Recalculate normals."

Facet_SOP:
  summary: "Controls surface shading and normals. Use for flat/smooth shading control."
  parameters:
    unique: "Make points unique per face."
    cusp: "Cusp angle threshold."

Point_SOP:
  summary: "Modifies point attributes with expressions. Use for position/color manipulation."
  parameters:
    tx: "X position expression."
    ty: "Y position expression."
    tz: "Z position expression."

PolyExtrude_SOP:
  summary: "Extrudes polygon faces with inset. Use for complex extrusions and bevels."
  parameters:
    dist: "Extrusion distance."
    inset: "Face inset amount."
    twist: "Twist during extrusion."

Sort_SOP:
  summary: "Reorders points or prims by criteria. Use for spatial or attribute sorting."
  parameters:
    ptsort: "Point sort method."
    primsort: "Primitive sort method."
    seed: "Random seed."

Subdivide_SOP:
  summary: "Smoothly subdivides geometry. Use for Catmull-Clark or Loop subdivision."
  parameters:
    iterations: "Subdivision levels."
    algorithm: "Method: Catmull-Clark, Loop."

Sweep_SOP:
  summary: "Sweeps cross-section along curve. Use for tubes, rails, extruded shapes."
  parameters:
    backbone: "Backbone SOP."
    crosssection: "Cross-section SOP."
    twist: "Twist along path."

# === More COMPs (batch 2) ===
Field_COMP:
  summary: "Creates text input fields for Panels. Use for string, int, float input."
  parameters:
    fieldtype: "Field type: String, Integer, Float."
    value: "Current value."

List_COMP:
  summary: "Displays scrollable item lists. Use for selectable lists with callbacks."
  parameters:
    tabledat: "Data source DAT."
    selectrows: "Allow selection."
    callbacks: "Callback DAT."

