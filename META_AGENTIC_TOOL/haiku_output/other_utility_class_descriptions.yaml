# TouchDesigner Utility Class Semantic Descriptions
# Generated via Claude Haiku for semantic search embeddings

AbsTime_Class: "Access absolute time since TouchDesigner started. Use for consistent timing across all nodes unaffected by timeline pausing or playback speed changes."
App_Class: "Control application-level settings, monitor power state, and manage resolution/commercial limits. Use to enforce licensing restrictions or access recent file history."
Attribute_Class: "Inspect SOP geometry attribute metadata including name, type, and default values. Use to understand data structure before processing geometry."
Bezier_Class: "Evaluate and manipulate Bezier curves with anchors and control points. Use to sample curve positions, calculate tangents, or dynamically insert control points."
Body_Class: "Access and control physics bodies in Bullet dynamics solver with forces, impulses, and transformations. Use to apply physics interactions to 3D objects."
Cell_Class: "Access individual DAT table cells by row/column with value reading and size manipulation. Use to work with spreadsheet data at the cell level."
Channel_Class: "Read CHOP channel data including values, frame samples, and numpy arrays. Use to access time-series data from animation or parameter channels."
Color_Class: "Store and manipulate RGBA color values with individual component access. Use for color operations in rendering, compositing, or UI applications."
Connector_Class: "Manage wired connections between operator inputs and outputs. Use to programmatically create or remove connections between nodes."
Dependency_Class: "Track value changes and trigger callbacks when dependencies are modified. Use to implement reactive updates based on parameter or value changes."
Matrix_Class: "Perform 4x4 transformation matrix operations including translate, rotate, scale, and inverse. Use for complex spatial transformations and 3D geometry calculations."
Monitor_Class: "Query display monitor properties including resolution, refresh rate, and primary status. Use to optimize rendering across multiple displays or detect screen configuration."
Par_Class: "Access and control operator parameters with expressions, modes, and value ranges. Use to get/set node parameters, evaluate expressions, or trigger pulses."
ParGroup_Class: "Manage grouped parameters like Position (x, y, z) or Size (w, h) as units. Use to read/write related parameters together with group expressions."
Position_Class: "Represent and manipulate 3D world positions with distance calculations and transformations. Use for spatial operations, distance checks, and coordinate transformations."
Prim_Class: "Access SOP geometry primitives like polygons and curves with index and properties. Use to inspect or destroy individual primitives in geometry."
Point_Class: "Access SOP geometry points with position coordinates and attributes. Use to read/modify point positions, normals, and custom point attributes."
Project_Class: "Manage TouchDesigner project files including save, load, and project metadata. Use to programmatically save work, load projects, or access project paths."
Run_Class: "Access delayed script execution instances with scheduling and termination. Use to manage scheduled scripts, check remaining frames, or kill running tasks."
Segment_Class: "Access individual segments of SOP curves between anchors. Use to evaluate curve segments or remove segments from spline geometry."
Peer_Class: "Represent remote systems for network communication. Use to identify connected peers by hostname, port, and protocol in distributed setups."
Quaternion_Class: "Represent rotations avoiding gimbal lock with spherical interpolation and inverse operations. Use for smooth 3D rotations and animation blending."
Root_Class: "Access the root operator at the top of the hierarchy. Use to reference global project time and extensions."
Td_Module: "Global td module providing shortcuts to operators, parent, extensions, and root. Use op(), parent(), me, and other conveniences in expressions."
Tdu_Module: "Utility functions for math (clamp, remap, rand) and string operations (base, digits). Use for common calculations without importing libraries."
TimedRun_Class: "Scheduled delayed execution with frame or second-based delays. Use to check remaining time or cancel pending runs."
Timecode_Class: "SMPTE timecode representation with fps, hours, minutes, seconds, and frames. Use for video synchronization and broadcast timing."
UI_Class: "UI preferences including clipboard, colors, DPI settings, and master volume. Use to access or modify user interface configuration."
Vertex_Class: "Access SOP geometry vertices connecting points to primitives. Use to traverse mesh topology and access per-vertex attributes."
Mesh_Class: "Access mesh geometry structure with face, point, and vertex counts. Use to compute normals or query mesh topology."
Group_Class: "Access SOP point, primitive, or vertex groups by name. Use to work with geometry selections and group membership."
InputPoint_Class: "Track panel input device position with hover and selection state. Use to detect mouse/touch position inside panel UIs."
Panel_Class: "Access panel UI interaction state including inside status and mouse button selections. Use to respond to panel interactions."
Preferences_Class: "Access application preferences for general settings, network, DATs, and TOPs. Use to read or modify user preferences programmatically."
SysInfo_Class: "Query system hardware information including CPU count, RAM, OS, and GPU. Use to adapt performance based on available resources."
TD_Class: "Access TouchDesigner version info including build number and experimental status. Use for version-specific code paths."
TextLine_Class: "Access Text DAT lines with styling including font, bold, and italic. Use to read formatted text content."
Tox_Class: "Reference component TOX files with path, name, and dirty status. Use to track external component dependencies."
Undo_Class: "Manage undo/redo operations with block grouping. Use to create atomic undo steps for complex operations."
Vector_Class: "3D direction vector with normalize, dot product, cross product, and length operations. Use for directional math and geometry calculations."
