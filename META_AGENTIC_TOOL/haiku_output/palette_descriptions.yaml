Generators:
  checker: "Procedurally generates checker pattern textures with customizable colors and flipping options for visual effects."
  julia: "Generates Julia set fractals as real-time image textures using GLSL rendering with configurable parameters."
  mandelbrot: "Renders Mandelbrot set fractals with customizable zoom and color mapping for mathematical visualization."
  mesh: "Creates 3D mesh geometry including various predefined shapes (bow, horn, shell, kidney) with optional deformation and output."
  noise: "Generates various types of procedural noise textures (Perlin, value, etc.) with customizable parameters for natural-looking effects."
  superFormula: "Generates complex 2D and 3D parametric shapes using the SuperFormula algorithm with adjustable mathematical parameters."

ImageFilters:
  bloom: "Creates bloom effects by compositing multiple blurred iterations of an image to simulate light spreading and glow."
  cartesianToPolar: "Transforms images from Cartesian to polar coordinates using projection, useful for circular distortion effects."
  changeColor: "Shifts or transforms specific color ranges in an image while maintaining luminosity and hue relationships."
  changeToColor: "Converts colors in an image to a target color while preserving brightness and saturation variations."
  colorThreshold: "Separates specific color ranges in an image by applying multiple threshold operations on individual color channels."
  convolve: "Applies custom convolution kernels to images for effects like sharpening, blurring, or edge detection."
  dent: "Creates a dent/indentation distortion effect on images using custom GLSL shaders for realistic surface deformation."
  dilate: "Expands bright regions in an image through morphological dilation, growing white areas and shrinking black areas."
  feedback: "Creates feedback loops where previous frames influence the current frame, generating temporal distortion effects."
  feedbackEdge: "Combines edge detection with feedback loops to create dynamic, recursive edge-based visual effects."
  hsvBlur: "Applies separate blur operations to HSV channels (hue, saturation, value) for specialized color bleeding effects."
  lightTunnel: "Creates a tunnel effect by gradually darkening/lightening an image toward the edges with customizable intensity."
  monochrome: "Converts color images to monochrome/grayscale while preserving selective color channels or applying custom mixing."
  pixelate: "Reduces image resolution into pixel blocks of adjustable size, creating pixelated/mosaic effects."
  pixelRelocator: "Distorts an image by relocating pixels based on noise patterns, creating glitch and displacement effects."
  pointillize: "Simulates pointillist painting by replacing pixel regions with colored dots generated from the original image."
  radialBlur: "Applies motion blur radiating from or toward a center point, creating spinning or zoom effects."
  rgbaBlur: "Applies separate blur operations to individual RGBA channels for chromatic aberration and color separation effects."
  rgbaDelay: "Creates temporal delays per RGBA channel with compositing, producing time-shifted color effects."
  rgbContrast: "Adjusts contrast on individual RGB channels independently for selective color enhancement."
  sharpen: "Enhances image details using convolution-based sharpening with configurable intensity."
  softenAlpha: "Softens and feathers alpha channel edges while preserving the RGB image content."
  solarize: "Inverts brightness values in specific ranges, creating a solarization effect that reverses certain tones."
  twirl: "Applies a spiral/twirl distortion effect to images using mathematical transformation."

