# TouchDesigner Common Python Patterns - Semantic Descriptions
# These are the most frequently searched coding patterns

# === CHOP Access ===
access_chop_value:
  description: "Get a single value from a CHOP channel at a specific sample index. Use for reading current channel values."
  code: "v = op('constant1')['chan1'][0]"

access_chop_by_name:
  description: "Access a CHOP and retrieve a specific channel by name. Use when you know the channel name."
  code: "c = op('pattern1')['chan2']"

get_all_channels:
  description: "Iterate through all channels in a CHOP. Use to process or inspect every channel."
  code: "for c in op('noise1').chans(): print(c.name, c[0])"

chop_to_numpy:
  description: "Convert CHOP data to numpy array for analysis or processing. Use for audio analysis or bulk math."
  code: "arr = op('audiospectrum1').numpyArray()"

# === DAT Access ===
access_dat_cell:
  description: "Get a specific cell from a DAT by row and column. Use for table lookups."
  code: "value = op('table1')[2, 'name']"

iterate_dat_rows:
  description: "Loop through all rows in a DAT table. Use for processing tabular data."
  code: "for row in op('table1').rows(): print(row[0].val)"

append_to_table:
  description: "Add a new row to a table DAT. Use for logging, accumulating data, or building lists."
  code: "op('table1').appendRow(['new', 'data', 123])"

clear_table:
  description: "Clear all data from a table DAT, optionally keeping header. Use to reset tables."
  code: "op('table1').clear(keepFirstRow=True)"

# === Parameters ===
get_parameter:
  description: "Read a parameter value from an operator. Use to get current settings."
  code: "tx = op('geo1').par.tx.eval()"

set_parameter:
  description: "Set a parameter value on an operator. Use to control operators from scripts."
  code: "op('geo1').par.tx = 5.0"

pulse_parameter:
  description: "Trigger a pulse parameter. Use for cue buttons, resets, or triggering actions."
  code: "op('moviefilein1').par.cuepulse.pulse()"

# === Operator Management ===
create_operator:
  description: "Create a new operator inside a component. Use for procedural network building."
  code: "newop = parent().create(textTOP, 'mytext')"

copy_operator:
  description: "Duplicate an existing operator. Use for templating or cloning setups."
  code: "newop = parent().copy(op('template'), name='copy1')"

find_children:
  description: "Search for child operators by type. Use to find all operators of a specific family."
  code: "tops = parent().findChildren(type=TOP, depth=2)"

# === File I/O ===
save_top_image:
  description: "Save a TOP's output to an image file. Use for rendering, screenshots, or exports."
  code: "op('render1').save('output.png')"

save_tox:
  description: "Save a component as a .tox file. Use for backups, sharing, or version control."
  code: "op('mycomp').saveTox('backup.tox')"

# === Execution ===
run_script_delayed:
  description: "Execute a script DAT after a delay. Use for timed actions or deferred execution."
  code: "op('script1').run(delayFrames=60)"

# === State Management ===
store_fetch:
  description: "Store and retrieve persistent values on an operator. Use for counters, state, or caching."
  code: "me.store('counter', me.fetch('counter', 0) + 1)"

# === Navigation ===
parent_shortcut:
  description: "Access the parent component and its parameters. Use in extensions and callbacks."
  code: "parent().par.Myvalue = 10"

get_operator_path:
  description: "Get the full network path of an operator. Use for logging, references, or debugging."
  code: "path = op('geo1').path"
