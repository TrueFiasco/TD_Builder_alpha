# Steering Semantic Descriptions
# These embeddings help guide the LLM to choose GLSL, Python, or Native operators

# === GLSL Indicators ===
glsl_blur_effect: "Create a custom blur effect on an image using a pixel shader. Use GLSL TOP for real-time GPU-accelerated blur with custom kernel sizes or artistic blur styles."

glsl_procedural_noise: "Generate procedural noise textures like Perlin, Simplex, or Worley noise. GLSL shaders can create infinite resolution noise patterns in real-time on the GPU."

glsl_color_grading: "Custom color manipulation and grading per pixel. Use GLSL for LUTs, color curves, hue shifts, or any per-pixel color math that runs in real-time."

glsl_distortion: "Image distortion effects like wave, ripple, lens distortion, or displacement mapping. GLSL processes each pixel position mathematically on the GPU."

glsl_feedback: "Create feedback or recursive visual effects. GLSL TOPs can read their previous output to create trails, echoes, and time-based accumulation effects."

glsl_generative: "Generate procedural patterns, shapes, or textures mathematically. GLSL excels at creating infinite resolution generative art from mathematical formulas."

glsl_edge_detection: "Custom edge detection or outline effects. GLSL can sample neighboring pixels to detect edges using Sobel, Laplacian, or custom kernels."

glsl_composite: "Advanced compositing operations beyond standard blend modes. GLSL allows custom per-pixel blending logic and mathematical compositing."

glsl_raymarching: "Raymarching and signed distance field (SDF) rendering. GLSL can render 3D shapes defined mathematically without geometry, directly in a pixel shader."

glsl_instancing: "Custom per-instance transforms for instanced geometry. GLSL can calculate unique positions, rotations, or colors for thousands of instances."

# === Python Indicators ===
python_file_io: "Read or write files to disk. Python scripts can load images, save data, parse configuration files, or process external resources."

python_network: "Network communication via OSC, MIDI, TCP, UDP, or HTTP. Python handles external device communication and API integration."

python_logic: "Implement conditional logic, state machines, or decision trees. Python excels at if/else logic, loops, and complex conditional behavior."

python_state: "Track and manage state across frames or sessions. Python can maintain variables, counters, and history that persist between frames."

python_data: "Transform, parse, or process data structures. Python handles JSON, XML, CSV parsing and complex data manipulation."

python_automation: "Automate repetitive tasks or batch operations. Python scripts can process multiple items, generate content, or automate workflows."

python_callback: "Handle user interface events and callbacks. Python responds to button clicks, parameter changes, and user interactions."

python_external_api: "Integrate with external APIs or services. Python can make HTTP requests, parse responses, and communicate with web services."

python_midi_osc: "Process MIDI notes, control changes, or OSC messages. Python parses incoming messages and routes data to parameters."

python_custom_parameters: "Create dynamic custom parameters or UI. Python Script operators can define custom parameter pages that change at runtime."

# === Native Operator Indicators ===
native_resize: "Resize or scale an image to a specific resolution. Use Resolution TOP or Fit TOP for standard image scaling operations."

native_composite: "Blend or composite images together. Composite TOP and Over TOP handle standard layer blending with multiple blend modes."

native_blur: "Apply standard Gaussian or box blur. Blur TOP provides optimized blur with adjustable size and quality settings."

native_audio_filter: "Filter audio frequencies. Audio Filter CHOP provides standard lowpass, highpass, bandpass filtering."

native_transform: "Transform geometry position, rotation, or scale. Transform SOP and Transform TOP handle standard transformations."

native_animation: "Animate parameters over time. Animation COMP and keyframing provide standard animation curves and timing."

native_render: "Render a 3D scene with cameras and lights. Render TOP handles standard 3D rendering with materials and lighting."

native_merge: "Combine multiple data streams or geometry. Merge CHOP, Merge SOP, and Merge DAT combine inputs into single outputs."

native_select: "Select or filter specific channels, rows, or geometry. Select operators extract subsets from larger datasets."

native_math: "Basic mathematical operations on data. Math CHOP, Math TOP handle standard arithmetic without custom code."

# === Decision Helpers ===
when_to_use_glsl: "Use GLSL when you need custom per-pixel image processing, procedural generation, GPU acceleration, or effects not available in standard TOPs. GLSL runs on the GPU and processes every pixel in parallel."

when_to_use_python: "Use Python when you need logic, external data, file I/O, network communication, state management, or custom behaviors. Python handles complex logic and external integration."

when_to_use_native: "Use native operators when a standard operator does exactly what you need. Native operators are optimized, stable, and easier to maintain than custom code."

glsl_vs_python: "Choose GLSL for real-time visual effects on images. Choose Python for logic, data processing, and external communication. GLSL is GPU-parallel, Python is sequential but flexible."

performance_guidance: "For maximum performance on image processing, use GLSL. For flexibility and external integration, use Python. Native operators balance both with pre-built optimization."
