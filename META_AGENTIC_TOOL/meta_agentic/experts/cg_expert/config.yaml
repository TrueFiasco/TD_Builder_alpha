# CG Expert Configuration
# Translates artistic vision into platform-agnostic technical specifications

expert_id: "cg_expert"
version: "1.0.0"
created: "2025-12-16"
description: "Translates creative specifications into technical approach with algorithms, data structures, and performance considerations"

# Expertise files this expert reads
expertise_inputs:
  - path: "meta_agentic/expertise/cg_concepts.yaml"
    purpose: "Algorithms, data structures, rendering techniques"
  - path: "meta_agentic/expertise/creative_vision.yaml"
    purpose: "Understand creative vocabulary for translation"

# No external source of truth - CG domain is established knowledge
validation_sources: []

# Expertise files this expert writes
expertise_outputs:
  - path: "meta_agentic/expertise/cg_concepts.yaml"
    purpose: "Update algorithms with new patterns and optimizations"

# Event logging
event_log: "meta_agentic/history/expertise_events.jsonl"
event_domain: "cg"

# Upstream/downstream collaborators
collaborators:
  upstream:
    - expert_id: "creative_expert"
      receives_from: "creative_spec"
      handoff_format: "creative_spec_v1"

  downstream:
    - expert_id: "critic"
      sends_to: "technical_review"
      handoff_format: "technical_approach"

    - expert_id: "td_designer"
      sends_to: "implementation"
      handoff_format: "creative_brief"
      note: "Only after critic approval"

# Output format
output_format:
  type: "yaml"
  schema: "technical_approach_v1"
  includes:
    - primary_algorithm
    - data_structures
    - data_flow
    - performance_targets
    - optimization_strategies
    - rendering_approach

# Anti-hallucination settings
validation:
  require_algorithm_from_vocabulary: true
  require_data_flow_specification: true
  require_performance_justification: true
  flag_undefined_algorithms: true

# Learning settings
learning:
  log_successes: true
  log_failures: true
  update_algorithms_on_discovery: true
  update_optimizations_on_success: true
  min_samples_for_update: 2
