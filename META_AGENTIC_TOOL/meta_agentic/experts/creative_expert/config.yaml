# Creative Expert Configuration
# Generates artistic vision, mood, and aesthetic specifications

expert_id: "creative_expert"
version: "1.0.0"
created: "2025-12-16"
description: "Translates high-level creative intent into artistic specifications with mood, aesthetics, and visual vocabulary"

# Expertise files this expert reads
expertise_inputs:
  - path: "meta_agentic/expertise/creative_vision.yaml"
    purpose: "Mood vocabulary, aesthetic styles, color palettes, motion qualities"

# No external source of truth - creative domain is subjective
validation_sources: []

# Expertise files this expert writes
expertise_outputs:
  - path: "meta_agentic/expertise/creative_vision.yaml"
    purpose: "Update moods, aesthetics with new discoveries"

# Event logging
event_log: "meta_agentic/history/expertise_events.jsonl"
event_domain: "creative"

# Upstream/downstream collaborators
collaborators:
  upstream:
    - expert_id: "creative_orchestrator"
      receives_from: "user_intent"
      handoff_format: "user_request"

  downstream:
    - expert_id: "cg_expert"
      sends_to: "artistic_vision"
      handoff_format: "creative_spec"

    - expert_id: "critic"
      sends_to: "creative_review"
      handoff_format: "creative_spec"

# Output format
output_format:
  type: "yaml"
  schema: "creative_spec_v1"
  includes:
    - artistic_intent
    - mood_specification
    - aesthetic_choices
    - color_palette
    - motion_qualities
    - emotional_goals
    - visual_vocabulary

# Anti-hallucination settings
validation:
  require_mood_from_vocabulary: true
  require_aesthetic_mapping: true
  require_color_rationale: true
  flag_undefined_moods: true

# Learning settings
learning:
  log_successes: true
  log_failures: true
  update_moods_on_discovery: true
  min_samples_for_update: 2
