# =============================================================================
# SAMPLE REVIEW: 2 operators per family, 1 example each
# Shows: Script-extracted FACTS + Haiku-generated DESCRIPTION
# =============================================================================

# =============================================================================
# CHOP FAMILY
# =============================================================================

analyzeCHOP:
  example3:
    # --- HAIKU DESCRIPTION ---
    network_description: "These two examples get the RMS (Root Mean Squared) values of both the incoming Noise CHOP, and even more useful, for the incoming audio file."

    # --- SCRIPT-EXTRACTED FACTS ---
    operators:
      - name: noise1
        type: CHOP:noise
        role: input
        parameters:
          timeslice: 'on'
      - name: audiofilein1
        type: CHOP:audiofilein
        role: input
        parameters:
          timeslice: 'on'
      - name: trail1
        type: CHOP:trail
        role: processor
      - name: analyze_rms
        type: CHOP:analyze
        role: processor
        parameters:
          function: rmspower
      - name: analyze_rms1
        type: CHOP:analyze
        role: processor
        parameters:
          function: rmspower
      - name: trail2
        type: CHOP:trail
        role: output
      - name: trail3
        type: CHOP:trail
        role: output
    connections:
      - from: noise1 -> trail1
      - from: trail1 -> analyze_rms
      - from: analyze_rms -> trail2
      - from: audiofilein1 -> analyze_rms1
      - from: analyze_rms1 -> trail3
    topology:
      operator_count: 7
      connection_count: 5
      has_parallel_paths: true
      max_chain_length: 4

filterCHOP:
  example1:
    # --- HAIKU DESCRIPTION ---
    network_description: "The Filter CHOP smooths out changes in the input channels. You'll see the smoothest output from filter_lowpass."

    # --- SCRIPT-EXTRACTED FACTS ---
    operators:
      - name: noise1
        type: CHOP:noise
        role: input
        parameters:
          timeslice: 'on'
      - name: filter_lowpass
        type: CHOP:filter
        role: processor
        parameters:
          type: lowpass
      - name: filter_box
        type: CHOP:filter
        role: processor
        parameters:
          type: box
      - name: filter_gaussian
        type: CHOP:filter
        role: output
        parameters:
          type: gaussian
    connections:
      - from: noise1 -> filter_lowpass
      - from: noise1 -> filter_box
      - from: noise1 -> filter_gaussian
    topology:
      operator_count: 4
      connection_count: 3
      has_parallel_paths: true
      max_chain_length: 2

# =============================================================================
# SOP FAMILY
# =============================================================================

copySOP:
  example2:
    # --- HAIKU DESCRIPTION ---
    network_description: "Grid and torus geometries flow to copy_to_input for per-point copying."

    # --- SCRIPT-EXTRACTED FACTS ---
    operators:
      - name: grid1
        type: SOP:grid
        role: input
      - name: torus1
        type: SOP:torus
        role: input
      - name: copy_to_input
        type: SOP:copy
        role: output
    connections:
      - from: grid1 -> copy_to_input
        input_index: '0'
      - from: torus1 -> copy_to_input
        input_index: '1'
    topology:
      operator_count: 3
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 2

noiseSOP:
  example1:
    # --- HAIKU DESCRIPTION ---
    network_description: "Sphere1 geometry flows to noise_points_position."

    # --- SCRIPT-EXTRACTED FACTS ---
    operators:
      - name: sphere1
        type: SOP:sphere
        role: input
        parameters:
          reverseanchors: 'on'
      - name: noise_points_position
        type: SOP:noise
        role: output
        parameters:
          attr: P
    connections:
      - from: sphere1 -> noise_points_position
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2

# =============================================================================
# TOP FAMILY
# =============================================================================

blurTOP:
  example2:
    # --- HAIKU DESCRIPTION ---
    network_description: "A faster and more extreme blur by shrinking the image and blurring that. It internally scales it up again."

    # --- SCRIPT-EXTRACTED FACTS ---
    operators:
      - name: moviefilein1
        type: TOP:moviefilein
        role: input
      - name: blur_preshrink
        type: TOP:blur
        role: output
        parameters:
          preshrink: 4
          filtersize: 10
    connections:
      - from: moviefilein1 -> blur_preshrink
    topology:
      operator_count: 2
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2

feedbackTOP:
  example1:
    # --- HAIKU DESCRIPTION ---
    network_description: "A simple feedback setup that gives fake motion blur by using a fraction of the current image plus a fraction of the prior frame's image."

    # --- SCRIPT-EXTRACTED FACTS ---
    operators:
      - name: moviefilein1
        type: TOP:moviefilein
        role: input
      - name: feedback1
        type: TOP:feedback
        role: processor
      - name: composite1
        type: TOP:composite
        role: processor
        parameters:
          operand: add
      - name: null1
        type: TOP:null
        role: output
    connections:
      - from: moviefilein1 -> composite1
        input_index: '0'
      - from: feedback1 -> composite1
        input_index: '1'
      - from: composite1 -> null1
      - from: null1 -> feedback1
    topology:
      operator_count: 4
      connection_count: 4
      has_parallel_paths: false
      has_feedback_loops: true
      max_chain_length: 3

# =============================================================================
# DAT FAMILY
# =============================================================================

chopexecuteDAT:
  example1:
    # --- HAIKU DESCRIPTION ---
    network_description: "A slider CHOP value triggers the DAT to execute and write the current value to a Text DAT. The data flows from slider input through a null CHOP output."

    # --- SCRIPT-EXTRACTED FACTS ---
    operators:
      - name: slider1
        type: COMP:slider
        role: input
      - name: null1
        type: CHOP:null
        role: output
      - name: chopexec1
        type: DAT:chopexec
        role: isolated
      - name: output_text
        type: DAT:text
        role: isolated
    connections:
      - from: slider1/out1 -> null1
    topology:
      operator_count: 4
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2

evaluateDAT:
  example1:
    # --- HAIKU DESCRIPTION ---
    network_description: "A table input is processed by two evaluate DATs that multiply cells by 2 using different expression methods, with isolated standalone evaluators."

    # --- SCRIPT-EXTRACTED FACTS ---
    operators:
      - name: table1
        type: DAT:table
        role: input
      - name: eval_expression
        type: DAT:evaluate
        role: output
        parameters:
          expr: "me.inputCell * 2"
      - name: eval_python
        type: DAT:evaluate
        role: output
        parameters:
          expr: "int(me.inputCell) * 2"
    connections:
      - from: table1 -> eval_expression
      - from: table1 -> eval_python
    topology:
      operator_count: 3
      connection_count: 2
      has_parallel_paths: true
      max_chain_length: 2

# =============================================================================
# COMP FAMILY
# =============================================================================

geometryCOMP:
  example1:
    # --- HAIKU DESCRIPTION ---
    network_description: "sphere1 flows to noise1, which outputs to facet2 in a simple SOP processing chain."

    # --- SCRIPT-EXTRACTED FACTS ---
    operators:
      - name: sphere1
        type: SOP:sphere
        role: input
      - name: noise1
        type: SOP:noise
        role: processor
      - name: facet2
        type: SOP:facet
        role: output
    connections:
      - from: sphere1 -> noise1
      - from: noise1 -> facet2
    topology:
      operator_count: 3
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3

replicatorCOMP:
  example1:
    # --- HAIKU DESCRIPTION ---
    network_description: "folder1 flows to templateTable, driving the replication of moviefilein operators."

    # --- SCRIPT-EXTRACTED FACTS ---
    operators:
      - name: folder1
        type: DAT:folder
        role: input
      - name: templateTable
        type: DAT:table
        role: processor
      - name: replicator1
        type: COMP:replicator
        role: output
    connections:
      - from: folder1 -> templateTable
    topology:
      operator_count: 3
      connection_count: 1
      has_parallel_paths: false
      max_chain_length: 2

# =============================================================================
# MAT FAMILY
# =============================================================================

lineMAT:
  example1:
    # --- HAIKU DESCRIPTION ---
    network_description: "Box and circle inputs merge through a copy processor, then flow to geometry output, rendered with Line MAT for solid line rendering."

    # --- SCRIPT-EXTRACTED FACTS ---
    operators:
      - name: box1
        type: SOP:box
        role: input
      - name: circle1
        type: SOP:circle
        role: input
      - name: copy1
        type: SOP:copy
        role: processor
      - name: merge1
        type: SOP:merge
        role: processor
      - name: toGeo
        type: SOP:null
        role: output
      - name: line2
        type: MAT:line
        role: isolated
    connections:
      - from: circle1 -> copy1
      - from: merge1 -> toGeo
      - from: box1 -> merge1
      - from: copy1 -> merge1
    topology:
      operator_count: 6
      connection_count: 4
      has_parallel_paths: false
      max_chain_length: 4

pbrMAT:
  example2:
    # --- HAIKU DESCRIPTION ---
    network_description: "Substance subselect textures process through level adjustment and hsvadj, flowing to PBR material maps for color-modified rendering."

    # --- SCRIPT-EXTRACTED FACTS ---
    operators:
      - name: basecolor
        type: TOP:subselect
        role: input
      - name: level1
        type: TOP:level
        role: processor
      - name: hsvadj1
        type: TOP:hsvadj
        role: output
      - name: pbr1
        type: MAT:pbr
        role: isolated
      - name: normal
        type: TOP:subselect
        role: isolated
      - name: roughness
        type: TOP:subselect
        role: isolated
    connections:
      - from: basecolor -> level1
      - from: level1 -> hsvadj1
    topology:
      operator_count: 6
      connection_count: 2
      has_parallel_paths: false
      max_chain_length: 3
