      # ANGEL - Massive Attack Visual System

      # TouchDesigner Specification


      ## Project Overview

      Artist: Massive Attack

      Track: "Angel"

      Duration: 7:31


      Genre context: Trip-hop, dark electronic. This is the heavier end of

      Mezzanine - predatory, relentless, building dread.


      Lyrical themes: The lyrics are sparse and abstract - "you are my angel"

      repeated, but the delivery is more threatening than tender. The song

      feels like something hunting you, or like falling into something you

      can''t escape.


      ## Song Structure


      ### [0:00-1:20] INTRO - "The Stalk"

      - Sparse intro. That bassline enters. Minimal.

      - Visual: Near-darkness, single point of light, breathing slowly

      - The predator is patient


      ### [1:20-3:00] VERSE 1 - "First Contact"

      - Vocals enter, still restrained

      - Visual: Forms begin to emerge from darkness

      - Movement is slow, deliberate, tracking


      ### [3:00-4:30] BUILD - "The Chase"

      - Layers accumulating. Tension increasing.

      - Visual: Multiple forms now, closing in

      - Speed and complexity building


      ### [4:30-6:00] THE DROP - "Consumed"

      - Everything explodes. Relentless assault.

      - Visual: Total sensory overwhelm

      - No escape, pure intensity


      ### [6:00-7:31] OUTRO - "Aftermath"

      - Gradual decay back to the bassline. Exhaustion.

      - Visual: Slow fade, forms receding

      - The hunt is over


      ## Audio Analysis Requirements

      - Low frequency (20-100Hz): That iconic bassline - drives primary pulse

      - Mid frequency (200Hz-2kHz): Vocals and synth layers

      - High frequency (4-16kHz): Hi-hats, texture, atmosphere

      - Beat detection: The bassline is THE beat - lock to it


      ## Visual Concept Direction

      - Color palette: Deep blacks, blood reds, cold whites

      - Motion language: Predatory, patient, then explosive

      - Texture: Industrial, organic decay, visceral

      - Light behavior: Harsh, directional, hunting


      ## Technical Requirements

      - Resolution: 1920x1080 minimum (16:9 LED wall context)

      - Frame rate: 60fps target

      - Audio input: Live audio feed (audiodevicein)

      - Master intensity parameter for live adjustment

      - Semi-automated to timecode capability


      ## Key Parameters Needed

      - master_intensity: 0.0-1.0 for live control

      - bass_response: How much the bassline drives visuals

      - chaos_amount: For the drop section

      - color_temperature: Cold to warm shift capability

      '
