# GLSL-in-TD eval — templated prompt set.
#
# Each case is a TEMPLATE: {slots} in the prompt are filled from `slots`
# (this case's defaults) drawn from the `vars` banks below. Override a slot
# per run to spawn a variant — e.g. swap theme dali->picasso, driver
# lfo->audio_rms, sim boids->cloth, bug uniform_redefinition->reserved_word.
#
# Provenance lives ON the case (targets / expected_failure / difficulty_reason
# / source / success_criteria) so the prompt never travels without its intent.
# The generative METHOD is documented separately in CURATION.md.

# ---- variable banks (first value = default) -------------------------------
vars:
  theme:   [sci-fi, horror, dali_persistence, picasso_cubist]
  sim:     [boids_flocking, attractor, cloth]
  bug:     [version_not_first, uniform_redefinition, vec3_to_vec2, reserved_word]
  binding: [vector_param, chop_array, texture_input, pop_buffer, feedback_buffer]
  stage:   [fragment, compute, vertex]

# Drivers are the INPUT DATA SOURCES, and they deliberately span the binding
# modalities — a driver isn't just a scalar, it can be the array / sampler /
# buffer / feedback-state the test is meant to exercise. Pick a driver whose
# `binding` matches the case's binding under test.
#   driver -> { shape, binding it exercises, network that must exist }
drivers:
  lfo:            {shape: scalar,        binding: vector_param,
                   network: "lfoCHOP -> uniform"}
  mousein:        {shape: vec2,          binding: vector_param,
                   network: "mouseinCHOP -> mathCHOP(0..1->-1..1) -> selectCHOP -> uniform"}
  audio_rms:      {shape: scalar,        binding: vector_param,
                   network: "audiodevinCHOP -> analyzeCHOP(RMS) -> uniform"}
  chop_multisample: {shape: "float[N]",  binding: chop_array,
                   network: "patternCHOP / audio spectrum (N samples) -> array uniform"}
  noise_top:      {shape: texture,       binding: texture_input,
                   network: "noiseTOP (animated/interactive) -> sampler input"}
  pop_points:     {shape: buffer,        binding: pop_buffer,
                   network: "a source POP (point P/attribs) -> GLSL POP buffer in"}
  feedback_state: {shape: "buffer(state)", binding: feedback_buffer,
                   network: "feedbackTOP <-> GLSL TOP ping-pong (or Advanced POP) holding sim state"}

# ---- the 10 starter cases (the spine; grow from here) ---------------------
cases:
  - id: kn_glsl_stage_roles
    section: knowledge
    op: "TOP:glsl"
    difficulty: easy
    prompt: "In TouchDesigner, which operator runs a {stage} shader, and how do
             its uniforms get created?"
    slots: {stage: fragment}
    targets: "op selection + the TD auto-uniform-from-declaration model"
    expected_failure: "confusing GLSL TOP vs MAT vs POP; missing auto-uniform"
    difficulty_reason: "single concept, well documented"
    source: "scope §1-2"
    success_criteria: "names the right op + correct uniform-creation explanation"

  - id: bo_glsl_top_theme_color
    section: build_offline
    op: "TOP:glsl"
    difficulty: easy
    prompt: "Build (offline, export .tox) a GLSL TOP that renders a procedural
             {theme}-styled image, animated by {driver}."
    slots: {theme: sci-fi, driver: lfo}
    targets: "minimal build->export->import->render path; one vector_param uniform"
    expected_failure: "#version not first; empty .parm (BASIC builder)"
    difficulty_reason: "1 op, 1 stage, 1 uniform"
    source: "basic_tests #09 family, simplified"
    success_criteria: "imports at /test level, compiles 0 err, renders non-black"

  - id: bo_glsl_top_driver_uniform
    section: build_offline
    op: "TOP:glsl"
    difficulty: medium
    prompt: "Build a GLSL TOP whose look is driven by a {driver} signal via a
             {binding} uniform; include the {driver} CHOP network."
    slots: {driver: audio_rms, binding: vector_param}
    targets: "driver CHOP chain + uniform wiring (the binding dimension)"
    expected_failure: "uniform declared on page AND in source -> redefinition"
    difficulty_reason: "graph + one binding + reference/expression params"
    source: "scope §2-4"
    success_criteria: "CHOP net present, uniform driven, compiles, renders"

  - id: bo_glsl_top_chop_array_lut
    section: build_offline
    op: "TOP:glsl"
    difficulty: medium
    prompt: "Build a GLSL TOP that reads a {driver} CHOP as a float array
             uniform and uses it as a {theme} colour LUT."
    slots: {driver: chop_multisample, theme: horror, binding: chop_array}
    targets: "chop_array binding (Arrays page) fed by a multi-sample CHOP; no string literals"
    expected_failure: "wrong array length; string-literal channel ref"
    difficulty_reason: "array-uniform wiring is a known trap"
    source: "scope §2"
    success_criteria: "array uniform populated from CHOP, compiles, renders"

  - id: bo_glsl_mat_vertex_displace
    section: build_offline
    op: "MAT:glsl"
    difficulty: hard
    prompt: "Build a GLSL MAT that displaces geometry in the vertex shader by a
             {driver} amount, shaded with a {theme} pixel shader; include
             Geo/Camera/Light/Render."
    slots: {driver: noise, theme: dali_persistence}
    targets: "vertex+pixel stages + full 3D render context integration"
    expected_failure: "vec3->vec2; missing render chain; uniform redefinition"
    difficulty_reason: "two shader stages + multi-op integration"
    source: "scope §1,4"
    success_criteria: "geo visibly displaced, compiles 0 err, render non-black"

  - id: bl_glsl_top_blend_inputs
    section: build_live
    op: "TOP:glsl"
    difficulty: medium
    prompt: "In the running project, create a GLSL TOP that samples a {driver}
             as a texture input and blends it over a second input TOP."
    slots: {driver: noise_top, binding: texture_input}
    targets: "live create_td_node + texture_input sampler binding (TOP driver)"
    expected_failure: "sampler index wrong; input unconnected"
    difficulty_reason: "live wiring + texture binding"
    source: "scope §2-3"
    success_criteria: "both inputs sampled, mix responds to driver, renders"

  - id: bl_glsl_pop_sim_instanced
    section: build_live
    op: "POP:glsl"
    difficulty: hard
    prompt: "In the running project, build a GLSL POP {sim} simulation reading
             {driver} as a buffer, rendered through an instanced Geo COMP."
    slots: {sim: boids_flocking, driver: pop_points, binding: pop_buffer}
    targets: "GLSL POP compute + pop_buffer in + per-frame state (feedback/Advanced POP) + POP->instanced-geo render"
    expected_failure: "template vs per-point pos; buffer not bound; no state buffer; work-group"
    difficulty_reason: "compute + buffer plumbing + instancing"
    source: "scenario_E boids; murmuration swarm"
    success_criteria: "particles move per {sim} rules, renders, no cook errors"

  - id: fo_glsl_fix_bug
    section: fix_offline
    op: "TOP:glsl"
    difficulty: medium
    prompt: "This GLSL TOP network won't compile ({bug}). Fix it so it builds
             and renders, keeping the visual intent."
    slots: {bug: uniform_redefinition}
    targets: "diagnose+repair a specific catalogued GLSL error"
    expected_failure: "fixes symptom not cause; introduces a new error"
    difficulty_reason: "requires reading the compile log + root cause"
    source: "glsl9errors.txt (Dali run real errors)"
    success_criteria: "the {bug} class is gone, compiles 0 err, still renders"

  - id: fl_glsl_fix_live
    section: fix_live
    op: "TOP:glsl"
    difficulty: medium
    prompt: "The glsl1 TOP in the running project is erroring ({bug}). Fix it
             live so it renders clean."
    slots: {bug: reserved_word}
    targets: "live diagnose+repair against real cook/compile errors"
    expected_failure: "edits wrong node; partial fix; leaves cook error"
    difficulty_reason: "live state + error-log driven repair"
    source: "sci-fi #10 'active' reserved word"
    success_criteria: "error count -> 0, renders, project otherwise unchanged"

  - id: fc_creative_av_scene
    section: full_creative
    op: "TOP:glsl + MAT:glsl"
    difficulty: hard
    prompt: "Build a full {theme} audiovisual scene: GLSL TOP background + a
             GLSL MAT object, all reactive to {driver}; export as a .tox and
             import it at the correct level in /test."
    slots: {theme: dali_persistence, driver: audio_rms}
    targets: "GLSL + multi-op + palette + .tox import-at-level + reactivity"
    expected_failure: "wrapped-palette import instead of tox; output not wired"
    difficulty_reason: "everything-at-once; historically multi-fix"
    source: "basic_tests #09/#10 (Dali / sci-fi) + 06-07 import bug"
    success_criteria: "imports correctly, compiles, renders, reacts to {driver};
                       scored on compile/render AND fix_iterations + cost"

  # ---- growth (added beyond the starter 10) -------------------------------
  - id: bo_glsl_top_feedback_sim
    section: build_offline
    op: "TOP:glsl"
    difficulty: hard
    prompt: "Build a GLSL TOP {sim} simulation that holds its state across
             frames via a {driver} feedback loop (ping-pong)."
    slots: {sim: cloth, driver: feedback_state, binding: feedback_buffer}
    targets: "feedback_buffer binding — Feedback TOP <-> GLSL TOP ping-pong; stateful per-frame sim"
    expected_failure: "no ping-pong (state lost each cook); feedback not wired back; first-frame init missing"
    difficulty_reason: "stateful multi-pass; feedback wiring is a classic trap"
    source: "scope §2,4; user: feedback loops to buffer simulations"
    success_criteria: "state persists/evolves across frames, compiles, renders stable"
