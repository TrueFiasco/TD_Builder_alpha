# NL-prompt test cases. ADD A TEST = ADD A BLOCK HERE, then re-run:
#   & $PY -m pytest tests/nl -v
#
# Each case becomes one pytest PASSED/FAILED line: test_nl_prompt[<name>]
#
# Fields:
#   name              : short id (shows in pytest output; keep unique)
#   prompt            : the natural-language query sent to hybrid_search
#   expect_operators  : at least ONE of these must appear in the results
#                       (format "FAMILY:type", e.g. TOP:glsl, MAT:glsl, POP:glsl)
#   expect_keywords   : (optional) ALL of these must appear in the result text
#                       (case-insensitive substring)

- name: glsl_top_fragment
  prompt: "How do I write a fragment shader in a GLSL TOP?"
  expect_operators: ["TOP:glsl"]
  expect_keywords: ["uniform"]

- name: glsl_top_compute
  prompt: "How do I run a compute shader with a GLSL TOP to write to a buffer?"
  expect_operators: ["TOP:glsl"]
  expect_keywords: ["compute"]

- name: glsl_mat_vertex
  prompt: "How do I displace geometry in a vertex shader using a GLSL MAT?"
  expect_operators: ["MAT:glsl"]
  expect_keywords: ["vertex"]

- name: glsl_mat_pixel
  prompt: "How do I write a pixel shader for material shading with a GLSL MAT?"
  expect_operators: ["MAT:glsl"]

- name: glsl_pop_compute
  prompt: "How do I use a GLSL POP compute shader to transform point positions?"
  expect_operators: ["POP:glsl"]
  expect_keywords: ["compute"]

- name: glsl_pop_vertex
  prompt: "How do I run a per-point GLSL POP to modify particle attributes?"
  expect_operators: ["POP:glsl"]
