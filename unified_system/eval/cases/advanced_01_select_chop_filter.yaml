name: advanced_01_select_chop_filter
tier: advanced
prompt: |
  I have a CHOP carrying many channels (tx, ty, tz, rx, ry, rz, sx, sy, sz).
  I only need the translation channels. Use a Select CHOP to keep only tx,
  ty, and tz, then a Null CHOP downstream.
expected_operators:
  - CHOP:select
  - CHOP:null
expected_connections:
  - [select1, null1]
tolerance:
  min_operator_recall: 1.0
  min_connection_recall: 1.0
notes: |
  Tests B1 operator precision. Investigation showed orphan store returns the
  irrelevant OAK_Select_CHOP for "select CHOP filter channel by name", while
  active store correctly returns Select CHOP first. Strict tolerance — the
  agent should NOT pick an OAK_Select_CHOP.
