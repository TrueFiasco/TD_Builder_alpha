name: advanced_02_instancing_geometry_chop
tier: advanced
prompt: |
  Instance a sphere geometry across many positions. Use a Geometry COMP with
  instancing turned on, driven by a CHOP that carries instance-position
  channels (tx, ty, tz). Render the result.
expected_operators:
  - SOP:sphere
  - COMP:geometry
  - COMP:camera
  - TOP:render
expected_parameters:
  geo1:
    instancing: "1"
tolerance:
  min_operator_recall: 0.5
  min_connection_recall: 0.0
notes: |
  Tests parameter-level retrieval. The orphan ChromaDB has per-parameter docs
  including "Geometry_COMP instancing parameter: Turns on instancing for the
  Geometry Component." The active store does not. Without the merge, the
  agent may not know to set 'instancing' = 1 on the Geometry COMP.
  Loose op recall because the prompt is open-ended (any source SOP is fine).
