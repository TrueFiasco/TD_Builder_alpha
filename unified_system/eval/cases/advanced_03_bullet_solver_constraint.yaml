name: advanced_03_bullet_solver_constraint
tier: advanced
prompt: |
  Build a small physics scene with two Bullet rigid-body actors connected by
  a hinge constraint. Use the Bullet Solver COMP, two Actor COMPs, and a
  Constraint COMP set to hinge type. Pass the solver's output to a Render TOP
  for visualization.
expected_operators:
  - COMP:bulletsolver
  - COMP:actor
  - COMP:constraint
  - TOP:render
tolerance:
  min_operator_recall: 0.75
  min_connection_recall: 0.0
notes: |
  Tests the "bullet solver constraint hinge" prompt from the investigation.
  Active ChromaDB store returned the right operators (Bullet Solver COMP,
  Actor COMP, Constraint COMP) at high relevance. With merged store this
  should match perfectly. Connection topology is dense and non-obvious from
  prose — relax connection tolerance.
