name: basic_02_circle_sop_render
tier: basic
prompt: |
  Render a circle SOP on screen. Use a Geometry COMP to wrap the SOP, a Camera
  COMP, and a Render TOP that produces the final image.
expected_operators:
  - SOP:circle
  - COMP:geometry
  - COMP:camera
  - TOP:render
expected_connections:
  - [cam1, render1]
  - [geo1, render1]
tolerance:
  min_operator_recall: 0.75
  min_connection_recall: 0.5
notes: |
  Tests basic 3D-render setup. Connection names ('cam1', 'geo1', 'render1')
  use TD's default-name convention; tolerance accounts for naming variation.
