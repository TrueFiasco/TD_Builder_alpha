name: basic_04_text_top_color
tier: basic
prompt: |
  Display the word "Hello" as text on screen. Use a Text TOP to render the
  text and a Constant TOP behind it as a coloured background. Composite them
  together.
expected_operators:
  - TOP:text
  - TOP:constant
  - TOP:composite
expected_connections:
  - [constant1, composite1]
  - [text1, composite1]
tolerance:
  min_operator_recall: 0.66
  min_connection_recall: 0.5
notes: |
  Tests basic 2D compositing. Layer ordering of inputs into Composite TOP is
  hard to nail from prose; loose tolerance.
