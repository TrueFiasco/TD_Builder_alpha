name: intermediate_01_audio_reactive_particles
tier: intermediate
prompt: |
  Build an audio-reactive particle system. Capture audio from the default
  audio device, extract a low-frequency amplitude signal, and use that to
  modulate the speed/scale of a particle simulation rendered on screen.
expected_operators:
  - CHOP:audiodevicein
  - CHOP:audiospectrum
  - POP:particle
  - TOP:render
expected_connections:
  - [audiodevicein1, audiospectrum1]
tolerance:
  min_operator_recall: 0.5
  min_connection_recall: 0.0
notes: |
  Hits the B1 dual-bucket bug — both audio and visual keyword buckets fire and
  can crowd each other out. Loose connection tolerance because the modulation
  path can route through several intermediate ops legitimately. POP:particle
  may also be expressed as the older Particle SOP — tolerance accounts for it.
