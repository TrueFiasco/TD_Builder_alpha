name: intermediate_03_glsl_top_shader
tier: intermediate
prompt: |
  Apply a custom GLSL fragment shader to a procedural noise texture. Use a
  Noise TOP as the input image, feed it into a GLSL TOP that does pixel-level
  transformations via a custom shader.
expected_operators:
  - TOP:noise
  - TOP:glsl
expected_connections:
  - [noise1, glsl1]
tolerance:
  min_operator_recall: 1.0
  min_connection_recall: 1.0
notes: |
  Tests the GLSL TOP path. Hits B1 because 'noise' falls into the GLSL keyword
  bucket but the Noise *TOP* is in the visual bucket the if-ladder doesn't
  select. Strict tolerance — both operators are explicitly named in the prompt.
